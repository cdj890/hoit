<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<title>물 마시기 트래커</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:70px 16px 30px}
h1{font-size:1.5rem;margin-bottom:8px}
.subtitle{color:#aaa;font-size:.9rem;margin-bottom:20px}
.bottle{position:relative;width:120px;height:240px;border:4px solid #333;border-radius:0 0 20px 20px;margin:10px auto;overflow:hidden;background:#0a0a1a}
.bottle-cap{width:60px;height:16px;background:#333;border-radius:6px 6px 0 0;margin:0 auto}
.water-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#00b0ff,#0091ea);transition:height .6s ease;border-radius:0 0 16px 16px}
.water-fill::before{content:'';position:absolute;top:-8px;left:0;right:0;height:16px;background:radial-gradient(ellipse at center,rgba(255,255,255,.15) 0%,transparent 70%);border-radius:50%}
.count{font-size:3rem;font-weight:bold;color:#00e5ff;margin:10px 0}
.count span{font-size:1.2rem;color:#aaa}
.glasses{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0;max-width:350px}
.glass{width:36px;height:36px;border-radius:50%;border:3px solid #333;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .3s}
.glass.filled{border-color:#00e5ff;background:#00e5ff22}
.add-btn{padding:14px 40px;background:#00e5ff;color:#0f0f1e;border:none;border-radius:14px;font-size:1.2rem;font-weight:bold;cursor:pointer;min-height:50px;touch-action:manipulation;margin:10px 0}
.undo-btn{padding:10px 24px;background:#333;color:#ccc;border:none;border-radius:10px;font-size:.9rem;cursor:pointer;min-height:44px;touch-action:manipulation}
.history{width:100%;max-width:440px;margin-top:24px}
.history h2{font-size:1.1rem;margin-bottom:10px;color:#aaa}
.hist-item{display:flex;justify-content:space-between;padding:8px 12px;background:#1a1a2e;border-radius:8px;margin-bottom:4px;font-size:.85rem}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>

<h1>물 마시기 트래커</h1>
<p class="subtitle">하루 8잔 목표</p>

<div class="bottle-cap"></div>
<div class="bottle"><div class="water-fill" id="waterFill"></div></div>
<div class="count" id="countDisp">0 <span>/ 8잔</span></div>
<div class="glasses" id="glasses"></div>
<button class="add-btn" onclick="addGlass()">💧 물 한 잔 추가</button>
<button class="undo-btn" onclick="undoGlass()">되돌리기</button>

<div class="history" id="history">
<h2>최근 기록</h2>
<div id="histList"></div>
</div>

<script>
const GOAL=8;
const today=new Date().toISOString().slice(0,10);
let data=JSON.parse(localStorage.getItem('waterData')||'{}');
if(!data[today])data[today]=0;

function save(){localStorage.setItem('waterData',JSON.stringify(data))}
function render(){
const count=data[today]||0;
document.getElementById('countDisp').innerHTML=count+' <span>/ '+GOAL+'잔</span>';
document.getElementById('waterFill').style.height=Math.min(count/GOAL*100,100)+'%';
const gl=document.getElementById('glasses');gl.innerHTML='';
for(let i=0;i<GOAL;i++){const d=document.createElement('div');d.className='glass'+(i<count?' filled':'');d.textContent=i<count?'💧':'';gl.appendChild(d)}
renderHistory();
}
function addGlass(){data[today]=(data[today]||0)+1;save();render()}
function undoGlass(){if(data[today]>0){data[today]--;save();render()}}

function renderHistory(){
const list=document.getElementById('histList');list.innerHTML='';
const dates=Object.keys(data).sort().reverse().slice(0,7);
dates.forEach(d=>{
const div=document.createElement('div');div.className='hist-item';
div.innerHTML=`<span>${d}</span><span>${data[d]}잔 ${data[d]>=GOAL?'✅':''}/ ${GOAL}</span>`;
list.appendChild(div);
});
}
render();
</script>
<div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body>
</html>
