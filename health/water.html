<h1>물 마시기 트래커</h1>
<p class="subtitle">하루 8잔 목표</p>

<div class="bottle-cap"></div>
<div class="bottle"><div class="water-fill" id="waterFill"></div></div>
<div class="count" id="countDisp">0 <span>/ 8잔</span></div>
<div class="glasses" id="glasses"></div>
<button class="add-btn" onclick="addGlass()">💧 물 한 잔 추가</button>
<button class="undo-btn" onclick="undoGlass()">되돌리기</button>

<div class="history" id="history">
<h2>최근 기록</h2>
<div id="histList"></div>
</div>

<script>
const GOAL=8;
const today=new Date().toISOString().slice(0,10);
let data=JSON.parse(localStorage.getItem('hoit_water')||'{}');
if(!data[today])data[today]=0;

function save(){localStorage.setItem('hoit_water',JSON.stringify(data))}
function render(){
const count=data[today]||0;
document.getElementById('countDisp').innerHTML=count+' <span>/ '+GOAL+'잔</span>';
document.getElementById('waterFill').style.height=Math.min(count/GOAL*100,100)+'%';
const gl=document.getElementById('glasses');gl.innerHTML='';
for(let i=0;i<GOAL;i++){const d=document.createElement('div');d.className='glass'+(i<count?' filled':'');d.textContent=i<count?'💧':'';gl.appendChild(d)}
renderHistory();
}
function addGlass(){data[today]=(data[today]||0)+1;save();render()}
function undoGlass(){if(data[today]>0){data[today]--;save();render()}}

function renderHistory(){
const list=document.getElementById('histList');list.innerHTML='';
const dates=Object.keys(data).sort().reverse().slice(0,7);
dates.forEach(d=>{
const div=document.createElement('div');div.className='hist-item';
div.innerHTML=`<span>${d}</span><span>${data[d]}잔 ${data[d]>=GOAL?'✅':''}/ ${GOAL}</span>`;
list.appendChild(div);
});
}
render();
</script>
