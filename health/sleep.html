<h1>수면 계산기</h1>
<p class="sub">90분 수면 사이클 기준 최적 시간 추천</p>

<div class="modes">
<button class="sel" id="modeA" onclick="setMode('sleep')">취침 시간 입력</button>
<button id="modeB" onclick="setMode('wake')">기상 시간 입력</button>
</div>

<div class="input-group" id="sleepGroup">
<label>🌙 취침 시간</label>
<input type="time" id="sleepTime" value="23:00">
</div>
<div class="input-group" id="wakeGroup" style="display:none">
<label>☀️ 기상 시간</label>
<input type="time" id="wakeTime" value="07:00">
</div>

<button class="calc-btn" onclick="calculate()">계산하기</button>

<div class="result" id="result" style="display:none">
<div class="result-card" id="durationCard">
<div class="label">수면 시간</div>
<div class="value" id="durVal"></div>
</div>
<div class="result-card">
<div class="label" id="recLabel">추천 기상 시간</div>
<div class="cycles" id="cycles"></div>
</div>
</div>

<div class="info-box">
💡 수면은 약 90분 주기로 반복됩니다. 수면 주기가 끝나는 시점에 일어나면 더 개운합니다.<br>
잠드는 데 약 15분이 걸리는 것을 고려합니다.
</div>

<script>
let mode='sleep';
function setMode(m){
mode=m;
document.getElementById('modeA').className=m==='sleep'?'sel':'';
document.getElementById('modeB').className=m==='wake'?'sel':'';
document.getElementById('sleepGroup').style.display=m==='sleep'?'block':'none';
document.getElementById('wakeGroup').style.display=m==='wake'?'block':'none';
document.getElementById('result').style.display='none';
}

function timeStr(mins){
let h=Math.floor(mins/60)%24,m=mins%60;
return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function calculate(){
const FALL_ASLEEP=15,CYCLE=90;
document.getElementById('result').style.display='block';
const cyc=document.getElementById('cycles');cyc.innerHTML='';

if(mode==='sleep'){
const [h,m]=document.getElementById('sleepTime').value.split(':').map(Number);
const sleepMin=h*60+m+FALL_ASLEEP;
document.getElementById('recLabel').textContent='추천 기상 시간';
for(let c=3;c<=6;c++){
const wakeMin=(sleepMin+c*CYCLE)%(24*60);
const dur=c*CYCLE;
const d=document.createElement('div');
d.className='cycle-card'+(c===5?' best':'');
d.innerHTML=`<div class="time">${timeStr(wakeMin)}</div><div class="cyc">${c}사이클 (${Math.floor(dur/60)}시간 ${dur%60}분)</div>`;
cyc.appendChild(d);
}
document.getElementById('durVal').textContent='추천: 7시간 30분 (5사이클)';
}else{
const [h,m]=document.getElementById('wakeTime').value.split(':').map(Number);
const wakeMin=h*60+m;
document.getElementById('recLabel').textContent='추천 취침 시간';
for(let c=6;c>=3;c--){
const sleepMin=(wakeMin-c*CYCLE-FALL_ASLEEP+24*60)%(24*60);
const dur=c*CYCLE;
const d=document.createElement('div');
d.className='cycle-card'+(c===5?' best':'');
d.innerHTML=`<div class="time">${timeStr(sleepMin)}</div><div class="cyc">${c}사이클 (${Math.floor(dur/60)}시간 ${dur%60}분)</div>`;
cyc.appendChild(d);
}
document.getElementById('durVal').textContent='추천: 7시간 30분 (5사이클)';
}
}
</script>
