<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo',sans-serif;min-height:100vh;padding:70px 16px 30px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.5rem;margin-bottom:16px}
.search-wrap{width:100%;max-width:440px;position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:12px 16px;border-radius:10px;border:2px solid #333;background:#1e1e3a;color:#fff;font-size:1rem}
.results{position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border-radius:0 0 10px 10px;max-height:200px;overflow-y:auto;z-index:10;border:1px solid #333;display:none}
.results div{padding:10px 16px;cursor:pointer;font-size:.9rem;border-bottom:1px solid #222;touch-action:manipulation}
.results div:hover,.results div:active{background:#2a2a4e}
.goal-wrap{width:100%;max-width:440px;margin:10px 0;display:flex;align-items:center;gap:10px}
.goal-wrap label{font-size:.9rem;color:#aaa;white-space:nowrap}
.goal-wrap input{flex:1;padding:8px;border-radius:8px;border:1px solid #333;background:#1e1e3a;color:#fff;font-size:1rem;text-align:center}
.gauge{width:100%;max-width:440px;height:30px;background:#1e1e3a;border-radius:15px;overflow:hidden;margin:12px 0}
.gauge-fill{height:100%;border-radius:15px;transition:width .3s;background:linear-gradient(90deg,#00e5ff,#00c853)}
.gauge-fill.over{background:linear-gradient(90deg,#ff4081,#ff1744)}
.total{font-size:2rem;font-weight:bold;color:#00e5ff;margin:8px 0}
.log{width:100%;max-width:440px;margin-top:12px}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1a1a2e;border-radius:8px;margin-bottom:6px;font-size:.9rem}
.log-item .del{color:#ff4081;cursor:pointer;padding:4px 10px;touch-action:manipulation;font-size:1.1rem}
</style>

<h1>칼로리 계산기</h1>
<div class="goal-wrap"><label>목표 (kcal)</label><input type="number" id="goalIn" value="2000"></div>
<div class="search-wrap">
<input type="text" id="searchIn" placeholder="음식 검색..." autocomplete="off">
<div class="results" id="results"></div>
</div>
<div class="total" id="totalDisp">0 kcal</div>
<div class="gauge"><div class="gauge-fill" id="gaugeFill" style="width:0%"></div></div>
<div class="log" id="log"></div>

<script>
const foods=[
['밥 1공기',300],['김치찌개',150],['된장찌개',120],['불고기',400],['삼겹살 1인분',550],
['치킨 1조각',250],['피자 1조각',300],['햄버거',500],['라면',500],['비빔밥',550],
['김밥 1줄',400],['떡볶이 1인분',450],['만두 5개',300],['잡채',250],['갈비탕',350],
['냉면',450],['짜장면',600],['짬뽕',500],['탕수육 1인분',700],['볶음밥',500],
['샌드위치',350],['샐러드',150],['계란 1개',80],['우유 1잔',120],['두부 반모',100],
['고구마 1개',130],['바나나 1개',90],['사과 1개',80],['귤 1개',40],['딸기 10개',50],
['요거트 1개',100],['치즈 1장',60],['아메리카노',5],['카페라떼',150],['콜라 1캔',140],
['맥주 1캔',150],['소주 1잔',60],['와인 1잔',120],['주스 1잔',110],['떡 1개',120],
['쿠키 1개',80],['케이크 1조각',350],['초콜릿 1개',50],['아이스크림',200],['과자 1봉',400],
['식빵 1장',80],['토스트',250],['죽 1그릇',200],['오므라이스',550],['카레라이스',600]
];
const TODAY=new Date().toISOString().slice(0,10);
const LS_KEY='hoit_calories';
function loadData(){const raw=JSON.parse(localStorage.getItem(LS_KEY)||'{}');return raw[TODAY]||{log:[],goal:2000}}
function saveData(){const raw=JSON.parse(localStorage.getItem(LS_KEY)||'{}');raw[TODAY]={log,goal:parseInt(document.getElementById('goalIn').value)||2000};localStorage.setItem(LS_KEY,JSON.stringify(raw))}
const _saved=loadData();
let log=_saved.log;
document.getElementById('goalIn').value=_saved.goal;
const searchIn=document.getElementById('searchIn'),resultsEl=document.getElementById('results');

searchIn.oninput=()=>{
const q=searchIn.value.trim();
if(!q){resultsEl.style.display='none';return}
const filtered=foods.filter(f=>f[0].includes(q));
resultsEl.innerHTML='';
filtered.forEach(f=>{
const d=document.createElement('div');
d.textContent=`${f[0]} - ${f[1]} kcal`;
d.onclick=()=>{addFood(f[0],f[1]);searchIn.value='';resultsEl.style.display='none'};
resultsEl.appendChild(d);
});
resultsEl.style.display=filtered.length?'block':'none';
};

function addFood(name,cal){log.push({name,cal});saveData();render()}
function removeFood(i){log.splice(i,1);saveData();render()}

function render(){
const total=log.reduce((s,f)=>s+f.cal,0);
const goal=parseInt(document.getElementById('goalIn').value)||2000;
document.getElementById('totalDisp').textContent=total+' kcal';
const pct=Math.min((total/goal)*100,100);
const fill=document.getElementById('gaugeFill');
fill.style.width=pct+'%';
fill.className='gauge-fill'+(total>goal?' over':'');
const logEl=document.getElementById('log');logEl.innerHTML='';
log.forEach((f,i)=>{
const d=document.createElement('div');d.className='log-item';
d.innerHTML=`<span>${f.name} - ${f.cal} kcal</span><span class="del" onclick="removeFood(${i})">✕</span>`;
logEl.appendChild(d);
});
}
document.getElementById('goalIn').oninput=()=>{saveData();render()};
render();

// 주간 차트
(function(){
  function getWeekDates(){
    const dates=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      dates.push(d.toISOString().slice(0,10));
    }
    return dates;
  }
  function drawWeekChart(){
    const dates=getWeekDates();
    const raw=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    const values=dates.map(d=>{
      const day=raw[d];
      if(!day||!day.log)return 0;
      return day.log.reduce((s,f)=>s+f.cal,0);
    });
    const wrap=document.createElement('div');
    wrap.style.cssText='width:100%;max-width:440px;margin:20px 0 8px';
    const title=document.createElement('div');
    title.style.cssText='font-size:.85rem;color:#aaa;margin-bottom:8px;text-align:center';
    title.textContent='최근 7일 칼로리 추이';
    const canvas=document.createElement('canvas');
    canvas.width=440;canvas.height=180;
    canvas.style.cssText='width:100%;max-width:440px;height:180px;display:block';
    wrap.appendChild(title);wrap.appendChild(canvas);
    document.getElementById('log').parentNode.insertBefore(wrap,document.getElementById('log').nextSibling);
    const ctx=canvas.getContext('2d');
    const maxVal=Math.max(...values,1);
    const pad={top:10,bottom:30,left:10,right:10};
    const W=440,H=180;
    const chartW=W-pad.left-pad.right;
    const chartH=H-pad.top-pad.bottom;
    const barW=Math.floor(chartW/7*0.6);
    const barGap=Math.floor(chartW/7);
    values.forEach((v,i)=>{
      const x=pad.left+i*barGap+(barGap-barW)/2;
      const bh=Math.round((v/maxVal)*chartH);
      const y=pad.top+chartH-bh;
      const grad=ctx.createLinearGradient(0,y,0,y+bh);
      grad.addColorStop(0,'#7B68EE');grad.addColorStop(1,'#00CED1');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,barW,bh,4):ctx.rect(x,y,barW,bh);ctx.fill();
      ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';
      const label=dates[i].slice(5);
      ctx.fillText(label,x+barW/2,H-8);
      if(v>0){ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.fillText(v,x+barW/2,y-3);}
    });
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,pad.top+chartH);ctx.lineTo(W-pad.right,pad.top+chartH);ctx.stroke();
  }
  drawWeekChart();
})();
</script>
