*{margin:0;padding:0;box-sizing:border-box}

.timer-circle svg{transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:#222;stroke-width:8}
.timer-prog{fill:none;stroke:#00e5ff;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.4rem;font-weight:bold}
.nav-btns{display:flex;gap:10px;margin-top:16px;justify-content:center}
.nav-btns button{padding:12px 28px;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation}

<h1>스트레칭 가이드</h1>
<div class="progress" id="progress"></div>
<div class="card">
<div class="emoji" id="emoji"></div>
<div class="stretch-name" id="sname"></div>
<div class="stretch-desc" id="sdesc"></div>
<div class="timer-circle">
<svg width="140" height="140"><circle class="timer-bg" cx="70" cy="70" r="60"/><circle class="timer-prog" id="tprog" cx="70" cy="70" r="60"/></svg>
<div class="timer-text" id="ttext">30</div>
</div>
<div class="nav-btns">
<button class="btn-skip" onclick="skip()">건너뛰기</button>
<button class="btn-start" id="actionBtn" onclick="startTimer()">시작</button>
</div>
</div>

<script>
const ST_KEY='hoit_stretch';
const ST_TODAY=new Date().toISOString().slice(0,10);
function stLoad(){const raw=JSON.parse(localStorage.getItem(ST_KEY)||'{}');return raw[ST_TODAY]||{cur:0,done:false}}
function stSave(cur,done){const raw=JSON.parse(localStorage.getItem(ST_KEY)||'{}');raw[ST_TODAY]={cur,done};localStorage.setItem(ST_KEY,JSON.stringify(raw))}

const stretches=[
{name:'목 좌우 스트레칭',emoji:'🧘',desc:'머리를 천천히 오른쪽으로 기울여 10초, 왼쪽으로 10초 유지합니다.',part:'목'},
{name:'목 앞뒤 스트레칭',emoji:'🙆',desc:'턱을 가슴 쪽으로 당기고 10초, 하늘을 보며 10초 유지합니다.',part:'목'},
{name:'어깨 돌리기',emoji:'💪',desc:'양 어깨를 큰 원을 그리며 앞으로 15초, 뒤로 15초 돌립니다.',part:'어깨'},
{name:'팔 교차 스트레칭',emoji:'🤗',desc:'오른팔을 왼쪽으로 당겨 15초, 반대쪽도 15초 유지합니다.',part:'어깨'},
{name:'고양이-소 스트레칭',emoji:'🐱',desc:'네발 자세에서 등을 둥글게 말았다가 아래로 내립니다. 천천히 반복합니다.',part:'허리'},
{name:'허리 비틀기',emoji:'🔄',desc:'앉은 자세에서 상체를 오른쪽으로 비틀어 15초, 왼쪽으로 15초 유지합니다.',part:'허리'},
{name:'햄스트링 스트레칭',emoji:'🦵',desc:'한쪽 다리를 앞으로 뻗고 상체를 앞으로 숙여 15초씩 유지합니다.',part:'다리'},
{name:'쿼드 스트레칭',emoji:'🏃',desc:'한 발로 서서 반대쪽 발을 뒤로 잡아당겨 허벅지 앞쪽을 늘립니다.',part:'다리'},
{name:'종아리 스트레칭',emoji:'🦶',desc:'벽에 손을 짚고 한 발을 뒤로 빼서 종아리를 늘립니다. 15초씩.',part:'다리'},
{name:'전신 기지개',emoji:'🌟',desc:'양팔을 하늘 위로 뻗고 발끝으로 서서 전신을 최대한 늘립니다.',part:'전신'}
];
const TOTAL_TIME=30,circ=2*Math.PI*60;
const _stSaved=stLoad();
let cur=_stSaved.cur,timeLeft=TOTAL_TIME,timer=null,running=false;
document.getElementById('tprog').style.strokeDasharray=circ;

function renderProgress(){
const p=document.getElementById('progress');p.innerHTML='';
stretches.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<cur?' done':'')+(i===cur?' cur':'');p.appendChild(d)});
}
function showCurrent(){
const s=stretches[cur];
document.getElementById('emoji').textContent=s.emoji;
document.getElementById('sname').textContent=s.name;
document.getElementById('sdesc').textContent=s.desc;
timeLeft=TOTAL_TIME;updateTimerDisplay();renderProgress();
document.getElementById('actionBtn').textContent='시작';
document.getElementById('actionBtn').className='btn-start';
document.getElementById('actionBtn').onclick=startTimer;
running=false;clearInterval(timer);
}
function updateTimerDisplay(){
document.getElementById('ttext').textContent=timeLeft;
const pct=timeLeft/TOTAL_TIME;
document.getElementById('tprog').style.strokeDashoffset=circ*(1-pct);
}
function startTimer(){
if(running)return;running=true;
document.getElementById('actionBtn').textContent='진행 중...';
timer=setInterval(()=>{
timeLeft--;updateTimerDisplay();
if(timeLeft<=0){clearInterval(timer);running=false;next()}
},1000);
}
function next(){if(cur<stretches.length-1){cur++;stSave(cur,false);showCurrent()}else{stSave(cur,true);document.getElementById('sname').textContent='완료!';document.getElementById('sdesc').textContent='모든 스트레칭을 마쳤습니다.';document.getElementById('emoji').textContent='🎉';renderProgress()}}
function skip(){clearInterval(timer);running=false;next()}
if(_stSaved.done){document.getElementById('sname').textContent='완료!';document.getElementById('sdesc').textContent='모든 스트레칭을 마쳤습니다.';document.getElementById('emoji').textContent='🎉';renderProgress()}else{showCurrent()}

// 주간 차트
(function(){
  function getWeekDates(){
    const dates=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      dates.push(d.toISOString().slice(0,10));
    }
    return dates;
  }
  function drawStChart(){
    const dates=getWeekDates();
    const raw=JSON.parse(localStorage.getItem(ST_KEY)||'{}');
    const values=dates.map(d=>raw[d]?raw[d].cur:0);
    const wrap=document.createElement('div');
    wrap.style.cssText='width:100%;max-width:440px;margin:20px auto 8px';
    const title=document.createElement('div');
    title.style.cssText='font-size:.85rem;color:#aaa;margin-bottom:8px;text-align:center';
    title.textContent='최근 7일 스트레칭 진행 추이 (동작 수)';
    const canvas=document.createElement('canvas');
    canvas.width=440;canvas.height=180;
    canvas.style.cssText='width:100%;max-width:440px;height:180px;display:block';
    wrap.appendChild(title);wrap.appendChild(canvas);
    const card=document.querySelector('.card');
    card.parentNode.insertBefore(wrap,card.nextSibling);
    const ctx=canvas.getContext('2d');
    const maxVal=Math.max(...values,stretches.length,1);
    const pad={top:10,bottom:30,left:10,right:10};
    const W=440,H=180;
    const chartW=W-pad.left-pad.right;
    const chartH=H-pad.top-pad.bottom;
    const barW=Math.floor(chartW/7*0.6);
    const barGap=Math.floor(chartW/7);
    values.forEach((v,i)=>{
      const x=pad.left+i*barGap+(barGap-barW)/2;
      const bh=v>0?Math.max(4,Math.round((v/maxVal)*chartH)):2;
      const y=pad.top+chartH-bh;
      const grad=ctx.createLinearGradient(0,y,0,y+bh);
      grad.addColorStop(0,'#7B68EE');grad.addColorStop(1,'#00CED1');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,barW,bh,4):ctx.rect(x,y,barW,bh);ctx.fill();
      ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText(dates[i].slice(5),x+barW/2,H-8);
      if(v>0){ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.fillText(v+'동작',x+barW/2,y-3);}
    });
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.left,pad.top+chartH);ctx.lineTo(W-pad.right,pad.top+chartH);ctx.stroke();
  }
  drawStChart();
})();
</script>
