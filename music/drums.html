<title>드럼 패드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:70px 12px 30px}
h1{font-size:1.5rem;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:360px}
.pad{aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;user-select:none;font-size:2.5rem;border:2px solid #333;transition:transform .05s,box-shadow .05s}
.pad span{font-size:.85rem;margin-top:6px;color:#ccc}
.pad.hit{transform:scale(.92);box-shadow:0 0 30px rgba(255,255,255,.3)}
.pad:nth-child(1){background:#c62828}.pad:nth-child(2){background:#ad1457}.pad:nth-child(3){background:#6a1b9a}
.pad:nth-child(4){background:#283593}.pad:nth-child(5){background:#00695c}.pad:nth-child(6){background:#558b2f}
.pad:nth-child(7){background:#e65100}.pad:nth-child(8){background:#4e342e}.pad:nth-child(9){background:#37474f}
.tip{color:#666;font-size:.8rem;margin-top:20px}
</style>

<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>

<h1>드럼 패드</h1>
<div class="grid" id="grid"></div>
<p class="tip">패드를 터치하거나 클릭하세요</p>
<div id="recControls"></div>

<script>
let audioCtx;

// --- 드럼 음색 개선 ---
function playKick(c){
  const now=c.currentTime;
  // 저주파 sweep: 60Hz → 30Hz
  const osc=c.createOscillator();
  const g=c.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(60,now);
  osc.frequency.exponentialRampToValueAtTime(30,now+0.15);
  g.gain.setValueAtTime(1.0,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
  osc.connect(g);g.connect(c.destination);
  osc.start(now);osc.stop(now+0.35);

  // noise burst (타격감)
  const bufLen=Math.floor(c.sampleRate*0.04);
  const buf=c.createBuffer(1,bufLen,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,4);
  const nb=c.createBufferSource();nb.buffer=buf;
  const ng=c.createGain();ng.gain.value=0.5;
  nb.connect(ng);ng.connect(c.destination);nb.start(now);
}

function playSnare(c){
  const now=c.currentTime;
  // 중주파 톤 200Hz
  const osc=c.createOscillator();
  const og=c.createGain();
  osc.type='triangle';osc.frequency.value=200;
  og.gain.setValueAtTime(0.5,now);
  og.gain.exponentialRampToValueAtTime(0.001,now+0.12);
  osc.connect(og);og.connect(c.destination);
  osc.start(now);osc.stop(now+0.12);

  // 화이트 노이즈 mix
  const bufLen=Math.floor(c.sampleRate*0.18);
  const buf=c.createBuffer(1,bufLen,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,1.8);
  const nb=c.createBufferSource();nb.buffer=buf;
  const ng=c.createGain();ng.gain.value=0.7;
  nb.connect(ng);ng.connect(c.destination);nb.start(now);
}

function playHihat(c){
  const now=c.currentTime;
  // 고주파 노이즈 + bandpass 8000Hz + 짧은 디케이
  const bufLen=Math.floor(c.sampleRate*0.06);
  const buf=c.createBuffer(1,bufLen,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1);
  const nb=c.createBufferSource();nb.buffer=buf;
  const bp=c.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=8000;bp.Q.value=1.5;
  const g=c.createGain();
  g.gain.setValueAtTime(0.4,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
  nb.connect(bp);bp.connect(g);g.connect(c.destination);nb.start(now);
}

function playTom(c,freq,dur){
  const now=c.currentTime;
  const osc=c.createOscillator();
  const g=c.createGain();
  osc.type='sine';
  osc.frequency.setValueAtTime(freq,now);
  osc.frequency.exponentialRampToValueAtTime(freq*0.6,now+dur);
  g.gain.setValueAtTime(0.7,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  osc.connect(g);g.connect(c.destination);
  osc.start(now);osc.stop(now+dur);
}

function playCrash(c){
  const now=c.currentTime;
  const bufLen=Math.floor(c.sampleRate*0.5);
  const buf=c.createBuffer(1,bufLen,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,1.2);
  const nb=c.createBufferSource();nb.buffer=buf;
  const bp=c.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=5000;bp.Q.value=0.5;
  const g=c.createGain();g.gain.value=0.45;
  nb.connect(bp);bp.connect(g);g.connect(c.destination);nb.start(now);
}

function playRimshot(c){
  const now=c.currentTime;
  const osc=c.createOscillator();
  const g=c.createGain();
  osc.type='triangle';osc.frequency.value=900;
  g.gain.setValueAtTime(0.5,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.07);
  osc.connect(g);g.connect(c.destination);
  osc.start(now);osc.stop(now+0.07);
}

function playCowbell(c){
  const now=c.currentTime;
  const osc=c.createOscillator();
  const g=c.createGain();
  osc.type='square';osc.frequency.value=560;
  g.gain.setValueAtTime(0.3,now);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.18);
  osc.connect(g);g.connect(c.destination);
  osc.start(now);osc.stop(now+0.18);
}

const pads=[
  {name:'킥',   emoji:'🥁', key:'1', play:c=>playKick(c)},
  {name:'스네어',emoji:'🪘', key:'2', play:c=>playSnare(c)},
  {name:'하이햇',emoji:'🎵', key:'3', play:c=>playHihat(c)},
  {name:'하이탐',emoji:'🔔', key:'4', play:c=>playTom(c,300,0.22)},
  {name:'미드탐',emoji:'🎶', key:'5', play:c=>playTom(c,200,0.27)},
  {name:'로우탐',emoji:'🎼', key:'6', play:c=>playTom(c,120,0.33)},
  {name:'크래시',emoji:'💥', key:'7', play:c=>playCrash(c)},
  {name:'림샷',  emoji:'🥢', key:'8', play:c=>playRimshot(c)},
  {name:'카우벨',emoji:'🔔', key:'9', play:c=>playCowbell(c)},
];

// --- 녹음/재생 상태 ---
let isRecording=false;
let recStartTime=0;
let recording=[];
let playbackTimers=[];

function hitPad(padIndex, padEl){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  pads[padIndex].play(audioCtx);
  padEl.classList.add('hit');
  setTimeout(()=>padEl.classList.remove('hit'),100);
  if(isRecording){
    const t=performance.now()-recStartTime;
    recording.push({padIndex,t});
  }
}

const grid=document.getElementById('grid');
const padEls=[];
pads.forEach((p,i)=>{
  const d=document.createElement('div');d.className='pad';
  const em=document.createElement('span');em.textContent=p.emoji;
  em.style.fontSize='2.2rem';
  const nm=document.createElement('span');nm.textContent=p.name;
  d.appendChild(em);d.appendChild(nm);
  d.onpointerdown=e=>{e.preventDefault();hitPad(i,d)};
  grid.appendChild(d);
  padEls.push(d);
});

// 키보드 단축키
document.addEventListener('keydown',e=>{
  const idx=pads.findIndex(p=>p.key===e.key);
  if(idx>=0)hitPad(idx,padEls[idx]);
});

// --- 녹음/재생 버튼 ---
const recContainer=document.getElementById('recControls');
recContainer.style.cssText='display:flex;gap:10px;margin:16px 0;justify-content:center;flex-wrap:wrap';

const btnRec=document.createElement('button');
btnRec.textContent='⏺ 녹음 시작';
btnRec.style.cssText='background:#e53935;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';

const btnStop=document.createElement('button');
btnStop.textContent='⏹ 녹음 중지';
btnStop.style.cssText='background:#555;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';
btnStop.disabled=true;

const btnPlay=document.createElement('button');
btnPlay.textContent='▶ 재생';
btnPlay.style.cssText='background:#1e88e5;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';
btnPlay.disabled=true;

const recStatus=document.createElement('span');
recStatus.style.cssText='color:#aaa;font-size:13px;align-self:center';

recContainer.appendChild(btnRec);
recContainer.appendChild(btnStop);
recContainer.appendChild(btnPlay);
recContainer.appendChild(recStatus);

btnRec.addEventListener('click',()=>{
  playbackTimers.forEach(id=>clearTimeout(id));
  playbackTimers=[];
  recording=[];
  isRecording=true;
  recStartTime=performance.now();
  btnRec.style.background='#b71c1c';
  btnRec.textContent='⏺ 녹음 중...';
  btnStop.disabled=false;
  btnPlay.disabled=true;
  recStatus.textContent='녹음 중';
});

btnStop.addEventListener('click',()=>{
  isRecording=false;
  btnRec.style.background='#e53935';
  btnRec.textContent='⏺ 녹음 시작';
  btnStop.disabled=true;
  btnPlay.disabled=recording.length===0;
  recStatus.textContent=recording.length>0?`${recording.length}개 히트 저장됨`:'저장된 히트 없음';
});

btnPlay.addEventListener('click',()=>{
  if(recording.length===0)return;
  playbackTimers.forEach(id=>clearTimeout(id));
  playbackTimers=[];
  recStatus.textContent='재생 중...';
  btnPlay.disabled=true;

  recording.forEach(ev=>{
    const id=setTimeout(()=>{
      hitPad(ev.padIndex,padEls[ev.padIndex]);
    },ev.t);
    playbackTimers.push(id);
  });

  const lastT=recording[recording.length-1].t;
  const endId=setTimeout(()=>{
    recStatus.textContent=`${recording.length}개 히트 저장됨`;
    btnPlay.disabled=false;
  },lastT+800);
  playbackTimers.push(endId);
});
</script>
