<h1>피아노 건반</h1>
<div class="note-display" id="noteDisp"></div>
<div class="piano" id="piano"></div>
<div id="recControls"></div>

<script>
const noteNames=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const whiteNotes=['C','D','E','F','G','A','B'];
const blackMap={'C':'C#','D':'D#','F':'F#','G':'G#','A':'A#'};
let audioCtx;

// --- 음색 개선: ADSR + 하모닉스 합성 ---
function getFreq(note,octave){
  const idx=noteNames.indexOf(note);
  return 440*Math.pow(2,(octave-4)+(idx-9)/12);
}

function playNote(note,octave){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const freq=getFreq(note,octave);
  const now=audioCtx.currentTime;
  const masterGain=audioCtx.createGain();
  masterGain.connect(audioCtx.destination);

  // 기본파(1배) + 2배 하모닉(0.4배) + 3배 하모닉(0.2배)
  const harmonics=[
    {mult:1, gain:1.0},
    {mult:2, gain:0.4},
    {mult:3, gain:0.2}
  ];

  harmonics.forEach(h=>{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=freq*h.mult;

    // ADSR 엔벨로프
    const attack=0.005;   // 5ms
    const decay=0.05;     // 50ms
    const sustain=0.3;    // 레벨
    const release=0.3;    // 300ms

    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(h.gain*0.6, now+attack);         // Attack
    g.gain.linearRampToValueAtTime(h.gain*sustain, now+attack+decay); // Decay→Sustain

    osc.connect(g);
    g.connect(masterGain);
    osc.start(now);
    osc.stop(now+attack+decay+release+1.0);

    // Release: 건반을 누른 시간 이후 자연 감쇠
    g.gain.setTargetAtTime(0.001, now+attack+decay, release/3);
  });

  document.getElementById('noteDisp').textContent=note+octave;

  // 녹음 중이면 기록
  if(isRecording){
    const t=performance.now()-recStartTime;
    recording.push({note,octave,t});
  }
}

// --- 건반 생성 ---
const piano=document.getElementById('piano');
[4,5].forEach(oct=>{
  whiteNotes.forEach(n=>{
    const w=document.createElement('div');w.className='key white';w.textContent=n+oct;
    w.onpointerdown=e=>{e.preventDefault();w.classList.add('active');playNote(n,oct)};
    w.onpointerup=()=>w.classList.remove('active');
    w.onpointerleave=()=>w.classList.remove('active');
    piano.appendChild(w);
    if(blackMap[n]){
      const b=document.createElement('div');b.className='key black';b.textContent=blackMap[n]+oct;
      b.onpointerdown=e=>{e.preventDefault();b.classList.add('active');playNote(blackMap[n],oct)};
      b.onpointerup=()=>b.classList.remove('active');
      b.onpointerleave=()=>b.classList.remove('active');
      piano.appendChild(b);
    }
  });
});

// --- 녹음/재생 기능 ---
let isRecording=false;
let recStartTime=0;
let recording=[];
let playbackTimers=[];

const recContainer=document.getElementById('recControls');
recContainer.style.cssText='display:flex;gap:10px;margin:16px 0;justify-content:center;flex-wrap:wrap';

const btnRec=document.createElement('button');
btnRec.textContent='⏺ 녹음 시작';
btnRec.style.cssText='background:#e53935;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';

const btnStop=document.createElement('button');
btnStop.textContent='⏹ 녹음 중지';
btnStop.style.cssText='background:#555;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';
btnStop.disabled=true;

const btnPlay=document.createElement('button');
btnPlay.textContent='▶ 재생';
btnPlay.style.cssText='background:#1e88e5;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:bold;min-height:44px';
btnPlay.disabled=true;

const recStatus=document.createElement('span');
recStatus.style.cssText='color:#aaa;font-size:13px;align-self:center';

recContainer.appendChild(btnRec);
recContainer.appendChild(btnStop);
recContainer.appendChild(btnPlay);
recContainer.appendChild(recStatus);

btnRec.addEventListener('click',()=>{
  // 재생 중지
  playbackTimers.forEach(id=>clearTimeout(id));
  playbackTimers=[];

  recording=[];
  isRecording=true;
  recStartTime=performance.now();
  btnRec.style.background='#b71c1c';
  btnRec.textContent='⏺ 녹음 중...';
  btnStop.disabled=false;
  btnPlay.disabled=true;
  recStatus.textContent='녹음 중';
});

btnStop.addEventListener('click',()=>{
  isRecording=false;
  btnRec.style.background='#e53935';
  btnRec.textContent='⏺ 녹음 시작';
  btnStop.disabled=true;
  btnPlay.disabled=recording.length===0;
  recStatus.textContent=recording.length>0?`${recording.length}개 노트 저장됨`:'저장된 노트 없음';
});

btnPlay.addEventListener('click',()=>{
  if(recording.length===0)return;
  // 기존 재생 중지
  playbackTimers.forEach(id=>clearTimeout(id));
  playbackTimers=[];

  recStatus.textContent='재생 중...';
  btnPlay.disabled=true;

  recording.forEach(ev=>{
    const id=setTimeout(()=>{
      playNote(ev.note,ev.octave);
    },ev.t);
    playbackTimers.push(id);
  });

  // 마지막 노트 이후 상태 복원
  const lastT=recording[recording.length-1].t;
  const endId=setTimeout(()=>{
    recStatus.textContent=`${recording.length}개 노트 저장됨`;
    btnPlay.disabled=false;
  },lastT+1500);
  playbackTimers.push(endId);
});
</script>
