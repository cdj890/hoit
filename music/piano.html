<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo',sans-serif;min-height:100vh;display:flex;flex-direction:column;flex-direction:column;align-items:center;padding:70px 8px 30px;overflow-x:hidden}

.key{position:relative;cursor:pointer;touch-action:manipulation;user-select:none;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:11px;font-weight:bold;transition:background .05s}
.white{width:44px;height:180px;background:#f5f5f5;border:1px solid #999;border-radius:0 0 6px 6px;color:#333;z-index:1}
.white.active{background:#00e5ff}
.black{width:30px;height:110px;background:#222;border:1px solid #000;border-radius:0 0 4px 4px;color:#aaa;margin-left:-15px;margin-right:-15px;z-index:2;font-size:9px}
.black.active{background:#ff4081}
.note-display{font-size:2rem;color:#00e5ff;margin:20px 0;min-height:40px}
</style>

<h1>피아노 건반</h1>
<div class="note-display" id="noteDisp"></div>
<div class="piano" id="piano"></div>

<script>
const noteNames=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const whiteNotes=['C','D','E','F','G','A','B'];
const blackMap={'C':'C#','D':'D#','F':'F#','G':'G#','A':'A#'};
let audioCtx;
function getFreq(note,octave){const idx=noteNames.indexOf(note);return 440*Math.pow(2,(octave-4)+(idx-9)/12)}
function playNote(note,octave){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const freq=getFreq(note,octave);
const o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='sine';o.frequency.value=freq;
o.connect(g);g.connect(audioCtx.destination);
g.gain.value=0.3;
o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1.2);
o.stop(audioCtx.currentTime+1.2);
document.getElementById('noteDisp').textContent=note+octave;
}
const piano=document.getElementById('piano');
[4,5].forEach(oct=>{
whiteNotes.forEach(n=>{
const w=document.createElement('div');w.className='key white';w.textContent=n+oct;
w.onpointerdown=e=>{e.preventDefault();w.classList.add('active');playNote(n,oct)};
w.onpointerup=()=>w.classList.remove('active');
w.onpointerleave=()=>w.classList.remove('active');
piano.appendChild(w);
if(blackMap[n]){
const b=document.createElement('div');b.className='key black';b.textContent=blackMap[n]+oct;
b.onpointerdown=e=>{e.preventDefault();b.classList.add('active');playNote(blackMap[n],oct)};
b.onpointerup=()=>b.classList.remove('active');
b.onpointerleave=()=>b.classList.remove('active');
piano.appendChild(b);
}
});
});
</script>
