<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<title>음 주파수 표</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo',sans-serif;min-height:100vh;padding:70px 12px 30px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.5rem;margin-bottom:8px}
.sub{color:#aaa;font-size:.85rem;margin-bottom:16px}
.oct-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.oct-btns button{background:#1e1e3a;color:#ccc;border:2px solid #333;padding:8px 14px;border-radius:8px;font-size:.9rem;cursor:pointer;min-height:44px;min-width:44px;touch-action:manipulation}
.oct-btns button.sel{border-color:#00e5ff;color:#00e5ff}
table{border-collapse:collapse;width:100%;max-width:500px}
th{background:#1a1a2e;padding:10px 8px;font-size:.85rem;color:#00e5ff;border-bottom:2px solid #333}
td{padding:10px 8px;text-align:center;border-bottom:1px solid #222;font-size:.9rem}
tr:hover td{background:#1a1a2e}
.note-name{font-weight:bold;color:#00e5ff}
.sharp{color:#ff4081}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>

<h1>음 주파수 표</h1>
<p class="sub">A4 = 440 Hz 기준</p>
<div class="oct-btns" id="octBtns"></div>
<table>
<thead><tr><th>음이름</th><th>주파수 (Hz)</th><th>MIDI</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
const notes=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let selOct=-1;
const octBtns=document.getElementById('octBtns');
const tbody=document.getElementById('tbody');

function getFreq(note,oct){const idx=notes.indexOf(note);return 440*Math.pow(2,(oct-4)+(idx-9)/12)}
function getMidi(note,oct){return (oct+1)*12+notes.indexOf(note)}

for(let o=0;o<=8;o++){
const b=document.createElement('button');
b.textContent='옥타브 '+o;
b.onclick=()=>{selOct=o;document.querySelectorAll('.oct-btns button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');render()};
octBtns.appendChild(b);
}

function render(){
tbody.innerHTML='';
const octs=selOct===-1?[0,1,2,3,4,5,6,7,8]:[selOct];
octs.forEach(o=>{
notes.forEach(n=>{
const f=getFreq(n,o);
if(f<16||f>16000)return;
const tr=document.createElement('tr');
const isSharp=n.includes('#');
tr.innerHTML=`<td class="${isSharp?'sharp':'note-name'}">${n}${o}</td><td>${f.toFixed(2)}</td><td>${getMidi(n,o)}</td>`;
tbody.appendChild(tr);
});
});
}

document.querySelectorAll('.oct-btns button')[4].click();
</script>
</body>
</html>
