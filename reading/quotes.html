<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;padding:60px 12px 20px}
h1{text-align:center;font-size:1.4em;margin-bottom:14px}
.wrap{max-width:600px;margin:0 auto}
.filters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.filters button{background:#1a1a2e;color:#fff;border:1px solid #333;padding:8px 16px;border-radius:20px;font-size:13px;min-height:40px;cursor:pointer;touch-action:manipulation;font-family:inherit}
.filters button.active{background:#4fc3f7;color:#000;border-color:#4fc3f7}
.quote-card{background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:30px 24px;margin-bottom:16px;text-align:center;min-height:180px;display:flex;flex-direction:column;justify-content:center}
.quote-text{font-size:20px;line-height:1.6;margin-bottom:16px;font-style:italic;color:#e0e0e0}
.quote-text::before{content:'\201C';font-size:40px;color:#4fc3f7;display:block;margin-bottom:4px}
.quote-author{font-size:14px;color:#888}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.btn{background:#4fc3f7;color:#000;border:none;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:bold;min-height:44px;touch-action:manipulation;cursor:pointer;font-family:inherit}
.btn.secondary{background:#1a1a2e;color:#fff;border:1px solid #333}
.btn.fav{background:#e74c3c;color:#fff;border:none}
.fav-section{margin-top:20px}
.fav-section h2{font-size:1.1em;margin-bottom:10px;color:#aaa}
.fav-item{background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:14px;margin-bottom:8px;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.fav-item .remove{background:none;border:none;color:#e74c3c;font-size:18px;cursor:pointer;padding:4px 8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#4fc3f7;color:#000;padding:10px 24px;border-radius:8px;font-weight:bold;display:none;z-index:999}
</style>
</head>

const CATEGORIES=['전체','인생','사랑','성공','우정','행복'];
let currentCat='전체',currentIdx=0,favorites=JSON.parse(localStorage.getItem('quote_favs')||'[]');

function init(){
const f=document.getElementById('filters');
CATEGORIES.forEach(c=>{
const b=document.createElement('button');
b.textContent=c;b.className=c===currentCat?'active':'';
b.onclick=()=>{currentCat=c;document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');nextQuote()};
f.appendChild(b);
});
nextQuote();
renderFavs();
}

function getFiltered(){
if(currentCat==='전체') return QUOTES;
return QUOTES.filter(q=>q.c===currentCat);
}

function nextQuote(){
const list=getFiltered();
if(!list.length){document.getElementById('quoteText').textContent='이 카테고리에 명언이 없습니다.';document.getElementById('quoteAuthor').textContent='';return}
currentIdx=Math.floor(Math.random()*list.length);
const q=list[currentIdx];
document.getElementById('quoteText').textContent=q.t;
document.getElementById('quoteAuthor').textContent='- '+q.a+' ('+q.c+')';
}

function copyQuote(){
const t=document.getElementById('quoteText').textContent;
const a=document.getElementById('quoteAuthor').textContent;
navigator.clipboard.writeText(t+'\n'+a);
showToast('복사완료!');
}

function toggleFav(){
const t=document.getElementById('quoteText').textContent;
const a=document.getElementById('quoteAuthor').textContent;
const key=t;
const idx=favorites.findIndex(f=>f.t===key);
if(idx>=0){favorites.splice(idx,1);showToast('즐겨찾기 해제')}
else{favorites.push({t,a});showToast('즐겨찾기 추가!')}
localStorage.setItem('quote_favs',JSON.stringify(favorites));
renderFavs();
}

function renderFavs(){
const s=document.getElementById('favSection');
const l=document.getElementById('favList');
if(!favorites.length){s.style.display='none';return}
s.style.display='block';l.innerHTML='';
favorites.forEach((f,i)=>{
const d=document.createElement('div');d.className='fav-item';
d.innerHTML=`<span>${f.t} ${f.a}</span><button class="remove" onclick="removeFav(${i})">X</button>`;
l.appendChild(d);
});
}

function removeFav(i){
favorites.splice(i,1);
localStorage.setItem('quote_favs',JSON.stringify(favorites));
renderFavs();
}

function showToast(msg){
const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
setTimeout(()=>t.style.display='none',1500);
}

init();
