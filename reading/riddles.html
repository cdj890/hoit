<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://hoit.me/reading/riddles.html">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<title>수수께끼</title>
<meta name="description" content="재미있는 수수께끼 모음! 다양한 난이도의 수수께끼를 풀며 두뇌를 자극하세요.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;padding:60px 12px 20px}
h1{text-align:center;font-size:1.4em;margin-bottom:14px}
.wrap{max-width:500px;margin:0 auto}
.score-bar{display:flex;justify-content:center;gap:20px;margin-bottom:16px;font-size:14px;color:#aaa}
.score-bar span{background:#1a1a2e;padding:6px 16px;border-radius:20px}
.score-bar .correct{color:#2ecc71}
.score-bar .wrong{color:#e74c3c}
.card{background:#1a1a2e;border:1px solid #333;border-radius:16px;padding:28px 20px;text-align:center;margin-bottom:14px;min-height:200px;display:flex;flex-direction:column;justify-content:center}
.difficulty{font-size:12px;margin-bottom:10px}
.difficulty span{padding:4px 12px;border-radius:12px}
.diff-easy{background:#27ae60;color:#fff}
.diff-medium{background:#f39c12;color:#000}
.diff-hard{background:#e74c3c;color:#fff}
.question{font-size:20px;line-height:1.6;margin-bottom:20px}
.answer-area{min-height:60px}
.answer{font-size:18px;color:#4fc3f7;padding:16px;background:#0a0a15;border-radius:10px;display:none;margin-bottom:12px}
.btn{background:#4fc3f7;color:#000;border:none;padding:12px 20px;border-radius:10px;font-size:15px;font-weight:bold;min-height:44px;touch-action:manipulation;cursor:pointer;font-family:inherit;margin:4px}
.btn.secondary{background:#1a1a2e;color:#fff;border:1px solid #333}
.btn.correct-btn{background:#2ecc71}
.btn.wrong-btn{background:#e74c3c;color:#fff}
.btn-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:12px}
.progress{text-align:center;font-size:13px;color:#666;margin-bottom:10px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>

<div class="wrap">
<h1>수수께끼</h1>

<div class="score-bar">
<span class="correct" id="correctScore">맞춤: 0</span>
<span class="wrong" id="wrongScore">틀림: 0</span>
<span>총: <span id="totalScore">0</span>/50</span>
</div>

<div class="progress" id="progress"></div>

<div class="card">
<div class="difficulty" id="difficulty"></div>
<div class="question" id="question"></div>
<div class="answer-area">
<div class="answer" id="answer"></div>
</div>
</div>

<div class="btn-row" id="btnRow">
<button class="btn" id="revealBtn" onclick="reveal()">정답 보기</button>
</div>
<div class="btn-row" id="scoreRow" style="display:none">
<button class="btn correct-btn" onclick="markCorrect()">맞았어요!</button>
<button class="btn wrong-btn" onclick="markWrong()">틀렸어요</button>
</div>
<div class="btn-row">
<button class="btn secondary" onclick="nextRiddle()">다음 수수께끼</button>
<button class="btn secondary" onclick="resetScore()">점수 초기화</button>
</div>
</div>

<script>
const RIDDLES=[
{q:'다리가 4개인데 걸을 수 없는 것은?',a:'책상 (또는 의자)',d:1},
{q:'키는 큰데 몸무게가 없는 것은?',a:'그림자',d:1},
{q:'입은 있는데 말을 못하는 것은?',a:'병 (보틀)',d:1},
{q:'물속에서 살지만 젖지 않는 것은?',a:'물고기의 그림자',d:2},
{q:'나이를 먹을수록 키가 작아지는 것은?',a:'초',d:1},
{q:'거꾸로 해도 같은 말은?',a:'토마토',d:1},
{q:'항상 오지만 절대 도착하지 않는 것은?',a:'내일',d:2},
{q:'누구나 가지고 있지만 남에게 줄 수 없는 것은?',a:'그림자',d:1},
{q:'비가 오면 펴고 날이 개면 접는 것은?',a:'우산',d:1},
{q:'서면 앉고 앉으면 서는 것은?',a:'무릎',d:2},
{q:'시작은 있지만 끝이 없는 것은?',a:'원 (동그라미)',d:2},
{q:'올라갈 때는 타고 내려올 때는 걷는 것은?',a:'에스컬레이터',d:1},
{q:'낮에는 숨고 밤에만 나타나는 것은?',a:'별',d:1},
{q:'말을 하지 않아도 모든 걸 보여주는 것은?',a:'거울',d:1},
{q:'만들 때는 울고 사용할 때는 웃는 것은?',a:'양파 요리',d:2},
{q:'볼 수 있지만 만질 수 없는 것은?',a:'무지개',d:1},
{q:'앞에서 보면 뒤가 보이고 뒤에서 보면 앞이 보이는 것은?',a:'창문',d:2},
{q:'세상에서 가장 큰 코는?',a:'멕시코',d:2},
{q:'쓰면 쓸수록 길어지는 것은?',a:'연필 자국 (글)',d:2},
{q:'달면 삼키고 쓰면 뱉는 것은?',a:'감기약',d:1},
{q:'손은 있는데 발이 없는 것은?',a:'시계',d:2},
{q:'보면 볼수록 작아지는 것은?',a:'구멍',d:3},
{q:'없으면 없을수록 무거워지는 것은?',a:'한숨',d:3},
{q:'봄에 나서 가을에 죽는 것은?',a:'나뭇잎',d:1},
{q:'목이 있는데 머리가 없는 것은?',a:'병',d:1},
{q:'버리면 버릴수록 모이는 것은?',a:'쓰레기',d:2},
{q:'타도 타도 줄지 않는 것은?',a:'피아노',d:2},
{q:'밤에만 피는 꽃은?',a:'불꽃',d:2},
{q:'세상에서 가장 억울한 사람은?',a:'모나리자 (입을 닫고 있으니)',d:3},
{q:'세상에서 제일 슬픈 요리는?',a:'눈물겹게 (겹겹이 눈물)',d:3},
{q:'자동차 바퀴는 왜 둥글까?',a:'네모면 덜컹거리니까',d:2},
{q:'세상에서 가장 맛없는 집은?',a:'맛없는 음식점',d:3},
{q:'공을 던졌는데 스스로 돌아오게 하려면?',a:'위로 던지면 된다',d:2},
{q:'아무리 달려도 제자리인 것은?',a:'선풍기',d:1},
{q:'산은 산인데 올라갈 수 없는 산은?',a:'계산',d:2},
{q:'사람은 사람인데 가장 억울한 사람은?',a:'사진 속 사람',d:3},
{q:'오면 가고 가면 오는 것은?',a:'파도',d:2},
{q:'아무리 가도 길이 없는 곳은?',a:'바다',d:2},
{q:'세상에서 가장 차가운 바다는?',a:'썰렁한 바다',d:3},
{q:'바늘이 있는데 바느질 할 수 없는 것은?',a:'시계',d:2},
{q:'세상에서 가장 빠른 닭은?',a:'후라이드 치킨 (날아가니까)',d:3},
{q:'천사만 탈 수 있는 차는?',a:'천사이클 (삼륜차)',d:3},
{q:'구는 구인데 굴릴 수 없는 구는?',a:'연구',d:2},
{q:'집은 집인데 살 수 없는 집은?',a:'걱정',d:2},
{q:'꽃은 꽃인데 볼 수 없는 꽃은?',a:'불꽃',d:2},
{q:'물은 물인데 마실 수 없는 물은?',a:'눈물',d:1},
{q:'밥은 밥인데 먹을 수 없는 밥은?',a:'흙밥 (세례밥)',d:3},
{q:'비는 비인데 맞아도 안 젖는 비는?',a:'도둑의 알리비',d:3},
{q:'이상한 나라에서 가장 바쁜 사람은?',a:'이상한 일을 하는 사람',d:3},
{q:'세상에서 가장 가벼운 사람은?',a:'경솔한 사람',d:3}
];

let current=0,correct=0,wrong=0,used=[];
const shuffled=[...RIDDLES].sort(()=>Math.random()-0.5);

function loadScore(){
const s=JSON.parse(localStorage.getItem('riddle_score')||'{}');
correct=s.c||0;wrong=s.w||0;
updateScore();
}

function saveScore(){
localStorage.setItem('riddle_score',JSON.stringify({c:correct,w:wrong}));
}

function updateScore(){
document.getElementById('correctScore').textContent='맞춤: '+correct;
document.getElementById('wrongScore').textContent='틀림: '+wrong;
document.getElementById('totalScore').textContent=correct+wrong;
}

function showRiddle(){
if(current>=shuffled.length) current=0;
const r=shuffled[current];
document.getElementById('question').textContent=r.q;
document.getElementById('answer').textContent=r.a;
document.getElementById('answer').style.display='none';
document.getElementById('revealBtn').style.display='inline-block';
document.getElementById('scoreRow').style.display='none';
const diff=['','쉬움','보통','어려움'][r.d];
const cls=['','diff-easy','diff-medium','diff-hard'][r.d];
document.getElementById('difficulty').innerHTML=`<span class="${cls}">${diff}</span>`;
document.getElementById('progress').textContent=`${current+1} / ${shuffled.length}`;
}

function reveal(){
document.getElementById('answer').style.display='block';
document.getElementById('revealBtn').style.display='none';
document.getElementById('scoreRow').style.display='flex';
}

function markCorrect(){correct++;saveScore();updateScore();nextRiddle()}
function markWrong(){wrong++;saveScore();updateScore();nextRiddle()}

function nextRiddle(){
current++;
showRiddle();
}

function resetScore(){
correct=0;wrong=0;saveScore();updateScore();current=0;showRiddle();
}

loadScore();
showRiddle();
</script>
<div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body>
