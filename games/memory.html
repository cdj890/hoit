<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>기억력 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
#wrap{text-align:center}
h1{font-size:36px;margin-bottom:6px;color:#fd79a8}
.sub{font-size:14px;color:#aaa;margin-bottom:12px}
#info{font-size:15px;margin-bottom:10px;color:#dfe6e9;display:flex;justify-content:center;gap:20px}
#board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;background:rgba(255,255,255,0.04);border-radius:16px;width:340px;margin:0 auto}
.card{width:72px;height:72px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;transition:all .3s ease;perspective:400px}
.card-back{background:linear-gradient(135deg,#fd79a8,#e84393);box-shadow:0 2px 10px rgba(253,121,168,0.2)}
.card-back:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(253,121,168,0.35)}
.card-front{background:rgba(255,255,255,0.1)}
.card-matched{background:rgba(0,184,148,0.2);pointer-events:none}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#overlay h2{font-size:32px;margin-bottom:12px;color:#fd79a8}
#overlay p{font-size:16px;color:#dfe6e9;margin-bottom:6px}
.btn{display:inline-block;margin-top:16px;padding:12px 32px;background:#e84393;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold}
.btn:hover{background:#d63031}
#hi{font-size:13px;color:#636e72;margin-top:8px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<script>function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));if(h.nick){const lb=JSON.parse(localStorage.getItem('game_leaderboard')||'{}');if(!lb[id])lb[id]=[];const e=lb[id].find(x=>x.nick===h.nick);if(e){if(s>e.score){e.score=s;e.date=new Date().toLocaleDateString('ko');}}else lb[id].push({nick:h.nick,score:s,date:new Date().toLocaleDateString('ko')});lb[id].sort((a,b)=>b.score-a.score);lb[id]=lb[id].slice(0,20);localStorage.setItem('game_leaderboard',JSON.stringify(lb));}}</script>

<div id="wrap">
<div id="overlay">
<h2>🃏 기억력 게임</h2>
<p>같은 그림의 카드 쌍을 찾으세요!</p>
<p style="font-size:13px;color:#b2bec3">카드를 클릭해서 뒤집기</p>
<button class="btn" onclick="startGame()">게임 시작</button>
</div>
<h1>🃏 기억력 게임</h1>
<div class="sub">카드를 뒤집어 같은 쌍을 찾으세요!</div>
<div id="info"><span>이동: <span id="moves">0</span></span><span>쌍: <span id="pairs">0</span>/8</span><span>⏱ <span id="timer">0</span>초</span></div>
<div id="board"></div>
<div id="hi"></div>
</div>

<script>
const EMOJIS=['🐱','🐶','🐰','🦊','🐻','🐼','🐸','🦄'];
let cards,flipped,matched,moves,pairsFound,seconds,timerID,locked;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function startGame(){
 document.getElementById('overlay').style.display='none';
 let deck=shuffle([...EMOJIS,...EMOJIS]);
 cards=deck;flipped=[];matched=new Set();moves=0;pairsFound=0;seconds=0;locked=false;
 clearInterval(timerID);
 timerID=setInterval(()=>{seconds++;document.getElementById('timer').textContent=seconds;},1000);
 document.getElementById('moves').textContent='0';
 document.getElementById('pairs').textContent='0';
 document.getElementById('timer').textContent='0';
 render();
}

function render(){
 const b=document.getElementById('board');b.innerHTML='';
 cards.forEach((emoji,i)=>{
  let d=document.createElement('div');
  d.className='card';
  if(matched.has(i)){
   d.className+=' card-matched';d.textContent=emoji;
  }else if(flipped.includes(i)){
   d.className+=' card-front';d.textContent=emoji;
  }else{
   d.className+=' card-back';d.innerHTML='<span style="font-size:20px">?</span>';
  }
  d.addEventListener('click',()=>flipCard(i));
  b.appendChild(d);
 });
}

function flipCard(i){
 if(locked||flipped.includes(i)||matched.has(i))return;
 flipped.push(i);render();
 if(flipped.length===2){
  moves++;document.getElementById('moves').textContent=moves;
  locked=true;
  let[a,b]=flipped;
  if(cards[a]===cards[b]){
   matched.add(a);matched.add(b);pairsFound++;
   document.getElementById('pairs').textContent=pairsFound;
   flipped=[];locked=false;render();
   if(pairsFound===8)gameWon();
  }else{
   setTimeout(()=>{flipped=[];locked=false;render();},700);
  }
 }
}

function gameWon(){
 clearInterval(timerID);
 let score=Math.max(0,8*1000-moves*10-seconds*5);
 let hi=parseInt(localStorage.getItem('memory_hi')||'0');
 if(score>hi){hi=score;localStorage.setItem('memory_hi',hi);}
 document.getElementById('hi').textContent='최고 점수: '+hi;
 _hub('memory',score);
 setTimeout(()=>{
  let ov=document.getElementById('overlay');ov.style.display='flex';
  ov.innerHTML=`<h2>🎉 완벽해요!</h2><p>이동: ${moves}회 | 시간: ${seconds}초</p><p style="font-size:20px;color:#ffeaa7;margin:4px 0">점수: ${score}</p><p style="font-size:13px;color:#b2bec3">최고 점수: ${hi}</p><button class="btn" onclick="startGame()">다시 하기</button>`;
 },500);
}
</script>
</body>
</html>
