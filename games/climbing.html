<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='undefined')r=0;if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;};}
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth,500);
const H=window.innerHeight;
canvas.width=W;canvas.height=H;

let player,ledges,camera,bestHeight,maxHeight,gameRunning,grabTarget,swinging;
let pointerDown=false,pointerX=0,pointerY=0;
let particles=[];
let floatingMsgs=[],bestHeightLine=0,lastMilestone=0;
let selectedSkin='default';
let obstacles=[],savePoints=[],stars=[],collectedStars=0;
let allTimeBest=parseInt(localStorage.getItem('climbing_best')||'0');
let milestoneShown={};

const SKINS={
  default:{name:'🧗',color:'#ff6b4a',gravity:0.4,swingSpeed:0.04,launchPower:10,grabRange:70,face:'😊'},
  cat:{name:'🐱',color:'#f0a050',gravity:0.38,swingSpeed:0.05,launchPower:10,grabRange:80,face:'😺'},
  frog:{name:'🐸',color:'#50c050',gravity:0.4,swingSpeed:0.04,launchPower:13,grabRange:70,face:'🐸'},
  robot:{name:'🤖',color:'#8090b0',gravity:0.5,swingSpeed:0.03,launchPower:9,grabRange:75,face:'🤖'},
  hero:{name:'🦸',color:'#e040e0',gravity:0.35,swingSpeed:0.055,launchPower:11,grabRange:65,face:'🦸'}
};

function selectSkin(s,el){selectedSkin=s;document.querySelectorAll('.skin-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');}

let GRAVITY=0.4;
let GRAB_RANGE=70;
let SWING_SPEED=0.04;
let LAUNCH_POWER=10;

function genLedges(){
  ledges=[];obstacles=[];savePoints=[];stars=[];
  // Ground
  ledges.push({x:W/2,y:0,w:W,h:20,type:'ground'});
  // Generate ledges going up
  let y=80;
  const ledgeColors=['#8b6aa8','#6a8bb8','#b86a7a','#6ab88a','#b8a86a'];
  for(let i=0;i<300;i++){
    let x=40+Math.random()*(W-80);
    let w=35+Math.random()*70;
    if(i%3===0) x=30+Math.random()*(W/2-40);
    else if(i%3===1) x=W/2+Math.random()*(W/2-40);
    let lType='ledge';
    // Ice platforms (slippery) - start appearing after some height
    if(i>10&&Math.random()<0.15) lType='ice';
    // Moving platforms
    if(i>15&&Math.random()<0.1) lType='moving';
    ledges.push({x,y,w,h:10+Math.random()*6,type:lType,color:lType==='ice'?'#8de8f0':ledgeColors[i%ledgeColors.length],origX:x,moveDir:1,moveRange:40+Math.random()*30});
    // Collectible stars near some ledges
    if(Math.random()<0.3){
      stars.push({x:x+(Math.random()-0.5)*40,y:y+30+Math.random()*20,collected:false,bob:Math.random()*Math.PI*2});
    }
    y+=55+Math.random()*40;
  }
  // Save points every 50m (y=500 world units)
  for(let sy=500;sy<30000;sy+=500){
    savePoints.push({y:sy,x:W/2,active:false});
  }
  // Obstacles
  for(let oi=0;oi<80;oi++){
    let oy=300+oi*350+Math.random()*100;
    let otype=['rock','wind','rock','wind'][oi%4];
    if(otype==='rock'){
      obstacles.push({type:'rock',x:30+Math.random()*(W-60),y:oy,vy:-1-Math.random()*2,r:8+Math.random()*6,respawnY:oy,active:true});
    } else {
      let dir=Math.random()<0.5?-1:1;
      obstacles.push({type:'wind',x:W/2,y:oy,w:W*0.6,h:40,dir:dir,strength:1.5+Math.random(),active:true});
    }
  }
}

function initPlayer(){
  const sk=SKINS[selectedSkin];
  player={x:W/2,y:30,vx:0,vy:0,r:16,grabbed:false,angle:0,ropeLen:0,anchorX:0,anchorY:0,skin:selectedSkin,lastSaveY:0};
  GRAVITY=sk.gravity;GRAB_RANGE=sk.grabRange;SWING_SPEED=sk.swingSpeed;LAUNCH_POWER=sk.launchPower;
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOver').style.display='none';
  document.getElementById('hud').style.display='block';
  genLedges();
  initPlayer();
  camera=0;
  bestHeight=0;
  maxHeight=0;
  collectedStars=0;
  grabTarget=null;
  swinging=false;
  gameRunning=true;
  particles=[];
  floatingMsgs=[];lastMilestone=0;milestoneShown={};
  document.getElementById('starCount').textContent='⭐ 0';
  loop();
}

function worldToScreen(wx,wy){
  return{x:wx,y:H-wy+camera};
}

function screenToWorld(sx,sy){
  return{x:sx,y:H-sy+camera};
}

function findNearestLedge(wx,wy){
  let best=null,bestD=Infinity;
  for(let l of ledges){
    if(l.type==='ground') continue;
    let dx=wx-(l.x);
    let dy=wy-(l.y);
    let d=Math.sqrt(dx*dx+dy*dy);
    if(d<GRAB_RANGE && d<bestD && l.y>wy-10){
      best=l;bestD=d;
    }
  }
  return best;
}

function addParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*4,vy:Math.random()*3+1,life:30+Math.random()*20,color,r:2+Math.random()*2});
  }
}

function update(){
  if(!gameRunning) return;

  if(swinging && grabTarget){
    player.angle+=SWING_SPEED*(pointerX<W/2?-1:1);
    // Update moving platform position
    if(grabTarget.type==='moving'){
      grabTarget.x+=grabTarget.moveDir*0.5;
      if(Math.abs(grabTarget.x-grabTarget.origX)>grabTarget.moveRange) grabTarget.moveDir*=-1;
    }
    let tx=grabTarget.x+Math.cos(player.angle)*player.ropeLen;
    let ty=grabTarget.y+Math.sin(player.angle)*player.ropeLen;
    player.x=tx;
    player.y=ty;

    if(!pointerDown){
      let launchAngle=player.angle+Math.PI/2*(pointerX<W/2?-1:1);
      player.vx=Math.cos(launchAngle)*LAUNCH_POWER*0.7;
      player.vy=Math.abs(Math.sin(launchAngle)*LAUNCH_POWER)+3;
      swinging=false;
      grabTarget=null;
      addParticles(player.x,player.y,SKINS[selectedSkin].color,5);
    }
  } else {
    player.vy-=GRAVITY;
    player.x+=player.vx;
    player.y+=player.vy;
    player.vx*=0.99;

    // Wall bounds
    if(player.x<player.r){player.x=player.r;player.vx=Math.abs(player.vx)*0.5;}
    if(player.x>W-player.r){player.x=W-player.r;player.vx=-Math.abs(player.vx)*0.5;}

    // Ledge collision
    for(let l of ledges){
      // Update moving platforms
      if(l.type==='moving'){
        l.x+=l.moveDir*0.5;
        if(Math.abs(l.x-l.origX)>l.moveRange) l.moveDir*=-1;
      }
      let lLeft=l.x-l.w/2;
      let lRight=l.x+l.w/2;
      let lTop=l.y+l.h/2;
      let lBot=l.y-l.h/2;

      if(player.x+player.r>lLeft && player.x-player.r<lRight){
        if(player.y-player.r<lTop && player.y-player.r>lBot-10 && player.vy<0){
          player.y=lTop+player.r;
          player.vy=0;
          // Ice platforms: slippery (less friction)
          if(l.type==='ice'){
            player.vx*=0.98;
            if(Math.abs(player.vx)<0.5) player.vx+=(Math.random()-0.5)*1.5;
          } else {
            player.vx*=0.8;
            if(Math.abs(player.vx)<0.1) player.vx=0;
          }
        }
      }
    }

    // Ground or save point respawn
    if(player.y<player.r){
      if(player.lastSaveY>0){
        // Respawn at last save point
        player.x=W/2;player.y=player.lastSaveY+20;player.vx=0;player.vy=0;
        floatingMsgs.push({y:player.y+20,text:'💫 세이브 포인트!',life:60});
        addParticles(player.x,player.y,'#4af',8);
      } else {
        player.y=player.r;player.vy=0;player.vx*=0.8;
      }
    }

    // Try grab on pointer down
    if(pointerDown && !swinging){
      let wp=screenToWorld(pointerX,pointerY);
      let ledge=findNearestLedge(wp.x,wp.y);
      if(!ledge){
        ledge=findNearestLedge(player.x,player.y+GRAB_RANGE*0.7);
      }
      if(ledge){
        grabTarget=ledge;
        swinging=true;
        let dx=player.x-ledge.x;
        let dy=player.y-ledge.y;
        player.ropeLen=Math.sqrt(dx*dx+dy*dy);
        if(player.ropeLen<20) player.ropeLen=20;
        if(player.ropeLen>60) player.ropeLen=60;
        player.angle=Math.atan2(dy,dx);
        addParticles(ledge.x,ledge.y,'#4af',3);
      }
    }
  }

  // Obstacles
  for(let ob of obstacles){
    if(!ob.active)continue;
    let screenDist=Math.abs(ob.respawnY-player.y);
    if(screenDist>H*2)continue; // skip far obstacles
    if(ob.type==='rock'){
      ob.y+=ob.vy;
      // Reset rock if it falls too far below
      if(ob.y<ob.respawnY-400) ob.y=ob.respawnY+200;
      // Collision with player
      if(Math.hypot(player.x-ob.x,player.y-ob.y)<player.r+ob.r){
        player.vy=-3;player.vx+=(player.x>ob.x?2:-2);
        addParticles(player.x,player.y,'#f44',5);
        floatingMsgs.push({y:player.y+15,text:'💥',life:25});
      }
    } else if(ob.type==='wind'){
      // Push player sideways if in range
      if(player.y>ob.y-ob.h/2&&player.y<ob.y+ob.h/2&&player.x>ob.x-ob.w/2&&player.x<ob.x+ob.w/2){
        player.vx+=ob.dir*ob.strength*0.1;
      }
    }
  }

  // Save points
  for(let sp of savePoints){
    if(sp.active)continue;
    if(Math.abs(player.y-sp.y)<30){
      sp.active=true;
      player.lastSaveY=sp.y;
      addParticles(sp.x,sp.y,'#ffd700',10);
      floatingMsgs.push({y:sp.y+20,text:'⭐ 세이브!',life:60});
    }
  }

  // Collectible stars
  for(let st of stars){
    if(st.collected)continue;
    st.bob+=0.05;
    if(Math.hypot(player.x-st.x,player.y-st.y)<25){
      st.collected=true;
      collectedStars++;
      addParticles(st.x,st.y,'#ffd700',8);
      document.getElementById('starCount').textContent='⭐ '+collectedStars;
    }
  }

  // Height tracking
  let height=Math.floor(player.y/10);
  if(height>maxHeight) maxHeight=height;
  if(height>bestHeight) bestHeight=height;

  // Milestone messages with specific texts
  const milestones={50:'워밍업!',100:'반쯤 왔어!',200:'대단해!',500:'전설!'};
  for(let m in milestones){
    let mv=parseInt(m);
    if(height>=mv&&!milestoneShown[mv]){
      milestoneShown[mv]=true;
      let popup=document.getElementById('milestonePopup');
      popup.textContent=mv+'m - '+milestones[mv];
      popup.style.opacity='1';
      setTimeout(()=>{popup.style.opacity='0';},2500);
      addParticles(player.x,player.y,'#ffd700',15);
    }
  }

  // Generic milestones beyond defined ones
  const genMilestone=Math.floor(height/50)*50;
  if(genMilestone>500&&genMilestone>lastMilestone){
    lastMilestone=genMilestone;
    floatingMsgs.push({y:player.y,text:genMilestone+'m! 미쳤다!',life:80});
    addParticles(player.x,player.y,'#ffd700',10);
  }
  if(genMilestone<=500&&genMilestone>lastMilestone) lastMilestone=genMilestone;

  // Camera follows player
  let targetCam=player.y-H*0.4;
  if(targetCam<0) targetCam=0;
  camera+=(targetCam-camera)*0.1;

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy-=0.1;p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  // Floating messages
  floatingMsgs=floatingMsgs.filter(m=>{m.life--;return m.life>0;});
  // Falling scream
  if(player.vy<-8&&!player._screaming){
    player._screaming=true;
    floatingMsgs.push({y:player.y+30,text:'아아아!',life:40,isScream:true});
  }
  if(player.vy>-3) player._screaming=false;

  document.getElementById('heightVal').textContent=Math.floor(player.y/10)+'m';
  document.getElementById('bestVal').textContent=maxHeight+'m';
}

function draw(){
  ctx.fillStyle='#0f0f1e';
  ctx.fillRect(0,0,W,H);

  // Stars background
  for(let i=0;i<50;i++){
    let sy=(i*137.5)%H;
    let sx=(i*97.3)%W;
    let starY=sy+camera*0.1*(i%3+1)*0.3;
    starY=((starY%H)+H)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.3+((i*31)%5)*0.1})`;
    ctx.fillRect(sx,starY,2,2);
  }

  // Cliff walls
  let gradient=ctx.createLinearGradient(0,0,W,0);
  gradient.addColorStop(0,'#2a1a3a');
  gradient.addColorStop(0.05,'#1a1028');
  gradient.addColorStop(0.95,'#1a1028');
  gradient.addColorStop(1,'#2a1a3a');
  ctx.fillStyle=gradient;
  ctx.fillRect(0,0,12,H);
  ctx.fillRect(W-12,0,12,H);

  // Ledges
  for(let l of ledges){
    let s=worldToScreen(l.x,l.y);
    if(s.y<-20||s.y>H+20) continue;
    if(l.type==='ground'){
      ctx.fillStyle='#3a2a4a';
      ctx.fillRect(0,s.y-l.h/2,W,l.h+200);
    } else {
      let baseColor=l.color||'#8b6aa8';
      if(l.type==='moving') baseColor='#b8a0d8';
      let grd=ctx.createLinearGradient(s.x-l.w/2,s.y-l.h/2,s.x-l.w/2,s.y+l.h/2);
      grd.addColorStop(0,baseColor);
      grd.addColorStop(1,l.type==='ice'?'#4a8a9a':'#3a2a4a');
      ctx.fillStyle=grd;
      ctx.beginPath();
      ctx.roundRect(s.x-l.w/2,s.y-l.h/2,l.w,l.h,4);
      ctx.fill();
      // Highlight
      ctx.fillStyle=l.type==='ice'?'rgba(200,240,255,0.3)':'rgba(255,255,255,0.15)';
      ctx.fillRect(s.x-l.w/2+2,s.y-l.h/2,l.w-4,3);
      // Moving platform indicator
      if(l.type==='moving'){
        ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px sans-serif';ctx.textAlign='center';
        ctx.fillText('↔',s.x,s.y+3);
      }
      if(grabTarget===l){
        ctx.shadowColor=SKINS[selectedSkin].color;ctx.shadowBlur=15;
        ctx.strokeStyle=SKINS[selectedSkin].color;
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.roundRect(s.x-l.w/2-2,s.y-l.h/2-2,l.w+4,l.h+4,6);
        ctx.stroke();
        ctx.shadowBlur=0;
      }
    }
  }

  // Save points
  for(let sp of savePoints){
    let ss=worldToScreen(sp.x,sp.y);
    if(ss.y<-20||ss.y>H+40) continue;
    ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText(sp.active?'✅':'⭐',ss.x,ss.y);
    if(!sp.active){
      ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(15,ss.y);ctx.lineTo(W-15,ss.y);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,215,0,0.4)';ctx.font='9px sans-serif';
      ctx.fillText(Math.floor(sp.y/10)+'m',W-35,ss.y+3);
    }
  }

  // Collectible stars
  for(let st of stars){
    if(st.collected)continue;
    let ss=worldToScreen(st.x,st.y);
    if(ss.y<-20||ss.y>H+20)continue;
    ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('⭐',ss.x,ss.y+Math.sin(st.bob)*4);
  }

  // Obstacles
  for(let ob of obstacles){
    if(!ob.active)continue;
    if(ob.type==='rock'){
      let os=worldToScreen(ob.x,ob.y);
      if(os.y<-30||os.y>H+30)continue;
      ctx.fillStyle='#8a6a5a';
      ctx.beginPath();ctx.arc(os.x,os.y,ob.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6a4a3a';
      ctx.beginPath();ctx.arc(os.x-2,os.y-2,ob.r*0.6,0,Math.PI*2);ctx.fill();
    } else if(ob.type==='wind'){
      let os=worldToScreen(ob.x,ob.y);
      if(os.y<-50||os.y>H+50)continue;
      ctx.globalAlpha=0.15;
      ctx.fillStyle=ob.dir>0?'#4af':'#fa4';
      ctx.fillRect(os.x-ob.w/2,os.y-ob.h/2,ob.w,ob.h);
      ctx.globalAlpha=0.5;
      ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillStyle='#fff';
      ctx.fillText(ob.dir>0?'💨→':'←💨',os.x,os.y+4);
      ctx.globalAlpha=1;
    }
  }

  // Rope
  if(swinging&&grabTarget){
    let ps=worldToScreen(player.x,player.y);
    let as2=worldToScreen(grabTarget.x,grabTarget.y);
    ctx.strokeStyle='rgba(255,180,100,0.7)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(ps.x,ps.y);
    ctx.lineTo(as2.x,as2.y);
    ctx.stroke();
  }

  // Player
  let ps=worldToScreen(player.x,player.y);
  const sk=SKINS[selectedSkin];
  // Body
  ctx.fillStyle=sk.color;
  ctx.beginPath();
  ctx.arc(ps.x,ps.y,player.r,0,Math.PI*2);
  ctx.fill();
  // Skin-specific details
  if(selectedSkin==='cat'){
    // Ears
    ctx.fillStyle=sk.color;
    ctx.beginPath();ctx.moveTo(ps.x-10,ps.y-12);ctx.lineTo(ps.x-6,ps.y-20);ctx.lineTo(ps.x-2,ps.y-12);ctx.fill();
    ctx.beginPath();ctx.moveTo(ps.x+2,ps.y-12);ctx.lineTo(ps.x+6,ps.y-20);ctx.lineTo(ps.x+10,ps.y-12);ctx.fill();
  } else if(selectedSkin==='robot'){
    ctx.strokeStyle='#a0b0c0';ctx.lineWidth=2;
    ctx.strokeRect(ps.x-10,ps.y-12,20,6);
    ctx.fillStyle='#60f060';ctx.fillRect(ps.x-4,ps.y-10,8,2);
  } else if(selectedSkin==='hero'){
    // Cape
    ctx.fillStyle='rgba(200,40,200,0.5)';
    ctx.beginPath();ctx.moveTo(ps.x-6,ps.y);ctx.lineTo(ps.x,ps.y+22);ctx.lineTo(ps.x+6,ps.y);ctx.fill();
  }
  // Face
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.arc(ps.x-5,ps.y-3,3,0,Math.PI*2);
  ctx.arc(ps.x+5,ps.y-3,3,0,Math.PI*2);
  ctx.fill();
  // Eyes pupils
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(ps.x-5,ps.y-3,1.5,0,Math.PI*2);ctx.arc(ps.x+5,ps.y-3,1.5,0,Math.PI*2);ctx.fill();
  // Mouth
  ctx.fillStyle=selectedSkin==='frog'?'#2a8a2a':'#c0392b';
  ctx.beginPath();
  if(swinging){
    ctx.arc(ps.x,ps.y+5,4,0,Math.PI);
  } else if(player.vy<-3){
    ctx.ellipse(ps.x,ps.y+5,4,5,0,0,Math.PI*2);
  } else {
    ctx.arc(ps.x,ps.y+4,3,0.1*Math.PI,0.9*Math.PI);
  }
  ctx.fill();

  // Glow
  ctx.shadowColor=sk.color;
  ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.arc(ps.x,ps.y,player.r-2,0,Math.PI*2);
  ctx.fillStyle=sk.color.replace(')',',0.15)').replace('rgb','rgba');
  ctx.globalAlpha=0.15;ctx.fillStyle=sk.color;
  ctx.fill();
  ctx.globalAlpha=1;
  ctx.shadowBlur=0;

  // Particles
  for(let p of particles){
    let pp=worldToScreen(p.x,p.y);
    ctx.globalAlpha=p.life/50;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(pp.x,pp.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // All-time best ghost line
  if(allTimeBest>10){
    let abls=worldToScreen(W/2,allTimeBest*10);
    if(abls.y>0&&abls.y<H){
      ctx.strokeStyle='rgba(255,100,100,0.3)';ctx.lineWidth=1;ctx.setLineDash([8,4]);
      ctx.beginPath();ctx.moveTo(15,abls.y);ctx.lineTo(W-15,abls.y);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,100,100,0.4)';ctx.font='10px sans-serif';ctx.textAlign='left';
      ctx.fillText('🏆 RECORD '+allTimeBest+'m',15,abls.y-3);
    }
  }
  // Current session best height line
  if(maxHeight>10){
    let bls=worldToScreen(W/2,maxHeight*10);
    if(bls.y>0&&bls.y<H){
      ctx.strokeStyle='rgba(255,215,0,0.4)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(15,bls.y);ctx.lineTo(W-15,bls.y);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,215,0,0.5)';ctx.font='10px sans-serif';ctx.textAlign='left';
      ctx.fillText('BEST '+maxHeight+'m',15,bls.y-3);
    }
  }
  // Floating messages
  for(let m of floatingMsgs){
    let ms=worldToScreen(W/2,m.y);
    if(ms.y>0&&ms.y<H){
      ctx.globalAlpha=Math.min(1,m.life/20);
      ctx.fillStyle=m.isScream?'#ff4444':'#ffd700';
      ctx.font=m.isScream?'bold 20px sans-serif':'bold 16px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(m.text,W/2,ms.y);
      ctx.globalAlpha=1;
    }
  }
  // Height markers
  for(let h=100;h<20000;h+=100){
    let s=worldToScreen(W/2,h*10);
    if(s.y>0&&s.y<H){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.font='11px sans-serif';
      ctx.fillText(h+'m',W-45,s.y+4);
      ctx.strokeStyle='rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.moveTo(20,s.y);ctx.lineTo(W-50,s.y);
      ctx.stroke();
    }
  }
}

function loop(){
  if(!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
function getPos(e){
  let rect=canvas.getBoundingClientRect();
  let t=e.touches?e.touches[0]:e;
  return{x:t.clientX-rect.left,y:t.clientY-rect.top};
}

canvas.addEventListener('mousedown',e=>{pointerDown=true;let p=getPos(e);pointerX=p.x;pointerY=p.y;});
canvas.addEventListener('mousemove',e=>{let p=getPos(e);pointerX=p.x;pointerY=p.y;});
canvas.addEventListener('mouseup',()=>{pointerDown=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();pointerDown=true;let p=getPos(e);pointerX=p.x;pointerY=p.y;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();let p=getPos(e);pointerX=p.x;pointerY=p.y;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();pointerDown=false;},{passive:false});

// End game button (timeout based)
let inactiveTimer;
function resetInactive(){
  clearTimeout(inactiveTimer);
  inactiveTimer=setTimeout(()=>{
    if(gameRunning && player.y<30 && Math.abs(player.vx)<0.5 && Math.abs(player.vy)<0.5){
      endGame();
    }
  },8000);
}

function endGame(){
  gameRunning=false;
  if(maxHeight>allTimeBest){allTimeBest=maxHeight;localStorage.setItem('climbing_best',String(allTimeBest));}
  _hub('climbing',maxHeight);
  document.getElementById('finalScore').textContent='도달 높이: '+maxHeight+'m (⭐'+collectedStars+'개)';
  document.getElementById('bestScore').textContent='역대 최고: '+allTimeBest+'m';
  document.getElementById('gameOver').style.display='flex';
  document.getElementById('hud').style.display='none';
}

window.addEventListener('resize',()=>{
  let nw=Math.min(window.innerWidth,500);
  canvas.width=nw;
  canvas.height=window.innerHeight;
});
</script>
