<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
#wrap{text-align:center;position:relative}
h1{font-size:48px;margin-bottom:8px;color:#f8c291}
.sub{font-size:14px;color:#aaa;margin-bottom:16px}
#score-bar{font-size:20px;margin-bottom:12px;color:#ffeaa7}
#board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;background:rgba(255,255,255,0.06);border-radius:16px;width:340px;margin:0 auto}
.cell{width:74px;height:74px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;transition:all .12s ease;position:relative}
.cell-empty{background:rgba(255,255,255,0.04)}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.92);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
#overlay h2{font-size:32px;margin-bottom:12px;color:#fab1a0}
#overlay p{font-size:16px;color:#dfe6e9;margin-bottom:6px}
.btn{display:inline-block;margin-top:16px;padding:12px 32px;background:#e17055;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold}
.btn:hover{background:#d63031}
#hi{font-size:13px;color:#636e72;margin-top:8px}
canvas{max-width:100%!important;height:auto!important;display:block;margin:0 auto}body{overflow-x:hidden}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

<div id="wrap">
<div id="overlay">
<h2>2048</h2>
<p>타일을 밀어서 같은 숫자를 합치세요!</p>
<p style="font-size:13px;color:#b2bec3">방향키 또는 스와이프로 이동</p>
<button class="btn" onclick="startGame()">게임 시작</button>
</div>
<h1>2048</h1>
<div class="sub">같은 숫자를 합쳐서 2048을 만드세요!</div>
<div id="score-bar">점수: <span id="sc">0</span></div>
<div id="board"></div>
<div id="hi"></div>
</div>

<script>
const COLORS={
 0:'rgba(255,255,255,0.04)',
 2:'#ffeaa7',4:'#fdcb6e',8:'#f8a05c',16:'#e17055',
 32:'#d63031',64:'#e84393',128:'#6c5ce7',256:'#0984e3',
 512:'#00b894',1024:'#00cec9',2048:'#fd79a8',4096:'#a29bfe',8192:'#55efc4'
};
const FACES=['😊','😄','😆','😁','🤩','😎','🥳','😍','🤗','💖','⭐','🌟','✨'];
let grid,score,gameOver,moved;

function startGame(){
 grid=Array(4).fill(null).map(()=>Array(4).fill(0));
 score=0;gameOver=false;
 document.getElementById('overlay').style.display='none';
 addTile();addTile();render();
}

function addTile(){
 let empty=[];
 for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push([r,c]);
 if(empty.length===0)return;
 let[r,c]=empty[Math.floor(Math.random()*empty.length)];
 grid[r][c]=Math.random()<0.9?2:4;
}

function faceFor(v){
 if(v===0)return'';
 let i=Math.log2(v)-1;
 return FACES[Math.min(i,FACES.length-1)];
}

function render(){
 const b=document.getElementById('board');
 b.innerHTML='';
 for(let r=0;r<4;r++)for(let c=0;c<4;c++){
  let v=grid[r][c];
  let d=document.createElement('div');
  d.className='cell'+(v===0?' cell-empty':'');
  d.style.background=COLORS[v]||'#a29bfe';
  d.style.color=v<=4?'#2d3436':'#fff';
  d.style.fontSize=v>=1024?'16px':v>=128?'18px':'22px';
  if(v>0){
   d.innerHTML=`<div style="text-align:center"><div style="font-size:12px;line-height:1">${faceFor(v)}</div><div>${v}</div></div>`;
  }
  b.appendChild(d);
 }
 document.getElementById('sc').textContent=score;
 let hi=parseInt(localStorage.getItem('hi_2048')||'0');
 if(score>hi){hi=score;localStorage.setItem('hi_2048',hi);}
 document.getElementById('hi').textContent='최고 점수: '+hi;
}

function slide(row){
 let a=row.filter(x=>x!==0);
 let merged=[];
 for(let i=0;i<a.length;i++){
  if(i+1<a.length&&a[i]===a[i+1]){
   let val=a[i]*2;merged.push(val);score+=val;i++;
  }else merged.push(a[i]);
 }
 while(merged.length<4)merged.push(0);
 return merged;
}

function move(dir){
 if(gameOver)return;
 let prev=JSON.stringify(grid);
 if(dir==='left'){
  for(let r=0;r<4;r++)grid[r]=slide(grid[r]);
 }else if(dir==='right'){
  for(let r=0;r<4;r++)grid[r]=slide(grid[r].reverse()).reverse();
 }else if(dir==='up'){
  for(let c=0;c<4;c++){
   let col=[grid[0][c],grid[1][c],grid[2][c],grid[3][c]];
   col=slide(col);
   for(let r=0;r<4;r++)grid[r][c]=col[r];
  }
 }else if(dir==='down'){
  for(let c=0;c<4;c++){
   let col=[grid[3][c],grid[2][c],grid[1][c],grid[0][c]];
   col=slide(col);
   for(let r=0;r<4;r++)grid[3-r][c]=col[r];
  }
 }
 if(JSON.stringify(grid)!==prev){
  addTile();render();
  if(checkGameOver()){endGame();}
 }
}

function checkGameOver(){
 for(let r=0;r<4;r++)for(let c=0;c<4;c++){
  if(grid[r][c]===0)return false;
  if(c+1<4&&grid[r][c]===grid[r][c+1])return false;
  if(r+1<4&&grid[r][c]===grid[r+1][c])return false;
 }
 return true;
}

function endGame(){
 gameOver=true;
 _hub('puzzle2048',score);
 let ov=document.getElementById('overlay');
 ov.style.display='flex';
 ov.innerHTML=`<h2>게임 오버! 😢</h2><p>점수: ${score}</p><button class="btn" onclick="startGame()">다시 하기</button>`;
}

document.addEventListener('keydown',e=>{
 if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
 if(e.key==='ArrowLeft')move('left');
 else if(e.key==='ArrowRight')move('right');
 else if(e.key==='ArrowUp')move('up');
 else if(e.key==='ArrowDown')move('down');
});

let tx,ty;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',e=>{if(!gameOver)e.preventDefault();},{passive:false});
document.addEventListener('touchend',e=>{
 let dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
 if(Math.abs(dx)<30&&Math.abs(dy)<30)return;
 if(Math.abs(dx)>Math.abs(dy)){move(dx>0?'right':'left');}
 else{move(dy>0?'down':'up');}
});
</script>
</body>
</html>
