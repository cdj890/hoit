<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>탭 스피드</title>
<meta name="description" content="hoit.me - 탭 스피드 | 무료 웹 게임. 설치 없이 브라우저에서 바로 즐기세요!">
<meta property="og:title" content="탭 스피드 - hoit">
<meta property="og:description" content="hoit.me - 탭 스피드 | 무료 웹 게임. 설치 없이 브라우저에서 바로 즐기세요!">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hoit.me/games/tap_speed.html">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;touch-action:manipulation}
.area{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;user-select:none}
.circle{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;font-weight:bold;cursor:pointer;transition:transform .05s;-webkit-tap-highlight-color:transparent}
.circle:active{transform:scale(0.92)}
@keyframes rippleOut{0%{width:200px;height:200px;opacity:1}100%{width:350px;height:350px;opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.info{font-size:18px;margin:15px 0;color:#aaa}
.score{font-size:72px;font-weight:bold;color:#FFD700}
.timer{font-size:24px;color:#FF6B6B;margin:10px 0}
.btn{background:#7B68EE;border:none;color:#fff;padding:14px 36px;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;touch-action:manipulation}
.hs{color:#888;font-size:14px;margin-top:10px}
</style></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<div class="area" id="app"></div>
<script>
let state='ready',taps=0,timeLeft=10,timer,hs=parseInt(localStorage.getItem('tap_hs')||'0');
function render(){
  const app=document.getElementById('app');
  if(state==='ready'){
    app.innerHTML=`<div style="font-size:36px;margin-bottom:10px">👆</div><div style="font-size:28px;font-weight:bold">탭 스피드</div><p class="info">10초 안에 최대한 빠르게 탭하세요!</p><div class="circle" style="background:#7B68EE" ontouchstart="startGame(event)" onclick="startGame(event)">시작</div>${hs?`<div class="hs">최고 기록: ${hs}탭</div>`:''}`;
  } else if(state==='playing'){
    app.innerHTML=`<div class="timer">${timeLeft.toFixed(1)}초</div><div class="score">${taps}</div><div class="circle" style="background:hsl(${taps*8%360},70%,55%)" ontouchstart="tap(event)" onclick="tap(event)">👆</div><p class="info">빠르게 탭!</p>`;
  } else {
    const isNew=taps>hs;
    if(isNew){hs=taps;localStorage.setItem('tap_hs',hs);}_hub('tap_speed',taps);
    app.innerHTML=`<div style="font-size:48px;margin-bottom:10px">${isNew?'🎉':'👆'}</div><div class="score">${taps}탭</div><p class="info">${isNew?'새 기록!':'게임 오버'}</p><div class="hs">최고: ${hs}탭</div><div class="circle" style="background:#4CAF50" ontouchstart="reset(event)" onclick="reset(event)">다시</div>`;
  }
}
function startGame(e){e.preventDefault();clearInterval(timer);state='playing';taps=0;timeLeft=10;render();timer=setInterval(()=>{timeLeft-=0.1;if(timeLeft<=0){clearInterval(timer);state='done';render();}else{const t=document.querySelector('.timer');if(t){t.textContent=timeLeft.toFixed(1)+'초';if(timeLeft<=3)t.style.color='#ff0000';if(timeLeft<=3&&timeLeft>2.9)t.style.fontSize='36px';if(timeLeft<=2&&timeLeft>1.9)t.style.fontSize='42px';if(timeLeft<=1&&timeLeft>0.9)t.style.fontSize='50px';}const enc=taps>=50?'<div style="color:#FFD700;font-size:20px;font-weight:bold;animation:pulse 0.3s infinite">'+(taps>=80?'신이야?!':taps>=60?'미쳤다!':'대단해!')+'</div>':'';const info=document.querySelector('.info');if(info)info.innerHTML=enc||'빠르게 탭!';}},100);}
function tap(e){e.preventDefault();if(state!=='playing')return;taps++;const s=document.querySelector('.score');if(s)s.textContent=taps;const c=document.querySelector('.circle');if(c){c.style.background=`hsl(${taps*8%360},70%,55%)`;
  // Ripple effect
  const ripple=document.createElement('div');const hue=(taps*8)%360;ripple.style.cssText='position:absolute;width:200px;height:200px;border-radius:50%;border:3px solid hsl('+hue+',70%,55%);pointer-events:none;animation:rippleOut 0.5s ease-out forwards;left:50%;top:50%;transform:translate(-50%,-50%)';
  c.parentElement.style.position='relative';c.parentElement.appendChild(ripple);setTimeout(()=>ripple.remove(),500);
  // Screen shake
  if(taps%5===0){document.body.style.transform='translateX('+(Math.random()>0.5?3:-3)+'px)';setTimeout(()=>document.body.style.transform='',50);}
}}
function reset(e){e.preventDefault();clearInterval(timer);state='ready';render();}
render();
</script></body></html>
