<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<canvas id="c"></canvas>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='undefined')r=0;if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;};}
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;
canvas.width = W; canvas.height = H;

const GRAVITY = 0.35;
const FLAP = -6.5;
const PIPE_W = 55;
const BASE_GAP = 170;
const BASE_PIPE_SPEED = 2.2;
const GROUND_H = 60;

let bird, pipes, score, gameOver, started, frame;
let gameSpeed, currentGap;
let particles = [];
let highScore = parseInt(localStorage.getItem('flappy_hs') || '0');
let groundX = 0;
let flashAlpha = 0;
let scorePops = [];
let bestThisRun = 0;

function init() {
  bird = {x: 80, y: H/2 - 30, vy: 0, rotation: 0, wingFrame: 0};
  pipes = [];
  score = 0; gameOver = false; frame = 0;
  gameSpeed = BASE_PIPE_SPEED; currentGap = BASE_GAP;
  particles = []; flashAlpha = 0; scorePops = []; bestThisRun = 0;
}

function flap() {
  if (gameOver) return;
  if (!started) { started = true; init(); }
  bird.vy = FLAP;
  bird.wingFrame = 10;
  // feather particles
  for (let i = 0; i < 4; i++)
    particles.push({
      x: bird.x, y: bird.y + 10,
      vx: -1 - Math.random()*2, vy: (Math.random()-0.5)*2,
      color: Math.random() > 0.5 ? '#FFE4B5' : '#FFF8DC',
      life: 20+Math.random()*10, maxLife: 30, size: 2+Math.random()*2
    });
}

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); flap(); }
  if (gameOver && (e.key === ' ' || e.key === 'r')) { init(); started = true; }
});
canvas.addEventListener('click', () => {
  if (gameOver) { init(); started = true; } else flap();
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (gameOver) { init(); started = true; } else flap(); });

function update() {
  if (!started || gameOver) return;
  frame++;

  // bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(Math.max(bird.vy * 3, -30), 70);
  if (bird.wingFrame > 0) bird.wingFrame--;

  // ground collision
  if (bird.y + 15 > H - GROUND_H) { die(); return; }
  if (bird.y < -10) { bird.y = -10; bird.vy = 0; }

  // difficulty scaling
  gameSpeed = BASE_PIPE_SPEED + score * 0.08;
  currentGap = Math.max(120, BASE_GAP - score * 2);

  // pipes
  if (frame % 100 === 0 || pipes.length === 0) {
    const minY = 80, maxY = H - GROUND_H - currentGap - 80;
    const topH = minY + Math.random() * (maxY - minY);
    pipes.push({x: W + 20, topH: topH, gap: currentGap, scored: false});
  }

  pipes.forEach(p => {
    p.x -= gameSpeed;
    // scoring
    if (!p.scored && p.x + PIPE_W < bird.x) {
      score++;
      p.scored = true;
      scorePops.push({x: bird.x + 20, y: bird.y - 15, text: '+1', life: 25, maxLife: 25});
    }
    // collision (use pipe's own gap for fairness)
    const pGap = p.gap || currentGap;
    const bx = bird.x - 12, by = bird.y - 12, bw = 24, bh = 24;
    if (bx + bw > p.x && bx < p.x + PIPE_W) {
      if (by < p.topH || by + bh > p.topH + pGap) { die(); }
    }
  });
  pipes = pipes.filter(p => p.x > -PIPE_W - 10);

  // ground scroll
  groundX -= gameSpeed;
  if (groundX <= -40) groundX += 40;

  // trail particles
  if (frame % 3 === 0)
    particles.push({
      x: bird.x - 8, y: bird.y + 5,
      vx: -0.5, vy: (Math.random()-0.5)*0.5,
      color: '#FFE4B5', life: 12, maxLife: 12, size: 2
    });
}

function die() {
  gameOver = true;
  flashAlpha = 1;
  if (score > highScore) { highScore = score; localStorage.setItem('flappy_hs', highScore); }
  _hub('flappy',score);
  for (let i = 0; i < 15; i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(a)*3, vy: Math.sin(a)*3,
      color: ['#FFD700','#FFA500','#FF6B6B','#FFE4B5'][Math.floor(Math.random()*4)],
      life: 30, maxLife: 30, size: 3
    });
  }
}

function drawSky() {
  // gradient sky
  const skyColors = score < 10 ? ['#87CEEB','#B0E0E6'] :
                    score < 20 ? ['#E6A8D7','#FFB6C1'] :
                    ['#2C3E50','#4A6FA5'];
  const grd = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grd.addColorStop(0, skyColors[0]);
  grd.addColorStop(1, skyColors[1]);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 4; i++) {
    const cx = ((i * 120 + frame * 0.3) % (W + 80)) - 40;
    const cy = 50 + i * 60;
    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI*2); ctx.fill();
    ctx.arc(cx+18, cy-5, 15, 0, Math.PI*2); ctx.fill();
    ctx.arc(cx+30, cy, 18, 0, Math.PI*2); ctx.fill();
  }
}

function drawGround() {
  // grass
  ctx.fillStyle = '#7EC850';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#5DAA30';
  ctx.fillRect(0, H - GROUND_H, W, 8);
  // dirt pattern
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, H - GROUND_H + 8, W, GROUND_H - 8);
  ctx.fillStyle = '#A07818';
  for (let x = groundX; x < W; x += 40)
    ctx.fillRect(x, H - GROUND_H + 8, 20, GROUND_H);
}

function drawPipe(p) {
  const topH = p.topH;
  const pGap = p.gap || currentGap;
  const botY = topH + pGap;
  const botH = H - GROUND_H - botY;

  // pipe body (hedge style)
  const drawHedge = (x, y, w, h) => {
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill();
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath(); ctx.roundRect(x+4, y+2, w-8, h-4, 4); ctx.fill();
    // leaf dots
    ctx.fillStyle = '#388E3C';
    for (let ly = y+10; ly < y+h-10; ly += 18)
      for (let lx = x+8; lx < x+w-8; lx += 14) {
        ctx.beginPath(); ctx.arc(lx + Math.sin(ly)*3, ly, 3, 0, Math.PI*2); ctx.fill();
      }
  };

  // cap
  const drawCap = (x, y, w) => {
    ctx.fillStyle = '#43A047';
    ctx.beginPath(); ctx.roundRect(x-5, y, w+10, 22, 6); ctx.fill();
    ctx.fillStyle = '#66BB6A';
    ctx.beginPath(); ctx.roundRect(x-3, y+2, w+6, 8, 4); ctx.fill();
    // flowers
    const flowerColors = ['#FF69B4','#FFB6C1','#FF6B6B','#FFD700'];
    ctx.fillStyle = flowerColors[Math.floor(p.x/30) % 4];
    ctx.beginPath(); ctx.arc(x+5, y+3, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = flowerColors[(Math.floor(p.x/30)+2) % 4];
    ctx.beginPath(); ctx.arc(x+w-5, y+3, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(x+5, y+3, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w-5, y+3, 1.5, 0, Math.PI*2); ctx.fill();
  };

  // top pipe
  drawHedge(p.x, 0, PIPE_W, topH);
  drawCap(p.x, topH - 22, PIPE_W);
  // bottom pipe
  drawHedge(p.x, botY, PIPE_W, botH);
  drawCap(p.x, botY, PIPE_W);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation * Math.PI / 180);

  // squash/stretch effect on flap
  const stretchAmt = bird.wingFrame > 0 ? 1 + bird.wingFrame * 0.015 : 1;
  const squashAmt = bird.wingFrame > 0 ? 1 - bird.wingFrame * 0.01 : 1;
  ctx.scale(squashAmt, stretchAmt);

  // body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.ellipse(0, 0, 16, 14, 0, 0, Math.PI*2); ctx.fill();
  // belly
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath(); ctx.ellipse(2, 4, 10, 8, 0, 0, Math.PI*2); ctx.fill();

  // wing
  const wingY = bird.wingFrame > 0 ? -8 : -2;
  ctx.fillStyle = '#FFA500';
  ctx.beginPath(); ctx.ellipse(-6, wingY, 10, 6, -0.3, 0, Math.PI*2); ctx.fill();

  // tail
  ctx.fillStyle = '#FFA500';
  ctx.beginPath();
  ctx.moveTo(-14, -2); ctx.lineTo(-22, -6); ctx.lineTo(-20, 2); ctx.lineTo(-14, 2);
  ctx.fill();

  // eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(8, -4, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(9, -3, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(10, -5, 1.3, 0, Math.PI*2); ctx.fill();

  // beak
  ctx.fillStyle = '#FF6B35';
  ctx.beginPath();
  ctx.moveTo(14, -1); ctx.lineTo(22, 2); ctx.lineTo(14, 5);
  ctx.fill();

  // cheek
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath(); ctx.ellipse(4, 4, 4, 3, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawScore() {
  if (!started) return;
  ctx.textAlign = 'center';
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.font = 'bold 48px sans-serif';
  ctx.fillText(score, W/2 + 2, 72);
  // score
  ctx.fillStyle = '#fff';
  ctx.fillText(score, W/2, 70);
  ctx.textAlign = 'left';
}

function drawStart() {
  drawSky();
  drawGround();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px sans-serif';
  ctx.fillText('날아라 병아리', W/2, 150);

  // bouncing bird
  const by = 250 + Math.sin(Date.now()/300) * 15;
  ctx.save();
  ctx.translate(W/2, by);
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath(); ctx.ellipse(2, 5, 14, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFA500';
  const wf = Math.sin(Date.now()/150) * 6;
  ctx.beginPath(); ctx.ellipse(-8, wf, 14, 8, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(10, -5, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(11, -4, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(12, -6, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FF6B35';
  ctx.beginPath(); ctx.moveTo(18,-1); ctx.lineTo(28,3); ctx.lineTo(18,7); ctx.fill();
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath(); ctx.ellipse(5, 6, 5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#888';
  ctx.font = '16px sans-serif';
  ctx.fillText('탭하거나 스페이스바를 눌러 시작', W/2, 340);

  const t = Date.now()/1000;
  ctx.globalAlpha = 0.5+Math.sin(t*2.5)*0.5;
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText('시작!', W/2, 390);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '15px sans-serif';
    ctx.fillText(`최고 점수: ${highScore}`, W/2, 450);
  }
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF6B6B';
  ctx.font = 'bold 38px sans-serif';
  ctx.fillText('게임 오버', W/2, 190);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 50px sans-serif';
  ctx.fillText(score, W/2, 260);

  ctx.fillStyle = '#aaa';
  ctx.font = '18px sans-serif';
  ctx.fillText('점수', W/2, 290);

  // Medal system
  let medal = '', medalColor = '';
  if (score >= 40) { medal = 'PLATINUM'; medalColor = '#E5E4E2'; }
  else if (score >= 20) { medal = 'GOLD'; medalColor = '#FFD700'; }
  else if (score >= 10) { medal = 'SILVER'; medalColor = '#C0C0C0'; }
  else if (score >= 5) { medal = 'BRONZE'; medalColor = '#CD7F32'; }
  if (medal) {
    const pulse = 0.9 + Math.sin(Date.now()/250)*0.1;
    ctx.save();
    ctx.translate(W/2, 325);
    ctx.scale(pulse, pulse);
    // medal circle
    ctx.fillStyle = medalColor;
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-5, -6, 8, 0, Math.PI*2); ctx.fill();
    // star
    ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(score >= 40 ? '★' : '☆', 0, 6);
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.fillStyle = medalColor; ctx.font = 'bold 13px sans-serif';
    ctx.fillText(medal, W/2, 360);
  }

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('새 기록!', W/2, medal ? 385 : 340);
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '16px sans-serif';
    ctx.fillText(`최고: ${highScore}`, W/2, medal ? 385 : 340);
  }

  const t = Date.now()/1000;
  ctx.globalAlpha = 0.5+Math.sin(t*2)*0.5;
  ctx.fillStyle = '#FFD700';
  ctx.font = '18px sans-serif';
  ctx.fillText('탭하여 다시 시작', W/2, medal ? 430 : 420);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function updateParticles() {
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*a, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

init();
function gameLoop() {
  if (!started) { drawStart(); requestAnimationFrame(gameLoop); return; }

  update();
  updateParticles();

  drawSky();
  pipes.forEach(drawPipe);
  drawParticles();
  drawBird();
  drawGround();
  drawScore();

  // score popups
  scorePops.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${14+(1-a)*6}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y - (1-a)*20);
    p.life--;
  });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  scorePops = scorePops.filter(p => p.life > 0);

  // death flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, W, H);
    flashAlpha -= 0.05;
  }

  if (gameOver) drawGameOver();

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
