<b>맞고 (2인 고스톱) 규칙</b><br><br>
🎴 48장 화투 (12월×4장)<br>
🎯 같은 월의 카드를 맞춰 가져오기<br><br>
<b>카드 종류:</b><br>
★ 광 (1,3,8,11,12월) - 3장=3점, 4장=4점, 5장=15점<br>
━ 띠 (빨강/파랑/초) - 같은 종류 3장=3점<br>
🔸 열끗 - 5장=1점, +1장=+1점<br>
· 피 - 10장=1점, +1장=+1점<br><br>
<b>진행:</b> 패에서 1장→바닥 매칭→가져오기→덱 뒤집기→매칭<br>

<script>
// Card types: gwang(광), tti_red(홍단), tti_blue(청단), tti_grass(초단), yeol(열끗), pi(피), ssangpi(쌍피)
const CARD_DB=[
// Month 1: 松鶴 (1월)
{month:1,type:'gwang',label:'★',name:'1월 광'},
{month:1,type:'tti_red',label:'━',name:'1월 홍단'},
{month:1,type:'pi',label:'·',name:'1월 피'},
{month:1,type:'pi',label:'·',name:'1월 피2'},
// Month 2
{month:2,type:'yeol',label:'🔸',name:'2월 열끗'},
{month:2,type:'tti_red',label:'━',name:'2월 홍단'},
{month:2,type:'pi',label:'·',name:'2월 피'},
{month:2,type:'pi',label:'·',name:'2월 피2'},
// Month 3
{month:3,type:'gwang',label:'★',name:'3월 광'},
{month:3,type:'tti_red',label:'━',name:'3월 홍단'},
{month:3,type:'pi',label:'·',name:'3월 피'},
{month:3,type:'pi',label:'·',name:'3월 피2'},
// Month 4
{month:4,type:'yeol',label:'🔸',name:'4월 열끗'},
{month:4,type:'tti_grass',label:'━',name:'4월 초단'},
{month:4,type:'pi',label:'·',name:'4월 피'},
{month:4,type:'pi',label:'·',name:'4월 피2'},
// Month 5
{month:5,type:'yeol',label:'🔸',name:'5월 열끗'},
{month:5,type:'tti_grass',label:'━',name:'5월 초단'},
{month:5,type:'pi',label:'·',name:'5월 피'},
{month:5,type:'pi',label:'·',name:'5월 피2'},
// Month 6
{month:6,type:'yeol',label:'🔸',name:'6월 열끗'},
{month:6,type:'tti_blue',label:'━',name:'6월 청단'},
{month:6,type:'pi',label:'·',name:'6월 피'},
{month:6,type:'pi',label:'·',name:'6월 피2'},
// Month 7
{month:7,type:'yeol',label:'🔸',name:'7월 열끗'},
{month:7,type:'tti_grass',label:'━',name:'7월 초단'},
{month:7,type:'pi',label:'·',name:'7월 피'},
{month:7,type:'pi',label:'·',name:'7월 피2'},
// Month 8
{month:8,type:'gwang',label:'★',name:'8월 광'},
{month:8,type:'yeol',label:'🔸',name:'8월 열끗'},
{month:8,type:'pi',label:'·',name:'8월 피'},
{month:8,type:'pi',label:'·',name:'8월 피2'},
// Month 9
{month:9,type:'yeol',label:'🔸',name:'9월 열끗'},
{month:9,type:'tti_blue',label:'━',name:'9월 청단'},
{month:9,type:'pi',label:'·',name:'9월 피'},
{month:9,type:'pi',label:'·',name:'9월 피2'},
// Month 10
{month:10,type:'yeol',label:'🔸',name:'10월 열끗'},
{month:10,type:'tti_blue',label:'━',name:'10월 청단'},
{month:10,type:'pi',label:'·',name:'10월 피'},
{month:10,type:'pi',label:'·',name:'10월 피2'},
// Month 11
{month:11,type:'gwang',label:'★',name:'11월 광'},
{month:11,type:'yeol',label:'🔸',name:'11월 열끗'},
{month:11,type:'ssangpi',label:'··',name:'11월 쌍피'},
{month:11,type:'pi',label:'·',name:'11월 피'},
// Month 12
{month:12,type:'gwang',label:'★',name:'12월 광'},
{month:12,type:'tti_red',label:'━',name:'12월 홍단'},  // 비 - treat as tti for simplicity
{month:12,type:'ssangpi',label:'··',name:'12월 쌍피'},
{month:12,type:'pi',label:'·',name:'12월 피'},
];

function seasonClass(m){
if(m<=3)return'season-spring';
if(m<=6)return'season-summer';
if(m<=9)return'season-fall';
return'season-winter';
}

function ttiColor(type){
if(type==='tti_red')return'#ff4444';
if(type==='tti_blue')return'#4488ff';
if(type==='tti_grass')return'#44bb44';
return'#fff';
}

let deck=[],playerH=[],aiH=[],fieldCards=[];
let playerPile=[],aiPile=[];
let turn='player'; // 'player','ai'
let phase='hand'; // 'hand','field_pick','deck_flip','deck_field_pick','done'
let selectedCard=null,goCount={player:0,ai:0};
let gameOver=false;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function startGame(){
document.getElementById('startScreen').style.display='none';
document.getElementById('game').style.display='block';
startNewGame();
}

function startNewGame(){
document.getElementById('resultModal').style.display='none';
deck=CARD_DB.map((c,i)=>({...c,id:i}));
shuffle(deck);
playerH=[];aiH=[];fieldCards=[];playerPile=[];aiPile=[];
goCount={player:0,ai:0};gameOver=false;
// Deal: 10 each, 8 field
for(let i=0;i<10;i++){playerH.push(deck.pop());aiH.push(deck.pop());}
for(let i=0;i<8;i++)fieldCards.push(deck.pop());
turn='player';phase='hand';selectedCard=null;
render();msg('카드를 선택하세요');
}

function msg(t){document.getElementById('msg').textContent=t;}

function calcScore(pile){
let gwangs=pile.filter(c=>c.type==='gwang');
let reds=pile.filter(c=>c.type==='tti_red');
let blues=pile.filter(c=>c.type==='tti_blue');
let grass=pile.filter(c=>c.type==='tti_grass');
let yeols=pile.filter(c=>c.type==='yeol');
let pis=pile.filter(c=>c.type==='pi');
let ssangpis=pile.filter(c=>c.type==='ssangpi');
let piCount=pis.length+ssangpis.length*2;
let score=0;
// Gwang
if(gwangs.length===5)score+=15;
else if(gwangs.length===4)score+=4;
else if(gwangs.length===3){
let hasRain=gwangs.some(c=>c.month===12);
score+=hasRain?2:3;
}
// Tti
if(reds.length>=3)score+=3+(reds.length-3);
if(blues.length>=3)score+=3+(blues.length-3);
if(grass.length>=3)score+=3+(grass.length-3);
// Yeol
if(yeols.length>=5)score+=1+(yeols.length-5);
// Pi
if(piCount>=10)score+=1+(piCount-10);
return score;
}

function renderCardEl(card,selectable=false,small=false,faceDown=false){
let el=document.createElement('div');
el.className='card '+seasonClass(card.month)+(selectable?' selectable':'')+(small?' small':'')+(selectedCard&&selectedCard.id===card.id?' selected':'')+(faceDown?' face-down':'');
let cm=document.createElement('div');cm.className='cm';cm.textContent=card.month;
let ct=document.createElement('div');ct.className='ct';
if(card.type==='gwang')ct.textContent='★광';
else if(card.type.startsWith('tti')){ct.textContent='━';ct.style.color=ttiColor(card.type);}
else if(card.type==='yeol')ct.textContent='🔸';
else if(card.type==='ssangpi')ct.textContent='··피';
else ct.textContent='·피';
el.appendChild(cm);el.appendChild(ct);
if(selectable&&!faceDown){
el.onclick=()=>onCardClick(card);
}
return el;
}

function render(){
// AI hand (face down)
let ah=document.getElementById('aiHand');ah.innerHTML='';
aiH.forEach(c=>{ah.appendChild(renderCardEl(c,false,false,true));});
document.getElementById('aiCardCount').textContent=aiH.length+'장';
// Field
let f=document.getElementById('field');f.innerHTML='';
fieldCards.forEach(c=>f.appendChild(renderCardEl(c,phase==='field_pick'&&turn==='player'&&c.month===selectedCard?.month,false)));
// Player hand
let ph=document.getElementById('playerHand');ph.innerHTML='';
let canSelect=turn==='player'&&phase==='hand'&&!gameOver;
playerH.forEach(c=>ph.appendChild(renderCardEl(c,canSelect)));
// Collected
renderCollected('playerCollected',playerPile);
renderCollected('aiCollected',aiPile);
// Scores
document.getElementById('pScore').textContent=calcScore(playerPile);
document.getElementById('aScore').textContent=calcScore(aiPile);
document.getElementById('deckCount').textContent=deck.length;
}

function renderCollected(elId,pile){
let el=document.getElementById(elId);el.innerHTML='';
let groups={gwang:[],tti:[],yeol:[],pi:[]};
pile.forEach(c=>{
if(c.type==='gwang')groups.gwang.push(c);
else if(c.type.startsWith('tti'))groups.tti.push(c);
else if(c.type==='yeol')groups.yeol.push(c);
else groups.pi.push(c);
});
for(let [k,cards] of Object.entries(groups)){
if(cards.length===0)continue;
let wrap=document.createElement('div');
let label=document.createElement('span');
label.textContent=k==='gwang'?'광'+cards.length:k==='tti'?'띠'+cards.length:k==='yeol'?'열끗'+cards.length:'피'+cards.length;
let row=document.createElement('div');row.className='card-row';
cards.forEach(c=>row.appendChild(renderCardEl(c,false,true)));
wrap.appendChild(label);wrap.appendChild(row);
el.appendChild(wrap);
}
}

function onCardClick(card){
if(gameOver)return;
if(turn==='player'&&phase==='hand'){
let matches=fieldCards.filter(c=>c.month===card.month);
selectedCard=card;
if(matches.length===0){
// No match: place on field
playerH=playerH.filter(c=>c.id!==card.id);
fieldCards.push(card);
selectedCard=null;
phase='deck_flip';
render();
setTimeout(()=>deckFlip('player'),500);
} else if(matches.length===1){
// Auto-take
playerH=playerH.filter(c=>c.id!==card.id);
fieldCards=fieldCards.filter(c=>c.id!==matches[0].id);
playerPile.push(card,matches[0]);
selectedCard=null;
phase='deck_flip';
render();
setTimeout(()=>deckFlip('player'),500);
} else {
// Multiple matches: let player pick
phase='field_pick';
render();
msg('바닥에서 가져올 카드를 선택하세요');
}
} else if(turn==='player'&&phase==='field_pick'){
if(card.month!==selectedCard.month)return;
let handCard=selectedCard;
playerH=playerH.filter(c=>c.id!==handCard.id);
fieldCards=fieldCards.filter(c=>c.id!==card.id);
playerPile.push(handCard,card);
selectedCard=null;
phase='deck_flip';
render();
setTimeout(()=>deckFlip('player'),500);
}
}

function deckFlip(who){
if(deck.length===0){endTurn(who);return;}
let flipped=deck.pop();
let matches=fieldCards.filter(c=>c.month===flipped.month);
let pile=who==='player'?playerPile:aiPile;
if(matches.length===0){
fieldCards.push(flipped);
render();
setTimeout(()=>endTurn(who),400);
} else if(matches.length===1){
fieldCards=fieldCards.filter(c=>c.id!==matches[0].id);
pile.push(flipped,matches[0]);
render();
setTimeout(()=>endTurn(who),400);
} else {
// Take first match (simplification for AI; for player too since deck flip is random)
fieldCards=fieldCards.filter(c=>c.id!==matches[0].id);
pile.push(flipped,matches[0]);
render();
setTimeout(()=>endTurn(who),400);
}
}

function endTurn(who){
let pile=who==='player'?playerPile:aiPile;
let score=calcScore(pile);
// Check go/stop
if(score>=3){
if(who==='player'){
showGoStop(score);return;
} else {
// AI always goes if score < 7, stops if >= 7
if(score>=7){
finishGame('ai');return;
} else {
goCount.ai++;
msg('AI가 "고"를 선언했습니다!');
}
}
}
nextTurn(who);
}

function nextTurn(who){
if(playerH.length===0&&aiH.length===0){
// Compare scores
let ps=calcScore(playerPile),as=calcScore(aiPile);
if(ps>=as)finishGame('player');
else finishGame('ai');
return;
}
if(who==='player'){
turn='ai';phase='hand';
render();
setTimeout(aiTurn,600);
} else {
turn='player';phase='hand';
selectedCard=null;
render();
msg('카드를 선택하세요');
}
}

function showGoStop(score){
let modal=document.createElement('div');
modal.className='go-stop-modal';
modal.id='goStopModal';
let h=document.createElement('h2');h.textContent='현재 '+score+'점!';
let p=document.createElement('p');p.textContent='고: 계속 진행 (점수 2배 기회!) / 스톱: 현재 점수로 종료';
let row=document.createElement('div');row.style.display='flex';row.style.gap='16px';
let goBtn=document.createElement('button');goBtn.className='btn-primary';goBtn.textContent='고! 🔥';
goBtn.style.background='linear-gradient(135deg,#e74c3c,#c0392b)';goBtn.style.color='#fff';
goBtn.onclick=()=>{modal.remove();goCount.player++;msg('고! '+goCount.player+'회');nextTurn('player');};
let stopBtn=document.createElement('button');stopBtn.className='btn-primary';stopBtn.textContent='스톱 ✋';
stopBtn.onclick=()=>{modal.remove();finishGame('player');};
row.appendChild(goBtn);row.appendChild(stopBtn);
modal.appendChild(h);modal.appendChild(p);modal.appendChild(row);
document.body.appendChild(modal);
}

function aiTurn(){
if(aiH.length===0){nextTurn('ai');return;}
// Simple AI: find matching card, else play lowest value card
let bestCard=null,bestMatch=null;
for(let c of aiH){
let matches=fieldCards.filter(f=>f.month===c.month);
if(matches.length>0){
// Prefer taking gwang/tti
let best=matches.sort((a,b)=>{
let va=a.type==='gwang'?10:a.type.startsWith('tti')?5:a.type==='yeol'?2:0;
let vb=b.type==='gwang'?10:b.type.startsWith('tti')?5:b.type==='yeol'?2:0;
return vb-va;
})[0];
bestCard=c;bestMatch=best;break;
}
}
if(!bestCard){
// No match, play lowest pi
let sorted=[...aiH].sort((a,b)=>{
let va=a.type==='gwang'?10:a.type.startsWith('tti')?5:a.type==='yeol'?2:0;
let vb=b.type==='gwang'?10:b.type.startsWith('tti')?5:b.type==='yeol'?2:0;
return va-vb;
});
bestCard=sorted[0];
}
aiH=aiH.filter(c=>c.id!==bestCard.id);
if(bestMatch){
fieldCards=fieldCards.filter(c=>c.id!==bestMatch.id);
aiPile.push(bestCard,bestMatch);
msg('AI: '+bestCard.month+'월 매칭!');
} else {
fieldCards.push(bestCard);
msg('AI: '+bestCard.month+'월 바닥에 놓음');
}
render();
setTimeout(()=>deckFlip('ai'),500);
}

function finishGame(winner){
gameOver=true;
let ps=calcScore(playerPile),as=calcScore(aiPile);
let goMult=1+goCount.player*1;
let finalScore=winner==='player'?Math.max(ps*goMult,ps):ps;
render();
let rm=document.getElementById('resultModal');
rm.style.display='flex';
document.getElementById('resultTitle').textContent=winner==='player'?'🎉 승리!':'😢 패배';
document.getElementById('resultScore').textContent='내 점수: '+ps+(goCount.player>0?' ×'+(1+goCount.player)+'(고)='+finalScore:'')+' | AI: '+as;
_hub('matgo',finalScore);
}
</script>
