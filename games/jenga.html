<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#0f0f1e;color:#fff;font-family:sans-serif;overflow:hidden;touch-action:none}
canvas{display:block;margin:0 auto}
#hud{position:fixed;top:50px;left:0;width:100%;text-align:center;font-size:14px;z-index:50;pointer-events:none}
#hud span{background:rgba(0,0,0,0.6);padding:4px 12px;border-radius:8px;margin:0 4px}
#overlay{position:fixed;inset:0;background:rgba(15,15,30,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;text-align:center;padding:20px}

<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

<div id="overlay">
<h1>🧩 젠가</h1>
<p>블록을 터치하여 빼고 맨 위에 올리세요!<br>한 줄에 최소 1개는 남겨야 합니다.<br>맨 위 줄에서는 뺄 수 없어요.<br>타워가 무너지면 게임 오버!</p>

<span>🧱 <b id="sc">0</b>개 이동</span>
<span>흔들림: <b id="tiltDisp">안정</b></span>
</div>

<canvas id="c"></canvas>

<button class="btn btn-sm btn-red" onclick="undoMove()">↩ 되돌리기</button>
</div>

<div id="msg">
<h2 id="msgTitle">💥 무너졌다!</h2>
<p id="msgSub"></p>
<button class="btn" onclick="startGame()">다시 하기</button>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const W=Math.min(window.innerWidth,420);
const H=Math.min(window.innerHeight-20,700);
C.width=W;C.height=H;

const COLS=3,ROWS=12;
const BW=Math.floor((W-80)/COLS)-2; // block width
const BH=18; // block height
const GAP=1;
const TOWER_W=COLS*BW+GAP*(COLS-1);
const BASE_X=W/2-TOWER_W/2;
const BASE_Y=H-70;
const COLORS=['#c8844a','#d49560','#b07030','#daa070','#a06828','#c07838'];

let grid=[]; // grid[row][col] = block or null
let score=0,gameOver=false,tilt=0,tiltVel=0;
let selected=null,removedHistory=[];
let shakeTimer=0,camY=0;

function initGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]={row:r,col:c,color:COLORS[(r*3+c)%COLORS.length]};
    }
  }
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('msg').style.display='none';
  initGrid();
  score=0;gameOver=false;tilt=0;tiltVel=0;selected=null;removedHistory=[];shakeTimer=0;
  updateHUD();
}

function getTopRow(){
  for(let r=grid.length-1;r>=0;r--){
    if(grid[r].some(b=>b))return r;
  }
  return 0;
}

function countInRow(r){
  return grid[r].filter(b=>b).length;
}

function canRemove(r,c){
  if(!grid[r]||!grid[r][c])return false;
  const topRow=getTopRow();
  if(r===topRow)return false; // can't remove from top row
  if(countInRow(r)<=1)return false; // must leave at least 1
  return true;
}

function removeAndPlace(r,c){
  const block=grid[r][c];
  grid[r][c]=null;

  // Place on top
  let topRow=getTopRow();
  let topCount=countInRow(topRow);

  if(topCount>=COLS){
    // Need new row
    topRow++;
    if(topRow>=grid.length)grid.push([null,null,null]);
    grid[topRow][0]=block;
    block.row=topRow;block.col=0;
  }else{
    // Find empty slot in top row
    for(let c2=0;c2<COLS;c2++){
      if(!grid[topRow][c2]){
        grid[topRow][c2]=block;
        block.row=topRow;block.col=c2;
        break;
      }
    }
  }

  removedHistory.push({fromRow:r,fromCol:c,toRow:block.row,toCol:block.col});
  score++;

  // Physics: add tilt based on position removed
  const centerBias=(c-1)*0.8; // -1, 0, 1 → left/center/right
  tiltVel+=centerBias*(1+score*0.15);
  // Random wobble increases with score
  tiltVel+=(Math.random()-0.5)*(0.5+score*0.2);
  shakeTimer=10;

  // Structural check
  if(checkCollapse()){
    doCollapse();
  }

  updateHUD();
}

function undoMove(){
  if(removedHistory.length===0||gameOver)return;
  const last=removedHistory.pop();
  const block=grid[last.toRow][last.toCol];
  grid[last.toRow][last.toCol]=null;
  grid[last.fromRow][last.fromCol]=block;
  block.row=last.fromRow;block.col=last.fromCol;
  score--;
  tiltVel=0;tilt*=0.5;
  // Remove empty top rows
  while(grid.length>ROWS&&grid[grid.length-1].every(b=>!b))grid.pop();
  updateHUD();
}

function checkCollapse(){
  // Empty row in middle = collapse
  const topRow=getTopRow();
  for(let r=0;r<=topRow;r++){
    if(countInRow(r)===0)return true;
  }
  // Tilt too much
  if(Math.abs(tilt)>10)return true;
  // Probability after many removals (only checked on removal, not per frame)
  if(score>6){
    const chance=(score-6)*0.025;
    if(Math.random()<chance)return true;
  }
  return false;
}

function doCollapse(){
  gameOver=true;
  _hub('jenga',score);
  document.getElementById('msgTitle').textContent='💥 무너졌다!';
  document.getElementById('msgSub').textContent='🧱 '+score+'개 성공!';
  document.getElementById('msg').style.display='block';
  tiltVel+=tilt>0?5:-5;
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  const stability=Math.abs(tilt);
  const label=stability<2?'안정':stability<5?'흔들흔들':stability<8?'위험!':'💀 위태위태';
  const color=stability<2?'#4CAF50':stability<5?'#FF9800':stability<8?'#F44336':'#FF0000';
  document.getElementById('tiltDisp').textContent=label;
  document.getElementById('tiltDisp').style.color=color;
}

// Input
function getPos(e){
  const t=e.changedTouches?e.changedTouches[0]:e.touches?e.touches[0]:e;
  const r=C.getBoundingClientRect();
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}

function findBlock(px,py){
  for(let r=grid.length-1;r>=0;r--){
    for(let c=0;c<COLS;c++){
      if(!grid[r][c])continue;
      const bx=getBlockX(r,c),by=getBlockY(r);
      if(px>=bx&&px<=bx+BW&&py>=by&&py<=by+BH)return{r,c};
    }
  }
  return null;
}

function getBlockX(r,c){
  return BASE_X+c*(BW+GAP)+Math.sin(tilt*0.06)*r*1.5;
}
function getBlockY(r){
  return BASE_Y-r*(BH+GAP)+camY;
}

C.addEventListener('click',e=>{
  if(gameOver)return;
  const p=getPos(e);
  const hit=findBlock(p.x,p.y);
  if(!hit)return;

  if(selected&&selected.r===hit.r&&selected.c===hit.c){
    // Double tap = remove
    if(canRemove(hit.r,hit.c)){
      removeAndPlace(hit.r,hit.c);
      selected=null;
    }
  }else{
    selected=hit;
    if(canRemove(hit.r,hit.c)){
      // Immediately remove on first tap
      removeAndPlace(hit.r,hit.c);
      selected=null;
    }
  }
});

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(gameOver)return;
  const p=getPos(e);
  const hit=findBlock(p.x,p.y);
  if(!hit)return;
  if(canRemove(hit.r,hit.c)){
    removeAndPlace(hit.r,hit.c);
    selected=null;
  }
},{passive:false});

// Physics update
function update(){
  if(gameOver){
    tiltVel+=tilt>0?0.3:-0.3;
    tilt+=tiltVel;
    return;
  }
  // Spring back + damping
  tiltVel+=(-tilt*0.03);
  tiltVel*=0.94;
  // Wobble increases with score
  const wobble=Math.max(0,score-3)*0.2;
  tiltVel+=(Math.random()-0.5)*0.06*(1+wobble);
  tilt+=tiltVel;
  if(shakeTimer>0)shakeTimer--;

  // Camera: follow top of tower
  const topRow=getTopRow();
  const topY=BASE_Y-topRow*(BH+GAP)-50;
  const targetCam=topY<80?80-topY:0;
  camY+=(targetCam-camY)*0.1;

  // Frame-based tilt collapse check
  if(Math.abs(tilt)>12&&!gameOver)doCollapse();

  updateHUD();
}

// Drawing
function draw(){
  X.clearRect(0,0,W,H);

  // Background
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0a18');bg.addColorStop(1,'#151530');
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  // Table
  const tableY=BASE_Y+BH+5+camY;
  const tg=X.createLinearGradient(0,tableY,0,Math.max(H,tableY+60));
  tg.addColorStop(0,'#2a1810');tg.addColorStop(1,'#1a0e08');
  X.fillStyle=tg;
  X.fillRect(W/2-TOWER_W/2-20,tableY,TOWER_W+40,Math.max(60,H-tableY+20),6);
  X.fillStyle='rgba(255,255,255,0.04)';
  X.fillRect(W/2-TOWER_W/2-15,tableY,TOWER_W+30);

  // Screen shake
  let shakeX=0,shakeY=0;
  if(shakeTimer>0){
    shakeX=(Math.random()-0.5)*shakeTimer*0.8;
    shakeY=(Math.random()-0.5)*shakeTimer*0.5;
  }
  X.save();
  X.translate(shakeX,shakeY);

  // Draw blocks bottom to top
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<COLS;c++){
      const b=grid[r][c];
      if(!b)continue;

      const bx=getBlockX(r,c);
      const by=getBlockY(r);

      // Shadow
      X.fillStyle='rgba(0,0,0,0.3)';
      X.fillRect(bx+2,by+2,BW,BH);

      // Block body
      const grad=X.createLinearGradient(bx,by,bx,by+BH);
      grad.addColorStop(0,b.color);
      grad.addColorStop(0.4,lighten(b.color,20));
      grad.addColorStop(1,b.color);
      X.fillStyle=grad;
      X.fillRect(bx,by,BW,BH);

      // Wood grain
      X.strokeStyle='rgba(0,0,0,0.06)';X.lineWidth=0.5;
      for(let i=4;i<BW-4;i+=5){
        X.beginPath();X.moveTo(bx+i,by+1);X.lineTo(bx+i+1,by+BH-1);
      }

      // Top highlight
      X.fillStyle='rgba(255,255,255,0.12)';
      X.fillRect(bx+2,by+1,BW-4);

      // Border
      X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=1;
      X.fillRect(bx,by,BW,BH);

      // Removable glow
      if(!gameOver&&canRemove(r,c)){
        X.strokeStyle='rgba(255,215,0,0.2)';X.lineWidth=1;
        X.fillRect(bx-1,by-1,BW+2,BH+2);
      }

      // Empty slot marker
      if(!b){
        X.fillStyle='rgba(255,255,255,0.02)';
        X.fillRect(bx,by,BW,BH);
      }
    }
  }

  // Show empty rows (gaps)
  const topRow=getTopRow();
  for(let r=0;r<=topRow;r++){
    if(countInRow(r)===0){
      const by=getBlockY(r);
      X.fillStyle='rgba(255,0,0,0.08)';
      X.fillRect(BASE_X-5,by,TOWER_W+10,BH);
      X.fillStyle='rgba(255,0,0,0.5)';X.font='10px sans-serif';X.textAlign='center';
      X.fillText('⚠️ 위험!',W/2,by+BH/2+3);
    }
  }

  // Collapse overlay
  if(gameOver){
    X.fillStyle='rgba(255,0,0,0.1)';X.fillRect(0,0,W,H);
  }

  X.restore();
  X.textAlign='left';
}

function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

(function loop(){
  update();draw();
  requestAnimationFrame(loop);
})();
</script>
