<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;overflow:hidden;touch-action:none}
canvas{display:block;margin:0 auto}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
#score{position:fixed;top:12px;right:12px;font-size:18px;font-weight:bold;background:rgba(0,0,0,.6);padding:8px 16px;border-radius:8px;z-index:100}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;text-align:center;display:none;background:rgba(0,0,0,.85);padding:24px 36px;border-radius:16px;z-index:200;pointer-events:auto}
#msg button{margin-top:16px;padding:12px 32px;font-size:18px;border:none;border-radius:10px;background:#4a6;color:#fff;font-weight:bold;cursor:pointer;touch-action:manipulation}
#help{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:13px;color:#aaa;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:8px;z-index:100;text-align:center}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div id="score">점수: <span id="sc">0</span></div>
<div id="help">블록을 터치하여 선택 → 드래그하여 빼내기</div>
<div id="msg"><div id="msgText"></div><button onclick="restartGame()">다시 하기</button></div>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,scale;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;scale=Math.min(W/400,H/700)}
resize();window.addEventListener('resize',resize);

const ROWS=18,COLS=3;
const BW=50,BH=14,GAP=1;
const COLORS=['#c0813a','#d4955a','#b87530','#c8884a','#a06828','#d89e60'];

let blocks=[],score=0,gameOver=false,selectedBlock=null,dragging=false,dragX=0,dragY=0;
let towerTilt=0,towerTiltVel=0,removedCount=0;
let mouseX=0,mouseY=0,mouseDown=false;

class Block{
  constructor(row,col,horizontal){
    this.row=row;this.col=col;this.horizontal=horizontal;
    this.removed=false;this.placed=false;this.onTower=true;
    this.color=COLORS[(row*3+col)%COLORS.length];
    this.highlight=false;
    this.x=0;this.y=0;this.w=0;this.h=0;
    this.dragOffX=0;this.dragOffY=0;
    this.beingDragged=false;
    this.settled=true;
    this.fallY=0;this.fallVel=0;
    this.calcPosition();
  }
  calcPosition(){
    const baseX=W/2;
    const baseY=H-60;
    const towerW=BW*COLS+GAP*(COLS-1);
    const towerH=BH+GAP;
    if(this.horizontal){
      this.w=BW;this.h=BH;
      this.x=baseX-towerW/2+this.col*(BW+GAP)+Math.sin(towerTilt*0.02)*this.row*1.5;
      this.y=baseY-this.row*towerH+this.fallY;
    }else{
      this.w=BH;this.h=BW;
      const blockW=BH;
      const totalW=blockW*COLS+GAP*(COLS-1);
      this.x=baseX-totalW/2+this.col*(blockW+GAP)+Math.sin(towerTilt*0.02)*this.row*1.5;
      this.y=baseY-this.row*(BH+GAP)-(BW-BH)/2+this.fallY;
      this.h=BH;this.w=BW;
      this.x=baseX-towerW/2+this.col*(BW+GAP)+Math.sin(towerTilt*0.02)*this.row*1.5;
      this.y=baseY-this.row*towerH+this.fallY;
    }
  }
  draw(){
    if(this.removed&&!this.beingDragged)return;
    let dx=this.beingDragged?dragX-this.dragOffX:this.x;
    let dy=this.beingDragged?dragY-this.dragOffY:this.y;
    let rw=BW,rh=BH;
    ctx.save();
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.roundRect(dx+2,dy+2,rw,rh,2);ctx.fill();
    // Block body with wood gradient
    const grad=ctx.createLinearGradient(dx,dy,dx,dy+rh);
    const baseColor=this.highlight?'#ffdd44':this.beingDragged?'#ffcc00':this.color;
    grad.addColorStop(0,baseColor);
    grad.addColorStop(0.5,this.highlight?'#ffee88':this.color);
    grad.addColorStop(1,baseColor);
    ctx.fillStyle=grad;
    if(this.beingDragged)ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.roundRect(dx,dy,rw,rh,2);ctx.fill();
    // Wood grain lines
    ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=0.5;
    for(let i=3;i<rw-3;i+=6){
      ctx.beginPath();ctx.moveTo(dx+i,dy+1);ctx.lineTo(dx+i+2,dy+rh-1);ctx.stroke();
    }
    // Top edge highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(dx+1,dy,rw-2,2);
    // Border
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(dx,dy,rw,rh,2);ctx.stroke();
    // Selection glow
    if(this.highlight){
      ctx.shadowColor='#ffcc00';ctx.shadowBlur=12;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(dx-1,dy-1,rw+2,rh+2,3);ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }
  contains(px,py){
    let rw,rh;
    if(this.horizontal){rw=BW;rh=BH}else{rw=BH;rh=BW}
    return px>=this.x&&px<=this.x+rw&&py>=this.y&&py<=this.y+rh;
  }
}

function initGame(){
  blocks=[];score=0;gameOver=false;selectedBlock=null;dragging=false;
  towerTilt=0;towerTiltVel=0;removedCount=0;
  document.getElementById('sc').textContent='0';
  document.getElementById('msg').style.display='none';
  for(let r=0;r<ROWS;r++){
    let horiz=r%2===0;
    for(let c=0;c<COLS;c++){
      blocks.push(new Block(r,c,horiz));
    }
  }
  recalcAll();
}

function recalcAll(){
  const baseX=W/2;
  const baseY=H-80;
  const tiltOffset=(row)=>Math.sin(towerTilt*0.05)*row*2;
  blocks.forEach(b=>{
    if(b.removed&&!b.beingDragged)return;
    if(b.beingDragged)return;
    let rw,rh;
    if(b.horizontal){rw=BW;rh=BH}else{rw=BH;rh=BW}
    const towerW=BW*COLS+GAP*(COLS-1);
    if(b.horizontal){
      b.x=baseX-towerW/2+b.col*(BW+GAP)+tiltOffset(b.row);
      b.y=baseY-b.row*(BH+GAP);
    }else{
      const blockW=BH;
      const totalW=blockW*COLS+GAP*(COLS-1);
      b.x=baseX-totalW/2+b.col*(blockW+GAP)+tiltOffset(b.row);
      b.y=baseY-b.row*(BH+GAP)-(BW-BH)/2;
    }
  });
}

function getEventPos(e){
  const t=e.changedTouches?e.changedTouches[0]:e.touches?e.touches[0]:e;
  return{x:t.clientX,y:t.clientY};
}

function findBlockAt(x,y){
  for(let i=blocks.length-1;i>=0;i--){
    const b=blocks[i];
    if(b.removed||b.beingDragged)continue;
    if(b.contains(x,y))return b;
  }
  return null;
}

function canRemoveBlock(b){
  // Can't remove from top row (must remove from lower rows)
  const maxRow=Math.max(...blocks.filter(bl=>!bl.removed).map(bl=>bl.row));
  if(b.row>=maxRow)return false;
  // Must leave at least 1 block in the row
  const rowBlocks=blocks.filter(bl=>bl.row===b.row&&!bl.removed);
  if(rowBlocks.length<=1)return false;
  return true;
}

function checkStructuralIntegrity(justRemoved){
  const activeBlocks=blocks.filter(b=>!b.removed);
  if(activeBlocks.length===0)return false;
  const maxRow=Math.max(...activeBlocks.map(b=>b.row));
  const minRow=Math.min(...activeBlocks.map(b=>b.row));
  // Empty row in middle = instant collapse
  for(let r=minRow;r<=maxRow;r++){
    if(activeBlocks.filter(b=>b.row===r).length===0)return true;
  }
  // 4+ consecutive single-block rows = collapse
  let singleRowStreak=0;
  for(let r=minRow;r<=maxRow;r++){
    const cnt=activeBlocks.filter(b=>b.row===r).length;
    if(cnt===1)singleRowStreak++;
    else singleRowStreak=0;
    if(singleRowStreak>=4)return true;
  }
  // Only check probability when a block was just removed (not every frame)
  if(justRemoved){
    const totalRemoved=ROWS*COLS-activeBlocks.length;
    // Starts at 0%, slowly increases: 0% until 8 removed, then ~2% per extra block
    if(totalRemoved>8){
      const chance=(totalRemoved-8)*0.02;
      if(Math.random()<chance)return true;
    }
  }
  return false;
}

function handleDown(e){
  e.preventDefault();
  if(gameOver)return;
  const p=getEventPos(e);
  mouseX=p.x;mouseY=p.y;mouseDown=true;
  const b=findBlockAt(p.x,p.y);
  if(b){
    if(selectedBlock&&selectedBlock===b){
      if(canRemoveBlock(b)){
        b.beingDragged=true;
        b.dragOffX=p.x-b.x;
        b.dragOffY=p.y-b.y;
        dragX=p.x;dragY=p.y;
        dragging=true;
      }
    }else{
      if(selectedBlock)selectedBlock.highlight=false;
      selectedBlock=b;
      b.highlight=true;
      if(canRemoveBlock(b)){
        b.beingDragged=true;
        b.dragOffX=p.x-b.x;
        b.dragOffY=p.y-b.y;
        dragX=p.x;dragY=p.y;
        dragging=true;
      }
    }
  }
}

function handleMove(e){
  e.preventDefault();
  if(!dragging)return;
  const p=getEventPos(e);
  dragX=p.x;dragY=p.y;
}

function handleUp(e){
  e.preventDefault();
  mouseDown=false;
  if(dragging&&selectedBlock){
    const b=selectedBlock;
    const origY=b.y;
    const movedDist=Math.abs(dragY-origY-b.dragOffY)+Math.abs(dragX-b.x-b.dragOffX);
    if(movedDist>30){
      b.removed=true;
      b.beingDragged=false;
      removedCount++;
      const maxRow=Math.max(...blocks.filter(bl=>!bl.removed).map(bl=>bl.row));
      const topRow=maxRow+1;
      const topBlocks=blocks.filter(bl=>bl.row===topRow&&!bl.removed);
      const isHoriz=topRow%2===0;
      const existingInRow=blocks.filter(bl=>bl.row===topRow&&!bl.removed);
      let col=existingInRow.length;
      if(col>=COLS){
        const newRow=topRow+1;
        col=0;
        b.row=newRow;b.col=col;b.horizontal=newRow%2===0;
      }else{
        b.row=topRow;b.col=col;b.horizontal=isHoriz;
      }
      b.removed=false;b.placed=true;
      // Calculate instability based on tower structure
      const activeBlocks=blocks.filter(bl=>!bl.removed);
      const rowCounts={};
      activeBlocks.forEach(bl=>{rowCounts[bl.row]=(rowCounts[bl.row]||0)+1;});
      const singleRows=Object.values(rowCounts).filter(c=>c===1).length;
      // Gradual instability: gentle at first, increases after 5+ removals
      const instability=Math.max(0,removedCount-3)*0.4+singleRows*0.8+Math.random();
      towerTiltVel+=(Math.random()-0.5)*instability*0.6;
      // Side block removal causes slight tilt direction
      if(b.col===0)towerTiltVel+=instability*0.15;
      else if(b.col===2)towerTiltVel-=instability*0.15;
      score++;
      document.getElementById('sc').textContent=score;
      recalcAll();
      // Structure check after placement
      if(checkStructuralIntegrity(true))doCollapse();
    }else{
      b.beingDragged=false;
    }
    dragging=false;
    if(selectedBlock){selectedBlock.highlight=false;selectedBlock=null}
  }else{
    dragging=false;
  }
}

canvas.addEventListener('mousedown',handleDown);
canvas.addEventListener('mousemove',handleMove);
canvas.addEventListener('mouseup',handleUp);
canvas.addEventListener('touchstart',handleDown,{passive:false});
canvas.addEventListener('touchmove',handleMove,{passive:false});
canvas.addEventListener('touchend',handleUp,{passive:false});

function doCollapse(){
  gameOver=true;
  document.getElementById('msgText').innerHTML='탑이 무너졌습니다!<br>🧱 '+score+'개 성공!';
  document.getElementById('msg').style.display='block';
  _hub('jenga',score);
  towerTiltVel+=towerTilt>0?8:-8;
}
function checkCollapse(){
  // Only tilt check per frame (structure check is on removal only)
  if(Math.abs(towerTilt)>14)doCollapse();
}

function update(){
  if(gameOver)return;
  towerTiltVel+=(-towerTilt*0.025); // spring force
  towerTiltVel*=0.95; // damping
  // Gentle wobble, increases gradually after 5 removals
  const wobble=Math.max(0,removedCount-4)*0.3;
  towerTiltVel+=(Math.random()-0.5)*0.08*(1+wobble);
  towerTilt+=towerTiltVel;
  checkCollapse();
  recalcAll();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Background gradient
  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a18');bgGrad.addColorStop(1,'#151530');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  // Table surface
  const tableGrad=ctx.createLinearGradient(0,H-60,0,H);
  tableGrad.addColorStop(0,'#2a1810');tableGrad.addColorStop(1,'#1a1008');
  ctx.fillStyle=tableGrad;
  ctx.beginPath();ctx.roundRect(W/2-120,H-55,240,55,8);ctx.fill();
  // Table edge highlight
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(W/2-115,H-55,230,3);
  // Table shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(W/2,H-52,100,6,0,0,Math.PI*2);ctx.fill();
  for(const b of blocks){
    b.draw();
  }
  if(gameOver){
    ctx.save();
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#f00';
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

function gameLoop(){
  update();draw();
  requestAnimationFrame(gameLoop);
}

function restartGame(){initGame()}
initGame();gameLoop();
</script>

</body>
