<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth,500);
const H=Math.round(W*1.2);
canvas.width=W;canvas.height=H;

let mode='ai',gameState='menu',turn=0,wind=0,wins=0;
let terrain=[];
let selectedWeapon='basic',selectedTerrain='plain';
const WEAPONS={
  basic:{name:'💣기본포',speed:1,dmgMul:1,radius:25,color:'#ff0',splitCount:0,aoe:null},
  missile:{name:'🚀미사일',speed:1.5,dmgMul:0.6,radius:18,color:'#f80',splitCount:0,aoe:null},
  shotgun:{name:'🧨산탄',speed:0.9,dmgMul:0.5,radius:15,color:'#fa0',splitCount:3,aoe:null},
  fire:{name:'🔥화염탄',speed:1,dmgMul:0.8,radius:22,color:'#f40',splitCount:0,aoe:'fire'},
  ice:{name:'🧊얼음탄',speed:1,dmgMul:0.7,radius:22,color:'#4df',splitCount:0,aoe:'ice'}
};
let players=[
  {x:0,y:0,hp:100,maxHp:100,angle:45,color:'#6bf',name:'P1',weapon:'basic',powerUp:false,shield:false},
  {x:0,y:0,hp:100,maxHp:100,angle:135,color:'#f66',name:'P2',weapon:'basic',powerUp:false,shield:false}
];
let projectile=null,explosions=[],craters=[],trailParticles=[],confettiParts=[];
let fieldItems=[];
let aoeTiles=[];
let powerCharging=false,power=0,powerDir=1;
let animFrame;
let splitProjectiles=[];

function selectWeapon(w,el){selectedWeapon=w;document.querySelectorAll('.weapon-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');}
function selectTerrain(t,el){selectedTerrain=t;document.querySelectorAll('.terrain-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');}

function generateTerrain(){
  terrain=new Uint8Array(W*H);
  let heights=[];
  let baseH=H*0.55;
  for(let x=0;x<W;x++){
    let h=baseH;
    if(selectedTerrain==='plain'){
      h=H*0.6+Math.sin(x*0.01)*5+(Math.random()-0.5)*1;
    } else if(selectedTerrain==='mountain'){
      h=H*0.55+Math.sin(x*0.015)*40+Math.sin(x*0.04)*15+(Math.random()-0.5)*3;
      h=Math.max(H*0.3,Math.min(H*0.8,h));
    } else if(selectedTerrain==='valley'){
      let center=Math.abs(x-W/2)/(W/2);
      h=H*0.45+center*H*0.25+Math.sin(x*0.03)*8+(Math.random()-0.5)*2;
    } else if(selectedTerrain==='city'){
      h=H*0.6+Math.sin(x*0.02)*5;
      if(Math.floor(x/30)%3===0 && x>W*0.25 && x<W*0.75){
        h-=30+Math.random()*40;
      }
    } else if(selectedTerrain==='island'){
      h=H*0.6+Math.sin(x*0.02)*5;
      let isWater=(x>W*0.3&&x<W*0.42)||(x>W*0.58&&x<W*0.7);
      if(isWater) h=H*0.85;
    }
    heights.push(Math.floor(h));
  }
  for(let x=0;x<W;x++){
    for(let y=heights[x];y<H;y++){
      terrain[y*W+x]=1;
    }
  }
  players[0].x=Math.floor(W*0.15);
  players[1].x=Math.floor(W*0.85);
  for(let i=0;i<2;i++){
    let fy=0;
    for(let y=0;y<H;y++){if(terrain[y*W+players[i].x]){fy=y;break;}}
    players[i].y=fy;
  }
  spawnFieldItems();
}

function spawnFieldItems(){
  fieldItems=[];
  const types=['heal','power','shield'];
  const icons=['❤️','⚔️','🛡️'];
  for(let i=0;i<3;i++){
    let fx=W*0.25+Math.random()*W*0.5;
    let fy=0;
    for(let y=0;y<H;y++){if(terrain[y*W+Math.floor(fx)]){fy=y-10;break;}}
    fieldItems.push({x:fx,y:fy,type:types[i%3],icon:icons[i%3],alive:true,bob:Math.random()*Math.PI*2});
  }
}

function drawTerrain(){
  const img=ctx.createImageData(W,H);
  const isWater=selectedTerrain==='island';
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      if(terrain[y*W+x]){
        const depth=(y-H*0.4)/(H*0.6);
        if(isWater&&y>H*0.82&&((x>W*0.3&&x<W*0.42)||(x>W*0.58&&x<W*0.7))){
          img.data[i]=20;img.data[i+1]=60+Math.floor(depth*40);img.data[i+2]=140+Math.floor(depth*30);img.data[i+3]=255;
        } else if(selectedTerrain==='city'){
          img.data[i]=60+Math.floor(depth*30);img.data[i+1]=60+Math.floor(depth*30);img.data[i+2]=80+Math.floor(depth*30);img.data[i+3]=255;
        } else {
          img.data[i]=30+Math.floor(depth*40);img.data[i+1]=120+Math.floor(depth*60);img.data[i+2]=40+Math.floor(depth*30);img.data[i+3]=255;
        }
      }
    }
  }
  ctx.putImageData(img,0,0);
  // Draw AoE tiles
  aoeTiles=aoeTiles.filter(a=>{
    a.life--;
    if(a.life<=0)return false;
    ctx.globalAlpha=a.life/a.maxLife*0.5;
    ctx.fillStyle=a.type==='fire'?'#f60':'#4df';
    ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return true;
  });
  // Draw field items
  for(let it of fieldItems){
    if(!it.alive)continue;
    it.bob+=0.05;
    ctx.font='20px sans-serif';ctx.textAlign='center';
    ctx.fillText(it.icon,it.x,it.y+Math.sin(it.bob)*3);
  }
}

function drawSky(){
  const grad=ctx.createLinearGradient(0,0,0,H*0.5);
  grad.addColorStop(0,'#0a0a2e');
  grad.addColorStop(1,'#1a1a4e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<30;i++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.5+0.2})`;
    ctx.beginPath();
    ctx.arc(Math.random()*W,Math.random()*H*0.4,1,0,Math.PI*2);
    ctx.fill();
  }
}

function drawCannon(p,idx){
  const x=p.x,y=p.y;
  const angle=p.angle*Math.PI/180;
  const dir=idx===0?1:-1;
  // body
  ctx.fillStyle=p.color;
  ctx.beginPath();
  ctx.arc(x,y-12,14,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=2;ctx.stroke();
  // face
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x-4*dir,y-15,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4*dir,y-15,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-4*dir,y-15,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4*dir,y-15,1.5,0,Math.PI*2);ctx.fill();
  // mouth
  ctx.beginPath();ctx.arc(x,y-9,3,0,Math.PI);ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
  // barrel
  const bLen=22;
  const bx=x+Math.cos(angle)*bLen*(idx===0?1:-1);
  const by=y-12-Math.sin(angle)*bLen;
  ctx.strokeStyle='#555';ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y-12);ctx.lineTo(bx,by);ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(x,y-12);ctx.lineTo(bx,by);ctx.stroke();
  // highlight for current turn
  if(turn===idx&&gameState==='playing'&&!projectile){
    ctx.strokeStyle='#ff0';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(x,y-12,18,0,Math.PI*2);ctx.stroke();
  }
}

function drawExplosions(){
  explosions=explosions.filter(e=>{
    e.t++;
    const alpha=1-e.t/e.max;
    if(alpha<=0)return false;
    ctx.fillStyle=`rgba(255,${150-e.t*5},0,${alpha})`;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r*(e.t/e.max),0,Math.PI*2);ctx.fill();
    return true;
  });
}

function drawProjectile(){
  // Draw split projectiles
  for(let sp of splitProjectiles){
    ctx.fillStyle='#fa0';
    ctx.beginPath();ctx.arc(sp.x,sp.y,3,0,Math.PI*2);ctx.fill();
  }
  if(!projectile)return;
  const w=WEAPONS[projectile.weapon]||WEAPONS.basic;
  ctx.fillStyle=w.color;
  ctx.beginPath();ctx.arc(projectile.x,projectile.y,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(projectile.x,projectile.y,2,0,Math.PI*2);ctx.fill();
  // trail
  if(projectile.trail){
    for(let i=0;i<projectile.trail.length;i++){
      const a=i/projectile.trail.length*0.5;
      ctx.fillStyle=w.color.replace(')',','+a+')').replace('rgb','rgba').replace('#','');
      // Use hex-based alpha
      ctx.globalAlpha=a;ctx.fillStyle=w.color;
      ctx.beginPath();ctx.arc(projectile.trail[i].x,projectile.trail[i].y,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function destroyTerrain(cx,cy,radius){
  for(let y=Math.max(0,Math.floor(cy-radius));y<Math.min(H,Math.ceil(cy+radius));y++){
    for(let x=Math.max(0,Math.floor(cx-radius));x<Math.min(W,Math.ceil(cx+radius));x++){
      if(Math.hypot(x-cx,y-cy)<=radius){
        terrain[y*W+x]=0;
      }
    }
  }
}

function fire(pIdx,angle,pow){
  const p=players[pIdx];
  const w=WEAPONS[p.weapon]||WEAPONS.basic;
  const dir=pIdx===0?1:-1;
  const rad=angle*Math.PI/180;
  const speed=(pow*0.15+3)*w.speed;
  projectile={
    x:p.x+Math.cos(rad)*25*dir,
    y:p.y-12-Math.sin(rad)*25,
    vx:Math.cos(rad)*speed*dir,
    vy:-Math.sin(rad)*speed,
    trail:[],
    weapon:p.weapon,
    owner:pIdx
  };
  splitProjectiles=[];
}

function updateProjectile(){
  if(!projectile&&splitProjectiles.length===0)return;
  // Update split projectiles
  for(let si=splitProjectiles.length-1;si>=0;si--){
    let sp=splitProjectiles[si];
    sp.vx+=wind*0.001;sp.vy+=0.15;sp.x+=sp.vx;sp.y+=sp.vy;
    if(sp.x<-20||sp.x>W+20||sp.y>H+20){splitProjectiles.splice(si,1);continue;}
    let spx=Math.floor(sp.x),spy=Math.floor(sp.y);
    if(spx>=0&&spx<W&&spy>=0&&spy<H&&terrain[spy*W+spx]){
      miniExplode(sp.x,sp.y,sp.weapon,sp.owner);splitProjectiles.splice(si,1);continue;
    }
    for(let i=0;i<2;i++){
      if(Math.hypot(sp.x-players[i].x,sp.y-(players[i].y-12))<16){
        miniExplode(sp.x,sp.y,sp.weapon,sp.owner);splitProjectiles.splice(si,1);break;
      }
    }
  }
  if(!projectile){
    if(splitProjectiles.length===0){checkPostExplosion();nextTurn();}
    return;
  }
  projectile.trail.push({x:projectile.x,y:projectile.y});
  if(projectile.trail.length>20)projectile.trail.shift();
  const w=WEAPONS[projectile.weapon]||WEAPONS.basic;
  if(Math.random()<0.4) trailParticles.push({x:projectile.x,y:projectile.y,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:15,r:1+Math.random()*2,color:w.color});
  projectile.vx+=wind*0.001;
  projectile.vy+=0.15;
  projectile.x+=projectile.vx;
  projectile.y+=projectile.vy;
  if(projectile.x<-20||projectile.x>W+20||projectile.y>H+20){
    projectile=null;if(splitProjectiles.length===0)nextTurn();return;
  }
  const px=Math.floor(projectile.x),py=Math.floor(projectile.y);
  if(px>=0&&px<W&&py>=0&&py<H&&terrain[py*W+px]){
    explode(projectile.x,projectile.y);return;
  }
  for(let i=0;i<2;i++){
    if(Math.hypot(projectile.x-players[i].x,projectile.y-(players[i].y-12))<16){
      explode(projectile.x,projectile.y);return;
    }
  }
  // Check item pickup by projectile
  for(let it of fieldItems){
    if(!it.alive)continue;
    if(Math.hypot(projectile.x-it.x,projectile.y-it.y)<15){
      it.alive=false;
      applyItem(it.type,projectile.owner);
    }
  }
}

function miniExplode(ex,ey,weaponKey,owner){
  const w=WEAPONS[weaponKey]||WEAPONS.basic;
  const radius=w.radius*0.7;
  destroyTerrain(ex,ey,radius);
  explosions.push({x:ex,y:ey,r:radius,t:0,max:15});
  for(let i=0;i<2;i++){
    const dist=Math.hypot(ex-players[i].x,ey-(players[i].y-12));
    if(dist<radius+15){
      let dmg=Math.max(3,Math.floor(20*w.dmgMul*(1-dist/(radius+15))));
      if(players[projectile?projectile.owner:owner]&&players[projectile?projectile.owner:owner].powerUp){dmg*=2;}
      if(players[i].shield){dmg=Math.floor(dmg*0.5);players[i].shield=false;}
      players[i].hp=Math.max(0,players[i].hp-dmg);
      document.getElementById('hp'+(i+1)).style.width=((players[i].hp/players[i].maxHp)*100)+'%';
    }
  }
}

function applyItem(type,pIdx){
  const p=players[pIdx];
  if(type==='heal'){p.hp=Math.min(p.maxHp,p.hp+25);document.getElementById('hp'+(pIdx+1)).style.width=((p.hp/p.maxHp)*100)+'%';showItemMsg('❤️ +25 HP!');}
  else if(type==='power'){p.powerUp=true;showItemMsg('⚔️ 다음 공격 2배!');}
  else if(type==='shield'){p.shield=true;showItemMsg('🛡️ 피해 50% 감소!');}
}
function showItemMsg(txt){
  document.getElementById('itemStatus').textContent=txt;
  setTimeout(()=>{document.getElementById('itemStatus').textContent='';},2000);
}

function explode(ex,ey){
  const wKey=projectile?projectile.weapon:'basic';
  const owner=projectile?projectile.owner:0;
  const w=WEAPONS[wKey]||WEAPONS.basic;
  const radius=w.radius;
  destroyTerrain(ex,ey,radius);
  explosions.push({x:ex,y:ey,r:radius,t:0,max:20});
  craters.push({x:ex,y:ey,r:radius,alpha:0.6});
  // AoE effects
  if(w.aoe==='fire'){
    for(let i=0;i<6;i++) aoeTiles.push({x:ex+(Math.random()-0.5)*radius*2,y:ey+(Math.random()-0.5)*radius,r:8+Math.random()*8,life:60,maxLife:60,type:'fire'});
  } else if(w.aoe==='ice'){
    for(let i=0;i<6;i++) aoeTiles.push({x:ex+(Math.random()-0.5)*radius*2,y:ey+(Math.random()-0.5)*radius,r:8+Math.random()*8,life:80,maxLife:80,type:'ice'});
  }
  // Shotgun split
  if(w.splitCount>0){
    for(let s=0;s<w.splitCount;s++){
      let ang=-0.6+s*0.6;
      splitProjectiles.push({x:ex,y:ey,vx:Math.cos(ang)*3+(Math.random()-0.5),vy:-2-Math.random()*2,weapon:wKey,owner:owner});
    }
  }
  // damage
  for(let i=0;i<2;i++){
    const dist=Math.hypot(ex-players[i].x,ey-(players[i].y-12));
    if(dist<radius+15){
      let dmg=Math.max(5,Math.floor(35*w.dmgMul*(1-dist/(radius+15))));
      if(players[owner]&&players[owner].powerUp){dmg*=2;players[owner].powerUp=false;}
      if(players[i].shield){dmg=Math.floor(dmg*0.5);players[i].shield=false;}
      players[i].hp=Math.max(0,players[i].hp-dmg);
      document.getElementById('hp'+(i+1)).style.width=((players[i].hp/players[i].maxHp)*100)+'%';
    }
  }
  // AoE damage over time
  if(w.aoe==='fire'){
    let burnInterval=setInterval(()=>{
      for(let i=0;i<2;i++){
        if(Math.hypot(ex-players[i].x,ey-(players[i].y-12))<radius+10){
          players[i].hp=Math.max(0,players[i].hp-3);
          document.getElementById('hp'+(i+1)).style.width=((players[i].hp/players[i].maxHp)*100)+'%';
        }
      }
    },500);
    setTimeout(()=>clearInterval(burnInterval),3000);
  }
  projectile=null;
  // check win after short delay (let splits land first)
  if(splitProjectiles.length===0){
    setTimeout(()=>{checkPostExplosion();nextTurn();},300);
  }
}

function checkPostExplosion(){
  for(let i=0;i<2;i++){
    if(players[i].hp<=0){
      const winner=i===0?1:0;
      showKO(winner);return;
    }
  }
  // update positions (gravity)
  for(let i=0;i<2;i++){
    let fy=0;
    for(let y=Math.max(0,players[i].y-30);y<H;y++){
      if(terrain[y*W+Math.floor(players[i].x)]){fy=y;break;}
      if(y===H-1)fy=H-5;
    }
    players[i].y=fy;
  }
}

function showKO(winner){
  // Confetti
  for(let i=0;i<40;i++){
    confettiParts.push({x:W*Math.random(),y:-10,vx:(Math.random()-0.5)*3,vy:Math.random()*3+1,color:['#f44','#4f4','#44f','#ff0','#f0f','#0ff'][Math.floor(Math.random()*6)],life:120,r:3+Math.random()*3,rot:Math.random()*360});
  }
  // KO overlay
  const ko=document.getElementById('koOverlay');
  ko.style.display='flex';
  setTimeout(()=>{ko.style.display='none';endGame(winner);},1800);
}

function nextTurn(){
  turn=1-turn;
  wind=Math.floor(Math.random()*11)-5;
  updateUI();
  if(mode==='ai'&&turn===1){
    setTimeout(doAI,800);
  }
}

function doAI(){
  if(gameState!=='playing')return;
  const p=players[1];
  const target=players[0];
  const dx=p.x-target.x;
  const dy=target.y-p.y;
  let ang=Math.atan2(dy+40,dx)*180/Math.PI;
  ang=Math.max(10,Math.min(80,ang+(Math.random()-0.5)*15));
  let bestPow=40+Math.random()*30;
  p.angle=ang;
  fire(1,ang,bestPow);
}

function updateUI(){
  const absW=Math.abs(wind);
  const arrows=wind>0?'▸'.repeat(absW):wind<0?'◂'.repeat(absW):'―';
  const windColor=absW<=2?'#aef':absW<=4?'#fe8':'#f66';
  document.getElementById('windDisplay').innerHTML='바람: <span id="windArrowDisplay" style="color:'+windColor+';display:inline-block;animation:windPulse 1s infinite">'+arrows+'</span> <b>'+absW+'</b>';
  const turnText=turn===0?'🔵 YOUR TURN!':'🔴 '+(mode==='ai'?'AI TURN':'P2 TURN');
  document.getElementById('turnDisplay').innerHTML='<span style="animation:turnBounce 0.5s">'+turnText+'</span>';
  document.getElementById('angleShow').textContent=Math.floor(players[turn].angle)+'°';
  const pw=players[turn];
  let statTxt=WEAPONS[pw.weapon].name;
  if(pw.powerUp) statTxt+=' ⚔️2x';
  if(pw.shield) statTxt+=' 🛡️';
  document.getElementById('weaponHud').textContent=statTxt;
}

function endGame(winner){
  gameState='over';
  if(winner===0){wins++;_hub('fortress',wins);}
  document.getElementById('winnerText').textContent=(winner===0?'🔵 플레이어 1':'🔴 플레이어 2')+' 승리!';
  document.getElementById('winStats').textContent='총 승리 횟수: '+wins;
  document.getElementById('gameOverScreen').style.display='flex';
  document.getElementById('controls').style.display='none';
}

function startGame(m){
  mode=m;gameState='playing';turn=0;wind=Math.floor(Math.random()*11)-5;
  players[0].hp=100;players[1].hp=100;
  players[0].angle=45;players[1].angle=135;
  players[0].weapon=selectedWeapon;players[1].weapon=selectedWeapon;
  players[0].powerUp=false;players[1].powerUp=false;
  players[0].shield=false;players[1].shield=false;
  confettiParts=[];aoeTiles=[];splitProjectiles=[];
  document.getElementById('hp1').style.width='100%';
  document.getElementById('hp2').style.width='100%';
  document.getElementById('startScreen').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('controls').style.display='flex';
  generateTerrain();
  updateUI();
}

// Controls
const angleL=document.getElementById('angleLeftBtn');
const angleR=document.getElementById('angleRightBtn');
const fireBtn=document.getElementById('fireBtn');
const powerFill=document.getElementById('powerFill');

let holdInterval;
angleL.addEventListener('pointerdown',()=>{holdInterval=setInterval(()=>{
  if(turn===1&&mode==='ai')return;
  players[turn].angle=Math.min(170,players[turn].angle+2);
  document.getElementById('angleShow').textContent=Math.floor(players[turn].angle)+'°';
},50);});
angleL.addEventListener('pointerup',()=>clearInterval(holdInterval));
angleL.addEventListener('pointerleave',()=>clearInterval(holdInterval));
angleR.addEventListener('pointerdown',()=>{holdInterval=setInterval(()=>{
  if(turn===1&&mode==='ai')return;
  players[turn].angle=Math.max(10,players[turn].angle-2);
  document.getElementById('angleShow').textContent=Math.floor(players[turn].angle)+'°';
},50);});
angleR.addEventListener('pointerup',()=>clearInterval(holdInterval));
angleR.addEventListener('pointerleave',()=>clearInterval(holdInterval));

fireBtn.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  if(projectile||gameState!=='playing')return;
  if(turn===1&&mode==='ai')return;
  powerCharging=true;power=0;powerDir=1;
});
fireBtn.addEventListener('pointerup',()=>{
  if(!powerCharging)return;
  powerCharging=false;
  fire(turn,players[turn].angle,power);
  powerFill.style.width='0%';
});

function gameLoop(){
  drawSky();
  drawTerrain();
  drawCannon(players[0],0);
  drawCannon(players[1],1);
  // Draw craters
  for(let cr of craters){
    ctx.fillStyle=`rgba(40,20,0,${cr.alpha})`;
    ctx.beginPath();ctx.arc(cr.x,cr.y,cr.r*0.8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(80,40,0,${cr.alpha*0.5})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cr.x,cr.y,cr.r,0,Math.PI*2);ctx.stroke();
    cr.alpha=Math.max(0.1,cr.alpha-0.001);
  }
  drawProjectile();
  drawExplosions();
  // Trail particles
  trailParticles=trailParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life/15;
    ctx.fillStyle=p.color||'rgba(255,150,50,1)';
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/15),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return true;
  });
  // Confetti
  confettiParts=confettiParts.filter(c=>{
    c.x+=c.vx;c.y+=c.vy;c.vy+=0.05;c.rot+=5;c.life--;
    if(c.life<=0)return false;
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot*Math.PI/180);
    ctx.globalAlpha=Math.min(1,c.life/30);
    ctx.fillStyle=c.color;
    ctx.fillRect(-c.r/2,-c.r/2,c.r,c.r*0.6);
    ctx.restore();ctx.globalAlpha=1;
    return true;
  });
  if(powerCharging){
    power+=powerDir*2;
    if(power>=100)powerDir=-1;
    if(power<=0)powerDir=1;
    powerFill.style.width=power+'%';
  }
  if(projectile)updateProjectile();
  animFrame=requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
