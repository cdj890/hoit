<script>
const COLORS={red:'#e74c3c',yellow:'#f1c40f',green:'#2ecc71',blue:'#3498db',wild:'#333'};
const COLOR_KR={red:'빨',yellow:'노',green:'초',blue:'파'};
const CKEYS=['red','yellow','green','blue'];

function makeDeck(){
  const d=[];
  CKEYS.forEach(c=>{
    d.push({color:c,value:'0',points:0});
    for(let n=1;n<=9;n++){d.push({color:c,value:String(n),points:n});d.push({color:c,value:String(n),points:n});}
    for(let k=0;k<2;k++){
      d.push({color:c,value:'⊘',points:20});// skip
      d.push({color:c,value:'⇄',points:20});// reverse
      d.push({color:c,value:'+2',points:20});// draw2
    }
  });
  for(let k=0;k<4;k++){
    d.push({color:'wild',value:'W',points:50});
    d.push({color:'wild',value:'W+4',points:50});
  }
  return d;
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let deck,discardPile,hands,currentPlayer,direction,topCard,chosenColor,totalScore,gameOver,pendingWild;
totalScore=parseInt(localStorage.getItem('uno_score')||'0');

function init(){
  deck=shuffle(makeDeck());
  discardPile=[];
  hands=[[],[],[]];// 0=player,1=ai1,2=ai2
  direction=1;currentPlayer=0;gameOver=false;pendingWild=null;
  for(let i=0;i<7;i++)hands.forEach(h=>h.push(deck.pop()));
  // First discard (no wild)
  let first;
  do{first=deck.pop();if(first.color==='wild')deck.unshift(first);}while(first.color==='wild');
  discardPile.push(first);
  topCard=first;chosenColor=first.color;
  render();
  if(currentPlayer!==0)setTimeout(aiTurn,800);
}

function cardValue(c){
  if(c.value==='W')return 'W';
  if(c.value==='W+4')return 'W+4';
  return c.value;
}

function canPlay(c){
  if(c.color==='wild')return true;
  if(c.color===chosenColor)return true;
  if(c.value===topCard.value&&c.value!=='W'&&c.value!=='W+4')return true;
  return false;
}

function playCard(hand,idx,newColor){
  const c=hand.splice(idx,1)[0];
  discardPile.push(c);
  topCard=c;
  chosenColor=c.color==='wild'?newColor:c.color;
  // Effects - skip/draw cards advance currentPlayer so caller should NOT advance again
  let extraAdvanced=false;
  if(c.value==='⊘'){currentPlayer=(currentPlayer+direction+3)%3;extraAdvanced=true;}// skip next
  else if(c.value==='⇄'){direction*=-1;if(hands.filter(h=>h.length>0).length<=2){currentPlayer=(currentPlayer+direction+3)%3;extraAdvanced=true;}}
  else if(c.value==='+2'){const np=(currentPlayer+direction+3)%3;for(let i=0;i<2;i++){if(!deck.length)recycleDeck();if(deck.length)hands[np].push(deck.pop());}currentPlayer=(currentPlayer+direction+3)%3;extraAdvanced=true;}
  else if(c.value==='W+4'){const np=(currentPlayer+direction+3)%3;for(let i=0;i<4;i++){if(!deck.length)recycleDeck();if(deck.length)hands[np].push(deck.pop());}currentPlayer=(currentPlayer+direction+3)%3;extraAdvanced=true;}
  // Check win
  if(hand.length===0){endRound(hands.indexOf(hand)===-1?currentPlayer:players_indexOf(hand));return true;}
  // Return 'skip' to signal caller should not advance
  return extraAdvanced?'skip':false;
}

function players_indexOf(hand){return hands.indexOf(hand);}

function recycleDeck(){
  if(discardPile.length<=1)return;
  const top=discardPile.pop();
  deck=shuffle(discardPile);
  discardPile=[top];
}

function drawCard(hand){
  if(!deck.length)recycleDeck();
  if(deck.length)hand.push(deck.pop());
}

function render(){
  const dc=document.getElementById('discard');
  dc.style.background=topCard.color==='wild'?COLORS[chosenColor]:COLORS[topCard.color];
  dc.style.color=topCard.color==='yellow'?'#333':'#fff';
  dc.textContent=cardValue(topCard);

  document.getElementById('ai1cnt').textContent=hands[1].length;
  document.getElementById('ai2cnt').textContent=hands[2].length;

  const hEl=document.getElementById('hand');
  hEl.innerHTML='';
  hands[0].forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card'+(canPlay(c)?' playable':'');
    el.style.background=COLORS[c.color];
    el.style.color=c.color==='yellow'?'#333':'#fff';
    el.textContent=cardValue(c);
    if(canPlay(c)&&currentPlayer===0&&!gameOver){
      el.onclick=()=>playerPlay(i);
    }
    hEl.appendChild(el);
  });

  document.getElementById('msg').textContent=
    gameOver?'':currentPlayer===0?'카드를 선택하세요':`${['나','AI-1','AI-2'][currentPlayer]} 차례...`;
  document.getElementById('score').textContent=`누적 점수: ${totalScore}`;
}

function playerPlay(idx){
  if(currentPlayer!==0||gameOver)return;
  const c=hands[0][idx];
  if(!canPlay(c))return;
  if(c.color==='wild'){
    pendingWild=idx;
    document.getElementById('colorPick').classList.add('show');
    return;
  }
  const result=playCard(hands[0],idx,null);
  if(result===true)return;
  if(result==='skip'){render();if(currentPlayer!==0)setTimeout(aiTurn,700);return;}
  advance();
}

function pickColor(col){
  document.getElementById('colorPick').classList.remove('show');
  if(pendingWild===null)return;
  const idx=pendingWild;pendingWild=null;
  const result=playCard(hands[0],idx,col);
  if(result===true)return;
  if(result==='skip'){render();if(currentPlayer!==0)setTimeout(aiTurn,700);return;}
  advance();
}

function playerDraw(){
  if(currentPlayer!==0||gameOver)return;
  drawCard(hands[0]);
  advance();
}

function advance(){
  currentPlayer=(currentPlayer+direction+3)%3;
  render();
  if(currentPlayer!==0)setTimeout(aiTurn,700);
}

function aiTurn(){
  if(gameOver)return;
  const hand=hands[currentPlayer];
  // Find playable
  let playable=hand.map((c,i)=>({c,i})).filter(x=>canPlay(x.c));
  if(playable.length>0){
    // Prefer non-wild, then highest points
    playable.sort((a,b)=>{
      if(a.c.color==='wild'&&b.c.color!=='wild')return 1;
      if(b.c.color==='wild'&&a.c.color!=='wild')return -1;
      return b.c.points-a.c.points;
    });
    const pick=playable[0];
    let col=null;
    if(pick.c.color==='wild'){
      // Pick most common color
      const counts={};CKEYS.forEach(k=>counts[k]=0);
      hand.forEach(c=>{if(c.color!=='wild')counts[c.color]++;});
      col=CKEYS.reduce((a,b)=>counts[a]>=counts[b]?a:b);
    }
    const result=playCard(hand,pick.i,col);
    if(result===true)return;
    if(result==='skip'){render();if(currentPlayer!==0)setTimeout(aiTurn,700);return;}
  } else {
    drawCard(hand);
  }
  currentPlayer=(currentPlayer+direction+3)%3;
  render();
  if(currentPlayer!==0)setTimeout(aiTurn,700);
}

function endRound(winner){
  gameOver=true;
  let roundScore=0;
  hands.forEach((h,i)=>{if(i!==winner)h.forEach(c=>roundScore+=c.points);});
  if(winner===0){
    totalScore+=roundScore;
    localStorage.setItem('uno_score',String(totalScore));
    _hub('uno',totalScore);
    document.getElementById('msg').textContent=`🎉 승리! +${roundScore}점 (총 ${totalScore}점)`;
  } else {
    document.getElementById('msg').textContent=`${['나','AI-1','AI-2'][winner]} 승리! 이번 라운드 ${roundScore}점`;
  }
  render();
  const actEl=document.getElementById('actions');
  actEl.innerHTML='<button onclick="init()">다시 하기</button>';
}

init();
</script>
