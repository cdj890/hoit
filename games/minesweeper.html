<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
#wrap{text-align:center}
h1{font-size:40px;margin-bottom:6px;color:#74b9ff}
.sub{font-size:14px;color:#aaa;margin-bottom:12px}
#info{font-size:16px;margin-bottom:10px;color:#dfe6e9;display:flex;justify-content:center;gap:24px}
#board{display:inline-grid;grid-template-columns:repeat(9,1fr);gap:3px;padding:10px;background:rgba(255,255,255,0.05);border-radius:14px}
.cell{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;cursor:pointer;transition:background .1s}
.cell-hidden{background:rgba(116,185,255,0.25)}
.cell-hidden:hover{background:rgba(116,185,255,0.45)}
.cell-revealed{background:rgba(255,255,255,0.08)}
.cell-mine{background:rgba(214,48,49,0.4)}
.cell-flag{background:rgba(253,203,110,0.35)}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#overlay h2{font-size:32px;margin-bottom:12px;color:#74b9ff}
#overlay p{font-size:16px;color:#dfe6e9;margin-bottom:6px}
.btn{display:inline-block;margin-top:16px;padding:12px 32px;background:#0984e3;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:bold}
.btn:hover{background:#0652DD}
#stats{font-size:13px;color:#636e72;margin-top:10px}
canvas{max-width:100%!important;height:auto!important;display:block;margin:0 auto}body{overflow-x:hidden}
</style>

<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

<div id="wrap">
<div id="overlay">
<h2>💣 지뢰찾기</h2>
<p>9×9 칸에 숨겨진 10개의 지뢰를 찾으세요!</p>
<p style="font-size:13px;color:#b2bec3">좌클릭: 열기 | 우클릭: 깃발</p>
<button class="btn" onclick="startGame()">게임 시작</button>
</div>
<h1>💣 지뢰찾기</h1>
<div class="sub">지뢰를 피해 모든 칸을 열어보세요!</div>
<div id="info"><span>💣 남은 지뢰: <span id="mcount">10</span></span><span>⏱ <span id="timer">0</span>초</span></div>
<div id="board"></div>
<div id="stats"></div>
</div>

<script>
const R=9,C=9,MINES=10;
const NUMCOLORS=['','#74b9ff','#00b894','#e17055','#6c5ce7','#d63031','#00cec9','#2d3436','#636e72'];
let grid,revealed,flagged,mines,gameOver,firstClick,timerID,seconds,totalWins;

totalWins=parseInt(localStorage.getItem('ms_wins')||'0');

function startGame(){
 document.getElementById('overlay').style.display='none';
 grid=Array(R).fill(null).map(()=>Array(C).fill(0));
 revealed=Array(R).fill(null).map(()=>Array(C).fill(false));
 flagged=Array(R).fill(null).map(()=>Array(C).fill(false));
 mines=new Set();gameOver=false;firstClick=true;seconds=0;
 clearInterval(timerID);
 document.getElementById('timer').textContent='0';
 document.getElementById('mcount').textContent=MINES;
 render();updateStats();
}

function placeMines(sr,sc){
 while(mines.size<MINES){
  let r=Math.floor(Math.random()*R),c=Math.floor(Math.random()*C);
  if(r===sr&&c===sc)continue;
  if(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1)continue;
  mines.add(r*C+c);
 }
 mines.forEach(m=>{grid[Math.floor(m/C)][m%C]=-1;});
 for(let r=0;r<R;r++)for(let c=0;c<C;c++){
  if(grid[r][c]===-1)continue;
  let cnt=0;
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
   let nr=r+dr,nc=c+dc;
   if(nr>=0&&nr<R&&nc>=0&&nc<C&&grid[nr][nc]===-1)cnt++;
  }
  grid[r][c]=cnt;
 }
}

function reveal(r,c){
 if(r<0||r>=R||c<0||c>=C||revealed[r][c]||flagged[r][c])return;
 revealed[r][c]=true;
 if(grid[r][c]===0){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);
 }
}

function checkWin(){
 let cnt=0;
 for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(revealed[r][c])cnt++;
 return cnt===R*C-MINES;
}

function cellClick(r,c){
 if(gameOver||flagged[r][c])return;
 if(firstClick){
  firstClick=false;placeMines(r,c);
  timerID=setInterval(()=>{seconds++;document.getElementById('timer').textContent=seconds;},1000);
 }
 if(grid[r][c]===-1){
  gameOver=true;clearInterval(timerID);
  mines.forEach(m=>{revealed[Math.floor(m/C)][m%C]=true;});
  render();
  setTimeout(()=>{
   let ov=document.getElementById('overlay');
   ov.style.display='flex';
   ov.innerHTML=`<h2>💥 펑! 게임 오버</h2><p>시간: ${seconds}초</p><button class="btn" onclick="startGame()">다시 하기</button>`;
  },500);
  return;
 }
 reveal(r,c);render();
 if(checkWin()){
  gameOver=true;clearInterval(timerID);
  totalWins++;localStorage.setItem('ms_wins',totalWins);
  _hub('minesweeper',totalWins);
  setTimeout(()=>{
   let ov=document.getElementById('overlay');
   ov.style.display='flex';
   ov.innerHTML=`<h2>🎉 클리어!</h2><p>${seconds}초 만에 성공!</p><p>총 승리: ${totalWins}회</p><button class="btn" onclick="startGame()">다시 하기</button>`;
  },300);
 }
}

function cellRightClick(e,r,c){
 e.preventDefault();
 if(gameOver||revealed[r][c])return;
 flagged[r][c]=!flagged[r][c];
 let fc=0;for(let i=0;i<R;i++)for(let j=0;j<C;j++)if(flagged[i][j])fc++;
 document.getElementById('mcount').textContent=MINES-fc;
 render();
}

function render(){
 const b=document.getElementById('board');b.innerHTML='';
 for(let r=0;r<R;r++)for(let c=0;c<C;c++){
  let d=document.createElement('div');d.className='cell';
  if(revealed[r][c]){
   if(grid[r][c]===-1){d.className+=' cell-mine';d.textContent='💣';}
   else{d.className+=' cell-revealed';if(grid[r][c]>0){d.textContent=grid[r][c];d.style.color=NUMCOLORS[grid[r][c]];}}
  }else if(flagged[r][c]){
   d.className+=' cell-flag';d.textContent='🚩';
  }else{
   d.className+=' cell-hidden';
  }
  d.addEventListener('click',()=>cellClick(r,c));
  d.addEventListener('contextmenu',e=>cellRightClick(e,r,c));
  let longT;
  d.addEventListener('touchstart',e=>{e.preventDefault();longT=setTimeout(()=>{if(gameOver||revealed[r][c]){longT=null;return;}flagged[r][c]=!flagged[r][c];let fc=0;for(let i=0;i<R;i++)for(let j=0;j<C;j++)if(flagged[i][j])fc++;document.getElementById('mcount').textContent=MINES-fc;render();longT=null;},500);},{passive:false});
  d.addEventListener('touchend',()=>{if(longT){clearTimeout(longT);longT=null;}});
  d.addEventListener('touchmove',()=>{if(longT){clearTimeout(longT);longT=null;}});
  b.appendChild(d);
 }
}

function updateStats(){
 document.getElementById('stats').textContent='총 승리: '+totalWins+'회';
}
</script>
