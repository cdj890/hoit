<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<canvas id="c"></canvas>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='undefined')r=0;if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;};}
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=Math.min(window.innerWidth,420),H=Math.min(window.innerHeight,700);
c.width=W;c.height=H;

const BH=25;let state='menu',score=0,blocks=[],current,speed,dir,hs=parseInt(localStorage.getItem('stack_hs')||'0');
let perfectCount=0,floatingTexts=[],swayAngle=0,swaySpeed=0;

function initGame(){
  state='playing';score=0;speed=2;dir=1;perfectCount=0;floatingTexts=[];swayAngle=0;swaySpeed=0;
  blocks=[{x:W/2-60,w:120,y:H-BH,color:hsl(0)}];
  current={x:0,w:120,y:H-BH*2,color:hsl(30)};
}

function hsl(h){return `hsl(${h%360},65%,55%)`;}

function drop(){
  if(state!=='playing')return;
  const prev=blocks[blocks.length-1];
  const overlap_left=Math.max(current.x,prev.x);
  const overlap_right=Math.min(current.x+current.w,prev.x+prev.w);
  const overlap=overlap_right-overlap_left;
  if(overlap<=0){state='done';if(score>hs){hs=score;localStorage.setItem('stack_hs',hs);}_hub('stack',score);return;}
  const isPerfect=Math.abs(overlap-prev.w)<3;
  const finalW=isPerfect?prev.w:overlap;
  const finalX=isPerfect?prev.x:overlap_left;
  blocks.push({x:finalX,w:finalW,y:current.y,color:current.color});
  score++;
  // Perfect bonus
  if(isPerfect){perfectCount++;floatingTexts.push({x:W/2,y:current.y,text:perfectCount>1?'PERFECT x'+perfectCount+'!':'PERFECT!',color:'#FFD700',life:40,vy:-1.5});swaySpeed=0;}
  else{perfectCount=0;swaySpeed=Math.min(0.02,Math.abs(current.x-prev.x)*0.001);}
  // Near edge warning
  if(!isPerfect&&overlap<prev.w*0.3){floatingTexts.push({x:W/2,y:current.y-15,text:'위험!',color:'#ff4444',life:25,vy:-1});}
  // Height metaphor
  const names=['기초','1층','2층','3층','4층','5층','6층','7층','8층','9층','10층','옥상','하늘','구름','성층권','우주'];
  speed=Math.min(6,2+score*0.15);
  current={x:0,w:finalW,y:current.y-BH,color:hsl(score*30)};dir=1;
}

c.addEventListener('touchstart',e=>{e.preventDefault();if(state==='menu')initGame();else if(state==='playing')drop();else{state='menu';}},{passive:false});
c.addEventListener('click',()=>{if(state==='menu')initGame();else if(state==='playing')drop();else state='menu';});

function update(){
  if(state!=='playing')return;
  current.x+=speed*dir;
  if(current.x+current.w>W){dir=-1;current.x=W-current.w;}
  if(current.x<0){dir=1;current.x=0;}
  swayAngle+=swaySpeed;
  floatingTexts=floatingTexts.filter(t=>{t.y+=t.vy;t.life--;return t.life>0;});
}

function draw(){
  ctx.fillStyle='#0f0f1e';ctx.fillRect(0,0,W,H);
  if(state==='menu'){
    ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.fillText('📦 블록 쌓기',W/2,H/2-60);
    ctx.fillStyle='#aaa';ctx.font='16px sans-serif';ctx.fillText('탭하여 블록을 떨어뜨리세요!',W/2,H/2-20);
    ctx.fillStyle='#42A5F5';ctx.font='bold 20px sans-serif';ctx.fillText('탭하여 시작',W/2,H/2+30);
    if(hs){ctx.fillStyle='#888';ctx.font='14px sans-serif';ctx.fillText(`최고: ${hs}층`,W/2,H/2+65);}
    // demo blocks
    for(let i=0;i<5;i++){ctx.fillStyle=hsl(i*40);ctx.beginPath();ctx.roundRect(W/2-50+i*5,H/2+80+i*BH,100-i*10,BH-2,4);ctx.fill();}
  } else {
    // camera offset
    const camY=Math.min(0,H*0.6-current.y);
    ctx.save();ctx.translate(0,camY);
    // Building sway
    if(swayAngle!==0){ctx.translate(W/2,H);ctx.rotate(Math.sin(swayAngle)*0.005*Math.min(score,20));ctx.translate(-W/2,-H);}
    blocks.forEach(b=>{ctx.fillStyle=b.color;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,BH-2,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.roundRect(b.x+2,b.y+2,b.w-4,BH/3,3);ctx.fill();});
    if(state==='playing'){ctx.fillStyle=current.color;ctx.beginPath();ctx.roundRect(current.x,current.y,current.w,BH-2,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.roundRect(current.x+2,current.y+2,current.w-4,BH/3,3);ctx.fill();}
    ctx.restore();
    // Floating texts
    for(let t of floatingTexts){const ty=t.y+camY;ctx.globalAlpha=Math.min(1,t.life/15);ctx.fillStyle=t.color;ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(t.text,t.x,ty);}
    ctx.globalAlpha=1;
    // HUD
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,45);
    ctx.fillStyle='#FFD700';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText(`${score}층`,W/2,20);
    const names=['기초','1층','2층','3층','4층','5층','아파트','빌딩','타워','마천루','하늘','구름','성층권','우주','은하'];
    ctx.fillStyle='#aaa';ctx.font='12px sans-serif';ctx.fillText(names[Math.min(score,names.length-1)],W/2,36);
    if(state==='done'){
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H/2-60,W,130);
      ctx.fillStyle='#FF6B6B';ctx.font='bold 28px sans-serif';ctx.fillText(`${score}층!`,W/2,H/2-15);
      ctx.fillStyle=score>=hs?'#4CAF50':'#aaa';ctx.font='16px sans-serif';ctx.fillText(score>=hs?'새 기록!':'게임 오버',W/2,H/2+15);
      ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText('탭하여 다시',W/2,H/2+50);
    }
  }
  ctx.textAlign='left';
}
(function loop(){update();draw();requestAnimationFrame(loop);})();
