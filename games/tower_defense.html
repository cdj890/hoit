*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;user-select:none}
#wrap{position:relative;display:none}
canvas{border-radius:12px 12px 0 0;display:block;box-shadow:0 0 40px rgba(100,150,255,0.15)}
#bottom{max-width:100%;overflow-x:auto;background:rgba(15,15,30,0.97);border-radius:0 0 12px 12px;padding:8px}
#towers{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:6px}
.tb{background:#1a1a2e;border:2px solid #333;border-radius:8px;padding:4px 6px;cursor:pointer;font-size:10px;text-align:center;min-width:62px;transition:all .15s;color:#ccc}
.tb:hover{border-color:#77f;transform:scale(1.05)}
.tb.sel{border-color:#FFD700;background:#252545;box-shadow:0 0 8px rgba(255,215,0,0.3)}
.tb.no{opacity:0.35}
.tb .tn{font-weight:bold;font-size:11px}
.tb .tc{color:#FFD700;font-size:10px}
#acts{display:flex;gap:5px;justify-content:center;align-items:center;flex-wrap:wrap}
#acts button{border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:bold;transition:all .15s;color:#fff}
#acts button:hover{transform:scale(1.05)}
#wave-btn{background:#4CAF50}
#wave-btn:disabled{background:#444;cursor:default;transform:none}
.spd-btn{background:#555;min-width:40px;text-align:center}
.spd-btn.active{background:#FF9800}
#sell-btn{background:#c0392b;display:none}
#upgrade-btn{background:#2980b9;display:none}
#merge-btn{background:#8e44ad;display:none}
#info{color:#777;font-size:11px;text-align:center;padding:3px;background:rgba(15,15,30,0.97);border-radius:0 0 12px 12px}
/* Menu */
#menu{text-align:center;max-width:750px;padding:20px}
#menu h1{font-size:42px;margin-bottom:5px;background:linear-gradient(135deg,#FFD700,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#menu p.sub{color:#888;margin-bottom:25px;font-size:15px}
.maps{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.map-card{background:#1a1a2e;border:2px solid #333;border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.map-card:hover{border-color:#FFD700;transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,215,0,0.15)}
.map-card canvas{border-radius:8px;width:100%;height:100px;margin-bottom:8px}
.map-card h3{font-size:16px;margin-bottom:3px}
.map-card p{color:#888;font-size:12px}
.map-card .hs{color:#FFD700;font-size:13px;margin-top:4px}
canvas{max-width:100%!important;height:auto!important;display:block;margin:0 auto}body{overflow-x:hidden}

function buildMenu(){
  const g=document.getElementById('map-grid');
  g.innerHTML='';
  MAPS.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='map-card';
    card.onclick=()=>startMap(i);
    const cv=document.createElement('canvas');
    cv.width=200;cv.height=100;
    drawMiniMap(cv,m);
    card.appendChild(cv);
    const h=document.createElement('h3');h.textContent=m.name;card.appendChild(h);
    const p=document.createElement('p');p.textContent=m.desc;card.appendChild(p);
    if(highScores[i]>0){const hs=document.createElement('div');hs.className='hs';hs.textContent=`🏆 최고 웨이브 ${highScores[i]}`;card.appendChild(hs);}
    g.appendChild(card);
  });
}

function drawMiniMap(cv,m){
  const c=cv.getContext('2d'),tw=cv.width/COLS,th=cv.height/ROWS;
  c.fillStyle='#16213e';c.fillRect(0,0,cv.width,cv.height);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(m.grid[y][x]===0){c.fillStyle=(x+y)%2?'#4a8030':'#5a9038';}
    else{c.fillStyle='#b8956a';}
    c.fillRect(x*tw,y*th,tw+0.5,th+0.5);
  }
  // Draw path
  c.strokeStyle=m.color+'80';c.lineWidth=2;c.beginPath();
  m.path.forEach((p,i)=>{const px=p.x*tw+tw/2,py=p.y*th+th/2;i?c.lineTo(px,py):c.moveTo(px,py);});c.stroke();
  if(m.path2){c.beginPath();m.path2.forEach((p,i)=>{const px=p.x*tw+tw/2,py=p.y*th+th/2;i?c.lineTo(px,py):c.moveTo(px,py);});c.stroke();}
  if(m.path3){c.beginPath();m.path3.forEach((p,i)=>{const px=p.x*tw+tw/2,py=p.y*th+th/2;i?c.lineTo(px,py):c.moveTo(px,py);});c.stroke();}
}

function startMap(i){
  curMap=i;mapData=MAPS[i];

  document.getElementById('wrap').style.display='block';
  initGame();
}

function backToMenu(){
  document.getElementById('menu').style.display='block';
  document.getElementById('wrap').style.display='none';
  buildMenu();
}

function initGame(){

  enemies=[];towers=[];projs=[];particles=[];pops=[];
  waveActive=false;spawnT=0;spawnC=0;
  selTower=-1;selPlaced=null;state='playing';score=0;frame=0;gameSpeed=1;
  buildTowerUI();updateUI();
}

function buildTowerUI(){
  const d=document.getElementById('towers');d.innerHTML='';
  TDEFS.forEach((t,i)=>{
    const b=document.createElement('div');b.className='tb';b.id='tb'+i;
    b.innerHTML=`<div class="tn">${t.emoji}${t.name}</div><div style="color:#aaa;font-size:9px">${t.desc}</div><div class="tc">${t.cost}G</div>`;
    b.onclick=()=>selectTower(i);d.appendChild(b);
  });
}

function setSpeed(s){
  gameSpeed=s;
  [1,2,4].forEach(v=>{document.getElementById('spd'+v).classList.toggle('active',v===s);});
}

function selectTower(i){selTower=selTower===i?-1:i;selPlaced=null;updateUI();}
function startWave(){
  if(waveActive||state!=='playing')return;
  wave++;waveActive=true;spawnC=0;spawnT=0;updateUI();
}

function updateUI(){
  TDEFS.forEach((d,i)=>{const b=document.getElementById('tb'+i);if(!b)return;b.classList.toggle('sel',selTower===i);b.classList.toggle('no',gold<d.cost);});
  const wb=document.getElementById('wave-btn');
  wb.textContent=waveActive?`웨이브 ${wave} 진행중...`:`웨이브 ${wave+1} 시작 [Space]`;
  wb.disabled=waveActive;
  const ub=document.getElementById('upgrade-btn'),sb=document.getElementById('sell-btn'),mb=document.getElementById('merge-btn');
  if(selPlaced){
    const t=selPlaced,uc=getUCost(t);
    ub.style.display='inline-block';ub.textContent=t.level>=3?'최대Lv':`업그레이드(${uc}G)[U]`;ub.disabled=t.level>=3||gold<uc;
    sb.style.display='inline-block';sb.textContent=`팔기(+${getSellG(t)}G)[S]`;
    const mp=findMerge(t);mb.style.display=mp?'inline-block':'none';if(mp)mb.textContent=`합체→Lv${t.level+1}[M]`;
  } else {ub.style.display=sb.style.display=mb.style.display='none';}
  const info=document.getElementById('info');
  if(selPlaced){const t=selPlaced;info.textContent=`${TDEFS[t.type].emoji}${TDEFS[t.type].name} Lv${t.level} | 공격:${t.dmg|0} 사거리:${t.range.toFixed(1)} | U:업그레이드 S:팔기 M:합체`;info.style.color='#FFD700';}
  else if(selTower>=0){info.textContent=`${TDEFS[selTower].emoji}${TDEFS[selTower].name} 배치중 | 풀밭 클릭 | ESC 취소`;info.style.color='#7DF';}
  else{info.textContent=`💰${gold} ❤️${lives} 웨이브${wave} 점수:${score} | 1~8:타워 Space:웨이브 Q:메뉴`;info.style.color='#888';}
}

function getUCost(t){return Math.floor(TDEFS[t.type].cost*(0.6+t.level*0.4));}
function getSellG(t){return Math.floor(TDEFS[t.type].cost*0.5*t.level);}
function findMerge(t){return towers.find(o=>o!==t&&o.type===t.type&&o.level===t.level&&o.level<3&&Math.abs(o.gx-t.gx)<=1&&Math.abs(o.gy-t.gy)<=1);}

function upgradeTower(){if(!selPlaced||selPlaced.level>=3)return;const c=getUCost(selPlaced);if(gold<c)return;gold-=c;selPlaced.level++;applyLv(selPlaced);
  pops.push({x:selPlaced.x,y:selPlaced.y-20,text:`Lv${selPlaced.level}!`,life:40,maxLife:40,color:'#7DF'});updateUI();}
function sellTower(){if(!selPlaced)return;const g=getSellG(selPlaced);gold+=g;
  pops.push({x:selPlaced.x,y:selPlaced.y-20,text:`+${g}G`,life:35,maxLife:35,color:'#FFD700'});
  towers=towers.filter(t=>t!==selPlaced);selPlaced=null;updateUI();}
function mergeTower(){if(!selPlaced)return;const p=findMerge(selPlaced);if(!p)return;towers=towers.filter(t=>t!==p);selPlaced.level++;applyLv(selPlaced);
  for(let i=0;i<12;i++){const a=Math.random()*6.28,s=2+Math.random()*3;particles.push({x:selPlaced.x,y:selPlaced.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:hexRgb(selPlaced.color),life:25,maxLife:25,size:3});}
  pops.push({x:selPlaced.x,y:selPlaced.y-25,text:`합체!Lv${selPlaced.level}`,life:50,maxLife:50,color:'#E040FB'});updateUI();}

function applyLv(t){const d=TDEFS[t.type],l=t.level;t.dmg=d.dmg*(1+0.5*(l-1));t.range=d.range*(1+0.1*(l-1));t.rate=Math.max(8,d.rate*(1-0.1*(l-1)));t.splash=d.splash*(1+0.15*(l-1));}
function hexRgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// ============ INPUT ============
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();mx=Math.floor((e.clientX-r.left)*(C.width/r.width)/T);my=Math.floor((e.clientY-r.top)*(C.height/r.height)/T);});
C.addEventListener('mouseleave',()=>{mx=-1;my=-1;});
C.addEventListener('click',e=>{
  if(state==='gameover'){backToMenu();return;}
  if(state!=='playing'||mx<0||my<0||mx>=COLS||my>=ROWS)return;
  const clicked=towers.find(t=>t.gx===mx&&t.gy===my);
  if(clicked){selPlaced=selPlaced===clicked?null:clicked;selTower=-1;updateUI();return;}
  if(selTower<0)return;
  if(mapData.grid[my][mx]!==0)return;
  const d=TDEFS[selTower];if(gold<d.cost)return;gold-=d.cost;
  towers.push({gx:mx,gy:my,x:mx*T+T/2,y:my*T+T/2,type:selTower,cooldown:0,angle:0,level:1,
    dmg:d.dmg,range:d.range,rate:d.rate,splash:d.splash,color:d.color,proj:d.proj,psz:d.psz,spd:d.spd,spec:d.spec,attackAnim:0});
  updateUI();
});
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();startWave();}
  if(e.key==='Escape'){selTower=-1;selPlaced=null;updateUI();}
  if(e.key==='q'||e.key==='Q'){if(state==='gameover')backToMenu();else if(!waveActive&&state==='playing'){backToMenu();}}
  const n=parseInt(e.key);if(n>=1&&n<=8)selectTower(n-1);
  if(e.key==='u'||e.key==='U')upgradeTower();
  if(e.key==='s'||e.key==='S')sellTower();
  if(e.key==='m'||e.key==='M')mergeTower();
});

// ============ GAME LOGIC ============
function enCount(){return 6+wave*2+(wave>10?wave:0);}
function enHP(){return 25+wave*22+(wave>10?wave*wave:0);}
function enSpeed(){return 0.7+wave*0.03;}
function enGold(){return 4+wave*2;}

function getPaths(){
  const paths=[mapData.path];
  if(mapData.path2)paths.push(mapData.path2);
  if(mapData.path3)paths.push(mapData.path3);
  return paths;
}

function update(){
  if(state!=='playing')return;
  frame++;
  // Spawn
  if(waveActive){
    spawnT--;
    if(spawnT<=0&&spawnC<enCount()){
      const hp=enHP(),cols=['#FF6B6B','#66BB6A','#42A5F5','#FFA726','#AB47BC','#EC407A','#FF8A65','#4DD0E1'];
      const boss=wave%5===0&&spawnC===enCount()-1;
      const paths=getPaths();
      const path=paths[spawnC%paths.length];
      enemies.push({
        path,pathIdx:0,speed:boss?enSpeed()*0.6:enSpeed(),
        hp:boss?hp*3.5:hp,maxHp:boss?hp*3.5:hp,
        x:path[0].x*T+T/2,y:path[0].y*T+T/2,
        color:cols[wave%cols.length],bounce:Math.random()*6.28,
        goldVal:boss?enGold()*4:enGold(),size:boss?18:11,boss,dead:false,
        slow:0,poison:0,poisonDmg:0,burn:0,burnDmg:0,cursed:0,baseSpeed:boss?enSpeed()*0.6:enSpeed()
      });
      spawnC++;spawnT=boss?45:20;
    }
    if(spawnC>=enCount()&&enemies.length===0){
      waveActive=false;
      const bonus=20+wave*5;gold+=bonus;score+=wave*100;
      pops.push({x:C.width/2,y:C.height/2,text:`웨이브 ${wave} 클리어! +${bonus}G`,life:70,maxLife:70,color:'#FFD700',big:1});
      updateUI();
    }
  }
  // Enemies
  enemies.forEach(en=>{
    if(en.dead)return;
    if(en.poison>0){en.hp-=en.poisonDmg;en.poison--;if(en.hp<=0){killEn(en);return;}}
    if(en.burn>0){en.hp-=en.burnDmg;en.burn--;if(frame%6===0)particles.push({x:en.x+(Math.random()-0.5)*8,y:en.y-en.size,vx:Math.random()-0.5,vy:-1-Math.random(),color:[255,120,30],life:10,maxLife:10,size:2});if(en.hp<=0){killEn(en);return;}}
    if(en.slow>0)en.slow--;if(en.cursed>0)en.cursed--;
    const spd=en.baseSpeed*(en.slow>0?0.5:1);
    if(en.pathIdx>=en.path.length-1){en.dead=true;lives--;pops.push({x:en.x,y:en.y-15,text:'-1❤️',life:35,maxLife:35,color:'#F66'});if(lives<=0){gameOver();return;}return;}
    const tg=en.path[en.pathIdx+1],tx=tg.x*T+T/2,ty=tg.y*T+T/2,dx=tx-en.x,dy=ty-en.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<spd*2){en.pathIdx++;if(en.pathIdx<en.path.length){en.x=en.path[en.pathIdx].x*T+T/2;en.y=en.path[en.pathIdx].y*T+T/2;}}
    else{en.x+=(dx/d)*spd;en.y+=(dy/d)*spd;}
    en.bounce+=0.15;
  });
  enemies=enemies.filter(e=>!e.dead);
  // Towers
  towers.forEach(t=>{
    t.cooldown--;if(t.attackAnim>0)t.attackAnim--;if(t.cooldown>0)return;
    let best=null,bestP=-1,bestD=9999;
    enemies.forEach(en=>{if(en.dead)return;const d=Math.sqrt((en.x-t.x)**2+(en.y-t.y)**2);
      if(d<t.range*T&&(en.pathIdx>bestP||(en.pathIdx===bestP&&d<bestD))){best=en;bestP=en.pathIdx;bestD=d;}});
    if(best){t.cooldown=t.rate;t.attackAnim=8;t.angle=Math.atan2(best.y-t.y,best.x-t.x);
      projs.push({x:t.x,y:t.y,target:best,speed:t.spd,dmg:t.dmg,splash:t.splash,color:t.proj,size:t.psz,spec:t.spec,hit:false,level:t.level});}
  });
  // Projectiles
  projs.forEach(p=>{
    if(p.hit)return;
    if(!p.target||p.target.dead){if(p.splash>0)doSplash(p,p.x,p.y);p.hit=true;return;}
    const dx=p.target.x-p.x,dy=p.target.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<p.speed+5){p.hit=true;if(p.splash>0)doSplash(p,p.target.x,p.target.y);else hitEn(p,p.target);}
    else{p.x+=(dx/d)*p.speed;p.y+=(dy/d)*p.speed;}
  });
  projs=projs.filter(p=>!p.hit);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life--;});
  particles=particles.filter(p=>p.life>0);
  pops.forEach(p=>{p.y-=0.5;p.life--;});
  pops=pops.filter(p=>p.life>0);
}

function hitEn(p,en){if(en.dead)return;let dmg=p.dmg;if(en.cursed>0)dmg*=2;if(p.spec==='void')dmg=en.hp*0.08*(1+p.level*0.02);en.hp-=dmg;applySpec(p,en);
  for(let i=0;i<3;i++)particles.push({x:en.x,y:en.y,vx:(Math.random()-0.5)*2.5,vy:(Math.random()-0.5)*2.5,color:p.color,life:10,maxLife:10,size:2});if(en.hp<=0)killEn(en);}
function doSplash(p,cx,cy){enemies.forEach(en=>{if(en.dead)return;const d=Math.sqrt((en.x-cx)**2+(en.y-cy)**2);if(d<p.splash*T){let dmg=p.dmg*(1-d/(p.splash*T)*0.5);if(en.cursed>0)dmg*=2;en.hp-=dmg;applySpec(p,en);if(en.hp<=0)killEn(en);}});
  for(let i=0;i<8;i++){const a=Math.random()*6.28;particles.push({x:cx,y:cy,vx:Math.cos(a)*3,vy:Math.sin(a)*3,color:p.color,life:15,maxLife:15,size:3});}}
function applySpec(p,en){if(p.spec==='poison'){en.poison=90;en.poisonDmg=p.dmg*0.15*(1+p.level*0.1);}if(p.spec==='slow')en.slow=120+p.level*30;if(p.spec==='burn'){en.burn=60;en.burnDmg=p.dmg*0.2*(1+p.level*0.1);}if(p.spec==='curse')en.cursed=150+p.level*30;}
function killEn(en){if(en.dead)return;en.dead=true;gold+=en.goldVal;score+=en.boss?50:10;
  pops.push({x:en.x,y:en.y-15,text:`+${en.goldVal}G`,life:30,maxLife:30,color:'#FFD700'});
  for(let i=0;i<6;i++){const a=Math.random()*6.28;particles.push({x:en.x,y:en.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,color:hexRgb(en.color),life:15,maxLife:15,size:2+Math.random()*2});}
  updateUI();}

function gameOver(){
  state='gameover';
  if(wave>highScores[curMap]){highScores[curMap]=wave;localStorage.setItem('td_hs',JSON.stringify(highScores));}
  _hub('tower_defense',wave);
  updateUI();
}

// ============ DRAWING ============
function drawMap(){
  const g=mapData.grid;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const px=x*T,py=y*T;
    if(g[y][x]===0){X.fillStyle=(x+y)%2?'#6EBB42':'#7EC850';X.fillRect(px,py,T,T);
      if((x*7+y*13)%5===0){X.fillStyle='#5AA030';X.beginPath();X.arc(px+T*0.4,py+T*0.6,2,0,6.28);X.fill();}}
    else{X.fillStyle=(x+y)%2?'#C8996A':'#D4A574';X.fillRect(px,py,T,T);
      if(g[y][x]===2){X.fillStyle='rgba(76,175,80,0.25)';X.fillRect(px,py,T,T);}
      if(g[y][x]===3){X.fillStyle='rgba(244,67,54,0.25)';X.fillRect(px,py,T,T);}
    }
  }
}

function drawTowers(){
  towers.forEach(t=>{
    const x=t.x,y=t.y,lv=t.level,sz=12+lv;
    X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(x,y+12,10,3,0,0,6.28);X.fill();
    if(lv>=2){X.strokeStyle=lv===3?'#FFD700':'#C0C0C0';X.lineWidth=2;X.beginPath();X.arc(x,y,sz+3,0,6.28);X.stroke();}
    X.fillStyle='#444';X.beginPath();X.arc(x,y,sz+1,0,6.28);X.fill();
    X.fillStyle=t.color;X.beginPath();X.arc(x,y,sz,0,6.28);X.fill();
    X.fillStyle='rgba(255,255,255,0.2)';X.beginPath();X.arc(x-2,y-3,sz*0.3,0,6.28);X.fill();
    // Face
    const es=sz*0.2;
    X.fillStyle='#fff';X.beginPath();X.arc(x-sz*0.25,y-sz*0.1,es+1,0,6.28);X.fill();X.beginPath();X.arc(x+sz*0.25,y-sz*0.1,es+1,0,6.28);X.fill();
    X.fillStyle='#222';X.beginPath();X.arc(x-sz*0.18,y-sz*0.03,es*0.6,0,6.28);X.fill();X.beginPath();X.arc(x+sz*0.33,y-sz*0.03,es*0.6,0,6.28);X.fill();
    X.fillStyle='rgba(255,150,150,0.25)';X.beginPath();X.ellipse(x-sz*0.5,y+sz*0.12,2,1.3,0,0,6.28);X.fill();X.beginPath();X.ellipse(x+sz*0.5,y+sz*0.12,2,1.3,0,0,6.28);X.fill();
    X.strokeStyle='#333';X.lineWidth=1;X.beginPath();X.arc(x,y+sz*0.3,sz*0.18,0.15*Math.PI,0.85*Math.PI);X.stroke();
    // Barrel
    const bl=sz+5+(t.attackAnim>0?4:0);
    X.strokeStyle=t.color;X.lineWidth=2+lv;X.lineCap='round';
    X.beginPath();X.moveTo(x+Math.cos(t.angle)*sz*0.5,y+Math.sin(t.angle)*sz*0.5);X.lineTo(x+Math.cos(t.angle)*bl,y+Math.sin(t.angle)*bl);X.stroke();X.lineCap='butt';
    // Stars
    for(let i=0;i<lv;i++){X.fillStyle='#FFD700';X.font='7px sans-serif';X.fillText('★',x-lv*4+i*8,y-sz-4);}
    // Selection
    if(selPlaced===t){X.strokeStyle='#FFD700';X.lineWidth=1.5;X.setLineDash([3,3]);X.beginPath();X.arc(x,y,t.range*T,0,6.28);X.stroke();X.setLineDash([]);X.strokeStyle='#FFD700';X.lineWidth=2;X.beginPath();X.arc(x,y,sz+5,0,6.28);X.stroke();}
  });
}

function drawEnemies(){
  enemies.forEach(en=>{
    if(en.dead)return;
    const b=Math.sin(en.bounce)*2,x=en.x,y=en.y+b,r=en.size;
    X.fillStyle='rgba(0,0,0,0.12)';X.beginPath();X.ellipse(en.x,en.y+r+2,r-2,3,0,0,6.28);X.fill();
    if(en.slow>0){X.fillStyle='rgba(100,200,255,0.12)';X.beginPath();X.arc(x,y,r+3,0,6.28);X.fill();}
    if(en.cursed>0){X.strokeStyle='rgba(150,50,200,0.35)';X.lineWidth=1.5;X.beginPath();X.arc(x,y,r+3,0,6.28);X.stroke();}
    X.fillStyle=en.color;X.beginPath();X.arc(x,y,r,0,6.28);X.fill();
    X.fillStyle='rgba(255,255,255,0.25)';X.beginPath();X.arc(x-r*0.2,y-r*0.3,r*0.25,0,6.28);X.fill();
    if(en.poison>0){X.fillStyle='rgba(0,200,100,0.2)';X.beginPath();X.arc(x,y,r,0,6.28);X.fill();}
    const er=r*0.24;X.fillStyle='#fff';
    X.beginPath();X.arc(x-r*0.28,y-r*0.08,er,0,6.28);X.fill();X.beginPath();X.arc(x+r*0.28,y-r*0.08,er,0,6.28);X.fill();
    X.fillStyle='#222';X.beginPath();X.arc(x-r*0.2,y+r*0.02,er*0.5,0,6.28);X.fill();X.beginPath();X.arc(x+r*0.36,y+r*0.02,er*0.5,0,6.28);X.fill();
    if(en.boss){X.fillStyle='#FFD700';X.beginPath();X.moveTo(x-6,y-r);X.lineTo(x-4,y-r-6);X.lineTo(x,y-r-2);X.lineTo(x,y-r-8);X.lineTo(x,y-r-2);X.lineTo(x+4,y-r-6);X.lineTo(x+6,y-r);X.fill();}
    const hp=en.hp/en.maxHp,bw=r*1.8;X.fillStyle='#2228';X.fillRect(x-bw/2,y-r-6,bw,3);
    X.fillStyle=hp>0.5?'#4CAF50':hp>0.25?'#FFC107':'#F44';X.fillRect(x-bw/2,y-r-6,bw*hp,3);
  });
}

function drawProjs(){projs.forEach(p=>{if(p.hit)return;const [r,g,b]=p.color;X.fillStyle=`rgba(${r},${g},${b},0.3)`;X.beginPath();X.arc(p.x,p.y,p.size+2,0,6.28);X.fill();X.fillStyle=`rgb(${r},${g},${b})`;X.beginPath();X.arc(p.x,p.y,p.size,0,6.28);X.fill();});}

function drawFx(){
  particles.forEach(p=>{X.globalAlpha=p.life/p.maxLife;const c=Array.isArray(p.color)?p.color:[180,180,180];X.fillStyle=`rgb(${c[0]},${c[1]},${c[2]})`;X.beginPath();X.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,6.28);X.fill();});X.globalAlpha=1;
  pops.forEach(p=>{X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.color;X.font=`bold ${p.big?17:12}px sans-serif`;X.textAlign='center';X.fillText(p.text,p.x,p.y);});X.globalAlpha=1;X.textAlign='left';
}

function drawHover(){
  if(mx<0||my<0||mx>=COLS||my>=ROWS||selTower<0||state!=='playing')return;
  const ok=mapData.grid[my][mx]===0&&!towers.some(t=>t.gx===mx&&t.gy===my);
  const d=TDEFS[selTower],cx=mx*T+T/2,cy=my*T+T/2;
  if(ok){X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=1;X.setLineDash([3,3]);X.beginPath();X.arc(cx,cy,d.range*T,0,6.28);X.stroke();X.setLineDash([]);
    X.globalAlpha=0.5;X.fillStyle=d.color;X.beginPath();X.arc(cx,cy,12,0,6.28);X.fill();X.globalAlpha=1;
    if(gold<d.cost){X.strokeStyle='#F44';X.lineWidth=2;X.beginPath();X.moveTo(cx-7,cy-7);X.lineTo(cx+7,cy+7);X.stroke();X.beginPath();X.moveTo(cx+7,cy-7);X.lineTo(cx-7,cy+7);X.stroke();}}
  else{X.fillStyle='rgba(255,0,0,0.1)';X.fillRect(mx*T,my*T,T,T);}
}

function drawHUD(){
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,C.width,28);
  X.font='bold 12px sans-serif';
  X.fillStyle='#FFD700';X.fillText(`💰${gold}`,6,18);
  X.fillStyle='#FF6B6B';X.fillText(`❤️${lives}`,80,18);
  X.fillStyle='#fff';X.textAlign='center';X.fillText(`웨이브 ${wave}`,C.width/2-50,18);
  X.fillStyle='#B5EAD7';X.fillText(`점수:${score}`,C.width/2+50,18);
  X.textAlign='left';
  // Speed indicator
  X.fillStyle='#FF9800';X.font='bold 11px sans-serif';X.textAlign='right';
  X.fillText(`x${gameSpeed}`,C.width-8,18);X.textAlign='left';
  // Map name
  X.fillStyle='#555';X.font='10px sans-serif';X.fillText(mapData.name,C.width/2+110,18);
  if(waveActive){X.fillStyle='#666';X.font='10px sans-serif';X.textAlign='center';X.fillText(`남은:${enemies.length+(enCount()-spawnC)}`,C.width/2,10);X.textAlign='left';}
}

function drawGameOver(){
  X.fillStyle='rgba(0,0,0,0.8)';X.fillRect(0,0,C.width,C.height);
  X.textAlign='center';
  X.fillStyle='#FF6B6B';X.font='bold 36px sans-serif';X.fillText('게임 오버!',C.width/2,C.height/2-70);
  X.fillStyle='#fff';X.font='bold 28px sans-serif';X.fillText(`웨이브 ${wave} 생존`,C.width/2,C.height/2-25);
  X.fillStyle='#FFD700';X.font='bold 20px sans-serif';X.fillText(`점수: ${score}`,C.width/2,C.height/2+10);
  if(wave>=highScores[curMap]&&wave>0){
    X.fillStyle='#FFD700';X.font='bold 22px sans-serif';
    X.fillText('🏆 새 기록!',C.width/2,C.height/2+45);
  } else if(highScores[curMap]>0){
    X.fillStyle='#888';X.font='14px sans-serif';
    X.fillText(`최고 기록: 웨이브 ${highScores[curMap]}`,C.width/2,C.height/2+45);
  }
  X.fillStyle='#aaa';X.font='14px sans-serif';
  X.fillText(`타워 ${towers.length}개 배치`,C.width/2,C.height/2+75);
  const t=Date.now()/1000;X.globalAlpha=0.5+Math.sin(t*2.5)*0.5;
  X.fillStyle='#fff';X.font='16px sans-serif';
  X.fillText('클릭하여 맵 선택으로 | Q키',C.width/2,C.height/2+110);
  X.globalAlpha=1;X.textAlign='left';
}

// ============ MAIN LOOP ============
buildMenu();

(function loop(){
  if(state==='playing'||state==='gameover'){
    // Run multiple updates for speed
    const steps=state==='playing'?gameSpeed:0;
    for(let i=0;i<steps;i++)update();
    drawMap();drawTowers();drawEnemies();drawProjs();drawFx();
    if(selTower>=0)drawHover();drawHUD();
    if(state==='gameover')drawGameOver();
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
