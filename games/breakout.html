<title>벽돌깨기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
h1{font-size:1.8em;margin:10px 0 5px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.info{color:#aaa;font-size:0.85em;margin-bottom:8px}
canvas{border-radius:12px;display:block;box-shadow:0 4px 24px rgba(0,0,0,0.5);cursor:none}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.95);display:flex;align-items:center;justify-content:center;z-index:100}
.overlay-box{background:#1a1a2e;border-radius:20px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.6);max-width:400px;width:90%}
.overlay-box h2{font-size:1.8em;margin-bottom:15px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.overlay-box p{color:#ccc;margin:8px 0}
.btn{padding:12px 32px;border:none;border-radius:12px;font-size:1em;cursor:pointer;transition:all 0.2s;font-weight:bold;margin:5px}
.btn-primary{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(167,139,250,0.4)}
.result-emoji{font-size:3em;margin-bottom:10px}
.high-score{color:#ffd700;font-size:0.9em;margin-top:10px}
canvas{max-width:100%!important;height:auto!important;display:block;margin:0 auto}body{overflow-x:hidden}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

<div id="startScreen" class="overlay">
<div class="overlay-box">
<div class="result-emoji">🧱</div>
<h2>벽돌깨기</h2>
<p>공으로 벽돌을 모두 부숴보세요!</p>
<p style="font-size:0.85em;color:#aaa">마우스 또는 ←→ 키로 패들을 움직이세요</p>
<div class="high-score" id="startHighScore"></div>
<br>
<button class="btn btn-primary" onclick="startGame()">게임 시작!</button>
</div>
</div>

<div id="gameOverScreen" class="overlay" style="display:none">
<div class="overlay-box">
<div class="result-emoji" id="resultEmoji"></div>
<h2 id="resultTitle"></h2>
<p id="resultScore"></p>
<div class="high-score" id="resultHighScore"></div>
<br>
<button class="btn btn-primary" onclick="startGame()">다시 하기</button>
</div>
</div>

<div id="gameArea" style="display:none;text-align:center">
<h1>벽돌깨기</h1>
<div class="info">점수: <span id="scoreDisplay">0</span> | 최고: <span id="bestDisplay">0</span> | 공: <span id="livesDisplay">3</span></div>
<canvas id="canvas" width="480" height="520"></canvas>
</div>

<script>
const W=480,H=520;
const COLS=8,ROWS=5,BRICK_W=52,BRICK_H=20,BRICK_PAD=4,BRICK_TOP=50,BRICK_LEFT=14;
const PADDLE_W=80,PADDLE_H=12;
const BALL_R=8;
const COLORS=['#ff6b6b','#ffa502','#ffd43b','#69db7c','#74c0fc','#b197fc','#ff8787','#66d9e8'];

let canvas,ctx,score,highScore,lives,bricks,ball,paddle,animId,keys={},gameRunning,level;

function loadHS(){highScore=parseInt(localStorage.getItem('breakout_high')||'0')}
function saveHS(){if(score>highScore){highScore=score;localStorage.setItem('breakout_high',String(highScore))}_hub('breakout',score)}

function initBricks(){
bricks=[];
for(let r=0;r<ROWS;r++){
bricks[r]=[];
for(let c=0;c<COLS;c++){
bricks[r][c]={x:BRICK_LEFT+c*(BRICK_W+BRICK_PAD),y:BRICK_TOP+r*(BRICK_H+BRICK_PAD),alive:true,color:COLORS[(r+c)%COLORS.length]};
}
}
}

function resetBall(){
let speedMult=1+level*0.15;
ball={x:W/2,y:H-60,dx:3*speedMult*(Math.random()>0.5?1:-1),dy:-4*speedMult,r:BALL_R};
}

function startGame(){
document.getElementById('startScreen').style.display='none';
document.getElementById('gameOverScreen').style.display='none';
document.getElementById('gameArea').style.display='block';
canvas=document.getElementById('canvas');
ctx=canvas.getContext('2d');
loadHS();
score=0;lives=3;level=1;gameRunning=true;
paddle={x:W/2-PADDLE_W/2,y:H-30,w:PADDLE_W,h:PADDLE_H};
initBricks();
resetBall();
updateUI();
if(animId)cancelAnimationFrame(animId);
loop();
}

function updateUI(){
document.getElementById('scoreDisplay').textContent=score;
document.getElementById('bestDisplay').textContent=highScore;
document.getElementById('livesDisplay').textContent=lives;
}

function draw(){
ctx.clearRect(0,0,W,H);
// bricks
for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){
const b=bricks[r][c];
if(!b.alive)continue;
ctx.fillStyle=b.color;
ctx.beginPath();
ctx.roundRect(b.x,b.y,BRICK_W,BRICK_H,4);
ctx.fill();
// shine
ctx.fillStyle='rgba(255,255,255,0.25)';
ctx.beginPath();
ctx.roundRect(b.x+2,b.y+2,BRICK_W-4,BRICK_H/2-2,2);
ctx.fill();
}
}
// paddle
const grd=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+paddle.h);
grd.addColorStop(0,'#a78bfa');grd.addColorStop(1,'#60a5fa');
ctx.fillStyle=grd;
ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();
// ball with cute face
ctx.fillStyle='#ffd43b';
ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
// eyes
ctx.fillStyle='#0f0f1e';
ctx.beginPath();ctx.arc(ball.x-3,ball.y-2,1.5,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(ball.x+3,ball.y-2,1.5,0,Math.PI*2);ctx.fill();
// smile
ctx.strokeStyle='#0f0f1e';ctx.lineWidth=1;
ctx.beginPath();ctx.arc(ball.x,ball.y,3.5,0.2,Math.PI-0.2);ctx.stroke();
// blush
ctx.fillStyle='rgba(255,150,150,0.5)';
ctx.beginPath();ctx.arc(ball.x-6,ball.y+1,2,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(ball.x+6,ball.y+1,2,0,Math.PI*2);ctx.fill();
}

function update(){
if(!gameRunning)return;
// paddle movement
if(keys['ArrowLeft'])paddle.x-=7;
if(keys['ArrowRight'])paddle.x+=7;
paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

ball.x+=ball.dx;ball.y+=ball.dy;
// wall bounce
if(ball.x-ball.r<0){ball.x=ball.r;ball.dx=-ball.dx}
if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx=-ball.dx}
if(ball.y-ball.r<0){ball.y=ball.r;ball.dy=-ball.dy}
// paddle
if(ball.dy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h&&ball.x>=paddle.x&&ball.x<=paddle.x+paddle.w){
ball.dy=-ball.dy;
ball.dx+=((ball.x-(paddle.x+paddle.w/2))/paddle.w)*3;
ball.dx=Math.max(-8,Math.min(8,ball.dx));
ball.y=paddle.y-ball.r;
}
// bricks
for(let r=0;r<ROWS;r++){
for(let c=0;c<COLS;c++){
const b=bricks[r][c];
if(!b.alive)continue;
if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+BRICK_W&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+BRICK_H){
b.alive=false;score++;ball.dy=-ball.dy;updateUI();
}
}
}
// bottom
if(ball.y+ball.r>H){
lives--;updateUI();
if(lives<=0){endGame();}else{resetBall();}
}
// check win
let allDead=true;
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(bricks[r][c].alive)allDead=false;
if(allDead){level++;initBricks();resetBall();}
}

function loop(){
if(!gameRunning){draw();return;}
update();draw();
animId=requestAnimationFrame(loop);
}

function endGame(){
gameRunning=false;
cancelAnimationFrame(animId);
saveHS();
document.getElementById('gameArea').style.display='none';
const s=document.getElementById('gameOverScreen');
s.style.display='flex';
document.getElementById('resultEmoji').textContent=score>20?'🎉':'😢';
document.getElementById('resultTitle').textContent='게임 오버!';
document.getElementById('resultScore').textContent=`점수: ${score}점`;
document.getElementById('resultHighScore').textContent=`최고 기록: ${highScore}점`;
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});
document.addEventListener('mousemove',e=>{
if(!canvas||!gameRunning)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)*(W/rect.width);
paddle.x=mx-paddle.w/2;
paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
});
document.addEventListener('touchmove',e=>{
if(!canvas||!gameRunning)return;
e.preventDefault();
const rect=canvas.getBoundingClientRect();
const mx=(e.touches[0].clientX-rect.left)*(W/rect.width);
paddle.x=mx-paddle.w/2;
paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
},{passive:false});

loadHS();
document.getElementById('startHighScore').textContent=highScore>0?`최고 기록: ${highScore}점`:'';
</script>
</body>
</html>
