<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1e;display:flex;flex-direction:column;align-items:center;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#fff;overflow:hidden;touch-action:none;user-select:none;}
canvas{display:block;border-radius:0 0 8px 8px;}
#controls{width:100%;max-width:500px;display:none;padding:8px;gap:6px;display:none;flex-wrap:wrap;justify-content:center;}
.ubtn{background:linear-gradient(135deg,#3a5a8a,#2a3a5a);border:2px solid #5a8aba;color:#fff;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;flex:1;min-width:80px;max-width:120px;text-align:center;touch-action:manipulation;min-height:44px;}
.ubtn:active{transform:scale(0.95);background:#4a6a9a;}
.ubtn .cost{font-size:11px;color:#ffd700;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#overlay h1{font-size:30px;color:#5af;margin-bottom:8px;}
#overlay p{color:#aaa;font-size:14px;margin-bottom:16px;text-align:center;padding:0 20px;}
#overlay h2{font-size:26px;color:#5af;margin-bottom:10px;}
.btn{background:linear-gradient(135deg,#4a8af5,#3060c0);border:none;color:#fff;padding:14px 40px;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;font-family:inherit;min-height:44px;touch-action:manipulation;}
.btn:active{transform:scale(0.95);}
#roundModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounceIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes starPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.round-box{background:#1a1a2e;border-radius:20px;padding:30px 40px;text-align:center;border:2px solid #5a8aba;box-shadow:0 0 40px rgba(90,138,186,0.3);animation:bounceIn .4s;max-width:350px;width:90%}
.round-emoji{font-size:60px;margin-bottom:10px;animation:starPulse 1s infinite}
.round-title{font-size:26px;font-weight:bold;color:#FFD700;margin-bottom:5px}
.round-sub{color:#aaa;font-size:14px;margin-bottom:15px}
.round-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:15px 0}
.round-stat{background:#252545;padding:10px;border-radius:10px}
.round-stat .val{font-size:20px;font-weight:bold;color:#5af}
.round-stat .lbl{font-size:11px;color:#888;margin-top:2px}
.round-btns{display:flex;gap:10px;justify-content:center;margin-top:15px}
.round-btns button{padding:12px 24px;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation}
.btn-next{background:linear-gradient(135deg,#FFD700,#FFA000);color:#000}
.btn-next:hover{box-shadow:0 4px 15px rgba(255,215,0,0.4)}
.btn-quit{background:#333;color:#aaa}
.btn-quit:hover{background:#444}
#hud{width:100%;max-width:500px;display:none;padding:6px 10px;background:#1a1a2e;font-size:13px;display:none;justify-content:space-between;border-radius:8px 8px 0 0;}
#hud span{color:#ffd700;}
#upgrades{width:100%;max-width:500px;display:none;padding:4px 8px;gap:4px;flex-wrap:wrap;justify-content:center;}
.upgbtn{background:linear-gradient(135deg,#5a3a8a,#3a2a5a);border:2px solid #9a5aba;color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;flex:1;min-width:60px;max-width:100px;text-align:center;touch-action:manipulation;min-height:36px;}
.upgbtn:active{transform:scale(0.95);background:#6a4a9a;}
.upgbtn:disabled{opacity:0.4;cursor:default;transform:none;}
#skills{width:100%;max-width:500px;display:none;padding:4px 8px;gap:6px;flex-wrap:wrap;justify-content:center;}
.skillbtn{background:linear-gradient(135deg,#8a3a3a,#5a2a2a);border:2px solid #ba5a5a;color:#fff;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;flex:1;min-width:90px;max-width:140px;text-align:center;touch-action:manipulation;min-height:44px;position:relative;}
.skillbtn:active{transform:scale(0.95);}
.skillbtn:disabled{opacity:0.4;cursor:default;transform:none;}
.skillbtn .cd{font-size:10px;color:#ff8;}
#formation{width:100%;max-width:500px;display:none;padding:4px 8px;gap:6px;justify-content:center;align-items:center;}
.formbtn{background:#2a3a5a;border:2px solid #5a8aba;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;touch-action:manipulation;min-height:36px;}
.formbtn.active{background:#4a8af5;border-color:#7ab4ff;}
#wavePreview{width:100%;max-width:500px;text-align:center;font-size:13px;color:#aaa;padding:4px;display:none;}
#rallyMarker{display:none;position:absolute;pointer-events:none;}
</style>
</head>

<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

  <div>라운드: <span id="roundNum">1</span></div>

  <button class="ubtn" id="btn_sword" onclick="spawnUnit('sword')">⚔️ 검사<br><span class="cost">30골드</span></button>

  <button class="ubtn" id="btn_healer" onclick="spawnUnit('healer')">💚힐러<br><span class="cost">60골드</span></button>

  <button class="upgbtn" onclick="upgradeUnit('sword')">⚔️↑ <span id="ulv_sword">Lv0</span><br><span class="cost" id="ucost_sword">50g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('archer')">🏹↑ <span id="ulv_archer">Lv0</span><br><span class="cost" id="ucost_archer">75g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('knight')">🛡️↑ <span id="ulv_knight">Lv0</span><br><span class="cost" id="ucost_knight">150g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('mage')">🧙↑ <span id="ulv_mage">Lv0</span><br><span class="cost" id="ucost_mage">105g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('healer')">💚↑ <span id="ulv_healer">Lv0</span><br><span class="cost" id="ucost_healer">90g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('catapult')">🪨↑ <span id="ulv_catapult">Lv0</span><br><span class="cost" id="ucost_catapult">180g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('cavalry')">🐎↑ <span id="ulv_cavalry">Lv0</span><br><span class="cost" id="ucost_cavalry">120g</span></button>
  <button class="upgbtn" onclick="upgradeUnit('shielder')">🛡️↑ <span id="ulv_shielder">Lv0</span><br><span class="cost" id="ucost_shielder">60g</span></button>
</div>
<div id="skills">
  <button class="skillbtn" id="sk_charge" onclick="useSkill('charge')">⚔️ 돌격<br><span class="cd" id="skcd_charge">준비됨</span></button>
  <button class="skillbtn" id="sk_heal" onclick="useSkill('heal')">🏥 치료<br><span class="cd" id="skcd_heal">준비됨</span></button>
  <button class="skillbtn" id="sk_bomb" onclick="useSkill('bomb')">💥 포격<br><span class="cd" id="skcd_bomb">준비됨</span></button>
</div>

  <button class="formbtn active" id="formNone" onclick="setFormation('none')">기본</button>
  <button class="formbtn" id="formFront" onclick="setFormation('front')">전열</button>
  <button class="formbtn" id="formBack" onclick="setFormation('back')">후열</button>

<div id="overlay">
  <h1>⚔️ 미니 전략</h1>
  <p>유닛을 생산하여 적 기지를 파괴하세요!<br>라운드가 올라갈수록 적이 강해집니다!</p>
  <button class="btn" onclick="startGame()">전투 시작</button>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const CW=Math.min(window.innerWidth,500);
const CH=Math.min(window.innerHeight-260,300);
canvas.width=CW;canvas.height=CH;

const UNIT_TYPES={
  sword:{name:'검사',hp:80,atk:14,speed:1.3,range:20,cost:30,size:10,color:'#4a9aff',atkSpeed:25,emoji:'⚔️',ranged:false,splash:false,healer:false,charge:false},
  archer:{name:'궁수',hp:45,atk:18,speed:1.0,range:90,cost:50,size:9,color:'#4aff7a',atkSpeed:35,emoji:'🏹',ranged:true,splash:false,healer:false,charge:false},
  knight:{name:'기사',hp:200,atk:30,speed:0.8,range:22,cost:100,size:14,color:'#ffd740',atkSpeed:30,emoji:'🛡️',ranged:false,splash:false,healer:false,charge:false},
  mage:{name:'마법사',hp:60,atk:22,speed:0.7,range:80,cost:70,size:10,color:'#c04aff',atkSpeed:40,emoji:'🧙',ranged:true,splash:true,healer:false,charge:false},
  healer:{name:'힐러',hp:70,atk:5,speed:0.9,range:60,cost:60,size:9,color:'#4affa0',atkSpeed:45,emoji:'💚',ranged:false,splash:false,healer:true,charge:false},
  catapult:{name:'투석기',hp:90,atk:50,speed:0.4,range:140,cost:120,size:13,color:'#aa8844',atkSpeed:60,emoji:'🪨',ranged:true,splash:true,healer:false,charge:false},
  cavalry:{name:'기병',hp:100,atk:20,speed:2.0,range:20,cost:80,size:11,color:'#ff9a4a',atkSpeed:22,emoji:'🐎',ranged:false,splash:false,healer:false,charge:true},
  shielder:{name:'방패병',hp:300,atk:5,speed:0.6,range:18,cost:40,size:12,color:'#8a8aff',atkSpeed:30,emoji:'🛡️',ranged:false,splash:false,healer:false,charge:false}
};

let units,projectiles,playerBase,enemyBase,gold,goldRate,round,roundsWon,gameRunning,aiTimer;
let floatingTexts=[],deathEffects=[],baseDamageFlash={player:0,enemy:0};

// Upgrade system: level 0-3 per unit type
let upgradeLevels={};
function initUpgrades(){upgradeLevels={};for(let k in UNIT_TYPES)upgradeLevels[k]=0;}
function getUpgradeCost(type){return Math.round(UNIT_TYPES[type].cost*1.5*(upgradeLevels[type]+1));}
function getUpgradedStat(type,stat){return UNIT_TYPES[type][stat]*(1+upgradeLevels[type]*0.15);}
function upgradeUnit(type){
  if(upgradeLevels[type]>=3)return;
  let cost=getUpgradeCost(type);
  if(gold<cost)return;
  gold-=cost;
  upgradeLevels[type]++;
  updateUpgradeUI();
  floatingTexts.push({x:CW/2,y:CH/2,text:UNIT_TYPES[type].emoji+' Lv'+upgradeLevels[type]+'!',color:'#c8f',life:40,vy:-1});
}
function updateUpgradeUI(){
  for(let k in UNIT_TYPES){
    let el=document.getElementById('ulv_'+k);if(el)el.textContent='Lv'+upgradeLevels[k];
    let ce=document.getElementById('ucost_'+k);if(ce)ce.textContent=upgradeLevels[k]>=3?'MAX':getUpgradeCost(k)+'g';
    let btn=document.getElementById('btn_'+k);
    if(btn){
      let lvTxt=upgradeLevels[k]>0?' ★'+upgradeLevels[k]:'';
      btn.querySelector('.cost').textContent=UNIT_TYPES[k].cost+'골드'+lvTxt;
    }
  }
}

// Skill system
let skills={
  charge:{cd:0,maxCd:30*60,duration:5*60,active:0,label:'돌격'},
  heal:{cd:0,maxCd:45*60,duration:0,active:0,label:'치료'},
  bomb:{cd:0,maxCd:60*60,duration:0,active:0,label:'포격'}
};
function useSkill(id){
  let sk=skills[id];if(sk.cd>0)return;
  sk.cd=sk.maxCd;
  if(id==='charge'){sk.active=sk.duration;floatingTexts.push({x:CW/2,y:CH/2-20,text:'⚔️ 돌격 발동!',color:'#f44',life:40,vy:-1});}
  if(id==='heal'){
    for(let u of units){if(u.team==='player'&&u.hp>0){u.hp=Math.min(u.maxHp,u.hp+u.maxHp*0.3);}}
    floatingTexts.push({x:CW/2,y:CH/2-20,text:'🏥 전체 치료!',color:'#4f4',life:40,vy:-1});
  }
  if(id==='bomb'){
    for(let u of units){if(u.team==='enemy'&&u.hp>0&&u.x>CW*0.5){u.hp-=60+round*5;}}
    enemyBase.hp-=30+round*3;
    baseDamageFlash.enemy=15;
    floatingTexts.push({x:CW*0.75,y:CH/2,text:'💥 포격!',color:'#fa0',life:40,vy:-1});
    // Bomb visual
    for(let i=0;i<5;i++)deathEffects.push({x:CW*0.6+Math.random()*CW*0.3,y:Math.random()*CH,size:8,color:'#fa0',life:15});
  }
}
function updateSkills(){
  for(let id in skills){
    let sk=skills[id];
    if(sk.cd>0)sk.cd--;
    if(sk.active>0)sk.active--;
    let btn=document.getElementById('sk_'+id);
    let cdEl=document.getElementById('skcd_'+id);
    if(sk.cd>0){btn.disabled=true;cdEl.textContent=Math.ceil(sk.cd/60)+'초';}
    else{btn.disabled=false;cdEl.textContent='준비됨';}
  }
}

// Formation system
let currentFormation='none';
let rallyPoint=null;
function setFormation(f){
  currentFormation=f;
  document.querySelectorAll('.formbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('form'+f.charAt(0).toUpperCase()+f.slice(1)).classList.add('active');
}
function getSpawnY(){
  if(currentFormation==='front')return CH/2+(Math.random()-0.5)*30;
  if(currentFormation==='back'){let side=Math.random()<0.5?-1:1;return CH/2+side*(60+Math.random()*40);}
  return CH/2+(Math.random()-0.5)*100;
}

// Wave difficulty preview
function getWaveDifficulty(r){
  if(r<=2)return{label:'쉬움',stars:'★',color:'#4f4'};
  if(r<=4)return{label:'보통',stars:'★★',color:'#ff0'};
  if(r<=6)return{label:'어려움',stars:'★★★',color:'#fa0'};
  if(r<=9)return{label:'매우 어려움',stars:'★★★★',color:'#f44'};
  return{label:'지옥',stars:'★★★★★',color:'#f0f'};
}
function updateWavePreview(){
  let wp=document.getElementById('wavePreview');
  let d=getWaveDifficulty(round);
  wp.innerHTML='다음 라운드: <span style="color:'+d.color+'">'+d.label+' '+d.stars+'</span>';
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('controls').style.display='flex';
  document.getElementById('upgrades').style.display='flex';
  document.getElementById('skills').style.display='flex';
  document.getElementById('formation').style.display='flex';
  document.getElementById('wavePreview').style.display='block';
  roundsWon=0;
  round=1;
  initUpgrades();
  updateUpgradeUI();
  for(let id in skills){skills[id].cd=0;skills[id].active=0;}
  rallyPoint=null;
  currentFormation='none';
  updateWavePreview();
  startRound();
}

function startRound(){
  units=[];projectiles=[];floatingTexts=[];deathEffects=[];baseDamageFlash={player:0,enemy:0};
  playerBase={x:40,y:CH/2,hp:800,maxHp:800,team:'player'};
  enemyBase={x:CW-40,y:CH/2,hp:200+round*50,maxHp:200+round*50,team:'enemy'};
  gold=300;
  goldRate=4+round*0.5;
  aiTimer=0;
  gameRunning=true;
  document.getElementById('roundNum').textContent=round;
  updateWavePreview();
  updateUpgradeUI();
  loop();
}

function spawnUnit(type){
  let t=UNIT_TYPES[type];
  if(gold<t.cost) return;
  gold-=t.cost;
  let sy=getSpawnY();
  let hp=Math.round(getUpgradedStat(type,'hp'));
  let atk=Math.round(getUpgradedStat(type,'atk'));
  let u={x:playerBase.x+30,y:sy,hp:hp,maxHp:hp,atk:atk,speed:t.speed,range:t.range,size:t.size,color:t.color,team:'player',atkCd:0,atkSpeed:t.atkSpeed,type,spawnAnim:15,chargeReady:t.charge,healCd:0};
  if(rallyPoint)u.rallyTarget={x:rallyPoint.x,y:rallyPoint.y};
  units.push(u);
  floatingTexts.push({x:playerBase.x+40,y:sy-15,text:'-'+t.cost,color:'#ffd700',life:30,vy:-1});
}

function spawnEnemy(type){
  let t=UNIT_TYPES[type];
  let diff=0.7+round*0.1;
  let yOff=(Math.random()-0.5)*100;
  units.push({x:enemyBase.x-30,y:CH/2+yOff,hp:t.hp*diff,maxHp:t.hp*diff,atk:t.atk*diff,speed:t.speed,range:t.range,size:t.size,color:'#ff4a5a',team:'enemy',atkCd:0,atkSpeed:t.atkSpeed,type,spawnAnim:15,chargeReady:t.charge,healCd:0});
}

function aiSpawn(){
  aiTimer++;
  let interval=Math.max(60,180-round*10);
  if(aiTimer%interval===0){
    let r=Math.random();
    if(round<3){
      if(r<0.5) spawnEnemy('sword');
      else if(r<0.8) spawnEnemy('archer');
      else spawnEnemy('knight');
    } else if(round<6){
      if(r<0.3) spawnEnemy('sword');
      else if(r<0.5) spawnEnemy('archer');
      else if(r<0.65) spawnEnemy('knight');
      else if(r<0.8) spawnEnemy('cavalry');
      else if(r<0.9) spawnEnemy('mage');
      else spawnEnemy('shielder');
    } else {
      if(r<0.15) spawnEnemy('sword');
      else if(r<0.3) spawnEnemy('archer');
      else if(r<0.45) spawnEnemy('knight');
      else if(r<0.55) spawnEnemy('cavalry');
      else if(r<0.65) spawnEnemy('mage');
      else if(r<0.75) spawnEnemy('catapult');
      else if(r<0.85) spawnEnemy('shielder');
      else spawnEnemy('healer');
    }
  }
}

function findTarget(unit){
  let closest=null,closestD=Infinity;
  // Check enemy units
  for(let u of units){
    if(u.team===unit.team||u.hp<=0) continue;
    let d=Math.abs(u.x-unit.x)+Math.abs(u.y-unit.y)*0.5;
    if(d<closestD){closestD=d;closest=u;}
  }
  // Check base
  let base=unit.team==='player'?enemyBase:playerBase;
  let bd=Math.abs(base.x-unit.x)+Math.abs(base.y-unit.y)*0.5;
  if(bd<closestD){closest=base;closestD=bd;}
  return{target:closest,dist:closestD};
}

function update(){
  if(!gameRunning) return;
  const prevGold=Math.floor(gold);
  gold+=goldRate/60;
  const newGold=Math.floor(gold);
  document.getElementById('gold').textContent=newGold;
  if(newGold>prevGold&&newGold%30===0) floatingTexts.push({x:CW/2,y:15,text:'+'+Math.floor(goldRate)+'g',color:'#ffd700',life:25,vy:-0.5});
  aiSpawn();

  // Skill updates
  updateSkills();
  let chargeSpeedMul=(skills.charge.active>0)?2:1;

  for(let u of units){
    if(u.hp<=0) continue;

    // Healer logic: heal nearby allies instead of attacking
    let tInfo=UNIT_TYPES[u.type];
    if(tInfo&&tInfo.healer){
      u.healCd=(u.healCd||0)-1;
      if(u.healCd<=0){
        let healed=false;
        for(let ally of units){
          if(ally===u||ally.team!==u.team||ally.hp<=0||ally.hp>=ally.maxHp) continue;
          let dd=Math.sqrt((ally.x-u.x)**2+(ally.y-u.y)**2);
          if(dd<u.range){
            let healAmt=u.atk*2;
            ally.hp=Math.min(ally.maxHp,ally.hp+healAmt);
            floatingTexts.push({x:ally.x,y:ally.y-15,text:'+'+Math.round(healAmt),color:'#4f4',life:20,vy:-1});
            healed=true;
            break;
          }
        }
        if(healed)u.healCd=u.atkSpeed;
      }
      // Healer still moves toward allies that need healing
      let lowestAlly=null,lowestRatio=1;
      for(let ally of units){
        if(ally===u||ally.team!==u.team||ally.hp<=0) continue;
        let r=ally.hp/ally.maxHp;if(r<lowestRatio){lowestRatio=r;lowestAlly=ally;}
      }
      if(lowestAlly&&lowestRatio<0.9){
        let dx=lowestAlly.x-u.x,dy=lowestAlly.y-u.y;
        let d=Math.sqrt(dx*dx+dy*dy)||1;
        let spd=u.speed*(u.team==='player'?chargeSpeedMul:1);
        u.x+=dx/d*spd;u.y+=dy/d*spd*0.3;
      }
      // Separation
      for(let o of units){if(o===u||o.team!==u.team||o.hp<=0) continue;let dx=u.x-o.x,dy=u.y-o.y;let d=Math.sqrt(dx*dx+dy*dy)||1;if(d<u.size+o.size){u.x+=dx/d*0.5;u.y+=dy/d*0.5;}}
      u.y=Math.max(20,Math.min(CH-20,u.y));
      continue; // Skip normal attack logic for healers
    }

    let{target,dist}=findTarget(u);
    if(!target) continue;
    u.atkCd--;

    if(dist<=u.range+u.size){
      // Attack
      if(u.atkCd<=0){
        u.atkCd=u.atkSpeed;
        if(tInfo&&(tInfo.ranged)){
          let splashFlag=tInfo.splash||false;
          projectiles.push({x:u.x,y:u.y,tx:target.x,ty:target.y||target.y,speed:u.type==='catapult'?2.5:4,atk:u.atk,team:u.team,life:80,splash:splashFlag,splashR:splashFlag?30:0});
        } else {
          let dmg=u.atk;
          // Cavalry charge: first hit does 2x
          if(u.chargeReady){dmg=u.atk*2;u.chargeReady=false;floatingTexts.push({x:u.x,y:u.y-15,text:'돌격!',color:'#fa0',life:20,vy:-1});}
          target.hp-=dmg;
        }
      }
    } else {
      // Rally point movement for player units
      let moveTarget=target;
      if(u.team==='player'&&u.rallyTarget&&Math.sqrt((u.x-u.rallyTarget.x)**2+(u.y-u.rallyTarget.y)**2)>10){
        moveTarget=u.rallyTarget;
      }
      // Move toward target
      let dx=moveTarget.x-u.x;
      let dy=(moveTarget.y||moveTarget.y)-u.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      let spd=u.speed*(u.team==='player'?chargeSpeedMul:1);
      u.x+=dx/d*spd;
      u.y+=dy/d*spd*0.3;
    }

    // Separate from allies
    for(let o of units){
      if(o===u||o.team!==u.team||o.hp<=0) continue;
      let dx=u.x-o.x,dy=u.y-o.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<u.size+o.size){
        u.x+=dx/d*0.5;
        u.y+=dy/d*0.5;
      }
    }
    u.y=Math.max(20,Math.min(CH-20,u.y));
  }

  // Projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    let p=projectiles[i];
    let dx=p.tx-p.x,dy=p.ty-p.y;
    let d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d<5){
      // Hit - splash or single target
      if(p.splash){
        for(let u of units){
          if(u.team!==p.team&&u.hp>0&&Math.sqrt((u.x-p.x)**2+(u.y-p.y)**2)<p.splashR){
            u.hp-=p.atk;
          }
        }
        deathEffects.push({x:p.x,y:p.y,size:p.splashR*0.4,color:'#fa0',life:10});
      } else {
        for(let u of units){
          if(u.team!==p.team&&u.hp>0&&Math.abs(u.x-p.x)<15&&Math.abs(u.y-p.y)<15){
            u.hp-=p.atk;break;
          }
        }
      }
      // Check bases
      let base=p.team==='player'?enemyBase:playerBase;
      if(Math.abs(base.x-p.x)<30&&Math.abs(base.y-p.y)<30){base.hp-=p.atk;baseDamageFlash[p.team==='player'?'enemy':'player']=8;}
      projectiles.splice(i,1);continue;
    }
    p.x+=dx/d*p.speed;
    p.y+=dy/d*p.speed;
    p.life--;
    if(p.life<=0) projectiles.splice(i,1);
  }

  // Remove dead with death effect + gold on kill
  units=units.filter(u=>{
    if(u.hp<=0){
      deathEffects.push({x:u.x,y:u.y,size:u.size,color:u.color,life:12});
      if(u.team==='enemy'){
        let killGold=Math.round((UNIT_TYPES[u.type]?UNIT_TYPES[u.type].cost:30)*0.4);
        gold+=killGold;
        floatingTexts.push({x:u.x,y:u.y-15,text:'+'+killGold+'g',color:'#ffd700',life:25,vy:-1.2});
      }
      return false;
    }
    if(u.spawnAnim>0)u.spawnAnim--;
    return true;
  });
  // Update floating texts
  floatingTexts=floatingTexts.filter(t=>{t.y+=t.vy;t.life--;return t.life>0;});
  deathEffects=deathEffects.filter(d=>{d.life--;d.size+=0.5;return d.life>0;});
  if(baseDamageFlash.player>0)baseDamageFlash.player--;
  if(baseDamageFlash.enemy>0)baseDamageFlash.enemy--;

  // Win/lose check
  if(enemyBase.hp<=0){
    gameRunning=false;
    roundsWon++;
    round++;
    _hub('rts',roundsWon);
    setTimeout(()=>{
      const m=document.getElementById('roundModal');
      m.style.display='flex';
      document.getElementById('rmEmoji').textContent=roundsWon>=5?'👑':roundsWon>=3?'⭐':'🎉';
      document.getElementById('rmTitle').textContent='라운드 '+roundsWon+' 클리어!';
      let nextD=getWaveDifficulty(round);
      document.getElementById('rmSub').textContent='다음 라운드: '+nextD.label+' '+nextD.stars;
      document.getElementById('rmRound').textContent=roundsWon;
      document.getElementById('rmGold').textContent=Math.floor(gold);
      document.getElementById('rmUnits').textContent=units.filter(u=>u.team==='player').length;
      document.getElementById('rmHP').textContent=Math.round(playerBase.hp/playerBase.maxHp*100)+'%';
    },500);
  }
  if(playerBase.hp<=0){
    gameRunning=false;
    _hub('rts',roundsWon);
    showEnd();
  }
}

function showEnd(){
  document.getElementById('overlay').innerHTML=`<h2>전투 종료</h2><p style="color:#ccc;font-size:18px;">승리 라운드: ${roundsWon}</p><button class="btn" onclick="location.reload()">다시 시작</button>`;
  document.getElementById('overlay').style.display='flex';
  document.getElementById('controls').style.display='none';
  document.getElementById('upgrades').style.display='none';
  document.getElementById('skills').style.display='none';
  document.getElementById('formation').style.display='none';
  document.getElementById('wavePreview').style.display='none';
}

function drawHPBar(x,y,w,hp,maxHp,color){
  ctx.fillStyle='#333';
  ctx.fillRect(x-w/2,y,w,4);
  ctx.fillStyle=color;
  ctx.fillRect(x-w/2,y,w*(Math.max(0,hp)/maxHp),4);
}

function draw(){
  // Background - grass
  ctx.fillStyle='#1a2a1a';
  ctx.fillRect(0,0,CW,CH);

  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  for(let x=0;x<CW;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // Bases
  // Player base
  ctx.fillStyle='#2a4a8a';
  ctx.fillRect(playerBase.x-25,playerBase.y-30,50,60);
  ctx.fillStyle='#4a7adf';
  ctx.fillRect(playerBase.x-20,playerBase.y-25,40,50);
  ctx.fillStyle='#fff';
  ctx.font='16px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('🏰',playerBase.x,playerBase.y+6);
  drawHPBar(playerBase.x,playerBase.y-35,50,playerBase.hp,playerBase.maxHp,'#4af');

  // Enemy base
  ctx.fillStyle='#8a2a2a';
  ctx.fillRect(enemyBase.x-25,enemyBase.y-30,50,60);
  ctx.fillStyle='#df4a4a';
  ctx.fillRect(enemyBase.x-20,enemyBase.y-25,40,50);
  ctx.fillText('🏴',enemyBase.x,enemyBase.y+6);
  drawHPBar(enemyBase.x,enemyBase.y-35,50,enemyBase.hp,enemyBase.maxHp,'#f44');

  // Death effects
  for(let d of deathEffects){
    ctx.globalAlpha=d.life/12;
    ctx.fillStyle=d.color;
    ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // Base damage flash
  if(baseDamageFlash.player>0){ctx.fillStyle=`rgba(255,0,0,${baseDamageFlash.player/16})`;ctx.fillRect(playerBase.x-28,playerBase.y-33,56,66);}
  if(baseDamageFlash.enemy>0){ctx.fillStyle=`rgba(255,0,0,${baseDamageFlash.enemy/16})`;ctx.fillRect(enemyBase.x-28,enemyBase.y-33,56,66);}
  // Units
  for(let u of units){
    const scale=u.spawnAnim>0?1-u.spawnAnim/15:1;
    ctx.fillStyle=u.color;
    ctx.beginPath();
    ctx.arc(u.x,u.y,u.size*scale,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';
    ctx.lineWidth=1;
    ctx.stroke();

    // Emoji on unit
    ctx.font=(u.size)+'px sans-serif';
    ctx.textAlign='center';
    let tDef=UNIT_TYPES[u.type];
    let emoji=tDef?tDef.emoji:'❓';
    ctx.fillText(emoji,u.x,u.y+u.size*0.3);

    drawHPBar(u.x,u.y-u.size-5,u.size*2,u.hp,u.maxHp,u.team==='player'?'#4af':'#f44');
  }

  // Projectiles
  for(let p of projectiles){
    if(p.splash){
      ctx.fillStyle=p.team==='player'?'#ff8800':'#ff4400';
      ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,200,0,0.4)';
      ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle=p.team==='player'?'#4aff7a':'#ff7a4a';
      ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    }
  }
  // Floating texts
  for(let t of floatingTexts){
    ctx.globalAlpha=t.life/30;
    ctx.fillStyle=t.color;
    ctx.font='bold 13px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
  // Unit count
  const pCount=units.filter(u=>u.team==='player').length;
  const eCount=units.filter(u=>u.team==='enemy').length;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,CH-20,CW,20);
  ctx.fillStyle='#4af';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText('아군: '+pCount,5,CH-6);
  ctx.fillStyle='#f44';ctx.textAlign='right';ctx.fillText('적군: '+eCount,CW-5,CH-6);
  ctx.textAlign='left';
}

function loop(){
  if(!gameRunning) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// Rally point: tap canvas to set
canvas.addEventListener('click',function(e){
  if(!gameRunning)return;
  let rect=canvas.getBoundingClientRect();
  let x=(e.clientX-rect.left)*(canvas.width/rect.width);
  let y=(e.clientY-rect.top)*(canvas.height/rect.height);
  // Only allow rally on player's half
  if(x<CW*0.6){
    rallyPoint={x:x,y:y,life:300};
    floatingTexts.push({x:x,y:y-10,text:'🚩 집결점',color:'#ff0',life:30,vy:-1});
  }
});
canvas.addEventListener('touchstart',function(e){
  if(!gameRunning)return;
  e.preventDefault();
  let rect=canvas.getBoundingClientRect();
  let touch=e.touches[0];
  let x=(touch.clientX-rect.left)*(canvas.width/rect.width);
  let y=(touch.clientY-rect.top)*(canvas.height/rect.height);
  if(x<CW*0.6){
    rallyPoint={x:x,y:y,life:300};
    floatingTexts.push({x:x,y:y-10,text:'🚩 집결점',color:'#ff0',life:30,vy:-1});
  }
},{passive:false});

// Override draw to add rally point marker and charge visual
const _origDraw=draw;
draw=function(){
  _origDraw();
  // Draw rally point
  if(rallyPoint&&gameRunning){
    rallyPoint.life--;
    if(rallyPoint.life<=0)rallyPoint=null;
    else{
      ctx.globalAlpha=Math.min(1,rallyPoint.life/30);
      ctx.strokeStyle='#ff0';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(rallyPoint.x,rallyPoint.y,12,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rallyPoint.x,rallyPoint.y-8);ctx.lineTo(rallyPoint.x,rallyPoint.y+8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(rallyPoint.x-8,rallyPoint.y);ctx.lineTo(rallyPoint.x+8,rallyPoint.y);ctx.stroke();
      ctx.globalAlpha=1;
    }
  }
  // Charge speed active indicator
  if(skills.charge.active>0){
    ctx.fillStyle='rgba(255,50,50,0.15)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#f44';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚔️ 돌격 중! ('+Math.ceil(skills.charge.active/60)+'초)',CW/2,15);
    ctx.textAlign='left';
  }
  // Wave difficulty on HUD area
};

window.spawnUnit=spawnUnit;
window.upgradeUnit=upgradeUnit;
window.useSkill=useSkill;
window.setFormation=setFormation;
</script>
