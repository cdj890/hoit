<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<div id="startOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,15,30,0.95);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;"></div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=Math.min(window.innerWidth,420),H=Math.min(window.innerHeight,700);
c.width=W;c.height=H;
const COLORS=['#FF6B6B','#4FC3F7','#FFD54F','#81C784','#CE93D8','#FFB74D','#F48FB1'];
let state='menu',score=0,timeLeft=30,bubbles=[],pops=[],combo=0,comboT=0,timer,frame=0;
let hs=parseInt(localStorage.getItem('bubble_hs')||'0');

function posToBubble(px,py){
  const r=c.getBoundingClientRect();
  const tx=(px-r.left)*(W/r.width),ty=(py-r.top)*(H/r.height);
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i],d=Math.sqrt((tx-b.x)**2+(ty-b.y)**2);
    if(d<b.r+10){return i;}
  }return -1;
}

c.addEventListener('touchstart',e=>{e.preventDefault();
  if(state==='menu'){startGame();return;}
  if(state==='done'){state='menu';return;}
  for(const t of e.touches){const i=posToBubble(t.clientX,t.clientY);if(i>=0)popBubble(i);}
},{passive:false});
c.addEventListener('click',e=>{
  if(state==='menu'){startGame();return;}
  if(state==='done'){state='menu';return;}
  const i=posToBubble(e.clientX,e.clientY);if(i>=0)popBubble(i);
});

function startGame(){clearInterval(timer);state='playing';score=0;timeLeft=30;bubbles=[];pops=[];combo=0;frame=0;
  timer=setInterval(()=>{timeLeft--;if(timeLeft<=0){clearInterval(timer);state='done';if(score>hs){hs=score;localStorage.setItem('bubble_hs',hs);}_hub('bubble',score);}},1000);}

function popBubble(i){
  const b=bubbles[i];
  combo++;comboT=30;
  const pts=combo>=5?3:combo>=3?2:1;score+=pts;
  // Pop expand animation
  pops.push({x:b.x,y:b.y,r:b.r,isExpand:true,color:b.color,life:10});
  for(let j=0;j<8;j++)pops.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,color:b.color,life:18});
  if(combo>2)pops.push({x:b.x,y:b.y-20,text:`x${combo}! +${pts}`,life:30,vy:-1.2});
  // Chain reaction - pop nearby same-color bubbles
  if(combo>=3){for(let j=bubbles.length-1;j>=0;j--){if(j!==i&&bubbles[j].color===b.color&&Math.sqrt((bubbles[j].x-b.x)**2+(bubbles[j].y-b.y)**2)<60){
    const nb=bubbles[j];score+=1;pops.push({x:nb.x,y:nb.y,r:nb.r,isExpand:true,color:nb.color,life:8});
    for(let k=0;k<4;k++)pops.push({x:nb.x,y:nb.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,color:nb.color,life:12});
    bubbles.splice(j,1);if(j<i)i--;break;}}}
  bubbles.splice(i,1);
}

function update(){
  if(state!=='playing')return;frame++;
  if(comboT>0)comboT--;else combo=0;
  if(frame%15===0){
    const elapsed=30-timeLeft;
    const speedBonus=elapsed*0.05;
    const minR=score>20?8:score>10?10:15;
    const r=minR+Math.random()*(20-Math.min(10,score*0.3));
    bubbles.push({x:r+Math.random()*(W-r*2),y:H+r,r,speed:1+Math.random()*1.5+speedBonus,color:COLORS[Math.random()*COLORS.length|0],wobble:Math.random()*6.28});
  }
  bubbles.forEach(b=>{b.y-=b.speed;b.x+=Math.sin(frame*0.03+b.wobble)*0.5;});
  bubbles=bubbles.filter(b=>b.y>-40);
  pops.forEach(p=>{p.x+=p.vx||0;p.y+=p.vy||0;p.life--;});
  pops=pops.filter(p=>p.life>0);
}

function draw(){
  x.fillStyle='#0f0f1e';x.fillRect(0,0,W,H);
  if(state==='menu'){
    x.textAlign='center';x.fillStyle='#fff';x.font='bold 28px sans-serif';x.fillText('🫧 버블 터뜨리기',W/2,H/2-60);
    x.fillStyle='#aaa';x.font='16px sans-serif';x.fillText('올라오는 버블을 터뜨리세요!',W/2,H/2-20);
    x.fillStyle='#AB47BC';x.font='bold 20px sans-serif';x.fillText('탭하여 시작',W/2,H/2+30);
    if(hs){x.fillStyle='#888';x.font='14px sans-serif';x.fillText(`최고: ${hs}점`,W/2,H/2+65);}
    // demo bubbles
    COLORS.forEach((c2,i)=>{x.fillStyle=c2;x.globalAlpha=0.5;x.beginPath();x.arc(50+i*50,H/2+100+Math.sin(Date.now()/500+i)*10,18,0,6.28);x.fill();});
    x.globalAlpha=1;
  } else {
    // Last 5 seconds warning
    if(timeLeft<=5&&timeLeft>0&&state==='playing'){
      x.fillStyle=`rgba(255,0,0,${0.05+Math.sin(frame*0.2)*0.05})`;x.fillRect(0,0,W,H);
      x.fillStyle='rgba(255,50,50,0.8)';x.font='bold 40px sans-serif';x.textAlign='center';
      x.fillText(timeLeft+'',W/2,H/2);x.textAlign='left';
    }
    bubbles.forEach(b=>{
      // Shadow
      x.fillStyle='rgba(0,0,0,0.15)';x.beginPath();x.arc(b.x+3,b.y+3,b.r,0,6.28);x.fill();
      x.fillStyle=b.color+'40';x.beginPath();x.arc(b.x,b.y,b.r+4,0,6.28);x.fill();
      x.fillStyle=b.color;x.beginPath();x.arc(b.x,b.y,b.r,0,6.28);x.fill();
      x.fillStyle='rgba(255,255,255,0.35)';x.beginPath();x.arc(b.x-b.r*0.25,b.y-b.r*0.3,b.r*0.3,0,6.28);x.fill();
      // face
      x.fillStyle='#fff';x.beginPath();x.arc(b.x-b.r*0.2,b.y-b.r*0.1,b.r*0.15,0,6.28);x.fill();
      x.beginPath();x.arc(b.x+b.r*0.2,b.y-b.r*0.1,b.r*0.15,0,6.28);x.fill();
      x.fillStyle='#333';x.beginPath();x.arc(b.x-b.r*0.15,b.y-b.r*0.05,b.r*0.08,0,6.28);x.fill();
      x.beginPath();x.arc(b.x+b.r*0.25,b.y-b.r*0.05,b.r*0.08,0,6.28);x.fill();
    });
    pops.forEach(p=>{
      x.globalAlpha=p.life/(p.isExpand?10:25);
      if(p.text){x.fillStyle='#FFD700';x.font='bold 18px sans-serif';x.textAlign='center';x.fillText(p.text,p.x,p.y);}
      else if(p.isExpand){x.strokeStyle=p.color;x.lineWidth=2;x.beginPath();x.arc(p.x,p.y,p.r*(2-p.life/10),0,6.28);x.stroke();}
      else{x.fillStyle=p.color;x.beginPath();x.arc(p.x,p.y,3*(p.life/18),0,6.28);x.fill();}
    });
    x.globalAlpha=1;
    // HUD
    x.fillStyle='rgba(0,0,0,0.5)';x.fillRect(0,0,W,35);
    x.fillStyle='#fff';x.font='bold 16px sans-serif';x.textAlign='left';x.fillText(`🫧 ${score}`,10,24);
    x.textAlign='right';x.fillStyle='#FF6B6B';x.fillText(`⏱️ ${timeLeft}초`,W-10,24);
    const multi=combo>=5?'x3':combo>=3?'x2':'';
    if(combo>2){x.textAlign='center';x.fillStyle='#FFD700';x.font='bold 14px sans-serif';x.fillText(`${combo} 콤보! ${multi}`,W/2,24);}
    if(state==='done'){
      x.fillStyle='rgba(0,0,0,0.6)';x.fillRect(0,H/2-60,W,130);
      x.textAlign='center';x.fillStyle='#FFD700';x.font='bold 32px sans-serif';x.fillText(`${score}점`,W/2,H/2-10);
      x.fillStyle=score>=hs?'#4CAF50':'#aaa';x.font='16px sans-serif';x.fillText(score>=hs?'새 기록!':'게임 오버',W/2,H/2+20);
      x.fillStyle='#fff';x.font='14px sans-serif';x.fillText('탭하여 다시',W/2,H/2+55);
    }
  }
  x.textAlign='left';
}
(function loop(){update();draw();requestAnimationFrame(loop);})();
(function(){
  var ov=document.getElementById('startOverlay');
  if(!ov)return;
  var title=document.createElement('h2');
  title.textContent='버블 터뜨리기';
  title.style.cssText='color:#AB47BC;font-size:2em;margin-bottom:12px;text-align:center;';
  var desc=document.createElement('p');
  desc.textContent='올라오는 버블을 터뜨리세요! 30초 안에 최대한 많이!';
  desc.style.cssText='color:#aaa;font-size:14px;margin-bottom:8px;text-align:center;padding:0 20px;';
  var btn=document.createElement('button');
  btn.textContent='게임 시작!';
  btn.style.cssText='margin-top:20px;padding:14px 40px;font-size:18px;font-weight:bold;background:#AB47BC;color:#fff;border:none;border-radius:14px;cursor:pointer;min-height:44px;touch-action:manipulation;';
  btn.addEventListener('click',function(){ov.style.display='none';startGame();});
  btn.addEventListener('touchstart',function(e){e.preventDefault();ov.style.display='none';startGame();});
  ov.appendChild(title);ov.appendChild(desc);ov.appendChild(btn);
})();
