<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>두더지 잡기</title>

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;touch-action:manipulation}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:320px;width:90%;margin:15px auto}
.hole{background:#3a2a1a;border-radius:16px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;user-select:none}
.hole.active{background:#5a4a2a;animation:pop .15s}
.hole.hit{background:#4CAF50}
@keyframes pop{0%{transform:scale(0.8)}100%{transform:scale(1)}}
.hud{display:flex;justify-content:space-between;width:90%;max-width:320px;margin-top:15px;font-size:16px}
.btn{background:#8D6E63;border:none;color:#fff;padding:14px 36px;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;touch-action:manipulation}
</style></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<div id="app" style="text-align:center;padding:50px 20px"></div>
<script>
let state='menu',score=0,timeLeft=30,moles=[0,0,0,0,0,0,0,0,0],timer,spawnTimer,hs=parseInt(localStorage.getItem('whack_hs')||'0');
let comboCount=0,comboTimer=0,missCount=0;
const MOLE='🐹',GOLDEN='👑',EMPTY='🕳️',HIT='💥',MISS='❌';

function render(){
  const app=document.getElementById('app');
  if(state==='menu'){
    app.innerHTML=`<div style="font-size:48px">🔨</div><h1 style="margin:10px 0">두더지 잡기</h1><p style="color:#aaa;margin-bottom:20px">30초 안에 두더지를 잡으세요!</p><button class="btn" ontouchstart="start(event)" onclick="start(event)">시작!</button>${hs?`<p style="color:#888;margin-top:10px">최고: ${hs}점</p>`:''}`;
  } else if(state==='playing'){
    const comboText=comboCount>=3?`<div style="text-align:center;color:#FFD700;font-weight:bold;animation:pop .15s">${comboCount} COMBO!</div>`:'';
    app.innerHTML=`<div class="hud"><span>⏱️ ${timeLeft}초</span><span>🏆 ${score}점</span></div>${comboText}
      <div class="grid">${moles.map((m,i)=>`<div class="hole ${m===1||m===3?'active':m===2?'hit':''}" ontouchstart="hit(${i},event)" onclick="hit(${i},event)" style="${m===3?'background:#FFD700;box-shadow:0 0 15px #FFD700':''}">${m===3?GOLDEN:m===1?MOLE:m===2?HIT:EMPTY}</div>`).join('')}</div>`;
  } else {
    const isNew=score>hs;if(isNew){hs=score;localStorage.setItem('whack_hs',hs);}_hub('whack',score);
    app.innerHTML=`<div style="font-size:48px">${isNew?'🎉':'🔨'}</div><h1 style="margin:10px 0">${score}점</h1><p style="color:#aaa">${isNew?'새 기록!':'게임 오버'}</p><p style="color:#888;margin:8px 0">최고: ${hs}점</p><button class="btn" ontouchstart="backToMenu(event)" onclick="backToMenu(event)">다시 하기</button>`;
  }
}

function start(e){e.preventDefault();clearInterval(timer);clearInterval(spawnTimer);state='playing';score=0;timeLeft=30;moles=[0,0,0,0,0,0,0,0,0];comboCount=0;comboTimer=0;missCount=0;render();
  timer=setInterval(()=>{timeLeft--;if(timeLeft<=0){clearInterval(timer);clearInterval(spawnTimer);state='done';render();}else render();},1000);
  function spawnMoles(){const missed=moles.filter(m=>m===1).length;if(missed>0){missCount++;comboCount=0;}moles=moles.map(m=>m===1?0:0);const count=1+Math.floor((30-timeLeft)/10);for(let i=0;i<count;i++){const r=Math.floor(Math.random()*9);moles[r]=Math.random()<0.12?3:1;}render();const interval=Math.max(400,800-score*20);clearInterval(spawnTimer);spawnTimer=setInterval(spawnMoles,interval);}
  spawnTimer=setInterval(spawnMoles,800);
}

function hit(i,e){e.preventDefault();if(state!=='playing')return;if(moles[i]===0)return;
  const isGolden=moles[i]===3;
  moles[i]=2;comboCount++;comboTimer=60;
  score+=isGolden?5:comboCount>=5?3:comboCount>=3?2:1;
  render();setTimeout(()=>{if(moles[i]===2)moles[i]=0;},200);}
function backToMenu(e){e.preventDefault();clearInterval(timer);clearInterval(spawnTimer);state='menu';render();}
render();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
