<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth,500);
const H=Math.min(window.innerHeight-20,750);
canvas.width=W;canvas.height=H;

const MAP=2400;
const MINIMAP_SIZE=120;
const minimapCanvas=document.getElementById('minimapCanvas');
const mctx=minimapCanvas.getContext('2d');
let state='menu',frame=0;
let player={x:MAP/2,y:MAP/2,hp:100,hunger:100,speed:2.5,temp:100};
let inv={wood:0,food:0,stone:0};
let crafted={};
let buildings=[];
let explored={}; // grid cells explored
let resources=[],animals=[],particles=[];
let day=1,dayTimer=0,isNight=false;
let camX=0,camY=0;
let joyActive=false,joyX=0,joyY=0,joyStartX=0,joyStartY=0;
let heartbeatTimer=0;
let craftFlash=0;
let weather='sunny',weatherTimer=0;
const WEATHER_CYCLE=2; // changes every 2 days
const WEATHERS=['sunny','rain','snow','storm'];
const WEATHER_INFO={sunny:{icon:'☀️',name:'맑음'},rain:{icon:'🌧️',name:'비'},snow:{icon:'🌨️',name:'눈'},storm:{icon:'🌪️',name:'폭풍'}};

// Biomes: 0=beach, 1=forest, 2=mountain, 3=cave
function getBiome(x,y){
  const cx=MAP/2,cy=MAP/2;
  const dist=Math.hypot(x-cx,y-cy);
  if(dist<300)return 0; // beach (spawn)
  const angle=Math.atan2(y-cy,x-cx);
  const sector=(angle+Math.PI)/(Math.PI*2)*4;
  if(dist>900)return 3; // cave (edges)
  if(sector<1.5||sector>3.5)return 1; // forest
  return 2; // mountain
}
const BIOME_INFO=[
  {name:'해변',color:'#c2b280',colorNight:'#5a5340',woodMul:1,stoneMul:1},
  {name:'숲',color:'#1f5a1f',colorNight:'#0d2a0d',woodMul:3,stoneMul:0.5},
  {name:'산',color:'#6b7280',colorNight:'#3a3f47',woodMul:0.5,stoneMul:3},
  {name:'동굴',color:'#374151',colorNight:'#1f2937',woodMul:1,stoneMul:2}
];

const DAY_LENGTH=600; // frames per half-day
const RECIPES=[
  // 기본
  {name:'🪓 도끼',id:'axe',cost:{wood:1,stone:1},desc:'나무 2배 획득',cat:'기본'},
  {name:'⛏️ 곡괭이',id:'pickaxe',cost:{wood:1,stone:2},desc:'돌 2배 획득',cat:'기본'},
  {name:'🔦 횃불',id:'torch',cost:{wood:2},desc:'야간 시야 확대',cat:'기본'},
  {name:'🏗️ 울타리',id:'fence_item',cost:{wood:3},desc:'설치용 울타리',cat:'기본'},
  // 중급
  {name:'🏹 활',id:'bow',cost:{wood:3,stone:1},desc:'원거리 동물 공격',cat:'중급'},
  {name:'🎣 낚싯대',id:'rod',cost:{wood:2,stone:1},desc:'물가에서 음식 획득',cat:'중급'},
  {name:'🪤 함정',id:'trap',cost:{wood:2,stone:2},desc:'동물 자동 포획',cat:'중급'},
  {name:'⛺ 텐트',id:'tent_item',cost:{wood:5,stone:2},desc:'설치용 텐트',cat:'중급'},
  // 고급
  {name:'🗡️ 돌칼',id:'knife',cost:{stone:3},desc:'동물 2배 데미지',cat:'고급'},
  {name:'🛡️ 방패',id:'shield',cost:{wood:3,stone:2},desc:'받는 피해 절반',cat:'고급'},
  {name:'🚣 뗏목',id:'raft',cost:{wood:10},desc:'물 위 이동 가능',cat:'고급'},
  {name:'🚀 신호탄',id:'flare',cost:{stone:5,wood:3},desc:'구조 요청(승리!)',cat:'고급'},
  // building items (crafted then placed)
  {name:'🔥 모닥불',id:'fire_item',cost:{wood:2,stone:1},desc:'설치용 모닥불',cat:'기본'},
];

// Animal types
const ANIMAL_TYPES=[
  {id:'rabbit',emoji:'🐰',name:'토끼',hp:10,speed:2.0,damage:0,dropFood:2,dropStone:0,nightOnly:true,behavior:'flee',spawnWeight:3},
  {id:'wolf',emoji:'🐺',name:'늑대',hp:25,speed:1.5,damage:10,dropFood:3,dropStone:0,nightOnly:false,behavior:'chase',spawnWeight:2},
  {id:'boar',emoji:'🐗',name:'멧돼지',hp:40,speed:2.2,damage:15,dropFood:4,dropStone:0,nightOnly:false,behavior:'charge',spawnWeight:2},
  {id:'eagle',emoji:'🦅',name:'독수리',hp:15,speed:2.8,damage:8,dropFood:2,dropStone:0,nightOnly:false,behavior:'swoop',spawnWeight:2},
  {id:'snake',emoji:'🐍',name:'뱀',hp:12,speed:1.0,damage:5,dropFood:1,dropStone:0,nightOnly:false,behavior:'poison',spawnWeight:2},
  {id:'bear',emoji:'🐻',name:'곰',hp:100,speed:1.3,damage:25,dropFood:8,dropStone:2,nightOnly:false,behavior:'boss',spawnWeight:0}
];

// Building types that can be placed
const BUILDING_TYPES=[
  {id:'fire',name:'🔥 모닥불',need:'fire_item',desc:'동물 쫓아냄, 체온 유지',radius:100},
  {id:'fence',name:'🏗️ 울타리',need:'fence_item',desc:'동물 차단',radius:50},
  {id:'tent',name:'⛺ 텐트',need:'tent_item',desc:'밤에 안전 수면(HP회복)',radius:40},
];

function spawnResources(){
  resources=[];
  for(let i=0;i<120;i++){
    const x=Math.random()*MAP,y=Math.random()*MAP;
    const biome=getBiome(x,y);
    const bi=BIOME_INFO[biome];
    // weight resource type by biome
    const r=Math.random();
    let type,emoji;
    if(r<0.4*bi.woodMul/(bi.woodMul+bi.stoneMul+1)){type='wood';emoji='🪵';}
    else if(r<0.4*(bi.woodMul+bi.stoneMul)/(bi.woodMul+bi.stoneMul+1)){type='stone';emoji='🪨';}
    else{type='food';emoji='🍖';}
    resources.push({x,y,type,emoji,amount:biome===3?2:1});
  }
}

function spawnAnimals(){
  const count=3+Math.floor(day*1.5);
  // spawn boss bear every 5 days
  if(day%5===0){
    const angle=Math.random()*Math.PI*2;
    const dist=300+Math.random()*200;
    const t=ANIMAL_TYPES.find(a=>a.id==='bear');
    animals.push({
      x:player.x+Math.cos(angle)*dist,y:player.y+Math.sin(angle)*dist,
      type:t,hp:t.hp+day*5,maxHp:t.hp+day*5,speed:t.speed,damage:t.damage+day,
      r:16,hitCd:0,poisonTimer:0,chargeDir:null,chargeCd:0,swoopBase:null
    });
  }
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const dist=250+Math.random()*400;
    // weighted random pick (exclude bear)
    const pool=ANIMAL_TYPES.filter(a=>a.spawnWeight>0&&(!a.nightOnly||isNight));
    if(pool.length===0)continue;
    const totalW=pool.reduce((s,a)=>s+a.spawnWeight,0);
    let pick=Math.random()*totalW,t=pool[0];
    for(const a of pool){pick-=a.spawnWeight;if(pick<=0){t=a;break;}}
    animals.push({
      x:player.x+Math.cos(angle)*dist,y:player.y+Math.sin(angle)*dist,
      type:t,hp:t.hp+day*2,maxHp:t.hp+day*2,speed:t.speed+day*0.05,damage:t.damage+day,
      r:12,hitCd:0,poisonTimer:0,chargeDir:null,chargeCd:0,swoopBase:null
    });
  }
}

function attackAnimal(a,dmg){
  a.hp-=dmg;
  particles.push({x:a.x,y:a.y-10,t:0,text:'-'+dmg,color:'#ff0'});
  if(a.hp<=0){
    // drops
    if(a.type.dropFood>0){inv.food+=a.type.dropFood;particles.push({x:a.x,y:a.y-20,t:0,text:'+'+a.type.dropFood+'🍖',color:'#4ade80'});}
    if(a.type.dropStone>0){inv.stone+=a.type.dropStone;particles.push({x:a.x,y:a.y-30,t:0,text:'+'+a.type.dropStone+'🪨',color:'#94a3b8'});}
    updateCraft();updateBuildPanel();
    return true; // dead
  }
  return false;
}

function changeWeather(){
  const choices=WEATHERS.filter(w=>w!==weather);
  weather=choices[Math.floor(Math.random()*choices.length)];
}

function markExplored(px,py){
  const gx=Math.floor(px/60),gy=Math.floor(py/60);
  for(let dx=-2;dx<=2;dx++)for(let dy=-2;dy<=2;dy++){explored[(gx+dx)+','+(gy+dy)]=true;}
}

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').style.display='block';
  document.getElementById('dayDisplay').style.display='block';
  document.getElementById('weatherDisplay').style.display='block';
  document.getElementById('minimapCanvas').style.display='block';
  document.getElementById('invDisplay').style.display='block';
  document.getElementById('craftPanel').style.display='flex';
  document.getElementById('buildPanel').style.display='flex';
  document.getElementById('tempBar').style.display='flex';
  state='playing';
  player={x:MAP/2,y:MAP/2,hp:100,hunger:100,speed:2.5,temp:100};
  inv={wood:0,food:0,stone:0};
  crafted={};buildings=[];explored={};
  weather='sunny';weatherTimer=0;
  day=1;dayTimer=0;isNight=false;frame=0;
  resources=[];animals=[];particles=[];
  spawnResources();
  updateCraft();
  updateBuildPanel();
  requestAnimationFrame(gameLoop);
}

function endGame(){
  state='over';
  _hub('survival',day);
  const cause=player.hp<=0?(player.temp<=0?'저체온':'체력 소진'):'아사';
  document.getElementById('goTitle').textContent='💀 '+cause;
  const craftCount=Object.keys(crafted).length;
  document.getElementById('goStats').textContent=`생존 일수: ${day}일 | 제작: ${craftCount}/${RECIPES.length} | 건물: ${buildings.length} | 날씨: ${WEATHER_INFO[weather].name}`;
  document.getElementById('gameOver').classList.remove('hidden');
}

// Check if flare was crafted = victory
function checkVictory(){
  if(crafted.flare){
    state='over';
    _hub('survival',day*100);
    document.getElementById('goTitle').textContent='🎉 구조됨!';
    document.getElementById('goStats').textContent=`${day}일 만에 구조! 신호탄으로 탈출 성공!`;
    document.getElementById('gameOver').classList.remove('hidden');
  }
}

function updateCraft(){
  const panel=document.getElementById('craftPanel');
  panel.innerHTML='';
  RECIPES.forEach(r=>{
    if(crafted[r.id])return;
    const btn=document.createElement('button');
    btn.className='craft-btn';
    const costStr=Object.entries(r.cost).map(([k,v])=>{
      const icons={wood:'🪵',food:'🍖',stone:'🪨'};
      return (icons[k]||k)+v;
    }).join(' ');
    btn.innerHTML=`<div>${r.name}</div><div style="font-size:9px;opacity:0.7">${costStr}</div>`;
    btn.title=r.desc;
    let canCraft=true;
    for(const[k,v]of Object.entries(r.cost)){if((inv[k]||0)<v)canCraft=false;}
    btn.disabled=!canCraft;
    btn.onclick=()=>{
      for(const[k,v]of Object.entries(r.cost))inv[k]-=v;
      crafted[r.id]=true;
      craftFlash=30;
      particles.push({x:player.x,y:player.y-20,t:0,text:r.name+' 제작!',color:'#4f4'});
      for(let ii=0;ii<8;ii++){particles.push({x:player.x+(Math.random()-0.5)*30,y:player.y-10+(Math.random()-0.5)*20,t:0,text:'✨',color:'#fbbf24'});}
      if(r.id==='flare')checkVictory();
      updateCraft();updateBuildPanel();
    };
    panel.appendChild(btn);
  });
  // eat button
  if(inv.food>0){
    const eatBtn=document.createElement('button');
    eatBtn.className='craft-btn eat-btn';
    eatBtn.textContent='🍖 음식 먹기 (+30 배고픔)';
    eatBtn.onclick=()=>{inv.food--;player.hunger=Math.min(100,player.hunger+30);updateCraft();};
    panel.appendChild(eatBtn);
  }
}

function updateBuildPanel(){
  const panel=document.getElementById('buildPanel');
  panel.innerHTML='';
  BUILDING_TYPES.forEach(bt=>{
    if(!crafted[bt.need])return;
    const btn=document.createElement('button');
    btn.className='build-btn';
    btn.textContent=bt.name+' 설치';
    btn.onclick=()=>{
      buildings.push({x:player.x,y:player.y,type:bt.id,name:bt.name,radius:bt.radius});
      delete crafted[bt.need];
      particles.push({x:player.x,y:player.y-20,t:0,text:bt.name+' 설치!',color:'#38bdf8'});
      updateCraft();updateBuildPanel();
    };
    panel.appendChild(btn);
  });
}

// joystick
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect();
  joyStartX=e.clientX-r.left;joyStartY=e.clientY-r.top;
  joyActive=true;
});
canvas.addEventListener('pointermove',e=>{
  if(!joyActive)return;
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const dx=cx-joyStartX,dy=cy-joyStartY;
  const dist=Math.hypot(dx,dy);
  if(dist>0){const d=Math.min(dist,50);joyX=(dx/dist)*(d/50);joyY=(dy/dist)*(d/50);}
});
canvas.addEventListener('pointerup',()=>{joyActive=false;joyX=0;joyY=0;});
canvas.addEventListener('pointercancel',()=>{joyActive=false;joyX=0;joyY=0;});

function update(){
  if(state!=='playing')return;
  frame++;

  // weather speed modifier
  let speedMod=1;
  if(weather==='rain')speedMod=0.7;
  if(weather==='storm')speedMod=0.85;

  // move
  player.x=Math.max(10,Math.min(MAP-10,player.x+joyX*player.speed*speedMod));
  player.y=Math.max(10,Math.min(MAP-10,player.y+joyY*player.speed*speedMod));
  camX=player.x-W/2;camY=player.y-H/2;

  // exploration fog of war
  markExplored(player.x,player.y);

  // day/night cycle
  dayTimer++;
  if(dayTimer>=DAY_LENGTH){
    dayTimer=0;
    if(isNight){
      isNight=false;day++;
      // weather changes every 2 days
      weatherTimer++;
      if(weatherTimer>=WEATHER_CYCLE){weatherTimer=0;changeWeather();}
      particles.push({x:player.x,y:player.y-30,t:0,text:'☀️ '+day+'일차 아침!',color:'#fbbf24'});
      // respawn resources biome-aware
      for(let i=0;i<15;i++){
        const x=Math.random()*MAP,y=Math.random()*MAP;
        const biome=getBiome(x,y);
        const r=Math.random();
        let type,emoji;
        if(r<0.4){type='wood';emoji='🪵';}
        else if(r<0.7){type='stone';emoji='🪨';}
        else{type='food';emoji='🍖';}
        resources.push({x,y,type,emoji,amount:biome===3?2:1});
      }
    }else{
      isNight=true;
      particles.push({x:player.x,y:player.y-30,t:0,text:'🌙 밤이 왔다!',color:'#818cf8'});
      animals=[];
      spawnAnimals();
    }
  }

  // rain auto-collects water (gives food as proxy)
  if(weather==='rain'&&frame%180===0){
    inv.food++;
    particles.push({x:player.x,y:player.y-25,t:0,text:'+1🍖 빗물',color:'#38bdf8'});
  }

  // hunger/hp/temp decay
  if(frame%90===0){
    let hungerRate=weather==='storm'?2:1;
    player.hunger=Math.max(0,player.hunger-hungerRate);

    // temperature
    let tempChange=0;
    if(weather==='snow')tempChange=-3;
    if(isNight)tempChange-=1;
    // nearby fire building warms
    const nearFire=buildings.some(b=>b.type==='fire'&&Math.hypot(b.x-player.x,b.y-player.y)<b.radius);
    if(nearFire)tempChange+=4;
    if(crafted.torch)tempChange+=1;
    if(!isNight&&weather!=='snow')tempChange+=2;
    player.temp=Math.max(0,Math.min(100,player.temp+tempChange));
    if(player.temp<=0)player.hp=Math.max(0,player.hp-3);

    if(isNight){
      // tent building: safe sleep = HP recovery
      const nearTent=buildings.some(b=>b.type==='tent'&&Math.hypot(b.x-player.x,b.y-player.y)<b.radius);
      if(nearTent){player.hp=Math.min(100,player.hp+2);}
      else{player.hp=Math.max(0,player.hp-1);}
    }
    if(player.hunger<=0)player.hp=Math.max(0,player.hp-2);
    if(player.hp<=0)endGame();
  }

  // fishing rod: near edge of map (water) gives food periodically
  if(crafted.rod&&frame%200===0){
    const edgeDist=Math.min(player.x,player.y,MAP-player.x,MAP-player.y);
    if(edgeDist<80){
      inv.food+=2;
      particles.push({x:player.x,y:player.y-20,t:0,text:'+2🐟 낚시!',color:'#38bdf8'});
      updateCraft();
    }
  }

  // trap: auto-kills nearby weak animals
  if(crafted.trap&&frame%120===0){
    animals=animals.filter(a=>{
      if(a.hp<=15&&Math.hypot(a.x-player.x,a.y-player.y)<80){
        inv.food+=a.type.dropFood;
        particles.push({x:a.x,y:a.y-10,t:0,text:'🪤 '+a.type.emoji+' 포획!',color:'#4ade80'});
        updateCraft();updateBuildPanel();
        return false;
      }
      return true;
    });
  }

  // collect resources
  resources=resources.filter(r=>{
    if(Math.hypot(r.x-player.x,r.y-player.y)<22){
      let amt=r.amount;
      if(r.type==='wood'&&crafted.axe)amt*=2;
      if(r.type==='stone'&&crafted.pickaxe)amt*=2;
      inv[r.type]=(inv[r.type]||0)+amt;
      particles.push({x:r.x,y:r.y-5,t:0,text:'+'+amt+' '+r.emoji,color:'#4ade80'});
      updateCraft();updateBuildPanel();
      return false;
    }
    return true;
  });

  // bow: auto-attack nearest animal in range
  if(crafted.bow&&frame%60===0){
    let nearest=null,nearDist=180;
    animals.forEach(a=>{
      const d=Math.hypot(a.x-player.x,a.y-player.y);
      if(d<nearDist){nearDist=d;nearest=a;}
    });
    if(nearest){
      const dmg=crafted.knife?20:10;
      if(attackAnimal(nearest,dmg)){
        animals=animals.filter(a=>a!==nearest);
      }
    }
  }

  // animal AI
  animals.forEach(a=>{
    const dx=player.x-a.x,dy=player.y-a.y;
    const dist=Math.hypot(dx,dy)||1;

    // check if near a fire building
    const nearFireBuilding=buildings.some(b=>b.type==='fire'&&Math.hypot(b.x-a.x,b.y-a.y)<b.radius);
    // check if blocked by fence
    const blockedByFence=buildings.some(b=>b.type==='fence'&&Math.hypot(b.x-a.x,b.y-a.y)<b.radius);

    if(nearFireBuilding||blockedByFence){
      // flee
      a.x-=dx/dist*a.speed;a.y-=dy/dist*a.speed;
      return;
    }

    // behavior
    switch(a.type.behavior){
      case 'flee': // rabbit
        if(dist<120){a.x-=dx/dist*a.speed*1.3;a.y-=dy/dist*a.speed*1.3;}
        else{a.x+=Math.sin(frame*0.03+a.x)*0.5;a.y+=Math.cos(frame*0.03+a.y)*0.5;}
        break;
      case 'chase': // wolf
        if(dist<350){a.x+=dx/dist*a.speed;a.y+=dy/dist*a.speed;}
        break;
      case 'charge': // boar - charges in straight line
        if(a.chargeDir){
          a.x+=a.chargeDir.x*a.speed*2;a.y+=a.chargeDir.y*a.speed*2;
          a.chargeCd--;
          if(a.chargeCd<=0)a.chargeDir=null;
        }else if(dist<250){
          if(Math.random()<0.02){a.chargeDir={x:dx/dist,y:dy/dist};a.chargeCd=40;}
          else{a.x+=dx/dist*a.speed*0.5;a.y+=dy/dist*a.speed*0.5;}
        }
        break;
      case 'swoop': // eagle - fast dive attacks
        if(!a.swoopBase)a.swoopBase={x:a.x,y:a.y};
        if(dist<300){
          const swoopPhase=Math.sin(frame*0.05)*50;
          a.x=a.swoopBase.x+dx/dist*swoopPhase;
          a.y=a.swoopBase.y+dy/dist*swoopPhase;
          if(dist<200){a.swoopBase.x+=dx/dist*0.5;a.swoopBase.y+=dy/dist*0.5;}
        }
        break;
      case 'poison': // snake - slow but poisons
        if(dist<200){a.x+=dx/dist*a.speed;a.y+=dy/dist*a.speed;}
        break;
      case 'boss': // bear
        if(dist<400){a.x+=dx/dist*a.speed;a.y+=dy/dist*a.speed;}
        break;
    }

    // collision damage
    if(a.hitCd>0)a.hitCd--;
    if(dist<20&&a.hitCd<=0&&a.type.behavior!=='flee'){
      let dmg=a.damage;
      if(crafted.shield)dmg=Math.floor(dmg/2);
      player.hp=Math.max(0,player.hp-dmg);
      a.hitCd=40;
      particles.push({x:player.x,y:player.y,t:0,text:'-'+dmg,color:'#f44'});
      // snake poison: extra DOT
      if(a.type.behavior==='poison'){
        a.poisonTimer=5;
        particles.push({x:player.x,y:player.y-15,t:0,text:'🤢 독!',color:'#a855f7'});
      }
      // melee counter-attack
      const counterDmg=crafted.knife?15:5;
      if(attackAnimal(a,counterDmg)){
        a.hp=-1; // mark for removal
      }
      if(player.hp<=0)endGame();
    }
    // poison DOT
    if(a.poisonTimer>0&&frame%60===0){
      player.hp=Math.max(0,player.hp-3);
      a.poisonTimer--;
      particles.push({x:player.x,y:player.y-10,t:0,text:'-3 독',color:'#a855f7'});
      if(player.hp<=0)endGame();
    }
  });

  // remove dead animals
  animals=animals.filter(a=>a.hp>0);

  // player touches rabbit = catches it (flee type)
  animals=animals.filter(a=>{
    if(a.type.behavior==='flee'&&Math.hypot(a.x-player.x,a.y-player.y)<18){
      inv.food+=a.type.dropFood;
      particles.push({x:a.x,y:a.y-10,t:0,text:'+'+a.type.dropFood+'🍖',color:'#4ade80'});
      updateCraft();updateBuildPanel();
      return false;
    }
    return true;
  });

  particles=particles.filter(p=>{p.t++;return p.t<50;});

  // update UI
  document.getElementById('hpBar').style.width=(player.hp)+'%';
  document.getElementById('hungerBar').style.width=(player.hunger)+'%';
  document.getElementById('tempBarInner').style.width=(player.temp)+'%';
  document.getElementById('tempBarInner').style.background=player.temp>50?'#38bdf8':'#ef4444';
  document.getElementById('dayDisplay').textContent=(isNight?'🌙':'☀️')+' '+day+'일차';
  document.getElementById('weatherDisplay').textContent=WEATHER_INFO[weather].icon+' '+WEATHER_INFO[weather].name;
  const craftIcons=Object.keys(crafted).map(k=>{const r=RECIPES.find(rr=>rr.id===k);return r?r.name.split(' ')[0]:'';}).join('');
  document.getElementById('invDisplay').innerHTML='🪵'+inv.wood+' 🍖'+inv.food+' 🪨'+inv.stone+(craftIcons?' | '+craftIcons:'');
}

function draw(){
  const nightAlpha=isNight?0.4*(1-Math.abs(dayTimer-DAY_LENGTH/2)/(DAY_LENGTH/2)):0;
  ctx.fillStyle=isNight?'#0a1a0a':'#1a3a1a';ctx.fillRect(0,0,W,H);

  const sx=x=>x-camX,sy=y=>y-camY;

  // ground texture with biomes
  const tileSize=30;
  const startTX=Math.max(0,Math.floor(camX/tileSize));
  const startTY=Math.max(0,Math.floor(camY/tileSize));
  const endTX=Math.min(Math.ceil(MAP/tileSize),Math.ceil((camX+W)/tileSize)+1);
  const endTY=Math.min(Math.ceil(MAP/tileSize),Math.ceil((camY+H)/tileSize)+1);
  for(let tx=startTX;tx<endTX;tx++){
    for(let ty=startTY;ty<endTY;ty++){
      const wx=tx*tileSize,wy=ty*tileSize;
      const biome=getBiome(wx,wy);
      const bi=BIOME_INFO[biome];
      ctx.fillStyle=isNight?bi.colorNight:bi.color;
      ctx.fillRect(sx(wx),sy(wy),tileSize-1,tileSize-1);
    }
  }

  // buildings
  buildings.forEach(b=>{
    const bx=sx(b.x),by=sy(b.y);
    if(bx>-50&&bx<W+50&&by>-50&&by<H+50){
      // radius indicator
      ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(bx,by,b.radius,0,Math.PI*2);ctx.stroke();
      ctx.font='22px serif';ctx.textAlign='center';
      if(b.type==='fire'){
        ctx.fillText('🔥',bx,by+7);
        // fire glow
        if(isNight){
          const fg=ctx.createRadialGradient(bx,by,5,bx,by,b.radius);
          fg.addColorStop(0,'rgba(255,150,50,0.25)');fg.addColorStop(1,'rgba(255,150,50,0)');
          ctx.fillStyle=fg;ctx.fillRect(bx-b.radius,by-b.radius,b.radius*2,b.radius*2);
        }
      }else if(b.type==='fence'){
        ctx.fillText('🏗️',bx,by+7);
      }else if(b.type==='tent'){
        ctx.fillText('⛺',bx,by+7);
      }
      ctx.textAlign='left';
    }
  });

  // resources
  ctx.font='20px serif';
  resources.forEach(r=>{
    const rx=sx(r.x),ry=sy(r.y);
    if(rx>-20&&rx<W+20&&ry>-20&&ry<H+20){
      ctx.fillText(r.emoji,rx-10,ry+7);
    }
  });

  // animals (always visible now, with emoji)
  animals.forEach(a=>{
    const ax=sx(a.x),ay=sy(a.y);
    if(ax>-20&&ax<W+20&&ay>-20&&ay<H+20){
      ctx.font='20px serif';ctx.textAlign='center';
      ctx.fillText(a.type.emoji,ax,ay+7);
      // HP bar for non-full HP
      if(a.hp<a.maxHp){
        const barW=24,barH=3;
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ax-barW/2,ay-a.r-6,barW,barH);
        ctx.fillStyle=a.hp>a.maxHp*0.5?'#4ade80':'#ef4444';
        ctx.fillRect(ax-barW/2,ay-a.r-6,barW*(a.hp/a.maxHp),barH);
      }
      ctx.textAlign='left';
    }
  });

  // player
  const px=sx(player.x),py=sy(player.y);
  ctx.fillStyle='#60a5fa';
  ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(px-4,py-3,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4,py-3,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(px-4,py-3,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4,py-3,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px,py+3,3,0,Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  // show equipped items around player
  if(crafted.shield){ctx.font='12px serif';ctx.fillText('🛡️',px+14,py-8);}
  if(crafted.bow){ctx.font='12px serif';ctx.fillText('🏹',px-22,py-8);}

  // craft flash
  if(craftFlash>0){
    ctx.fillStyle=`rgba(74,222,128,${craftFlash/30*0.15})`;
    ctx.fillRect(0,0,W,H);
    craftFlash--;
  }

  // weather effects
  if(weather==='rain'){
    ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;
    for(let i=0;i<40;i++){
      const rx=(frame*2+i*37)%W,ry=(frame*4+i*53)%H;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-2,ry+8);ctx.stroke();
    }
  }
  if(weather==='snow'){
    ctx.fillStyle='rgba(255,255,255,0.6)';
    for(let i=0;i<30;i++){
      const sx2=(Math.sin(frame*0.02+i*1.7)*30+i*41)%W;
      const sy2=(frame*1.5+i*47)%H;
      ctx.beginPath();ctx.arc(Math.abs(sx2),sy2,2,0,Math.PI*2);ctx.fill();
    }
  }
  if(weather==='storm'){
    ctx.fillStyle=`rgba(50,50,80,${0.1+Math.sin(frame*0.1)*0.05})`;ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(150,150,200,0.2)';ctx.lineWidth=1;
    for(let i=0;i<60;i++){
      const rx=(frame*3+i*29)%W,ry=(frame*5+i*43)%H;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-4,ry+12);ctx.stroke();
    }
  }

  // night overlay
  if(isNight){
    const transitionProgress=Math.min(dayTimer/60,1);
    ctx.fillStyle=`rgba(0,0,30,${(0.3+nightAlpha*0.2)*transitionProgress})`;ctx.fillRect(0,0,W,H);
    const visionR=crafted.torch?180:(buildings.some(b=>b.type==='fire'&&Math.hypot(b.x-player.x,b.y-player.y)<b.radius)?150:80);
    const vg=ctx.createRadialGradient(px,py,30,px,py,visionR);
    vg.addColorStop(0,'rgba(0,0,30,0)');vg.addColorStop(1,'rgba(0,0,30,0.5)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // heartbeat effect at low HP
  if(player.hp<=25&&player.hp>0){
    heartbeatTimer+=0.08;
    const beat=Math.sin(heartbeatTimer*4)*0.5+0.5;
    const intensity=beat*(1-player.hp/25)*0.2;
    ctx.fillStyle=`rgba(255,0,0,${intensity})`;
    ctx.fillRect(0,0,W,H);
    const vg=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
    vg.addColorStop(0,'rgba(255,0,0,0)');
    vg.addColorStop(1,`rgba(100,0,0,${intensity*1.5})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // cold overlay when temp is low
  if(player.temp<30){
    const coldAlpha=(1-player.temp/30)*0.15;
    ctx.fillStyle=`rgba(100,150,255,${coldAlpha})`;ctx.fillRect(0,0,W,H);
  }

  // animal approach warning
  animals.forEach(a=>{
    if(a.type.behavior==='flee')return;
    const dist=Math.hypot(a.x-player.x,a.y-player.y);
    if(dist<200&&dist>50){
      const ax=sx(a.x),ay=sy(a.y);
      ctx.fillStyle=`rgba(255,0,0,${(1-dist/200)*0.5})`;
      ctx.font='bold 10px sans-serif';ctx.textAlign='center';
      ctx.fillText('⚠️',ax,ay-a.r-8);
      ctx.textAlign='left';
    }
  });

  // particles
  particles.forEach(p=>{
    const a=1-p.t/50;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.font='bold 13px sans-serif';
    ctx.fillText(p.text,sx(p.x)-20,sy(p.y)-p.t*0.6);ctx.globalAlpha=1;
  });

  // joystick
  if(joyActive){
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(joyStartX,joyStartY,40,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(joyStartX+joyX*40,joyStartY+joyY*40,14,0,Math.PI*2);ctx.fill();
  }

  // biome label
  const currentBiome=getBiome(player.x,player.y);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px sans-serif';
  ctx.fillText(BIOME_INFO[currentBiome].name,10,H-10);

  // MINIMAP
  drawMinimap();
}

function drawMinimap(){
  const scale=MINIMAP_SIZE/MAP;
  mctx.clearRect(0,0,MINIMAP_SIZE,MINIMAP_SIZE);
  // fog of war base
  mctx.fillStyle='#111';mctx.fillRect(0,0,MINIMAP_SIZE,MINIMAP_SIZE);
  // draw explored tiles
  const gridSize=60;
  for(const key in explored){
    const[gx,gy]=key.split(',').map(Number);
    const wx=gx*gridSize,wy=gy*gridSize;
    const biome=getBiome(wx,wy);
    const bi=BIOME_INFO[biome];
    mctx.fillStyle=isNight?bi.colorNight:bi.color;
    mctx.fillRect(wx*scale,wy*scale,gridSize*scale+1,gridSize*scale+1);
  }
  // buildings on minimap
  buildings.forEach(b=>{
    mctx.fillStyle=b.type==='fire'?'#f97316':b.type==='fence'?'#60a5fa':'#a78bfa';
    mctx.fillRect(b.x*scale-1,b.y*scale-1,3,3);
  });
  // animals on minimap
  animals.forEach(a=>{
    mctx.fillStyle=a.type.behavior==='flee'?'#86efac':'#ef4444';
    mctx.fillRect(a.x*scale-1,a.y*scale-1,2,2);
  });
  // player dot
  mctx.fillStyle='#60a5fa';
  mctx.beginPath();mctx.arc(player.x*scale,player.y*scale,3,0,Math.PI*2);mctx.fill();
  // camera view rectangle
  mctx.strokeStyle='rgba(255,255,255,0.5)';mctx.lineWidth=1;
  mctx.strokeRect(camX*scale,camY*scale,W*scale,H*scale);
}

function gameLoop(){
  update();draw();
  if(state==='playing')requestAnimationFrame(gameLoop);
}
</script>
