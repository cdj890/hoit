<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='undefined')r=0;if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;};}

  {icon:'🏹',name:'활',dmg:8,spd:18,range:90,desc:'빠르고 먼 거리 공격'},
  {icon:'🔮',name:'지팡이',dmg:12,spd:30,range:70,desc:'마법 공격 지팡이'},
  {icon:'💠',name:'수리검',dmg:7,spd:12,range:55,desc:'매우 빠른 연속 공격'},
  {icon:'🔥',name:'화염검',dmg:13,spd:28,range:45,desc:'불꽃이 타오르는 검'},

  {name:'보호막',icon:'🛡️',desc:'일시적 무적',cd:600,unlockLv:9,duration:120,active:false,timer:0,cdTimer:0},
];

const DROP_TABLE=[
  {icon:'❤️',name:'체력포션',type:'heal',value:30,duration:0},
  {icon:'⚔️',name:'공격력부스트',type:'atkBuff',value:0.5,duration:1800},
  {icon:'🛡️',name:'방어력부스트',type:'defBuff',value:5,duration:1800},

];

const SHOP_ITEMS=[

  {name:'⚔️ 공격력+3',desc:'영구 공격력 증가',cost:30,apply:p=>{p.atk+=3}},
  {name:'🛡️ 방어력+2',desc:'영구 방어력 증가',cost:30,apply:p=>{p.def+=2}},

  {name:'⚡ 공격속도+',desc:'공격이 빨라짐',cost:35,apply:p=>{p.atkSpeed=Math.max(8,p.atkSpeed-3)}},
  {name:'👟 이동속도+',desc:'이동이 빨라짐',cost:25,apply:p=>{p.speed+=0.3}},
];

function spawnFloorEnemies(){
  enemies=[];droppedItems=[];
  const isBoss=floor%5===0;
  if(isBoss){
    enemies.push({
      x:W/2,y:H*0.3,hp:50+floor*20,maxHp:50+floor*20,
      atk:8+floor*2,speed:0.8,r:25,color:'#dc2626',type:'boss',
      name:'보스',hitCd:0,goldVal:15+floor*2,xpVal:10+floor*2,
      elite:false,pattern:'idle',patternTimer:0,patternCd:90,summonCd:0
    });
  }else{
    const count=3+Math.floor(floor*0.8);
    for(let i=0;i<count;i++){
      const isSkele=Math.random()<0.3+floor*0.03;
      const isElite=floor>3&&Math.random()<0.15;
      const mult=1+floor*0.15;
      const eliteMult=isElite?3:1;
      const e={
        x:50+Math.random()*(W-100),
        y:50+Math.random()*(H-150),
        hp:Math.floor((isSkele?25:15)*mult*eliteMult),
        maxHp:Math.floor((isSkele?25:15)*mult*eliteMult),
        atk:Math.floor((isSkele?8:5)*mult*(isElite?1.5:1)),
        speed:(isSkele?0.7:1)*(isElite?1.3:1),
        r:(isSkele?13:11)*(isElite?1.4:1),
        color:isSkele?'#d4d4d8':'#22c55e',
        type:isSkele?'skeleton':'slime',
        name:(isElite?'엘리트 ':'')+(isSkele?'스켈레톤':'슬라임'),
        hitCd:0,
        goldVal:(isSkele?5:3)*(isElite?3:1),
        xpVal:(isSkele?4:2)*(isElite?3:1),
        elite:isElite
      };
      enemies.push(e);
    }
  }
}

function showFloorMsg(text){
  const el=document.getElementById('floorMsg');
  el.textContent=text;el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},1500);
}

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  showWeaponSelect();
}

function showWeaponSelect(){
  selectedWeaponIdx=-1;
  const ws=document.getElementById('weaponSelect');
  ws.style.display='flex';
  const grid=document.getElementById('weaponGrid');
  grid.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='weapon-card';
    card.innerHTML=`<span class="wicon">${w.icon}</span><span class="wname">${w.name}</span><span class="wstats">ATK:${w.dmg} SPD:${Math.round(60/w.spd*10)/10}</span>`;
    card.onclick=()=>{
      document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedWeaponIdx=i;
      document.getElementById('weaponDesc').textContent=`${w.icon} ${w.name} — ${w.desc} (사거리:${w.range})`;
      const btn=document.getElementById('weaponConfirmBtn');
      btn.disabled=false;btn.style.opacity='1';
    };
    grid.appendChild(card);
  });
  document.getElementById('weaponConfirmBtn').onclick=()=>{
    if(selectedWeaponIdx<0)return;
    document.getElementById('weaponSelect').style.display='none';
    beginGame(selectedWeaponIdx);
  };
}

function beginGame(wIdx){
  const w=WEAPONS[wIdx];
  document.getElementById('hud').style.display='block';
  document.getElementById('skillBar').style.display='flex';
  state='playing';floor=1;killCount=0;buffs=[];
  player={x:W/2,y:H*0.7,hp:100,maxHp:100,atk:w.dmg,def:2,speed:2.8,atkRange:w.range,atkCd:0,atkSpeed:w.spd,level:1,xp:0,xpNeeded:10,gold:0,weaponIdx:wIdx};
  enemies=[];particles=[];slashEffects=[];droppedItems=[];
  SKILLS.forEach(s=>{s.active=false;s.timer=0;s.cdTimer=0;});
  spawnFloorEnemies();
  showFloorMsg('⚔️ 1층');
  updateSkillButtons();
  requestAnimationFrame(gameLoop);
}

function nextFloor(){
  floor++;
  player.x=W/2;player.y=H*0.7;
  spawnFloorEnemies();
  showFloorMsg((floor%5===0?'👹 보스! ':'⚔️ ')+floor+'층');
  _hub('hackslash',floor);
}

function openShop(){
  paused=true;
  document.getElementById('shop').style.display='flex';
  document.getElementById('shopGold').textContent='💰 '+player.gold+'G';
  const container=document.getElementById('shopItems');
  container.innerHTML='';
  const picks=[];
  const pool=[...SHOP_ITEMS];
  for(let i=0;i<3&&pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    picks.push(pool.splice(idx,1)[0]);
  }
  picks.forEach(item=>{
    const btn=document.createElement('button');
    btn.className='btn shop-btn';
    btn.textContent=item.name+' ('+item.cost+'G) - '+item.desc;
    btn.disabled=player.gold<item.cost;
    if(btn.disabled)btn.style.opacity='0.4';
    btn.onclick=()=>{
      if(player.gold>=item.cost){
        player.gold-=item.cost;
        item.apply(player);
        btn.disabled=true;btn.style.opacity='0.4';
        document.getElementById('shopGold').textContent='💰 '+player.gold+'G';
        updateHUD();
      }
    };
    container.appendChild(btn);
  });
}

function closeShop(){
  document.getElementById('shop').style.display='none';
  paused=false;
  nextFloor();
}

function addXP(val){
  player.xp+=val;
  while(player.xp>=player.xpNeeded){
    player.xp-=player.xpNeeded;
    player.level++;
    player.xpNeeded=Math.floor(player.xpNeeded*1.3)+5;
    player.atk+=2;player.def+=1;player.maxHp+=10;player.hp=Math.min(player.hp+15,player.maxHp);
    particles.push({x:player.x,y:player.y-25,t:0,text:'⬆️ Lv.'+player.level,color:'#a855f7'});
  }
}

function endGame(){
  state='over';
  _hub('hackslash',floor);
  document.getElementById('goStats').textContent=`도달 층: ${floor}층 | 레벨: ${player.level} | 처치: ${killCount}`;
  document.getElementById('gameOver').classList.remove('hidden');
}

// joystick
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect();
  joyStartX=e.clientX-r.left;joyStartY=e.clientY-r.top;
  joyActive=true;
});
canvas.addEventListener('pointermove',e=>{
  if(!joyActive)return;
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const dx=cx-joyStartX,dy=cy-joyStartY;
  const dist=Math.hypot(dx,dy);
  if(dist>0){const d=Math.min(dist,50);joyX=(dx/dist)*(d/50);joyY=(dy/dist)*(d/50);}
});
canvas.addEventListener('pointerup',()=>{joyActive=false;joyX=0;joyY=0;});
canvas.addEventListener('pointercancel',()=>{joyActive=false;joyX=0;joyY=0;});

function useSkill(idx){
  const s=SKILLS[idx];
  if(player.level<s.unlockLv||s.cdTimer>0||s.active)return;
  s.active=true;s.timer=s.duration;s.cdTimer=s.cd;
  if(idx===0){// dash
    const dx=joyX||0,dy=joyY||0;
    const mag=Math.hypot(dx,dy);
    const dirX=mag>0?dx/mag:0,dirY=mag>0?dy/mag:1;
    player.dashDx=dirX;player.dashDy=dirY;
    enemies.forEach(e=>{
      const ex=e.x-player.x,ey=e.y-player.y;
      if(Math.hypot(ex,ey)<80){
        const dmg=Math.floor(player.atk*1.5);
        e.hp-=dmg;
        particles.push({x:e.x,y:e.y-10,t:0,text:'-'+dmg+'💥',color:'#f97316'});
      }
    });
    enemies=enemies.filter(e=>{
      if(e.hp<=0){killEnemy(e);return false;}return true;
    });
  }
  if(idx===1){// meteor
    const cx=player.x,cy=player.y;
    for(let i=0;i<15;i++){
      const a=Math.random()*Math.PI*2,d=Math.random()*80;
      particles.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,t:0,text:'🔥',color:'#f97316'});
    }
    screenShake=12;
    enemies.forEach(e=>{
      if(Math.hypot(e.x-cx,e.y-cy)<100){
        const dmg=Math.floor(player.atk*2.5);
        e.hp-=dmg;
        particles.push({x:e.x,y:e.y-10,t:0,text:'-'+dmg+'☄️',color:'#f97316'});
      }
    });
    enemies=enemies.filter(e=>{
      if(e.hp<=0){killEnemy(e);return false;}return true;
    });
  }
  if(idx===2){// shield
    particles.push({x:player.x,y:player.y-20,t:0,text:'🛡️ 보호막!',color:'#60a5fa'});
  }
  updateSkillButtons();
}

function updateSkillButtons(){
  SKILLS.forEach((s,i)=>{
    const btn=document.getElementById('skill'+i);
    const cd=document.getElementById('cd'+i);
    if(player.level>=s.unlockLv){
      btn.classList.remove('locked');
      if(s.cdTimer>0){
        cd.textContent=Math.ceil(s.cdTimer/60)+'s';
        btn.style.opacity='0.5';
      }else{
        cd.textContent='';
        btn.style.opacity='1';
      }
    }else{
      btn.classList.add('locked');
      cd.textContent='Lv'+s.unlockLv;
    }
  });
}

function killEnemy(e){
  player.gold+=Math.floor(e.goldVal*getBuffMult('goldBuff'));
  const xpMult=getBuffMult('xpBuff');
  addXP(Math.floor(e.xpVal*xpMult));
  killCount++;
  particles.push({x:e.x,y:e.y,t:0,text:'+'+e.goldVal+'G',color:'#fbbf24'});
  // item drop
  const dropChance=e.elite?0.35:0.1;
  if(Math.random()<dropChance){
    const drop=DROP_TABLE[Math.floor(Math.random()*DROP_TABLE.length)];
    droppedItems.push({x:e.x,y:e.y,icon:drop.icon,name:drop.name,type:drop.type,value:drop.value,duration:drop.duration,t:0});
  }
}

function getBuffMult(type){
  const b=buffs.find(b=>b.type===type);
  return b?b.value:1;
}

function applyDrop(item){
  if(item.type==='heal'){
    player.hp=Math.min(player.maxHp,player.hp+item.value);
    particles.push({x:player.x,y:player.y-20,t:0,text:'+'+item.value+'HP',color:'#4ade80'});
  }else{
    // buff
    const existing=buffs.find(b=>b.type===item.type);
    if(existing){existing.remaining=item.duration;}
    else{buffs.push({type:item.type,icon:item.icon,name:item.name,remaining:item.duration,value:item.value});}
    particles.push({x:player.x,y:player.y-20,t:0,text:item.icon+item.name+'!',color:'#a855f7'});
  }
}

function updateBuffs(){
  buffs.forEach(b=>b.remaining--);
  buffs=buffs.filter(b=>b.remaining>0);
  // apply atk/def buff effects are checked in combat via getBuffMult
  const bar=document.getElementById('buffBar');
  bar.innerHTML='';
  buffs.forEach(b=>{
    const div=document.createElement('div');
    div.className='buff-icon';
    div.innerHTML=b.icon+' <span class="buff-timer">'+Math.ceil(b.remaining/60)+'s</span>';
    bar.appendChild(div);
  });
}

function updateBossAI(e){
  if(e.type!=='boss')return;
  e.patternCd--;
  if(e.patternCd<=0&&e.pattern==='idle'){
    const roll=Math.random();
    if(roll<0.35){
      e.pattern='charge';e.patternTimer=30;
      const dx=player.x-e.x,dy=player.y-e.y;
      const d=Math.hypot(dx,dy)||1;
      e.chargeDx=dx/d;e.chargeDy=dy/d;
    }else if(roll<0.7){
      e.pattern='spin';e.patternTimer=45;
    }else{
      e.pattern='summon';e.patternTimer=20;
    }
  }
  if(e.pattern==='charge'){
    e.x+=e.chargeDx*5;e.y+=e.chargeDy*5;
    e.patternTimer--;
    if(Math.hypot(player.x-e.x,player.y-e.y)<e.r+18){
      const dmg=Math.max(1,e.atk*2-player.def);
      if(!SKILLS[2].active){player.hp-=dmg;screenShake=10;
      particles.push({x:player.x,y:player.y-10,t:0,text:'-'+dmg+'💥',color:'#f44'});}
      if(player.hp<=0)endGame();
    }
    if(e.patternTimer<=0){e.pattern='idle';e.patternCd=60+Math.random()*60;}
  }else if(e.pattern==='spin'){
    e.patternTimer--;
    // damage nearby player
    if(e.patternTimer%10===0&&Math.hypot(player.x-e.x,player.y-e.y)<e.r+40){
      const dmg=Math.max(1,Math.floor(e.atk*1.3)-player.def);
      if(!SKILLS[2].active){player.hp-=dmg;screenShake=6;
      particles.push({x:player.x,y:player.y-10,t:0,text:'-'+dmg+'🌀',color:'#f44'});}
      if(player.hp<=0)endGame();
    }
    if(e.patternTimer<=0){e.pattern='idle';e.patternCd=50+Math.random()*40;}
  }else if(e.pattern==='summon'){
    e.patternTimer--;
    if(e.patternTimer===10){
      for(let i=0;i<2;i++){
        const a=Math.random()*Math.PI*2;
        enemies.push({
          x:e.x+Math.cos(a)*40,y:e.y+Math.sin(a)*40,
          hp:10+floor*3,maxHp:10+floor*3,atk:3+floor,speed:1.2,r:9,
          color:'#f97316',type:'slime',name:'소환수',hitCd:0,goldVal:2,xpVal:1,elite:false
        });
      }
      particles.push({x:e.x,y:e.y-15,t:0,text:'소환!',color:'#dc2626'});
    }
    if(e.patternTimer<=0){e.pattern='idle';e.patternCd=90+Math.random()*60;}
  }
}

function updateHUD(){
  document.getElementById('floorDisp').textContent=floor+'층';
  document.getElementById('lvlDisp').textContent=player.level;
  document.getElementById('goldDisp').textContent=Math.floor(player.gold);
  document.getElementById('killDisp').textContent=killCount;
  const w=WEAPONS[player.weaponIdx||0];
  document.getElementById('weaponHud').textContent=w.icon+w.name;
  const atkBuff=buffs.find(b=>b.type==='atkBuff');
  document.getElementById('atkDisp').textContent=player.atk+(atkBuff?'⬆':'');
  const defBuff=buffs.find(b=>b.type==='defBuff');
  document.getElementById('defDisp').textContent=player.def+(defBuff?'⬆':'');
  document.getElementById('hpBar').style.width=((player.hp/player.maxHp)*100)+'%';
  document.getElementById('xpBar').style.width=((player.xp/player.xpNeeded)*100)+'%';
}

function update(){
  if(state!=='playing'||paused)return;

  // skill timers
  SKILLS.forEach((s,i)=>{
    if(s.active){s.timer--;if(s.timer<=0)s.active=false;}
    if(s.cdTimer>0)s.cdTimer--;
  });
  updateSkillButtons();

  // buff timers
  updateBuffs();

  // move (dash override)
  if(SKILLS[0].active){
    player.x+=player.dashDx*8;player.y+=player.dashDy*8;
  }else{
    player.x=Math.max(15,Math.min(W-15,player.x+joyX*player.speed));
    player.y=Math.max(15,Math.min(H-15,player.y+joyY*player.speed));
  }
  player.x=Math.max(15,Math.min(W-15,player.x));
  player.y=Math.max(15,Math.min(H-15,player.y));

  // collect dropped items
  droppedItems=droppedItems.filter(it=>{
    it.t++;
    if(it.t>600)return false;// despawn after 10s
    if(Math.hypot(it.x-player.x,it.y-player.y)<35){
      applyDrop(it);return false;
    }
    return true;
  });

  // enemy AI
  enemies.forEach(e=>{
    if(e.type==='boss'){updateBossAI(e);if(e.pattern!=='idle')return;}
    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.hypot(dx,dy);
    if(dist>0){
      e.x+=dx/dist*e.speed;
      e.y+=dy/dist*e.speed;
    }
    if(e.hitCd>0)e.hitCd--;
    if(dist<e.r+14&&e.hitCd<=0){
      if(SKILLS[2].active){// shield active
        e.hitCd=35;
        particles.push({x:player.x,y:player.y-10,t:0,text:'🛡️막음!',color:'#60a5fa'});
      }else{
        const defBuff=buffs.find(b=>b.type==='defBuff');
        const totalDef=player.def+(defBuff?defBuff.value:0);
        const dmg=Math.max(1,e.atk-totalDef);
        player.hp-=dmg;e.hitCd=35;
        screenShake=8;
        particles.push({x:player.x,y:player.y-10,t:0,text:'-'+dmg,color:'#f44'});
        if(player.hp<=0)endGame();
      }
    }
  });

  // auto attack
  player.atkCd--;
  if(player.atkCd<=0&&enemies.length>0){
    let nearest=null,nd=Infinity;
    enemies.forEach(e=>{const d=Math.hypot(e.x-player.x,e.y-player.y);if(d<nd){nd=d;nearest=e;}});
    if(nearest&&nd<player.atkRange+nearest.r){
      player.atkCd=player.atkSpeed;
      const atkBuff=buffs.find(b=>b.type==='atkBuff');
      const totalAtk=Math.floor(player.atk*(1+(atkBuff?atkBuff.value:0)));
      const dmg=totalAtk+Math.floor(Math.random()*3);
      nearest.hp-=dmg;
      particles.push({x:nearest.x,y:nearest.y-10,t:0,text:'-'+dmg,color:'#ff0'});
      slashEffects.push({x:(player.x+nearest.x)/2,y:(player.y+nearest.y)/2,t:0,angle:Math.atan2(nearest.y-player.y,nearest.x-player.x)});
      if(nearest.hp<=0){
        killEnemy(nearest);
        enemies.splice(enemies.indexOf(nearest),1);
      }
    }
  }

  // floor clear
  if(enemies.length===0&&floorClearCelebration===0){
    floorClearCelebration=60;
    // celebration particles
    for(let i=0;i<20;i++){
      const a=Math.random()*Math.PI*2;
      particles.push({x:player.x,y:player.y,t:0,text:['✨','⭐','💫'][Math.floor(Math.random()*3)],color:['#fbbf24','#a855f7','#60a5fa'][Math.floor(Math.random()*3)]});
    }
    setTimeout(()=>{
      floorClearCelebration=0;
      if(enemies.length===0&&state==='playing'){
        if(floor%5===0||floor%3===0){openShop();}
        else{nextFloor();}
      }
    },800);
  }

  slashEffects=slashEffects.filter(s=>{s.t++;return s.t<8;});
  particles=particles.filter(p=>{p.t++;return p.t<40;});
  updateHUD();
}

function drawEnemy(e){
  // elite golden glow
  if(e.elite){
    ctx.save();
    ctx.shadowColor='#fbbf24';ctx.shadowBlur=15;
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r+4,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  if(e.type==='boss'){
    // spin attack visual
    if(e.pattern==='spin'){
      ctx.save();ctx.globalAlpha=0.3;ctx.strokeStyle='#ff4444';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r+40,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#991b1b';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();ctx.moveTo(e.x-12,e.y-20);ctx.lineTo(e.x-8,e.y-35);ctx.lineTo(e.x-4,e.y-20);ctx.fill();
    ctx.beginPath();ctx.moveTo(e.x+4,e.y-20);ctx.lineTo(e.x+8,e.y-35);ctx.lineTo(e.x+12,e.y-20);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e.x-8,e.y-5,5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+8,e.y-5,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e.x-8,e.y-5,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+8,e.y-5,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x,e.y+8,6,0,Math.PI);ctx.fillStyle='#000';ctx.fill();
    // boss pattern indicator
    if(e.pattern==='charge'){
      ctx.fillStyle='#ff0';ctx.font='bold 14px sans-serif';ctx.fillText('💨',e.x+e.r+5,e.y);
    }
  }else if(e.type==='skeleton'){
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e.x-4,e.y-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+4,e.y-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(e.x-3,e.y+3);ctx.lineTo(e.x+3,e.y+3);ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();
  }else{
    ctx.fillStyle=e.color;
    ctx.beginPath();
    ctx.ellipse(e.x,e.y+3,e.r,e.r*0.8,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e.x-3,e.y-1,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+3,e.y-1,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e.x-3,e.y-1,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+3,e.y-1,1.5,0,Math.PI*2);ctx.fill();
  }
  // hp bar (always show for elites and bosses)
  if(e.hp<e.maxHp||e.elite||e.type==='boss'){
    const bw=e.elite?e.r*2.5:e.r*2;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(e.x-bw/2,e.y-e.r-10,bw,5);
    ctx.fillStyle=e.elite?'#fbbf24':e.type==='boss'?'#ef4444':'#4ade80';
    ctx.fillRect(e.x-bw/2,e.y-e.r-10,bw*(e.hp/e.maxHp),5);
    if(e.elite){
      ctx.fillStyle='#fbbf24';ctx.font='bold 9px sans-serif';
      ctx.fillText('ELITE',e.x-12,e.y-e.r-13);
    }
  }
}

function draw(){
  // screen shake
  ctx.save();
  if(screenShake>0){
    ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
    screenShake--;
  }
  // dungeon floor
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // tiles
  const ts=40;
  for(let x=0;x<W;x+=ts){
    for(let y=0;y<H;y+=ts){
      ctx.fillStyle=(Math.floor(x/ts)+Math.floor(y/ts))%2===0?'#1e1e36':'#1a1a2e';
      ctx.fillRect(x,y,ts,ts);
    }
  }
  // walls
  ctx.fillStyle='#2d2d4e';
  ctx.fillRect(0,0,W,8);ctx.fillRect(0,H-8,W,8);
  ctx.fillRect(0,0,8,H);ctx.fillRect(W-8,0,8,H);

  // enemies
  enemies.forEach(e=>drawEnemy(e));

  // dropped items (pulsing)
  droppedItems.forEach(it=>{
    const pulse=1+Math.sin(it.t*0.1)*0.2;
    ctx.save();ctx.translate(it.x,it.y);ctx.scale(pulse,pulse);
    ctx.font='18px sans-serif';ctx.textAlign='center';
    ctx.fillText(it.icon,0,6);
    ctx.restore();
  });
  ctx.textAlign='left';

  // slash effects
  slashEffects.forEach(s=>{
    const alpha=1-s.t/8;
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);
    ctx.strokeStyle=`rgba(255,255,150,${alpha})`;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,20,-.5,.5);ctx.stroke();
    ctx.restore();
  });

  // player
  const px=player.x,py=player.y;
  // body
  ctx.fillStyle='#60a5fa';
  ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.stroke();
  // helmet
  ctx.fillStyle='#fbbf24';
  ctx.beginPath();ctx.arc(px,py-10,10,Math.PI,0);ctx.fill();
  // face
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(px-4,py-3,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4,py-3,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(px-4+joyX,py-3+joyY*0.5,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4+joyX,py-3+joyY*0.5,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px,py+4,2.5,0,Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  // weapon display on player
  const wpn=WEAPONS[player.weaponIdx||0];
  ctx.save();ctx.translate(px+12,py-5);
  ctx.font='16px sans-serif';ctx.fillText(wpn.icon,0,0);
  ctx.restore();
  // shield visual
  if(SKILLS[2].active){
    ctx.save();ctx.strokeStyle='rgba(96,165,250,0.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(px,py,22+Math.sin(Date.now()*0.01)*3,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // hp bar
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-18,py-26,36,5);
  ctx.fillStyle='#ef4444';ctx.fillRect(px-18,py-26,36*(player.hp/player.maxHp),5);

  // enemy count
  if(enemies.length>0){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.font='bold 13px sans-serif';
    ctx.fillText('남은 적: '+enemies.length,W/2-35,H-15);
    ctx.fillStyle='#fff';ctx.fillText('남은 적: '+enemies.length,W/2-36,H-16);
  }

  // particles
  particles.forEach(p=>{
    const a=1-p.t/40;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.font='bold 12px sans-serif';
    ctx.fillText(p.text,p.x-12,p.y-p.t*0.7);ctx.globalAlpha=1;
  });

  // floor clear celebration flash
  if(floorClearCelebration>0){
    ctx.fillStyle=`rgba(251,191,36,${floorClearCelebration/60*0.15})`;
    ctx.fillRect(0,0,W,H);
  }

  // floor indicator (mini-map style)
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.roundRect(W-55,H-28,50,22,6);ctx.fill();
  ctx.fillStyle='#fbbf24';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
  ctx.fillText(floor+'F',W-30,H-12);ctx.textAlign='left';

  // joystick
  if(joyActive){
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(joyStartX,joyStartY,40,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(joyStartX+joyX*40,joyStartY+joyY*40,14,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

function gameLoop(){
  update();draw();
  if(state==='playing')requestAnimationFrame(gameLoop);
}
</script>
