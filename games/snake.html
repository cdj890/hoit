<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뱀 키우기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
canvas { border-radius: 12px; box-shadow: 0 0 40px rgba(100,200,150,0.15); }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<script>function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));if(h.nick){const lb=JSON.parse(localStorage.getItem('game_leaderboard')||'{}');if(!lb[id])lb[id]=[];const e=lb[id].find(x=>x.nick===h.nick);if(e){if(s>e.score){e.score=s;e.date=new Date().toLocaleDateString('ko');}}else lb[id].push({nick:h.nick,score:s,date:new Date().toLocaleDateString('ko')});lb[id].sort((a,b)=>b.score-a.score);lb[id]=lb[id].slice(0,20);localStorage.setItem('game_leaderboard',JSON.stringify(lb));}}</script>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const GRID = 20, COLS = 20, ROWS = 20, CELL = 28;
const W = COLS * CELL, H = ROWS * CELL;
const HUD = 50;
canvas.width = W; canvas.height = H + HUD;

let snake, dir, nextDir, food, score, gameOver, started, speed, speedTimer;
let particles = [], pops = [], frame = 0;
let highScore = parseInt(localStorage.getItem('snake_hs') || '0');

const SNAKE_COLOR = '#7EC8A0';
const SNAKE_DARK = '#5BA87E';
const FOOD_TYPES = [
  { emoji: '🍎', color: '#FF8A8A', points: 10 },
  { emoji: '⭐', color: '#FFD700', points: 20 },
  { emoji: '💖', color: '#FF69B4', points: 15 },
  { emoji: '🍊', color: '#FFA500', points: 10 },
];

function init() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; gameOver = false;
  speed = 150; speedTimer = 0;
  particles = []; pops = [];
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  const type = FOOD_TYPES[Math.floor(Math.random() * FOOD_TYPES.length)];
  food = {...pos, ...type, bounce: 0};
}

function update() {
  if (gameOver || !started) return;

  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { die(); return; }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += food.points;
    // particles
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({
        x: food.x * CELL + CELL/2, y: HUD + food.y * CELL + CELL/2,
        vx: Math.cos(a)*3*(1+Math.random()), vy: Math.sin(a)*3*(1+Math.random()),
        color: food.color, life: 25+Math.random()*15, maxLife: 40, size: 3+Math.random()*3
      });
    }
    pops.push({x: food.x*CELL+CELL/2, y: HUD+food.y*CELL, text: `+${food.points}`, life: 35, maxLife: 35, color: food.color});
    spawnFood();
    if (speed > 60) speed -= 3;
  } else {
    snake.pop();
  }
}

function die() {
  gameOver = true;
  if (score > highScore) { highScore = score; localStorage.setItem('snake_hs', highScore); _hub('snake',score); }
  for (const s of snake)
    for (let i = 0; i < 3; i++)
      particles.push({
        x: s.x*CELL+CELL/2, y: HUD+s.y*CELL+CELL/2,
        vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
        color: SNAKE_COLOR, life: 30, maxLife: 30, size: 3
      });
}

document.addEventListener('keydown', e => {
  if (!started) { started = true; init(); return; }
  if (gameOver) { if (e.key === ' ' || e.key === 'r') { init(); started = true; } return; }
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': if (dir.y===0) nextDir={x:0,y:-1}; break;
    case 'ArrowDown': case 's': case 'S': if (dir.y===0) nextDir={x:0,y:1}; break;
    case 'ArrowLeft': case 'a': case 'A': if (dir.x===0) nextDir={x:-1,y:0}; break;
    case 'ArrowRight': case 'd': case 'D': if (dir.x===0) nextDir={x:1,y:0}; break;
  }
});

function drawGrid() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, HUD, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, HUD); ctx.lineTo(x*CELL, HUD+H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, HUD+y*CELL); ctx.lineTo(W, HUD+y*CELL); ctx.stroke();
  }
}

function drawSnake() {
  // body segments (back to front)
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const cx = s.x * CELL + CELL/2, cy = HUD + s.y * CELL + CELL/2;
    const r = CELL/2 - 2;

    if (i === 0) {
      // head - bigger
      ctx.fillStyle = SNAKE_COLOR;
      ctx.beginPath(); ctx.arc(cx, cy, r+1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = SNAKE_DARK;
      ctx.beginPath(); ctx.arc(cx, cy, r+1, 0, Math.PI*2); ctx.stroke;

      // eyes
      const ex = dir.x * 4, ey = dir.y * 4;
      // white
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx-4+ex, cy-3+ey, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+4+ex, cy-3+ey, 5, 0, Math.PI*2); ctx.fill();
      // pupils
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(cx-4+ex+dir.x*2, cy-3+ey+dir.y*2, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+4+ex+dir.x*2, cy-3+ey+dir.y*2, 2.5, 0, Math.PI*2); ctx.fill();
      // highlight
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx-3+ex, cy-4+ey, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+5+ex, cy-4+ey, 1.2, 0, Math.PI*2); ctx.fill();
      // cheeks
      ctx.fillStyle = 'rgba(255,150,150,0.4)';
      ctx.beginPath(); ctx.ellipse(cx-8, cy+2, 3, 2, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx+8, cy+2, 3, 2, 0, 0, Math.PI*2); ctx.fill();
      // mouth
      ctx.strokeStyle = '#4a7a5a';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx+ex, cy+3+ey, 3, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
    } else {
      // body - gradient fade
      const t = i / snake.length;
      const gr = Math.floor(126 + t * 40);
      const gg = Math.floor(200 - t * 30);
      const gb = Math.floor(160 - t * 20);
      ctx.fillStyle = `rgb(${gr},${gg},${gb})`;
      ctx.beginPath(); ctx.arc(cx, cy, r - t*2, 0, Math.PI*2); ctx.fill();
      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(cx-2, cy-2, r/3, 0, Math.PI*2); ctx.fill();
    }
  }
}

function drawFood() {
  if (!food) return;
  food.bounce = Math.sin(frame * 0.1) * 3;
  const cx = food.x * CELL + CELL/2;
  const cy = HUD + food.y * CELL + CELL/2 + food.bounce;

  // glow
  ctx.fillStyle = food.color + '30';
  ctx.beginPath(); ctx.arc(cx, cy, CELL/2 + 4, 0, Math.PI*2); ctx.fill();

  // food circle
  ctx.fillStyle = food.color;
  ctx.beginPath(); ctx.arc(cx, cy, CELL/2 - 2, 0, Math.PI*2); ctx.fill();

  // face
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx-3, cy-2, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+3, cy-2, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx-3, cy-1.5, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+3, cy-1.5, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy+3, 2, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();

  // shine
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(cx-3, cy-5, 3, 0, Math.PI*2); ctx.fill();
}

function drawHUD() {
  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, W, HUD);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(0, HUD-1, W, 1);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`점수: ${score}`, 12, 33);

  ctx.fillStyle = '#FFD700';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`최고: ${highScore}`, W - 12, 22);

  ctx.fillStyle = '#888';
  ctx.fillText(`길이: ${snake ? snake.length : 3}`, W - 12, 42);
  ctx.textAlign = 'left';
}

function drawParticles() {
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPops() {
  pops.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.font = `bold ${14 + (1-a)*8}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y - (1-a)*30);
  });
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function updateParticles() {
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--; });
  particles = particles.filter(p => p.life > 0);
  pops.forEach(p => p.life--);
  pops = pops.filter(p => p.life > 0);
}

function drawStart() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H + HUD);

  ctx.textAlign = 'center';
  ctx.fillStyle = SNAKE_COLOR;
  ctx.font = 'bold 40px sans-serif';
  ctx.fillText('뱀 키우기', W/2, 180);

  // cute snake illustration
  const sx = W/2 - 60;
  const sy = 230;
  const segs = [{x:0,y:0},{x:20,y:0},{x:40,y:-5},{x:55,y:-15},{x:65,y:-30},{x:60,y:-45}];
  segs.forEach((s, i) => {
    const r = i === segs.length-1 ? 12 : 9 - i*0.5;
    ctx.fillStyle = i === segs.length-1 ? SNAKE_COLOR : `rgb(${126+i*8},${200-i*5},${160-i*5})`;
    ctx.beginPath(); ctx.arc(sx+s.x, sy+s.y, r, 0, Math.PI*2); ctx.fill();
  });
  // head face
  const hx = sx+60, hy = sy-45;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(hx-4, hy-2, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+4, hy-2, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(hx-3, hy-1, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+5, hy-1, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath(); ctx.ellipse(hx-9, hy+3, 3, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+9, hy+3, 3, 2, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#888';
  ctx.font = '16px sans-serif';
  ctx.fillText('방향키 또는 WASD로 조작', W/2, 310);

  const t = Date.now()/1000;
  ctx.globalAlpha = 0.5 + Math.sin(t*2)*0.5;
  ctx.fillStyle = SNAKE_COLOR;
  ctx.font = '18px sans-serif';
  ctx.fillText('아무 키나 눌러 시작하세요', W/2, 370);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = '15px sans-serif';
    ctx.fillText(`최고 점수: ${highScore}`, W/2, 420);
  }
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H+HUD);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF8A8A';
  ctx.font = 'bold 36px sans-serif';
  ctx.fillText('게임 오버', W/2, 200);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText(`${score}점`, W/2, 260);

  ctx.fillStyle = '#888';
  ctx.font = '16px sans-serif';
  ctx.fillText(`뱀 길이: ${snake.length}`, W/2, 295);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('새 기록!', W/2, 340);
  }

  const t = Date.now()/1000;
  ctx.globalAlpha = 0.5+Math.sin(t*2)*0.5;
  ctx.fillStyle = SNAKE_COLOR;
  ctx.font = '18px sans-serif';
  ctx.fillText('스페이스바로 다시 시작', W/2, 400);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

let lastMove = 0;
function gameLoop(time) {
  frame++;

  if (!started) { drawStart(); requestAnimationFrame(gameLoop); return; }

  if (!gameOver && time - lastMove > speed) {
    update();
    lastMove = time;
  }

  updateParticles();

  ctx.fillStyle = '#0f0f23';
  ctx.fillRect(0, 0, W, H+HUD);

  drawGrid();
  drawFood();
  drawSnake();
  drawParticles();
  drawPops();
  drawHUD();

  if (gameOver) drawGameOver();

  requestAnimationFrame(gameLoop);
}

started = false;
requestAnimationFrame(gameLoop);
</script>
</body>
