<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=Math.min(window.innerWidth,500);
const H=Math.min(window.innerHeight-20,750);
canvas.width=W;canvas.height=H;

let state='menu',kills=0,level=1,xp=0,xpNeeded=5,timeLeft=300,paused=false;
let screenFlash=0,playerInvincible=0,items=[];
const ITEM_TYPES=[
  {emoji:'❤️',name:'체력 회복',color:'#f44',apply:()=>{player.hp=Math.min(player.maxHp,player.hp+30);}},
  {emoji:'💛',name:'최대체력+10',color:'#ff0',apply:()=>{player.maxHp+=10;player.hp+=10;}},
  {emoji:'⚡',name:'일시 가속',color:'#4cf',apply:()=>{player.speed+=1;setTimeout(()=>player.speed=Math.max(2.5,player.speed-1),8000);}},
  {emoji:'💣',name:'화면 폭탄',color:'#f80',apply:()=>{enemies.forEach(e=>{e.hp-=50;if(e.hp<=0&&!e.dead){e.dead=true;kills++;gems.push({x:e.x,y:e.y,val:e.xpVal});}});enemies=enemies.filter(e=>!e.dead);screenFlash=10;}},
  {emoji:'🧲',name:'경험치 흡수',color:'#a5f',apply:()=>{gems.forEach(g=>{addXP(g.val);});gems=[];}},
  {emoji:'🛡️',name:'3초 무적',color:'#8af',apply:()=>{playerInvincible=180;}},
];
const ALL_WEAPONS={
  knife:{name:'🗡️ 단검',desc:'기본 근접 공격',dmg:10,spd:30,range:50,type:'melee'},
  longsword:{name:'⚔️ 장검',desc:'넓은 범위 근접',dmg:15,spd:40,range:70,type:'melee'},
  dagger:{name:'🔪 쌍단검',desc:'빠른 2연속 공격',dmg:7,spd:15,range:40,type:'melee'},
  axe:{name:'🪓 도끼',desc:'느리지만 강력',dmg:25,spd:55,range:45,type:'melee'},
  spear:{name:'🔱 창',desc:'긴 사거리 관통',dmg:12,spd:35,range:90,type:'melee'},
  orb:{name:'🔮 마법구',desc:'주변 회전하며 공격',dmg:8,spd:0,range:60,type:'orbit'},
  fireball:{name:'🔥 화염구',desc:'폭발 범위 공격',dmg:18,spd:50,range:120,type:'projectile'},
  icebolt:{name:'🧊 얼음화살',desc:'적을 감속시킴',dmg:10,spd:35,range:100,type:'projectile'},
  arrow:{name:'🏹 활',desc:'빠른 장거리 공격',dmg:9,spd:20,range:150,type:'projectile'},
  lightning:{name:'⚡ 번개',desc:'랜덤 적에게 낙뢰',dmg:20,spd:45,range:999,type:'lightning'},
  poison:{name:'🧪 독병',desc:'지속 데미지',dmg:5,spd:40,range:80,type:'projectile'},
  boomerang:{name:'🪃 부메랑',desc:'왕복하며 다중 타격',dmg:8,spd:45,range:100,type:'boomerang'},
  shield:{name:'🛡️ 방패',desc:'접촉 적 밀침+데미지',dmg:6,spd:0,range:30,type:'shield'},
  bomb:{name:'💣 폭탄',desc:'대폭발 범위 공격',dmg:30,spd:80,range:100,type:'projectile'},
  whip:{name:'📿 채찍',desc:'전방 휘두르기',dmg:11,spd:25,range:80,type:'melee'},
  shuriken:{name:'💠 수리검',desc:'3방향 발사',dmg:6,spd:30,range:110,type:'projectile'},
  laser:{name:'🔴 레이저',desc:'관통 직선 빔',dmg:15,spd:60,range:200,type:'projectile'},
  tornado:{name:'🌪️ 회오리',desc:'주변 흡입+피해',dmg:4,spd:0,range:80,type:'aura'},
  holy:{name:'✨ 성수',desc:'전방위 빛 폭발',dmg:12,spd:70,range:120,type:'nova'},
  garlic:{name:'🧄 마늘',desc:'접근 적 자동 피해',dmg:3,spd:0,range:50,type:'aura'},
};

let startWeapon='knife';
let player={x:0,y:0,hp:100,maxHp:100,speed:2.5,damage:10,atkRange:50,atkCooldown:0,atkSpeed:30,weapons:['knife']};
let enemies=[],gems=[],particles=[],weaponProjectiles=[];
let camX=0,camY=0;
let joyActive=false,joyX=0,joyY=0,joyStartX=0,joyStartY=0,joyCurX=0,joyCurY=0;
let orbAngle=0,lightningTimer=0;
let animFrame,timerInterval,frame=0;
let levelFlash=0;
let damageNums=[];

function buildUpgrades(){
  const base=[
    {name:'⚔️ 공격력 +5',apply:()=>{player.damage+=5}},
    {name:'🏃 이동속도 +0.5',apply:()=>{player.speed+=0.5}},
    {name:'📏 공격범위 +15',apply:()=>{player.atkRange+=15}},
    {name:'⚡ 공격속도 +20%',apply:()=>{player.atkSpeed=Math.max(8,Math.floor(player.atkSpeed*0.8))}},
    {name:'❤️ 최대체력 +30',apply:()=>{player.maxHp+=30;player.hp+=30}},
    {name:'🧲 경험치 범위 +20',apply:()=>{player.atkRange+=10}},
  ];
  // Add weapon unlocks or upgrades
  Object.entries(ALL_WEAPONS).forEach(([id,w])=>{
    if(!player.weapons.includes(id)){
      base.push({name:`${w.name} 추가`,apply:()=>{player.weapons.push(id);}});
    } else {
      // Already have this weapon → upgrade it
      if(!w.upgLevel)w.upgLevel=0;
      if(w.upgLevel<3){
        base.push({name:`${w.name} 강화 Lv${w.upgLevel+2}`,apply:()=>{
          w.upgLevel++;w.dmg=Math.floor(w.dmg*1.4);
          if(w.spd>10)w.spd=Math.max(8,Math.floor(w.spd*0.85));
          if(w.range<200)w.range=Math.floor(w.range*1.15);
          particles.push({x:player.x,y:player.y-20,t:0,text:w.name+' 강화!',color:'#ff0'});
        }});
      }
    }
  });
  return base;
}
let UPGRADES=[];

// Build weapon select UI
(function(){
  const div=document.getElementById('weaponSelect');
  Object.entries(ALL_WEAPONS).forEach(([id,w])=>{
    const btn=document.createElement('button');
    btn.className='btn';
    btn.style.cssText='padding:10px 8px;font-size:13px;text-align:center;min-height:60px';
    btn.innerHTML=`<div style="font-size:20px">${w.name.split(' ')[0]}</div><div style="font-size:11px;color:#aaa;margin-top:2px">${w.desc}</div>`;
    btn.onclick=()=>{startWeapon=id;startGame();};
    div.appendChild(btn);
  });
})();

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  const sw=ALL_WEAPONS[startWeapon];
  state='playing';
  player.x=0;player.y=0;
  enemies=[];gems=[];particles=[];weaponProjectiles=[];
  kills=0;level=1;xp=0;xpNeeded=5;timeLeft=300;
  player.hp=100;player.maxHp=100;player.speed=2.5;player.damage=sw?sw.dmg:10;player.atkRange=sw?sw.range:50;player.atkSpeed=sw?sw.spd||30:30;player.atkCooldown=0;player.weapons=[startWeapon];
  UPGRADES=buildUpgrades();
  timerInterval=setInterval(()=>{
    if(state==='playing'&&!paused){
      timeLeft--;
      updateHUD();
      if(timeLeft<=0){win();}
    }
  },1000);
  gameLoop();
}

function updateHUD(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  const elapsed=300-timeLeft;
  const em=Math.floor(elapsed/60),es=elapsed%60;
  document.getElementById('timeDisp').textContent=m+':'+(s<10?'0':'')+s+' ('+em+':'+(es<10?'0':'')+es+')';
  document.getElementById('lvlDisp').textContent='Lv.'+level;
  document.getElementById('killDisp').textContent='💀 '+kills;
  document.getElementById('xpBar').style.width=((xp/xpNeeded)*100)+'%';
  document.getElementById('hpBar').style.width=((player.hp/player.maxHp)*100)+'%';
  document.getElementById('hpText').textContent=Math.ceil(player.hp)+'/'+player.maxHp;
  document.getElementById('weaponDisp').textContent=player.weapons.map(w=>ALL_WEAPONS[w]?ALL_WEAPONS[w].name.split(' ')[0]:'').join(' ');
}

function spawnEnemy(){
  const angle=Math.random()*Math.PI*2;
  const dist=Math.max(W,H)*0.6+50;
  const type=Math.random()<0.3&&timeLeft<240?'fast':'normal';
  const hpMult=1+Math.floor((300-timeLeft)/60)*0.3;
  enemies.push({
    x:player.x+Math.cos(angle)*dist,
    y:player.y+Math.sin(angle)*dist,
    hp:type==='fast'?15*hpMult:30*hpMult,
    maxHp:type==='fast'?15*hpMult:30*hpMult,
    speed:type==='fast'?2:1,
    damage:type==='fast'?5:10,
    r:type==='fast'?10:14,
    color:type==='fast'?'#f97316':'#ef4444',
    xpVal:type==='fast'?1:2,
    hitCd:0
  });
}

function addXP(val){
  xp+=val;
  while(xp>=xpNeeded){
    xp-=xpNeeded;
    level++;
    xpNeeded=Math.floor(xpNeeded*1.4)+3;
    levelFlash=30;
    showLevelUp();
  }
  // XP bar glow when near level up
  const xpRatio=xp/xpNeeded;
  const bar=document.getElementById('xpBar');
  if(xpRatio>0.8){bar.style.boxShadow='0 0 8px #a855f7, 0 0 16px #a855f7';}
  else{bar.style.boxShadow='none';}
  updateHUD();
}

function showLevelUp(){
  paused=true;
  const el=document.getElementById('levelUp');
  el.style.display='flex';
  const ch=document.getElementById('choices');
  ch.innerHTML='';
  UPGRADES=buildUpgrades();
  const pool=[...UPGRADES];
  const picks=[];
  for(let i=0;i<3&&pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    picks.push(pool.splice(idx,1)[0]);
  }
  picks.forEach(u=>{
    const b=document.createElement('button');
    b.className='btn upgrade-btn';
    b.textContent=u.name;
    b.onclick=()=>{u.apply();el.style.display='none';paused=false;};
    ch.appendChild(b);
  });
}

function gameOver(){
  state='over';clearInterval(timerInterval);
  _hub('vampire',kills);
  document.getElementById('goTitle').textContent='💀 게임 오버';
  document.getElementById('goStats').textContent=`처치: ${kills}마리 · Lv.${level} · 생존: ${Math.floor((300-timeLeft)/60)}분${(300-timeLeft)%60}초 · 무기: ${player.weapons.length}개`;
  document.getElementById('gameOver').classList.remove('hidden');
}
function win(){
  state='over';clearInterval(timerInterval);
  _hub('vampire',kills);
  document.getElementById('goTitle').textContent='🎉 생존 성공!';
  document.getElementById('goStats').textContent=`처치: ${kills}마리 · Lv.${level} · 생존: ${Math.floor((300-timeLeft)/60)}분${(300-timeLeft)%60}초 · 무기: ${player.weapons.length}개`;
  document.getElementById('gameOver').classList.remove('hidden');
}

// Touch joystick
canvas.addEventListener('pointerdown',e=>{
  const r=canvas.getBoundingClientRect();
  joyStartX=e.clientX-r.left;joyStartY=e.clientY-r.top;
  joyCurX=joyStartX;joyCurY=joyStartY;joyActive=true;
});
canvas.addEventListener('pointermove',e=>{
  if(!joyActive)return;
  const r=canvas.getBoundingClientRect();
  joyCurX=e.clientX-r.left;joyCurY=e.clientY-r.top;
  const dx=joyCurX-joyStartX,dy=joyCurY-joyStartY;
  const dist=Math.hypot(dx,dy);
  const maxD=50;
  if(dist>0){
    const d=Math.min(dist,maxD);
    joyX=(dx/dist)*(d/maxD);
    joyY=(dy/dist)*(d/maxD);
  }
});
canvas.addEventListener('pointerup',()=>{joyActive=false;joyX=0;joyY=0;});
canvas.addEventListener('pointercancel',()=>{joyActive=false;joyX=0;joyY=0;});

let spawnTimer=0;
function update(){
  if(state!=='playing'||paused)return;
  frame++;
  // move player
  player.x+=joyX*player.speed;
  player.y+=joyY*player.speed;
  camX=player.x-W/2;camY=player.y-H/2;

  // spawn enemies
  spawnTimer++;
  const rate=Math.max(10,60-Math.floor((300-timeLeft)/10)*2);
  if(spawnTimer>=rate){spawnTimer=0;const count=1+Math.floor((300-timeLeft)/60);for(let i=0;i<count;i++)spawnEnemy();}

  // move enemies
  enemies.forEach(e=>{
    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.hypot(dx,dy);
    if(dist>0){e.x+=dx/dist*e.speed;e.y+=dy/dist*e.speed;}
    if(e.hitCd>0)e.hitCd--;
    if(dist<e.r+12&&e.hitCd<=0&&playerInvincible<=0){
      player.hp-=e.damage;e.hitCd=30;
      screenFlash=8;playerInvincible=20;
      particles.push({x:player.x,y:player.y,t:0,text:'-'+e.damage,color:'#f44'});
      if(player.hp<=0)gameOver();
    }
    // Poison DOT
    if(e.poisonT>0){e.poisonT--;if(e.poisonT%15===0){e.hp-=3;if(e.hp<=0&&!e.dead){e.dead=true;kills++;gems.push({x:e.x,y:e.y,val:e.xpVal});}}}

  });

  // Weapon system - process all weapons
  player.atkCooldown--;
  function hitEnemy(e,dmg,color){
    if(e.dead)return;
    e.hp-=dmg;damageNums.push({x:e.x+(Math.random()-0.5)*10,y:e.y-10,t:0,val:Math.round(dmg),color:color||'#ff0',crit:false});
    if(e.hp<=0&&!e.dead){e.dead=true;kills++;gems.push({x:e.x,y:e.y,val:e.xpVal});}
  }
  function findNearest(range){
    let best=null,bd=Infinity;
    enemies.forEach(e=>{if(e.dead)return;const d=Math.hypot(e.x-player.x,e.y-player.y);if(d<bd&&d<range){bd=d;best=e;}});
    return{e:best,d:bd};
  }

  // Melee weapons (knife, longsword, dagger, axe, spear, whip)
  const melees=player.weapons.filter(w=>ALL_WEAPONS[w]&&ALL_WEAPONS[w].type==='melee');
  if(player.atkCooldown<=0&&melees.length>0&&enemies.length>0){
    const bestMelee=melees.reduce((a,b)=>ALL_WEAPONS[a].range>ALL_WEAPONS[b].range?a:b);
    const w=ALL_WEAPONS[bestMelee];
    const{e:nearest,d:nd}=findNearest(w.range+20);
    if(nearest){
      player.atkCooldown=w.spd||player.atkSpeed;
      hitEnemy(nearest,w.dmg+player.damage*0.3,'#ff0');
      weaponProjectiles.push({x:player.x,y:player.y,tx:nearest.x,ty:nearest.y,t:0,max:8,type:'slash'});
      // Dagger double hit
      if(bestMelee==='dagger'){const{e:n2}=findNearest(w.range+20);if(n2)hitEnemy(n2,w.dmg*0.7,'#ffa');}
      // Spear pierce
      if(bestMelee==='spear')enemies.filter(e=>Math.hypot(e.x-nearest.x,e.y-nearest.y)<30&&e!==nearest).slice(0,2).forEach(e=>hitEnemy(e,w.dmg*0.5,'#aff'));
    }
  }

  // Projectile weapons (fireball, icebolt, arrow, poison, shuriken, laser, bomb)
  const projs=player.weapons.filter(w=>ALL_WEAPONS[w]&&ALL_WEAPONS[w].type==='projectile');
  projs.forEach(wid=>{
    const w=ALL_WEAPONS[wid];
    if(!w._cd)w._cd=0;w._cd--;
    if(w._cd<=0&&enemies.length>0){
      const{e:t}=findNearest(w.range);
      if(t){w._cd=w.spd;
        const dx=t.x-player.x,dy=t.y-player.y,d=Math.hypot(dx,dy)||1;
        weaponProjectiles.push({x:player.x,y:player.y,vx:dx/d*5,vy:dy/d*5,dmg:w.dmg+player.damage*0.2,t:0,max:40,type:wid,wid});
        // Shuriken: 3-way
        if(wid==='shuriken'){for(let a=-0.4;a<=0.4;a+=0.4){
          const cos=Math.cos(a),sin=Math.sin(a);
          weaponProjectiles.push({x:player.x,y:player.y,vx:(dx/d*cos-dy/d*sin)*5,vy:(dx/d*sin+dy/d*cos)*5,dmg:w.dmg*0.7,t:0,max:30,type:wid,wid});
        }}
      }
    }
  });

  // Orbit weapons (orb)
  if(player.weapons.includes('orb')){
    orbAngle+=0.05;
    const ox=player.x+Math.cos(orbAngle)*60,oy=player.y+Math.sin(orbAngle)*60;
    enemies.forEach(e=>{if(Math.hypot(e.x-ox,e.y-oy)<e.r+12)hitEnemy(e,ALL_WEAPONS.orb.dmg*0.5,'#a5f');});
  }
  // Boomerang
  if(player.weapons.includes('boomerang')){
    if(!ALL_WEAPONS.boomerang._cd)ALL_WEAPONS.boomerang._cd=0;ALL_WEAPONS.boomerang._cd--;
    if(ALL_WEAPONS.boomerang._cd<=0&&enemies.length>0){ALL_WEAPONS.boomerang._cd=45;
      const{e:t}=findNearest(100);if(t)weaponProjectiles.push({x:player.x,y:player.y,tx:t.x,ty:t.y,t:0,max:30,type:'boomerang',dmg:ALL_WEAPONS.boomerang.dmg,phase:'out'});
    }
  }

  // Aura weapons (tornado, garlic)
  ['tornado','garlic'].forEach(wid=>{
    if(player.weapons.includes(wid)){
      const w=ALL_WEAPONS[wid];
      enemies.forEach(e=>{
        if(Math.hypot(e.x-player.x,e.y-player.y)<w.range+e.r){
          if(Math.random()<0.1)hitEnemy(e,w.dmg,'#0f0');
          if(wid==='tornado'){e.x+=(Math.random()-0.5)*3;e.y+=(Math.random()-0.5)*3;}
        }
      });
    }
  });

  // Nova weapon (holy)
  if(player.weapons.includes('holy')){
    if(!ALL_WEAPONS.holy._cd)ALL_WEAPONS.holy._cd=0;ALL_WEAPONS.holy._cd--;
    if(ALL_WEAPONS.holy._cd<=0){ALL_WEAPONS.holy._cd=70;
      enemies.forEach(e=>{if(Math.hypot(e.x-player.x,e.y-player.y)<120)hitEnemy(e,ALL_WEAPONS.holy.dmg,'#fff');});
      weaponProjectiles.push({x:player.x,y:player.y,t:0,max:15,type:'nova'});
    }
  }

  // Shield
  if(player.weapons.includes('shield')){
    enemies.forEach(e=>{
      const d=Math.hypot(e.x-player.x,e.y-player.y);
      if(d<35){hitEnemy(e,ALL_WEAPONS.shield.dmg,'#8af');const a=Math.atan2(e.y-player.y,e.x-player.x);e.x+=Math.cos(a)*15;e.y+=Math.sin(a)*15;}
    });
  }

  // lightning
  if(player.weapons.includes('lightning')){
    lightningTimer++;
    if(lightningTimer>=45&&enemies.length>0){
      lightningTimer=0;
      const idx=Math.floor(Math.random()*Math.min(enemies.length,5));
      const e=enemies[idx];
      e.hp-=player.damage*1.5;
      weaponProjectiles.push({x:e.x,y:e.y-40,tx:e.x,ty:e.y,t:0,max:10,type:'lightning'});
      if(e.hp<=0&&!e.dead){e.dead=true;kills++;gems.push({x:e.x,y:e.y,val:e.xpVal});}
    }
  }

  // Remove dead enemies (deferred from hitEnemy to avoid forEach splice crash)
  enemies=enemies.filter(e=>!e.dead);

  // collect gems
  gems=gems.filter(g=>{
    if(Math.hypot(g.x-player.x,g.y-player.y)<25){addXP(g.val);return false;}
    return true;
  });

  // Update screen effects
  if(screenFlash>0)screenFlash--;
  if(playerInvincible>0)playerInvincible--;

  // Spawn support items every 15 seconds
  const elapsed=300-timeLeft;
  if(elapsed>0&&elapsed%15===0&&frame%60===0){
    const type=ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)];
    const angle=Math.random()*Math.PI*2,dist=100+Math.random()*150;
    items.push({x:player.x+Math.cos(angle)*dist,y:player.y+Math.sin(angle)*dist,...type,life:600});
  }
  // Collect items
  items=items.filter(it=>{
    it.life--;
    if(Math.hypot(it.x-player.x,it.y-player.y)<22){
      it.apply();
      particles.push({x:it.x,y:it.y,t:0,text:it.name,color:it.color});
      updateHUD();
      return false;
    }
    return it.life>0;
  });

  // update projectiles
  weaponProjectiles=weaponProjectiles.filter(p=>{
    p.t++;
    // Move projectiles with velocity
    if(p.vx!==undefined){p.x+=p.vx;p.y+=p.vy;
      // Hit detection for projectile-type weapons
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];if(Math.hypot(e.x-p.x,e.y-p.y)<e.r+8){
          hitEnemy(e,p.dmg||player.damage,'#fa0');
          // Fireball/bomb: AOE
          if(p.wid==='fireball'||p.wid==='bomb'){enemies.forEach(e2=>{if(e2!==e&&Math.hypot(e2.x-p.x,e2.y-p.y)<50)hitEnemy(e2,(p.dmg||10)*0.5,'#f80');});}
          // Ice: slow
          if(p.wid==='icebolt')e.speed*=0.5;
          // Poison: DOT
          if(p.wid==='poison')e.poisonT=90;
          if(p.wid!=='laser')return false; // laser pierces
        }
      }
    }
    // Boomerang return
    if(p.type==='boomerang'){
      if(p.phase==='out'){const dx=p.tx-p.x,dy=p.ty-p.y;const d=Math.hypot(dx,dy)||1;p.x+=dx/d*6;p.y+=dy/d*6;if(d<20)p.phase='back';}
      else{const dx=player.x-p.x,dy=player.y-p.y;const d=Math.hypot(dx,dy)||1;p.x+=dx/d*6;p.y+=dy/d*6;if(d<20)return false;}
      enemies.forEach(e=>{if(Math.hypot(e.x-p.x,e.y-p.y)<e.r+10)hitEnemy(e,p.dmg,'#0ff');});
    }
    return p.t<p.max;
  });
  particles=particles.filter(p=>{p.t++;return p.t<30;});
  updateHUD();
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // ground grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  const gs=40;
  const offX=(-camX%gs+gs)%gs,offY=(-camY%gs+gs)%gs;
  for(let x=offX;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=offY;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  const sx=x=>x-camX,sy=y=>y-camY;

  // items
  items.forEach(it=>{
    const ix=sx(it.x),iy=sy(it.y);
    const pulse=Math.sin(frame*0.1)*3;
    // Glow
    ctx.fillStyle=it.color+'30';ctx.beginPath();ctx.arc(ix,iy,16+pulse,0,Math.PI*2);ctx.fill();
    // Item circle
    ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(ix,iy,12,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=it.color;ctx.lineWidth=2;ctx.stroke();
    // Emoji
    ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText(it.emoji,ix,iy+5);
    // Life bar
    if(it.life<200){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(ix-10,iy+14,20,2);
      ctx.fillStyle=it.color;ctx.fillRect(ix-10,iy+14,20*(it.life/600),2);}
  });
  ctx.textAlign='left';

  // gems
  gems.forEach(g=>{
    ctx.fillStyle='#a855f7';
    ctx.beginPath();
    const gx=sx(g.x),gy=sy(g.y);
    ctx.moveTo(gx,gy-6);ctx.lineTo(gx+5,gy);ctx.lineTo(gx,gy+6);ctx.lineTo(gx-5,gy);
    ctx.fill();
  });

  // enemies
  enemies.forEach(e=>{
    const ex=sx(e.x),ey=sy(e.y);
    if(ex<-30||ex>W+30||ey<-30||ey>H+30)return;
    ctx.fillStyle=e.color;
    ctx.beginPath();ctx.arc(ex,ey,e.r,0,Math.PI*2);ctx.fill();
    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(ex-3,ey-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex+3,ey-3,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(ex-3,ey-3,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex+3,ey-3,1.5,0,Math.PI*2);ctx.fill();
    // hp
    if(e.hp<e.maxHp){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-e.r,ey-e.r-6,e.r*2,4);
      ctx.fillStyle='#4f4';ctx.fillRect(ex-e.r,ey-e.r-6,e.r*2*(e.hp/e.maxHp),4);
    }
  });

  // weapon effects
  // Aura visuals (garlic, tornado)
  if(player.weapons.includes('garlic')){
    ctx.strokeStyle='rgba(150,255,150,0.15)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx(player.x),sy(player.y),50,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(150,255,150,0.04)';ctx.fill();
  }
  if(player.weapons.includes('tornado')){
    const ta=frame*0.08;
    ctx.strokeStyle='rgba(150,200,255,0.25)';ctx.lineWidth=2;
    for(let i=0;i<3;i++){const a=ta+i*2.1,r=30+i*15;
      ctx.beginPath();ctx.arc(sx(player.x)+Math.cos(a)*r,sy(player.y)+Math.sin(a)*r,6,0,Math.PI*2);ctx.stroke();}
  }
  // Shield visual
  if(player.weapons.includes('shield')){
    ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(sx(player.x),sy(player.y),30,0,Math.PI*2);ctx.stroke();
  }
  // Orb visual
  if(player.weapons.includes('orb')){
    const ox=player.x+Math.cos(orbAngle)*60,oy=player.y+Math.sin(orbAngle)*60;
    ctx.fillStyle='rgba(168,85,247,0.3)';ctx.beginPath();ctx.arc(sx(ox),sy(oy),14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#a855f7';ctx.beginPath();ctx.arc(sx(ox),sy(oy),8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(sx(ox)-2,sy(oy)-2,3,0,Math.PI*2);ctx.fill();
  }

  weaponProjectiles.forEach(p=>{
    const alpha=Math.max(0,1-p.t/p.max);
    if(p.type==='slash'){
      ctx.strokeStyle=`rgba(255,255,100,${alpha})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sx(p.x),sy(p.y));ctx.lineTo(sx(p.tx),sy(p.ty));ctx.stroke();
    }else if(p.type==='lightning'){
      ctx.strokeStyle=`rgba(100,200,255,${alpha})`;ctx.lineWidth=2;ctx.beginPath();
      let lx=sx(p.x),ly=sy(p.y);ctx.moveTo(lx,ly);
      for(let i=0;i<5;i++){lx+=(sx(p.tx)-sx(p.x))/5+(Math.random()-0.5)*10;ly+=(sy(p.ty)-sy(p.y))/5;ctx.lineTo(lx,ly);}
      ctx.stroke();
    }else if(p.type==='nova'){
      const r=p.t/p.max*120;
      ctx.strokeStyle=`rgba(255,255,200,${alpha})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=`rgba(255,255,150,${alpha*0.15})`;ctx.fill();
    }else if(p.type==='boomerang'){
      ctx.save();ctx.translate(sx(p.x),sy(p.y));ctx.rotate(p.t*0.5);
      ctx.fillStyle=`rgba(0,255,255,${alpha})`;ctx.beginPath();ctx.ellipse(0,0,10,4,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }else if(p.wid==='fireball'||p.wid==='bomb'){
      ctx.fillStyle=`rgba(255,100,30,${alpha*0.3})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,200,50,${alpha})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),6,0,Math.PI*2);ctx.fill();
    }else if(p.wid==='icebolt'){
      ctx.fillStyle=`rgba(100,200,255,${alpha})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(200,240,255,${alpha*0.5})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),8,0,Math.PI*2);ctx.fill();
    }else if(p.wid==='arrow'){
      ctx.strokeStyle=`rgba(200,150,80,${alpha})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx(p.x),sy(p.y));ctx.lineTo(sx(p.x)-p.vx*3,sy(p.y)-p.vy*3);ctx.stroke();
    }else if(p.wid==='poison'){
      ctx.fillStyle=`rgba(100,255,100,${alpha})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),5,0,Math.PI*2);ctx.fill();
    }else if(p.wid==='shuriken'){
      ctx.save();ctx.translate(sx(p.x),sy(p.y));ctx.rotate(p.t*0.8);
      ctx.fillStyle=`rgba(200,200,255,${alpha})`;
      for(let i=0;i<4;i++){ctx.rotate(Math.PI/2);ctx.fillRect(-1,-6,2,6);}
      ctx.restore();
    }else if(p.wid==='laser'){
      ctx.strokeStyle=`rgba(255,50,50,${alpha})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sx(p.x),sy(p.y));ctx.lineTo(sx(p.x)-p.vx*8,sy(p.y)-p.vy*8);ctx.stroke();
      ctx.strokeStyle=`rgba(255,200,200,${alpha*0.5})`;ctx.lineWidth=6;ctx.stroke();
    }else{
      // Generic projectile
      ctx.fillStyle=`rgba(255,200,100,${alpha})`;ctx.beginPath();ctx.arc(sx(p.x),sy(p.y),4,0,Math.PI*2);ctx.fill();
    }
  });

  // orb
  if(player.weapons.includes('orb')){
    const ox=sx(player.x+Math.cos(orbAngle)*60);
    const oy=sy(player.y+Math.sin(orbAngle)*60);
    ctx.fillStyle='#c084fc';ctx.beginPath();ctx.arc(ox,oy,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e9d5ff';ctx.beginPath();ctx.arc(ox-2,oy-2,3,0,Math.PI*2);ctx.fill();
  }

  // Screen damage flash
  if(screenFlash>0){
    ctx.fillStyle=`rgba(255,0,0,${screenFlash/15})`;ctx.fillRect(0,0,W,H);
  }
  // player
  const px=sx(player.x),py=sy(player.y);
  if(playerInvincible>0&&Math.floor(frame/3)%2===0){ctx.globalAlpha=0.4;}
  ctx.fillStyle=playerInvincible>0?'#8af':'#60a5fa';
  ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(px-4,py-3,3.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4,py-3,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(px-4+joyX,py-3+joyY,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+4+joyX,py-3+joyY,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px,py+3,3,0,Math.PI);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  // hp bar
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-18,py-24,36,5);
  ctx.fillStyle=player.hp/player.maxHp>0.5?'#4ade80':player.hp/player.maxHp>0.25?'#fbbf24':'#ef4444';
  ctx.fillRect(px-18,py-24,36*(player.hp/player.maxHp),5);
  ctx.globalAlpha=1;

  // damage numbers (floating up with scale)
  damageNums.forEach(d=>{
    const alpha=1-d.t/35;
    if(alpha<=0)return;
    ctx.globalAlpha=alpha;
    const scale=d.t<5?1+d.t*0.1:1.5-d.t*0.02;
    ctx.fillStyle=d.color;
    ctx.font=`bold ${Math.max(10,14*scale)}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(d.val,sx(d.x),sy(d.y)-d.t*1.2);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  });
  damageNums=damageNums.filter(d=>{d.t++;return d.t<35;});

  // particles (kept for text like player damage)
  particles.forEach(p=>{
    const alpha=1-p.t/30;
    ctx.fillStyle=p.color;ctx.globalAlpha=alpha;
    ctx.font='bold 12px sans-serif';
    ctx.fillText(p.text,sx(p.x)-10,sy(p.y)-p.t);
    ctx.globalAlpha=1;
  });

  // level up flash
  if(levelFlash>0){
    ctx.fillStyle=`rgba(168,85,247,${levelFlash/30*0.2})`;
    ctx.fillRect(0,0,W,H);
    levelFlash--;
  }

  // joystick visual
  if(joyActive){
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(joyStartX,joyStartY,40,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.arc(joyStartX+joyX*40,joyStartY+joyY*40,14,0,Math.PI*2);ctx.fill();
  }
}

function gameLoop(){
  try{update();draw();}catch(err){console.error('Game error:',err);}
  if(state==='playing')animFrame=requestAnimationFrame(gameLoop);
}
</script>
