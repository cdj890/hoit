<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>공 피하기</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;overflow:hidden;touch-action:none}canvas{display:block;margin:0 auto;max-width:100%}</style></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=Math.min(window.innerWidth,420),H=Math.min(window.innerHeight,700);
c.width=W;c.height=H;
let state='menu',px=W/2,balls=[],score=0,frame=0,startTime,touching=false,touchX=W/2;
let hs=parseInt(localStorage.getItem('dodge_hs')||'0');

c.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='playing'){if(state==='menu')startGame();else state='menu';return;}touching=true;touchX=e.touches[0].clientX-c.getBoundingClientRect().left;},{passive:false});
c.addEventListener('touchmove',e=>{e.preventDefault();if(touching)touchX=e.touches[0].clientX-c.getBoundingClientRect().left;},{passive:false});
c.addEventListener('touchend',e=>{e.preventDefault();touching=false;},{passive:false});
c.addEventListener('click',()=>{if(state==='menu')startGame();else if(state==='done')state='menu';});
c.addEventListener('mousemove',e=>{if(state==='playing'){const r=c.getBoundingClientRect();touchX=e.clientX-r.left;}});

function startGame(){state='playing';px=W/2;balls=[];score=0;frame=0;startTime=Date.now();}

function update(){
  if(state!=='playing')return;frame++;
  score=((Date.now()-startTime)/1000)|0;
  // move player
  px+=(touchX-px)*0.15;px=Math.max(15,Math.min(W-15,px));
  // spawn balls
  const rate=Math.max(5,20-score);
  if(frame%rate===0){
    balls.push({x:15+Math.random()*(W-30),y:-15,r:8+Math.random()*8,speed:2+Math.random()*2+score*0.05,color:`hsl(${Math.random()*360},60%,55%)`});
  }
  balls.forEach(b=>b.y+=b.speed);
  balls=balls.filter(b=>b.y<H+20);
  // collision
  for(const b of balls){
    const d=Math.sqrt((b.x-px)**2+(b.y-(H-40))**2);
    if(d<b.r+12){state='done';if(score>hs){hs=score;localStorage.setItem('dodge_hs',hs);}_hub('dodge_ball',score);return;}
  }
}

function draw(){
  x.fillStyle='#0f0f1e';x.fillRect(0,0,W,H);
  if(state==='menu'){
    x.textAlign='center';x.fillStyle='#fff';x.font='bold 28px sans-serif';x.fillText('🏐 공 피하기',W/2,H/2-60);
    x.fillStyle='#aaa';x.font='16px sans-serif';x.fillText('터치하여 캐릭터를 움직이세요!',W/2,H/2-20);
    x.fillStyle='#5C6BC0';x.font='bold 20px sans-serif';x.fillText('탭하여 시작',W/2,H/2+30);
    if(hs){x.fillStyle='#888';x.font='14px sans-serif';x.fillText(`최고: ${hs}초`,W/2,H/2+65);}
  } else {
    // balls
    balls.forEach(b=>{
      x.fillStyle=b.color+'40';x.beginPath();x.arc(b.x,b.y,b.r+3,0,6.28);x.fill();
      x.fillStyle=b.color;x.beginPath();x.arc(b.x,b.y,b.r,0,6.28);x.fill();
      x.fillStyle='rgba(255,255,255,0.3)';x.beginPath();x.arc(b.x-b.r*0.25,b.y-b.r*0.3,b.r*0.25,0,6.28);x.fill();
    });
    // player
    const py=H-40;
    x.fillStyle='#FFD700';x.beginPath();x.arc(px,py,14,0,6.28);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(px-4,py-3,3,0,6.28);x.fill();x.beginPath();x.arc(px+4,py-3,3,0,6.28);x.fill();
    x.fillStyle='#222';x.beginPath();x.arc(px-3,py-2,1.5,0,6.28);x.fill();x.beginPath();x.arc(px+5,py-2,1.5,0,6.28);x.fill();
    x.fillStyle='rgba(255,150,150,0.4)';x.beginPath();x.ellipse(px-8,py+2,3,2,0,0,6.28);x.fill();x.beginPath();x.ellipse(px+8,py+2,3,2,0,0,6.28);x.fill();
    // HUD
    x.fillStyle='rgba(0,0,0,0.5)';x.fillRect(0,0,W,35);
    x.fillStyle='#FFD700';x.font='bold 18px sans-serif';x.textAlign='center';x.fillText(`${score}초`,W/2,24);
    if(state==='done'){
      x.fillStyle='rgba(0,0,0,0.6)';x.fillRect(0,H/2-60,W,130);
      x.fillStyle='#FF6B6B';x.font='bold 32px sans-serif';x.fillText(`${score}초 생존!`,W/2,H/2-10);
      x.fillStyle=score>=hs?'#4CAF50':'#aaa';x.font='16px sans-serif';x.fillText(score>=hs?'새 기록!':'게임 오버',W/2,H/2+20);
      x.fillStyle='#fff';x.font='14px sans-serif';x.fillText('탭하여 다시',W/2,H/2+55);
    }
  }
  x.textAlign='left';
}
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script></body></html>
