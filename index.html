<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;font-family:'Segoe UI',-apple-system,sans-serif;color:#fff;min-height:100vh}
header{text-align:center;padding:35px 20px 15px;background:linear-gradient(180deg,#1a1a3e,#0f0f1e)}
header h1{font-size:40px;background:linear-gradient(135deg,#FFD700,#FF6B6B,#7B68EE,#00CED1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
header .sub{color:#888;font-size:14px}
.nick-bar{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:12px}
.nick-chip{display:inline-flex;align-items:center;gap:8px;background:#1a1a2e;border:1px solid #2a2a4a;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
.nick-chip:hover{border-color:#FFD700;background:#252535}
.nick-chip .nick-name{color:#FFD700;font-size:15px;font-weight:bold}
.nick-chip .nick-edit{color:#666;font-size:11px}
.nick-chip.noname{border-color:#FF9800;border-style:dashed}
.nick-chip.noname .nick-name{color:#FF9800}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:999;display:flex;justify-content:center;align-items:center;backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;pointer-events:none}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#1a1a2e;border-radius:20px;padding:30px;width:90%;max-width:360px;text-align:center;border:1px solid #2a2a4a;transform:scale(0.9);transition:transform .2s}
.modal-overlay.show .modal{transform:scale(1)}
.modal h3{font-size:20px;margin-bottom:6px;color:#fff}
.modal p{color:#888;font-size:13px;margin-bottom:18px}
.modal input{background:#252545;border:2px solid #333;color:#fff;padding:12px 16px;border-radius:12px;font-size:18px;width:100%;text-align:center;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#FFD700}
.modal input::placeholder{color:#555}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;transition:all .15s}
.modal-btns button:hover{transform:scale(1.02)}
.modal-btns .btn-primary{background:linear-gradient(135deg,#FFD700,#FFA000);color:#000}
.modal-btns .btn-secondary{background:#252545;color:#888}
/* Tabs */
.tabs{display:flex;justify-content:center;gap:6px;padding:15px 20px;position:sticky;top:0;z-index:50;background:#0f0f1e;flex-wrap:wrap}
.tab{padding:10px 24px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;transition:all .2s;border:2px solid transparent;background:#1a1a2e;display:flex;align-items:center;gap:5px}
.tab-icon{font-size:16px}.tab-label{font-size:14px}
.tab:hover{border-color:#555}
.tab.active-game{border-color:#FFD700;background:#252535;color:#FFD700}
.tab.active-test{border-color:#FF69B4;background:#2a1a2a;color:#FF69B4}
.tab.active-destiny{border-color:#7B68EE;background:#1a1a3a;color:#7B68EE}
.tab .badge{background:#FF6B6B;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;max-width:1100px;margin:10px auto;padding:0 20px 30px}
.card{background:#1a1a2e;border-radius:14px;overflow:hidden;border:1px solid #2a2a4a;transition:all .3s;cursor:pointer;text-decoration:none;color:inherit;display:block}
.card:hover{transform:translateY(-5px);border-color:#5a5a8a;box-shadow:0 10px 30px rgba(100,100,255,0.12)}
.card-thumb{height:130px;display:flex;align-items:center;justify-content:center;font-size:50px;position:relative}
.card-info{padding:14px 16px}
.card-info h3{font-size:17px;margin-bottom:4px}
.card-info p{color:#888;font-size:12px;line-height:1.4}
.card-tag{display:inline-block;background:#2a2a4a;padding:2px 8px;border-radius:5px;font-size:10px;color:#aaa;margin-top:6px}
.card-score{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:6px;font-size:11px;color:#FFD700}
/* Leaderboard */
.lb{max-width:800px;margin:0 auto 30px;padding:0 20px}
.lb h2{font-size:20px;color:#FFD700;margin-bottom:12px;text-align:center}
.lb table{width:100%;border-collapse:collapse;background:#1a1a2e;border-radius:12px;overflow:hidden}
.lb th{background:#252545;padding:8px 12px;font-size:12px;color:#888;text-align:left}
.lb td{padding:8px 12px;font-size:13px;border-top:1px solid #252545}
.lb tr:hover td{background:#20203a}
.lb .rank{width:35px;text-align:center;font-weight:bold}
.lb .me{color:#7DF}
.lb-tabs{display:flex;gap:5px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.lb-tab{background:#2a2a4a;border:1px solid #333;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11px;color:#aaa}
.lb-tab:hover{border-color:#888}
.lb-tab.active{border-color:#FFD700;color:#FFD700}
footer{text-align:center;padding:20px;color:#444;font-size:12px}
.pc-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:6px;font-size:10px;color:#FF9800;backdrop-filter:blur(4px)}
.card.pc-only{opacity:0.5;order:99}
/* Mobile responsive */
@media(max-width:600px){

  .tab{position:relative}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 20px}
  .card-thumb{height:90px;font-size:36px}
  .card-info{padding:10px 12px}
  .card-info h3{font-size:14px}
  .card-info p{font-size:11px}
  .card-score{font-size:9px;padding:2px 6px}
  .pc-badge{font-size:9px;padding:2px 6px}
  .nick-bar{gap:6px;margin-top:8px}
  .nick-bar input{font-size:13px;width:130px;padding:5px 10px}

  .lb-tabs{gap:3px}
  .lb-tab{font-size:10px;padding:2px 7px}
  footer{font-size:11px;padding:15px 10px}

@media(max-width:380px){

  .card-info p{display:none}
}
</style>

<script>

const FB='https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app';
let fbCache={}, fbCacheTime=0;

function getHub(){return JSON.parse(localStorage.getItem(HUB_KEY)||'{}');}
function getNick(){
  let nick=getHub().nick;
  if(!nick){
    const counter=parseInt(localStorage.getItem('noname_counter')||'0')+1;
    localStorage.setItem('noname_counter',String(counter));
    nick='nonamed'+String(counter).padStart(4,'0');
    setNick(nick);
  }
  return nick;
}
function setNick(n){const h=getHub();h.nick=n;localStorage.setItem(HUB_KEY,JSON.stringify(h));}
function getScores(){return getHub().scores||{};}
function getLB(){return JSON.parse(localStorage.getItem(LB_KEY)||'{}');}
let lbPeriod='day';

// Firebase: fetch today's scores with 5min cache
async function fetchFBScores(){
  const now=Date.now();
  if(now-fbCacheTime<300000&&Object.keys(fbCache).length>0)return fbCache; // 5min cache
  const today=new Date().toISOString().slice(0,10);
  try{
    const res=await fetch(FB+'/scores/'+today+'.json');
    const data=await res.json();
    fbCache=data||{};
    fbCacheTime=now;
  }catch(e){fbCache={};}
  return fbCache;
}

function isInPeriod(dateStr, period){
  if(period==='all')return true;
  if(!dateStr)return false;
  const now=new Date();
  // Parse Korean date format "2026. 3. 24." or ISO
  let d;
  if(dateStr.includes('.')){
    const parts=dateStr.replace(/\./g,'').trim().split(/\s+/);
    d=new Date(parts[0],parseInt(parts[1])-1,parts[2]);
  } else {
    d=new Date(dateStr);
  }
  if(isNaN(d))return true; // if can't parse, show anyway
  const diff=(now-d)/(1000*60*60*24);
  if(period==='day')return diff<1&&now.getDate()===d.getDate();
  if(period==='week')return diff<7;
  if(period==='month')return now.getMonth()===d.getMonth()&&now.getFullYear()===d.getFullYear();
  return true;
}

// Nick
function renderNick(){
  const bar=document.getElementById('nick-bar');
  const nick=getNick();
  const isNoname=nick.startsWith('nonamed');
  if(isNoname){
    bar.innerHTML=`<div class="nick-chip noname" onclick="openNickModal()">
      <span class="nick-name">${nick}</span>
      <span class="nick-edit">닉네임 설정하기 →</span>
    </div>`;
  } else {
    bar.innerHTML=`<div class="nick-chip" onclick="openNickModal()">
      <span class="nick-name">🎮 ${nick}</span>
      <span class="nick-edit">변경</span>
    </div>`;
  }
}

function openNickModal(){
  const nick=getNick();
  const isNoname=nick.startsWith('nonamed');
  document.getElementById('modal-title').textContent=isNoname?'닉네임 설정':'닉네임 변경';
  document.getElementById('modal-desc').textContent=isNoname?'리더보드에 표시될 이름을 입력하세요':'새로운 닉네임을 입력하세요';
  const input=document.getElementById('nick-input');
  input.value=isNoname?'':nick;
  document.getElementById('nick-modal').classList.add('show');
  setTimeout(()=>input.focus(),200);
  input.onkeydown=e=>{if(e.key==='Enter')confirmNick();if(e.key==='Escape')closeNickModal();};
}

function closeNickModal(){document.getElementById('nick-modal').classList.remove('show');}

function confirmNick(){
  const n=document.getElementById('nick-input').value.trim();
  if(!n){document.getElementById('nick-input').focus();return;}
  if(n.length<2){alert('2글자 이상 입력해주세요');return;}
  setNick(n);closeNickModal();renderNick();renderGrid();
}

// Tabs
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  const tabs={game:0,test:1,destiny:2,itknow:3,quiz:4,tools:5};
  const cls=['active-game','active-test','active-destiny','active-game','active-test','active-destiny','active-game'];
  const idx=tabs[tab]||0;
  document.querySelectorAll('.tab')[idx]?.classList.add(cls[idx]);
  document.getElementById('lb-section').style.display=tab==='game'?'block':'none';
  renderGrid();
  if(tab==='game')renderLB().catch(()=>{});
}

const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

// Grid
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const TAB_MAP={game:GAMES,test:TESTS,destiny:DESTINY,itknow:ITKNOW,quiz:QUIZ,tools:TOOLS};
  const items=TAB_MAP[currentTab]||GAMES;
  const scores=getScores();

  // Sort: mobile-ok first on mobile
  const sorted = isMobile && currentTab==='game'
    ? [...items].sort((a,b)=> (a.mobile==='pc'?1:0) - (b.mobile==='pc'?1:0))
    : items;

  sorted.forEach(item=>{
    const isPcOnly = isMobile && item.mobile==='pc';
    const card=document.createElement('a');
    card.className='card' + (isPcOnly?' pc-only':'');
    card.href=item.file;

    if(isPcOnly){
      card.onclick=e=>{e.preventDefault();alert('이 게임은 PC에서 플레이해주세요! 🖥️\n키보드/마우스가 필요합니다.');};
    }

    const thumb=document.createElement('div');
    thumb.className='card-thumb';
    thumb.style.background=item.bg;
    thumb.innerHTML=`<span>${item.emoji}</span>`;

    // PC only badge
    if(isPcOnly){
      const pcb=document.createElement('div');
      pcb.className='pc-badge';
      pcb.textContent='🖥️ PC 전용';
      thumb.appendChild(pcb);
    }

    if(item.id&&scores[item.id]){
      const unit=SCORE_UNITS[item.id]||'점';
      const sb=document.createElement('div');
      sb.className='card-score';
      sb.textContent=`🏆 ${scores[item.id]}${unit}`;
      thumb.appendChild(sb);
    }

    const info=document.createElement('div');
    info.className='card-info';
    info.innerHTML=`<h3>${item.title}</h3><p>${item.desc}</p>`;

    card.appendChild(thumb);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

// Leaderboard
async function renderLB(){
  const fbData=await fetchFBScores();
  const nick=getNick();
  // Convert Firebase data to lb format
  const lb={};
  for(const[gameId,entries] of Object.entries(fbData)){
    if(!entries||typeof entries!=='object')continue;
    const arr=Object.values(entries).filter(e=>e&&e.nick&&e.score!==undefined);
    // Deduplicate: keep best score per nick
    const best={};
    arr.forEach(e=>{if(!best[e.nick]||e.score>best[e.nick].score)best[e.nick]=e;});
    lb[gameId]=Object.values(best).sort((a,b)=>b.score-a.score);
  }
  const tabs=document.getElementById('lb-tabs'),table=document.getElementById('lb-table');
  const ids=Object.keys(lb).filter(id=>lb[id].length>0);

  // Game tabs
  tabs.innerHTML=`<div class="lb-tab ${lbFilter==='all'?'active':''}" onclick="lbFilter='all';renderLB()">종합</div>`+
    ids.map(id=>`<div class="lb-tab ${lbFilter===id?'active':''}" onclick="lbFilter='${id}';renderLB()">${GAME_NAMES[id]||id}</div>`).join('');

  if(ids.length===0){table.innerHTML='<tr><td style="text-align:center;padding:20px;color:#555">아직 기록이 없습니다</td></tr>';return;}


  if(lbFilter==='all'){
    const players={};
    for(const id of ids){
      lb[id].forEach(e=>{
        if(!players[e.nick])players[e.nick]={nick:e.nick,games:0,details:{}};
        players[e.nick].games++;
        players[e.nick].details[id]=e.score;
      });
    }
    const sorted=Object.values(players).sort((a,b)=>b.games-a.games);
    if(sorted.length===0){table.innerHTML=`<tr><td style="text-align:center;padding:20px;color:#555">오늘 기록이 없습니다</td></tr>`;return;}
    const top5=ids.slice(0,5);
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:center">참여</th>`;
    top5.forEach(id=>{html+=`<th style="text-align:right;font-size:11px">${GAME_NAMES[id]||id}</th>`;});
    html+=`</tr>`;
    sorted.slice(0,15).forEach((p,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=p.nick===nick;
      const isNoname=p.nick.startsWith('nonamed');
      const displayNick=isNoname?`<span style="color:#666">${p.nick}</span>`:p.nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${displayNick}${me?' (나)':''}</td><td style="text-align:center;color:#888">${p.games}</td>`;
      top5.forEach(id=>{
        const s=p.details[id];
        html+=`<td style="text-align:right;color:${s?'#FFD700':'#333'};font-size:12px">${s||'-'}</td>`;
      });
      html+=`</tr>`;
    });
    table.innerHTML=html;
  } else {
    const entries=(lb[lbFilter]||[]);
    const unit=SCORE_UNITS[lbFilter]||'점';
    if(entries.length===0){table.innerHTML=`<tr><td style="text-align:center;padding:20px;color:#555">오늘 기록이 없습니다</td></tr>`;return;}
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:right">기록</th><th style="text-align:right;color:#555">날짜</th></tr>`;
    entries.slice(0,15).forEach((e,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=e.nick===nick;
      const isNoname=e.nick.startsWith('nonamed');
      const displayNick=isNoname?`<span style="color:#666">${e.nick}</span>`:e.nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${displayNick}${me?' (나)':''}</td><td style="text-align:right;color:#FFD700;font-weight:bold">${e.score.toLocaleString()}${unit}</td><td style="text-align:right;color:#555;font-size:12px">${e.date||''}</td></tr>`;
    });
    table.innerHTML=html;
  }
}

renderNick();
document.getElementById('game-count').textContent=GAMES.length;
document.getElementById('test-count').textContent=TESTS.length;
document.getElementById('dest-count').textContent=DESTINY.length;

document.getElementById('it-count').textContent=ITKNOW.length;
document.getElementById('qz-count').textContent=QUIZ.length;
document.getElementById('tl-count').textContent=TOOLS.length;
switchTab('game');
</script>
