<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;font-family:'Segoe UI',-apple-system,sans-serif;color:#fff;min-height:100vh}
header{text-align:center;padding:35px 20px 15px;background:linear-gradient(180deg,#1a1a3e,#0f0f1e)}
header h1{font-size:40px;background:linear-gradient(135deg,#FFD700,#FF6B6B,#7B68EE,#00CED1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
header .sub{color:#888;font-size:14px}
.nick-bar{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px}
.nick-bar input{background:#1a1a2e;border:1px solid #3a3a5a;color:#fff;padding:6px 14px;border-radius:8px;font-size:14px;width:160px;text-align:center}
.nick-bar input:focus{outline:none;border-color:#FFD700}
.nick-bar button{background:#4CAF50;border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:bold}
.nick-display{color:#FFD700;font-size:16px;font-weight:bold;cursor:pointer}
.nick-display:hover{text-decoration:underline}
/* Tabs */
.tabs{display:flex;justify-content:center;gap:6px;padding:15px 20px;position:sticky;top:0;z-index:50;background:#0f0f1e}
.tab{padding:10px 24px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:bold;transition:all .2s;border:2px solid transparent;background:#1a1a2e}
.tab:hover{border-color:#555}
.tab.active-game{border-color:#FFD700;background:#252535;color:#FFD700}
.tab.active-test{border-color:#FF69B4;background:#2a1a2a;color:#FF69B4}
.tab.active-destiny{border-color:#7B68EE;background:#1a1a3a;color:#7B68EE}
.tab .badge{background:#FF6B6B;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;max-width:1100px;margin:10px auto;padding:0 20px 30px}
.card{background:#1a1a2e;border-radius:14px;overflow:hidden;border:1px solid #2a2a4a;transition:all .3s;cursor:pointer;text-decoration:none;color:inherit;display:block}
.card:hover{transform:translateY(-5px);border-color:#5a5a8a;box-shadow:0 10px 30px rgba(100,100,255,0.12)}
.card-thumb{height:130px;display:flex;align-items:center;justify-content:center;font-size:50px;position:relative}
.card-info{padding:14px 16px}
.card-info h3{font-size:17px;margin-bottom:4px}
.card-info p{color:#888;font-size:12px;line-height:1.4}
.card-tag{display:inline-block;background:#2a2a4a;padding:2px 8px;border-radius:5px;font-size:10px;color:#aaa;margin-top:6px}
.card-score{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:6px;font-size:11px;color:#FFD700}
/* Leaderboard */
.lb{max-width:800px;margin:0 auto 30px;padding:0 20px}
.lb h2{font-size:20px;color:#FFD700;margin-bottom:12px;text-align:center}
.lb table{width:100%;border-collapse:collapse;background:#1a1a2e;border-radius:12px;overflow:hidden}
.lb th{background:#252545;padding:8px 12px;font-size:12px;color:#888;text-align:left}
.lb td{padding:8px 12px;font-size:13px;border-top:1px solid #252545}
.lb tr:hover td{background:#20203a}
.lb .rank{width:35px;text-align:center;font-weight:bold}
.lb .me{color:#7DF}
.lb-tabs{display:flex;gap:5px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.lb-tab{background:#2a2a4a;border:1px solid #333;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11px;color:#aaa}
.lb-tab:hover{border-color:#888}
.lb-tab.active{border-color:#FFD700;color:#FFD700}
footer{text-align:center;padding:20px;color:#444;font-size:12px}
.pc-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);padding:3px 8px;border-radius:6px;font-size:10px;color:#FF9800;backdrop-filter:blur(4px)}
.card.pc-only{opacity:0.5;order:99}
/* Mobile responsive */
@media(max-width:600px){
  header{padding:25px 15px 10px}
  header h1{font-size:28px}
  .tabs{gap:4px;padding:10px 8px}
  .tab{padding:8px 12px;font-size:13px}
  .tab .badge{font-size:9px;padding:1px 4px}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 10px 20px}
  .card-thumb{height:90px;font-size:36px}
  .card-info{padding:10px 12px}
  .card-info h3{font-size:14px}
  .card-info p{font-size:11px}
  .card-score{font-size:9px;padding:2px 6px}
  .pc-badge{font-size:9px;padding:2px 6px}
  .nick-bar{gap:6px;margin-top:8px}
  .nick-bar input{font-size:13px;width:130px;padding:5px 10px}
  .nick-display{font-size:14px}
  .lb table{font-size:11px}
  .lb th,.lb td{padding:5px 6px;font-size:11px}
  .lb-tabs{gap:3px}
  .lb-tab{font-size:10px;padding:2px 7px}
  footer{font-size:11px;padding:15px 10px}
}
@media(max-width:380px){
  .grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:0 8px 15px}
  .card-thumb{height:75px;font-size:30px}
  .card-info h3{font-size:13px}
  .card-info p{display:none}
}
</style>

  const nick=getNick();
  if(nick){
    bar.innerHTML=`<span class="nick-display" onclick="changeNick()" title="클릭하여 변경">🎮 ${nick}</span>`;
  } else {
    bar.innerHTML=`<input id="nick-input" placeholder="닉네임 입력" maxlength="12"><button onclick="saveNick()">시작</button>`;
    document.getElementById('nick-input')?.addEventListener('keydown',e=>{if(e.key==='Enter')saveNick();});
  }
}
function saveNick(){const i=document.getElementById('nick-input'),n=i.value.trim();if(!n)return i.focus();setNick(n);renderNick();renderGrid();}
function changeNick(){const n=prompt('닉네임 변경:',getNick());if(n?.trim()){setNick(n.trim());renderNick();}}

// Tabs
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  const idx={game:0,test:1,destiny:2}[tab];
  const cls=['active-game','active-test','active-destiny'][idx];
  document.querySelectorAll('.tab')[idx].classList.add(cls);
  document.getElementById('lb-section').style.display=tab==='game'?'block':'none';
  renderGrid();
  if(tab==='game')renderLB();
}

const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

// Grid
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const items=currentTab==='game'?GAMES:currentTab==='test'?TESTS:DESTINY;
  const scores=getScores();

  // Sort: mobile-ok first on mobile
  const sorted = isMobile && currentTab==='game'
    ? [...items].sort((a,b)=> (a.mobile==='pc'?1:0) - (b.mobile==='pc'?1:0))
    : items;

  sorted.forEach(item=>{
    const isPcOnly = isMobile && item.mobile==='pc';
    const card=document.createElement('a');
    card.className='card' + (isPcOnly?' pc-only':'');
    card.href=item.file;

    if(isPcOnly){
      card.onclick=e=>{e.preventDefault();alert('이 게임은 PC에서 플레이해주세요! 🖥️\n키보드/마우스가 필요합니다.');};
    }

    const thumb=document.createElement('div');
    thumb.className='card-thumb';
    thumb.style.background=item.bg;
    thumb.innerHTML=`<span>${item.emoji}</span>`;

    // PC only badge
    if(isPcOnly){
      const pcb=document.createElement('div');
      pcb.className='pc-badge';
      pcb.textContent='🖥️ PC 전용';
      thumb.appendChild(pcb);
    }

    if(item.id&&scores[item.id]){
      const unit=SCORE_UNITS[item.id]||'점';
      const sb=document.createElement('div');
      sb.className='card-score';
      sb.textContent=`🏆 ${scores[item.id]}${unit}`;
      thumb.appendChild(sb);
    }

    const info=document.createElement('div');
    info.className='card-info';
    info.innerHTML=`<h3>${item.title}</h3><p>${item.desc}</p>`;

    card.appendChild(thumb);
    card.appendChild(info);
    grid.appendChild(card);
  });
}

// Leaderboard
function renderLB(){
  const lb=getLB(),nick=getNick();
  const tabs=document.getElementById('lb-tabs'),table=document.getElementById('lb-table');
  const ids=Object.keys(lb).filter(id=>lb[id].length>0);

  tabs.innerHTML=`<div class="lb-tab ${lbFilter==='all'?'active':''}" onclick="lbFilter='all';renderLB()">종합</div>`+
    ids.map(id=>`<div class="lb-tab ${lbFilter===id?'active':''}" onclick="lbFilter='${id}';renderLB()">${GAME_NAMES[id]||id}</div>`).join('');

  if(ids.length===0){table.innerHTML='<tr><td style="text-align:center;padding:20px;color:#555">아직 기록이 없습니다</td></tr>';return;}

  if(lbFilter==='all'){
    const players={};
    for(const id of ids){
      lb[id].forEach(e=>{
        if(!players[e.nick])players[e.nick]={nick:e.nick,games:0,details:{}};
        players[e.nick].games++;
        players[e.nick].details[id]=e.score;
      });
    }
    const sorted=Object.values(players).sort((a,b)=>b.games-a.games);
    const top5=ids.slice(0,5);
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:center">참여</th>`;
    top5.forEach(id=>{html+=`<th style="text-align:right;font-size:11px">${GAME_NAMES[id]||id}</th>`;});
    html+=`</tr>`;
    sorted.slice(0,10).forEach((p,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=p.nick===nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${p.nick}${me?' (나)':''}</td><td style="text-align:center;color:#888">${p.games}</td>`;
      top5.forEach(id=>{
        const s=p.details[id];
        html+=`<td style="text-align:right;color:${s?'#FFD700':'#333'};font-size:12px">${s||'-'}</td>`;
      });
      html+=`</tr>`;
    });
    table.innerHTML=html;
  } else {
    const entries=lb[lbFilter]||[];
    const unit=SCORE_UNITS[lbFilter]||'점';
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:right">기록</th><th style="text-align:right;color:#555">날짜</th></tr>`;
    entries.slice(0,10).forEach((e,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=e.nick===nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${e.nick}${me?' (나)':''}</td><td style="text-align:right;color:#FFD700;font-weight:bold">${e.score.toLocaleString()}${unit}</td><td style="text-align:right;color:#555;font-size:12px">${e.date||''}</td></tr>`;
    });
    table.innerHTML=html;
  }
}

// Init
renderNick();
document.getElementById('game-count').textContent=GAMES.length;
document.getElementById('test-count').textContent=TESTS.length;
document.getElementById('dest-count').textContent=DESTINY.length;
switchTab('game');
</script>
