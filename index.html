const HUB_KEY='game_hub',LB_KEY='game_leaderboard';
const FB='https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app';
let fbCache={}, fbCacheTime=0;

function getHub(){return JSON.parse(localStorage.getItem(HUB_KEY)||'{}');}
function getNick(){
  let nick=getHub().nick;
  if(!nick){
    const counter=parseInt(localStorage.getItem('noname_counter')||'0')+1;
    localStorage.setItem('noname_counter',String(counter));
    nick='nonamed'+String(counter).padStart(4,'0');
    setNick(nick);
  }
  return nick;
}
function setNick(n){const h=getHub();h.nick=n;localStorage.setItem(HUB_KEY,JSON.stringify(h));}
function getScores(){return getHub().scores||{};}
function getLB(){return JSON.parse(localStorage.getItem(LB_KEY)||'{}');}
let lbPeriod='day';

// Firebase: fetch today's scores with 5min cache
async function fetchFBScores(){
  const now=Date.now();
  if(now-fbCacheTime<300000&&Object.keys(fbCache).length>0)return fbCache; // 5min cache
  const today=new Date().toISOString().slice(0,10);
  try{
    const res=await fetch(FB+'/scores/'+today+'.json');
    const data=await res.json();
    fbCache=data||{};
    fbCacheTime=now;
  }catch(e){fbCache={};}
  return fbCache;
}

function isInPeriod(dateStr, period){
  if(period==='all')return true;
  if(!dateStr)return false;
  const now=new Date();
  // Parse Korean date format "2026. 3. 24." or ISO
  let d;
  if(dateStr.includes('.')){
    const parts=dateStr.replace(/\./g,'').trim().split(/\s+/);
    d=new Date(parts[0],parseInt(parts[1])-1,parts[2]);
  } else {
    d=new Date(dateStr);
  }
  if(isNaN(d))return true; // if can't parse, show anyway
  const diff=(now-d)/(1000*60*60*24);
  if(period==='day')return diff<1&&now.getDate()===d.getDate();
  if(period==='week')return diff<7;
  if(period==='month')return now.getMonth()===d.getMonth()&&now.getFullYear()===d.getFullYear();
  return true;
}

function openNickModal(){
  const nick=getNick();
  const isNoname=nick.startsWith('nonamed');
  document.getElementById('modal-title').textContent=isNoname?'닉네임 설정':'닉네임 변경';
  document.getElementById('modal-desc').textContent=isNoname?'리더보드에 표시될 이름을 입력하세요':'새로운 닉네임을 입력하세요';

  input.value=isNoname?'':nick;
  document.getElementById('nick-modal').classList.add('show');
  setTimeout(()=>input.focus(),200);
  input.onkeydown=e=>{if(e.key==='Enter')confirmNick();if(e.key==='Escape')closeNickModal();};
}

function closeNickModal(){document.getElementById('nick-modal').classList.remove('show');}

function confirmNick(){
  const n=document.getElementById('nick-input').value.trim();
  if(!n){document.getElementById('nick-input').focus();return;}
  if(n.length<2){alert('2글자 이상 입력해주세요');return;}

}

const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

// Grid
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const TAB_MAP={game:GAMES,test:TESTS,destiny:DESTINY,itknow:ITKNOW,quiz:QUIZ,tools:TOOLS,music:MUSIC,health:HEALTH,learn:LEARN};
  let items=TAB_MAP[currentTab]||GAMES;
  const scores=getScores();

  // Game category filter
  if(currentTab==='game'&&gameCatFilter!=='all'){
    items=items.filter(g=>g.cat===gameCatFilter);
  }

  // Search filter (across all tabs)
  if(searchTerm){
    items=items.filter(i=>i.title.toLowerCase().includes(searchTerm)||i.desc.toLowerCase().includes(searchTerm));
  }

  // Sort: mobile-ok first on mobile
  const sorted = isMobile && currentTab==='game'
    ? [...items].sort((a,b)=> (a.mobile==='pc'?1:0) - (b.mobile==='pc'?1:0))
    : items;

  sorted.forEach(item=>{
    const isPcOnly = isMobile && item.mobile==='pc';
    const card=document.createElement('a');
    const glowCls=getGlowClass(item.bg);
    card.className='card' + (isPcOnly?' pc-only':'') + (glowCls?' '+glowCls:'');
    card.href=item.file;

    // Track recently played for games
    if(currentTab==='game'&&!isPcOnly){
      card.addEventListener('click',function(){addRecentPlayed(item);});
    }

    if(isPcOnly){
      card.onclick=e=>{e.preventDefault();alert('이 게임은 PC에서 플레이해주세요! 🖥️\n키보드/마우스가 필요합니다.');};
    }

    const thumb=document.createElement('div');
    thumb.className='card-thumb';
    thumb.style.background=item.bg;
    thumb.innerHTML=`<span>${item.emoji}</span>`;

    // PC only badge
    if(isPcOnly){
      const pcb=document.createElement('div');
      pcb.className='pc-badge';
      pcb.textContent='🖥️ PC 전용';
      thumb.appendChild(pcb);
    }

    if(item.id&&scores[item.id]){
      const unit=SCORE_UNITS[item.id]||'점';
      const sb=document.createElement('div');
      sb.className='card-score';
      sb.textContent=`🏆 ${scores[item.id]}${unit}`;
      thumb.appendChild(sb);
    }

    const info=document.createElement('div');
    info.className='card-info';
    info.innerHTML=`<h3>${item.title}</h3><p>${item.desc}</p>`;

    card.appendChild(thumb);
    card.appendChild(info);
    grid.appendChild(card);
  });

  // Update badge count dynamically based on filtered items
  if(!searchTerm){return;}
  const countMap={game:'game-count',test:'test-count',destiny:'dest-count',itknow:'it-count',quiz:'qz-count',tools:'tl-count'};
  const allMap={game:GAMES,test:TESTS,destiny:DESTINY,itknow:ITKNOW,quiz:QUIZ,tools:TOOLS};
  Object.entries(countMap).forEach(([tab,id])=>{
    const filtered=allMap[tab].filter(i=>i.title.toLowerCase().includes(searchTerm)||i.desc.toLowerCase().includes(searchTerm));
    document.getElementById(id).textContent=filtered.length;
  });
}

// Leaderboard
async function renderLB(){
  const fbData=await fetchFBScores();
  const nick=getNick();
  // Convert Firebase data to lb format
  const lb={};
  for(const[gameId,entries] of Object.entries(fbData)){
    if(!entries||typeof entries!=='object')continue;
    const arr=Object.values(entries).filter(e=>e&&e.nick&&e.score!==undefined);
    // Deduplicate: keep best score per nick
    const best={};
    arr.forEach(e=>{if(!best[e.nick]||e.score>best[e.nick].score)best[e.nick]=e;});
    lb[gameId]=Object.values(best).sort((a,b)=>b.score-a.score);
  }
  const tabs=document.getElementById('lb-tabs'),table=document.getElementById('lb-table');
  const ids=Object.keys(lb).filter(id=>lb[id].length>0);

  // Game tabs
  tabs.innerHTML=`<div class="lb-tab ${lbFilter==='all'?'active':''}" onclick="lbFilter='all';renderLB()">종합</div>`+
    ids.map(id=>`<div class="lb-tab ${lbFilter===id?'active':''}" onclick="lbFilter='${id}';renderLB()">${GAME_NAMES[id]||id}</div>`).join('');

  if(ids.length===0){table.innerHTML='<tr><td style="text-align:center;padding:20px;color:#555">아직 기록이 없습니다</td></tr>';return;}


  if(lbFilter==='all'){
    const players={};
    for(const id of ids){
      lb[id].forEach(e=>{
        if(!players[e.nick])players[e.nick]={nick:e.nick,games:0,details:{}};
        players[e.nick].games++;
        players[e.nick].details[id]=e.score;
      });
    }
    const sorted=Object.values(players).sort((a,b)=>b.games-a.games);
    if(sorted.length===0){table.innerHTML=`<tr><td style="text-align:center;padding:20px;color:#555">오늘 기록이 없습니다</td></tr>`;return;}
    const top5=ids.slice(0,5);
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:center">참여</th>`;
    top5.forEach(id=>{html+=`<th style="text-align:right;font-size:11px">${GAME_NAMES[id]||id}</th>`;});
    html+=`</tr>`;
    sorted.slice(0,15).forEach((p,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=p.nick===nick;
      const isNoname=p.nick.startsWith('nonamed');
      const displayNick=isNoname?`<span style="color:#666">${p.nick}</span>`:p.nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${displayNick}${me?' (나)':''}</td><td style="text-align:center;color:#888">${p.games}</td>`;
      top5.forEach(id=>{
        const s=p.details[id];
        html+=`<td style="text-align:right;color:${s?'#FFD700':'#333'};font-size:12px">${s||'-'}</td>`;
      });
      html+=`</tr>`;
    });
    table.innerHTML=html;
  } else {
    const entries=(lb[lbFilter]||[]);
    const unit=SCORE_UNITS[lbFilter]||'점';
    if(entries.length===0){table.innerHTML=`<tr><td style="text-align:center;padding:20px;color:#555">오늘 기록이 없습니다</td></tr>`;return;}
    let html=`<tr><th class="rank">#</th><th>플레이어</th><th style="text-align:right">기록</th><th style="text-align:right;color:#555">날짜</th></tr>`;
    entries.slice(0,15).forEach((e,i)=>{
      const medal=i<3?['🥇','🥈','🥉'][i]:(i+1);
      const me=e.nick===nick;
      const isNoname=e.nick.startsWith('nonamed');
      const displayNick=isNoname?`<span style="color:#666">${e.nick}</span>`:e.nick;
      html+=`<tr><td class="rank">${medal}</td><td class="${me?'me':''}">${displayNick}${me?' (나)':''}</td><td style="text-align:right;color:#FFD700;font-weight:bold">${e.score.toLocaleString()}${unit}</td><td style="text-align:right;color:#555;font-size:12px">${e.date||''}</td></tr>`;
    });
    table.innerHTML=html;
  }
}

// Glow color helper
function getGlowClass(bg){
  if(!bg)return '';
  if(bg.includes('FF9')|| bg.includes('FF7')|| bg.includes('FFD')|| bg.includes('E65')|| bg.includes('BF3'))return 'glow-warm';
  if(bg.includes('FF69')|| bg.includes('EC4')|| bg.includes('AD1')|| bg.includes('E91'))return 'glow-pink';
  if(bg.includes('7B6')|| bg.includes('AB4')|| bg.includes('6A1')|| bg.includes('4A1')|| bg.includes('4527'))return 'glow-purple';
  if(bg.includes('66B')|| bg.includes('2E7')|| bg.includes('1B5E')|| bg.includes('4CAF')|| bg.includes('26A'))return 'glow-green';
  return 'glow-cool';
}

// === Daily Challenge ===
function getDailyDate(){return new Date().toISOString().slice(0,10);}
function seededRandom(seed){let s=0;for(let i=0;i<seed.length;i++){s=((s<<5)-s)+seed.charCodeAt(i);s|=0;}return function(){s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function getDailyChallenge(){
  const date=getDailyDate();
  const rng=seededRandom(date+'hoit');
  const gi=Math.floor(rng()*GAMES.length);
  const qi=Math.floor(rng()*QUIZ.length);
  const ti=Math.floor(rng()*TESTS.length);
  return {date,items:[
    {type:'게임',item:GAMES[gi],key:'game_'+GAMES[gi].file},
    {type:'퀴즈',item:QUIZ[qi],key:'quiz_'+QUIZ[qi].file},
    {type:'테스트',item:TESTS[ti],key:'test_'+TESTS[ti].file}
  ]};
}
function getDailyCompletion(){
  const date=getDailyDate();
  try{return JSON.parse(localStorage.getItem('daily_'+date)||'{}');}catch(e){return {};}
}
function setDailyCompletion(key){
  const date=getDailyDate();
  const c=getDailyCompletion();
  c[key]=true;
  localStorage.setItem('daily_'+date,JSON.stringify(c));
}
function renderDailyChallenge(){
  const el=document.getElementById('dailyChallenge');
  if(currentTab!=='game'){el.classList.remove('show');return;}
  el.classList.add('show');
  const dc=getDailyChallenge();
  const comp=getDailyCompletion();
  const done=dc.items.filter(d=>comp[d.key]).length;
  el.innerHTML=`<div class="daily-card"><h3>🎯 오늘의 도전</h3><div class="daily-items">${
    dc.items.map(d=>{
      const isDone=!!comp[d.key];
      return `<div class="daily-item${isDone?' completed':''}"><div class="di-check">✅</div><div class="di-emoji">${d.item.emoji}</div><div class="di-title">${d.item.title}</div><div class="di-type">${d.type}</div><a href="${d.item.file}" class="daily-btn" onclick="markDailyPlayed('${d.key}')">${isDone?'완료!':'도전하기'}</a></div>`;
    }).join('')
  }</div><div class="daily-progress">${done}/3 완료${done===3?' 🎉 오늘의 도전 클리어!':''}</div></div>`;
  if(done===3)unlockAchv(4);
}
function markDailyPlayed(key){setDailyCompletion(key);}

function getAchievements(){try{return JSON.parse(localStorage.getItem('achievements')||'{}');}catch(e){return {};}}
function unlockAchv(id){
  const a=getAchievements();
  if(a[id])return;
  a[id]=Date.now();
  localStorage.setItem('achievements',JSON.stringify(a));
  updateAchvBtn();
  // Check "all achievements" unlock
  if(id!==19){const unlocked=Object.keys(a).filter(k=>k!=='19').length;if(unlocked>=19)unlockAchv(19);}
}
function countAchv(){return Object.keys(getAchievements()).length;}
function updateAchvBtn(){
  const btn=document.getElementById('achv-btn-count');
  if(btn)btn.textContent=countAchv()+'/20';
}
function openAchvModal(){
  const a=getAchievements();
  const grid=document.getElementById('achv-grid');
  document.getElementById('achv-counter').textContent=Object.keys(a).length+'/20 달성';
  grid.innerHTML=ACHIEVEMENTS.map(ac=>{
    const unlocked=!!a[ac.id];
    return `<div class="achv-item ${unlocked?'unlocked':'locked'}"><span class="ai-icon">${unlocked?ac.icon:'🔒'}</span><div class="ai-name">${ac.name}</div></div>`;
  }).join('');
  document.getElementById('achv-overlay').classList.add('show');
}
function closeAchvModal(){document.getElementById('achv-overlay').classList.remove('show');}
function trackVisitStreak(){
  const today=getDailyDate();
  let visits=[];
  try{visits=JSON.parse(localStorage.getItem('visit_dates')||'[]');}catch(e){}
  if(visits[visits.length-1]!==today){visits.push(today);if(visits.length>30)visits=visits.slice(-30);localStorage.setItem('visit_dates',JSON.stringify(visits));}
  // Check streaks
  let streak=1;
  for(let i=visits.length-1;i>0;i--){
    const d1=new Date(visits[i]),d0=new Date(visits[i-1]);
    if((d1-d0)/(1000*60*60*24)===1)streak++;else break;
  }
  if(streak>=3)unlockAchv(14);
  if(streak>=7)unlockAchv(15);
}
function checkAchievementsOnLoad(){
  const hub=getHub();const scores=hub.scores||{};const nick=hub.nick||'';
  // Nickname set
  if(nick&&!nick.startsWith('nonamed'))unlockAchv(17);
  // Game counts from recent_played
  const recent=getRecentPlayed();
  if(recent.length>=1&&Object.keys(scores).length>=1)unlockAchv(0);
  const playedGames=new Set([...recent.map(r=>r.file),...Object.keys(scores)]);
  if(playedGames.size>=5)unlockAchv(5);
  if(playedGames.size>=10)unlockAchv(6);
  if(playedGames.size>=20)unlockAchv(7);
  // Visit streak
  trackVisitStreak();
}
