function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const Q=_shuf([{"q": "조선을 건국한 사람은?", "o": ["이성계", "이방원", "세종대왕", "정도전"], "a": 0, "e": "1392년 이성계가 조선을 건국했습니다."}, {"q": "한글을 창제한 왕은?", "o": ["태종", "세종", "성종", "선조"], "a": 1, "e": "세종대왕이 1443년 훈민정음을 창제했습니다."}, {"q": "임진왜란이 일어난 해는?", "o": ["1492년", "1592년", "1692년", "1392년"], "a": 1, "e": "1592년 일본의 도요토미 히데요시가 조선을 침략했습니다."}, {"q": "거북선을 만든 장수는?", "o": ["권율", "이순신", "김시민", "곽재우"], "a": 1, "e": "이순신 장군이 거북선(판옥선)을 활용해 일본 수군을 격파했습니다."}, {"q": "조선의 수도는?", "o": ["개경", "평양", "한양", "부여"], "a": 2, "e": "한양(현재 서울)이 조선의 수도였습니다."}, {"q": "조선시대 과거시험의 종류가 아닌 것은?", "o": ["문과", "무과", "잡과", "기과"], "a": 3, "e": "조선의 과거시험은 문과, 무과, 잡과(기술직)로 나뉘었습니다."}, {"q": "조선의 마지막 왕은?", "o": ["고종", "순종", "영조", "정조"], "a": 1, "e": "순종이 조선(대한제국)의 마지막 황제입니다."}, {"q": "경복궁을 세운 왕은?", "o": ["태조", "태종", "세조", "성종"], "a": 0, "e": "태조 이성계가 1395년 경복궁을 건설했습니다."}, {"q": "조선의 신분제도가 아닌 것은?", "o": ["양반", "중인", "상민", "귀족"], "a": 3, "e": "조선은 양반, 중인, 상민, 천민의 4신분 체제였습니다."}, {"q": "훈민정음의 자음 기본자 수는?", "o": ["5개", "10개", "14개", "28개"], "a": 0, "e": "ㄱ, ㄴ, ㅁ, ㅅ, ㅇ 5개가 기본자이며 나머지는 가획으로 만들었습니다."}]);
let cur=0,score=0,answered=false;
function render(){
const app=document.getElementById('app');
if(cur>=Q.length){const grade=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
const emoji2=score>=9?'🏆':score>=7?'👏':score>=5?'👍':score>=3?'😅':'💪';

<div class="explain" id="explain">${q.e||''}</div></div>`;answered=false;}
