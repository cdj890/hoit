<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}.wrap{max-width:500px;width:100%;padding:20px;text-align:center}.progress{background:#1a1a2e;border-radius:10px;height:8px;margin-bottom:15px;overflow:hidden}.progress-fill{background:linear-gradient(90deg,#7B68EE,#FF6B6B);height:100%;border-radius:10px;transition:width .3s}.q-card{background:#1a1a2e;border-radius:16px;padding:22px;border:1px solid #2a2a4a}.q-text{font-size:17px;margin-bottom:16px;line-height:1.5}.opts{display:flex;flex-direction:column;gap:8px}.opt{background:#252545;border:2px solid #333;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;transition:all .2s;text-align:left}.opt:hover{border-color:#7B68EE}.opt.correct{border-color:#4CAF50;background:#1a3a1a}.opt.wrong{border-color:#F44336;background:#3a1a1a}.explain{color:#aaa;font-size:13px;margin-top:10px;padding:10px;background:#252545;border-radius:8px;text-align:left;display:none}.btn{background:#7B68EE;border:none;color:#fff;padding:12px 30px;border-radius:10px;font-size:16px;cursor:pointer;margin-top:15px;font-weight:bold}body{overflow-x:hidden}@media(max-width:600px){h1{font-size:22px!important}.wrap{padding-top:45px}.q-text{font-size:15px!important}.opt{padding:12px;font-size:14px!important;min-height:44px}.btn{min-height:44px}}</style></head><body><a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap" id="app"></div>
<script>
function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const Q=_shuf([{"q": "가장 빠른 동물은?", "o": ["치타", "매", "사자", "영양"], "a": 0, "e": "치타는 시속 약 120km입니다."}, {"q": "문어의 심장은?", "o": ["1개", "2개", "3개", "4개"], "a": 2, "e": "문어는 심장이 3개입니다."}, {"q": "코알라의 수면 시간은?", "o": ["8시간", "12시간", "18시간", "22시간"], "a": 3, "e": "하루 18~22시간 잡니다."}, {"q": "지구상 가장 큰 동물은?", "o": ["아프리카 코끼리", "흰수염고래", "기린", "상어"], "a": 1, "e": "길이 30m, 무게 150톤입니다."}, {"q": "기린의 목뼈 개수는?", "o": ["3개", "7개", "14개", "30개"], "a": 1, "e": "사람과 같은 7개입니다."}, {"q": "나비의 맛 느끼는 부위는?", "o": ["입", "더듬이", "날개", "발"], "a": 3, "e": "발에 미각 수용체가 있습니다."}, {"q": "돌고래는 잘 때?", "o": ["물위에 뜸", "뇌 반쪽씩 잠", "안잠", "바닥에 누움"], "a": 1, "e": "뇌의 반쪽씩 번갈아 잡니다."}, {"q": "개미가 드는 무게는?", "o": ["2배", "10배", "50배", "100배"], "a": 2, "e": "자기 몸무게의 약 50배입니다."}, {"q": "가장 독이 강한 동물은?", "o": ["킹코브라", "박스 해파리", "검은 맘바", "타이판"], "a": 1, "e": "박스 해파리가 최강입니다."}, {"q": "꿀벌이 꿀 1kg 만들려면?", "o": ["100송이", "1000송이", "100만 송이", "1000만 송이"], "a": 2, "e": "약 100만~150만 송이 방문합니다."}]);
let cur=0,score=0,answered=false;
function render(){const app=document.getElementById('app');
if(cur>=Q.length){const g=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
app.innerHTML='<h1 style="margin:10px 0">'+score+'/'+Q.length+'</h1><div style="font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0">'+g+'</div><p style="color:#aaa">'+(score>=7?'\uB300\uB2E8\uD574\uC694!':score>=5?'\uC798\uD588\uC5B4\uC694!':'\uB2E4\uC74C\uC5D4 \uB354!')+'</p><button class="btn" onclick="cur=0;score=0;_shuf(Q);render()">\uB2E4\uC2DC \uD558\uAE30</button>';return;}
const q=Q[cur],pct=(cur/Q.length*100)|0;
app.innerHTML='<div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="q-card"><div style="color:#888;font-size:13px;margin-bottom:8px">🦁 '+(cur+1)+'/'+Q.length+'</div><div class="q-text">'+q.q+'</div><div class="opts">'+q.o.map((o,i)=>'<div class="opt" id="opt'+i+'" onclick="answer('+i+')">'+o+'</div>').join('')+'</div><div class="explain" id="explain">'+((q.e)||'')+'</div></div>';answered=false;}
function answer(i){if(answered)return;answered=true;const q=Q[cur];document.getElementById('opt'+i).classList.add(i===q.a?'correct':'wrong');if(i!==q.a)document.getElementById('opt'+q.a).classList.add('correct');if(i===q.a)score++;const el=document.getElementById('explain');if(q.e)el.style.display='block';setTimeout(()=>{cur++;render();},1500);}
render();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
