<script>
function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

{"q": "이집트의 수도는?", "o": ["알렉산드리아", "카이로", "룩소르", "아스완"], "a": 1, "e": "카이로 (이집트 최대 도시이자 수도)"},
{"q": "아르헨티나의 수도는?", "o": ["부에노스아이레스", "상파울루", "산티아고", "몬테비데오"], "a": 0, "e": "부에노스아이레스"},
{"q": "러시아의 수도는?", "o": ["상트페테르부르크", "모스크바", "노보시비르스크", "블라디보스토크"], "a": 1, "e": "모스크바"},
{"q": "남아프리카공화국의 행정 수도는?", "o": ["케이프타운", "더반", "요하네스버그", "프리토리아"], "a": 3, "e": "프리토리아 (입법 수도는 케이프타운, 사법 수도는 블룸폰테인)"},
{"q": "사우디아라비아의 수도는?", "o": ["두바이", "쿠웨이트", "리야드", "메카"], "a": 2, "e": "리야드"},
{"q": "오스트리아의 수도는?", "o": ["잘츠부르크", "그라츠", "빈", "인스부르크"], "a": 2, "e": "빈(Wien)"},
{"q": "뉴질랜드의 수도는?", "o": ["오클랜드", "크라이스트처치", "웰링턴", "더니든"], "a": 2, "e": "웰링턴 (오클랜드가 최대 도시)"},
{"q": "그리스의 수도는?", "o": ["테살로니키", "아테네", "코린트", "스파르타"], "a": 1, "e": "아테네"},
{"q": "포르투갈의 수도는?", "o": ["포르투", "파로", "리스본", "코임브라"], "a": 2, "e": "리스본(Lisboa)"},
{"q": "노르웨이의 수도는?", "o": ["스톡홀름", "헬싱키", "코펜하겐", "오슬로"], "a": 3, "e": "오슬로"},
{"q": "폴란드의 수도는?", "o": ["크라쿠프", "바르샤바", "브로츠와프", "그단스크"], "a": 1, "e": "바르샤바(Warsaw)"},
{"q": "이란의 수도는?", "o": ["테헤란", "이스파한", "시라즈", "마슈하드"], "a": 0, "e": "테헤란"},
{"q": "파키스탄의 수도는?", "o": ["카라치", "라호르", "이슬라마바드", "페샤와르"], "a": 2, "e": "이슬라마바드 (카라치가 최대 도시)"},
{"q": "베트남의 수도는?", "o": ["호찌민", "다낭", "하노이", "후에"], "a": 2, "e": "하노이 (호찌민이 최대 도시)"},
{"q": "칠레의 수도는?", "o": ["발파라이소", "산티아고", "콘셉시온", "안토파가스타"], "a": 1, "e": "산티아고"},
{"q": "모로코의 수도는?", "o": ["카사블랑카", "마라케시", "라바트", "페스"], "a": 2, "e": "라바트 (카사블랑카가 최대 도시)"},
{"q": "나이지리아의 수도는?", "o": ["라고스", "아부자", "이바단", "포트하커트"], "a": 1, "e": "아부자 (라고스가 최대 도시)"},
{"q": "필리핀의 수도는?", "o": ["세부", "다바오", "마닐라", "케손시티"], "a": 2, "e": "마닐라"},
{"q": "싱가포르의 수도는?", "o": ["없음(도시국가)", "주롱", "탐피니스", "우드랜즈"], "a": 0, "e": "싱가포르는 도시국가로 국가 전체가 하나의 도시입니다. 공식 수도는 싱가포르 시입니다."}]).slice(0,10);
let cur=0,score=0,answered=false,wrongArr=[];
let timerMode=false,timerSec=60,timerInterval=null;
var ALL_Q=Q.slice();
function showModeSelect(){
  var app=document.getElementById('app');
  var wrap=document.createElement('div');
  var h=document.createElement('h1');
  h.style.cssText='margin:0 0 8px';
  h.textContent='수도 맞추기';
  wrap.appendChild(h);
  var sub=document.createElement('p');
  sub.style.cssText='color:#aaa;font-size:14px;margin-bottom:4px';
  sub.textContent='모드를 선택하세요';
  wrap.appendChild(sub);
  var ms=document.createElement('div');ms.className='mode-select';
  var b1=document.createElement('button');b1.className='mode-btn';
  var b1t=document.createElement('div');b1t.className='mode-title';
  b1t.textContent='일반 모드';
  var b1d=document.createElement('div');b1d.className='mode-desc';
  b1d.textContent='10문제 · 오답 해설 · 등급(S~D)';
  b1.appendChild(b1t);b1.appendChild(b1d);
  b1.onclick=function(){timerMode=false;_shuf(Q);cur=0;score=0;wrongArr=[];render()};
  var b2=document.createElement('button');b2.className='mode-btn';
  var b2t=document.createElement('div');b2t.className='mode-title';
  b2t.textContent='⏱ 타이머 모드 (60초)';
  var b2d=document.createElement('div');b2d.className='mode-desc';
  b2d.textContent='전체 30문제 순차 출제 · 60초 제한 · 최대한 많이!';
  b2.appendChild(b2t);b2.appendChild(b2d);
  b2.onclick=function(){timerMode=true;cur=0;score=0;wrongArr=[];timerSec=60;startTimer();render()};
  ms.appendChild(b1);ms.appendChild(b2);
  wrap.appendChild(ms);
  app.textContent='';
  app.appendChild(wrap);
}
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerSec--;
    var fill=document.getElementById('tmr-fill');
    var txt=document.getElementById('tmr-txt');
    if(fill)fill.style.width=(timerSec/60*100)+'%';
    if(txt)txt.textContent=timerSec+'초';
    if(timerSec<=0){clearInterval(timerInterval);showResult()}
  },1000);
}
function showResult(){
  clearInterval(timerInterval);
  var app=document.getElementById('app');
  var g=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
  _hub('quiz_capitals',score*10);
  var frag=document.createDocumentFragment();
  var scoreEl=document.createElement('h1');
  scoreEl.style.cssText='margin:10px 0';
  scoreEl.textContent=score+'/'+(timerMode?ALL_Q.length:Q.length);
  frag.appendChild(scoreEl);
  if(!timerMode){
    var gradeEl=document.createElement('div');
    gradeEl.style.cssText='font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0';
    gradeEl.textContent=g;
    frag.appendChild(gradeEl);
  }else{
    var tLabel=document.createElement('p');
    tLabel.style.cssText='color:#FFD700;font-size:16px;font-weight:bold;margin:8px 0';
    tLabel.textContent='타이머 종료!';
    frag.appendChild(tLabel);
  }
  var msg=document.createElement('p');
  msg.style.color='#aaa';
  msg.textContent=score>=(timerMode?20:7)?'대단해요!':score>=(timerMode?10:5)?'잘했어요!':'다음엔 더!';
  frag.appendChild(msg);
  var shareText='수도 맞추기 '+score+'/'+(timerMode?ALL_Q.length:Q.length)+' 정답! hoit.me/quiz/capitals.html';
  var shareBtn=document.createElement('button');
  shareBtn.className='share-btn';
  shareBtn.textContent='결과 공유 (텍스트 복사)';
  (function(btn,txt){
    btn.onclick=function(){
      if(navigator.clipboard){
        navigator.clipboard.writeText(txt).then(function(){btn.textContent='복사됨!'}).catch(function(){fallbackCopy(btn,txt)});
      }else{fallbackCopy(btn,txt)}
    };
  })(shareBtn,shareText);
  frag.appendChild(shareBtn);
  if(wrongArr.length>0){
    var wl=document.createElement('div');wl.className='wrong-list';
    var wh=document.createElement('h3');
    wh.textContent='오답 복습 ('+wrongArr.length+'문제)';
    wl.appendChild(wh);
    wrongArr.forEach(function(w){
      var wi=document.createElement('div');wi.className='wrong-item';
      var wq=document.createElement('div');wq.className='wrong-q';wq.textContent=w.q;
      var wm=document.createElement('div');wm.className='wrong-my';
      wm.textContent='내 답: '+w.myAns;
      var wa=document.createElement('div');wa.className='wrong-ans';
      wa.textContent='정답: '+w.correct;
      wi.appendChild(wq);wi.appendChild(wm);wi.appendChild(wa);
      wl.appendChild(wi);
    });
    frag.appendChild(wl);
  }
  var retryBtn=document.createElement('button');
  retryBtn.className='btn';retryBtn.style.marginTop='14px';
  retryBtn.textContent='다시 하기';
  retryBtn.onclick=function(){showModeSelect()};
  frag.appendChild(retryBtn);
  app.textContent='';
  app.appendChild(frag);
}
function fallbackCopy(btn,txt){
  var ta=document.createElement('textarea');ta.value=txt;
  ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
  btn.textContent='복사됨!';
}
function render(){
  var app=document.getElementById('app');
  var qPool=timerMode?ALL_Q:Q;
  if(cur>=qPool.length||(timerMode&&timerSec<=0)){showResult();return}
  var q=qPool[cur],pct=(cur/qPool.length*100)|0;
  var frag=document.createDocumentFragment();
  if(timerMode){
    var tbar=document.createElement('div');tbar.className='timer-bar';
    var tf=document.createElement('div');tf.className='timer-fill';
    tf.id='tmr-fill';tf.style.width=(timerSec/60*100)+'%';
    tbar.appendChild(tf);frag.appendChild(tbar);
    var tt=document.createElement('div');tt.className='timer-text';
    tt.id='tmr-txt';tt.textContent=timerSec+'초';
    frag.appendChild(tt);
  }
  var prog=document.createElement('div');prog.className='progress';
  var pf=document.createElement('div');pf.className='progress-fill';
  pf.style.width=pct+'%';
  prog.appendChild(pf);frag.appendChild(prog);
  var card=document.createElement('div');card.className='q-card';
  var num=document.createElement('div');
  num.style.cssText='color:#888;font-size:13px;margin-bottom:8px';
  num.textContent=(cur+1)+'/'+qPool.length;
  card.appendChild(num);
  var qt=document.createElement('div');qt.className='q-text';qt.textContent=q.q;
  card.appendChild(qt);
  var opts=document.createElement('div');opts.className='opts';
  q.o.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='opt';d.id='opt'+i;d.textContent=o;
    (function(idx){d.onclick=function(){answer(idx)}})(i);
    opts.appendChild(d);
  });
  card.appendChild(opts);
  var exp=document.createElement('div');exp.className='explain';exp.id='explain';
  exp.textContent=q.e||'';
  card.appendChild(exp);
  frag.appendChild(card);
  app.textContent='';
  app.appendChild(frag);
  answered=false;
}
function answer(i){
  if(answered)return;answered=true;
  var qPool=timerMode?ALL_Q:Q;
  var q=qPool[cur];
  var optEl=document.getElementById('opt'+i);
  if(optEl)optEl.classList.add(i===q.a?'correct':'wrong');
  if(i!==q.a){
    var ca=document.getElementById('opt'+q.a);
    if(ca)ca.classList.add('correct');
    wrongArr.push({q:q.q,myAns:q.o[i],correct:q.o[q.a]});
  }
  if(i===q.a)score++;
  var el=document.getElementById('explain');
  if(el&&q.e)el.style.display='block';
  setTimeout(function(){cur++;render()},timerMode?800:1500);
}
showModeSelect();
