<script>const _FB="https://hoit-f1e53-default-rtdb.asia-southeast1.firebasedatabase.app";function _hub(id,s){const h=JSON.parse(localStorage.getItem('game_hub')||'{}');if(!h.scores)h.scores={};if(!h.scores[id]||s>h.scores[id])h.scores[id]=s;localStorage.setItem('game_hub',JSON.stringify(h));let nick=h.nick;if(!nick){const c=parseInt(localStorage.getItem('noname_counter')||'0')+1;localStorage.setItem('noname_counter',String(c));nick='nonamed'+String(c).padStart(4,'0');h.nick=nick;localStorage.setItem('game_hub',JSON.stringify(h));}const today=new Date().toISOString().slice(0,10);const data={nick:nick,score:s,date:today,ts:Date.now()};fetch(_FB+'/scores/'+today+'/'+id+'.json').then(r=>r.json()).then(d=>{const entries=d?Object.values(d):[];const ex=entries.find(e=>e.nick===nick);if(!ex||s>ex.score){fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)});}}).catch(()=>{fetch(_FB+'/scores/'+today+'/'+id+'.json',{method:'POST',body:JSON.stringify(data)}).catch(()=>{});});}</script>

const Q=_shuf([{"q": "훈민정음을 만든 왕은?", "o": ["태조", "세종", "정조", "고종"], "a": 1, "e": "세종대왕이 1443년 훈민정음을 창제했습니다."}, {"q": "거북선으로 유명한 장수는?", "o": ["이순신", "강감찬", "을지문덕", "권율"], "a": 0, "e": "이순신 장군은 임진왜란 때 거북선으로 일본 수군을 격파했습니다."}, {"q": "안중근 의사가 저격한 인물은?", "o": ["이토 히로부미", "도요토미", "메이지 천황", "데라우치"], "a": 0, "e": "1909년 하얼빈에서 이토 히로부미를 저격했습니다."}, {"q": "한글 소설 홍길동전의 저자는?", "o": ["허균", "김시습", "박지원", "정약용"], "a": 0, "e": "허균이 쓴 홍길동전은 최초의 한글 소설입니다."}, {"q": "고려를 건국한 인물은?", "o": ["왕건", "궁예", "견훤", "장보고"], "a": 0, "e": "왕건이 918년 고려를 건국했습니다."}, {"q": "목민심서를 쓴 인물은?", "o": ["이황", "이이", "정약용", "박지원"], "a": 2, "e": "정약용은 실학의 집대성자로 목민심서를 저술했습니다."}, {"q": "삼국통일을 이룬 나라는?", "o": ["고구려", "백제", "신라", "가야"], "a": 2, "e": "신라가 668년 삼국을 통일했습니다."}, {"q": "김구 선생의 저서는?", "o": ["백범일지", "독립신문", "해국도지", "목민심서"], "a": 0, "e": "백범일지는 김구 선생의 자서전입니다."}, {"q": "신사임당의 아들은?", "o": ["이황", "이이", "정약용", "김정희"], "a": 1, "e": "이이(율곡)는 신사임당의 아들입니다."}, {"q": "독립운동가 유관순이 참여한 운동은?", "o": ["동학운동", "3·1운동", "6·10만세", "광주학생운동"], "a": 1, "e": "유관순 열사는 3·1운동 당시 만세시위를 주도했습니다."}]);
let cur=0,score=0,answered=false;
function render(){const app=document.getElementById('app');
if(cur>=Q.length){const g=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
app.innerHTML='<h1 style="margin:10px 0">'+score+'/'+Q.length+'</h1><div style="font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0">'+g+'</div><p style="color:#aaa">'+(score>=7?'\uB300\uB2E8\uD574\uC694!':score>=5?'\uC798\uD588\uC5B4\uC694!':'\uB2E4\uC74C\uC5D4 \uB354!')+'</p><button class="btn" onclick="cur=0;score=0;_shuf(Q);render()">\uB2E4\uC2DC \uD558\uAE30</button>';_hub('quiz_person',score*10);return;}
const q=Q[cur],pct=(cur/Q.length*100)|0;
app.innerHTML='<div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="q-card"><div style="color:#888;font-size:13px;margin-bottom:8px">👤 '+(cur+1)+'/'+Q.length+'</div><div class="q-text">'+q.q+'</div><div class="opts">'+q.o.map((o,i)=>'<div class="opt" id="opt'+i+'" onclick="answer('+i+')">'+o+'</div>').join('')+'</div><div class="explain" id="explain">'+((q.e)||'')+'</div></div>';answered=false;}
function answer(i){if(answered)return;answered=true;const q=Q[cur];document.getElementById('opt'+i).classList.add(i===q.a?'correct':'wrong');if(i!==q.a)document.getElementById('opt'+q.a).classList.add('correct');if(i===q.a)score++;const el=document.getElementById('explain');if(q.e)el.style.display='block';setTimeout(()=>{cur++;render();},1500);}
render();
