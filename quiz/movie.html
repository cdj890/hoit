const Q=_shuf([{"q": "포레스트 검프의 유명 대사는?", "o": ["I'll be back", "Life is like a box of chocolates", "May the Force be with you", "Here's looking at you"], "a": 1, "e": "인생은 초콜릿 상자와 같다"}, {"q": "타이타닉의 감독은?", "o": ["스필버그", "놀란", "카메론", "스콜세지"], "a": 2, "e": "제임스 카메론"}, {"q": "MCU 첫 영화는?", "o": ["스파이더맨", "아이언맨", "캡틴 아메리카", "어벤져스"], "a": 1, "e": "2008년 아이언맨"}, {"q": "반지의 제왕 원작자는?", "o": ["C.S.루이스", "J.K.롤링", "톨킨", "조지 마틴"], "a": 2, "e": "J.R.R.톨킨"}, {"q": "스타워즈 유명 대사는?", "o": ["I see dead people", "May the Force be with you", "Here's Johnny", "Hasta la vista"], "a": 1, "e": "포스가 함께하길"}, {"q": "놀란의 시간 역행 영화는?", "o": ["인셉션", "인터스텔라", "테넷", "메멘토"], "a": 2, "e": "2020년 테넷"}, {"q": "센과 치히로의 감독은?", "o": ["신카이 마코토", "미야자키 하야오", "오시이 마모루", "호소다 마모루"], "a": 1, "e": "미야자키 하야오"}, {"q": "쇼생크 탈출 방법은?", "o": ["정문", "터널", "변장", "헬리콥터"], "a": 1, "e": "19년간 터널"}, {"q": "해리포터의 학교는?", "o": ["호그와트", "덤블도어", "그리핀도르", "슬리데린"], "a": 0, "e": "호그와트 마법학교"}, {"q": "아카데미 최다 수상 공동 기록은?", "o": ["8개", "9개", "11개", "13개"], "a": 2, "e": "타이타닉/벤허/반지의제왕3 각 11개"}]);

function render(){const app=document.getElementById('app');
if(cur>=Q.length){const g=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
