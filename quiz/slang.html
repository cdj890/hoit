  if(cur>=qPool.length||(timerMode&&timerSec<=0)){showResult();return;}
  var q=qPool[cur],pct=(cur/qPool.length*100)|0;
  var frag=document.createDocumentFragment();
  if(timerMode){
    var tbar=document.createElement('div');tbar.className='timer-bar';
    var tf=document.createElement('div');tf.className='timer-fill';
    tf.id='tmr-fill';tf.style.width=(timerSec/60*100)+'%';
    tbar.appendChild(tf);frag.appendChild(tbar);
    var tt=document.createElement('div');tt.className='timer-text';
    tt.id='tmr-txt';tt.textContent=timerSec+'초';
    frag.appendChild(tt);
  }
  var prog=document.createElement('div');prog.className='progress';
  var pf=document.createElement('div');pf.className='progress-fill';
  pf.style.width=pct+'%';
  prog.appendChild(pf);frag.appendChild(prog);
  var card=document.createElement('div');card.className='q-card';
  var num=document.createElement('div');
  num.style.cssText='color:#888;font-size:13px;margin-bottom:8px';
  num.textContent=(cur+1)+'/'+qPool.length;
  card.appendChild(num);
  var qt=document.createElement('div');qt.className='q-text';qt.textContent=q.q;
  card.appendChild(qt);
  var opts=document.createElement('div');opts.className='opts';
  q.o.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='opt';d.id='opt'+i;d.textContent=o;
    (function(idx){d.onclick=function(){answer(idx);};})(i);
    opts.appendChild(d);
  });
  card.appendChild(opts);
  var exp=document.createElement('div');exp.className='explain';exp.id='explain';
  exp.textContent=q.e||'';
  card.appendChild(exp);
  frag.appendChild(card);
  app.textContent='';
  app.appendChild(frag);
  answered=false;
}
function answer(i){
  if(answered)return;answered=true;
  var qPool=timerMode?ALL_Q:Q;
  var q=qPool[cur];
  var optEl=document.getElementById('opt'+i);
  if(optEl)optEl.classList.add(i===q.a?'correct':'wrong');
  if(i!==q.a){
    var ca=document.getElementById('opt'+q.a);
    if(ca)ca.classList.add('correct');
    wrongArr.push({q:q.q,myAns:q.o[i],correct:q.o[q.a]});
  }
  if(i===q.a)score++;
  var el=document.getElementById('explain');
  if(el&&q.e)el.style.display='block';
  setTimeout(function(){cur++;render();},timerMode?800:1500);
}
showModeSelect();
