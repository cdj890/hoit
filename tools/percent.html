*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center;flex-wrap:wrap}

h1{text-align:center;font-size:22px;margin-bottom:20px;color:#fff}

.tab{flex:1;padding:10px 6px;text-align:center;background:#1a1a2e;border:1px solid #333;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

input:focus{border-color:#6c5ce7}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

<div class="tabs">
<div class="tab active" onclick="setTab(0)">A의 B%</div>

</div>
<div class="panel active" id="p0">
<label>값 (A)</label><input type="number" id="a0">
<label>퍼센트 (B%)</label><input type="number" id="b0">
<button class="btn" onclick="calc0()">계산</button>
<div class="result" id="r0"></div>
</div>
<div class="panel" id="p1">
<label>값 (A)</label><input type="number" id="a1">
<label>기준값 (B)</label><input type="number" id="b1">
<button class="btn" onclick="calc1()">계산</button>
<div class="result" id="r1"></div>
</div>
<div class="panel" id="p2">
<label>원래 값 (A)</label><input type="number" id="a2">
<label>퍼센트 (B%)</label><input type="number" id="b2">
<div style="display:flex;gap:8px;margin-top:12px">
<button class="btn" style="flex:1" onclick="calc2(1)">증가</button>
<button class="btn" style="flex:1;background:#ff4757" onclick="calc2(-1)">감소</button>
</div>
<div class="result" id="r2"></div>
</div>

<script>
var percentHistory=JSON.parse(localStorage.getItem('hoit_hist_percent')||'[]');
function renderPercentHistory(){
  var existing=document.getElementById('percent-history');
  if(existing)existing.parentNode.removeChild(existing);
  if(percentHistory.length===0)return;
  var wrap=document.querySelector('.wrap');
  var box=document.createElement('div');
  box.id='percent-history';
  box.style.cssText='margin-top:16px;background:#1a1a2e;border-radius:12px;padding:16px';
  var title=document.createElement('p');
  title.style.cssText='color:#888;font-size:13px;margin-bottom:8px';
  title.textContent='최근 계산 기록';
  box.appendChild(title);
  var ul=document.createElement('ul');
  ul.style.cssText='list-style:none;padding:0;margin:0';
  percentHistory.slice().reverse().forEach(function(item){
    var li=document.createElement('li');
    li.style.cssText='padding:6px 0;border-bottom:1px solid #0f0f1e;font-size:13px;color:#ccc';
    li.textContent=item.time+' | '+item.expr+' = '+item.result;
    ul.appendChild(li);
  });
  box.appendChild(ul);
  var clearBtn=document.createElement('button');
  clearBtn.textContent='히스토리 지우기';
  clearBtn.style.cssText='margin-top:10px;padding:8px 16px;background:#333;color:#aaa;border:none;border-radius:8px;font-size:13px;cursor:pointer;width:100%';
  clearBtn.addEventListener('click',function(){
    percentHistory=[];
    localStorage.removeItem('hoit_hist_percent');
    renderPercentHistory();
  });
  box.appendChild(clearBtn);
  wrap.appendChild(box);
}
function pushPercentHistory(expr,result){
  var now=new Date();
  var ts=(now.getMonth()+1)+'/'+(now.getDate())+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  percentHistory.push({time:ts,expr:expr,result:result});
  if(percentHistory.length>5)percentHistory.shift();
  localStorage.setItem('hoit_hist_percent',JSON.stringify(percentHistory));
  renderPercentHistory();
}
function setTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===n));
}
function calc0(){
  const a=+document.getElementById('a0').value,b=+document.getElementById('b0').value,r=document.getElementById('r0');
  r.style.display='block';
  const v=(a*b/100).toLocaleString('ko-KR',{maximumFractionDigits:2});
  r.textContent=v;
  pushPercentHistory(a+'의 '+b+'%',v);
}
function calc1(){
  const a=+document.getElementById('a1').value,b=+document.getElementById('b1').value,r=document.getElementById('r1');
  r.style.display='block';
  const v=(a/b*100).toLocaleString('ko-KR',{maximumFractionDigits:2})+'%';
  r.textContent=v;
  pushPercentHistory(a+'는 '+b+'의 몇%',v);
}
function calc2(dir){
  const a=+document.getElementById('a2').value,b=+document.getElementById('b2').value,r=document.getElementById('r2');
  r.style.display='block';
  const val=a*(1+dir*b/100);
  const v=val.toLocaleString('ko-KR',{maximumFractionDigits:2});
  r.textContent=v;
  pushPercentHistory(a+(dir>0?' 증가 ':' 감소 ')+b+'%',v);
}
(function(){
  var KEY='hoit_tool_percent';
  var saved=JSON.parse(localStorage.getItem(KEY)||'{}');
  ['a0','b0','a1','b1','a2','b2'].forEach(function(id){var el=document.getElementById(id);if(el&&saved[id]!==undefined)el.value=saved[id];});
  document.querySelectorAll('input').forEach(function(el){
    if(!el.id)return;
    el.addEventListener('change',function(){
      var d=JSON.parse(localStorage.getItem(KEY)||'{}');
      d[el.id]=el.value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
  });
  renderPercentHistory();
  document.addEventListener('keydown',function(e){
    if(e.key!=='Enter'||!document.activeElement||!['INPUT','SELECT'].includes(document.activeElement.tagName))return;
    var activePanel=document.querySelector('.panel.active');
    if(!activePanel)return;
    var id=activePanel.id;
    if(id==='p0')calc0();
    else if(id==='p1')calc1();
    else if(id==='p2')calc2(1);
  });
})();
</script>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyActiveResult(){
    var panels=document.querySelectorAll('.panel.active');
    var text='';
    panels.forEach(function(p){
      var r=p.querySelector('.result');
      if(r&&window.getComputedStyle(r).display!=='none')text+=r.textContent.trim();
    });
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:none;margin:16px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;box-sizing:border-box;';
  btn.addEventListener('click',copyActiveResult);
  var wrap=document.querySelector('.wrap');
  if(wrap)wrap.appendChild(btn);
  function checkResult(){
    var panels=document.querySelectorAll('.panel.active');
    var hasContent=false;
    panels.forEach(function(p){
      var r=p.querySelector('.result');
      if(r&&window.getComputedStyle(r).display!=='none'&&r.textContent.trim())hasContent=true;
    });
    btn.style.display=hasContent?'block':'none';
  }
  var observer=new MutationObserver(checkResult);
  observer.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  checkResult();
})();
</script>
