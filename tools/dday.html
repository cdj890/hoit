<div class="wrap"><h1 style="font-size:24px;margin-bottom:5px">📅 D-Day 계산기</h1><p style="color:#888;font-size:14px;margin-bottom:15px">남은 날짜 카운트</p><div class="card"><input id="dd" type="date"><button class="btn" onclick="calc()">계산</button></div><div class="card" id="r" style="display:none"></div><script>
function calc(){
  var d=new Date(document.getElementById("dd").value);
  if(isNaN(d))return;
  var now=new Date();
  now.setHours(0,0,0,0);
  var diff=Math.ceil((d-now)/86400000);
  var rEl=document.getElementById("r");
  rEl.style.display="block";
  var rd=document.createElement('div');
  rd.className='result';
  rd.textContent=diff>0?"D-"+diff:diff===0?"D-Day!":"D+"+Math.abs(diff);
  while(rEl.firstChild)rEl.removeChild(rEl.firstChild);
  rEl.appendChild(rd);
}
(function(){
  var KEY='hoit_tool_dday';
  var saved=JSON.parse(localStorage.getItem(KEY)||'{}');
  ['dd'].forEach(function(id){var el=document.getElementById(id);if(el&&saved[id]!==undefined)el.value=saved[id];});
  document.querySelectorAll('input,select').forEach(function(el){
    if(!el.id)return;
    el.addEventListener('change',function(){
      var d=JSON.parse(localStorage.getItem(KEY)||'{}');
      d[el.id]=el.value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
  });
})();

<script>
(function(){
  var btn=null,toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyResult(){
    var el=document.getElementById('r');
    var text=el?el.textContent.trim():'';
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  function checkResult(){
    var el=document.getElementById('r');
    if(el&&window.getComputedStyle(el).display!=='none'&&el.textContent.trim()){
      if(!btn){
        btn=document.createElement('button');
        btn.textContent='복사';
        btn.setAttribute('aria-label','결과 복사');
        btn.style.cssText='display:block;margin:12px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;z-index:100;';
        btn.addEventListener('click',copyResult);
        var wrap=document.querySelector('.wrap')||document.body;
        wrap.appendChild(btn);
      }
      btn.style.display='block';
    }
  }
  var observer=new MutationObserver(checkResult);
  observer.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  checkResult();
})();
</script>
