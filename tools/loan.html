<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<title>대출 계산기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center}
.wrap{width:100%;max-width:500px;padding:60px 16px 30px}
h1{text-align:center;font-size:22px;margin-bottom:20px;color:#fff}
label{font-size:14px;color:#aaa;display:block;margin:12px 0 6px}
input[type=number]{width:100%;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:14px;font-size:16px;outline:none;-moz-appearance:textfield}
input:focus{border-color:#6c5ce7}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.type{display:flex;gap:8px;margin:12px 0}
.type button{flex:1;padding:12px;background:#1a1a2e;border:1px solid #333;color:#e0e0e0;border-radius:10px;font-size:14px;cursor:pointer;min-height:44px;touch-action:manipulation;font-weight:600}
.type button.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.btn{width:100%;padding:14px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation;margin-top:16px}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;display:none}
.sbox{background:#1a1a2e;border-radius:12px;padding:14px;text-align:center}
.sbox .v{font-size:18px;font-weight:bold;color:#6c5ce7;margin-bottom:4px}
.sbox .l{font-size:11px;color:#888}
.tbl{margin-top:16px;max-height:400px;overflow-y:auto;border-radius:12px;display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a2e;color:#888;padding:10px 6px;position:sticky;top:0;text-align:right}
td{padding:8px 6px;border-bottom:1px solid #1a1a2e;text-align:right}
th:first-child,td:first-child{text-align:center}
tr:nth-child(even){background:#0a0a16}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>대출 계산기</h1>
<label>원금 (만원)</label><input type="number" id="principal" placeholder="예: 10000">
<label>연 이율 (%)</label><input type="number" id="rate" step="0.1" placeholder="예: 3.5">
<label>대출 기간 (년)</label><input type="number" id="years" placeholder="예: 30">
<label>상환 방식</label>
<div class="type">
<button class="active" id="t0" onclick="setType(0)">원리금균등</button>
<button id="t1" onclick="setType(1)">원금균등</button>
</div>
<button class="btn" onclick="calc()">계산</button>
<div class="summary" id="sum">
<div class="sbox"><div class="v" id="monthly"></div><div class="l">월 상환액</div></div>
<div class="sbox"><div class="v" id="totalInt"></div><div class="l">총 이자</div></div>
<div class="sbox"><div class="v" id="totalPay"></div><div class="l">총 상환액</div></div>
</div>
<div class="tbl" id="tbl"></div>
</div>
<script>
let loanType=0;
function setType(t){loanType=t;document.getElementById('t0').classList.toggle('active',t===0);document.getElementById('t1').classList.toggle('active',t===1)}
function fmt(n){return Math.round(n).toLocaleString()}
function calc(){
  const P=parseFloat(document.getElementById('principal').value)*10000;
  const r=parseFloat(document.getElementById('rate').value)/100/12;
  const n=parseInt(document.getElementById('years').value)*12;
  if(!P||!r||!n)return;
  let rows=[],totalInt=0,balance=P;
  if(loanType===0){
    const mp=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
    for(let i=1;i<=n;i++){
      const interest=balance*r;
      const principal=mp-interest;
      totalInt+=interest;
      balance-=principal;
      rows.push([i,fmt(mp),fmt(principal),fmt(interest),fmt(Math.max(0,balance))]);
    }
    document.getElementById('monthly').textContent=fmt(mp)+'원';
  }else{
    const mp=P/n;
    for(let i=1;i<=n;i++){
      const interest=balance*r;
      const pay=mp+interest;
      totalInt+=interest;
      balance-=mp;
      rows.push([i,fmt(pay),fmt(mp),fmt(interest),fmt(Math.max(0,balance))]);
    }
    document.getElementById('monthly').textContent=fmt(rows[0][1].replace(/,/g,''))+'원';
  }
  document.getElementById('totalInt').textContent=fmt(totalInt)+'원';
  document.getElementById('totalPay').textContent=fmt(P+totalInt)+'원';
  document.getElementById('sum').style.display='grid';
  let html='<table><thead><tr><th>회차</th><th>상환액</th><th>원금</th><th>이자</th><th>잔액</th></tr></thead><tbody>';
  rows.forEach(r=>{html+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'});
  html+='</tbody></table>';
  document.getElementById('tbl').innerHTML=html;
  document.getElementById('tbl').style.display='block';
}
</script>
</body>
</html>
