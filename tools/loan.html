input[type=number]{width:100%;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:14px;font-size:16px;outline:none;-moz-appearance:textfield}

<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>대출 계산기</h1>
<label>원금 (만원)</label><input type="number" id="principal" placeholder="예: 10000">
<label>연 이율 (%)</label><input type="number" id="rate" step="0.1" placeholder="예: 3.5">
<label>대출 기간 (년)</label><input type="number" id="years" placeholder="예: 30">
<label>상환 방식</label>
<div class="type">
<button class="active" id="t0" onclick="setType(0)">원리금균등</button>
<button id="t1" onclick="setType(1)">원금균등</button>
</div>
<button class="btn" onclick="calc()">계산</button>
<div class="summary" id="sum">
<div class="sbox"><div class="v" id="monthly"></div><div class="l">월 상환액</div></div>
<div class="sbox"><div class="v" id="totalInt"></div><div class="l">총 이자</div></div>
<div class="sbox"><div class="v" id="totalPay"></div><div class="l">총 상환액</div></div>
</div>

<script>
var loanHistory=JSON.parse(localStorage.getItem('hoit_hist_loan')||'[]');
function renderLoanHistory(){
  var existing=document.getElementById('loan-history');
  if(existing)existing.parentNode.removeChild(existing);
  if(loanHistory.length===0)return;
  var wrap=document.querySelector('.wrap');
  var box=document.createElement('div');
  box.id='loan-history';
  box.style.cssText='margin-top:16px;background:#1a1a2e;border-radius:12px;padding:16px';
  var title=document.createElement('p');
  title.style.cssText='color:#888;font-size:13px;margin-bottom:8px';
  title.textContent='최근 계산 기록';
  box.appendChild(title);
  var ul=document.createElement('ul');
  ul.style.cssText='list-style:none;padding:0;margin:0';
  loanHistory.slice().reverse().forEach(function(item){
    var li=document.createElement('li');
    li.style.cssText='padding:6px 0;border-bottom:1px solid #0f0f1e;font-size:13px;color:#ccc';
    li.textContent=item.time+' | '+item.principal+'만원 '+item.rate+'% '+item.years+'년 ('+item.type+') → 월 '+item.monthly;
    ul.appendChild(li);
  });
  box.appendChild(ul);
  var clearBtn=document.createElement('button');
  clearBtn.textContent='히스토리 지우기';
  clearBtn.style.cssText='margin-top:10px;padding:8px 16px;background:#333;color:#aaa;border:none;border-radius:8px;font-size:13px;cursor:pointer;width:100%';
  clearBtn.addEventListener('click',function(){
    loanHistory=[];
    localStorage.removeItem('hoit_hist_loan');
    renderLoanHistory();
  });
  box.appendChild(clearBtn);
  wrap.appendChild(box);
}
let loanType=0;
function setType(t){loanType=t;document.getElementById('t0').classList.toggle('active',t===0);document.getElementById('t1').classList.toggle('active',t===1)}
function fmt(n){return Math.round(n).toLocaleString()}
function calc(){
  const P=parseFloat(document.getElementById('principal').value)*10000;
  const r=parseFloat(document.getElementById('rate').value)/100/12;
  const n=parseInt(document.getElementById('years').value)*12;
  if(!P||!r||!n)return;
  let rows=[],totalInt=0,balance=P;
  var monthlyAmt=0;
  if(loanType===0){
    const mp=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
    monthlyAmt=mp;
    for(let i=1;i<=n;i++){
      const interest=balance*r;
      const principal=mp-interest;
      totalInt+=interest;
      balance-=principal;
      rows.push([i,fmt(mp),fmt(principal),fmt(interest),fmt(Math.max(0,balance))]);
    }
    document.getElementById('monthly').textContent=fmt(mp)+'원';
  }else{
    const mp=P/n;
    for(let i=1;i<=n;i++){
      const interest=balance*r;
      const pay=mp+interest;
      totalInt+=interest;
      balance-=mp;
      rows.push([i,fmt(pay),fmt(mp),fmt(interest),fmt(Math.max(0,balance))]);
    }
    monthlyAmt=rows[0]?parseFloat(rows[0][1].replace(/,/g,'')):0;
    document.getElementById('monthly').textContent=fmt(monthlyAmt)+'원';
  }
  document.getElementById('totalInt').textContent=fmt(totalInt)+'원';
  document.getElementById('totalPay').textContent=fmt(P+totalInt)+'원';
  document.getElementById('sum').style.display='grid';
  var tbl=document.getElementById('tbl');
  tbl.style.display='block';
  var table=document.createElement('table');
  var thead=document.createElement('thead');
  var headerRow=document.createElement('tr');
  ['회차','상환액','원금','이자','잔액'].forEach(function(h){var th=document.createElement('th');th.textContent=h;headerRow.appendChild(th)});
  thead.appendChild(headerRow);
  table.appendChild(thead);
  var tbody=document.createElement('tbody');
  rows.forEach(function(row){
    var tr=document.createElement('tr');
    row.forEach(function(cell){var td=document.createElement('td');td.textContent=cell;tr.appendChild(td)});
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  while(tbl.firstChild)tbl.removeChild(tbl.firstChild);
  tbl.appendChild(table);
  var now=new Date();
  var ts=(now.getMonth()+1)+'/'+(now.getDate())+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  var principal=document.getElementById('principal').value;
  var rate=document.getElementById('rate').value;
  var years=document.getElementById('years').value;
  loanHistory.push({time:ts,principal:principal,rate:rate,years:years,type:loanType===0?'원리금균등':'원금균등',monthly:fmt(monthlyAmt)+'원'});
  if(loanHistory.length>5)loanHistory.shift();
  localStorage.setItem('hoit_hist_loan',JSON.stringify(loanHistory));
  renderLoanHistory();
}
(function(){
  var KEY='hoit_tool_loan';
  var saved=JSON.parse(localStorage.getItem(KEY)||'{}');
  ['principal','rate','years'].forEach(function(id){var el=document.getElementById(id);if(el&&saved[id]!==undefined)el.value=saved[id]});
  document.querySelectorAll('input').forEach(function(el){
    if(!el.id)return;
    el.addEventListener('change',function(){
      var d=JSON.parse(localStorage.getItem(KEY)||'{}');
      d[el.id]=el.value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
  });
  renderLoanHistory();
  document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&['INPUT','SELECT'].includes(document.activeElement.tagName))calc()});
})();
</script>

<script>
(function(){
  var btn=null,toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast)}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0'},2000);
  }
  function copyResult(){
    var monthly=document.getElementById('monthly');
    var totalInt=document.getElementById('totalInt');
    var totalPay=document.getElementById('totalPay');
    var text='';
    if(monthly)text+='월 상환액: '+monthly.textContent.trim()+'\n';
    if(totalInt)text+='총 이자: '+totalInt.textContent.trim()+'\n';
    if(totalPay)text+='총 상환액: '+totalPay.textContent.trim();
    text=text.trim();
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast)}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast()}
  }
  function checkResult(){
    var sum=document.getElementById('sum');
    if(sum&&window.getComputedStyle(sum).display!=='none'){
      if(!btn){
        btn=document.createElement('button');
        btn.textContent='복사';
        btn.setAttribute('aria-label','결과 복사');
        btn.style.cssText='display:block;margin:12px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;box-sizing:border-box;';
        btn.addEventListener('click',copyResult);
        var wrap=document.querySelector('.wrap');
        if(wrap)wrap.appendChild(btn);
      }
      btn.style.display='block';
    }
  }
  var observer=new MutationObserver(checkResult);
  observer.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  checkResult();
})();
</script>
