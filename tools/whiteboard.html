<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.toolbar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;padding:10px 12px;display:flex;align-items:center;gap:8px;z-index:100;flex-wrap:wrap;justify-content:center;border-top:1px solid #333}
canvas{background:#fff;display:block;touch-action:none;margin-top:50px}
.toolbar input[type=color]{width:40px;height:40px;border:none;border-radius:10px;cursor:pointer;padding:0;background:none}
.toolbar input[type=color]::-webkit-color-swatch-wrapper{padding:2px}
.toolbar input[type=color]::-webkit-color-swatch{border-radius:8px;border:none}
.toolbar input[type=range]{width:80px;height:6px;-webkit-appearance:none;background:#333;border-radius:3px}
.toolbar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#6c5ce7;cursor:pointer}
.tbtn{padding:8px 14px;background:#333;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;min-height:40px;touch-action:manipulation;font-weight:600}
.tbtn.active{background:#6c5ce7}
.tbtn:active{opacity:0.8}
.sz{font-size:12px;color:#888;min-width:24px;text-align:center}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<canvas id="c"></canvas>
<div class="toolbar">
<input type="color" id="color" value="#000000">
<span class="sz" id="sv">3</span>
<input type="range" id="size" min="1" max="30" value="3">
<button class="tbtn active" id="penBtn" onclick="setTool('pen')">펜</button>
<button class="tbtn" id="eraserBtn" onclick="setTool('eraser')">지우개</button>
<button class="tbtn" onclick="clearAll()">전체 지우기</button>
<button class="tbtn" onclick="saveImg()">저장</button>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let tool='pen',drawing=false,lastX=0,lastY=0;
function resize(){
  const w=Math.min(window.innerWidth,500);
  const h=window.innerHeight-110;
  canvas.width=w;canvas.height=h;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
}
resize();
window.addEventListener('resize',resize);
document.getElementById('size').addEventListener('input',e=>document.getElementById('sv').textContent=e.target.value);
function setTool(t){
  tool=t;
  document.getElementById('penBtn').classList.toggle('active',t==='pen');
  document.getElementById('eraserBtn').classList.toggle('active',t==='eraser');
}
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return[t.clientX-r.left,t.clientY-r.top];
}
function start(e){e.preventDefault();drawing=true;[lastX,lastY]=getPos(e)}
function draw(e){
  e.preventDefault();if(!drawing)return;
  const[x,y]=getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(x,y);
  ctx.strokeStyle=tool==='eraser'?'#fff':document.getElementById('color').value;
  ctx.lineWidth=document.getElementById('size').value*(tool==='eraser'?3:1);
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();
  lastX=x;lastY=y;
}
function end(){drawing=false}
canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',draw,{passive:false});canvas.addEventListener('touchend',end);
function clearAll(){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height)}
function saveImg(){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='whiteboard.png';a.click();
}
</script>

</html>
