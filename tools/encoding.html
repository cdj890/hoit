<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🔤 인코딩 도구</h1>
<div class="card"><p style="color:#aaa;font-size:13px;margin-bottom:8px">입력</p><textarea id="input" placeholder="텍스트를 입력하세요">안녕하세요 Hello!</textarea>
<div class="btns">
<button class="btn" onclick="doEnc('b64e')">Base64 인코딩</button><button class="btn red" onclick="doEnc('b64d')">Base64 디코딩</button>
<button class="btn" onclick="doEnc('urle')">URL 인코딩</button><button class="btn red" onclick="doEnc('urld')">URL 디코딩</button>
<button class="btn" onclick="doEnc('htmle')">HTML 이스케이프</button></div>
<p style="color:#aaa;font-size:13px;margin-top:12px">결과</p><textarea id="output" readonly></textarea>
<button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('output').value)" style="width:100%;margin-top:6px">📋 복사</button>
</div></div>
<script>function doEnc(t){const v=document.getElementById('input').value;let r='';try{
if(t==='b64e')r=btoa(unescape(encodeURIComponent(v)));
else if(t==='b64d')r=decodeURIComponent(escape(atob(v)));
else if(t==='urle')r=encodeURIComponent(v);
else if(t==='urld')r=decodeURIComponent(v);
else if(t==='htmle')r=v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}catch(e){r='변환 오류: '+e.message;}document.getElementById('output').value=r;}</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
