<script>function doEnc(t){const v=document.getElementById('input').value;let r='';try{
if(t==='b64e')r=btoa(unescape(encodeURIComponent(v)));
else if(t==='b64d')r=decodeURIComponent(escape(atob(v)));
else if(t==='urle')r=encodeURIComponent(v);
else if(t==='urld')r=decodeURIComponent(v);
else if(t==='htmle')r=v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}catch(e){r='변환 오류: '+e.message;}document.getElementById('output').value=r;}</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
