<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:450px;margin:0 auto;padding:50px 16px 30px;text-align:center}.colors{display:flex;flex-direction:column;gap:8px;margin:15px 0}.color{height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:16px;font-weight:bold;cursor:pointer;transition:transform .2s}.color:hover{transform:scale(1.03)}.color:active{transform:scale(.97)}.btn{background:#7B68EE;border:none;color:#fff;padding:12px 24px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;width:100%;margin:8px 0}body{overflow-x:hidden}.wrap,.container{max-width:100%;padding-left:12px;padding-right:12px}canvas{max-width:100%!important;height:auto!important}input,select,textarea,button{max-width:100%;font-size:16px!important}@media(max-width:600px){h1{font-size:22px!important}h2{font-size:18px!important}h3{font-size:15px!important}.wrap,.container{padding-left:10px;padding-right:10px;padding-top:45px}.card{padding:14px;margin:8px 0}.q-card{padding:16px}.q-text{font-size:15px!important}.opt{padding:12px;font-size:14px!important;min-height:44px}.btn{min-height:44px;font-size:15px!important}pre,code{font-size:11px!important;overflow-x:auto;word-break:break-all}.result{font-size:24px!important}.controls{flex-wrap:wrap}.controls button,.controls input{min-height:40px}.flow{flex-direction:column}.box{min-width:auto;width:100%}.arr{transform:rotate(90deg)}.grid{gap:4px}.cell{font-size:16px!important}}</style></head><body>

<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🎨 색상 팔레트</h1><p style="color:#888;font-size:13px;margin-bottom:5px">클릭하면 HEX 코드가 복사됩니다</p>
<div class="colors" id="colors"></div><button class="btn" onclick="gen()">🎨 새 팔레트</button></div>
<script>
function hsl2hex(h,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};return'#'+f(0)+f(8)+f(4);}
function gen(){const base=Math.random()*360;const colors=[];for(let i=0;i<5;i++){const h=(base+i*30+Math.random()*20)%360;const s=50+Math.random()*30;const l=40+Math.random()*30;colors.push(hsl2hex(h,s,l));}
document.getElementById('colors').innerHTML=colors.map(c=>{const lum=parseInt(c.substr(1,2),16)*0.299+parseInt(c.substr(3,2),16)*0.587+parseInt(c.substr(5,2),16)*0.114;
return`<div class="color" style="background:${c};color:${lum>128?'#000':'#fff'}" onclick="navigator.clipboard.writeText('${c}');this.textContent='복사됨!';setTimeout(()=>this.textContent='${c}',1000)">${c}</div>`;}).join('');}
gen();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
