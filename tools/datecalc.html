*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center;flex-wrap:wrap}

h1{text-align:center;font-size:22px;margin-bottom:20px;color:#fff}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;background:#1a1a2e;border:1px solid #333;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

.result .big{font-size:32px;font-weight:bold;color:#6c5ce7;text-align:center;margin-bottom:12px}
.result .detail{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.result .item{text-align:center;padding:10px;background:#0f0f1e;border-radius:8px}

.dir button.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
</style>

<h1>날짜 계산기</h1>
<div class="tabs">
<div class="tab active" onclick="setTab(0)">두 날짜 사이</div>
<div class="tab" onclick="setTab(1)">날짜 더하기/빼기</div>
</div>
<div class="panel active" id="p0">
<label>시작일</label><input type="date" id="d1">
<label>종료일</label><input type="date" id="d2">
<button class="btn" onclick="calcDiff()">계산</button>
<div class="result" id="r0">
<div class="big" id="diffDays"></div>
<div class="detail">
<div class="item"><div class="v" id="diffY"></div><div class="l">년</div></div>
<div class="item"><div class="v" id="diffM"></div><div class="l">개월</div></div>
<div class="item"><div class="v" id="diffH"></div><div class="l">시간</div></div>
<div class="item"><div class="v" id="diffMin"></div><div class="l">분</div></div>
</div>
</div>
</div>
<div class="panel" id="p1">
<label>기준일</label><input type="date" id="d3">
<label>일수</label><input type="number" id="ndays" placeholder="숫자 입력">
<div class="dir">
<button class="active" id="btnAfter" onclick="setDir(1)">이후</button>
<button id="btnBefore" onclick="setDir(-1)">이전</button>
</div>
<button class="btn" onclick="calcAdd()">계산</button>
<div class="result" id="r1"><div class="big" id="addResult"></div></div>
</div>
</div>
<script>
let dir=1;
const today=new Date().toISOString().split('T')[0];
(function(){
  var KEY='hoit_tool_datecalc';
  var saved=JSON.parse(localStorage.getItem(KEY)||'{}');
  document.getElementById('d1').value=saved.d1||today;
  document.getElementById('d2').value=saved.d2||today;
  document.getElementById('d3').value=saved.d3||today;
  if(saved.ndays!==undefined)document.getElementById('ndays').value=saved.ndays;
  document.querySelectorAll('input').forEach(function(el){
    if(!el.id)return;
    el.addEventListener('change',function(){
      var d=JSON.parse(localStorage.getItem(KEY)||'{}');
      d[el.id]=el.value;
      localStorage.setItem(KEY,JSON.stringify(d));
    });
  });
})();
function setTab(n){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===n))}
function setDir(d){dir=d;document.getElementById('btnAfter').classList.toggle('active',d===1);document.getElementById('btnBefore').classList.toggle('active',d===-1)}
function calcDiff(){
  const a=new Date(document.getElementById('d1').value),b=new Date(document.getElementById('d2').value);
  const ms=Math.abs(b-a),days=Math.round(ms/864e5);
  document.getElementById('r0').style.display='block';
  document.getElementById('diffDays').textContent=days.toLocaleString()+'일';
  document.getElementById('diffY').textContent=(days/365.25).toFixed(1);
  document.getElementById('diffM').textContent=(days/30.44).toFixed(1);
  document.getElementById('diffH').textContent=(days*24).toLocaleString();
  document.getElementById('diffMin').textContent=(days*1440).toLocaleString();
}
function calcAdd(){
  const d=new Date(document.getElementById('d3').value);
  const n=parseInt(document.getElementById('ndays').value)||0;
  d.setDate(d.getDate()+n*dir);
  document.getElementById('r1').style.display='block';
  const dow=['일','월','화','수','목','금','토'][d.getDay()];
  document.getElementById('addResult').textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+dow+')';
}
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter'||!document.activeElement||!['INPUT','SELECT'].includes(document.activeElement.tagName))return;
  var activePanel=document.querySelector('.panel.active');
  if(activePanel&&activePanel.id==='p0')calcDiff();
  else if(activePanel&&activePanel.id==='p1')calcAdd();
});
</script>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyActiveResult(){
    var panels=document.querySelectorAll('.panel.active');
    var text='';
    panels.forEach(function(p){
      var r=p.querySelector('.result');
      if(r&&window.getComputedStyle(r).display!=='none')text+=r.textContent.trim()+'\n';
    });
    text=text.trim();
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:none;margin:16px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;box-sizing:border-box;';
  btn.addEventListener('click',copyActiveResult);
  var wrap=document.querySelector('.wrap');
  if(wrap)wrap.appendChild(btn);
  function checkResult(){
    var panels=document.querySelectorAll('.panel.active');
    var hasContent=false;
    panels.forEach(function(p){
      var r=p.querySelector('.result');
      if(r&&window.getComputedStyle(r).display!=='none'&&r.textContent.trim())hasContent=true;
    });
    btn.style.display=hasContent?'block':'none';
  }
  var observer=new MutationObserver(checkResult);
  observer.observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
  checkResult();
})();
</script>
