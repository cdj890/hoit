<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>한글 Lorem</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:500px;margin:0 auto;padding:50px 16px 30px;text-align:center}.card{background:#1a1a2e;border-radius:16px;padding:20px;margin:10px 0;border:1px solid #2a2a4a;text-align:left}select{background:#252545;border:2px solid #333;color:#fff;padding:10px;border-radius:10px;font-size:16px;width:100%}.btn{background:#7B68EE;border:none;color:#fff;padding:12px 24px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;width:100%;margin:8px 0}#output{color:#ccc;font-size:14px;line-height:1.8}</style></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center">← 뒤로</a>
<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">📝 한글 Lorem Ipsum</h1>
<select id="cnt"><option value="1">1 문단</option><option value="2">2 문단</option><option value="3" selected>3 문단</option><option value="5">5 문단</option></select>
<button class="btn" onclick="gen()">생성</button><button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('output').textContent)" style="background:#4CAF50">📋 복사</button>
<div class="card" id="output"></div></div>
<script>
const S=["다람쥐 헌 쳇바퀴에 타고파.","정의로운 사회를 위해 노력하는 시민들의 모습이 아름답다.","가을 하늘은 높고 푸르며 단풍이 물드는 산은 장관이다.","서울의 밤거리는 네온사인으로 반짝이며 활기가 넘친다.","맛있는 음식을 먹으며 가족과 함께하는 시간은 소중하다.","프로그래밍은 논리적 사고와 창의력을 기르는 좋은 방법이다.","한글은 세종대왕이 만든 과학적이고 아름다운 문자이다.","봄이 오면 꽃이 피고 새들이 노래하며 세상이 밝아진다.","커피 한 잔의 여유가 바쁜 일상에 작은 행복을 가져다준다.","인공지능 기술의 발전은 우리 생활을 크게 변화시키고 있다.","독서는 마음의 양식이며 지식의 보고이다.","운동은 건강한 몸과 건강한 마음을 만들어준다.","음악은 국경을 초월하는 세계 공통의 언어이다.","여행은 새로운 세계를 경험하고 자신을 발견하는 과정이다.","좋은 친구는 인생에서 가장 큰 선물 중 하나이다."];
function gen(){const n=+document.getElementById('cnt').value;let html='';for(let i=0;i<n;i++){let p='';const len=4+Math.floor(Math.random()*4);for(let j=0;j<len;j++)p+=S[Math.random()*S.length|0]+' ';html+=`<p style="margin-bottom:12px">${p.trim()}</p>`;}document.getElementById('output').innerHTML=html;}
gen();
</script></body></html>
