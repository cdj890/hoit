*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center;flex-wrap:wrap;align-content:center}

.pct{text-align:center;font-size:13px;color:#888;margin-bottom:16px}
.add-row{display:flex;gap:8px;margin-bottom:12px}
.add-row input{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:12px;font-size:16px;outline:none}
.add-row input:focus{border-color:#6c5ce7}
.add-row select{background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:12px;font-size:14px;outline:none}
.add-row button{padding:12px 18px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.flt{padding:8px 14px;background:#1a1a2e;border:1px solid #333;border-radius:20px;font-size:13px;cursor:pointer;touch-action:manipulation}
.flt.active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.list{list-style:none}
.todo{display:flex;align-items:center;gap:10px;background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:8px}
.todo.done{opacity:0.5}
.todo .check{width:24px;height:24px;border:2px solid #6c5ce7;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.todo.done .check{background:#6c5ce7}
.todo.done .check::after{content:'✓';color:#fff;font-size:14px;font-weight:bold}
.todo .text{flex:1;font-size:15px}
.todo.done .text{text-decoration:line-through}
.todo .cat{font-size:11px;padding:3px 8px;border-radius:10px;flex-shrink:0}
.cat-업무{background:#6c5ce740;color:#a29bfe}
.cat-개인{background:#00cec940;color:#00cec9}
.cat-기타{background:#fdcb6e40;color:#fdcb6e}
.todo .del{color:#ff4757;cursor:pointer;font-size:18px;padding:4px 8px;touch-action:manipulation;flex-shrink:0}
.empty{text-align:center;color:#555;padding:40px;font-size:15px}

<div class="wrap">
<h1>할일 목록</h1>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div class="pct" id="pct">0% 완료</div>
<div class="add-row">
<input type="text" id="inp" placeholder="할일 추가..." onkeydown="if(event.key==='Enter')add()">
<select id="cat"><option>업무</option><option>개인</option><option>기타</option></select>
<button onclick="add()">추가</button>
</div>
<div class="filters">
<div class="flt active" onclick="setFilter('전체')">전체</div>
<div class="flt" onclick="setFilter('업무')">업무</div>
<div class="flt" onclick="setFilter('개인')">개인</div>
<div class="flt" onclick="setFilter('기타')">기타</div>
</div>
<ul class="list" id="list"></ul>
</div>
<script>
let todos=JSON.parse(localStorage.getItem('hoit-todos')||'[]');
let filter='전체';
function save(){localStorage.setItem('hoit-todos',JSON.stringify(todos))}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.flt').forEach(el=>el.classList.toggle('active',el.textContent===f));
  render();
}
function add(){
  const inp=document.getElementById('inp'),v=inp.value.trim();
  if(!v)return;
  todos.unshift({id:Date.now(),text:v,cat:document.getElementById('cat').value,done:false});
  inp.value='';save();render();
}
function toggle(id){
  const t=todos.find(t=>t.id===id);if(t)t.done=!t.done;save();render();
}
function del(id){todos=todos.filter(t=>t.id!==id);save();render()}
function render(){
  const filtered=filter==='전체'?todos:todos.filter(t=>t.cat===filter);
  const list=document.getElementById('list');
  if(filtered.length===0){list.innerHTML='<div class="empty">할일이 없습니다</div>';
  }else{
    list.innerHTML=filtered.map(t=>`<li class="todo${t.done?' done':''}">
      <div class="check" onclick="toggle(${t.id})"></div>
      <div class="text">${t.text}</div>
      <span class="cat cat-${t.cat}">${t.cat}</span>
      <span class="del" onclick="del(${t.id})">x</span>
    </li>`).join('');
  }
  const total=todos.length,done=todos.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('bar').style.width=pct+'%';
  document.getElementById('pct').textContent=pct+'% 완료 ('+done+'/'+total+')';
}
render();
</script>
