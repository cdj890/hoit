<div class="upload" onclick="document.getElementById('file').click()">
<p>이미지를 선택하세요</p>
</div>
<input type="file" id="file" accept="image/*">
<div class="preview" id="prev"><img id="img"><div class="info" id="origInfo"></div></div>
<label>크기 조절</label>
<div class="sizes">
<input type="number" id="w" placeholder="폭">
<span>x</span>
<input type="number" id="h" placeholder="높이">
</div>
<div class="lock"><input type="checkbox" id="ratio" checked><label for="ratio">비율 유지</label></div>
<button class="btn" id="dl" disabled onclick="download()">리사이즈 & 다운로드</button>
</div>
<script>
let origW=0,origH=0,imgSrc=null,aspect=1;
const fileEl=document.getElementById('file'),wEl=document.getElementById('w'),hEl=document.getElementById('h');
fileEl.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origW=img.width;origH=img.height;aspect=origW/origH;
      document.getElementById('img').src=ev.target.result;
      document.getElementById('prev').style.display='block';
      document.getElementById('origInfo').textContent=`원본: ${origW} x ${origH}`;
      wEl.value=origW;hEl.value=origH;
      imgSrc=ev.target.result;
      document.getElementById('dl').disabled=false;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(f);
});
wEl.addEventListener('input',()=>{if(document.getElementById('ratio').checked&&wEl.value){hEl.value=Math.round(wEl.value/aspect)}});
hEl.addEventListener('input',()=>{if(document.getElementById('ratio').checked&&hEl.value){wEl.value=Math.round(hEl.value*aspect)}});
function download(){
  if(!imgSrc)return;
  const c=document.createElement('canvas');
  c.width=parseInt(wEl.value);c.height=parseInt(hEl.value);
  const ctx=c.getContext('2d');
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0,c.width,c.height);
    const a=document.createElement('a');
    a.href=c.toDataURL('image/png');
    a.download='resized_'+c.width+'x'+c.height+'.png';
    a.click();
  };
  img.src=imgSrc;
}
</script>
