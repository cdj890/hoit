<div class="tabs" id="tabs"></div>
<div class="card"><input id="v" type="number" value="1" oninput="calc()"><select id="f" onchange="calc()"></select><div class="result" id="r"></div><select id="t" onchange="calc()"></select></div></div>
<script>
const U=[[{n:'mm',f:.001},{n:'cm',f:.01},{n:'m',f:1},{n:'km',f:1000},{n:'인치',f:.0254},{n:'피트',f:.3048},{n:'마일',f:1609.34}],
[{n:'mg',f:.001},{n:'g',f:1},{n:'kg',f:1000},{n:'톤',f:1e6},{n:'온스',f:28.35},{n:'파운드',f:453.6}],
[{n:'°C',f:'C'},{n:'°F',f:'F'},{n:'K',f:'K'}],
[{n:'m²',f:1},{n:'km²',f:1e6},{n:'평',f:3.306},{n:'에이커',f:4046.86},{n:'헥타르',f:1e4}]];
const TN=['길이','무게','온도','넓이'];
var _unitSaved=JSON.parse(localStorage.getItem('hoit_tool_unit')||'{}');
let tab=_unitSaved.tab||0;
function saveUnit(){
  var d={tab:tab,v:document.getElementById('v').value,f:document.getElementById('f').value,t:document.getElementById('t').value};
  localStorage.setItem('hoit_tool_unit',JSON.stringify(d));
}
function init(restoreSelects){
  var tabsEl=document.getElementById('tabs');
  while(tabsEl.firstChild)tabsEl.removeChild(tabsEl.firstChild);
  TN.forEach(function(n,i){
    var div=document.createElement('div');
    div.className='tab'+(i===tab?' on':'');
    div.textContent=n;
    div.addEventListener('click',function(){tab=i;init(false);});
    tabsEl.appendChild(div);
  });
  var u=U[tab],fEl=document.getElementById('f'),tEl=document.getElementById('t');
  while(fEl.firstChild)fEl.removeChild(fEl.firstChild);
  while(tEl.firstChild)tEl.removeChild(tEl.firstChild);
  u.forEach(function(x,i){
    var of=document.createElement('option');of.value=i;of.textContent=x.n;fEl.appendChild(of);
    var ot=document.createElement('option');ot.value=i;ot.textContent=x.n;tEl.appendChild(ot);
  });
  if(restoreSelects&&_unitSaved.f!==undefined)fEl.value=_unitSaved.f;
  if(restoreSelects&&_unitSaved.t!==undefined)tEl.value=_unitSaved.t;
  else tEl.value=1;
  calc();
}
function calc(){
  var v=+document.getElementById('v').value,fi=+document.getElementById('f').value,ti=+document.getElementById('t').value,u=U[tab];
  var r;
  if(tab===2){var c;var ff=u[fi].f;if(ff==='C')c=v;else if(ff==='F')c=(v-32)*5/9;else c=v-273.15;var tf=u[ti].f;if(tf==='C')r=c;else if(tf==='F')r=c*9/5+32;else r=c+273.15;}
  else r=v*u[fi].f/u[ti].f;
  document.getElementById('r').textContent=parseFloat(r.toPrecision(8));
  saveUnit();
}
document.getElementById('v').addEventListener('input',function(){saveUnit();});
document.getElementById('f').addEventListener('change',function(){saveUnit();});
document.getElementById('t').addEventListener('change',function(){saveUnit();});
if(_unitSaved.v!==undefined)document.getElementById('v').value=_unitSaved.v;
init(true);
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>

<h2>단위 변환기</h2>
<p>길이, 무게, 부피, 온도 등 다양한 단위를 변환하는 도구입니다. cm↔inch, kg↔lb, °C↔°F 등 일상에서 자주 필요한 단위 변환을 지원합니다.</p>

<h3>사용 방법</h3>
<p>변환할 단위 종류를 선택하고 수치를 입력하면 자동으로 변환 결과가 표시됩니다.</p>

<h3>팁</h3>
<p>여행이나 요리 시 자주 사용되는 단위를 빠르게 변환할 수 있습니다.</p>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyResult(){
    var el=document.getElementById('r');
    var text=el?el.textContent.trim():'';
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:block;margin:12px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;z-index:100;';
  btn.addEventListener('click',copyResult);
  var wrap=document.querySelector('.wrap')||document.querySelector('.card')||document.body;
  wrap.appendChild(btn);
})();
</script>
