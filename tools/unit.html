<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>단위 변환기</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:450px;margin:0 auto;padding:50px 16px 30px;text-align:center}.tabs{display:flex;gap:4px;margin-bottom:12px;justify-content:center}.tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;background:#1a1a2e;border:1px solid #333}.tab.on{background:#7B68EE;border-color:#7B68EE}.card{background:#1a1a2e;border-radius:16px;padding:20px;margin:10px 0;border:1px solid #2a2a4a}input,select{background:#252545;border:2px solid #333;color:#fff;padding:10px;border-radius:10px;font-size:16px;width:100%;margin:4px 0}input:focus,select:focus{border-color:#7B68EE;outline:none}.result{font-size:26px;font-weight:bold;color:#FFD700;margin:12px 0}</style></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center">← 뒤로</a>
<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">📐 단위 변환기</h1>
<div class="tabs" id="tabs"></div>
<div class="card"><input id="v" type="number" value="1" oninput="calc()"><select id="f" onchange="calc()"></select><div class="result" id="r"></div><select id="t" onchange="calc()"></select></div></div>
<script>
const U=[[{n:'mm',f:.001},{n:'cm',f:.01},{n:'m',f:1},{n:'km',f:1000},{n:'인치',f:.0254},{n:'피트',f:.3048},{n:'마일',f:1609.34}],
[{n:'mg',f:.001},{n:'g',f:1},{n:'kg',f:1000},{n:'톤',f:1e6},{n:'온스',f:28.35},{n:'파운드',f:453.6}],
[{n:'°C',f:'C'},{n:'°F',f:'F'},{n:'K',f:'K'}],
[{n:'m²',f:1},{n:'km²',f:1e6},{n:'평',f:3.306},{n:'에이커',f:4046.86},{n:'헥타르',f:1e4}]];
const TN=['길이','무게','온도','넓이'];let tab=0;
function init(){document.getElementById('tabs').innerHTML=TN.map((n,i)=>`<div class="tab${i===tab?' on':''}" onclick="tab=${i};init()">${n}</div>`).join('');
const u=U[tab],f=document.getElementById('f'),t=document.getElementById('t');
f.innerHTML=u.map((x,i)=>`<option value=${i}>${x.n}</option>`).join('');
t.innerHTML=u.map((x,i)=>`<option value=${i}${i===1?' selected':''}>${x.n}</option>`).join('');calc();}
function calc(){const v=+document.getElementById('v').value,fi=+document.getElementById('f').value,ti=+document.getElementById('t').value,u=U[tab];let r;
if(tab===2){let c;const ff=u[fi].f;if(ff==='C')c=v;else if(ff==='F')c=(v-32)*5/9;else c=v-273.15;const tf=u[ti].f;if(tf==='C')r=c;else if(tf==='F')r=c*9/5+32;else r=c+273.15;}
else r=v*u[fi].f/u[ti].f;document.getElementById('r').textContent=parseFloat(r.toPrecision(8));}
init();
</script></body></html>
