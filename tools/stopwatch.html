<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>스톱워치</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:450px;margin:0 auto;padding:50px 16px 30px;text-align:center}.card{background:#1a1a2e;border-radius:16px;padding:20px;margin:12px 0;border:1px solid #2a2a4a}input,select{background:#252545;border:2px solid #333;color:#fff;padding:10px 14px;border-radius:10px;font-size:16px;width:100%;margin:4px 0}input:focus,select:focus{border-color:#7B68EE;outline:none}.btn{background:#7B68EE;border:none;color:#fff;padding:12px 24px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;width:100%;margin:8px 0}.result{font-size:28px;font-weight:bold;color:#FFD700;margin:12px 0}.sub{color:#888;font-size:13px}body{overflow-x:hidden}.wrap,.container{max-width:100%;padding-left:12px;padding-right:12px}canvas{max-width:100%!important;height:auto!important}input,select,textarea,button{max-width:100%;font-size:16px!important}@media(max-width:600px){h1{font-size:22px!important}h2{font-size:18px!important}h3{font-size:15px!important}.wrap,.container{padding-left:10px;padding-right:10px;padding-top:45px}.card{padding:14px;margin:8px 0}.q-card{padding:16px}.q-text{font-size:15px!important}.opt{padding:12px;font-size:14px!important;min-height:44px}.btn{min-height:44px;font-size:15px!important}pre,code{font-size:11px!important;overflow-x:auto;word-break:break-all}.result{font-size:24px!important}.controls{flex-wrap:wrap}.controls button,.controls input{min-height:40px}.flow{flex-direction:column}.box{min-width:auto;width:100%}.arr{transform:rotate(90deg)}.grid{gap:4px}.cell{font-size:16px!important}}</style></head><body><a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap"><h1 style="font-size:24px;margin-bottom:5px">⏲️ 스톱워치</h1><p style="color:#888;font-size:14px;margin-bottom:15px">랩 기능</p><div class="card"><div class="result" id="d">00:00.000</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn" onclick="tog()" id="b" style=width:auto>▶️</button><button class="btn" onclick="lap()" style="width:auto;background:#FF9800">🏁</button><button class="btn" onclick="rst()" style="width:auto;background:#EF5350">⏹</button></div></div><div class="card" id="laps" style=display:none></div><script>let on=false,st=0,el=0,t,ls=[];function tog(){if(on){clearInterval(t);on=false;document.getElementById("b").textContent="▶️";}else{st=Date.now()-el;on=true;document.getElementById("b").textContent="⏸";t=setInterval(upd,10);}}function upd(){el=Date.now()-st;const ms=el%1000,s=Math.floor(el/1000)%60,m=Math.floor(el/60000);document.getElementById("d").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(ms).padStart(3,"0");}function lap(){if(!on)return;ls.push(el);const d=document.getElementById("laps");d.style.display="block";d.innerHTML=ls.map((l,i)=>{const ms=l%1000,s=Math.floor(l/1000)%60,m=Math.floor(l/60000);return"#"+(i+1)+" "+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(ms).padStart(3,"0")+"<br>";}).reverse().join("");}function rst(){clearInterval(t);on=false;el=0;ls=[];document.getElementById("d").textContent="00:00.000";document.getElementById("b").textContent="▶️";document.getElementById("laps").style.display="none";}</script></div></body></html>
