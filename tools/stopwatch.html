<div class="wrap"><h1 style="font-size:24px;margin-bottom:5px">⏲️ 스톱워치</h1><p style="color:#888;font-size:14px;margin-bottom:15px">랩 기능</p><div class="card"><div class="result" id="d">00:00.000</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn" onclick="tog()" id="b" style=width:auto>▶️</button><button class="btn" onclick="lap()" style="width:auto;background:#FF9800">🏁</button><button class="btn" onclick="rst()" style="width:auto;background:#EF5350">⏹</button></div></div><div class="card" id="laps" style=display:none></div><script>let on=false,st=0,el=0,t,ls=[];function tog(){if(on){clearInterval(t);on=false;document.getElementById("b").textContent="▶️";}else{st=Date.now()-el;on=true;document.getElementById("b").textContent="⏸";t=setInterval(upd,10);}}function upd(){el=Date.now()-st;const ms=el%1000,s=Math.floor(el/1000)%60,m=Math.floor(el/60000);document.getElementById("d").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(ms).padStart(3,"0");}function lap(){if(!on)return;ls.push(el);const d=document.getElementById("laps");d.style.display="block";d.innerHTML=ls.map((l,i)=>{const ms=l%1000,s=Math.floor(l/1000)%60,m=Math.floor(l/60000);return"#"+(i+1)+" "+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")+"."+String(ms).padStart(3,"0")+"<br>";}).reverse().join("");}function rst(){clearInterval(t);on=false;el=0;ls=[];document.getElementById("d").textContent="00:00.000";document.getElementById("b").textContent="▶️";document.getElementById("laps").style.display="none";}</script></div><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>

<h2>스톱워치</h2>
<p>경과 시간을 정밀하게 측정하는 스톱워치 도구입니다. 시작, 정지, 랩 타임 기능을 제공하며, 운동이나 요리 시간 측정에 유용합니다.</p>

<h3>사용 방법</h3>
<p>시작 버튼을 눌러 측정을 시작합니다. 랩 버튼으로 구간 기록을 남기고, 정지 버튼으로 측정을 멈춥니다.</p>

<h3>팁</h3>
<p>구간 기록(랩)을 활용하면 운동 세트별 시간을 비교할 수 있습니다.</p>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyResult(){
    var d=document.getElementById('d');
    var laps=document.getElementById('laps');
    var text='현재: '+(d?d.textContent.trim():'')+'\n';
    if(laps&&window.getComputedStyle(laps).display!=='none')text+='랩:\n'+laps.textContent.trim();
    text=text.trim();
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:block;margin:8px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;z-index:100;';
  btn.addEventListener('click',copyResult);
  var wrap=document.querySelector('.wrap')||document.body;
  wrap.appendChild(btn);
})();
</script>
