<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.wrap{width:100%;max-width:500px;padding:60px 16px 30px}
h1{text-align:center;font-size:22px;margin-bottom:20px;color:#fff}
textarea{width:100%;height:140px;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:14px;font-size:16px;resize:vertical;outline:none}
textarea:focus{border-color:#6c5ce7}
label{font-size:13px;color:#888;display:block;margin:12px 0 6px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.btn{padding:12px;background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:10px;font-size:14px;cursor:pointer;min-height:44px;touch-action:manipulation;font-weight:600}
.btn:active{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.copy{width:100%;padding:14px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation;margin-top:8px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;flex-direction:column;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>텍스트 변환</h1>
<label>입력</label>
<textarea id="inp" placeholder="변환할 텍스트를 입력하세요..."></textarea>
<div class="btns">
<button class="btn" onclick="convert('upper')">대문자</button>
<button class="btn" onclick="convert('lower')">소문자</button>
<button class="btn" onclick="convert('cap')">첫글자 대문자</button>
<button class="btn" onclick="convert('noline')">줄바꿈 제거</button>
<button class="btn" onclick="convert('nospace')">공백 제거</button>
<button class="btn" onclick="convert('reverse')">역순</button>
</div>
<label>결과</label>
<textarea id="out" readonly placeholder="변환 결과가 여기에 표시됩니다"></textarea>
<button class="copy" onclick="copyResult()">결과 복사</button>
</div>
<script>
function convert(mode){
  const t=document.getElementById('inp').value;
  let r='';
  switch(mode){
    case'upper':r=t.toUpperCase();break;
    case'lower':r=t.toLowerCase();break;
    case'cap':r=t.replace(/\b\w/g,c=>c.toUpperCase());break;
    case'noline':r=t.replace(/[\r\n]+/g,' ');break;
    case'nospace':r=t.replace(/\s/g,'');break;
    case'reverse':r=[...t].reverse().join('');break;
  }
  document.getElementById('out').value=r;
}
function copyResult(){
  const b=document.querySelector('.copy');
  navigator.clipboard.writeText(document.getElementById('out').value).then(()=>{b.textContent='복사됨!';setTimeout(()=>b.textContent='결과 복사',1500)});
}
</script>
<section style="max-width:700px;margin:30px auto;padding:20px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;color:#bbb;font-size:14px;line-height:1.8">
<h2 style="color:#FFD700;font-size:18px;margin-bottom:10px">텍스트 변환기</h2>
<p>대소문자 변환, 줄바꿈 처리, 역순 변환, 공백 제거 등 다양한 텍스트 변환 기능을 제공합니다.</p>
