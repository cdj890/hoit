<div class="wrap">
<h1>랜덤 룰렛</h1>
<div class="canvas-wrap">
<div class="pointer"></div>
<canvas id="wheel" width="300" height="300"></canvas>
</div>
<div class="result" id="result"></div>
<div class="add-row">
<input type="text" id="newItem" placeholder="항목 추가..." onkeydown="if(event.key==='Enter')addItem()">
<button onclick="addItem()">추가</button>
</div>
<div class="items" id="items"></div>
<button class="btn" id="spinBtn" onclick="spin()">돌리기!</button>
</div>
<script>
const colors=['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#e17055','#00b894','#0984e3','#a29bfe','#ff6b6b','#55efc4'];
let items=['짜장면','짬뽕','김밥','떡볶이','치킨','피자'];
let spinning=false,currentAngle=0;
const canvas=document.getElementById('wheel'),ctx=canvas.getContext('2d');
function drawWheel(angle){
  ctx.clearRect(0,0,300,300);
  if(items.length===0)return;
  const n=items.length,arc=2*Math.PI/n;
  ctx.save();ctx.translate(150,150);ctx.rotate(angle);
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,140,i*arc,(i+1)*arc);
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.strokeStyle='#0f0f1e';ctx.lineWidth=2;ctx.stroke();
    // text
    ctx.save();ctx.rotate(i*arc+arc/2);ctx.textAlign='center';ctx.fillStyle='#fff';
    ctx.font='bold 14px sans-serif';ctx.fillText(items[i].length>6?items[i].slice(0,6)+'..':items[i],70,5);
    ctx.restore();
  }
  ctx.restore();
  // center
  ctx.beginPath();ctx.arc(150,150,18,0,2*Math.PI);ctx.fillStyle='#0f0f1e';ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
}
function renderItems(){
  document.getElementById('items').innerHTML=items.map((it,i)=>`<div class="item">${it}<span class="del" onclick="removeItem(${i})">x</span></div>`).join('');
  drawWheel(currentAngle);
}
function addItem(){
  const inp=document.getElementById('newItem');
  const v=inp.value.trim();
  if(v){items.push(v);inp.value='';renderItems()}
}
function removeItem(i){items.splice(i,1);renderItems()}
function spin(){
  if(spinning||items.length<2)return;
  spinning=true;document.getElementById('spinBtn').disabled=true;
  const spins=5+Math.random()*5;
  const targetAngle=currentAngle+spins*2*Math.PI;
  const duration=4000;
  const start=performance.now();
  const startAngle=currentAngle;
  function animate(now){
    const elapsed=now-start;
    const t=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-t,3); // ease out cubic
    currentAngle=startAngle+(targetAngle-startAngle)*ease;
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(animate)}
    else{
      spinning=false;document.getElementById('spinBtn').disabled=false;
      // determine result
      const n=items.length,arc=2*Math.PI/n;
      const norm=((2*Math.PI-(currentAngle%(2*Math.PI)))+(2*Math.PI))%(2*Math.PI);
      const idx=Math.floor(norm/arc)%n;
      document.getElementById('result').textContent=items[idx]+'!';
    }
  }
  requestAnimationFrame(animate);
}
renderItems();
</script>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyResult(){
    var el=document.getElementById('result');
    var text=el?el.textContent.trim():'';
    if(!text)return;
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:none;margin:8px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;z-index:100;';
  btn.addEventListener('click',copyResult);
  var resultEl=document.getElementById('result');
  if(resultEl)resultEl.parentNode.insertBefore(btn,resultEl.nextSibling);
  function checkResult(){
    var el=document.getElementById('result');
    btn.style.display=(el&&el.textContent.trim())?'block':'none';
  }
  var observer=new MutationObserver(checkResult);
  observer.observe(document.body,{childList:true,subtree:true,characterData:true});
  checkResult();
})();
</script>
