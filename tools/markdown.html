<textarea id="editor" placeholder="마크다운을 입력하세요...
# 제목
**굵게** *기울임* `코드`
- 목록 항목
[링크](url)"></textarea>

<script>
function showTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',i===(t==='edit'?0:1))});
  document.getElementById('editor').style.display=t==='edit'?'':'none';
  document.getElementById('preview').style.display=t==='preview'?'':'none';
  if(t==='preview')render();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function safeUrl(u){u=u.trim();if(/^(https?:\/\/|\/|#)/i.test(u))return u;return'';}
function render(){
  let md=esc(document.getElementById('editor').value);
  // code blocks
  md=md.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  // inline code
  md=md.replace(/`([^`]+)`/g,'<code>$1</code>');
  // headings
  md=md.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  md=md.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  md=md.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // bold italic
  md=md.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  md=md.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // links (safe URL only)
  md=md.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,text,url){return'<a href="'+safeUrl(url)+'" target="_blank" rel="noopener">'+text+'</a>';});
  // blockquote
  md=md.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  // unordered list
  md=md.replace(/^[-*] (.+)$/gm,'<li>$1</li>');
  md=md.replace(/((<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  // ordered list
  md=md.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  // hr
  md=md.replace(/^---$/gm,'<hr>');
  // paragraphs
  md=md.split(/\n\n+/).map(p=>{
    if(p.startsWith('<'))return p;
    return'<p>'+p.replace(/\n/g,'<br>')+'</p>';
  }).join('');
  document.getElementById('preview').innerHTML=md;
}
</script>
