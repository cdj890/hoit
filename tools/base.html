<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🔢 진법 변환기</h1>
<div class="card">
<div class="row"><label>10진</label><input id="d" value="255" oninput="fromDec()"></div>
<div class="row"><label>2진</label><input id="b" value="11111111" oninput="fromBin()"></div>
<div class="row"><label>8진</label><input id="o" value="377" oninput="fromOct()"></div>
<div class="row"><label>16진</label><input id="h" value="FF" oninput="fromHex()"></div>
</div></div>
<script>
function set(d){document.getElementById('d').value=d;document.getElementById('b').value=d.toString(2);document.getElementById('o').value=d.toString(8);document.getElementById('h').value=d.toString(16).toUpperCase();}
function fromDec(){const v=parseInt(document.getElementById('d').value);if(!isNaN(v))set(v);}
function fromBin(){const v=parseInt(document.getElementById('b').value,2);if(!isNaN(v))set(v);}
function fromOct(){const v=parseInt(document.getElementById('o').value,8);if(!isNaN(v))set(v);}
function fromHex(){const v=parseInt(document.getElementById('h').value,16);if(!isNaN(v))set(v);}
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
