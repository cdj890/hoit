<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🔢 진법 변환기</h1>
<div class="card">
<div class="row"><label>10진</label><input id="d" value="255" oninput="fromDec()"></div>
<div class="row"><label>2진</label><input id="b" value="11111111" oninput="fromBin()"></div>
<div class="row"><label>8진</label><input id="o" value="377" oninput="fromOct()"></div>
<div class="row"><label>16진</label><input id="h" value="FF" oninput="fromHex()"></div>
</div></div>
<script>
function saveBase(){
  var d={d:document.getElementById('d').value,b:document.getElementById('b').value,o:document.getElementById('o').value,h:document.getElementById('h').value};
  localStorage.setItem('hoit_tool_base',JSON.stringify(d));
}
function set(val){
  document.getElementById('d').value=val;
  document.getElementById('b').value=val.toString(2);
  document.getElementById('o').value=val.toString(8);
  document.getElementById('h').value=val.toString(16).toUpperCase();
  saveBase();
}
function fromDec(){const v=parseInt(document.getElementById('d').value);if(!isNaN(v))set(v);}
function fromBin(){const v=parseInt(document.getElementById('b').value,2);if(!isNaN(v))set(v);}
function fromOct(){const v=parseInt(document.getElementById('o').value,8);if(!isNaN(v))set(v);}
function fromHex(){const v=parseInt(document.getElementById('h').value,16);if(!isNaN(v))set(v);}
(function(){
  var saved=JSON.parse(localStorage.getItem('hoit_tool_base')||'{}');
  if(saved.d!==undefined){
    document.getElementById('d').value=saved.d;
    document.getElementById('b').value=saved.b||'';
    document.getElementById('o').value=saved.o||'';
    document.getElementById('h').value=saved.h||'';
  }
  document.addEventListener('keydown',function(e){
    if(e.key!=='Enter'||!document.activeElement||document.activeElement.tagName!=='INPUT')return;
    var id=document.activeElement.id;
    if(id==='d')fromDec();else if(id==='b')fromBin();else if(id==='o')fromOct();else if(id==='h')fromHex();
  });
})();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>

<h2>진법 변환기</h2>
<p>2진법, 8진법, 10진법, 16진법 사이를 변환하는 도구입니다. 프로그래밍과 컴퓨터 과학 학습에 유용합니다.</p>

<h3>사용 방법</h3>
<p>입력 진법과 출력 진법을 선택하고 숫자를 입력하면 변환 결과가 표시됩니다.</p>

<h3>팁</h3>
<p>16진법(HEX)은 색상 코드, 메모리 주소 등에 사용됩니다. 2진법은 컴퓨터의 기본 데이터 표현 방식입니다.</p>

<script>
(function(){
  var toast=null;
  function showToast(){
    if(!toast){toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:99999;pointer-events:none;transition:opacity 0.3s';document.body.appendChild(toast);}
    toast.textContent='복사되었습니다!';toast.style.opacity='1';
    setTimeout(function(){toast.style.opacity='0';},2000);
  }
  function copyResult(){
    var d=document.getElementById('d');
    var b=document.getElementById('b');
    var o=document.getElementById('o');
    var h=document.getElementById('h');
    var text='10진: '+(d?d.value:'')+'\n2진: '+(b?b.value:'')+'\n8진: '+(o?o.value:'')+'\n16진: '+(h?h.value:'');
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast);}
    else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
  }
  var btn=document.createElement('button');
  btn.textContent='복사';
  btn.setAttribute('aria-label','결과 복사');
  btn.style.cssText='display:block;margin:12px auto 0;padding:10px 28px;background:#7B68EE;color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:bold;cursor:pointer;z-index:100;';
  btn.addEventListener('click',copyResult);
  var wrap=document.querySelector('.wrap')||document.body;
  wrap.appendChild(btn);
})();
</script>
