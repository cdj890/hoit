*{margin:0;padding:0;box-sizing:border-box}

.btn{width:100%;margin-top:16px;padding:14px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation}

<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>글자수 세기</h1>
<textarea id="inp" placeholder="여기에 텍스트를 입력하세요..."></textarea>
<div class="stats">
<div class="stat"><div class="label">글자수 (공백 포함)</div><div class="value" id="chars">0</div></div>
<div class="stat"><div class="label">글자수 (공백 제외)</div><div class="value" id="nospace">0</div></div>
<div class="stat"><div class="label">단어수</div><div class="value" id="words">0</div></div>
<div class="stat"><div class="label">바이트 (UTF-8)</div><div class="value" id="bytes">0</div></div>
</div>
<button class="btn" id="copyBtn">결과 복사</button>
</div>
<script>
const inp=document.getElementById('inp');
const chars=document.getElementById('chars');
const nospace=document.getElementById('nospace');
const words=document.getElementById('words');
const bytes=document.getElementById('bytes');
function update(){
  const t=inp.value;
  chars.textContent=t.length;
  nospace.textContent=t.replace(/\s/g,'').length;
  words.textContent=t.trim()?t.trim().split(/\s+/).length:0;
  bytes.textContent=new Blob([t]).size;
}
inp.addEventListener('input',update);
document.getElementById('copyBtn').addEventListener('click',()=>{
  const t=inp.value;
  const r=`글자수: ${t.length} | 공백제외: ${t.replace(/\s/g,'').length} | 단어수: ${t.trim()?t.trim().split(/\s+/).length:0} | 바이트: ${new Blob([t]).size}`;
  navigator.clipboard.writeText(r).then(()=>{document.getElementById('copyBtn').textContent='복사됨!';setTimeout(()=>document.getElementById('copyBtn').textContent='결과 복사',1500)});
});
</script>
