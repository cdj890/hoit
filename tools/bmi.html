<div class="wrap"><h1 style="font-size:24px;margin-bottom:5px">⚖️ BMI 계산기</h1><p style="color:#888;font-size:14px;margin-bottom:15px">체질량지수 계산</p><div class="card"><input id="h" type="number" placeholder="키 (cm)"><input id="w" type="number" placeholder="몸무게 (kg)" style="margin-top:4px"><button class="btn" onclick="calc()">계산</button></div><div class="card" id="r" style="display:none"></div><script>function calc(){const h=+document.getElementById("h").value/100,w=+document.getElementById("w").value;if(!h||!w)return;const b=(w/(h*h)).toFixed(1);let c,cl;if(b<18.5){c="저체중";cl="#4FC3F7";}else if(b<23){c="정상";cl="#4CAF50";}else if(b<25){c="과체중";cl="#FF9800";}else{c="비만";cl="#F44336";}document.getElementById("r").style.display="block";document.getElementById("r").innerHTML="<div class=result style=color:"+cl+">"+b+"</div><p style=color:"+cl+";font-size:18px>"+c+"</p>";}</script></div></body></html>
