<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>메모장</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:450px;margin:0 auto;padding:50px 16px 30px;text-align:center}.card{background:#1a1a2e;border-radius:16px;padding:20px;margin:12px 0;border:1px solid #2a2a4a}input,select{background:#252545;border:2px solid #333;color:#fff;padding:10px 14px;border-radius:10px;font-size:16px;width:100%;margin:4px 0}input:focus,select:focus{border-color:#7B68EE;outline:none}.btn{background:#7B68EE;border:none;color:#fff;padding:12px 24px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:bold;width:100%;margin:8px 0}.result{font-size:28px;font-weight:bold;color:#FFD700;margin:12px 0}.sub{color:#888;font-size:13px}</style></head><body><a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap"><h1 style="font-size:24px;margin-bottom:5px">📋 메모장</h1><p style="color:#888;font-size:14px;margin-bottom:15px">자동 저장</p><div class="card"><textarea id="m" placeholder="메모를 입력하세요..." style="width:100%;min-height:250px;background:#252545;border:2px solid #333;color:#fff;padding:12px;border-radius:10px;font-size:15px;resize:vertical" oninput="save()"></textarea><div style="display:flex;justify-content:space-between;margin-top:6px"><span class=sub id=c>0자</span><span class=sub>자동 저장</span></div><button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('m').value)">📋 복사</button></div><script>document.getElementById("m").value=localStorage.getItem("hoit_memo")||"";function save(){const v=document.getElementById("m").value;localStorage.setItem("hoit_memo",v);document.getElementById("c").textContent=v.length+"자";}save();</script></div></body></html>
