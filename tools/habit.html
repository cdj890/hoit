<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;justify-content:center}
.wrap{width:100%;max-width:500px;padding:60px 16px 30px}
h1{text-align:center;font-size:22px;margin-bottom:16px;color:#fff}
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-row input{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:12px;font-size:16px;outline:none}
.add-row input:focus{border-color:#6c5ce7}
.add-row button{padding:12px 18px;background:#6c5ce7;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;min-height:44px;touch-action:manipulation}
.habit{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px}
.habit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.habit-name{font-size:16px;font-weight:bold;color:#fff}
.habit-streak{font-size:13px;color:#6c5ce7}
.habit .del{color:#ff4757;cursor:pointer;font-size:14px;touch-action:manipulation;padding:4px}
.month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.month-nav button{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;border-radius:8px;padding:8px 14px;cursor:pointer;min-height:44px;touch-action:manipulation;font-size:16px}
.month-nav .label{font-size:16px;font-weight:bold}
.grass{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
.grass .day{aspect-ratio:1;border-radius:4px;background:#1e1e3a;cursor:pointer;touch-action:manipulation;position:relative}
.grass .day.checked{background:#6c5ce7}
.grass .day.today{box-shadow:inset 0 0 0 2px #a29bfe}
.grass .day.other{opacity:0.2}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;text-align:center;font-size:11px;color:#555}
.empty{text-align:center;color:#555;padding:30px;font-size:15px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>습관 트래커</h1>
<div class="add-row">
<input type="text" id="inp" placeholder="새 습관 추가..." onkeydown="if(event.key==='Enter')addHabit()">
<button onclick="addHabit()">추가</button>
</div>
<div class="month-nav">
<button onclick="changeMonth(-1)">&lt;</button>
<div class="label" id="monthLabel"></div>
<button onclick="changeMonth(1)">&gt;</button>
</div>
<div id="habits"></div>
</div>
<script>
let habits=JSON.parse(localStorage.getItem('hoit-habits')||'[]');
let viewYear=new Date().getFullYear(),viewMonth=new Date().getMonth();
function save(){localStorage.setItem('hoit-habits',JSON.stringify(habits))}
function addHabit(){
  const inp=document.getElementById('inp'),v=inp.value.trim();
  if(!v)return;
  habits.push({id:Date.now(),name:v,checks:{}});
  inp.value='';save();render();
}
function delHabit(id){habits=habits.filter(h=>h.id!==id);save();render()}
function toggleDay(hid,dateStr){
  const h=habits.find(h=>h.id===hid);if(!h)return;
  if(h.checks[dateStr])delete h.checks[dateStr];else h.checks[dateStr]=true;
  save();render();
}
function getStreak(h){
  let streak=0,d=new Date();
  while(true){
    const ds=d.toISOString().split('T')[0];
    if(h.checks[ds])streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function changeMonth(d){
  viewMonth+=d;
  if(viewMonth<0){viewMonth=11;viewYear--}
  if(viewMonth>11){viewMonth=0;viewYear++}
  render();
}
function render(){
  document.getElementById('monthLabel').textContent=viewYear+'년 '+(viewMonth+1)+'월';
  const container=document.getElementById('habits');
  if(habits.length===0){container.innerHTML='<div class="empty">습관을 추가해보세요!</div>';return}
  const today=new Date().toISOString().split('T')[0];
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
  container.innerHTML=habits.map(h=>{
    const streak=getStreak(h);
    let grass='<div class="dow"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="grass">';
    for(let i=0;i<firstDay;i++)grass+='<div class="day other"></div>';
    for(let d=1;d<=daysInMonth;d++){
      const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const checked=h.checks[ds]?'checked':'';
      const isToday=ds===today?'today':'';
      grass+=`<div class="day ${checked} ${isToday}" onclick="toggleDay(${h.id},'${ds}')"></div>`;
    }
    grass+='</div>';
    return`<div class="habit">
      <div class="habit-head">
        <span class="habit-name">${h.name}</span>
        <span class="habit-streak">${streak}일 연속</span>
        <span class="del" onclick="delHabit(${h.id})">삭제</span>
      </div>${grass}</div>`;
  }).join('');
}
render();
</script>
