<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🕐 세계 시간</h1><div id="clocks"></div></div>
<script>
const CITIES=[{name:'🇰🇷 서울',tz:'Asia/Seoul'},{name:'🇯🇵 도쿄',tz:'Asia/Tokyo'},{name:'🇨🇳 베이징',tz:'Asia/Shanghai'},{name:'🇺🇸 뉴욕',tz:'America/New_York'},{name:'🇺🇸 LA',tz:'America/Los_Angeles'},{name:'🇬🇧 런던',tz:'Europe/London'},{name:'🇫🇷 파리',tz:'Europe/Paris'},{name:'🇦🇺 시드니',tz:'Australia/Sydney'}];
function update(){const now=new Date();document.getElementById('clocks').innerHTML=CITIES.map(c=>{
const t=now.toLocaleTimeString('ko',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',second:'2-digit'});
const d=now.toLocaleDateString('ko',{timeZone:c.tz,month:'short',day:'numeric',weekday:'short'});
return`<div class="card"><div><div class="city">${c.name}</div><div class="date">${d}</div></div><div class="time">${t}</div></div>`;}).join('');}
update();setInterval(update,1000);
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
