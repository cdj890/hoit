<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh}.wrap{max-width:450px;margin:0 auto;padding:50px 16px 30px;text-align:center}.card{background:#1a1a2e;border-radius:16px;padding:16px;margin:8px 0;border:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center}.city{font-size:16px;font-weight:bold}.time{font-size:22px;font-family:monospace;color:#FFD700}.date{font-size:11px;color:#888}body{overflow-x:hidden}.wrap,.container{max-width:100%;padding-left:12px;padding-right:12px}canvas{max-width:100%!important;height:auto!important}input,select,textarea,button{max-width:100%;font-size:16px!important}@media(max-width:600px){h1{font-size:22px!important}h2{font-size:18px!important}h3{font-size:15px!important}.wrap,.container{padding-left:10px;padding-right:10px;padding-top:45px}.card{padding:14px;margin:8px 0}.q-card{padding:16px}.q-text{font-size:15px!important}.opt{padding:12px;font-size:14px!important;min-height:44px}.btn{min-height:44px;font-size:15px!important}pre,code{font-size:11px!important;overflow-x:auto;word-break:break-all}.result{font-size:24px!important}.controls{flex-wrap:wrap}.controls button,.controls input{min-height:40px}.flow{flex-direction:column}.box{min-width:auto;width:100%}.arr{transform:rotate(90deg)}.grid{gap:4px}.cell{font-size:16px!important}}</style></head><body>

<div class="wrap"><h1 style="font-size:24px;margin-bottom:12px">🕐 세계 시간</h1><div id="clocks"></div></div>
<script>
const CITIES=[{name:'🇰🇷 서울',tz:'Asia/Seoul'},{name:'🇯🇵 도쿄',tz:'Asia/Tokyo'},{name:'🇨🇳 베이징',tz:'Asia/Shanghai'},{name:'🇺🇸 뉴욕',tz:'America/New_York'},{name:'🇺🇸 LA',tz:'America/Los_Angeles'},{name:'🇬🇧 런던',tz:'Europe/London'},{name:'🇫🇷 파리',tz:'Europe/Paris'},{name:'🇦🇺 시드니',tz:'Australia/Sydney'}];
function update(){const now=new Date();document.getElementById('clocks').innerHTML=CITIES.map(c=>{
const t=now.toLocaleTimeString('ko',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',second:'2-digit'});
const d=now.toLocaleDateString('ko',{timeZone:c.tz,month:'short',day:'numeric',weekday:'short'});
return`<div class="card"><div><div class="city">${c.name}</div><div class="date">${d}</div></div><div class="time">${t}</div></div>`;}).join('');}
update();setInterval(update,1000);
</script></body></html>
