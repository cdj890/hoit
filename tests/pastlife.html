<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[

{q:"처음 가본 곳인데 익숙한 느낌?",a:[["오래된 성당/사원","scholar"],["항구 도시","merchant"],["미술관","artist"],["깊은 숲","explorer"]]},
{q:"타고난 재능이라고 느끼는 것은?",a:[["사람을 이끄는 힘","royal"],["용기와 정의감","knight"],["예술적 감각","artist"],["지식 탐구","scholar"]]},
{q:"스트레스를 받으면?",a:[["혼자 여행 떠나고 싶다","explorer"],["비싼 거 사고 싶다","merchant"],["글이나 그림으로 표현","artist"],["체계적으로 정리","scholar"]]},
{q:"가장 끌리는 아이템은?",a:[["고급 보석/왕관","royal"],["고대 칼/갑옷","knight"],["붓과 캔버스","artist"],["지도와 나침반","explorer"]]},
{q:"사람들이 당신에게 자주 하는 말?",a:[["카리스마 있다","royal"],["정의롭다","knight"],["독특하다","artist"],["장사 수완이 좋다","merchant"]]},
{q:"이유 없이 끌리는 음식은?",a:[["고급 코스 요리","royal"],["투박한 빵과 스튜","knight"],["이국적인 향신료 요리","merchant"],["자연 재료 음식","explorer"]]}
];
const types={royal:{e:"👑",n:"왕족",d:"전생에 당신은 왕실의 일원이었습니다! 타고난 리더십과 카리스마로 많은 사람을 이끌었죠. 지금도 고급스러운 취향과 당당한 기운이 남아있어요.",era:"중세 유럽 15세기",role:"🏰 왕국의 통치자",story:"장엄한 성에서 태어나 어린 시절부터 제왕학을 배웠습니다. 현명한 판단과 강인한 의지로 왕국을 번영시켰고, 백성들에게 공정한 법을 내려 '현명한 왕'이라 불렸습니다. 궁전의 화려한 연회 속에서도 언제나 나라의 미래를 걱정하는 고독한 통치자였죠.",stats:{권력:95,부:85,지혜:70,행복:60,모험:30}},
knight:{e:"⚔️",n:"기사",d:"전생에 당신은 용감한 기사였습니다! 정의를 위해 싸우는 강인한 전사였죠. 지금도 불의를 보면 참지 못하는 성격이 그 흔적이에요.",era:"중세 유럽 12세기",role:"⚔️ 왕실 기사단장",story:"가난한 집안에서 태어났지만, 뛰어난 무예와 정의로운 마음으로 기사단에 발탁되었습니다. 수많은 전장에서 용맹을 떨쳤고, 약한 자를 지키는 것을 평생의 사명으로 삼았습니다. 당신의 검에는 명예와 충성이 깃들어 있었죠.",stats:{권력:60,부:40,지혜:50,행복:55,모험:90}},
artist:{e:"🎨",n:"예술가",d:"전생에 당신은 천재 예술가였습니다! 아름다움을 창조하는 데 일생을 바쳤죠. 지금도 뛰어난 감성과 창의력이 빛나고 있어요.",era:"르네상스 이탈리아 16세기",role:"🎨 궁정 화가",story:"피렌체의 작은 공방에서 재능을 꽃피운 당신은 귀족과 교황의 후원을 받는 궁정 화가가 되었습니다. 대리석 조각과 프레스코 벽화로 시대를 초월한 아름다움을 남겼고, 사람들은 당신의 작품 앞에서 눈물을 흘렸습니다.",stats:{권력:25,부:50,지혜:75,행복:80,모험:55}},
scholar:{e:"📚",n:"학자",d:"전생에 당신은 위대한 학자였습니다! 진리를 탐구하며 지혜를 쌓았죠. 지금도 배움에 대한 열정과 깊은 사색이 그 증거예요.",era:"고대 동양 당나라 시대",role:"📜 한림학사",story:"수천 권의 서적을 읽고 깊은 사색에 잠기던 당신은 황제의 자문 학자로 초빙되었습니다. 천문과 역사, 철학을 아울렀으며 제자들에게 지혜를 전수했습니다. 조용한 서재에서 붓을 들고 진리를 기록하는 것이 가장 큰 행복이었죠.",stats:{권력:40,부:35,지혜:95,행복:70,모험:25}},
explorer:{e:"🧭",n:"탐험가",d:"전생에 당신은 대담한 탐험가였습니다! 미지의 세계를 개척했죠. 지금도 새로운 경험과 자유를 갈망하는 영혼이에요.",era:"대항해시대 17세기",role:"🚢 신대륙 탐험대장",story:"드넓은 바다가 당신의 집이었습니다. 폭풍우를 뚫고, 미지의 해안에 닻을 내리며, 아무도 밟지 않은 땅에 첫 발자국을 남겼습니다. 두려움보다 호기심이 큰 영혼으로 수많은 항해일지를 남겼고, 새로운 세계의 문을 열었습니다.",stats:{권력:35,부:45,지혜:55,행복:75,모험:95}},
merchant:{e:"💰",n:"무역상",d:"전생에 당신은 부유한 무역상이었습니다! 실크로드를 누비며 부를 쌓았죠. 지금도 뛰어난 사업 감각과 사교성이 돋보여요.",era:"실크로드 시대 13세기",role:"🐫 대상단 수장",story:"동서양을 잇는 실크로드 위에서 비단과 향신료를 교역하며 막대한 부를 쌓았습니다. 뛰어난 언변과 사교술로 각국의 상인들과 신뢰를 쌓았고, 여러 도시에 상관을 열어 무역 네트워크를 구축했습니다. 당신의 대상단은 사막 위의 황금 행렬이었죠.",stats:{권력:50,부:95,지혜:60,행복:65,모험:75}}};
let cur=0,scores={};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';const wrap=document.getElementById('quiz');wrap.querySelector('.question').classList.remove('q-slide');void wrap.querySelector('.question').offsetWidth;wrap.querySelector('.question').classList.add('q-slide');q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){if(window._picking)return;window._picking=true;b.classList.add('selected');setTimeout(()=>{window._picking=false;pick(a[1]);},400);};o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=types[top];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent='당신의 전생은 '+r.n+'!';document.getElementById('rDesc').textContent=r.d;document.getElementById('rEra').textContent=r.era;document.getElementById('rRole').textContent=r.role;document.getElementById('rStory').textContent=r.story;
const statsEl=document.getElementById('rStats');statsEl.innerHTML='';const colors={권력:'#e74c3c',부:'#f39c12',지혜:'#3498db',행복:'#2ecc71',모험:'#9b59b6'};Object.entries(r.stats).forEach(([k,v])=>{const d=document.createElement('div');d.className='stat-bar';d.innerHTML='<label><span>'+k+'</span><span>'+v+'</span></label><div class="bar"><div class="bar-fill" style="width:0;background:'+colors[k]+'"></div></div>';statsEl.appendChild(d);setTimeout(()=>d.querySelector('.bar-fill').style.width=v+'%',100);});
localStorage.setItem('pastlife_result',JSON.stringify({type:r.n,emoji:r.e,date:new Date().toLocaleDateString('ko-KR')}));}
function copyResult(){const r=document.getElementById('rType').textContent+'\n'+document.getElementById('rEra').textContent+' - '+document.getElementById('rRole').textContent+'\n'+document.getElementById('rStory').textContent;_copy('[전생 테스트 결과]\n'+r,document.querySelector('.share-btn'));}
(function(){const prev=localStorage.getItem('pastlife_result');if(prev){try{const d=JSON.parse(prev);document.getElementById('prevResult').innerHTML='<div class="prev-result">이전 결과: '+d.emoji+' '+d.type+' ('+d.date+')</div>';}catch(e){}}})();
</script><div style="max-width:440px;margin:16px auto;padding:0 8px"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
