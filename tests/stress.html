<script>function _copy(t,b){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}).catch(function(){_copyFB(t,b)});}else{_copyFB(t,b);}}function _copyFB(t,b){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}catch(e){alert('복사 실패');}document.body.removeChild(ta);}</script></head><body>

<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const Q=_shuf([
  {t:"최근 잠을 잘 못 자고 있다",c:"신체"},{t:"사소한 일에 짜증이 난다",c:"정서"},{t:"집중이 잘 안 된다",c:"인지"},{t:"머리가 자주 아프거나 몸이 뻐근하다",c:"신체"},
  {t:"식욕이 줄었거나 폭식하게 된다",c:"신체"},{t:"미래에 대한 불안감이 있다",c:"인지"},{t:"혼자 있고 싶을 때가 많다",c:"사회"},{t:"일이나 공부에 의욕이 없다",c:"정서"},
  {t:"SNS나 핸드폰을 과도하게 본다",c:"사회"},{t:"운동이나 취미를 할 에너지가 없다",c:"신체"},{t:"눈물이 나거나 감정 기복이 크다",c:"정서"},{t:"자기 전에 생각이 많아진다",c:"인지"},
  {t:"사람들을 만나는 것이 부담스럽다",c:"사회"},{t:"매사에 무기력하고 무관심해진다",c:"정서"},{t:"어깨나 목이 자주 결린다",c:"신체"},{t:"작은 결정도 내리기 어렵다",c:"인지"},
  {t:"즐거운 일에도 흥미를 잃었다",c:"정서"},{t:"소화가 잘 안 되거나 속이 불편하다",c:"신체"},{t:"다른 사람의 말이 예민하게 느껴진다",c:"사회"},{t:"최근 실수나 건망증이 늘었다",c:"인지"},
]);

const OPTS=[{t:'전혀 아님',s:0},{t:'가끔',s:1},{t:'자주',s:2},{t:'항상',s:3}];
let cur=0,total=0;
const catScores={신체:0,정서:0,사회:0,인지:0};
const catCounts={신체:0,정서:0,사회:0,인지:0};
Q.forEach(q=>{catCounts[q.c]=(catCounts[q.c]||0)+1;});
const ALL_TESTS=[{name:'MBTI 테스트 🧠',url:'mbti.html'},{name:'혈액형 성격 분석 🩸',url:'blood.html'},{name:'연애 유형 테스트 💕',url:'love.html'},{name:'동물 성격 테스트 🐾',url:'animal.html'}];

function render(){
  const app=document.getElementById('app');
  if(cur===0 && !window._started){
    const prev=localStorage.getItem('stress_result');
    app.innerHTML=`<h1>😰 스트레스 지수 테스트</h1><p class="sub">최근 2주간을 기준으로 답해주세요</p>
      <p class="time-est">예상 소요시간: 2분</p>
      ${prev?`<div class="prev-result">이전 결과: ${prev}</div>`:''}
      <button class="btn" onclick="window._started=true;render()">시작하기</button>`;
    return;
  }
  if(cur<Q.length){
    const pct=(cur/Q.length*100)|0;
    app.innerHTML=`<h1>😰 스트레스 지수 테스트</h1><p class="sub">최근 2주간을 기준으로 답해주세요</p>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-card slide-in"><div style="color:#888;font-size:13px;margin-bottom:8px">${cur+1}/${Q.length}</div>
      <div class="q-text">${Q[cur].t}</div>
      <div class="opts">${OPTS.map(o=>`<div class="opt" onclick="pick(${o.s},this)">${o.t}</div>`).join('')}</div></div>`;
  } else showResult();
}

function pick(s,el){
  if(window._answering)return;
  window._answering=true;
  total+=s;
  catScores[Q[cur].c]=(catScores[Q[cur].c]||0)+s;
  if(el){el.classList.add('selected');}
  const card=document.querySelector('.q-card');
  if(card)card.classList.add('fade-out');
  setTimeout(()=>{cur++;window._answering=false;render();},400);
}

function showResult(){
  const max=Q.length*3,pct=(total/max*100)|0;
  let level,emoji,color,desc,tips,recs=[];
  if(pct<=25){level='낮음';emoji='😊';color='#4CAF50';desc='스트레스가 거의 없는 안정적인 상태예요! 현재 생활 패턴을 잘 유지하고 계시네요.';tips=['현재 루틴을 꾸준히 유지하세요','주변 사람들에게도 긍정 에너지를 나눠주세요','가끔 자기 자신에게 작은 선물을 해보세요'];recs=['🧘 가벼운 스트레칭으로 하루 시작하기','📚 자기계발 독서 추천','🎵 기분 좋은 플레이리스트 만들기'];}
  else if(pct<=50){level='보통';emoji='😐';color='#FF9800';desc='약간의 스트레스가 있지만 관리 가능한 수준이에요. 가벼운 스트레스 해소 활동을 추천해요.';tips=['규칙적인 운동 (하루 30분 걷기만으로도 OK!)','취미 생활에 시간을 투자하세요','충분한 수면을 확보하세요 (7-8시간)'];recs=['🏃 하루 30분 조깅 또는 걷기','🧘 명상 앱: 마보, Calm, Headspace','😴 수면 위생 개선: 취침 1시간 전 핸드폰 끄기'];}
  else if(pct<=75){level='높음';emoji='😟';color='#FF5722';desc='스트레스 수준이 높아요. 적극적인 관리가 필요한 시점입니다. 혼자 감당하지 말고 주변에 도움을 요청해보세요.';tips=['매일 10분 명상이나 깊은 호흡 연습','신뢰할 수 있는 사람에게 고민 나누기','카페인과 알코올 줄이기','자연 속에서 시간 보내기'];recs=['🧘 명상 앱: 마보(하루 10분부터)','🏊 수영, 요가 등 이완 운동 추천','🌿 주말 자연 산책 (숲, 공원)','📝 감정 일기 쓰기'];}
  else{level='매우 높음';emoji='😢';color='#F44336';desc='스트레스가 매우 높은 상태예요. 전문가 상담을 고려해보시는 것을 추천합니다. 당신의 마음 건강이 가장 중요해요.';tips=['전문 상담사와 상담 받아보기','무리한 일정 줄이기','충분한 휴식과 자기 돌봄','정신건강 위기상담전화: 1577-0199'];recs=['☎️ 정신건강 위기상담전화: 1577-0199','🏥 가까운 정신건강복지센터 방문','🧘 4-7-8 호흡법 (하루 3회)','😴 수면 스케줄 고정하기','📱 SNS 사용 시간 제한 설정'];}
  localStorage.setItem('stress_result',pct+'% ('+level+')');
  const catColors={신체:'#FF6B6B',정서:'#FFD700',사회:'#4FC3F7',인지:'#7B68EE'};
  const gaugeAngle=pct/100*180;
  const testRecs=ALL_TESTS.sort(()=>Math.random()-0.5).slice(0,3);
  document.getElementById('app').innerHTML=`<div class="result-card">
    <div class="big-emoji">${emoji}</div>
    <h2 style="margin:10px 0;text-align:center">스트레스 지수</h2>
    <div class="gauge">
      <div class="gauge-bg"></div>
      <div class="gauge-fill" style="border-color:${color};transform:rotate(${225+gaugeAngle}deg)"></div>
      <div class="gauge-label" style="color:${color}">${pct}%</div>
    </div>
    <div style="color:${color};font-size:18px;margin:5px 0;text-align:center;font-weight:bold">${level}</div>
    <div class="meter"><div class="meter-fill" style="width:${pct}%;background:${color}"></div></div>
    <p style="color:#aaa;font-size:14px;line-height:1.7;margin:15px 0;text-align:left">${desc}</p>
    <div class="rec-box">
      <h3 style="color:#FFD700">📊 영역별 분석</h3>
      ${Object.entries(catScores).map(([k,v])=>{const catMax=catCounts[k]*3;const cp=catMax?Math.round(v/catMax*100):0;return `<div class="cat-bar"><div class="cl">${k}</div><div class="cb"><div class="cf" style="width:${cp}%;background:${catColors[k]}"></div></div><div style="color:${catColors[k]};font-size:12px;width:30px">${cp}%</div></div>`;}).join('')}
    </div>
    <div class="rec-box" style="text-align:left">
      <h3 style="color:#FFD700">💡 추천 관리법</h3>
      ${tips.map(t=>`<p>• ${t}</p>`).join('')}
    </div>
    <div class="rec-box" style="text-align:left">
      <h3 style="color:#7B68EE">🎯 맞춤 추천</h3>
      ${recs.map(r=>`<p>• ${r}</p>`).join('')}
    </div>
    ${pct>75?'<a class="crisis-link" href="tel:1577-0199">📞 위기 상담 전화 (1577-0199)</a>':''}
    <div class="share-row">
      <div class="share-btn2" onclick="_copy('나의 스트레스 지수: ${pct}% (${level}) ${emoji}',this)">📋 결과 복사</div>
      <div class="share-btn2" onclick="_copy(location.href,this)">🔗 링크 공유</div>
      <div class="share-btn2" onclick="_saveResultImage({testName:'스트레스 지수 테스트',resultType:'스트레스 ${pct}% - ${level}',emoji:'${emoji}',desc:'${desc.replace(/'/g,String.fromCharCode(39))}',accentColor:'${color}',filename:'stress_result'})">📸 결과 이미지 저장</div>
    </div>
    <button class="btn" onclick="cur=0;total=0;Object.keys(catScores).forEach(k=>catScores[k]=0);window._started=false;render()">다시 하기</button>
    <div class="recommend-section"><h3>🎯 다른 테스트 추천</h3><div class="recommend-links">${testRecs.map(r=>`<a href="${r.url}">${r.name}</a>`).join('')}</div></div>
  </div>`;
}
render();

<h2>스트레스 지수 테스트</h2>
<p>현재 나의 스트레스 수준을 측정하는 테스트입니다. 일상생활, 직장/학교, 대인관계 등 다양한 영역에서의 스트레스 요인을 분석합니다.</p>
