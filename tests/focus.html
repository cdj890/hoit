<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.btn{display:inline-block;padding:12px 24px;margin:6px;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:1.2em;cursor:pointer;transition:background .2s;min-width:60px}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;font-size:1.1em;padding:14px 32px;margin-top:16px;font-weight:bold;display:block;width:100%}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#a29bfe;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.btn.selected{background:#a29bfe;color:#1a1a2e;font-weight:bold;pointer-events:none;animation:pulse .3s ease}
.result-card{border:2px solid transparent;background:linear-gradient(#1a1a2e,#1a1a2e) padding-box,linear-gradient(135deg,#a29bfe,#6c5ce7) border-box;border-radius:16px;padding:20px;margin:16px 0;animation:fadeIn .6s ease}
.share-btn{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;font-weight:bold;border:none;padding:12px;border-radius:10px;width:100%;cursor:pointer;font-size:1em;margin:8px 0;transition:opacity .2s}
.share-btn:hover{opacity:.85}
.recommend{margin-top:16px;text-align:center}
.recommend a{display:inline-block;margin:4px 6px;padding:8px 14px;background:#2a2a3e;color:#a29bfe;border-radius:8px;text-decoration:none;font-size:.85em;transition:background .2s}
.recommend a:hover{background:#3a3a5e}
.brain-age{font-size:1.3em;color:#a29bfe;margin:10px 0;font-weight:bold}
.percentile{background:linear-gradient(135deg,#a29bfe22,#6c5ce722);border-radius:10px;padding:12px;margin:12px 0;font-size:1em;color:#a29bfe;font-weight:bold}
.reaction-box{background:#2a2a3e;border-radius:16px;padding:30px;margin:16px 0;cursor:pointer;font-size:1.1em;min-height:120px;display:flex;align-items:center;justify-content:center;transition:background .2s;user-select:none}
.display{font-size:3em;letter-spacing:12px;margin:20px 0;color:#a29bfe;font-weight:bold;min-height:60px}
.status{color:#888;margin:10px 0;font-size:.95em}
.level{font-size:1.1em;color:#a29bfe;margin:10px 0;font-weight:bold}
.grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:16px 0}
.timer-bar{height:6px;background:#2a2a3e;border-radius:3px;margin:16px 0;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#a29bfe,#fd79a8);transition:width .1s linear;width:100%}
</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous">
function _copy(t,b){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>{if(b){b.textContent='복사 완료!';setTimeout(()=>b.textContent=b.dataset.orig||'📋 결과 복사',1500);}}).catch(()=>_copyFallback(t,b));
  } else { _copyFallback(t,b); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}
</script>
</head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">🎯</div>
<h1>집중력 테스트</h1>
<p class="sub">숫자를 기억하고 순서대로 입력하세요!<br>레벨이 올라갈수록 숫자가 늘어납니다.</p>
<button class="btn start-btn" onclick="startGame()">게임 시작</button>
</div>
<div id="game" class="hidden">
<div class="level" id="lvl"></div>
<div class="timer-bar"><div class="timer-fill" id="timer"></div></div>
<div class="display" id="display"></div>
<div class="status" id="status"></div>
<div class="grid" id="grid"></div>
</div>
<div id="result" class="hidden">
<div class="emoji" id="rEmoji"></div>
<div class="result-type" id="rType"></div>
<div class="brain-age" id="rBrain"></div>
<div class="percentile" id="rPct"></div>
<div class="result-desc" id="rDesc"></div>
<button class="share-btn" onclick="copyResult()">결과 복사</button>
<button class="btn start-btn" onclick="location.reload()">다시 하기</button>
<div class="recommend"><span style="color:#888;font-size:.85em">다른 테스트 추천</span><br><a href="mental.html">멘탈 강도</a><a href="empathy.html">공감 능력</a><a href="insider.html">인싸/아싸</a></div>
</div>
</div>
<script>
let level=1,seq=[],userSeq=[],phase='',timerInt,reactionTime=0,reactionDone=false;
function startGame(){document.getElementById('intro').classList.add('hidden');document.getElementById('game').classList.remove('hidden');nextRound();}
function nextRound(){const len=level+2;seq=[];for(let i=0;i<len;i++)seq.push(Math.floor(Math.random()*10));userSeq=[];phase='show';
document.getElementById('lvl').textContent='레벨 '+level+' (숫자 '+len+'개)';
document.getElementById('status').textContent='숫자를 기억하세요!';document.getElementById('grid').innerHTML='';
const d=document.getElementById('display');d.textContent=seq.join(' ');
document.getElementById('timer').style.width='100%';
const showTime=1500+level*500;let elapsed=0;const step=50;
timerInt=setInterval(()=>{elapsed+=step;document.getElementById('timer').style.width=((1-elapsed/showTime)*100)+'%';
if(elapsed>=showTime){clearInterval(timerInt);startInput();}},step);}
function startInput(){phase='input';document.getElementById('display').textContent='_ '.repeat(seq.length).trim();
document.getElementById('status').textContent='숫자를 순서대로 눌러주세요!';
const g=document.getElementById('grid');g.innerHTML='';
for(let i=0;i<=9;i++){const b=document.createElement('button');b.className='btn';b.textContent=i;b.onclick=()=>pressNum(i);g.appendChild(b);}}
function pressNum(n){if(phase!=='input')return;userSeq.push(n);
const d=document.getElementById('display');let txt='';for(let i=0;i<seq.length;i++)txt+=(i<userSeq.length?userSeq[i]:'_')+' ';d.textContent=txt.trim();
const idx=userSeq.length-1;
if(userSeq[idx]!==seq[idx]){gameOver();return;}
if(userSeq.length===seq.length){level++;document.getElementById('status').textContent='정답! 다음 레벨로...';phase='wait';
if(level===4&&!reactionDone){reactionDone=true;setTimeout(startReaction,800);}else{setTimeout(nextRound,1200);}}}
function startReaction(){document.getElementById('display').textContent='';document.getElementById('status').textContent='화면이 초록색이 되면 터치하세요!';document.getElementById('grid').innerHTML='';
const box=document.createElement('div');box.className='reaction-box';box.style.background='#e17055';box.textContent='기다리세요...';
let canClick=false,startT;
box.onclick=function(){if(!canClick){box.textContent='너무 빨라요! 다시...';box.style.background='#e17055';clearTimeout(box._t);box._t=setTimeout(()=>{box.textContent='기다리세요...';box._t=setTimeout(()=>{box.style.background='#00b894';box.textContent='지금! 터치!';canClick=true;startT=Date.now();},1500+Math.random()*2000);},800);return;}
reactionTime=Date.now()-startT;box.textContent=reactionTime+'ms!';box.style.background='#6c5ce7';
setTimeout(nextRound,1200);};
box._t=setTimeout(()=>{box.style.background='#00b894';box.textContent='지금! 터치!';canClick=true;startT=Date.now();},1500+Math.random()*2000);
document.getElementById('grid').appendChild(box);}
function gameOver(){phase='done';clearInterval(timerInt);const streak=level-1;
document.getElementById('game').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
let emoji,type,desc;
let brainAge,pctText;
if(streak>=8){emoji='🧠';type='천재급 집중력! (레벨 '+streak+')';desc='놀라운 집중력과 기억력의 소유자! 숫자 10개 이상을 기억하다니, 당신의 뇌는 슈퍼컴퓨터급입니다.';brainAge=20;pctText='상위 5%';}
else if(streak>=5){emoji='🌟';type='우수한 집중력! (레벨 '+streak+')';desc='평균 이상의 뛰어난 집중력! 복잡한 정보도 잘 처리하는 능력을 가지고 있어요. 꾸준히 훈련하면 더 높은 레벨도 가능해요!';brainAge=25;pctText='상위 20%';}
else if(streak>=3){emoji='👍';type='보통 집중력 (레벨 '+streak+')';desc='일반적인 수준의 집중력입니다. 짧은 시간 집중하는 건 잘하지만, 긴 시퀀스에선 어려움을 느낄 수 있어요. 명상이나 집중력 훈련을 추천해요!';brainAge=35;pctText='상위 50%';}
else{emoji='💪';type='집중력 훈련 필요 (레벨 '+streak+')';desc='집중력을 키울 여지가 많아요! 하루 10분 명상, 숫자 외우기 게임 등으로 꾸준히 훈련해보세요. 분명 좋아질 거예요!';brainAge=45;pctText='상위 75%';}
if(reactionTime>0){brainAge=Math.max(15,brainAge-Math.max(0,Math.floor((400-reactionTime)/30)));desc+=reactionTime<250?' 반응속도도 번개급! ('+reactionTime+'ms)':reactionTime<350?' 반응속도도 빠른 편! ('+reactionTime+'ms)':' 반응속도: '+reactionTime+'ms';}
document.getElementById('rEmoji').textContent=emoji;document.getElementById('rType').textContent=type;document.getElementById('rDesc').textContent=desc;
document.getElementById('rBrain').textContent='두뇌 나이: '+brainAge+'세';
document.getElementById('rPct').textContent=pctText+' 집중력입니다!';
localStorage.setItem('hoit_focus',JSON.stringify({type:type,level:streak,brainAge:brainAge,date:new Date().toISOString()}));}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_focus'));_copy('[hoit.me] 집중력 테스트: 레벨 '+d.level+' (두뇌나이 '+d.brainAge+'세) - https://hoit.me/tests/focus.html',document.querySelector('.share-btn'));}
(function(){const prev=localStorage.getItem('hoit_focus');if(prev){const d=JSON.parse(prev);document.querySelector('.sub').innerHTML='이전 결과: 레벨 '+d.level+' (두뇌나이 '+d.brainAge+'세)<br>다시 도전해볼까요?';}})();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
