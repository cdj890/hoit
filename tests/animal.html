<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>동물 성격 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}
.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);transition:width .3s;width:0}
.question{font-size:1.1em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#6c5ce7,#a29bfe);font-size:1.1em;padding:14px;margin-top:16px}
.start-btn:hover{opacity:.9;background:linear-gradient(135deg,#6c5ce7,#a29bfe)}
.emoji{font-size:4em;margin:16px 0}
.result-type{font-size:1.4em;font-weight:bold;color:#a29bfe;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}
.hidden{display:none}
</style></head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">🐾</div>
<h1>나의 동물 성격 테스트</h1>
<p class="sub">나와 닮은 동물은 무엇일까요?</p>
<button class="btn start-btn" onclick="startQuiz()">테스트 시작하기</button>
</div>
<div id="quiz" class="hidden">
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="question" id="qText"></div>
<div id="opts"></div>
</div>
<div id="result" class="hidden">
<div class="emoji" id="rEmoji"></div>
<div class="result-type" id="rType"></div>
<div class="result-desc" id="rDesc"></div>
<button class="btn start-btn" onclick="location.reload()">다시 하기</button>
</div>
</div>
<script>
const questions=[
{q:"휴일에 가장 하고 싶은 건?",a:[["집에서 혼자 쉬기","cat"],["친구들과 놀기","dog"],["자연 속 산책","bear"],["새로운 곳 탐험","fox"]]},
{q:"친구가 고민을 털어놓으면?",a:[["조용히 들어준다","cat"],["같이 울어준다","dog"],["현실적 조언을 한다","eagle"],["재밌게 풀어준다","dolphin"]]},
{q:"모임에서 나의 역할은?",a:[["관찰자","owl"],["분위기 메이커","dolphin"],["리더","eagle"],["귀여운 막내","rabbit"]]},
{q:"스트레스 해소 방법은?",a:[["혼자만의 시간","cat"],["운동/활동","dog"],["맛있는 음식","bear"],["쇼핑/새로운 경험","fox"]]},
{q:"나의 아침 루틴은?",a:[["알람 5번 후 기상","cat"],["일찍 일어나 활동","dog"],["천천히 여유롭게","bear"],["새벽까지 안 자서 늦게","owl"]]},
{q:"여행 스타일은?",a:[["계획 철저히","owl"],["즉흥적으로","fox"],["맛집 위주","bear"],["액티비티 위주","eagle"]]},
{q:"화가 나면?",a:[["혼자 삭힌다","cat"],["바로 표현한다","dog"],["잊으려 노력한다","rabbit"],["분석하고 정리한다","owl"]]},
{q:"이상적인 주거 환경은?",a:[["아늑한 원룸","cat"],["사람 많은 도심","dog"],["숲 근처 단독주택","bear"],["바다 근처","dolphin"]]}
];
const animals={cat:{e:"🐱",n:"고양이",d:"독립적이고 자유로운 영혼! 혼자만의 시간을 소중히 여기며, 관찰력이 뛰어납니다. 겉으론 쿨하지만 속은 따뜻해요."},dog:{e:"🐶",n:"강아지",d:"충성스럽고 사교적! 주변 사람들에게 에너지를 주는 존재입니다. 함께할 때 가장 행복해요."},bear:{e:"🐻",n:"곰",d:"여유롭고 포근한 성격! 느긋하지만 한번 마음먹으면 강한 추진력을 보여줍니다."},fox:{e:"🦊",n:"여우",d:"영리하고 적응력이 뛰어나요! 호기심이 많고 새로운 것에 두려움이 없습니다."},eagle:{e:"🦅",n:"독수리",d:"리더십과 결단력의 소유자! 높은 곳에서 전체를 보는 시야를 가졌습니다."},dolphin:{e:"🐬",n:"돌고래",d:"유쾌하고 소통 능력이 뛰어나요! 주변을 밝게 만드는 긍정 에너지의 소유자입니다."},owl:{e:"🦉",n:"부엉이",d:"지적이고 신중한 타입! 깊이 있는 사고력과 분석력으로 현명한 판단을 내립니다."},rabbit:{e:"🐰",n:"토끼",d:"순수하고 감성적이에요! 섬세한 감각으로 아름다움을 잘 포착하며 사랑스러운 매력이 넘칩니다."}};
let cur=0,scores={};
function startQuiz(){document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=()=>pick(a[1]);o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=animals[top];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent='당신은 '+r.n+' 타입!';document.getElementById('rDesc').textContent=r.d;}
</script></body></html>
