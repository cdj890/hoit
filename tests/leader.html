function _copy(t,b){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>{if(b){b.textContent='복사 완료!';setTimeout(()=>b.textContent=b.dataset.orig||'📋 결과 복사',1500);}}).catch(()=>_copyFallback(t,b));
  } else { _copyFallback(t,b); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"팀이 위기 상황에 처하면?",a:[["내가 결정하고 이끈다","cha"],["팀원들의 의견을 먼저 듣는다","dem"],["팀원들을 격려하고 지원한다","ser"],["새로운 비전을 제시한다","tra"]]},
{q:"성과를 낼 때 중요한 것은?",a:[["강한 추진력","cha"],["팀원 모두의 참여","dem"],["팀원의 성장","ser"],["혁신적인 변화","tra"]]},
{q:"팀원이 실수했을 때?",a:[["즉시 지적하고 바로잡는다","cha"],["함께 원인을 분석한다","dem"],["이해하고 다시 기회를 준다","ser"],["실수에서 배울 점을 찾는다","tra"]]},
{q:"의사결정 방식은?",a:[["빠르게 내가 결정","cha"],["투표/합의로 결정","dem"],["팀원들에게 위임","ser"],["미래 비전에 맞게 결정","tra"]]},
{q:"팀 분위기를 이렇게 만들고 싶다",a:[["긴장감 있고 효율적","cha"],["자유롭고 민주적","dem"],["따뜻하고 서로 돕는","ser"],["열정적이고 도전적","tra"]]},
{q:"가장 중요하게 생각하는 것은?",a:[["결과와 성과","cha"],["공정한 과정","dem"],["팀원의 행복","ser"],["미래의 가능성","tra"]]},
{q:"새 팀원이 합류하면?",a:[["역할과 기대치를 명확히","cha"],["팀에 소개하고 의견을 물어본다","dem"],["멘토를 붙여주고 케어한다","ser"],["팀의 비전과 꿈을 공유한다","tra"]]},
{q:"나의 리더십 롤모델은?",a:[["스티브 잡스","cha"],["오바마","dem"],["테레사 수녀","ser"],["일론 머스크","tra"]]}
];
const types={cha:{e:"🔥",n:"카리스마 리더",d:"강력한 존재감과 추진력으로 팀을 이끄는 리더! 위기 상황에서 빛나며, 빠른 판단과 실행력이 강점입니다.",t:"<strong>강점:</strong> 결단력, 추진력, 위기대응, 영향력<br><strong>리더십 스타일:</strong> 명확한 방향 제시, 빠른 실행<br><strong>닮은 인물:</strong> 스티브 잡스, 이순신",leader:"이순신 장군",leaderDesc:"위기 속에서 결단력으로 팀을 이끄는 카리스마 리더!",str:"<h4>💪 강점</h4>결단력이 뛰어남<br>위기 대응 능력<br>강한 추진력",weak:"<h4>⚠️ 약점</h4>독단적일 수 있음<br>타인 의견 경시<br>번아웃 위험",radar:[90,50,80,40,95]},
dem:{e:"🤝",n:"민주적 리더",d:"모든 팀원의 의견을 존중하고 합의를 이끌어내는 리더! 공정한 과정을 통해 최선의 결정을 내립니다.",t:"<strong>강점:</strong> 경청, 공정성, 합의도출, 소통<br><strong>리더십 스타일:</strong> 참여형, 토론과 합의 중시<br><strong>닮은 인물:</strong> 넬슨 만델라, 세종대왕",leader:"세종대왕",leaderDesc:"소통과 합의로 모두가 참여하는 리더십의 표본!",str:"<h4>💪 강점</h4>뛰어난 경청 능력<br>공정한 의사결정<br>팀 화합 유도",weak:"<h4>⚠️ 약점</h4>결정이 느릴 수 있음<br>갈등 상황 우유부단<br>효율성 저하 가능",radar:[50,95,70,85,55]},
ser:{e:"💚",n:"서번트 리더",d:"팀원의 성장과 행복을 최우선으로 생각하는 리더! 섬김과 지원을 통해 팀의 잠재력을 이끌어냅니다.",t:"<strong>강점:</strong> 공감, 헌신, 멘토링, 신뢰구축<br><strong>리더십 스타일:</strong> 지원형, 팀원 중심 성장<br><strong>닮은 인물:</strong> 간디, 유관순",leader:"간디",leaderDesc:"섬김과 헌신으로 사람들의 마음을 움직이는 리더!",str:"<h4>💪 강점</h4>깊은 공감 능력<br>팀원 성장 지원<br>강한 신뢰 구축",weak:"<h4>⚠️ 약점</h4>자기 희생 과다<br>강한 결단력 부족<br>성과 압박에 약함",radar:[40,70,60,95,45]},
tra:{e:"🚀",n:"변혁적 리더",d:"혁신적인 비전으로 팀에 영감을 주는 리더! 현재에 안주하지 않고 끊임없이 변화와 도전을 추구합니다.",t:"<strong>강점:</strong> 비전, 혁신, 열정, 영감부여<br><strong>리더십 스타일:</strong> 비전 제시형, 변화 주도<br><strong>닮은 인물:</strong> 일론 머스크, 정주영",leader:"정주영",leaderDesc:"비전과 혁신으로 불가능을 가능으로 만드는 리더!",str:"<h4>💪 강점</h4>강력한 비전 제시<br>혁신적 사고<br>열정으로 영감 부여",weak:"<h4>⚠️ 약점</h4>현실 감각 부족<br>안정성 경시<br>팀원 피로 유발 가능",radar:[75,60,95,55,70]}};
let cur=0,scores={};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';document.getElementById('quiz').classList.add('q-slide');setTimeout(()=>document.getElementById('quiz').classList.remove('q-slide'),350);q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){this.classList.add('selected');setTimeout(()=>pick(a[1]),350)};o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=types[top];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent=r.n;document.getElementById('rDesc').textContent=r.d;document.getElementById('rTraits').innerHTML=r.t;
document.getElementById('rLeader').innerHTML='<div style="font-size:2em;margin-bottom:4px">👑</div><div class="name">당신은 '+r.leader+' 타입!</div><div class="sub-text">'+r.leaderDesc+'</div>';
document.getElementById('rStrength').innerHTML=r.str;document.getElementById('rWeakness').innerHTML=r.weak;
drawRadar(r.radar);
localStorage.setItem('hoit_leader',JSON.stringify({type:r.n,leader:r.leader,date:new Date().toISOString()}));}
function drawRadar(vals){const c=document.getElementById('radarCanvas');const ctx=c.getContext('2d');const cx=110,cy=110,r=80;const labels=['결단력','소통','비전','공감','실행'];const n=5;ctx.clearRect(0,0,220,220);
for(let lv=1;lv<=4;lv++){ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const x=cx+r*lv/4*Math.cos(a);const y=cy+r*lv/4*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.strokeStyle='#2a2a3e';ctx.stroke();}
ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const v=vals[i]/100;const x=cx+r*v*Math.cos(a);const y=cy+r*v*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fillStyle='rgba(9,132,227,0.3)';ctx.fill();ctx.strokeStyle='#74b9ff';ctx.lineWidth=2;ctx.stroke();
for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const x=cx+(r+18)*Math.cos(a);const y=cy+(r+18)*Math.sin(a);ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[i],x,y);}}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_leader'));_copy('[hoit.me] 리더십 유형: '+d.type+' ('+d.leader+' 타입) - https://hoit.me/tests/leader.html',document.querySelector('.share-btn'));}
(function(){const prev=localStorage.getItem('hoit_leader');if(prev){const d=JSON.parse(prev);document.querySelector('.sub').textContent='이전 결과: '+d.type+' | 다시 해볼까요?';}})();
</script><div style="max-width:440px;margin:16px auto;padding:0 8px"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
