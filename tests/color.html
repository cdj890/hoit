let firstColor=-1;
function showColors(){
  const prev=localStorage.getItem('hoit_color');
  const prevText=prev?'<p style="color:#666;font-size:12px;margin-bottom:5px">이전 결과: '+JSON.parse(prev).type+' | 다시 해볼까요?</p>':'';
  document.getElementById('app').innerHTML=`
    <h1>🎨 색깔 심리 테스트</h1>
    <p class="sub">지금 가장 끌리는 색깔을 직감적으로 선택하세요!</p>
    ${prevText}
    <p style="color:#666;font-size:12px;margin-bottom:15px">너무 오래 생각하지 말고 본능적으로!</p>
    <div class="colors">
      ${COLORS.map((c,i)=>`<div class="color-btn" style="background:${c.bg}" onclick="pickFirst(${i})">${c.emoji}<br>${c.name}</div>`).join('')}
    </div>`;
}
function pickFirst(i){
  firstColor=i;
  document.querySelectorAll('.color-btn')[i].classList.add('selected');
  setTimeout(()=>showSecondPick(i),400);
}
function showSecondPick(first){
  document.getElementById('app').innerHTML=`
    <h1>🎨 두 번째 색깔 선택</h1>
    <p class="sub">첫 번째: ${COLORS[first].emoji} ${COLORS[first].name}</p>
    <p style="color:#666;font-size:12px;margin-bottom:15px">두 번째로 끌리는 색을 골라주세요 (더 깊은 분석!)</p>
    <div class="colors">
      ${COLORS.map((c,i)=>i===first?`<div class="color-btn" style="background:${c.bg};opacity:0.3">${c.emoji}<br>${c.name}</div>`:`<div class="color-btn" style="background:${c.bg}" onclick="showResult(${first},${i})">${c.emoji}<br>${c.name}</div>`).join('')}
    </div>`;
}

function showResult(i,j){
  const c=COLORS[i];
  const today=new Date();const seed=today.getFullYear()*10000+today.getMonth()*100+today.getDate();
  const luckyIdx=seed%COLORS.length;const luckyC=COLORS[luckyIdx];
  const comboText=(j!==undefined&&c.comboWith[j])?c.comboWith[j]:'';
  const secondC=j!==undefined?COLORS[j]:null;
  localStorage.setItem('hoit_color',JSON.stringify({type:c.name+'을 선택한 당신',name:c.name,date:new Date().toISOString()}));
  document.getElementById('app').innerHTML=`
    <div class="result">
      <div class="r-color" style="background:${c.bg}">${c.emoji}</div>
      <h2 style="text-align:center;color:${c.bg}">${c.name}을 선택한 당신</h2>
      <p style="text-align:center;color:#aaa;margin:8px 0 15px">${c.psych}</p>
      ${secondC?`<div class="combo-section"><h3 style="color:${secondC.bg}">🎨 ${c.name} + ${secondC.name} 조합 분석</h3><div class="combo-colors"><div class="combo-swatch" style="background:${c.bg}"></div><div class="combo-swatch" style="background:${secondC.bg}"></div></div><p style="color:#ccc;font-size:13px">${comboText}</p></div>`:''}
      <div class="section"><h3 style="color:#FFD700">🧠 심리 분석</h3><p>${c.detail}</p></div>
      <div class="section"><h3 style="color:#FF69B4">💕 연애 스타일</h3><p>${c.love}</p></div>
      <div class="section"><h3 style="color:#7FFFD4">🧘 스트레스 해소법</h3><p>${c.stress}</p></div>
      <div class="lucky-color"><h3 style="color:#FFD700;font-size:14px;margin-bottom:6px">🍀 오늘의 행운 컬러</h3><div class="combo-swatch" style="background:${luckyC.bg};margin:8px auto;width:50px;height:50px"></div><p style="color:#ccc;font-size:13px">${luckyC.emoji} ${luckyC.name} - ${c.lucky}</p></div>
      <div class="combo-section"><h3 style="color:#9B59B6">🎨 컬러 하모니</h3><div class="combo-colors">${c.harmony.map(h=>`<div class="combo-swatch" style="background:${h}"></div>`).join('')}</div><p style="color:#ccc;font-size:13px">이 색들과 함께하면 당신의 매력이 배가됩니다</p></div>
      <div class="interior-tip"><h3 style="color:#FF8C00;font-size:14px;margin-bottom:6px">🏠 인테리어/패션 추천</h3>${c.interiorTip}</div>
      <button class="share-btn" onclick="copyResult()">결과 복사</button>
      <button class="btn" onclick="firstColor=-1;showColors()">다시 선택하기</button>
      <div class="recommend"><span style="color:#888;font-size:12px">다른 테스트 추천</span><br><a href="firstimp.html">첫인상</a><a href="empathy.html">공감 능력</a><a href="food.html">음식 성격</a></div>
    </div>`;
}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_color'));_copy('[hoit.me] 색깔 심리: '+d.name+' - https://hoit.me/tests/color.html',document.querySelector('.share-btn'));}
showColors();
