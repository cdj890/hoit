<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"회의에서 의견 충돌이 생기면?",a:[["내 의견을 강하게 주장한다","D"],["분위기를 풀어 합의를 이끈다","I"],["다수 의견을 따른다","S"],["데이터로 논리적 판단한다","C"]]},
{q:"새 프로젝트를 맡으면?",a:[["바로 실행한다","D"],["팀원들과 아이디어 회의","I"],["기존 방법을 참고한다","S"],["철저히 계획을 세운다","C"]]},
{q:"상사에게 부당한 지시를 받으면?",a:[["직접 이의를 제기한다","D"],["우회적으로 의견을 전달","I"],["일단 따르고 나중에 고민","S"],["근거를 정리해 보고한다","C"]]},
{q:"팀원이 실수했을 때?",a:[["결과에 집중하여 지적한다","D"],["격려하며 해결책을 같이 찾는다","I"],["이해하고 도와준다","S"],["원인을 분석해 재발 방지","C"]]},
{q:"업무 스타일은?",a:[["빠르고 결과지향적","D"],["다양한 일을 동시에","I"],["꾸준하고 안정적","S"],["정확하고 꼼꼼하게","C"]]},
{q:"칭찬을 받으면?",a:[["당연한 결과라 생각","D"],["기분 좋게 모두와 나눈다","I"],["쑥스럽지만 기쁘다","S"],["객관적 평가인지 확인한다","C"]]},
{q:"점심 메뉴 정할 때?",a:[["내가 정한다","D"],["다같이 투표하자!","I"],["남들이 정하는 거 따라간다","S"],["리뷰 확인 후 결정","C"]]},
{q:"이메일 작성 스타일은?",a:[["짧고 핵심만","D"],["친근하고 이모티콘도 사용","I"],["정중하고 부드럽게","S"],["상세하고 정확하게","C"]]}
];
const types={D:{e:"🦁",n:"D - 주도형 (Dominance)",d:"목표 지향적이고 결단력이 있는 리더! 빠른 판단과 추진력으로 결과를 만들어냅니다.",t:"<strong>💪 강점:</strong> 결단력, 추진력, 리더십, 도전정신<br><strong>🏢 업무 스타일:</strong> 빠른 의사결정, 결과중심, 효율 추구<br><strong>⚠️ 주의점:</strong> 타인의 감정을 고려하면 더 좋은 리더가 될 수 있어요",work:"🏋️ 업무 스타일: 도전적인 목표를 세우고 빠르게 실행합니다. 불필요한 회의를 싫어하며, 결과로 말하는 타입입니다.",team:"팀 역할: 프로젝트 리더, 위기 상황의 의사결정자. 팀에 방향성과 추진력을 제공합니다.",conflict:"갈등 해결법: 직접적으로 문제를 짚되, 상대의 의견을 먼저 들어보세요. '왜'보다 '어떻게 해결할까'에 집중하면 효과적입니다.",famous:"유명인 예시: 스티브 잡스, 일론 머스크, 마거릿 대처, 나폴레옹"},
I:{e:"🌟",n:"I - 사교형 (Influence)",d:"밝은 에너지로 사람들을 이끄는 인플루언서! 소통과 설득력이 뛰어납니다.",t:"<strong>💪 강점:</strong> 소통능력, 열정, 창의성, 낙관적<br><strong>🏢 업무 스타일:</strong> 협업 선호, 아이디어 제안, 분위기 메이커<br><strong>⚠️ 주의점:</strong> 디테일과 마감 관리에 신경 쓰면 완벽해져요",work:"🎤 업무 스타일: 브레인스토밍과 협업을 즐기며, 밝은 분위기로 팀 사기를 높입니다. 새로운 아이디어가 넘치는 타입입니다.",team:"팀 역할: 팀 분위기 메이커, 대외 커뮤니케이션 담당. 창의적 아이디어와 에너지를 팀에 불어넣습니다.",conflict:"갈등 해결법: 유머로 분위기를 풀되, 감정에 휩쓸리지 마세요. 구체적인 사실에 기반해서 이야기하면 설득력이 배가됩니다.",famous:"유명인 예시: 오프라 윈프리, 윌 스미스, 유재석, 로빈 윌리엄스"},
S:{e:"🕊️",n:"S - 안정형 (Steadiness)",d:"믿음직하고 따뜻한 팀의 기둥! 안정적이고 인내심이 강합니다.",t:"<strong>💪 강점:</strong> 인내심, 경청, 협조성, 신뢰감<br><strong>🏢 업무 스타일:</strong> 꾸준한 실행, 팀워크 중시, 안정적<br><strong>⚠️ 주의점:</strong> 자기 의견을 더 표현하면 성장이 빨라져요",work:"🤲 업무 스타일: 꾸준하고 성실하게 업무를 수행합니다. 급격한 변화보다 안정적인 환경에서 최고의 성과를 냅니다.",team:"팀 역할: 팀의 중재자, 꾸준한 실행자. 갈등을 조율하고 팀원들의 이야기를 경청합니다.",conflict:"갈등 해결법: 의견이 있으면 참지 말고 부드럽게 표현하세요. '저는 이렇게 생각하는데요'로 시작하면 부담 없이 말할 수 있어요.",famous:"유명인 예시: 간디, 넬슨 만델라, 이순신, 마더 테레사"},
C:{e:"🔍",n:"C - 신중형 (Conscientiousness)",d:"정확하고 분석적인 완벽주의자! 품질과 정확성을 최우선으로 합니다.",t:"<strong>💪 강점:</strong> 분석력, 정확성, 체계성, 전문성<br><strong>🏢 업무 스타일:</strong> 데이터 기반, 완벽 추구, 체계적 관리<br><strong>⚠️ 주의점:</strong> 완벽하지 않아도 된다는 여유를 가져보세요",work:"📐 업무 스타일: 철저한 분석과 계획 후에 실행합니다. 데이터와 근거를 중시하며, 높은 품질 기준을 유지합니다.",team:"팀 역할: 품질 관리자, 데이터 분석 담당. 팀의 결정에 객관적 근거를 제공합니다.",conflict:"갈등 해결법: 감정보다 사실에 집중하되, 상대의 감정도 인정해주세요. '당신 말도 일리가 있지만, 데이터를 보면...'이 효과적입니다.",famous:"유명인 예시: 빌 게이츠, 아인슈타인, 셜록 홈즈, 마리 퀴리"}};
let cur=0,scores={};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';const qEl=document.getElementById('qText');qEl.textContent=(cur+1)+'. '+q.q;qEl.classList.remove('q-slide');void qEl.offsetWidth;qEl.classList.add('q-slide');const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){if(window._picking)return;window._picking=true;b.classList.add('selected');setTimeout(()=>{window._picking=false;pick(a[1]);},400);};o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=types[top];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent=r.n;document.getElementById('rDesc').textContent=r.d;document.getElementById('rTraits').innerHTML=r.t;
document.getElementById('q'+top).classList.add('active');
const total=(scores.D||0)+(scores.I||0)+(scores.S||0)+(scores.C||0)||1;const dPct=(scores.D||0)/total,iPct=(scores.I||0)/total,sPct=(scores.S||0)/total,cPct=(scores.C||0)/total;
const dot=document.getElementById('qDot');const xPct=50+(iPct-sPct)*100+(dPct-cPct)*30;const yPct=50+(sPct-dPct)*100+(cPct-iPct)*30;
setTimeout(()=>{dot.style.left=Math.max(5,Math.min(92,xPct))+'%';dot.style.top=Math.max(5,Math.min(92,yPct))+'%';},200);
document.getElementById('rWorkStyle').innerHTML='<div class="card-title">업무 스타일</div>'+r.work;
document.getElementById('rTeamRole').innerHTML='<div class="card-title">팀 역할 추천</div>'+r.team;
document.getElementById('rConflict').innerHTML='<div class="card-title">갈등 해결 팁</div>'+r.conflict;
document.getElementById('rFamous').innerHTML='<strong>같은 유형 유명인:</strong><br>'+r.famous;
localStorage.setItem('disc_result',JSON.stringify({type:r.n,emoji:r.e,date:new Date().toLocaleDateString('ko-KR')}));}
function copyResult(){const t=document.getElementById('rType').textContent+'\n'+document.getElementById('rDesc').textContent;_copy('[DISC 성격 테스트 결과]\n'+t,document.querySelector('.share-btn'));}
(function(){const p=localStorage.getItem('disc_result');if(p){try{const d=JSON.parse(p);document.getElementById('prevResult').innerHTML='<div class="prev-result">이전 결과: '+d.emoji+' '+d.type+' ('+d.date+')</div>';}catch(e){}}})();
</script><section style="max-width:700px;margin:30px auto;padding:20px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;color:#bbb;font-size:14px;line-height:1.8">
