*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fdcb6e,#f39c12);transition:width .3s;width:0}
.question{font-size:1.05em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#1a1a2e;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#fdcb6e;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
.gauge{width:200px;height:100px;margin:10px auto;position:relative;overflow:hidden}
.gauge-bg{width:200px;height:100px;border-radius:100px 100px 0 0;background:#2a2a3e;position:absolute}
.gauge-fill{width:200px;height:100px;border-radius:100px 100px 0 0;background:conic-gradient(from 0.75turn,#e17055,#fdcb6e,#00b894);position:absolute;transform-origin:bottom center;clip-path:inset(0 0 0 0)}
.gauge-mask{width:160px;height:80px;border-radius:80px 80px 0 0;background:#1a1a2e;position:absolute;top:20px;left:20px}
.gauge-needle{width:3px;height:80px;background:#fff;position:absolute;bottom:0;left:50%;transform-origin:bottom center;transform:translateX(-50%) rotate(-90deg);transition:transform 1s;border-radius:2px}
.gauge-score{position:absolute;bottom:5px;width:100%;text-align:center;font-size:1.3em;font-weight:bold;color:#fdcb6e}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.q-slide{animation:slideIn .35s ease}
.btn.selected{background:#fdcb6e!important;color:#1a1a2e!important;animation:pulse .3s ease}
.btn.selected::after{content:' \2713';font-weight:bold}
.result-card{background:linear-gradient(135deg,#1a1a2e,#2a2a3e);border:2px solid transparent;border-image:linear-gradient(135deg,#fdcb6e,#f39c12) 1;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(243,156,18,.15)}
.sub-scores{text-align:left;margin:16px 0}
.sub-score{margin:8px 0}.sub-score label{font-size:.85em;color:#aaa;display:flex;justify-content:space-between}
.sub-score .bar{height:10px;background:#2a2a3e;border-radius:5px;overflow:hidden;margin-top:3px}
.sub-score .bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
.percentile{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#1a1a2e;border-radius:10px;padding:12px;margin:12px 0;font-weight:bold;font-size:.95em}
.tip-box{background:#2a2a3e;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:.88em;line-height:1.7;color:#ddd}
.share-box{display:flex;gap:8px;margin-top:14px;justify-content:center}
.share-btn{padding:10px 18px;border:none;border-radius:10px;font-size:.85em;cursor:pointer;font-weight:bold;transition:opacity .2s}
.share-btn:hover{opacity:.8}
.share-copy{background:#fdcb6e;color:#1a1a2e}
.share-other{background:#2a2a3e;color:#e0e0e0}
.prev-result{background:#2a2a3e;border-radius:10px;padding:12px;margin-bottom:16px;font-size:.85em;color:#aaa}
.time-est{color:#888;font-size:.85em;margin-top:8px}

<script>function _copy(t,b){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}).catch(function(){_copyFB(t,b)});}else{_copyFB(t,b);}}function _copyFB(t,b){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}catch(e){alert('복사 실패');}document.body.removeChild(ta);}</script></head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">💛</div>
<h1>감성지능(EQ) 테스트</h1>
<p class="sub">당신의 감성지능 수준을 측정해보세요</p>
<p class="time-est">예상 소요시간: 약 2분</p>
<div id="prevResult"></div>
<button class="btn start-btn" onclick="startQuiz()">테스트 시작하기</button>
</div>

</div>

</div>

<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"친구가 화가 나서 불합리한 말을 하면?",cat:"empathy",a:[["나도 화가 난다",1],["일단 들어주고 나중에 이야기한다",3],["왜 화가 났는지 이해하려 한다",4]]},
{q:"실패했을 때 나의 반응은?",cat:"regulation",a:[["자책하며 오래 괴로워한다",1],["아쉽지만 빨리 털어낸다",3],["원인을 분석하고 다음에 반영한다",4]]},
{q:"모르는 사람들과의 모임에서?",cat:"social",a:[["매우 불편하다",1],["어색하지만 노력한다",2],["먼저 다가가 대화한다",4]]},
{q:"갑자기 계획이 변경되면?",cat:"regulation",a:[["매우 스트레스받는다",1],["약간 당황하지만 적응한다",3],["유연하게 대처한다",4]]},
{q:"누군가 나를 비판하면?",cat:"awareness",a:[["감정적으로 반응한다",1],["기분이 나쁘지만 참는다",2],["건설적 부분을 수용한다",4]]},
{q:"슬픈 영화를 볼 때?",cat:"empathy",a:[["잘 안 운다",2],["눈물이 좀 난다",3],["깊이 공감하며 운다",4]]},
{q:"후배가 같은 실수를 반복하면?",cat:"social",a:[["짜증이 난다",1],["한번 더 설명해준다",3],["다른 방식으로 가르쳐본다",4]]},
{q:"자신의 감정 상태를?",cat:"awareness",a:[["잘 모르겠다",1],["대략적으로 안다",2],["구체적으로 파악하고 있다",4]]},
{q:"의견 충돌 시?",cat:"social",a:[["내 주장을 끝까지 한다",1],["적당히 양보한다",2],["서로 만족할 해결책을 찾는다",4]]},
{q:"기분이 안 좋은 날?",cat:"regulation",a:[["주변에 티가 많이 난다",1],["혼자 삭인다",2],["원인을 찾고 기분전환한다",4]]}
];
let cur=0,total=0,catScores={awareness:0,regulation:0,empathy:0,social:0},catMax={awareness:0,regulation:0,empathy:0,social:0};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';const qEl=document.getElementById('qText');qEl.textContent=(cur+1)+'. '+q.q;qEl.classList.remove('q-slide');void qEl.offsetWidth;qEl.classList.add('q-slide');const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){if(window._picking)return;window._picking=true;b.classList.add('selected');setTimeout(()=>{window._picking=false;pick(a[1],q.cat);},400);};o.appendChild(b);});}
function pick(v,cat){total+=v;catScores[cat]=(catScores[cat]||0)+v;catMax[cat]=(catMax[cat]||0)+4;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const score=Math.min(100,Math.round(total/40*100));const deg=-90+score*1.8;
document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
setTimeout(()=>document.getElementById('needle').style.transform='translateX(-50%) rotate('+deg+'deg)',100);
document.getElementById('scoreText').textContent=score+'점';
const pct=score>=80?5:score>=70?15:score>=60?30:score>=50?50:score>=40?65:80;
document.getElementById('rPercentile').textContent='상위 '+pct+'%에 해당합니다';
const catNames={awareness:'자기인식',regulation:'감정조절',empathy:'공감능력',social:'사회성'};
const catColors={awareness:'#e74c3c',regulation:'#3498db',empathy:'#2ecc71',social:'#f39c12'};
const subEl=document.getElementById('rSubScores');subEl.innerHTML='';
let weakest='awareness',weakVal=100;
Object.keys(catNames).forEach(k=>{const v=Math.min(100,Math.round((catScores[k]||0)/(catMax[k]||1)*100));if(v<weakVal){weakVal=v;weakest=k;}const d=document.createElement('div');d.className='sub-score';d.innerHTML='<label><span>'+catNames[k]+'</span><span>'+v+'점</span></label><div class="bar"><div class="bar-fill" style="width:0;background:'+catColors[k]+'"></div></div>';subEl.appendChild(d);setTimeout(()=>d.querySelector('.bar-fill').style.width=v+'%',200);});
const tips={awareness:'자기인식 향상 팁: 매일 잠들기 전 오늘 느낀 감정 3가지를 일기에 적어보세요. "왜 그런 감정을 느꼈는지"까지 쓰면 자기이해가 깊어집니다.',regulation:'감정조절 향상 팁: 감정이 격해질 때 4-7-8 호흡법(4초 들이쉬고, 7초 멈추고, 8초 내쉬기)을 시도해보세요. 반응하기 전 6초간 멈추는 습관이 큰 차이를 만듭니다.',empathy:'공감능력 향상 팁: 대화할 때 상대의 말을 그대로 반영해주세요. "그래서 네가 속상했구나"처럼 감정을 읽어주면 공감 능력이 크게 성장합니다.',social:'사회성 향상 팁: 하루에 한 명에게 먼저 인사하거나 안부를 물어보세요. 작은 사회적 상호작용을 늘리면 관계 능력이 자연스럽게 향상됩니다.'};
document.getElementById('rTips').innerHTML='<strong>약점 보완 가이드:</strong><br>'+tips[weakest];
let emoji,type,desc;
if(score>=80){emoji='🌟';type='EQ 마스터';desc='당신의 감성지능은 매우 높습니다! 자신과 타인의 감정을 잘 이해하고, 갈등 상황에서도 현명하게 대처합니다. 주변 사람들에게 정서적 안정감을 주는 존재예요.';}
else if(score>=60){emoji='😊';type='감성 우수';desc='꽤 높은 감성지능을 가지고 있어요! 대부분의 상황에서 공감과 소통을 잘 하며, 감정 조절도 양호합니다. 조금만 더 노력하면 EQ 마스터가 될 수 있어요.';}
else if(score>=40){emoji='🙂';type='감성 보통';desc='평균적인 감성지능 수준입니다. 감정을 인식하는 능력은 있지만, 조절과 표현에서 개선의 여지가 있어요. 타인의 감정에 좀 더 관심을 가져보세요.';}
else{emoji='💪';type='감성 성장 중';desc='감성지능을 키울 여지가 많아요! 자신의 감정을 일기로 기록하고, 상대방의 입장에서 생각하는 연습을 해보세요. 작은 노력이 큰 변화를 만들어요.';}
document.getElementById('rEmoji').textContent=emoji;document.getElementById('rType').textContent=type+' ('+score+'점)';document.getElementById('rDesc').textContent=desc;
localStorage.setItem('eq_result',JSON.stringify({score:score,type:type,date:new Date().toLocaleDateString('ko-KR')}));}
function copyResult(){const t=document.getElementById('rType').textContent+'\n'+document.getElementById('rPercentile').textContent;_copy('[EQ 테스트 결과]\n'+t,document.querySelector('.share-btn'));}
(function(){const p=localStorage.getItem('eq_result');if(p){try{const d=JSON.parse(p);document.getElementById('prevResult').innerHTML='<div class="prev-result">이전 결과: '+d.type+' - '+d.score+'점 ('+d.date+')</div>';}catch(e){}}})();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
