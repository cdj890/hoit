<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>직업 적성 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fd79a8,#e84393);transition:width .3s;width:0}
.question{font-size:1.1em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#fd79a8;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:10px;font-size:.95em}
.careers{background:#2a2a3e;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:.9em;line-height:1.8;color:#ddd}
.hidden{display:none}
</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">💼</div>
<h1>직업 적성 테스트</h1>
<p class="sub">Holland 이론 기반 직업 적성을 알아보세요</p>
<button class="btn start-btn" onclick="startQuiz()">테스트 시작하기</button>
</div>
<div id="quiz" class="hidden">
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="question" id="qText"></div>
<div id="opts"></div>
</div>
<div id="result" class="hidden">
<div class="emoji" id="rEmoji"></div>
<div class="result-type" id="rType"></div>
<div class="result-desc" id="rDesc"></div>
<div class="careers" id="rCareers"></div>
<button class="btn start-btn" onclick="location.reload()">다시 하기</button>
</div>
</div>
<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"주말에 하고 싶은 활동은?",a:[["DIY/만들기","R"],["과학 다큐 보기","I"],["그림/음악 감상","A"],["봉사활동","S"],["사업 아이디어 구상","E"],["정리정돈/계획짜기","C"]]},
{q:"학교에서 좋아했던 과목은?",a:[["체육/기술","R"],["수학/과학","I"],["미술/음악","A"],["도덕/사회","S"]]},
{q:"팀 프로젝트에서 선호하는 역할?",a:[["실행/제작 담당","R"],["조사/분석 담당","I"],["디자인/기획 담당","A"],["조율/소통 담당","S"],["팀장/리더","E"],["일정/자료 관리","C"]]},
{q:"스트레스 해소 방법은?",a:[["운동/야외활동","R"],["독서/공부","I"],["창작활동","A"],["사람들과 대화","S"]]},
{q:"이상적인 직장 환경은?",a:[["현장/야외","R"],["연구실/조용한 곳","I"],["자유로운 공간","A"],["사람이 많은 곳","S"],["경쟁적 환경","E"],["체계적 사무실","C"]]},
{q:"가장 중요하게 생각하는 가치?",a:[["실용성","R"],["진리탐구","I"],["자기표현","A"],["타인 도움","S"],["성취/성공","E"],["안정/질서","C"]]},
{q:"칭찬받을 때 가장 기쁜 말?",a:[["손재주가 좋다","R"],["똑똑하다","I"],["감각적이다","A"],["따뜻하다","S"],["능력있다","E"],["꼼꼼하다","C"]]},
{q:"여행지에서 가장 하고 싶은 것?",a:[["액티비티/스포츠","R"],["박물관/유적지","I"],["갤러리/공연","A"],["현지인과 교류","S"]]},
{q:"용돈/월급을 가장 쓰고 싶은 곳?",a:[["장비/도구","R"],["책/강의","I"],["공연/전시","A"],["선물/기부","S"],["투자/사업","E"],["저축/보험","C"]]},
{q:"10년 후 나의 모습?",a:[["전문 기술자","R"],["연구원/학자","I"],["아티스트","A"],["상담사/교사","S"],["CEO/사업가","E"],["관리자/공무원","C"]]}
];
const types={R:{e:"🔧",n:"현실형 (Realistic)",d:"실용적이고 손재주가 뛰어나며, 구체적인 결과물을 만드는 것을 좋아합니다.",c:"엔지니어, 건축가, 요리사, 운동선수, 정비사, 농업전문가, 소방관"},
I:{e:"🔬",n:"탐구형 (Investigative)",d:"분석적이고 호기심이 많으며, 문제의 원인을 파헤치는 것을 즐깁니다.",c:"과학자, 의사, 프로그래머, 데이터분석가, 연구원, 약사"},
A:{e:"🎨",n:"예술형 (Artistic)",d:"창의적이고 감성적이며, 자유로운 자기표현을 추구합니다.",c:"디자이너, 작가, 음악가, 사진작가, 영화감독, 건축 디자이너"},
S:{e:"🤝",n:"사회형 (Social)",d:"타인을 돕는 것에 보람을 느끼며, 뛰어난 소통 능력을 가졌습니다.",c:"교사, 상담사, 간호사, 사회복지사, HR전문가, 의사"},
E:{e:"📈",n:"기업형 (Enterprising)",d:"리더십과 추진력이 있으며, 목표 달성과 성취를 중시합니다.",c:"CEO, 마케터, 영업전문가, 변호사, PD, 정치인, 창업가"},
C:{e:"📊",n:"관습형 (Conventional)",d:"꼼꼼하고 체계적이며, 정확하고 안정적인 업무를 선호합니다.",c:"회계사, 공무원, 은행원, 비서, 세무사, 품질관리사"}};
let cur=0,scores={};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=()=>pick(a[1]);o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];const r=types[top];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent=r.n;document.getElementById('rDesc').textContent=r.d;document.getElementById('rCareers').innerHTML='<strong>추천 직업:</strong><br>'+r.c.split(', ').map(c=>'• '+c).join('<br>');}
</script></body></html>
