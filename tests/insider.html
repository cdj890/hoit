<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>인싸/아싸 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#ff6b6b,#feca57);transition:width .3s;width:0}
.question{font-size:1.05em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#ff6b6b,#feca57);color:#1a1a2e;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#feca57;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
.gauge-bar{height:30px;background:#2a2a3e;border-radius:15px;margin:16px 0;position:relative;overflow:hidden}
.gauge-fill{height:100%;border-radius:15px;transition:width 1s;background:linear-gradient(90deg,#636e72,#ff6b6b,#feca57)}
.gauge-labels{display:flex;justify-content:space-between;font-size:.85em;color:#aaa;margin-bottom:4px}
.pct{font-size:1.5em;font-weight:bold;color:#feca57;margin:8px 0}
</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">🎉</div>
<h1>인싸/아싸 테스트</h1>
<p class="sub">당신의 사회성 레벨은?</p>
<button class="btn start-btn" onclick="startQuiz()">테스트 시작하기</button>
</div>
<div id="quiz" class="hidden">
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="question" id="qText"></div>
<div id="opts"></div>
</div>
<div id="result" class="hidden">
<div class="emoji" id="rEmoji"></div>
<div class="result-type" id="rType"></div>
<div class="pct" id="rPct"></div>
<div class="gauge-labels"><span>🏠 아싸</span><span>인싸 🎉</span></div>
<div class="gauge-bar"><div class="gauge-fill" id="bar"></div></div>
<div class="result-desc" id="rDesc"></div>
<button class="btn start-btn" onclick="location.reload()">다시 하기</button>
</div>
</div>
<script>
const questions=[
{q:"카톡 단체방 몇 개?",a:[["2개 이하",1],["3~5개",2],["6~10개",3],["셀 수 없다",4]]},
{q:"금요일 밤, 갑자기 모임 연락이 오면?",a:[["핑계 대고 안 간다",1],["고민하다 안 간다",2],["고민하다 간다",3],["무조건 간다!!",4]]},
{q:"처음 보는 사람에게?",a:[["말 걸기 어렵다",1],["상대가 먼저 말 걸면 OK",2],["필요하면 먼저 말 건다",3],["먼저 말 걸고 친해진다",4]]},
{q:"SNS 활동은?",a:[["거의 안 한다",1],["눈팅 위주",2],["가끔 올린다",3],["매일 스토리 업로드",4]]},
{q:"노래방에서?",a:[["안 간다",1],["앉아서 탬버린",2],["몇 곡 부른다",3],["마이크 놓지 않는다",4]]},
{q:"새 학기/새 직장 첫날?",a:[["극도로 긴장",1],["조용히 관찰",2],["옆자리와 대화 시도",3],["여기저기 인사하며 다닌다",4]]},
{q:"생일파티를 한다면?",a:[["혼자 조용히",1],["친한 친구 2-3명",2],["10명 정도 모임",3],["대규모 파티!",4]]},
{q:"길에서 아는 사람을 보면?",a:[["못 본 척 한다",1],["눈 마주치면 인사",2],["먼저 인사한다",3],["달려가서 반갑게!",4]]}
];
let cur=0,total=0;
function startQuiz(){document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=()=>pick(a[1]);o.appendChild(b);});}
function pick(v){total+=v;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const pct=Math.round((total-8)/24*100);
document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
setTimeout(()=>document.getElementById('bar').style.width=pct+'%',100);
document.getElementById('rPct').textContent='인싸력 '+pct+'%';
let emoji,type,desc;
if(pct>=80){emoji='🥳';type='핵인싸';desc='당신은 어디서든 분위기를 주도하는 핵인싸! 사람들이 자연스럽게 모이는 매력의 소유자예요. 파티의 중심은 언제나 당신!';}
else if(pct>=60){emoji='😎';type='인싸';desc='사교성이 좋은 인싸 타입! 적절한 사교 스킬로 어디서든 잘 어울려요. 모임에 가면 금방 친해지는 능력자!';}
else if(pct>=40){emoji='🙂';type='중간계 (인싸쏘싸)';desc='상황에 따라 인싸도 아싸도 될 수 있는 밸런스형! 친한 사람들과는 인싸, 처음 보는 사람들과는 약간 쑥스러워요.';}
else if(pct>=20){emoji='📚';type='아싸';desc='혼자만의 시간을 소중히 여기는 아싸! 소수의 깊은 관계를 선호해요. 집이 세상에서 제일 좋은 곳이죠.';}
else{emoji='🏠';type='핵아싸';desc='집이 곧 천국인 핵아싸! 혼자 있을 때 가장 편안하고 행복해요. 사회성보다 자기만의 세계가 풍요로운 사람이에요.';}
document.getElementById('rEmoji').textContent=emoji;document.getElementById('rType').textContent=type;document.getElementById('rDesc').textContent=desc;}
</script></body></html>
