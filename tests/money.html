<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"월급날! 가장 먼저 하는 것은?",a:[["저축 계좌로 이체",1],["고정비 정리 후 저축",2],["일단 필요한 거 사기",3],["쇼핑 GO!",4]]},
{q:"마음에 드는 옷이 비싸다면?",a:[["절대 안 산다",1],["할인 때까지 기다린다",2],["고민하다 산다",3],["바로 산다",4]]},
{q:"편의점에서?",a:[["꼭 필요한 것만",1],["1+1 위주로",2],["눈에 띄면 사기도",3],["손 가는 대로",4]]},
{q:"친구 생일 선물 예산?",a:[["만원 이하",1],["2~3만원",2],["5만원 정도",3],["가격 상관없이 좋은 걸로",4]]},
{q:"가계부를?",a:[["매일 쓴다",1],["앱으로 관리한다",2],["가끔 쓴다",3],["안 쓴다",4]]},
{q:"갑자기 100만원이 생기면?",a:[["전액 저축",1],["80% 저축 20% 사용",2],["반반",3],["일단 쓰고 본다",4]]},
{q:"택시 vs 버스?",a:[["무조건 버스",1],["보통 버스, 급할 때 택시",2],["상황에 따라 반반",3],["편한 게 최고 택시!",4]]},
{q:"세일 기간에?",a:[["관심 없다",1],["필요한 것만 산다",2],["좀 사게 된다",3],["지름신 강림!",4]]}
];
const types=[
{min:8,max:13,e:"💎",n:"짠돌이/짠순이",d:"철저한 절약 정신의 소유자! 한 푼도 허투루 쓰지 않는 저축왕입니다.",a:"<strong>💡 재테크 조언:</strong><br>• 절약은 훌륭하지만 가끔은 자신에게 투자하세요<br>• 저축한 돈을 투자로 불리는 것도 고려해보세요<br>• 경험에 대한 소비도 가치 있답니다"},
{min:14,max:19,e:"🐿️",n:"알뜰족",d:"현명한 소비와 저축의 균형! 필요한 곳에 쓰되 불필요한 지출은 꼭 줄이는 합리적 타입입니다.",a:"<strong>💡 재테크 조언:</strong><br>• 이미 좋은 습관을 가지고 있어요!<br>• 재테크 공부를 통해 자산을 늘려보세요<br>• 비상금은 월급의 3개월치를 추천해요"},
{min:20,max:25,e:"⚖️",n:"밸런스형",d:"적당히 쓰고 적당히 모으는 타입! YOLO와 저축 사이에서 균형을 찾고 있어요.",a:"<strong>💡 재테크 조언:</strong><br>• 자동이체로 저축 비율을 조금 높여보세요<br>• 충동구매 전 24시간 룰을 적용해보세요<br>• 소비 기록을 시작하면 변화가 시작됩니다"},
{min:26,max:32,e:"🛍️",n:"플렉스왕",d:"인생은 즐기는 거! 원하는 것에 과감히 투자하는 YOLO 타입입니다. 현재의 행복을 중시해요.",a:"<strong>💡 재테크 조언:</strong><br>• 월급의 최소 20%는 저축하는 습관을 만들어보세요<br>• 위시리스트를 만들고 우선순위를 정해보세요<br>• 구독 서비스 정리만으로도 큰 절약이 돼요"}
];
let cur=0,total=0;
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';document.getElementById('quiz').classList.add('q-slide');setTimeout(()=>document.getElementById('quiz').classList.remove('q-slide'),350);q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){this.classList.add('selected');setTimeout(()=>pick(a[1]),350)};o.appendChild(b);});}
function pick(v){total+=v;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const r=types.find(t=>total>=t.min&&total<=t.max)||types[2];document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('rEmoji').textContent=r.e;document.getElementById('rType').textContent=r.n;document.getElementById('rDesc').textContent=r.d;document.getElementById('rAdvice').innerHTML=r.a;
const pieData=total<=13?[60,15,10,10,5]:total<=19?[40,20,15,15,10]:total<=25?[25,25,20,20,10]:[10,15,25,30,20];
const pieLabels=['저축','주거','식비','쇼핑','여가'];const pieColors=['#00b894','#0984e3','#fdcb6e','#e17055','#6c5ce7'];
drawPie(pieData,pieColors,pieLabels);
const budgetMul=total<=13?{s:60,h:15,f:10,sh:10,l:5}:total<=19?{s:40,h:20,f:15,sh:15,l:10}:total<=25?{s:25,h:25,f:20,sh:20,l:10}:{s:10,h:15,f:25,sh:30,l:20};
document.getElementById('rBudget').innerHTML='<strong>💰 월 300만원 예상 지출</strong><br>'+
['저축 '+budgetMul.s*3+'만원','주거 '+budgetMul.h*3+'만원','식비 '+budgetMul.f*3+'만원','쇼핑 '+budgetMul.sh*3+'만원','여가 '+budgetMul.l*3+'만원'].join('<br>');
const challenges=['매일 커피값 아끼기 (월 9만원 절약!)','무지출 챌린지 주 1회 도전','위시리스트 30일 냉각기 규칙','구독 서비스 3개 이하로 줄이기'];
document.getElementById('rChallenge').innerHTML='<strong>🏆 추천 절약 챌린지</strong><br>'+challenges[types.indexOf(r)];
localStorage.setItem('hoit_money',JSON.stringify({type:r.n,total:total,date:new Date().toISOString()}));}
function drawPie(data,colors,labels){const c=document.getElementById('pieCanvas');const ctx=c.getContext('2d');const cx=90,cy=90,r=70;let start=0;const sum=data.reduce((a,b)=>a+b,0);
data.forEach((v,i)=>{const slice=v/sum*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);ctx.fillStyle=colors[i];ctx.fill();
const mid=start+slice/2;const lx=cx+r*0.65*Math.cos(mid);const ly=cy+r*0.65*Math.sin(mid);ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[i],lx,ly);start+=slice;});}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_money'));_copy('[hoit.me] 금전감각 테스트: '+d.type+' - https://hoit.me/tests/money.html',document.querySelector('.share-btn'));}
(function(){const prev=localStorage.getItem('hoit_money');if(prev){const d=JSON.parse(prev);document.querySelector('.sub').textContent='이전 결과: '+d.type+' | 다시 해볼까요?';}})();
</script><section style="max-width:700px;margin:30px auto;padding:20px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;color:#bbb;font-size:14px;line-height:1.8">
