<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>좌뇌우뇌 테스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00b894,#55efc4);transition:width .3s;width:0}
.question{font-size:1.1em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#00b894,#55efc4);color:#1a1a2e;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#55efc4;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
.bar-wrap{background:#2a2a3e;border-radius:10px;height:30px;margin:16px 0;position:relative;overflow:hidden}
.bar-left{height:100%;background:linear-gradient(90deg,#0984e3,#74b9ff);border-radius:10px 0 0 10px;transition:width .5s;float:left}
.bar-right{height:100%;background:linear-gradient(90deg,#e17055,#fab1a0);border-radius:0 10px 10px 0;transition:width .5s;float:right}
.bar-labels{display:flex;justify-content:space-between;font-size:.85em;color:#aaa}
</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<div class="card">
<div id="intro">
<div style="font-size:3em;margin-bottom:10px">🧠</div>
<h1>좌뇌우뇌 테스트</h1>
<p class="sub">당신은 논리적인 좌뇌형? 창의적인 우뇌형?</p>
<button class="btn start-btn" onclick="startQuiz()">테스트 시작하기</button>
</div>
<div id="quiz" class="hidden">
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="question" id="qText"></div>
<div id="opts"></div>
</div>
<div id="result" class="hidden">
<div class="emoji" id="rEmoji"></div>
<div class="result-type" id="rType"></div>
<div class="bar-labels"><span>좌뇌 🔵</span><span>우뇌 🔴</span></div>
<div class="bar-wrap"><div class="bar-left" id="barL"></div><div class="bar-right" id="barR"></div></div>
<div id="pctText" style="color:#aaa;margin-bottom:16px;font-size:.9em"></div>
<div class="result-desc" id="rDesc"></div>
<button class="btn start-btn" onclick="location.reload()">다시 하기</button>
</div>
</div>
<script>
const questions=[
{q:"문제를 해결할 때 나는?",a:[["단계적으로 분석한다","L"],["직감으로 해결한다","R"]]},
{q:"메모를 할 때?",a:[["글과 목록 위주","L"],["그림이나 마인드맵","R"]]},
{q:"음악을 들을 때?",a:[["가사에 집중한다","L"],["멜로디와 분위기","R"]]},
{q:"길을 찾을 때?",a:[["지도를 꼼꼼히 본다","L"],["감으로 찾아간다","R"]]},
{q:"영화를 볼 때 중요한 건?",a:[["논리적 스토리","L"],["감성과 영상미","R"]]},
{q:"새 프로젝트를 시작하면?",a:[["계획표부터 짠다","L"],["아이디어 브레인스토밍","R"]]},
{q:"토론할 때 나는?",a:[["논리와 데이터로 설득","L"],["감정과 이야기로 설득","R"]]},
{q:"시간 관리 스타일은?",a:[["철저한 스케줄 관리","L"],["유연하게 흐름대로","R"]]},
{q:"쇼핑할 때?",a:[["비교 분석 후 구매","L"],["느낌이 오면 바로 구매","R"]]},
{q:"나를 더 잘 표현하는 것은?",a:[["글쓰기","L"],["그림 그리기","R"]]}
];
let cur=0,left=0,right=0;
function startQuiz(){document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=()=>pick(a[1]);o.appendChild(b);});}
function pick(t){if(t==='L')left++;else right++;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const total=left+right,lp=Math.round(left/total*100),rp=100-lp;
document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
document.getElementById('barL').style.width=lp+'%';document.getElementById('barR').style.width=rp+'%';
document.getElementById('pctText').textContent='좌뇌 '+lp+'% / 우뇌 '+rp+'%';
if(lp>rp){document.getElementById('rEmoji').textContent='🔵';document.getElementById('rType').textContent='좌뇌 우세형 (논리적/분석적)';document.getElementById('rDesc').textContent='당신은 논리적이고 분석적인 좌뇌형! 체계적인 사고와 언어 능력이 뛰어나며, 데이터와 근거를 중시합니다. 계획적이고 꼼꼼한 성격으로 문제 해결 능력이 탁월해요.';}
else if(rp>lp){document.getElementById('rEmoji').textContent='🔴';document.getElementById('rType').textContent='우뇌 우세형 (창의적/감성적)';document.getElementById('rDesc').textContent='당신은 창의적이고 감성적인 우뇌형! 상상력과 직관력이 뛰어나며, 예술적 감각이 넘칩니다. 자유로운 사고로 독창적인 아이디어를 잘 떠올려요.';}
else{document.getElementById('rEmoji').textContent='🟣';document.getElementById('rType').textContent='균형형 (좌뇌 = 우뇌)';document.getElementById('rDesc').textContent='당신은 좌뇌와 우뇌가 균형 잡힌 타입! 논리와 감성을 모두 갖추고 있어 상황에 따라 유연하게 사고할 수 있습니다. 정말 멋진 능력이에요!';}}
</script></body></html>
