*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00b894,#55efc4);transition:width .3s;width:0}
.question{font-size:1.1em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#00b894,#55efc4);color:#1a1a2e;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#55efc4;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
.bar-wrap{background:#2a2a3e;border-radius:10px;height:30px;margin:16px 0;position:relative;overflow:hidden}
.bar-left{height:100%;background:linear-gradient(90deg,#0984e3,#74b9ff);border-radius:10px 0 0 10px;transition:width .5s;float:left}
.bar-right{height:100%;background:linear-gradient(90deg,#e17055,#fab1a0);border-radius:0 10px 10px 0;transition:width .5s;float:right}
.bar-labels{display:flex;flex-direction:column;justify-content:space-between;font-size:.85em;color:#aaa}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.q-slide{animation:slideIn .35s ease}
.btn.selected{background:#55efc4!important;color:#1a1a2e!important;animation:pulse .3s ease}
.btn.selected::after{content:' \2713';font-weight:bold}
.result-card{background:linear-gradient(135deg,#1a1a2e,#2a2a3e);border:2px solid transparent;border-image:linear-gradient(135deg,#00b894,#55efc4) 1;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,184,148,.15)}
.pie-chart{width:160px;height:160px;border-radius:50%;margin:16px auto;position:relative}
.pie-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.85em;text-align:center;color:#fff;font-weight:bold;line-height:1.3}
.stat-bars{text-align:left;margin:16px 0}
.stat-bar{margin:8px 0}.stat-bar label{font-size:.8em;color:#aaa;display:flex;flex-direction:column;justify-content:space-between}
.stat-bar .bar{height:10px;background:#2a2a3e;border-radius:5px;overflow:hidden;margin-top:3px}
.stat-bar .bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
.share-box{display:flex;flex-direction:column;gap:8px;margin-top:14px;justify-content:center}
.share-btn{padding:10px 18px;border:none;border-radius:10px;font-size:.85em;cursor:pointer;font-weight:bold;transition:opacity .2s}
.share-btn:hover{opacity:.8}
.share-copy{background:#55efc4;color:#1a1a2e}
.share-other{background:#2a2a3e;color:#e0e0e0}
.prev-result{background:#2a2a3e;border-radius:10px;padding:12px;margin-bottom:16px;font-size:.85em;color:#aaa}

.puzzle-box{background:#2a2a3e;border-radius:12px;padding:20px;margin-bottom:16px}
.puzzle-box .puzzle-q{font-size:1.1em;margin-bottom:12px;line-height:1.5}
.color-word{font-size:2em;font-weight:bold;margin:12px 0}

<script>function _copy(t,b){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}).catch(function(){_copyFB(t,b)});}else{_copyFB(t,b);}}function _copyFB(t,b){var ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');if(b){b.textContent='복사 완료!';setTimeout(function(){b.textContent=b.dataset.orig||'📋 결과 복사'},1500);}}catch(e){alert('복사 실패');}document.body.removeChild(ta);}</script></head><body>

</div>

</div>

</div>

<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const questions=[
{q:"문제를 해결할 때 나는?",a:[["단계적으로 분석한다","L"],["직감으로 해결한다","R"]]},
{q:"메모를 할 때?",a:[["글과 목록 위주","L"],["그림이나 마인드맵","R"]]},
{q:"음악을 들을 때?",a:[["가사에 집중한다","L"],["멜로디와 분위기","R"]]},
{q:"길을 찾을 때?",a:[["지도를 꼼꼼히 본다","L"],["감으로 찾아간다","R"]]},
{q:"영화를 볼 때 중요한 건?",a:[["논리적 스토리","L"],["감성과 영상미","R"]]},
{type:"puzzle",q:"[패턴 퍼즐] 2, 4, 8, 16, ? 다음 숫자는?",a:[["32","L"],["24","R"],["30","R"]]},
{q:"새 프로젝트를 시작하면?",a:[["계획표부터 짠다","L"],["아이디어 브레인스토밍","R"]]},
{q:"토론할 때 나는?",a:[["논리와 데이터로 설득","L"],["감정과 이야기로 설득","R"]]},
{type:"puzzle",q:"[색깔 퍼즐] 아래 글자의 텍스트 색깔은?",colorWord:{text:"빨강",color:"blue"},a:[["빨간색 (글자 의미)","L"],["파란색 (실제 색상)","R"]]},
{q:"시간 관리 스타일은?",a:[["철저한 스케줄 관리","L"],["유연하게 흐름대로","R"]]},
{q:"쇼핑할 때?",a:[["비교 분석 후 구매","L"],["느낌이 오면 바로 구매","R"]]},
{type:"puzzle",q:"[패턴 퍼즐] ○△□○△□○△? 다음은?",a:[["□ (규칙 파악)","L"],["○ (느낌으로)","R"]]},
{q:"나를 더 잘 표현하는 것은?",a:[["글쓰기","L"],["그림 그리기","R"]]}
];
let cur=0,left=0,right=0;
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';const qEl=document.getElementById('qText');const o=document.getElementById('opts');o.innerHTML='';qEl.classList.remove('q-slide');void qEl.offsetWidth;qEl.classList.add('q-slide');
if(q.colorWord){qEl.innerHTML=(cur+1)+'. '+q.q+'<div class="color-word" style="color:'+q.colorWord.color+'">'+q.colorWord.text+'</div>';}else if(q.type==='puzzle'){qEl.innerHTML=(cur+1)+'. '+q.q;qEl.closest('#quiz').querySelector('.question').style.background='';const wrap=document.createElement('div');wrap.className='puzzle-box';wrap.innerHTML='<div class="puzzle-q">'+q.q.replace(/^\[.*?\]\s*/,'')+'</div>';o.parentNode.insertBefore(wrap,o);setTimeout(()=>wrap.remove(),0);qEl.innerHTML=(cur+1)+'. '+q.q;}else{qEl.textContent=(cur+1)+'. '+q.q;}
q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){if(window._picking)return;window._picking=true;b.classList.add('selected');setTimeout(()=>{window._picking=false;pick(a[1]);},400);};o.appendChild(b);});}
function pick(t){if(t==='L')left++;else right++;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const total=left+right,lp=Math.round(left/total*100),rp=100-lp;
document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
document.getElementById('barL').style.width=lp+'%';document.getElementById('barR').style.width=rp+'%';
document.getElementById('pctText').textContent='좌뇌 '+lp+'% / 우뇌 '+rp+'%';
const pie=document.getElementById('pieChart');pie.style.background='conic-gradient(#0984e3 0 '+lp+'%, #e17055 '+lp+'% 100%)';document.getElementById('pieLabel').innerHTML='좌 '+lp+'%<br>우 '+rp+'%';
const stats=[{name:'논리',val:Math.min(100,lp+Math.random()*15|0),color:'#0984e3',side:'좌'},{name:'분석',val:Math.min(100,lp-5+Math.random()*20|0),color:'#74b9ff',side:'좌'},{name:'언어',val:Math.min(100,lp+5+Math.random()*10|0),color:'#a29bfe',side:'좌'},{name:'창의',val:Math.min(100,rp+Math.random()*15|0),color:'#e17055',side:'우'},{name:'직관',val:Math.min(100,rp-5+Math.random()*20|0),color:'#fab1a0',side:'우'},{name:'공간',val:Math.min(100,rp+5+Math.random()*10|0),color:'#fdcb6e',side:'우'}];
const sEl=document.getElementById('rStats');sEl.innerHTML='';stats.forEach(s=>{const d=document.createElement('div');d.className='stat-bar';d.innerHTML='<label><span>'+s.name+' ('+s.side+'뇌)</span><span>'+s.val+'</span></label><div class="bar"><div class="bar-fill" style="width:0;background:'+s.color+'"></div></div>';sEl.appendChild(d);setTimeout(()=>d.querySelector('.bar-fill').style.width=s.val+'%',200);});
if(lp>rp){document.getElementById('rEmoji').textContent='🔵';document.getElementById('rType').textContent='좌뇌 우세형 (논리적/분석적)';document.getElementById('rDesc').textContent='당신은 논리적이고 분석적인 좌뇌형! 체계적인 사고와 언어 능력이 뛰어나며, 데이터와 근거를 중시합니다. 계획적이고 꼼꼼한 성격으로 문제 해결 능력이 탁월해요.';}
else if(rp>lp){document.getElementById('rEmoji').textContent='🔴';document.getElementById('rType').textContent='우뇌 우세형 (창의적/감성적)';document.getElementById('rDesc').textContent='당신은 창의적이고 감성적인 우뇌형! 상상력과 직관력이 뛰어나며, 예술적 감각이 넘칩니다. 자유로운 사고로 독창적인 아이디어를 잘 떠올려요.';}
else{document.getElementById('rEmoji').textContent='🟣';document.getElementById('rType').textContent='균형형 (좌뇌 = 우뇌)';document.getElementById('rDesc').textContent='당신은 좌뇌와 우뇌가 균형 잡힌 타입! 논리와 감성을 모두 갖추고 있어 상황에 따라 유연하게 사고할 수 있습니다. 정말 멋진 능력이에요!';}
localStorage.setItem('brain_result',JSON.stringify({left:lp,right:rp,date:new Date().toLocaleDateString('ko-KR')}));}
function copyResult(){const t=document.getElementById('rType').textContent+'\n'+document.getElementById('pctText').textContent;_copy('[좌뇌우뇌 테스트 결과]\n'+t,document.querySelector('.share-btn'));}
(function(){const p=localStorage.getItem('brain_result');if(p){try{const d=JSON.parse(p);document.getElementById('prevResult').innerHTML='<div class="prev-result">이전 결과: 좌뇌 '+d.left+'% / 우뇌 '+d.right+'% ('+d.date+')</div>';}catch(e){}}})();
</script><section style="max-width:700px;margin:30px auto;padding:20px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;color:#bbb;font-size:14px;line-height:1.8">
<h2 style="color:#FFD700;font-size:18px;margin-bottom:10px">좌뇌우뇌 테스트</h2>
<p>논리적 사고의 좌뇌와 창의적 감성의 우뇌, 어느 쪽이 더 발달했는지 분석하는 테스트입니다. 뇌 유형에 따른 성격 특성과 적합한 활동을 안내합니다.</p>
