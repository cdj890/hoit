const types={backpack:{e:"🎒",n:"배낭여행형",d:"자유로운 영혼의 모험가! 정해진 계획보다 즉흥적인 여행을 즐기며, 새로운 경험과 만남을 소중히 여겨요.",dest:"<strong>🗺️ 추천 여행지:</strong><br>• 동남아 배낭여행 (태국, 베트남)<br>• 유럽 인터레일<br>• 남미 (페루, 볼리비아)<br>• 제주 올레길",flags:"🇹🇭 🇻🇳 🇵🇪 🇧🇴",bucket:"<strong>🗒️ 버킷리스트</strong><br>• 히말라야 트레킹<br>• 사하라 사막 캠핑<br>• 아이슬란드 링로드 일주<br>• 산티아고 순례길 완주",packing:"🎒 <strong>패킹 스타일:</strong> 미니멀리스트! 백팩 하나면 충분. 가벼운 짐이 자유로운 여행의 핵심!"},

culture:{e:"🏛️",n:"문화탐방형",d:"역사와 문화를 깊이 탐구하는 지적 여행자! 박물관, 유적지, 전시회를 통해 새로운 지식을 쌓는 것을 즐겨요.",dest:"<strong>🗺️ 추천 여행지:</strong><br>• 로마/아테네 (고대 유적)<br>• 경주 (역사 탐방)<br>• 이집트 (피라미드)<br>• 교토 (전통 문화)",flags:"🇮🇹 🇬🇷 🇪🇬 🇯🇵",bucket:"<strong>🗒️ 버킷리스트</strong><br>• 이집트 피라미드 내부 탐방<br>• 바티칸 시스티나 성당<br>• 앙코르와트 일출<br>• 마추픽추 잉카 문명 체험",packing:"📔 <strong>패킹 스타일:</strong> 지식인! 가이드북과 카메라 필수. 편한 운동화로 온종일 탐방 준비!"},

function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').textContent=(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';document.getElementById('quiz').classList.add('q-slide');setTimeout(()=>document.getElementById('quiz').classList.remove('q-slide'),350);q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){this.classList.add('selected');setTimeout(()=>pick(a[1]),350)};o.appendChild(b);});}
function pick(t){scores[t]=(scores[t]||0)+1;cur++;if(cur<questions.length)showQ();else showResult();}

localStorage.setItem('hoit_travel',JSON.stringify({type:r.n,date:new Date().toISOString()}));}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_travel'));_copy('[hoit.me] 여행 유형: '+d.type+' - https://hoit.me/tests/travel.html',document.querySelector('.share-btn'));}
