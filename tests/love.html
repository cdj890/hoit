function showCouple(me,partner,el){
  localStorage.setItem('love_partner',partner);
  const txt=getCoupleCompat(me,partner);
  document.getElementById('coupleResult').innerHTML=`<div class="couple-result">${txt}</div>`;
}
function pickLove(s,el){
  if(window._answering)return;
  window._answering=true;
  scores[s]++;
  if(el){el.classList.add('selected');}
  const card=document.querySelector('.q-card');
  if(card)card.classList.add('fade-out');
  setTimeout(()=>{cur++;window._answering=false;render();},400);
}
function _renderFriendLove(data){
  var existing=document.getElementById('friendResultBox');
  if(existing)existing.parentNode.removeChild(existing);
  var box=document.createElement('div');
  box.id='friendResultBox';
  box.style.cssText='background:#1a2a3a;border:2px solid '+(data.color||'#FF69B4')+';border-radius:14px;padding:16px;margin-bottom:18px;text-align:center;max-width:500px;width:100%';
  var title=document.createElement('div');title.style.cssText='color:#FFD700;font-size:13px;font-weight:bold;margin-bottom:8px';title.textContent='친구의 결과';
  var emoji=document.createElement('div');emoji.style.cssText='font-size:36px;margin:4px 0';emoji.textContent=data.emoji||'';
  var typeEl=document.createElement('div');typeEl.style.cssText='font-size:18px;font-weight:bold;color:'+(data.color||'#FF69B4');typeEl.textContent=data.type||'';
  var labelEl=document.createElement('div');labelEl.style.cssText='color:#aaa;font-size:13px;margin-top:4px';labelEl.textContent=data.label?'유형: '+data.label:'';
  box.appendChild(title);box.appendChild(emoji);box.appendChild(typeEl);box.appendChild(labelEl);
  var app=document.getElementById('app');
  app.insertBefore(box,app.firstChild);
}
render();
