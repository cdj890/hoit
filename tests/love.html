<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>연애 유형 테스트</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}.wrap{max-width:500px;width:100%;padding:20px;text-align:center}h1{font-size:30px;margin-bottom:8px}.sub{color:#888;margin-bottom:25px}.q-card{background:#1a1a2e;border-radius:16px;padding:22px;border:1px solid #2a2a4a;margin-bottom:15px}.q-num{color:#888;font-size:13px;margin-bottom:8px}.q-text{font-size:16px;margin-bottom:16px;line-height:1.5}.opts{display:flex;flex-direction:column;gap:8px}.opt{background:#252545;border:2px solid #333;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;transition:all .2s;text-align:left}.opt:hover{border-color:#FF69B4;transform:scale(1.02)}.progress{background:#1a1a2e;border-radius:10px;height:8px;margin-bottom:18px;overflow:hidden}.progress-fill{background:linear-gradient(90deg,#FF69B4,#FFD700);height:100%;border-radius:10px;transition:width .3s}.result{background:#1a1a2e;border-radius:16px;padding:28px;border:1px solid #2a2a4a}.btn{background:#FF69B4;border:none;color:#fff;padding:12px 30px;border-radius:10px;font-size:15px;cursor:pointer;margin-top:18px;font-weight:bold;width:100%}a.back{position:fixed;top:8px;left:8px;z-index:99;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}a.back:hover{background:rgba(0,0,0,0.85)}</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a class="back" href="../index.html">← 뒤로</a>
<div class="wrap" id="app"></div>
<script>
const Q=[
  {q:"좋아하는 사람이 생기면?",a:[{t:"먼저 고백한다!",s:"P"},{t:"신호를 보내며 기다린다",s:"W"},{t:"친구로 먼저 친해진다",s:"F"},{t:"혼자 마음에 담아둔다",s:"S"}]},
  {q:"이상적인 데이트는?",a:[{t:"카페에서 깊은 대화 💬",s:"S"},{t:"놀이공원에서 신나게! 🎢",s:"P"},{t:"집에서 영화 보며 편안하게 🎬",s:"F"},{t:"예쁜 곳에서 인생샷 📸",s:"W"}]},
  {q:"연인에게 가장 바라는 것?",a:[{t:"매일 연락과 관심",s:"P"},{t:"서로의 공간 존중",s:"S"},{t:"재미있고 즐거운 시간",s:"F"},{t:"로맨틱한 이벤트",s:"W"}]},
  {q:"싸웠을 때 나는?",a:[{t:"바로 대화로 해결하려 함",s:"P"},{t:"시간을 두고 냉각기를 가짐",s:"S"},{t:"유머로 분위기를 풀려 함",s:"F"},{t:"편지나 선물로 마음 전달",s:"W"}]},
  {q:"연인의 SNS에 이성 친구가 많다면?",a:[{t:"솔직하게 불편하다고 말함",s:"P"},{t:"믿어주려 노력함",s:"S"},{t:"나도 내 친구들 많으니까~",s:"F"},{t:"은근히 질투 표현",s:"W"}]},
  {q:"사랑의 표현 방식은?",a:[{t:"말로 직접 '사랑해'",s:"P"},{t:"행동과 배려로",s:"S"},{t:"함께하는 시간으로",s:"F"},{t:"선물과 깜짝 이벤트",s:"W"}]},
  {q:"이별 후 나는?",a:[{t:"바로 새 연애를 시작",s:"P"},{t:"오래 혼자 정리하는 시간",s:"S"},{t:"친구들과 놀며 극복",s:"F"},{t:"이별 노래 들으며 감성에 젖음",s:"W"}]},
  {q:"첫 만남에서 가장 보는 것?",a:[{t:"자신감과 에너지",s:"P"},{t:"진지함과 깊이",s:"S"},{t:"유머 감각",s:"F"},{t:"외모와 분위기",s:"W"}]},
];

const TYPES={
  P:{emoji:'🔥',title:'정열적 사랑꾼',color:'#FF4444',
    desc:'사랑에 올인하는 스타일! 적극적이고 열정적으로 다가가며, 연애할 때 세상 행복해져요. 표현력이 뛰어나고 상대를 감동시키는 달인!',
    tip:'가끔은 한 발짝 물러서서 상대의 페이스도 맞춰주세요. 너무 뜨거우면 상대가 부담느낄 수 있어요!',
    match:'기다림형 또는 감성형과 찰떡!'},
  W:{emoji:'🌙',title:'로맨틱 기다림형',color:'#DDA0DD',
    desc:'은근한 매력으로 상대를 끌어들이는 타입! 섬세하고 로맨틱하며, 작은 것에서 감동을 느껴요. 기다릴 줄 아는 인내심이 있습니다.',
    tip:'때로는 용기를 내서 먼저 표현해보세요! 기다리기만 하면 좋은 인연을 놓칠 수도 있어요.',
    match:'정열형이 당신의 소극적인 면을 채워줄 거예요!'},
  F:{emoji:'😄',title:'유쾌한 친구형',color:'#FFD700',
    desc:'친구에서 연인으로 발전하는 타입! 함께 있으면 즐겁고 편안한 매력이 있어요. 유머 감각이 뛰어나고 분위기 메이커!',
    tip:'연애와 우정의 경계를 잘 구분하세요. 너무 편한 것도 때로는 독이 될 수 있어요.',
    match:'감성형과 만나면 깊이가 더해져요!'},
  S:{emoji:'🌊',title:'깊은 감성형',color:'#4FC3F7',
    desc:'깊고 진지한 사랑을 하는 타입! 감정이 풍부하고 상대를 깊이 이해하려 해요. 한 번 사랑하면 오래가는 스타일.',
    tip:'가끔은 가볍게 즐기는 법도 배워보세요. 모든 걸 너무 깊게 생각하면 지칠 수 있어요.',
    match:'정열형의 에너지가 당신에게 활력을 줄 거예요!'},
};

let cur=0,scores={P:0,W:0,F:0,S:0};
function render(){
  const app=document.getElementById('app');
  if(cur<Q.length){
    const q=Q[cur],pct=(cur/Q.length*100)|0;
    app.innerHTML=`<h1>💕 연애 유형 테스트</h1><p class="sub">나의 연애 스타일은?</p>
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-card"><div class="q-num">${cur+1}/${Q.length}</div><div class="q-text">${q.q}</div>
      <div class="opts">${q.a.map((a,i)=>`<div class="opt" onclick="pick('${a.s}')">${a.t}</div>`).join('')}</div></div>`;
  } else {
    const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    const r=TYPES[top];
    app.innerHTML=`<div class="result"><div style="font-size:50px;margin-bottom:10px">${r.emoji}</div>
      <h2 style="color:${r.color};font-size:24px">${r.title}</h2>
      <p style="color:#aaa;margin:15px 0;font-size:14px;line-height:1.7">${r.desc}</p>
      <div style="background:#252545;border-radius:10px;padding:13px;margin:12px 0"><h3 style="color:#FFD700;font-size:14px;margin-bottom:6px">💡 연애 조언</h3><p style="color:#ccc;font-size:13px;line-height:1.6">${r.tip}</p></div>
      <div style="background:#252545;border-radius:10px;padding:13px;margin:12px 0"><h3 style="color:#FF69B4;font-size:14px;margin-bottom:6px">💑 궁합</h3><p style="color:#ccc;font-size:13px">${r.match}</p></div>
      <button class="btn" onclick="cur=0;scores={P:0,W:0,F:0,S:0};render()">다시 하기</button></div>`;
  }
}
function pick(s){scores[s]++;cur++;render();}
render();
</script></body></html>
