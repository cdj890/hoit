*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{background:#1a1a2e;border-radius:16px;padding:30px;max-width:500px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center}
h1{font-size:1.6em;margin-bottom:8px}.sub{color:#888;margin-bottom:20px;font-size:.9em}
.progress{height:6px;background:#2a2a3e;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#e84393,#fd79a8);transition:width .3s;width:0}
.question{font-size:1.02em;margin-bottom:18px;line-height:1.5}
.btn{display:block;width:100%;padding:12px;margin:8px 0;background:#2a2a3e;border:none;color:#e0e0e0;border-radius:10px;font-size:.93em;cursor:pointer;transition:background .2s;text-align:left;padding-left:16px}
.btn:hover{background:#3a3a5e}
.start-btn{background:linear-gradient(135deg,#e84393,#fd79a8);color:#fff;font-size:1.1em;padding:14px;margin-top:16px;font-weight:bold;text-align:center}
.start-btn:hover{opacity:.9}
.emoji{font-size:4em;margin:16px 0}.result-type{font-size:1.4em;font-weight:bold;color:#fd79a8;margin-bottom:12px}
.result-desc{color:#bbb;line-height:1.7;margin-bottom:20px;font-size:.95em}.hidden{display:none}
.score-circle{width:120px;height:120px;border-radius:50%;border:6px solid #fd79a8;display:flex;align-items:center;justify-content:center;margin:16px auto;font-size:2em;font-weight:bold;color:#fd79a8}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.q-slide{animation:slideIn .35s ease}
.btn.selected{background:#fd79a8;color:#1a1a2e;font-weight:bold;pointer-events:none;animation:pulse .3s ease}
.btn.selected::after{content:' \2713';font-weight:bold}
.result-card{border:2px solid transparent;background:linear-gradient(#1a1a2e,#1a1a2e) padding-box,linear-gradient(135deg,#e84393,#fd79a8) border-box;border-radius:16px;padding:20px;margin:16px 0;animation:fadeIn .6s ease}
.share-btn{background:linear-gradient(135deg,#e84393,#fd79a8);color:#fff;font-weight:bold;border:none;padding:12px;border-radius:10px;width:100%;cursor:pointer;font-size:1em;margin:8px 0;transition:opacity .2s}
.share-btn:hover{opacity:.85}
.recommend{margin-top:16px;text-align:center}
.recommend a{display:inline-block;margin:4px 6px;padding:8px 14px;background:#2a2a3e;color:#fd79a8;border-radius:8px;text-decoration:none;font-size:.85em;transition:background .2s}
.recommend a:hover{background:#3a3a5e}
.scenario-emoji{font-size:2em;margin:8px 0}
.improve-tip{background:#2a2a3e;border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:.9em;line-height:1.8;color:#ddd}
</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous">
function _copy(t,b){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>{if(b){b.textContent='복사 완료!';setTimeout(()=>b.textContent=b.dataset.orig||'📋 결과 복사',1500);}}).catch(()=>_copyFallback(t,b));
  } else { _copyFallback(t,b); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}
</script>

<script>function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const qEmojis=["😢","🎬","😰","🏚️","💔","📺","😅","💬","📱","🎉"];
const questions=[
{q:"친구가 시험에 떨어져서 울고 있어요.",a:[["다음에 잘 하면 되지!",1,"sa"],["많이 속상하겠다...",3,"ot"],["같이 슬퍼지고 눈물이 난다",4,"em"]]},
{q:"영화에서 슬픈 장면이 나오면?",a:[["별 감흥이 없다",1,"sa"],["좀 찡한 정도",2,"em"],["눈물을 흘린다",4,"em"]]},
{q:"동료가 상사에게 혼나는 걸 봤어요.",a:[["본인 잘못이겠지",1,"sa"],["불편하지만 넘어간다",2,"ot"],["나중에 다가가 위로한다",4,"ca"]]},
{q:"길에서 노숙인을 보면?",a:[["무관심하게 지나간다",1,"sa"],["안타깝다고 느낀다",3,"em"],["도움을 줄 방법을 생각한다",4,"ca"]]},
{q:"친구가 연인과 헤어졌다고 합니다.",a:[["새 사람 만나면 되지",1,"ot"],["힘들겠다, 시간이 약이야",2,"co"],["충분히 슬퍼해도 괜찮아, 옆에 있을게",4,"ca"]]},
{q:"뉴스에서 재난 소식을 보면?",a:[["채널을 돌린다",1,"sa"],["안타깝다고 생각한다",2,"em"],["기부나 도움 방법을 찾아본다",4,"ca"]]},
{q:"누군가 당신 앞에서 실수로 넘어졌어요.",a:[["속으로 웃긴다",1,"ot"],["괜찮냐고 물어본다",3,"co"],["당황스러운 마음이 전해져 같이 민망해진다",4,"em"]]},
{q:"후배가 고민을 상담하러 왔어요.",a:[["빨리 해결책을 제시한다",1,"co"],["들어주면서 조언한다",3,"co"],["충분히 들어주고 감정을 공감해준다",4,"em"]]},
{q:"SNS에서 힘든 글을 올린 친구를 보면?",a:[["스크롤 넘긴다",1,"sa"],["좋아요/하트를 누른다",2,"ot"],["DM으로 괜찮냐고 물어본다",4,"ca"]]},
{q:"다른 사람의 성공 소식을 들으면?",a:[["별 감흥 없다",1,"sa"],["축하한다고 말한다",2,"co"],["진심으로 기쁘고 같이 축하한다",4,"ot"]]}
];
let cur=0,total=0,dimScores={sa:0,ot:0,em:0,ca:0,co:0};
function startQuiz(){_shuf(questions);document.getElementById('intro').classList.add('hidden');document.getElementById('quiz').classList.remove('hidden');showQ();}
function showQ(){if(!window._qs){_shuf(questions);window._qs=1;}const q=questions[cur];document.getElementById('prog').style.width=((cur/questions.length)*100)+'%';document.getElementById('qText').innerHTML='<div class="scenario-emoji">'+qEmojis[questions.indexOf(q)]+'</div>'+(cur+1)+'. '+q.q;const o=document.getElementById('opts');o.innerHTML='';document.getElementById('quiz').classList.add('q-slide');setTimeout(()=>document.getElementById('quiz').classList.remove('q-slide'),350);q.a.forEach(a=>{const b=document.createElement('button');b.className='btn';b.textContent=a[0];b.onclick=function(){this.classList.add('selected');setTimeout(()=>pick(a[1],a[2]),350)};o.appendChild(b);});}
function pick(v,dim){total+=v;if(dim)dimScores[dim]=(dimScores[dim]||0)+v;cur++;if(cur<questions.length)showQ();else showResult();}
function showResult(){const score=Math.min(100,Math.round(total/40*100));
document.getElementById('quiz').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
document.getElementById('rScore').textContent=score+'점';
let emoji,type,desc;
if(score>=85){emoji='💖';type='공감 마스터';desc='당신은 타인의 감정을 깊이 느끼고 이해하는 놀라운 공감 능력의 소유자! 주변 사람들이 당신 곁에서 편안함과 위로를 느낍니다. 감정적 지지가 필요한 사람에게 큰 힘이 되는 존재예요.';}
else if(score>=65){emoji='🤗';type='높은 공감 능력';desc='대부분의 상황에서 타인의 감정을 잘 이해하고 공감해요! 적절한 위로와 지지를 할 줄 아는 따뜻한 사람입니다. 가끔은 자신의 감정도 돌보는 것을 잊지 마세요.';}
else if(score>=45){emoji='🙂';type='보통 공감 능력';desc='공감 능력이 평균적인 수준이에요. 가까운 사람에게는 잘 공감하지만, 낯선 상황에서는 어려울 수 있어요. 상대방의 입장에서 생각하는 연습을 해보세요.';}
else{emoji='🌱';type='공감 능력 성장 중';desc='공감 능력을 키울 여지가 많아요! 타인의 이야기에 더 귀 기울여보고, 감정을 표현하는 연습을 해보세요. 소설이나 영화 감상도 공감 능력 향상에 도움이 됩니다.';}
document.getElementById('rEmoji').textContent=emoji;document.getElementById('rType').textContent=type;document.getElementById('rDesc').textContent=desc;
const dims=['자기인식','타인이해','감정읽기','배려','소통'];const dimKeys=['sa','ot','em','ca','co'];
const maxPer=8;const radarVals=dimKeys.map(k=>Math.min(100,Math.round((dimScores[k]||0)/maxPer*100)));
drawRadar(radarVals,dims);
const weakIdx=radarVals.indexOf(Math.min(...radarVals));const weakTips={0:'자기 감정을 매일 일기로 기록해보세요. 감정 인식이 공감의 시작입니다.',1:'상대방의 입장에서 생각하는 연습을 해보세요. "나라면 어떨까?"를 자주 물어보세요.',2:'미세한 표정 변화에 주목하는 연습을 해보세요. 감정 관련 영화나 드라마도 도움이 됩니다.',3:'작은 배려부터 실천해보세요. 문 잡아주기, 안부 묻기 등 사소한 것이 큰 차이를 만듭니다.',4:'경청의 기술을 연습하세요. 상대가 말할 때 끝까지 들어주고, 맞장구를 쳐주세요.'};
document.getElementById('rImprove').innerHTML='<strong>💡 '+dims[weakIdx]+' 향상 팁</strong><br>'+weakTips[weakIdx];
localStorage.setItem('hoit_empathy',JSON.stringify({type:type,score:score,date:new Date().toISOString()}));}
function drawRadar(vals,labels){const c=document.getElementById('radarCanvas');const ctx=c.getContext('2d');const cx=110,cy=110,r=80;const n=5;ctx.clearRect(0,0,220,220);
for(let lv=1;lv<=4;lv++){ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const x=cx+r*lv/4*Math.cos(a);const y=cy+r*lv/4*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.strokeStyle='#2a2a3e';ctx.stroke();}
ctx.beginPath();for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const v=vals[i]/100;const x=cx+r*v*Math.cos(a);const y=cy+r*v*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.fillStyle='rgba(232,67,147,0.3)';ctx.fill();ctx.strokeStyle='#fd79a8';ctx.lineWidth=2;ctx.stroke();
for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const x=cx+(r+18)*Math.cos(a);const y=cy+(r+18)*Math.sin(a);ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(labels[i],x,y);}}
function copyResult(){const d=JSON.parse(localStorage.getItem('hoit_empathy'));_copy('[hoit.me] 공감 능력: '+d.type+' ('+d.score+'점) - https://hoit.me/tests/empathy.html',document.querySelector('.share-btn'));}
(function(){const prev=localStorage.getItem('hoit_empathy');if(prev){const d=JSON.parse(prev);document.querySelector('.sub').textContent='이전 결과: '+d.type+' ('+d.score+'점) | 다시 해볼까요?';}})();
</script><div style="max-width:440px;margin:16px auto;padding:0 8px"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
