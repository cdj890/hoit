<h1>구구단 연습</h1>
<div class="modes">
<button class="sel" id="modeNormal" onclick="setMode('normal')">일반 모드</button>
<button id="modeTimer" onclick="setMode('timer')">타이머 (60초)</button>
</div>
<div class="dan-sel" id="danSel"></div>
<div class="timer-bar" id="timerBar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
<div class="question" id="question">2 x 3 = ?</div>
<div class="answer-wrap">
<input type="number" id="ansIn" inputmode="numeric" autocomplete="off">
<button onclick="checkAnswer()">확인</button>
</div>
<div class="feedback" id="feedback"></div>
<div class="stats">
<div class="stat"><div class="num" id="correctN">0</div><div class="label">정답</div></div>
<div class="stat"><div class="num" id="wrongN">0</div><div class="label">오답</div></div>
<div class="stat"><div class="num" id="totalN">0</div><div class="label">총 문제</div></div>
</div>
<div class="wrong-list" id="wrongList"></div>

<script>
let mode='normal',selectedDans=new Set([2,3,4,5,6,7,8,9]),a,b,correct=0,wrong=0,total=0,wrongs=[],timerInterval,timeLeft=60;
const danSel=document.getElementById('danSel');
for(let d=2;d<=9;d++){
const btn=document.createElement('button');btn.textContent=d+'단';btn.classList.add('sel');
btn.onclick=()=>{if(selectedDans.has(d)){if(selectedDans.size>1){selectedDans.delete(d);btn.classList.remove('sel')}}else{selectedDans.add(d);btn.classList.add('sel')}newQ()};
danSel.appendChild(btn);
}
function setMode(m){mode=m;document.getElementById('modeNormal').className=m==='normal'?'sel':'';document.getElementById('modeTimer').className=m==='timer'?'sel':'';
document.getElementById('timerBar').style.display=m==='timer'?'block':'none';
correct=0;wrong=0;total=0;wrongs=[];updateStats();
if(m==='timer'){timeLeft=60;document.getElementById('timerFill').style.width='100%';clearInterval(timerInterval);timerInterval=setInterval(()=>{timeLeft--;document.getElementById('timerFill').style.width=(timeLeft/60*100)+'%';if(timeLeft<=0){clearInterval(timerInterval);document.getElementById('feedback').textContent=`시간 종료! ${correct}개 정답`;document.getElementById('feedback').className='feedback correct'}},1000)}
newQ();
}
function newQ(){
const dans=[...selectedDans];a=dans[Math.floor(Math.random()*dans.length)];b=Math.floor(Math.random()*9)+1;
document.getElementById('question').textContent=`${a} x ${b} = ?`;
document.getElementById('ansIn').value='';document.getElementById('ansIn').focus();
document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';
}
function checkAnswer(){
if(mode==='timer'&&timeLeft<=0)return;
const ans=parseInt(document.getElementById('ansIn').value);
const fb=document.getElementById('feedback');
total++;
if(ans===a*b){correct++;fb.textContent='정답!';fb.className='feedback correct';setTimeout(newQ,500)}
else{wrong++;fb.textContent=`오답! ${a} x ${b} = ${a*b}`;fb.className='feedback wrong';wrongs.push(`${a}x${b}=${a*b}`);setTimeout(newQ,1200)}
updateStats();
}
function updateStats(){
document.getElementById('correctN').textContent=correct;
document.getElementById('wrongN').textContent=wrong;
document.getElementById('totalN').textContent=total;
const wl=document.getElementById('wrongList');
wl.innerHTML=wrongs.length?'<h3>오답 복습</h3>'+wrongs.map(w=>`<span class="wrong-item">${w}</span>`).join(''):'';
}
document.getElementById('ansIn').addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer()});
newQ();
</script>
