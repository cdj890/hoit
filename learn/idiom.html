['千辛萬苦','천신만고','온갖 어렵고 괴로운 일','천 가지 매운 것과 만 가지 쓴 것'],
['夢寐不忘','몽매불망','자나 깨나 잊지 못함','꿈에서도 잊지 못한다'],
['無爲徒食','무위도식','하는 일 없이 먹기만 함','하는 일 없이 헛되이 먹는다'],
['不可思議','불가사의','상식으로는 생각할 수 없이 이상함','생각하고 의논할 수 없다'],
['半信半疑','반신반의','반은 믿고 반은 의심함','반은 믿고 반은 의심하다'],
['朝令暮改','조령모개','법령을 자주 바꿈','아침에 명령하고 저녁에 고친다']
];

const LS_KEY='hoit_learn_idiom';
let mode='meaning',quiz=[],qIdx=0,score=0;

function loadStats(){
  try{return JSON.parse(localStorage.getItem(LS_KEY))||{best:0,total:0,correct:0}}catch(e){return{best:0,total:0,correct:0}}
}
function saveStats(s){
  try{localStorage.setItem(LS_KEY,JSON.stringify({...s,updatedAt:new Date().toISOString().slice(0,10)}))}catch(e){}
}
function resetProgress(){
  if(!confirm('학습 기록을 초기화할까요?'))return;
  localStorage.removeItem(LS_KEY);
  renderStats();
  startQuiz();
}
function renderStats(){
  const s=loadStats();
  let el=document.getElementById('statsBar');
  if(el)el.textContent=`최고: ${s.best}/10 | 누적: ${s.total}회 | 정답률: ${s.total?Math.round(s.correct/s.total*10)+'%':'–'}`;
}

function setMode(m){mode=m;document.getElementById('modeM').className=m==='meaning'?'sel':'';document.getElementById('modeH').className=m==='hanja'?'sel':'';startQuiz()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(){
quiz=shuffle([...data]).slice(0,10);qIdx=0;score=0;
document.getElementById('result').style.display='none';
document.getElementById('card').style.display='block';
document.getElementById('options').style.display='flex';
showQ();
}
function showQ(){
if(qIdx>=10){showResult();return}
const q=quiz[qIdx];
document.getElementById('prog').textContent=`${qIdx+1} / 10`;
document.getElementById('score').textContent=`점수: ${score}`;
document.getElementById('nextBtn').style.display='none';
document.getElementById('explain').style.display='none';
if(mode==='meaning'){
document.getElementById('hanja').textContent=q[0];
document.getElementById('reading').textContent=q[1];
document.getElementById('qtext').textContent='이 사자성어의 뜻은?';
const opts=shuffle([q[2],...shuffle(data.filter(d=>d!==q)).slice(0,3).map(d=>d[2])]);
renderOpts(opts,q[2],q[3]);
}else{
document.getElementById('hanja').textContent='?';
document.getElementById('reading').textContent=q[1];
document.getElementById('qtext').textContent=q[2];
const opts=shuffle([q[0],...shuffle(data.filter(d=>d!==q)).slice(0,3).map(d=>d[0])]);
renderOpts(opts,q[0],q[3]);
}
}
function renderOpts(opts,answer,explain){
const el=document.getElementById('options');el.innerHTML='';
opts.forEach(o=>{
const b=document.createElement('button');b.className='opt-btn';b.textContent=o;
b.onclick=()=>{
document.querySelectorAll('.opt-btn').forEach(x=>{x.disabled=true;if(x.textContent===answer)x.classList.add('correct')});
if(o===answer){score++}else{b.classList.add('wrong')}
document.getElementById('score').textContent=`점수: ${score}`;
document.getElementById('explain').textContent='💡 '+explain;
document.getElementById('explain').style.display='block';
document.getElementById('nextBtn').style.display='inline-block';
};
el.appendChild(b);
});
}
function nextQ(){qIdx++;showQ()}
function showResult(){
document.getElementById('card').style.display='none';
document.getElementById('options').style.display='none';
document.getElementById('nextBtn').style.display='none';
document.getElementById('explain').style.display='none';
const r=document.getElementById('result');r.style.display='block';
document.getElementById('finalScore').textContent=score+' / 10';
const s=loadStats();
s.best=Math.max(s.best,score);
s.total+=10;s.correct+=score;
saveStats(s);renderStats();
}
renderStats();
startQuiz();
</script>
