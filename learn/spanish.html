<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100vh;padding:60px 16px 30px}
.container{max-width:520px;margin:0 auto}
h1{text-align:center;font-size:1.6rem;margin-bottom:6px;background:linear-gradient(135deg,#f7b733,#fc4a1a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;font-size:0.85rem;margin-bottom:20px}
.streak-bar{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.streak-item{background:#1a1a2e;padding:8px 16px;border-radius:12px;text-align:center;font-size:0.8rem;color:#aaa}
.streak-item span{display:block;font-size:1.3rem;font-weight:bold;color:#f7b733}
.card{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:28px 24px;margin-bottom:16px;border:1px solid rgba(247,183,51,0.15);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f7b733,#fc4a1a,#e74c3c)}
.category{display:inline-block;background:rgba(247,183,51,0.15);color:#f7b733;padding:4px 12px;border-radius:20px;font-size:0.75rem;margin-bottom:16px}
.es-text{font-size:1.8rem;font-weight:bold;color:#fff;line-height:1.5;margin-bottom:12px;letter-spacing:0.5px}
.pron{font-size:1rem;color:#4dc9f6;margin-bottom:10px;font-style:italic}
.kr-text{font-size:1.1rem;color:#ccc;margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid #fc4a1a}
.word-guide{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)}
.word-guide h4{font-size:0.8rem;color:#888;margin-bottom:8px}
.word-item{display:flex;justify-content:space-between;padding:5px 0;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.word-item .w-es{color:#fff}.word-item .w-pr{color:#4dc9f6}.word-item .w-kr{color:#aaa}
.actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{flex:1;min-width:0;padding:12px 10px;border:none;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn-prev{background:#1a1a2e;color:#aaa;border:1px solid #333}
.btn-prev:hover{background:#222240;color:#fff}
.btn-next{background:linear-gradient(135deg,#f7b733,#fc4a1a);color:#fff}
.btn-next:hover{transform:scale(1.02)}
.btn-copy{background:#1a1a2e;color:#4dc9f6;border:1px solid rgba(77,201,246,0.3)}
.btn-copy:hover{background:rgba(77,201,246,0.1)}
.btn-bookmark{background:#1a1a2e;color:#f7b733;border:1px solid rgba(247,183,51,0.3)}
.btn-bookmark.active{background:rgba(247,183,51,0.15);color:#f7b733}
.btn-bookmark:hover{background:rgba(247,183,51,0.1)}
.fav-section{margin-top:24px}
.fav-section h3{font-size:1rem;color:#aaa;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fav-card{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
.fav-card .fav-text{flex:1}
.fav-card .fav-es{font-size:1rem;color:#fff}
.fav-card .fav-kr{font-size:0.8rem;color:#888;margin-top:2px}
.fav-remove{background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;padding:8px}
.fav-remove:hover{color:#fc4a1a}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(247,183,51,0.9);color:#000;padding:10px 24px;border-radius:20px;font-size:0.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-weight:600}
.toast.show{opacity:1}
.empty-fav{text-align:center;color:#555;font-size:0.85rem;padding:20px}
.nav-row{display:flex;gap:10px;margin-bottom:16px}
@media(max-width:380px){.es-text{font-size:1.4rem}.btn{font-size:0.8rem;padding:10px 6px}}
</style>
</head>

let history=[],histIdx=-1,current=null;
const LS_FAV='es_favs',LS_STREAK='es_streak',LS_LAST='es_last',LS_TOTAL='es_total';
const LS_KEY='hoit_learn_spanish';

function saveProgress(idx){
  try{
    localStorage.setItem(LS_KEY,JSON.stringify({lastIdx:idx,updatedAt:new Date().toISOString().slice(0,10)}));
  }catch(e){}
}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem(LS_KEY))||null}catch(e){return null}
}
function resetProgress(){
  if(!confirm('학습 진행률을 초기화할까요?'))return;
  localStorage.removeItem(LS_KEY);
  const idx=getTodayIdx();
  history=[idx];histIdx=0;
  showSentence(idx);
  showToast('초기화되었습니다');
}

function seed(d){const s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();let h=s;h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;return Math.abs(h)}
function getTodayIdx(){return seed(new Date())%sentences.length}
function rand(){return Math.floor(Math.random()*sentences.length)}
function getFavs(){try{return JSON.parse(localStorage.getItem(LS_FAV))||[]}catch{return[]}}
function saveFavs(f){localStorage.setItem(LS_FAV,JSON.stringify(f))}

function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem(LS_LAST);
  let streak=parseInt(localStorage.getItem(LS_STREAK))||0;
  let total=parseInt(localStorage.getItem(LS_TOTAL))||0;
  if(last!==today){
    const yd=new Date();yd.setDate(yd.getDate()-1);
    if(last===yd.toDateString())streak++;else streak=1;
    total++;
    localStorage.setItem(LS_STREAK,streak);
    localStorage.setItem(LS_LAST,today);
    localStorage.setItem(LS_TOTAL,total);
  }
  document.getElementById('streakCount').textContent=streak;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('favCount').textContent=getFavs().length;
}

function showSentence(idx){
  current=sentences[idx];
  const c=document.getElementById('mainCard');
  let wordsHtml='';
  if(current.words&&current.words.length){
    wordsHtml='<div class="word-guide"><h4>단어별 발음 가이드</h4>';
    current.words.forEach(w=>{wordsHtml+=`<div class="word-item"><span class="w-es">${w.es}</span><span class="w-pr">${w.pr}</span><span class="w-kr">${w.kr}</span></div>`});
    wordsHtml+='</div>';
  }
  c.innerHTML=`<div class="category">${current.cat}</div>
<div class="es-text">${current.es}</div>
<div class="pron">${current.pr}</div>
<div class="kr-text">${current.kr}</div>${wordsHtml}`;
  const favs=getFavs();
  const bk=document.getElementById('bookmarkBtn');
  const isFav=favs.some(f=>f.es===current.es);
  bk.className='btn btn-bookmark'+(isFav?' active':'');
  bk.textContent=isFav?'♥ 저장됨':'♡ 저장';
  document.getElementById('prevBtn').disabled=histIdx<=0;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

document.getElementById('nextBtn').onclick=()=>{
  const idx=rand();
  if(histIdx<history.length-1)history=history.slice(0,histIdx+1);
  history.push(idx);histIdx=history.length-1;
  showSentence(idx);
  saveProgress(idx);
};
document.getElementById('prevBtn').onclick=()=>{if(histIdx>0){histIdx--;showSentence(history[histIdx])}};
document.getElementById('copyBtn').onclick=()=>{
  if(!current)return;
  navigator.clipboard.writeText(current.es+'\n'+current.pr+'\n'+current.kr).then(()=>showToast('복사되었습니다!')).catch(()=>showToast('복사 실패'));
};
document.getElementById('bookmarkBtn').onclick=()=>{
  if(!current)return;
  let favs=getFavs();
  const exists=favs.findIndex(f=>f.es===current.es);
  if(exists>=0){favs.splice(exists,1);showToast('즐겨찾기에서 제거됨')}
  else{favs.unshift({es:current.es,kr:current.kr,pr:current.pr,cat:current.cat});showToast('즐겨찾기에 저장됨')}
  saveFavs(favs);renderFavs();showSentence(history[histIdx]);
  document.getElementById('favCount').textContent=favs.length;
};

function renderFavs(){
  const list=document.getElementById('favList');
  const favs=getFavs();
  if(!favs.length){list.innerHTML='<div class="empty-fav">저장된 문장이 없습니다</div>';return}
  list.innerHTML=favs.map((f,i)=>`<div class="fav-card"><div class="fav-text"><div class="fav-es">${f.es}</div><div class="fav-kr">${f.kr}</div></div><button class="fav-remove" data-i="${i}">&times;</button></div>`).join('');
  list.querySelectorAll('.fav-remove').forEach(b=>b.onclick=e=>{
    const idx=parseInt(e.currentTarget.dataset.i);
    let ff=getFavs();ff.splice(idx,1);saveFavs(ff);renderFavs();
    document.getElementById('favCount').textContent=ff.length;
    if(current){const bk=document.getElementById('bookmarkBtn');const isFav=ff.some(f=>f.es===current.es);bk.className='btn btn-bookmark'+(isFav?' active':'');bk.textContent=isFav?'♥ 저장됨':'♡ 저장'}
  });
}

let esReviewMode=false,esReviewList=[],esReviewIdx=0;
function _buildEsReviewCard(s){
  const c=document.getElementById('mainCard');
  while(c.firstChild)c.removeChild(c.firstChild);
  const cat=document.createElement('div');cat.className='category';cat.textContent=s.cat||'복습';
  const es=document.createElement('div');es.className='es-text';es.textContent=s.es;
  const pr=document.createElement('div');pr.className='pron';pr.textContent=s.pr;
  const kr=document.createElement('div');kr.className='kr-text';kr.textContent=s.kr;
  c.appendChild(cat);c.appendChild(es);c.appendChild(pr);c.appendChild(kr);
  if(s.words&&s.words.length){
    const wg=document.createElement('div');wg.className='word-guide';
    const wh=document.createElement('h4');wh.textContent='단어별 발음 가이드';wg.appendChild(wh);
    s.words.forEach(w=>{
      const wi=document.createElement('div');wi.className='word-item';
      const wes=document.createElement('span');wes.className='w-es';wes.textContent=w.es;
      const wpr=document.createElement('span');wpr.className='w-pr';wpr.textContent=w.pr;
      const wkr=document.createElement('span');wkr.className='w-kr';wkr.textContent=w.kr;
      wi.appendChild(wes);wi.appendChild(wpr);wi.appendChild(wkr);wg.appendChild(wi);
    });
    c.appendChild(wg);
  }
}
function showEsReviewSentence(){
  if(esReviewIdx>=esReviewList.length){
    const c=document.getElementById('mainCard');
    while(c.firstChild)c.removeChild(c.firstChild);
    const done=document.createElement('div');
    done.style.cssText='text-align:center;padding:30px;font-size:1.2rem;color:#f7b733;font-weight:bold';
    done.textContent='복습 완료!';
    const sub=document.createElement('div');
    sub.style.cssText='font-size:.9rem;color:#aaa;font-weight:normal;margin-top:8px';
    sub.textContent=esReviewList.length+'개 문장을 모두 복습했습니다';
    done.appendChild(sub);c.appendChild(done);return;
  }
  _buildEsReviewCard(esReviewList[esReviewIdx]);
}
function toggleEsReviewMode(){
  if(esReviewMode){
    esReviewMode=false;
    document.getElementById('esReviewBtn').textContent='복습 모드';
    document.getElementById('esReviewBtn').style.background='linear-gradient(135deg,#f7b733,#fc4a1a)';
    const banner=document.getElementById('esReviewBanner');if(banner)banner.parentNode.removeChild(banner);
    showSentence(history[histIdx]);return;
  }
  esReviewList=getFavs();
  if(!esReviewList.length){showToast('즐겨찾기한 문장이 없습니다. 저장 버튼으로 먼저 추가하세요!');return;}
  esReviewMode=true;esReviewIdx=0;
  document.getElementById('esReviewBtn').textContent='복습 모드 종료';
  document.getElementById('esReviewBtn').style.background='linear-gradient(135deg,#ff4081,#FF6B6B)';
  const existing=document.getElementById('esReviewBanner');if(existing)existing.parentNode.removeChild(existing);
  const banner=document.createElement('div');
  banner.id='esReviewBanner';
  banner.style.cssText='background:linear-gradient(135deg,#f7b733,#fc4a1a);border-radius:10px;padding:10px 16px;margin-bottom:12px;text-align:center;font-size:.85rem;font-weight:bold;max-width:520px;width:100%';
  banner.textContent='복습 모드: 즐겨찾기 '+esReviewList.length+'개 문장';
  const container=document.querySelector('.container');
  container.insertBefore(banner,document.getElementById('mainCard'));
  showEsReviewSentence();
}
(function(){
  const nextBtn=document.getElementById('nextBtn');
  const prevBtn=document.getElementById('prevBtn');
  const origNext=nextBtn.onclick;
  const origPrev=prevBtn.onclick;
  nextBtn.onclick=function(e){if(esReviewMode){esReviewIdx++;showEsReviewSentence();return;}if(origNext)origNext.call(this,e);};
  prevBtn.onclick=function(e){if(esReviewMode){if(esReviewIdx>0){esReviewIdx--;showEsReviewSentence();}return;}if(origPrev)origPrev.call(this,e);};
})();

const _esSaved=loadProgress();
const _esStartIdx=(_esSaved&&_esSaved.lastIdx!=null)?_esSaved.lastIdx:getTodayIdx();
history.push(_esStartIdx);histIdx=0;
showSentence(_esStartIdx);
updateStreak();
renderFavs();
</script>
