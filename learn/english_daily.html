<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#e0e0e0;font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100vh;padding:60px 16px 30px}
.container{max-width:520px;margin:0 auto}
h1{text-align:center;font-size:1.6rem;margin-bottom:6px;background:linear-gradient(135deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#888;font-size:0.85rem;margin-bottom:20px}
.streak-bar{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.streak-item{background:#1a1a2e;padding:8px 16px;border-radius:12px;text-align:center;font-size:0.8rem;color:#aaa}
.streak-item span{display:block;font-size:1.3rem;font-weight:bold;color:#00d2ff}
.card{background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:20px;padding:28px 24px;margin-bottom:16px;border:1px solid rgba(0,210,255,0.15);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00d2ff,#3a7bd5,#7b2ff7)}
.category{display:inline-block;background:rgba(0,210,255,0.15);color:#00d2ff;padding:4px 12px;border-radius:20px;font-size:0.75rem;margin-bottom:16px}
.en-text{font-size:1.7rem;font-weight:bold;color:#fff;line-height:1.5;margin-bottom:12px;letter-spacing:0.3px}
.pron-tip{font-size:0.9rem;color:#a78bfa;margin-bottom:10px;font-style:italic;padding:8px 12px;background:rgba(167,139,250,0.08);border-radius:8px;border-left:3px solid #a78bfa}
.kr-text{font-size:1.1rem;color:#ccc;margin-bottom:12px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid #3a7bd5}
.usage{margin-bottom:14px}
.usage h4{font-size:0.8rem;color:#888;margin-bottom:6px}
.usage-example{font-size:0.9rem;color:#ddd;padding:10px 12px;background:rgba(0,210,255,0.05);border-radius:8px;line-height:1.6}
.usage-example .ex-en{color:#fff;font-weight:500}
.usage-example .ex-kr{color:#888;font-size:0.85rem}
.word-guide{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)}
.word-guide h4{font-size:0.8rem;color:#888;margin-bottom:8px}
.word-item{display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.word-item .w-en{color:#fff;font-weight:500;flex:1}.word-item .w-pr{color:#a78bfa;flex:1;text-align:center}.word-item .w-kr{color:#aaa;flex:1;text-align:right}
.actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn{flex:1;min-width:0;padding:12px 10px;border:none;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn-prev{background:#1a1a2e;color:#aaa;border:1px solid #333}
.btn-prev:hover{background:#222240;color:#fff}
.btn-next{background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff}
.btn-next:hover{transform:scale(1.02)}
.btn-copy{background:#1a1a2e;color:#00d2ff;border:1px solid rgba(0,210,255,0.3)}
.btn-copy:hover{background:rgba(0,210,255,0.1)}
.btn-bookmark{background:#1a1a2e;color:#a78bfa;border:1px solid rgba(167,139,250,0.3)}
.btn-bookmark.active{background:rgba(167,139,250,0.15);color:#a78bfa}
.btn-bookmark:hover{background:rgba(167,139,250,0.1)}
.fav-section{margin-top:24px}
.fav-section h3{font-size:1rem;color:#aaa;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fav-card{background:#1a1a2e;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
.fav-card .fav-text{flex:1}
.fav-card .fav-en{font-size:1rem;color:#fff}
.fav-card .fav-kr{font-size:0.8rem;color:#888;margin-top:2px}
.fav-remove{background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;padding:8px}
.fav-remove:hover{color:#00d2ff}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,210,255,0.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:0.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-weight:600}
.toast.show{opacity:1}
.empty-fav{text-align:center;color:#555;font-size:0.85rem;padding:20px}
.nav-row{display:flex;gap:10px;margin-bottom:16px}
@media(max-width:380px){.en-text{font-size:1.3rem}.btn{font-size:0.8rem;padding:10px 6px}}
</style>
</head>

<script>
const sentences=[
{cat:"일상",en:"It's not a big deal. Don't worry about it.",kr:"별거 아니야. 걱정하지 마.",pron:"'빅 딜'을 강조해서 발음. not a → '나라'처럼 연음",usage:{ex:"A: I'm sorry I forgot your birthday. B: It's not a big deal!",exKr:"A: 생일 깜빡해서 미안. B: 별거 아니야!"},words:[{en:"big deal",pr:"빅 딜",kr:"큰일/대단한 것"},{en:"worry about",pr:"워리 어바웃",kr:"~에 대해 걱정하다"}]},
{cat:"일상",en:"I'm on my way. I'll be there in ten minutes.",kr:"가는 중이야. 10분 안에 도착해.",pron:"on my way → '온 마이 웨이', I'll be → '아일 비'로 빠르게",usage:{ex:"A: Where are you? B: I'm on my way!",exKr:"A: 어디야? B: 가는 중이야!"},words:[{en:"on my way",pr:"온 마이 웨이",kr:"가는 중"},{en:"be there",pr:"비 데어",kr:"거기 있다/도착하다"}]},
{cat:"일상",en:"Let me sleep on it. I'll get back to you tomorrow.",kr:"좀 생각해볼게. 내일 답 줄게.",pron:"sleep on it → '슬립 오닛', get back to → '겟 백 투'",usage:{ex:"This is a big decision. Let me sleep on it.",exKr:"이건 큰 결정이야. 좀 생각해볼게."},words:[{en:"sleep on it",pr:"슬립 온 잇",kr:"하룻밤 자며 생각하다"},{en:"get back to",pr:"겟 백 투",kr:"~에게 답하다"}]},
{cat:"일상",en:"I'm broke. I can't afford it right now.",kr:"나 돈 없어. 지금 그거 살 여유가 없어.",pron:"broke → '브로크' (돈이 없다는 뜻), afford → '어포드'",usage:{ex:"Want to go shopping? I'm broke until payday.",exKr:"쇼핑 갈래? 월급날까지 돈 없어."},words:[{en:"broke",pr:"브로크",kr:"돈이 없는 (속어)"},{en:"afford",pr:"어포드",kr:"~할 여유가 있다"}]},
{cat:"일상",en:"That makes sense. Now I understand.",kr:"그거 이해가 돼. 이제 알겠어.",pron:"makes → '메익스', sense → '센스'",usage:{ex:"Oh, that makes sense! Thanks for explaining.",exKr:"아, 이해된다! 설명해줘서 고마워."},words:[{en:"makes sense",pr:"메익스 센스",kr:"이해가 되다/말이 되다"}]},
{cat:"일상",en:"I feel like having pizza tonight. What do you think?",kr:"오늘 밤 피자 먹고 싶은 기분이야. 어떻게 생각해?",pron:"feel like → '필 라이크', having → '해빙'",usage:{ex:"I feel like staying home today. I'm too tired.",exKr:"오늘은 집에 있고 싶어. 너무 피곤해."},words:[{en:"feel like",pr:"필 라이크",kr:"~하고 싶다"},{en:"What do you think?",pr:"왓 두 유 띵크?",kr:"어떻게 생각해?"}]},
{cat:"일상",en:"My phone is dying. Let me charge it real quick.",kr:"폰 배터리 다 돼가. 빨리 충전 좀 할게.",pron:"dying → '다잉' (배터리가 죽어간다), real quick → '리얼 퀵'",usage:{ex:"Can I use your charger? My phone is dying.",exKr:"충전기 쓸 수 있어? 폰 배터리 다 돼가."},words:[{en:"dying",pr:"다잉",kr:"다 되어가는"},{en:"real quick",pr:"리얼 퀵",kr:"아주 빠르게 (구어)"}]},
{cat:"일상",en:"I totally spaced out. What did you say?",kr:"완전 멍때렸어. 뭐라고 했어?",pron:"spaced out → '스페이스드 아웃'",usage:{ex:"Sorry, I spaced out during the meeting.",exKr:"미안, 회의 중에 멍때렸어."},words:[{en:"spaced out",pr:"스페이스드 아웃",kr:"멍때리다/딴생각하다"}]},
{cat:"일상",en:"I'm running late. Can you save me a seat?",kr:"나 늦을 것 같아. 자리 좀 맡아줄 수 있어?",pron:"running late → '러닝 레이트', save → '세이브'",usage:{ex:"I'm running late because of traffic. Start without me.",exKr:"교통 때문에 늦을 것 같아. 나 없이 시작해."},words:[{en:"running late",pr:"러닝 레이트",kr:"늦어지고 있는"},{en:"save a seat",pr:"세이브 어 씻",kr:"자리를 맡아두다"}]},
{cat:"일상",en:"It's on the tip of my tongue. Give me a second.",kr:"입에서 맴도는데. 잠깐만.",pron:"tip → '팁', tongue → '텅'",usage:{ex:"What's that actor's name? It's on the tip of my tongue!",exKr:"그 배우 이름이 뭐지? 입에서 맴도는데!"},words:[{en:"on the tip of my tongue",pr:"온 더 팁 오브 마이 텅",kr:"입에서 맴돌다 (기억이 날 듯 말 듯)"}]},
{cat:"일상",en:"Let's call it a day. I'm exhausted.",kr:"오늘은 여기까지 하자. 지쳤어.",pron:"call it a day → '콜 잇 어 데이', exhausted → '이그조스티드'",usage:{ex:"We've been working for 10 hours. Let's call it a day.",exKr:"10시간째 일했어. 오늘은 여기까지 하자."},words:[{en:"call it a day",pr:"콜 잇 어 데이",kr:"(하루 일을) 마치다"},{en:"exhausted",pr:"이그조스티드",kr:"지친/기진맥진한"}]},
{cat:"일상",en:"You nailed it! That presentation was perfect.",kr:"완벽했어! 그 발표 완전 잘했어.",pron:"nailed it → '네일드 잇'",usage:{ex:"You totally nailed the interview. I'm sure you'll get the job.",exKr:"면접 완전 잘했어. 분명 합격할 거야."},words:[{en:"nailed it",pr:"네일드 잇",kr:"완벽하게 해내다"},{en:"presentation",pr:"프레젠테이션",kr:"발표"}]},
{cat:"일상",en:"I'm not in the mood. Maybe some other time.",kr:"그런 기분이 아니야. 다음에.",pron:"mood → '무드', some other time → '썸 아더 타임'",usage:{ex:"Want to go out? I'm not in the mood tonight.",exKr:"나갈래? 오늘 밤은 그런 기분이 아니야."},words:[{en:"not in the mood",pr:"낫 인 더 무드",kr:"그런 기분이 아닌"},{en:"some other time",pr:"썸 아더 타임",kr:"다른 때에"}]},
{cat:"일상",en:"Long story short, we broke up.",kr:"요약하자면, 우리 헤어졌어.",pron:"long story short → '롱 스토리 숏'",usage:{ex:"Long story short, I quit my job and started my own business.",exKr:"간단히 말하면, 직장 그만두고 창업했어."},words:[{en:"long story short",pr:"롱 스토리 숏",kr:"요약하자면"},{en:"broke up",pr:"브로크 업",kr:"헤어지다"}]},
{cat:"일상",en:"I have a lot on my plate right now.",kr:"지금 할 일이 너무 많아.",pron:"plate → '플레이트'",usage:{ex:"Can you help me? I have too much on my plate this week.",exKr:"도와줄 수 있어? 이번 주 할 일이 너무 많아."},words:[{en:"a lot on my plate",pr:"어 랏 온 마이 플레이트",kr:"할 일이 많은 (관용구)"}]},
{cat:"비즈니스",en:"Let's circle back to this later.",kr:"이건 나중에 다시 논의합시다.",pron:"circle back → '써클 백'",usage:{ex:"We're running out of time. Let's circle back to this in the next meeting.",exKr:"시간이 없어요. 다음 회의에서 다시 논의합시다."},words:[{en:"circle back",pr:"써클 백",kr:"다시 돌아오다/재논의하다"}]},
{cat:"비즈니스",en:"I'll keep you in the loop on any updates.",kr:"업데이트 있으면 계속 알려드릴게요.",pron:"keep you in the loop → '킵 유 인 더 루프'",usage:{ex:"Don't worry, I'll keep you in the loop.",exKr:"걱정 마세요, 계속 알려드릴게요."},words:[{en:"keep in the loop",pr:"킵 인 더 루프",kr:"정보를 공유하다/계속 알리다"}]},
{cat:"비즈니스",en:"Let's get the ball rolling on this project.",kr:"이 프로젝트 시작합시다.",pron:"get the ball rolling → '겟 더 볼 롤링'",usage:{ex:"We've planned enough. Let's get the ball rolling.",exKr:"충분히 계획했어요. 이제 시작합시다."},words:[{en:"get the ball rolling",pr:"겟 더 볼 롤링",kr:"시작하다/착수하다"}]},
{cat:"비즈니스",en:"Could you walk me through the proposal?",kr:"제안서 좀 설명해주실 수 있나요?",pron:"walk me through → '워크 미 쓰루'",usage:{ex:"I'm new here. Could you walk me through the process?",exKr:"저 신입이에요. 과정을 설명해주실 수 있나요?"},words:[{en:"walk through",pr:"워크 쓰루",kr:"자세히 설명하다/안내하다"}]},
{cat:"비즈니스",en:"I think we're on the same page here.",kr:"우리 같은 생각인 것 같아요.",pron:"on the same page → '온 더 세임 페이지'",usage:{ex:"Just to make sure we're on the same page, the deadline is Friday.",exKr:"확인 차원에서, 마감은 금요일 맞죠?"},words:[{en:"on the same page",pr:"온 더 세임 페이지",kr:"같은 생각인/합의된"}]},
{cat:"비즈니스",en:"Let me play devil's advocate for a moment.",kr:"잠깐 반대 입장에서 생각해볼게요.",pron:"devil's advocate → '데빌스 애드버킷'",usage:{ex:"Let me play devil's advocate — what if the client says no?",exKr:"반대로 생각해보면 — 클라이언트가 거절하면 어쩌죠?"},words:[{en:"devil's advocate",pr:"데빌스 애드버킷",kr:"반대 의견을 내는 사람 (토론을 위해)"}]},
{cat:"비즈니스",en:"We need to think outside the box on this one.",kr:"이건 틀을 깨는 사고가 필요해요.",pron:"outside the box → '아웃사이드 더 박스'",usage:{ex:"The usual approach won't work. We need to think outside the box.",exKr:"기존 방법으론 안 돼요. 창의적으로 생각해야 해요."},words:[{en:"think outside the box",pr:"띵크 아웃사이드 더 박스",kr:"창의적으로/틀에서 벗어나 생각하다"}]},
{cat:"비즈니스",en:"I'll follow up with an email after the meeting.",kr:"회의 후에 이메일로 후속 조치 하겠습니다.",pron:"follow up → '팔로 업'",usage:{ex:"Thanks for the discussion. I'll follow up with the details.",exKr:"논의 감사합니다. 세부사항 후속 연락드릴게요."},words:[{en:"follow up",pr:"팔로 업",kr:"후속 조치를 하다"}]},
{cat:"비즈니스",en:"Let's take this offline and discuss it one-on-one.",kr:"이건 따로 일대일로 논의합시다.",pron:"take this offline → '테이크 디스 오프라인', one-on-one → '원온원'",usage:{ex:"This is getting complex. Let's take this offline.",exKr:"이건 복잡해지고 있어요. 따로 이야기합시다."},words:[{en:"take offline",pr:"테이크 오프라인",kr:"(회의 밖에서) 따로 논의하다"},{en:"one-on-one",pr:"원온원",kr:"일대일"}]},
{cat:"비즈니스",en:"The bottom line is we need to cut costs by 20%.",kr:"결론은 비용을 20% 줄여야 한다는 거예요.",pron:"bottom line → '바텀 라인', cut costs → '컷 코스츠'",usage:{ex:"The bottom line is — we need more customers.",exKr:"결론은 — 더 많은 고객이 필요하다는 거예요."},words:[{en:"bottom line",pr:"바텀 라인",kr:"결론/핵심"},{en:"cut costs",pr:"컷 코스츠",kr:"비용을 줄이다"}]},
{cat:"비즈니스",en:"I'll touch base with you next week.",kr:"다음 주에 연락드릴게요.",pron:"touch base → '터치 베이스'",usage:{ex:"Great progress today. I'll touch base with you on Monday.",exKr:"오늘 잘 진행됐어요. 월요일에 연락드릴게요."},words:[{en:"touch base",pr:"터치 베이스",kr:"연락하다/확인하다"}]},
{cat:"비즈니스",en:"We're ahead of schedule. Great job, team!",kr:"일정보다 앞서가고 있어요. 팀 수고했어요!",pron:"ahead of → '어헤드 오브', schedule → '스케줄'",usage:{ex:"The project is ahead of schedule by two weeks.",exKr:"프로젝트가 2주나 앞서가고 있어요."},words:[{en:"ahead of schedule",pr:"어헤드 오브 스케줄",kr:"일정보다 앞서"}]},

let history=[],histIdx=-1,current=null;
const LS_FAV='en_favs',LS_STREAK='en_streak',LS_LAST='en_last',LS_TOTAL='en_total';

function seed(d){const s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();let h=s;h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;return Math.abs(h)}
function getTodayIdx(){return seed(new Date())%sentences.length}
function rand(){return Math.floor(Math.random()*sentences.length)}
function getFavs(){try{return JSON.parse(localStorage.getItem(LS_FAV))||[]}catch{return[]}}
function saveFavs(f){localStorage.setItem(LS_FAV,JSON.stringify(f))}

function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem(LS_LAST);
  let streak=parseInt(localStorage.getItem(LS_STREAK))||0;
  let total=parseInt(localStorage.getItem(LS_TOTAL))||0;
  if(last!==today){
    const yd=new Date();yd.setDate(yd.getDate()-1);
    if(last===yd.toDateString())streak++;else streak=1;
    total++;
    localStorage.setItem(LS_STREAK,streak);
    localStorage.setItem(LS_LAST,today);
    localStorage.setItem(LS_TOTAL,total);
  }
  document.getElementById('streakCount').textContent=streak;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('favCount').textContent=getFavs().length;
}

function showSentence(idx){
  current=sentences[idx];
  const c=document.getElementById('mainCard');
  let wordsHtml='';
  if(current.words&&current.words.length){
    wordsHtml='<div class="word-guide"><h4>단어별 분석</h4>';
    current.words.forEach(w=>{wordsHtml+=`<div class="word-item"><span class="w-en">${w.en}</span><span class="w-pr">${w.pr}</span><span class="w-kr">${w.kr}</span></div>`});
    wordsHtml+='</div>';
  }
  let usageHtml='';
  if(current.usage){
    usageHtml=`<div class="usage"><h4>활용 예시</h4><div class="usage-example"><div class="ex-en">${current.usage.ex}</div><div class="ex-kr">${current.usage.exKr}</div></div></div>`;
  }
  c.innerHTML=`<div class="category">${current.cat}</div>
<div class="en-text">${current.en}</div>
<div class="pron-tip">${current.pron}</div>
<div class="kr-text">${current.kr}</div>${usageHtml}${wordsHtml}`;
  const favs=getFavs();
  const bk=document.getElementById('bookmarkBtn');
  const isFav=favs.some(f=>f.en===current.en);
  bk.className='btn btn-bookmark'+(isFav?' active':'');
  bk.textContent=isFav?'♥ 저장됨':'♡ 저장';
  document.getElementById('prevBtn').disabled=histIdx<=0;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

document.getElementById('nextBtn').onclick=()=>{
  const idx=rand();
  if(histIdx<history.length-1)history=history.slice(0,histIdx+1);
  history.push(idx);histIdx=history.length-1;
  showSentence(idx);
};
document.getElementById('prevBtn').onclick=()=>{if(histIdx>0){histIdx--;showSentence(history[histIdx])}};
document.getElementById('copyBtn').onclick=()=>{
  if(!current)return;
  navigator.clipboard.writeText(current.en+'\n'+current.kr).then(()=>showToast('복사되었습니다!')).catch(()=>showToast('복사 실패'));
};
document.getElementById('bookmarkBtn').onclick=()=>{
  if(!current)return;
  let favs=getFavs();
  const exists=favs.findIndex(f=>f.en===current.en);
  if(exists>=0){favs.splice(exists,1);showToast('즐겨찾기에서 제거됨')}
  else{favs.unshift({en:current.en,kr:current.kr,cat:current.cat});showToast('즐겨찾기에 저장됨')}
  saveFavs(favs);renderFavs();showSentence(history[histIdx]);
  document.getElementById('favCount').textContent=favs.length;
};

function renderFavs(){
  const list=document.getElementById('favList');
  const favs=getFavs();
  if(!favs.length){list.innerHTML='<div class="empty-fav">저장된 문장이 없습니다</div>';return}
  list.innerHTML=favs.map((f,i)=>`<div class="fav-card"><div class="fav-text"><div class="fav-en">${f.en}</div><div class="fav-kr">${f.kr}</div></div><button class="fav-remove" data-i="${i}">&times;</button></div>`).join('');
  list.querySelectorAll('.fav-remove').forEach(b=>b.onclick=e=>{
    const idx=parseInt(e.currentTarget.dataset.i);
    let ff=getFavs();ff.splice(idx,1);saveFavs(ff);renderFavs();
    document.getElementById('favCount').textContent=ff.length;
    if(current){const bk=document.getElementById('bookmarkBtn');const isFav=ff.some(f=>f.en===current.en);bk.className='btn btn-bookmark'+(isFav?' active':'');bk.textContent=isFav?'♥ 저장됨':'♡ 저장'}
  });
}

const todayIdx=getTodayIdx();
history.push(todayIdx);histIdx=0;
showSentence(todayIdx);
updateStreak();
renderFavs();
</script>
