.btn-know{background:#00c853;color:#fff}
.btn-dont{background:#ff4081;color:#fff}
.btn-next{background:#333;color:#ccc}
.stats{font-size:.85rem;color:#aaa;margin-top:16px}

let level='초급',words=[],idx=0,known=new Set(),flipped=false;
function setLevel(lv,btn){level=lv;document.querySelectorAll('.levels button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');startDeck()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startDeck(){words=shuffle([...allWords[level]]);idx=0;known=new Set();showCard()}
function showCard(){
if(idx>=words.length){document.getElementById('wordEl').textContent='완료!';document.getElementById('meanEl').textContent='모든 단어를 학습했습니다';flipped=false;document.getElementById('cardInner').classList.remove('flipped');updateProg();return}
flipped=false;document.getElementById('cardInner').classList.remove('flipped');
document.getElementById('wordEl').textContent=words[idx][0];
document.getElementById('meanEl').textContent=words[idx][1];
updateProg();
}
function flipCard(){flipped=!flipped;document.getElementById('cardInner').classList.toggle('flipped')}
function markKnow(){known.add(idx);idx++;showCard()}
function markDont(){idx++;showCard()}
function updateProg(){
const total=words.length;
document.getElementById('progFill').style.width=(idx/total*100)+'%';
document.getElementById('progText').textContent=`${idx} / ${total}`;
document.getElementById('stats').textContent=`아는 단어: ${known.size} | 모르는 단어: ${idx-known.size}`;
}
startDeck();

<h2>영어 단어장</h2>
<p>초급부터 고급까지 영어 단어를 암기할 수 있는 학습 도구입니다. 플래시카드 형식으로 단어, 발음, 예문을 함께 제공합니다.</p>

<h3>사용 방법</h3>
