{cat:"인사",jp:"おやすみなさい。いい夢を見てね。",rm:"Oyasuminasai. Ii yume wo mite ne.",kr:"안녕히 주무세요. 좋은 꿈 꾸세요.",words:[{jp:"おやすみ",rm:"oyasumi",kr:"잘 자"},{jp:"夢",rm:"yume",kr:"꿈"},{jp:"見て",rm:"mite",kr:"꿔"}]},

{cat:"일상",jp:"コーヒーと紅茶、どちらがいいですか？",rm:"Koohii to koucha, dochira ga ii desu ka?",kr:"커피와 홍차 중 어느 쪽이 좋으세요?",words:[{jp:"コーヒー",rm:"koohii",kr:"커피"},{jp:"紅茶",rm:"koucha",kr:"홍차"},{jp:"どちら",rm:"dochira",kr:"어느 쪽"}]},

{cat:"일상",jp:"電車が遅れています。少し待ちましょう。",rm:"Densha ga okurete imasu. Sukoshi machimashou.",kr:"전철이 지연되고 있어요. 조금 기다리죠.",words:[{jp:"電車",rm:"densha",kr:"전철"},{jp:"遅れて",rm:"okurete",kr:"지연되어"},{jp:"少し",rm:"sukoshi",kr:"조금"}]},

{cat:"일상",jp:"このケーキ、本当に美味しいですね！",rm:"Kono keeki, hontou ni oishii desu ne!",kr:"이 케이크 정말 맛있네요!",words:[{jp:"ケーキ",rm:"keeki",kr:"케이크"},{jp:"本当に",rm:"hontou ni",kr:"정말로"},{jp:"美味しい",rm:"oishii",kr:"맛있다"}]},
{cat:"일상",jp:"もう少し安くなりませんか？",rm:"Mou sukoshi yasuku narimasen ka?",kr:"좀 더 싸게 안 될까요?",words:[{jp:"もう少し",rm:"mou sukoshi",kr:"좀 더"},{jp:"安く",rm:"yasuku",kr:"싸게"}]},
{cat:"일상",jp:"頭が痛いので、薬を飲みます。",rm:"Atama ga itai node, kusuri wo nomimasu.",kr:"머리가 아파서 약을 먹을게요.",words:[{jp:"頭",rm:"atama",kr:"머리"},{jp:"痛い",rm:"itai",kr:"아프다"},{jp:"薬",rm:"kusuri",kr:"약"},{jp:"飲みます",rm:"nomimasu",kr:"마십니다/먹습니다"}]},

{cat:"감정",jp:"あなたのことをずっと応援しています。",rm:"Anata no koto wo zutto ouen shiteimasu.",kr:"당신을 계속 응원하고 있어요.",words:[{jp:"あなた",rm:"anata",kr:"당신"},{jp:"ずっと",rm:"zutto",kr:"계속"},{jp:"応援",rm:"ouen",kr:"응원"}]}
];

let history=[], histIdx=-1, current=null;
const LS_FAV='jp_favs', LS_STREAK='jp_streak', LS_LAST='jp_last', LS_TOTAL='jp_total';

function seed(d){const s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();let h=s;h=((h>>16)^h)*0x45d9f3b;h=((h>>16)^h)*0x45d9f3b;h=(h>>16)^h;return Math.abs(h)}
function getTodayIdx(){return seed(new Date())%sentences.length}
function rand(){return Math.floor(Math.random()*sentences.length)}

function getFavs(){try{return JSON.parse(localStorage.getItem(LS_FAV))||[]}catch{return[]}}
function saveFavs(f){localStorage.setItem(LS_FAV,JSON.stringify(f))}

function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem(LS_LAST);
  let streak=parseInt(localStorage.getItem(LS_STREAK))||0;
  let total=parseInt(localStorage.getItem(LS_TOTAL))||0;
  if(last!==today){
    const yd=new Date();yd.setDate(yd.getDate()-1);
    if(last===yd.toDateString())streak++;
    else streak=1;
    total++;
    localStorage.setItem(LS_STREAK,streak);
    localStorage.setItem(LS_LAST,today);
    localStorage.setItem(LS_TOTAL,total);
  }
  document.getElementById('streakCount').textContent=streak;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('favCount').textContent=getFavs().length;
}

function showSentence(idx){
  current=sentences[idx];
  const c=document.getElementById('mainCard');
  let wordsHtml='';
  if(current.words&&current.words.length){
    wordsHtml='<div class="word-guide"><h4>단어별 발음 가이드</h4>';
    current.words.forEach(w=>{wordsHtml+=`<div class="word-item"><span class="w-jp">${w.jp}</span><span class="w-rm">${w.rm}</span><span class="w-kr">${w.kr}</span></div>`});
    wordsHtml+='</div>';
  }
  c.innerHTML=`<div class="category">${current.cat}</div>
<div class="jp-text">${current.jp}</div>
<div class="romaji">${current.rm}</div>
<div class="kr-text">${current.kr}</div>${wordsHtml}`;
  const favs=getFavs();
  const bk=document.getElementById('bookmarkBtn');
  const isFav=favs.some(f=>f.jp===current.jp);
  bk.className='btn btn-bookmark'+(isFav?' active':'');
  bk.textContent=isFav?'♥ 저장됨':'♡ 저장';
  document.getElementById('prevBtn').disabled=histIdx<=0;
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

document.getElementById('nextBtn').onclick=()=>{
  const idx=rand();
  if(histIdx<history.length-1)history=history.slice(0,histIdx+1);
  history.push(idx);histIdx=history.length-1;
  showSentence(idx);
};
document.getElementById('prevBtn').onclick=()=>{
  if(histIdx>0){histIdx--;showSentence(history[histIdx])}
};
document.getElementById('copyBtn').onclick=()=>{
  if(!current)return;
  navigator.clipboard.writeText(current.jp+'\n'+current.rm+'\n'+current.kr).then(()=>showToast('복사되었습니다!')).catch(()=>showToast('복사 실패'));
};
document.getElementById('bookmarkBtn').onclick=()=>{
  if(!current)return;
  let favs=getFavs();
  const exists=favs.findIndex(f=>f.jp===current.jp);
  if(exists>=0){favs.splice(exists,1);showToast('즐겨찾기에서 제거됨')}
  else{favs.unshift({jp:current.jp,kr:current.kr,rm:current.rm,cat:current.cat});showToast('즐겨찾기에 저장됨')}
  saveFavs(favs);renderFavs();showSentence(history[histIdx]);
  document.getElementById('favCount').textContent=favs.length;
};

function renderFavs(){
  const list=document.getElementById('favList');
  const favs=getFavs();
  if(!favs.length){list.innerHTML='<div class="empty-fav">저장된 문장이 없습니다</div>';return}
  list.innerHTML=favs.map((f,i)=>`<div class="fav-card"><div class="fav-text"><div class="fav-jp">${f.jp}</div><div class="fav-kr">${f.kr}</div></div><button class="fav-remove" data-i="${i}">&times;</button></div>`).join('');
  list.querySelectorAll('.fav-remove').forEach(b=>b.onclick=e=>{
    const idx=parseInt(e.currentTarget.dataset.i);
    let ff=getFavs();ff.splice(idx,1);saveFavs(ff);renderFavs();
    document.getElementById('favCount').textContent=ff.length;
    if(current){const bk=document.getElementById('bookmarkBtn');const isFav=ff.some(f=>f.jp===current.jp);bk.className='btn btn-bookmark'+(isFav?' active':'');bk.textContent=isFav?'♥ 저장됨':'♡ 저장'}
  });
}

// Init
const todayIdx=getTodayIdx();
history.push(todayIdx);histIdx=0;
showSentence(todayIdx);
updateStreak();
renderFavs();
</script>
