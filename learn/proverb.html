let quiz=[],qIdx=0,score=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(){
quiz=shuffle([...proverbs]).slice(0,10);qIdx=0;score=0;
document.getElementById('result').style.display='none';
document.getElementById('card').style.display='block';
document.getElementById('options').style.display='flex';
showQ();
}
function showQ(){
if(qIdx>=10){showResult();return}
const q=quiz[qIdx];
document.getElementById('prog').textContent=`${qIdx+1} / 10`;
document.getElementById('score').textContent=`점수: ${score}`;
document.getElementById('nextBtn').style.display='none';
document.getElementById('meaning').style.display='none';
document.getElementById('proverb').innerHTML=q[0].replace('___','<span class="blank">???</span>');
const wrongAnswers=shuffle(proverbs.filter(p=>p!==q)).slice(0,3).map(p=>p[1]);
const opts=shuffle([q[1],...wrongAnswers]);
const el=document.getElementById('options');el.innerHTML='';
opts.forEach(o=>{
const b=document.createElement('button');b.className='opt-btn';b.textContent=o;
b.onclick=()=>{
document.querySelectorAll('.opt-btn').forEach(x=>{x.disabled=true;if(x.textContent===q[1])x.classList.add('correct')});
if(o===q[1]){score++}else{b.classList.add('wrong')}
document.getElementById('score').textContent=`점수: ${score}`;
document.getElementById('proverb').innerHTML=q[0].replace('___',`<span class="blank" style="color:#00e5ff;border-color:#00e5ff">${q[1]}</span>`);
document.getElementById('meaning').textContent='💡 '+q[2];
document.getElementById('meaning').style.display='block';
document.getElementById('nextBtn').style.display='inline-block';
};
el.appendChild(b);
});
}
function nextQ(){qIdx++;showQ()}
function showResult(){
document.getElementById('card').style.display='none';
document.getElementById('options').style.display='none';
document.getElementById('nextBtn').style.display='none';
document.getElementById('meaning').style.display='none';
document.getElementById('result').style.display='block';
document.getElementById('finalScore').textContent=score+' / 10';
}
startQuiz();
</script>
