<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
.wrap{max-width:500px;width:100%;padding:20px;text-align:center}
.progress{background:#1a1a2e;border-radius:10px;height:8px;margin-bottom:15px;overflow:hidden}.progress-fill{background:linear-gradient(90deg,#7B68EE,#FF6B6B);height:100%;border-radius:10px;transition:width .3s}
.q-card{background:#1a1a2e;border-radius:16px;padding:22px;border:1px solid #2a2a4a;margin-bottom:12px}

.opt{background:#252545;border:2px solid #333;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;transition:all .2s;text-align:left}
.opt:hover{border-color:#7B68EE}
.opt.correct{border-color:#4CAF50;background:#1a3a1a}
.opt.wrong{border-color:#F44336;background:#3a1a1a}
.explain{color:#aaa;font-size:13px;margin-top:10px;padding:10px;background:#252545;border-radius:8px;text-align:left;display:none}
.btn{background:#7B68EE;border:none;color:#fff;padding:12px 30px;border-radius:10px;font-size:16px;cursor:pointer;margin-top:15px;font-weight:bold}body{overflow-x:hidden}.wrap,.container{max-width:100%;padding-left:12px;padding-right:12px}canvas{max-width:100%!important;height:auto!important}input,select,textarea,button{max-width:100%;font-size:16px!important}@media(max-width:600px){h1{font-size:22px!important}h2{font-size:18px!important}h3{font-size:15px!important}.wrap,.container{padding-left:10px;padding-right:10px;padding-top:45px}.card{padding:14px;margin:8px 0}.q-card{padding:16px}.q-text{font-size:15px!important}.opt{padding:12px;font-size:14px!important;min-height:44px}.btn{min-height:44px;font-size:15px!important}pre,code{font-size:11px!important;overflow-x:auto;word-break:break-all}.result{font-size:24px!important}.controls{flex-wrap:wrap}.controls button,.controls input{min-height:40px}.flow{flex-direction:column}.box{min-width:auto;width:100%}.arr{transform:rotate(90deg)}.grid{gap:4px}.cell{font-size:16px!important}}</style></head><body><a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap" id="app"></div>
<script>
function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const Q=_shuf([{"q": "typeof null의 결과는?", "o": ["'null'", "'undefined'", "'object'", "'boolean'"], "a": 2, "e": "JavaScript의 유명한 버그! typeof null은 \"object\"를 반환합니다."}, {"q": "[] == false 의 결과는?", "o": ["true", "false", "TypeError", "undefined"], "a": 0, "e": "빈 배열은 불리언 변환 시 true이지만, == 비교에서는 숫자로 변환되어 0 == 0이 됩니다."}, {"q": "let과 var의 차이점은?", "o": ["없다", "스코프가 다르다", "속도가 다르다", "타입이 다르다"], "a": 1, "e": "let은 블록 스코프, var는 함수 스코프입니다."}, {"q": "NaN === NaN의 결과는?", "o": ["true", "false", "NaN", "TypeError"], "a": 1, "e": "NaN은 자기 자신과도 같지 않은 유일한 값입니다."}, {"q": "Promise의 3가지 상태가 아닌 것은?", "o": ["pending", "fulfilled", "rejected", "completed"], "a": 3, "e": "Promise는 pending, fulfilled, rejected 3가지 상태를 가집니다."}, {"q": "\"1\" + 2 의 결과는?", "o": ["3", "12", "\"12\"", "NaN"], "a": 2, "e": "문자열 + 숫자는 문자열 연결이 됩니다."}, {"q": "const로 선언한 배열에 push가 가능할까?", "o": ["가능", "불가능", "에러 발생", "undefined"], "a": 0, "e": "const는 재할당을 막지만 객체/배열의 내용 변경은 가능합니다."}, {"q": "호이스팅이란?", "o": ["변수를 위로 올리는 것", "함수를 아래로 내리는 것", "에러 처리", "비동기 처리"], "a": 0, "e": "변수/함수 선언이 스코프 최상단으로 끌어올려지는 현상입니다."}, {"q": "== 와 === 의 차이는?", "o": ["없다", "타입 변환 여부", "속도 차이", "문법 차이"], "a": 1, "e": "==는 타입 변환 후 비교, ===는 타입까지 엄격 비교합니다."}, {"q": "addEventListener의 세 번째 인자는?", "o": ["콜백 함수", "이벤트 이름", "캡처/옵션", "타임아웃"], "a": 2, "e": "세 번째 인자로 capture 여부나 옵션 객체를 전달할 수 있습니다."}]);
let cur=0,score=0,answered=false;
function render(){
const app=document.getElementById('app');
if(cur>=Q.length){const grade=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
const emoji2=score>=9?'🏆':score>=7?'👏':score>=5?'👍':score>=3?'😅':'💪';
app.innerHTML=`<div style="font-size:50px">${emoji2}</div><h1 style="margin:10px 0">${score}/${Q.length}</h1><div style="font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0">등급: ${grade}</div><p style="color:#aaa">${score>=7?'대단해요!':score>=5?'잘했어요!':'다음엔 더 잘할 수 있어요!'}</p><button class="btn" onclick="cur=0;score=0;_shuf(Q);render()">다시 하기</button>`;return;}
const q=Q[cur],pct=(cur/Q.length*100)|0;
app.innerHTML=`<div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="q-card"><div style="color:#888;font-size:13px;margin-bottom:8px">💛 ${cur+1}/${Q.length}</div>
<div class="q-text">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt" id="opt${i}" onclick="answer(${i})">${o}</div>`).join('')}</div>
<div class="explain" id="explain">${q.e||''}</div></div>`;answered=false;}
function answer(i){if(answered)return;answered=true;const q=Q[cur];
document.getElementById('opt'+i).classList.add(i===q.a?'correct':'wrong');
if(i!==q.a)document.getElementById('opt'+q.a).classList.add('correct');
if(i===q.a)score++;
const el=document.getElementById('explain');if(q.e){el.style.display='block';}
setTimeout(()=>{cur++;render();},1500);}
render();
</script></body></html>
