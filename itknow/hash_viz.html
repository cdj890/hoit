<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>
<div class="wrap">
<h1>해시 테이블 시각화</h1><div style="background:#252545;border-radius:10px;padding:12px;margin:10px 0;text-align:left;font-size:13px;line-height:1.7"><b style="color:#FFD700">해시 테이블이란?</b> <span style="color:#ccc">키를 해시 함수로 변환해 배열 인덱스에 저장하는 자료구조. 평균 O(1) 탐색! 파이썬 dict, JS object가 해시 테이블입니다.</span></div>
<p class="sub">키를 입력하면 해시 함수로 버킷에 저장됩니다</p>
<div class="row">
<input type="text" id="keyInp" placeholder="키 (key)" maxlength="12">
<input type="text" id="valInp" placeholder="값 (value)" maxlength="12">
</div>
<div class="row">
<button class="btn btn-ins" onclick="doInsert()">삽입</button>
<button class="btn btn-find" onclick="doSearch()">검색</button>
<button class="btn btn-del" onclick="doDelete()">삭제</button>
</div>
<div class="hash-calc" id="hashCalc">키를 입력하면 해시 계산 과정이 표시됩니다</div>
<div class="info" id="info"></div>
<div class="table" id="table"></div>
<div class="explain">
<h3>해시 테이블이란?</h3>
<p>키(key)를 해시 함수에 넣으면 배열의 인덱스가 나옵니다. 평균 O(1)으로 삽입/검색/삭제가 가능합니다. 두 키가 같은 인덱스를 받으면 "충돌(collision)"이 발생하며, 여기서는 체이닝(연결 리스트)으로 해결합니다.</p>
</div>
</div>
<script>
const SIZE=10;
const buckets=Array.from({length:SIZE},()=>[]);
const keyInp=document.getElementById('keyInp'),valInp=document.getElementById('valInp');
const hashCalc=document.getElementById('hashCalc'),info=document.getElementById('info');

function hashFn(key){
let sum=0;
for(let i=0;i<key.length;i++)sum+=key.charCodeAt(i);
return sum%SIZE;
}
function showHash(key){
let sum=0,parts=[];
for(let i=0;i<key.length;i++){const c=key.charCodeAt(i);sum+=c;parts.push(`'${key[i]}'=${c}`)}
const idx=sum%SIZE;
hashCalc.innerHTML=`hash("${key}") = (${parts.join(' + ')}) % ${SIZE} = <b>${sum} % ${SIZE} = ${idx}</b>`;
return idx;
}

function doInsert(){
const k=keyInp.value.trim(),v=valInp.value.trim();
if(!k){info.textContent='키를 입력해주세요';return}
const idx=showHash(k);
const bucket=buckets[idx];
const exist=bucket.find(item=>item.key===k);
if(exist){exist.value=v||'(빈값)';info.textContent=`키 "${k}" 의 값을 업데이트했습니다 (버킷 ${idx})`}
else{bucket.push({key:k,value:v||'(빈값)'});
info.textContent=bucket.length>1?`충돌 발생! 버킷 ${idx}에 체이닝으로 추가 (${bucket.length}개)`:`버킷 ${idx}에 삽입 완료`}
keyInp.value='';valInp.value='';render(idx);
}
function doSearch(){
const k=keyInp.value.trim();
if(!k){info.textContent='검색할 키를 입력해주세요';return}
const idx=showHash(k);
const bucket=buckets[idx];
const item=bucket.find(it=>it.key===k);
if(item){info.textContent=`검색 성공: "${k}" → "${item.value}" (버킷 ${idx})`}
else{info.textContent=`"${k}" 를 찾을 수 없습니다`}
render(idx,k);
}
function doDelete(){
const k=keyInp.value.trim();
if(!k){info.textContent='삭제할 키를 입력해주세요';return}
const idx=showHash(k);
const bucket=buckets[idx];
const fi=bucket.findIndex(it=>it.key===k);
if(fi!==-1){bucket.splice(fi,1);info.textContent=`"${k}" 삭제 완료 (버킷 ${idx})`}
else{info.textContent=`"${k}" 를 찾을 수 없습니다`}
keyInp.value='';render(idx);
}

function render(activeIdx=-1,foundKey=''){
const table=document.getElementById('table');
table.innerHTML='';
for(let i=0;i<SIZE;i++){
const d=document.createElement('div');d.className='bucket';
const idxDiv=document.createElement('div');
idxDiv.className='bucket-idx'+(i===activeIdx?' active':'');
idxDiv.textContent=i;
d.appendChild(idxDiv);
const chain=document.createElement('div');chain.className='bucket-chain';
if(buckets[i].length===0){chain.innerHTML='<span class="empty-txt">비어있음</span>'}
else{
buckets[i].forEach((item,j)=>{
if(j>0){const ar=document.createElement('span');ar.className='chain-arrow';ar.textContent='→';chain.appendChild(ar)}
const ci=document.createElement('span');
ci.className='chain-item'+(item.key===foundKey?' found':'');
ci.textContent=`${item.key}: ${item.value}`;
chain.appendChild(ci);
});
}
d.appendChild(chain);table.appendChild(d);
}
}
keyInp.addEventListener('keydown',e=>{if(e.key==='Enter')doInsert()});
render();
</script>
</body>
