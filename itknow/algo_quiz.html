<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}

<script>
function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
const Q=_shuf([{"q": "버블 정렬의 시간 복잡도(최악)는?", "o": ["O(n)", "O(n log n)", "O(n²)", "O(log n)"], "a": 2, "e": "버블 정렬은 중첩 반복문으로 O(n²)입니다."}, {"q": "이진 탐색의 시간 복잡도는?", "o": ["O(n)", "O(log n)", "O(n²)", "O(1)"], "a": 1, "e": "매 단계마다 탐색 범위가 절반으로 줄어 O(log n)입니다."}, {"q": "스택의 특성은?", "o": ["FIFO", "LIFO", "Random Access", "Sorted"], "a": 1, "e": "스택은 Last In First Out - 마지막에 넣은 것이 먼저 나옵니다."}, {"q": "퀵 정렬의 평균 시간 복잡도는?", "o": ["O(n)", "O(n log n)", "O(n²)", "O(log n)"], "a": 1, "e": "퀵 정렬은 평균 O(n log n)이지만 최악의 경우 O(n²)입니다."}, {"q": "해시 테이블의 탐색 시간 복잡도(평균)는?", "o": ["O(n)", "O(log n)", "O(1)", "O(n²)"], "a": 2, "e": "해시 함수로 바로 위치를 계산하므로 평균 O(1)입니다."}, {"q": "BFS에서 사용하는 자료구조는?", "o": ["스택", "큐", "힙", "트리"], "a": 1, "e": "BFS(너비 우선 탐색)은 큐를 사용하여 레벨별로 탐색합니다."}, {"q": "DFS에서 사용하는 자료구조는?", "o": ["큐", "스택", "배열", "해시"], "a": 1, "e": "DFS(깊이 우선 탐색)은 스택(또는 재귀)을 사용합니다."}, {"q": "O(1)의 의미는?", "o": ["입력에 비례", "상수 시간", "로그 시간", "제곱 시간"], "a": 1, "e": "입력 크기에 관계없이 항상 일정한 시간이 걸립니다."}, {"q": "안정 정렬(stable sort)이 아닌 것은?", "o": ["병합 정렬", "버블 정렬", "삽입 정렬", "퀵 정렬"], "a": 3, "e": "퀵 정렬은 같은 값의 상대적 순서가 보장되지 않는 불안정 정렬입니다."}, {"q": "피보나치 수열의 시간 복잡도(단순 재귀)는?", "o": ["O(n)", "O(n²)", "O(2ⁿ)", "O(log n)"], "a": 2, "e": "단순 재귀로 구현하면 중복 계산이 많아 O(2ⁿ)입니다. DP로 O(n) 가능."}]);
let cur=0,score=0,answered=false;
function render(){
const app=document.getElementById('app');
if(cur>=Q.length){const grade=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
const emoji2=score>=9?'🏆':score>=7?'👏':score>=5?'👍':score>=3?'😅':'💪';
app.innerHTML=`<div style="font-size:50px">${emoji2}</div><h1 style="margin:10px 0">${score}/${Q.length}</h1><div style="font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0">등급: ${grade}</div><p style="color:#aaa">${score>=7?'대단해요!':score>=5?'잘했어요!':'다음엔 더 잘할 수 있어요!'}</p><button class="btn" onclick="cur=0;score=0;_shuf(Q);render()">다시 하기</button>`;return;}
const q=Q[cur],pct=(cur/Q.length*100)|0;
app.innerHTML=`<div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="q-card"><div style="color:#888;font-size:13px;margin-bottom:8px">🧮 ${cur+1}/${Q.length}</div>
<div class="q-text">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt" id="opt${i}" onclick="answer(${i})">${o}</div>`).join('')}</div>
<div class="explain" id="explain">${q.e||''}</div></div>`;answered=false;}
function answer(i){if(answered)return;answered=true;const q=Q[cur];
document.getElementById('opt'+i).classList.add(i===q.a?'correct':'wrong');
if(i!==q.a)document.getElementById('opt'+q.a).classList.add('correct');
if(i===q.a)score++;
const el=document.getElementById('explain');if(q.e){el.style.display='block';}
setTimeout(()=>{cur++;if(cur>=Q.length)_saveQuizScore('algo_quiz',score,Q.length);render();},1500);}
render();
function _saveQuizScore(k,s,t){const p=JSON.parse(localStorage.getItem('hoit_itknow_progress')||'{"visited":[],"quizScores":{}}');const pct=Math.round(s/t*100);if(!p.quizScores[k]||pct>p.quizScores[k])p.quizScores[k]=pct;localStorage.setItem('hoit_itknow_progress',JSON.stringify(p));}
function _markVisited(k){const p=JSON.parse(localStorage.getItem('hoit_itknow_progress')||'{"visited":[],"quizScores":{}}');const alreadyVisited=p.visited.includes(k);if(!alreadyVisited)p.visited.push(k);localStorage.setItem('hoit_itknow_progress',JSON.stringify(p));if(alreadyVisited){const b=document.createElement('div');b.id='_itknow_badge';b.style.cssText='position:fixed;top:8px;right:8px;z-index:9999;background:#4CAF50;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;font-family:sans-serif;font-weight:bold';b.textContent='학습 완료 \u2713';document.body.appendChild(b);}}_markVisited('algo_quiz');
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
