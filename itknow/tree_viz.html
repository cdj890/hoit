<div class="wrap">
<h1>이진 탐색 트리 (BST)</h1><div style="background:#252545;border-radius:10px;padding:12px;margin:10px 0;text-align:left;font-size:13px;line-height:1.7"><b style="color:#FFD700">이진 탐색 트리(BST)란?</b> <span style="color:#ccc">왼쪽 자식은 부모보다 작고, 오른쪽 자식은 부모보다 큰 트리. 평균 O(log n) 탐색이 가능합니다.</span></div>
<p class="sub">숫자를 삽입하고 트리 구조와 순회를 확인해보세요</p>
<div class="row">
<input type="number" id="inp" placeholder="숫자 입력">
<button class="btn btn-ins" onclick="insertVal()">삽입</button>
<button class="btn btn-clr" onclick="clearTree()">초기화</button>
</div>
<div class="trav-row">
<button class="btn-trav" onclick="doTraversal('in')">중위 순회 (Inorder)</button>
<button class="btn-trav" onclick="doTraversal('pre')">전위 순회 (Preorder)</button>
<button class="btn-trav" onclick="doTraversal('post')">후위 순회 (Postorder)</button>
</div>
<canvas id="cv" width="550" height="360"></canvas>
<div class="result" id="res">숫자를 삽입하면 트리가 그려집니다</div>
<div class="explain">
<h3>이진 탐색 트리란?</h3>
<p>왼쪽 자식은 부모보다 작고, 오른쪽 자식은 부모보다 큰 이진 트리입니다. 검색, 삽입, 삭제 평균 O(log n). 중위 순회하면 정렬된 순서로 출력됩니다.</p>
</div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),res=document.getElementById('res'),inp=document.getElementById('inp');
let dpr=window.devicePixelRatio||1;
function sizeCanvas(){
const w=cv.parentElement.clientWidth;cv.style.width=w+'px';cv.style.height='360px';
cv.width=w*dpr;cv.height=360*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
}
sizeCanvas();window.addEventListener('resize',()=>{sizeCanvas();draw()});

class TNode{constructor(v){this.val=v;this.left=null;this.right=null;this.x=0;this.y=0}}
let root=null,highlighted=new Set();

function insert(node,v){
if(!node)return new TNode(v);
if(v<node.val)node.left=insert(node.left,v);
else if(v>node.val)node.right=insert(node.right,v);
return node;
}
function insertVal(){
const v=parseInt(inp.value);if(isNaN(v)){res.textContent='숫자를 입력해주세요';return}
root=insert(root,v);inp.value='';highlighted.clear();draw();
res.innerHTML=`<b>${v}</b> 삽입 완료 (노드 수: ${countNodes(root)})`;
}
function clearTree(){root=null;highlighted.clear();draw();res.textContent='트리가 초기화되었습니다';}
function countNodes(n){return n?1+countNodes(n.left)+countNodes(n.right):0}

function assignPositions(node,x,y,spread){
if(!node)return;
node.x=x;node.y=y;
assignPositions(node.left,x-spread,y+55,spread*0.55);
assignPositions(node.right,x+spread,y+55,spread*0.55);
}

function draw(){
const w=cv.width/dpr,h=cv.height/dpr;
ctx.clearRect(0,0,w,h);
if(!root){ctx.fillStyle='#555';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('트리가 비어있습니다',w/2,h/2);return}
assignPositions(root,w/2,35,w/4.5);
drawEdges(root);drawNodes(root);
}
function drawEdges(n){
if(!n)return;
ctx.strokeStyle='#334155';ctx.lineWidth=2;
if(n.left){ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(n.left.x,n.left.y);ctx.stroke();drawEdges(n.left)}
if(n.right){ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(n.right.x,n.right.y);ctx.stroke();drawEdges(n.right)}
}
function drawNodes(n){
if(!n)return;
const r=20,isH=highlighted.has(n.val);
ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
ctx.fillStyle=isH?'#f59e0b':'#1e293b';ctx.fill();
ctx.strokeStyle=isH?'#fbbf24':'#7ecfff';ctx.lineWidth=2.5;ctx.stroke();
if(isH){ctx.shadowColor='rgba(245,158,11,0.5)';ctx.shadowBlur=12}
ctx.fillStyle=isH?'#000':'#7ecfff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(n.val,n.x,n.y);ctx.shadowBlur=0;
drawNodes(n.left);drawNodes(n.right);
}

function inorder(n,a){if(!n)return;inorder(n.left,a);a.push(n.val);inorder(n.right,a)}
function preorder(n,a){if(!n)return;a.push(n.val);preorder(n.left,a);preorder(n.right,a)}
function postorder(n,a){if(!n)return;postorder(n.left,a);postorder(n.right,a);a.push(n.val)}

function doTraversal(type){
if(!root){res.textContent='트리가 비어있습니다';return}
const arr=[];
if(type==='in')inorder(root,arr);
else if(type==='pre')preorder(root,arr);
else postorder(root,arr);
const names={in:'중위 순회 (Inorder)',pre:'전위 순회 (Preorder)',post:'후위 순회 (Postorder)'};
highlighted.clear();draw();
let i=0;
const iv=setInterval(()=>{
if(i>=arr.length){clearInterval(iv);return}
highlighted.add(arr[i]);draw();
res.innerHTML=`<b>${names[type]}</b>: ${arr.slice(0,i+1).map((v,j)=>j===i?`<b style="color:#fbbf24">[${v}]</b>`:v).join(' → ')}`;
i++;
},500);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter')insertVal()});
draw();
</script>
