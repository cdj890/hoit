function _shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
const Q=_shuf([{"q": "모든 레코드를 선택하는 SQL은?", "o": ["SELECT * FROM table", "GET ALL FROM table", "FETCH * FROM table", "READ ALL table"], "a": 0, "e": "SELECT *는 모든 컬럼을 선택합니다."}, {"q": "중복을 제거하는 키워드는?", "o": ["UNIQUE", "DISTINCT", "DIFFERENT", "SINGLE"], "a": 1, "e": "SELECT DISTINCT는 중복된 행을 제거합니다."}, {"q": "WHERE와 HAVING의 차이는?", "o": ["같다", "HAVING은 그룹에 조건", "WHERE가 더 빠르다", "HAVING은 인덱스 사용"], "a": 1, "e": "WHERE는 행 필터링, HAVING은 GROUP BY 후 그룹 필터링에 사용됩니다."}, {"q": "JOIN의 기본 타입은?", "o": ["LEFT JOIN", "RIGHT JOIN", "INNER JOIN", "OUTER JOIN"], "a": 2, "e": "JOIN만 쓰면 기본적으로 INNER JOIN으로 동작합니다."}, {"q": "NULL 비교 시 사용하는 연산자는?", "o": ["= NULL", "== NULL", "IS NULL", "EQUALS NULL"], "a": 2, "e": "NULL은 = 로 비교할 수 없고, IS NULL / IS NOT NULL을 사용합니다."}, {"q": "ORDER BY의 기본 정렬 방향은?", "o": ["ASC (오름차순)", "DESC (내림차순)", "랜덤", "삽입 순서"], "a": 0, "e": "ORDER BY는 기본적으로 ASC(오름차순)으로 정렬합니다."}, {"q": "GROUP BY와 함께 사용하는 함수가 아닌 것은?", "o": ["COUNT", "SUM", "CONCAT", "AVG"], "a": 2, "e": "COUNT, SUM, AVG, MAX, MIN 등이 집계 함수입니다."}, {"q": "테이블 생성 명령어는?", "o": ["MAKE TABLE", "CREATE TABLE", "NEW TABLE", "BUILD TABLE"], "a": 1, "e": "CREATE TABLE 테이블명 (컬럼 정의)으로 테이블을 생성합니다."}, {"q": "DELETE와 TRUNCATE의 차이는?", "o": ["같다", "TRUNCATE는 전체 삭제+초기화", "DELETE가 더 빠르다", "TRUNCATE는 조건 가능"], "a": 1, "e": "TRUNCATE는 WHERE 조건 없이 전체 삭제하고 테이블을 초기화합니다."}, {"q": "인덱스의 장점은?", "o": ["저장공간 절약", "검색 속도 향상", "보안 강화", "백업 용이"], "a": 1, "e": "인덱스는 검색 속도를 크게 향상시키지만, 삽입/수정 시 오버헤드가 있습니다."},
{"q": "LEFT JOIN의 결과는?", "o": ["양쪽 테이블의 교집합", "왼쪽 테이블 전체 + 오른쪽 일치 행", "오른쪽 테이블 전체", "두 테이블의 합집합"], "a": 1, "e": "LEFT JOIN은 왼쪽 테이블의 모든 행을 반환하고, 오른쪽은 일치하는 행만 가져옵니다. 일치하지 않으면 NULL이 됩니다."},
{"q": "서브쿼리(Subquery)란?", "o": ["두 테이블을 합치는 것", "쿼리 안에 중첩된 또 다른 쿼리", "임시 테이블 생성", "인덱스 생성 쿼리"], "a": 1, "e": "서브쿼리는 SELECT, WHERE, FROM 절 안에 포함된 쿼리입니다. 예: SELECT * FROM t WHERE id IN (SELECT id FROM t2)"},
{"q": "COALESCE(NULL, NULL, 3, 4)의 결과는?", "o": ["NULL", "3", "4", "에러"], "a": 1, "e": "COALESCE는 인자 중 첫 번째 NULL이 아닌 값을 반환합니다. 결과는 3입니다."},
{"q": "ROW_NUMBER() OVER (PARTITION BY dept ORDER BY salary DESC)는?", "o": ["전체 행 번호", "부서별 급여 순위", "최대 급여 계산", "중복 제거"], "a": 1, "e": "윈도우 함수입니다. PARTITION BY로 그룹을 나누고 ORDER BY로 정렬하여 그룹 내 순번을 부여합니다."},
{"q": "UNION과 UNION ALL의 차이는?", "o": ["없다", "UNION은 중복 제거, UNION ALL은 중복 포함", "UNION ALL이 느림", "UNION은 정렬됨"], "a": 1, "e": "UNION은 중복을 제거(DISTINCT)하므로 느리고, UNION ALL은 중복 포함으로 더 빠릅니다."},
{"q": "PRIMARY KEY의 특징으로 틀린 것은?", "o": ["유일한 값", "NULL 불허", "한 테이블에 여러 개 가능", "자동으로 인덱스 생성"], "a": 2, "e": "PRIMARY KEY는 테이블당 하나만 지정할 수 있습니다. 여러 컬럼을 묶어 복합 기본키로 사용할 수는 있습니다."},
{"q": "EXPLAIN 명령의 용도는?", "o": ["테이블 설명 보기", "쿼리 실행 계획 분석", "에러 설명", "컬럼 목록 보기"], "a": 1, "e": "EXPLAIN SELECT ...는 쿼리의 실행 계획을 보여줍니다. 인덱스 사용 여부, 스캔 방식 등 성능 분석에 활용합니다."},
{"q": "트랜잭션의 ACID 중 C(Consistency)는?", "o": ["동시성", "일관성 - 트랜잭션 후 DB가 유효한 상태", "원자성", "내구성"], "a": 1, "e": "Consistency(일관성)는 트랜잭션 실행 전후 데이터베이스가 항상 유효한 상태를 유지함을 의미합니다."},
{"q": "SELECT COUNT(*) FROM users WHERE age > 30의 결과는?", "o": ["age가 30인 수", "age가 30보다 큰 행의 수", "전체 행의 수", "NULL 행의 수"], "a": 1, "e": "WHERE age > 30 조건에 맞는 행의 수를 COUNT(*)로 집계합니다."},
{"q": "외래키(FOREIGN KEY)의 역할은?", "o": ["유일성 보장", "다른 테이블의 기본키를 참조하여 관계 무결성 보장", "NULL 허용", "자동 증가"], "a": 1, "e": "FOREIGN KEY는 다른 테이블의 PRIMARY KEY를 참조하여 참조 무결성을 유지합니다. 없는 값은 참조할 수 없습니다."},
{"q": "뷰(VIEW)의 특징은?", "o": ["실제 데이터를 저장", "쿼리를 저장한 가상 테이블", "인덱스보다 빠름", "트랜잭션 필요"], "a": 1, "e": "VIEW는 SELECT 쿼리를 저장한 가상 테이블입니다. 복잡한 쿼리를 단순화하고, 보안상 특정 컬럼만 노출할 수 있습니다."},
{"q": "CASE WHEN 구문의 역할은?", "o": ["반복 처리", "조건에 따라 다른 값 반환 (if-else)", "집계 함수", "조인 처리"], "a": 1, "e": "CASE WHEN 조건 THEN 값 ELSE 기본값 END로 SQL에서 조건 분기를 처리합니다."},
{"q": "GROUP BY 없이 HAVING을 사용하면?", "o": ["정상 작동", "오류 발생 또는 전체를 하나의 그룹으로 처리", "WHERE와 동일하게 작동", "모든 행 반환"], "a": 1, "e": "일부 DB에서는 허용하지만 표준적으로 HAVING은 GROUP BY와 함께 사용합니다. 없으면 전체를 하나의 그룹으로 취급합니다."},
{"q": "LIKE '%abc%'의 의미는?", "o": ["'abc'로 시작", "'abc'로 끝남", "'abc'를 포함", "'abc'와 정확히 일치"], "a": 2, "e": "%는 0개 이상의 임의 문자를 의미합니다. '%abc%'는 앞뒤 어디든 'abc'가 포함된 문자열을 검색합니다."},
{"q": "데이터베이스 정규화의 목적은?", "o": ["쿼리 속도 향상", "데이터 중복 제거 및 무결성 유지", "인덱스 자동 생성", "백업 용이"], "a": 1, "e": "정규화(Normalization)는 중복 데이터를 줄이고, 데이터 무결성을 높이기 위해 테이블을 분해하는 과정입니다."},

let cur=0,score=0,answered=false;
function render(){
const app=document.getElementById('app');
if(cur>=Q.length){const grade=score>=9?'S':score>=7?'A':score>=5?'B':score>=3?'C':'D';
const emoji2=score>=9?'🏆':score>=7?'👏':score>=5?'👍':score>=3?'😅':'💪';
app.innerHTML=`<div style="font-size:50px">${emoji2}</div><h1 style="margin:10px 0">${score}/${Q.length}</h1><div style="font-size:40px;color:#FFD700;font-weight:bold;margin:10px 0">등급: ${grade}</div><p style="color:#aaa">${score>=7?'대단해요!':score>=5?'잘했어요!':'다음엔 더 잘할 수 있어요!'}</p><button class="btn" onclick="cur=0;score=0;_shuf(Q);render()">다시 하기</button>`;return}

<div class="q-card"><div style="color:#888;font-size:13px;margin-bottom:8px">🗄️ ${cur+1}/${Q.length}</div>
<div class="q-text">${q.q}</div>
<div class="opts">${q.o.map((o,i)=>`<div class="opt" id="opt${i}" onclick="answer(${i})">${o}</div>`).join('')}</div>
<div class="explain" id="explain">${q.e||''}</div></div>`;answered=false}
function answer(i){if(answered)return;answered=true;const q=Q[cur];
document.getElementById('opt'+i).classList.add(i===q.a?'correct':'wrong');
if(i!==q.a)document.getElementById('opt'+q.a).classList.add('correct');
if(i===q.a)score++;
const el=document.getElementById('explain');if(q.e){el.style.display='block'}
setTimeout(()=>{cur++;if(cur>=Q.length)_saveQuizScore('sql_quiz',score,Q.length);render()},1500)}
render();
