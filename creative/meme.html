<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
<title>밈 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1e;color:#fff;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;padding:60px 12px 20px}
h1{text-align:center;font-size:1.4em;margin-bottom:14px}
.wrap{max-width:500px;margin:0 auto}
.templates{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.templates button{background:#1a1a2e;color:#fff;border:2px solid #333;padding:10px 6px;border-radius:8px;font-size:12px;min-height:60px;cursor:pointer;touch-action:manipulation;font-family:inherit;text-align:center}
.templates button.active{border-color:#4fc3f7;background:#1e3a5f}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
input[type=text]{width:100%;background:#1a1a2e;color:#fff;border:1px solid #333;padding:12px;border-radius:8px;font-size:16px;margin-bottom:10px;min-height:44px}
.canvas-wrap{display:flex;justify-content:center;margin-bottom:14px}
canvas{border-radius:8px;max-width:100%;border:1px solid #333}
.btn{background:#4fc3f7;color:#000;border:none;padding:12px 24px;border-radius:10px;font-size:15px;font-weight:bold;min-height:44px;touch-action:manipulation;cursor:pointer;display:block;width:100%;font-family:inherit}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation">← 뒤로</a>

<div class="wrap">
<h1>밈 생성기</h1>

<div class="templates" id="templates"></div>

<label>상단 텍스트</label>
<input type="text" id="topText" placeholder="위쪽 텍스트">
<label>하단 텍스트</label>
<input type="text" id="bottomText" placeholder="아래쪽 텍스트">

<div class="canvas-wrap">
<canvas id="memeCanvas" width="500" height="500"></canvas>
</div>

<button class="btn" onclick="savePNG()">PNG로 저장</button>
</div>

<script>
const TEMPLATES=[
{name:'드레이크',id:'drake',draw:(ctx,w,h)=>{
ctx.fillStyle='#f4a460';ctx.fillRect(0,0,w,h/2);
ctx.fillStyle='#ffd700';ctx.fillRect(0,h/2,w,h/2);
ctx.fillStyle='#c87533';ctx.fillRect(0,0,w*0.4,h/2);
ctx.font='bold 40px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
ctx.fillText('X',w*0.2,h*0.28);
ctx.fillStyle='#b8860b';ctx.fillRect(0,h/2,w*0.4,h/2);
ctx.fillStyle='#fff';ctx.fillText('^_^',w*0.2,h*0.78);
}},
{name:'확장 두뇌',id:'brain',draw:(ctx,w,h)=>{
const cols=['#555','#777','#99f','#f9f'];
cols.forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(0,h/4*i,w,h/4)});
ctx.font='24px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
const labels=['Small Brain','Medium Brain','Galaxy Brain','Universe Brain'];
labels.forEach((l,i)=>{ctx.fillText(l,w/2,h/4*i+h/8+8)});
}},
{name:'멍한 남자',id:'distracted',draw:(ctx,w,h)=>{
ctx.fillStyle='#e74c3c';ctx.fillRect(0,0,w/3,h);
ctx.fillStyle='#3498db';ctx.fillRect(w/3,0,w/3,h);
ctx.fillStyle='#2ecc71';ctx.fillRect(w*2/3,0,w/3,h);
ctx.font='18px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
ctx.fillText('Girl',w/6,h/2);ctx.fillText('Guy',w/2,h/2);ctx.fillText('GF',w*5/6,h/2);
}},
{name:'버튼',id:'button',draw:(ctx,w,h)=>{
ctx.fillStyle='#2c3e50';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#e74c3c';
ctx.beginPath();ctx.arc(w/2,h*0.6,60,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#c0392b';
ctx.beginPath();ctx.arc(w/2,h*0.6,50,0,Math.PI*2);ctx.fill();
ctx.font='bold 20px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';
ctx.fillText('BUTTON',w/2,h*0.62);
ctx.fillStyle='#f39c12';ctx.fillRect(w*0.2,h*0.15,w*0.1,h*0.25);
ctx.fillStyle='#e67e22';ctx.fillRect(w*0.15,h*0.05,w*0.2,h*0.12);
}},
{name:'Change My Mind',id:'changemymind',draw:(ctx,w,h)=>{
ctx.fillStyle='#27ae60';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#fff';
ctx.fillRect(w*0.15,h*0.3,w*0.7,h*0.4);
ctx.fillStyle='#333';ctx.font='18px sans-serif';ctx.textAlign='center';
ctx.fillText('CHANGE MY MIND',w/2,h*0.55);
ctx.fillStyle='#8B4513';
ctx.fillRect(w*0.35,h*0.7,w*0.3,h*0.05);
ctx.fillRect(w*0.3,h*0.75,w*0.05,h*0.2);
ctx.fillRect(w*0.65,h*0.75,w*0.05,h*0.2);
}},
{name:'This Is Fine',id:'thisisfine',draw:(ctx,w,h)=>{
ctx.fillStyle='#e74c3c';ctx.fillRect(0,0,w,h);
ctx.fillStyle='#f39c12';
for(let i=0;i<12;i++){
const x=Math.random()*w,y=Math.random()*h;
ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-10,y+25);ctx.lineTo(x+10,y+25);ctx.fill();
}
ctx.fillStyle='#f1c40f';ctx.fillRect(w*0.3,h*0.4,w*0.4,h*0.35);
ctx.fillStyle='#333';ctx.font='14px sans-serif';ctx.textAlign='center';
ctx.fillText('This is fine.',w/2,h*0.6);
}}
];

let selected=0;
const canvas=document.getElementById('memeCanvas');
const ctx=canvas.getContext('2d');

function initTemplates(){
const el=document.getElementById('templates');
TEMPLATES.forEach((t,i)=>{
const b=document.createElement('button');
b.textContent=t.name;
b.className=i===0?'active':'';
b.onclick=()=>{selected=i;document.querySelectorAll('.templates button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};
el.appendChild(b);
});
}

function render(){
const w=canvas.width,h=canvas.height;
ctx.clearRect(0,0,w,h);
TEMPLATES[selected].draw(ctx,w,h);
const top=document.getElementById('topText').value;
const bot=document.getElementById('bottomText').value;
ctx.font='bold 32px sans-serif';ctx.textAlign='center';
ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.fillStyle='#fff';
if(top){ctx.strokeText(top,w/2,50);ctx.fillText(top,w/2,50)}
if(bot){ctx.strokeText(bot,w/2,h-20);ctx.fillText(bot,w/2,h-20)}
}

function savePNG(){
const link=document.createElement('a');
link.download='meme.png';
link.href=canvas.toDataURL();
link.click();
}

document.getElementById('topText').addEventListener('input',render);
document.getElementById('bottomText').addEventListener('input',render);

initTemplates();
render();
</script>
</body>
</html>
