function generate(){
const raw=document.getElementById('inputText').value;
const text=raw.toUpperCase();
const style=document.getElementById('fontStyle').value;
const font=FONTS[style];
const out=document.getElementById('output');
if(!text||!font){out.textContent='텍스트를 입력하세요';return}
// 한글 감지
const hasKorean=/[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(raw);
let lines=[];
for(let r=0;r<font.height;r++) lines[r]='';
let unsupported=[];
for(const ch of text){
const glyph=font.chars[ch];
if(glyph){
for(let r=0;r<font.height;r++) lines[r]+=glyph[r]+' ';
}else{
// 지원하지 않는 문자 → 물음표 표시
const fallback=font.chars['?'];
if(fallback){
for(let r=0;r<font.height;r++) lines[r]+=fallback[r]+' ';
}else{
const w=font.chars['A']?font.chars['A'][0].length:4;
for(let r=0;r<font.height;r++) lines[r]+=' '.repeat(w)+' ';
}
if(!unsupported.includes(ch)&&ch!==' ')unsupported.push(ch);
}
}
let result=lines.join('\n');
if(hasKorean) result+='\n\n⚠️ 한글은 아스키아트로 변환할 수 없습니다. 영문(A-Z), 숫자(0-9), 일부 기호(!?.)만 지원됩니다.';
else if(unsupported.length>0) result+='\n\n⚠️ 지원하지 않는 문자: '+unsupported.join(', ')+' (영문, 숫자, !?. 지원)';
out.textContent=result;
}

function copyResult(){
const t=document.getElementById('output').textContent;
if(!t) return;
navigator.clipboard.writeText(t).then(()=>{
const toast=document.getElementById('toast');
toast.style.display='block';
setTimeout(()=>toast.style.display='none',1500);
});
}

document.getElementById('inputText').addEventListener('input',generate);
document.getElementById('fontStyle').addEventListener('change',generate);
