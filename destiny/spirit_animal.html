function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<h1>🦊 수호 동물 운세</h1><p class="sub">생년월일로 알아보는 나의 수호 동물</p>

<script>
const animals=[
{e:'🐉',n:'용',traits:'강인, 카리스마, 리더십',desc:'전설의 존재 용이 당신을 보호합니다! 강력한 에너지와 카리스마를 부여받았으며, 위기 상황에서 빛나는 능력이 있습니다.',msgs:['오늘은 용의 기운이 강하다! 무엇이든 도전하라!','하늘을 나는 것처럼 큰 그림을 그려라.','용의 비늘처럼 단단하게 자신을 지켜라.','불을 뿜듯 열정적으로 행동하면 성공한다.']},
{e:'🦅',n:'독수리',traits:'시야, 자유, 결단',desc:'하늘의 왕 독수리가 당신의 수호 동물입니다. 넓은 시야와 예리한 판단력을 가지고 있으며, 자유를 사랑합니다.',msgs:['높이 날아 전체를 조망하라. 답이 보인다.','독수리의 눈으로 기회를 포착하라!','자유롭게 날 때가 왔다. 제약을 벗어나라.','과감한 결단이 필요한 날이다.']},
{e:'🐺',n:'늑대',traits:'충성, 직감, 협력',desc:'달빛 아래 울부짖는 늑대가 당신을 지킵니다. 강한 직감과 충성심, 팀워크 능력이 뛰어납니다.',msgs:['직감을 믿어라. 늑대의 감각이 이끈다.','무리의 힘을 빌려라. 혼자보다 함께!','달빛 아래 진실이 드러난다. 귀를 기울여라.','충성스러운 관계가 행운을 가져온다.']},
{e:'🦊',n:'여우',traits:'지혜, 적응, 매력',desc:'영리한 여우가 당신의 수호 동물입니다. 뛰어난 적응력과 지혜로 어떤 상황도 헤쳐나갑니다.',msgs:['영리하게 대처하면 모든 것이 풀린다.','매력을 발산하라! 사람들이 모여든다.','여우처럼 유연하게 변화에 적응하라.','지혜로운 선택이 행운의 열쇠다.']},
{e:'🐻',n:'곰',traits:'힘, 보호, 내면의 힘',desc:'강인한 곰이 당신을 보호합니다. 외유내강의 성격으로, 필요할 때 엄청난 힘을 발휘합니다.',msgs:['내면의 힘을 믿어라. 곰처럼 강하다.','오늘은 쉬어가는 날. 에너지를 충전하라.','소중한 것을 지키기 위해 일어서라.','차분하지만 단호하게 행동하라.']},
{e:'🦁',n:'사자',traits:'용기, 위엄, 리더',desc:'백수의 왕 사자가 당신의 수호 동물입니다. 타고난 리더십과 용기로 주변을 이끕니다.',msgs:['왕의 기운으로 당당히 나아가라!','용기를 내어 포효하라! 세상이 응답한다.','사자의 위엄으로 어려움을 물리쳐라.','리더로서 책임감을 가지고 행동하라.']},
{e:'🦋',n:'나비',traits:'변화, 아름다움, 자유',desc:'화려한 나비가 당신을 수호합니다. 아름다운 변신의 능력과 자유로운 영혼을 가졌습니다.',msgs:['변화의 시기가 왔다. 나비처럼 날개를 펼쳐라!','아름다움을 추구하면 행운이 따른다.','가볍게 날아오르는 마음이 필요하다.','변신할 준비가 되었다. 새로운 모습을 보여줘라!']},
{e:'🐍',n:'뱀',traits:'지혜, 재생, 직감',desc:'신비로운 뱀이 당신의 수호 동물입니다. 깊은 지혜와 재생의 능력, 예리한 직감을 가졌습니다.',msgs:['허물을 벗듯 과거를 정리하라. 새로운 시작!','뱀의 직감이 위험을 알려준다. 조심하라.','지혜롭게 행동하면 재물이 따른다.','조용히 기회를 엿보다 정확히 움직여라.']},
{e:'🦌',n:'사슴',traits:'우아, 감수성, 경계',desc:'우아한 사슴이 당신을 지킵니다. 섬세한 감수성과 빠른 판단력, 우아한 매력을 가졌습니다.',msgs:['섬세한 감각으로 변화를 감지하라.','우아함이 당신의 무기다. 품위를 유지하라.','위험을 느끼면 빠르게 벗어나라.','자연 속에서 에너지를 충전하라.']},
{e:'🐬',n:'돌고래',traits:'지능, 즐거움, 소통',desc:'똑똑한 돌고래가 당신의 수호 동물입니다. 뛰어난 소통 능력과 즐거움을 추구하는 성격입니다.',msgs:['즐겁게 소통하면 좋은 인연을 만난다!','파도를 타듯 유연하게 대처하라.','돌고래의 지능으로 문제를 해결하라.','웃음이 최고의 행운이다, 냥!...아니 끼익!']},
{e:'🦉',n:'올빼미',traits:'지혜, 통찰, 신비',desc:'밤의 현자 올빼미가 당신을 수호합니다. 어둠 속에서도 진실을 보는 눈과 깊은 지혜를 가졌습니다.',msgs:['어둠 속에서 빛나는 지혜를 발휘하라.','남들이 보지 못하는 것을 볼 수 있다.','밤에 좋은 영감이 찾아올 수 있다.','조용히 관찰하면 진실이 드러난다.']},
{e:'🐢',n:'거북이',traits:'인내, 장수, 안정',desc:'장수의 상징 거북이가 당신을 지킵니다. 꾸준한 인내와 안정적인 성격으로 결국 목표에 도달합니다.',msgs:['느려도 확실하게! 거북이의 지혜를 따르라.','인내는 쓰고 열매는 달다. 기다려라.','단단한 등껍질처럼 마음을 지켜라.','서두르지 마라. 결국 도착하게 되어 있다.']}
];
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
function calc(){
const bday=document.getElementById('bday').value;if(!bday){alert('생년월일을 선택해주세요!');return}
const r=sr(bday),idx=Math.floor(r()*animals.length),a=animals[idx];
const r2=sr(bday+new Date().toDateString()),msg=a.msgs[Math.floor(r2()*a.msgs.length)];
const love=Math.floor(r2()*41)+55,money=Math.floor(r2()*41)+55,health=Math.floor(r2()*41)+55,work=Math.floor(r2()*41)+55;
const luckyNum=Math.floor(r2()*99)+1;
const el=document.getElementById('result');
while(el.firstChild)el.removeChild(el.firstChild);
const rbox=document.createElement('div');rbox.className='rbox';
const bigAnimal=document.createElement('div');bigAnimal.className='biganimal';bigAnimal.textContent=a.e;rbox.appendChild(bigAnimal);
const h2=document.createElement('h2');h2.textContent='당신의 수호 동물: '+a.n;rbox.appendChild(h2);
const traitsP=document.createElement('p');traitsP.style.cssText='color:#80e090;margin:8px 0';traitsP.textContent='특성: '+a.traits;rbox.appendChild(traitsP);
rbox.appendChild(document.createElement('br'));
const descP=document.createElement('p');descP.textContent=a.desc;rbox.appendChild(descP);
const hr1=document.createElement('hr');hr1.style.cssText='border-color:rgba(100,200,100,.15);margin:15px 0';rbox.appendChild(hr1);
const msgH=document.createElement('h3');msgH.textContent='📩 오늘 수호 동물의 메시지';rbox.appendChild(msgH);
const msgP=document.createElement('p');msgP.style.cssText='font-size:1.1em;margin:12px 0;color:#b0ffb0';msgP.textContent='"'+msg+'"';rbox.appendChild(msgP);
const hr2=document.createElement('hr');hr2.style.cssText='border-color:rgba(100,200,100,.15);margin:15px 0';rbox.appendChild(hr2);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px';barsH.textContent='📊 오늘의 운세';rbox.appendChild(barsH);
function mkAnimalBar(label,val){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);rbox.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
[{label:'💕 연애운',val:love},{label:'💰 금전운',val:money},{label:'💪 건강운',val:health},{label:'💼 직장운',val:work}].forEach(item=>{mkAnimalBar(item.label,item.val);});
rbox.appendChild(document.createElement('br'));
const luckyP=document.createElement('p');luckyP.textContent='🔢 행운의 숫자: '+luckyNum;rbox.appendChild(luckyP);
el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{el.style.display='none';};el.appendChild(btn);
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
