function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}
</script>

<script>
const FORTUNES=[
  {leaf:3,emoji:'☘️',title:'세잎 클로버',luck:'보통',color:'#4CAF50',msgs:['평범하지만 안정적인 하루','작은 행운이 찾아올 거예요','꾸준함이 당신의 무기!','오늘은 조용히 충전하는 날']},
  {leaf:4,emoji:'🍀',title:'네잎 클로버!',luck:'행운',color:'#FFD700',msgs:['오늘은 행운의 날!','뜻밖의 좋은 일이 생겨요','도전하면 좋은 결과가!','소원을 빌어보세요~']},
  {leaf:5,emoji:'✨🍀✨',title:'다섯잎 클로버!!',luck:'대박 행운',color:'#FF69B4',msgs:['엄청난 행운이 찾아옵니다!','로또를 사볼까?!','인생 전환점이 될 수 있어요','모든 일이 술술 풀려요!']},
  {leaf:2,emoji:'🌿',title:'두잎...',luck:'약간 아쉬움',color:'#FF9800',msgs:['오늘은 조심스럽게','큰 결정은 미루세요','쉬어가는 것도 전략이에요','내일은 더 나아질 거예요']},
  {leaf:1,emoji:'🥀',title:'한잎...',luck:'주의!',color:'#F44336',msgs:['오늘은 조용히 보내세요','계획을 재점검하세요','건강을 챙기는 날','인내가 필요한 시기']},
];

let clovers=[];

function showField(){
  clovers=[];
  for(let i=0;i<20;i++){
    // 확률: 3잎 60%, 4잎 15%, 5잎 3%, 2잎 15%, 1잎 7%
    const r=Math.random();
    let type=0;
    if(r<0.03)type=2; // 5잎
    else if(r<0.18)type=1; // 4잎
    else if(r<0.33)type=3; // 2잎
    else if(r<0.40)type=4; // 1잎
    else type=0; // 3잎

    clovers.push({
      type,
      x:10+Math.random()*80,
      y:10+Math.random()*80,
      size:24+Math.random()*12,
      delay:Math.random()*2
    });
  }

  document.getElementById('app').innerHTML=`
    <h1>🍀 클로버 운세</h1>
    <p class="sub">들판에서 클로버를 하나 뽑아보세요!</p>
    <p style="color:#4CAF50;font-size:13px;margin-bottom:5px">네잎 클로버를 찾을 수 있을까?</p>
    <div class="field" id="field">
      ${clovers.map((c,i)=>`<div class="clover" onclick="pickClover(${i})" style="left:${c.x}%;top:${c.y}%;font-size:${c.size}px;animation:sway ${1+c.delay}s infinite ease-in-out">☘️</div>`).join('')}
    </div>
    <p style="color:#555;font-size:11px">클로버를 클릭하여 뽑으세요</p>`;
}

function pickClover(i){
  const c=clovers[i];
  const f=FORTUNES[c.type];
  const msg=f.msgs[Math.floor(Math.random()*f.msgs.length)];

  document.getElementById('app').innerHTML=`<div class="result">
    <div style="font-size:70px;margin-bottom:10px">${f.emoji}</div>
    <h2 style="color:${f.color};font-size:26px">${f.title}</h2>
    <div style="background:${f.color};color:#000;display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:bold;margin:10px 0">${f.luck}</div>
    <p style="font-size:18px;margin:15px 0;line-height:1.6">${msg}</p>

    <div style="background:#252545;border-radius:10px;padding:15px;margin:15px 0;text-align:left">
      <h3 style="color:#FFD700;font-size:14px;margin-bottom:8px">🍀 클로버 잎사귀의 의미</h3>
      <p style="color:#ccc;font-size:12px;line-height:1.8">
        🌿 1잎: 기도 · 희망의 시작<br>
        🌿 2잎: 사랑 · 인연<br>
        ☘️ 3잎: 믿음 · 사랑 · 희망<br>
        🍀 4잎: 행운! (믿음+사랑+희망+행운)<br>
        ✨ 5잎: 재물운 대박!
      </p>
    </div>

    <button class="btn" onclick="showField()">다시 뽑기</button>
  </div>`;
}
showField();
