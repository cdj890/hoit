<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>클로버 운세</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}.wrap{max-width:500px;width:100%;padding:20px;text-align:center}h1{font-size:30px;margin-bottom:8px}.sub{color:#888;margin-bottom:20px}
.field{position:relative;width:100%;height:300px;background:linear-gradient(180deg,#1a3a1a,#0f2a0f);border-radius:16px;overflow:hidden;cursor:pointer;margin:20px 0;border:2px solid #2a4a2a}
.clover{position:absolute;font-size:28px;transition:all .3s;cursor:pointer;filter:drop-shadow(0 0 5px rgba(0,255,0,0.3))}
.clover:hover{transform:scale(1.3);filter:drop-shadow(0 0 10px rgba(0,255,0,0.6))}
.result{background:#1a1a2e;border-radius:16px;padding:25px;border:1px solid #2a2a4a}
.btn{background:#4CAF50;border:none;color:#fff;padding:12px 30px;border-radius:10px;font-size:15px;cursor:pointer;margin-top:15px;font-weight:bold;width:100%}
a.back{position:fixed;top:10px;left:10px;z-index:99;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px}a.back:hover{background:rgba(0,0,0,0.85)}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
</style></head><body>
<a class="back" href="../index.html">← 뒤로</a>
<div class="wrap" id="app"></div>
<script>
const FORTUNES=[
  {leaf:3,emoji:'☘️',title:'세잎 클로버',luck:'보통',color:'#4CAF50',msgs:['평범하지만 안정적인 하루','작은 행운이 찾아올 거예요','꾸준함이 당신의 무기!','오늘은 조용히 충전하는 날']},
  {leaf:4,emoji:'🍀',title:'네잎 클로버!',luck:'행운',color:'#FFD700',msgs:['오늘은 행운의 날!','뜻밖의 좋은 일이 생겨요','도전하면 좋은 결과가!','소원을 빌어보세요~']},
  {leaf:5,emoji:'✨🍀✨',title:'다섯잎 클로버!!',luck:'대박 행운',color:'#FF69B4',msgs:['엄청난 행운이 찾아옵니다!','로또를 사볼까?!','인생 전환점이 될 수 있어요','모든 일이 술술 풀려요!']},
  {leaf:2,emoji:'🌿',title:'두잎...',luck:'약간 아쉬움',color:'#FF9800',msgs:['오늘은 조심스럽게','큰 결정은 미루세요','쉬어가는 것도 전략이에요','내일은 더 나아질 거예요']},
  {leaf:1,emoji:'🥀',title:'한잎...',luck:'주의!',color:'#F44336',msgs:['오늘은 조용히 보내세요','계획을 재점검하세요','건강을 챙기는 날','인내가 필요한 시기']},
];

let clovers=[];

function showField(){
  clovers=[];
  for(let i=0;i<20;i++){
    // 확률: 3잎 60%, 4잎 15%, 5잎 3%, 2잎 15%, 1잎 7%
    const r=Math.random();
    let type=0;
    if(r<0.03)type=2; // 5잎
    else if(r<0.18)type=1; // 4잎
    else if(r<0.33)type=3; // 2잎
    else if(r<0.40)type=4; // 1잎
    else type=0; // 3잎

    clovers.push({
      type,
      x:10+Math.random()*80,
      y:10+Math.random()*80,
      size:24+Math.random()*12,
      delay:Math.random()*2
    });
  }

  document.getElementById('app').innerHTML=`
    <h1>🍀 클로버 운세</h1>
    <p class="sub">들판에서 클로버를 하나 뽑아보세요!</p>
    <p style="color:#4CAF50;font-size:13px;margin-bottom:5px">네잎 클로버를 찾을 수 있을까?</p>
    <div class="field" id="field">
      ${clovers.map((c,i)=>`<div class="clover" onclick="pickClover(${i})" style="left:${c.x}%;top:${c.y}%;font-size:${c.size}px;animation:sway ${1+c.delay}s infinite ease-in-out">☘️</div>`).join('')}
    </div>
    <p style="color:#555;font-size:11px">클로버를 클릭하여 뽑으세요</p>`;
}

function pickClover(i){
  const c=clovers[i];
  const f=FORTUNES[c.type];
  const msg=f.msgs[Math.floor(Math.random()*f.msgs.length)];

  document.getElementById('app').innerHTML=`<div class="result">
    <div style="font-size:70px;margin-bottom:10px">${f.emoji}</div>
    <h2 style="color:${f.color};font-size:26px">${f.title}</h2>
    <div style="background:${f.color};color:#000;display:inline-block;padding:4px 16px;border-radius:20px;font-size:14px;font-weight:bold;margin:10px 0">${f.luck}</div>
    <p style="font-size:18px;margin:15px 0;line-height:1.6">${msg}</p>

    <div style="background:#252545;border-radius:10px;padding:15px;margin:15px 0;text-align:left">
      <h3 style="color:#FFD700;font-size:14px;margin-bottom:8px">🍀 클로버 잎사귀의 의미</h3>
      <p style="color:#ccc;font-size:12px;line-height:1.8">
        🌿 1잎: 기도 · 희망의 시작<br>
        🌿 2잎: 사랑 · 인연<br>
        ☘️ 3잎: 믿음 · 사랑 · 희망<br>
        🍀 4잎: 행운! (믿음+사랑+희망+행운)<br>
        ✨ 5잎: 재물운 대박!
      </p>
    </div>

    <button class="btn" onclick="showField()">다시 뽑기</button>
  </div>`;
}
showField();
</script></body></html>
