<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오늘의 운수</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0a1a2e);color:#e0d0ff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}h1{margin:30px 0 10px;font-size:2em;text-shadow:0 0 20px rgba(150,100,255,.5)}.subtitle{color:#9988bb;margin-bottom:30px;font-size:.95em}.input-area{text-align:center;margin:20px 0}input[type=text]{background:rgba(255,255,255,.08);border:1px solid rgba(150,100,255,.3);color:#fff;padding:12px 20px;border-radius:12px;font-size:1.1em;width:260px;text-align:center;outline:none}input[type=text]:focus{border-color:rgba(150,100,255,.7);box-shadow:0 0 15px rgba(150,100,255,.2)}button{background:linear-gradient(135deg,#6a3de8,#4a2db8);color:#fff;border:none;padding:12px 30px;border-radius:12px;font-size:1em;cursor:pointer;margin-top:15px;transition:all .3s}button:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(106,61,232,.5)}.result{display:none;text-align:center;margin-top:30px;animation:fadeIn .8s}.score-circle{width:140px;height:140px;border-radius:50%;background:conic-gradient(from 0deg,#6a3de8 0%,#e84de8 50%,#3de8c7 100%);display:flex;align-items:center;justify-content:center;margin:20px auto;position:relative}.score-inner{width:120px;height:120px;border-radius:50%;background:#12102a;display:flex;align-items:center;justify-content:center;font-size:2.5em;font-weight:bold}.cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:25px auto;max-width:400px}.cat{background:rgba(255,255,255,.06);border-radius:12px;padding:15px;border:1px solid rgba(150,100,255,.15)}.cat-name{font-size:.85em;color:#9988bb;margin-bottom:5px}.cat-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:5px}.cat-fill{height:100%;border-radius:4px;transition:width 1s}.advice{margin-top:25px;background:rgba(255,255,255,.05);border-radius:12px;padding:20px;max-width:420px;line-height:1.7;border:1px solid rgba(150,100,255,.1)}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<h1>🔮 오늘의 운수</h1><p class="subtitle">이름을 입력하고 오늘의 운세를 확인하세요</p>
<div class="input-area"><input type="text" id="nameInput" placeholder="이름을 입력하세요" maxlength="20"><br><button onclick="getFortune()">운수 보기</button></div>
<div class="result" id="result"></div>
<script>
function seed(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
function getFortune(){
const name=document.getElementById('nameInput').value.trim();
if(!name){alert('이름을 입력해주세요!');return}
const d=new Date(),ds=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(),r=seed(name+ds);
const total=Math.floor(r()*101),love=Math.floor(r()*101),money=Math.floor(r()*101),health=Math.floor(r()*101),work=Math.floor(r()*101);
const cats=[{n:'💕 연애운',v:love,c:'#e84de8'},{n:'💰 금전운',v:money,c:'#e8c73d'},{n:'💪 건강운',v:health,c:'#3de87a'},{n:'💼 직장운',v:work,c:'#3d9ee8'}];
const msgs=['최고의 하루가 될 거예요! 자신감을 가지세요.','좋은 기운이 감돌고 있어요. 적극적으로 행동하세요.','평범하지만 안정적인 하루입니다. 무리하지 마세요.','조심스럽게 행동하면 큰 문제 없을 거예요.','오늘은 쉬어가는 날로 삼으세요. 내일이 더 좋아요.','뜻밖의 행운이 찾아올 수 있어요!','주변 사람들에게 감사를 표현해보세요.','새로운 시작에 좋은 날이에요.'];
const adv=msgs[Math.floor(r()*msgs.length)];
const luckItem=['빨간 양말','파란 펜','초록 손수건','노란 머그컵','보라색 노트','흰 셔츠','검은 모자','은 반지'][Math.floor(r()*8)];
let html=`<div class="score-circle"><div class="score-inner">${total}</div></div><p style="font-size:1.3em;margin:10px 0">${name}님의 오늘 총운</p><div class="cats">`;
cats.forEach(c=>{html+=`<div class="cat"><div class="cat-name">${c.n}</div><div style="font-size:1.5em;font-weight:bold">${c.v}점</div><div class="cat-bar"><div class="cat-fill" style="width:${c.v}%;background:${c.c}"></div></div></div>`});
html+=`</div><div class="advice">🌟 <b>오늘의 조언</b><br>${adv}<br><br>🍀 <b>행운의 아이템:</b> ${luckItem}<br>🔢 <b>행운의 숫자:</b> ${Math.floor(r()*100)}</div><br><button onclick="document.getElementById('result').style.display='none';document.getElementById('nameInput').value=''">다시 하기</button>`;
const el=document.getElementById('result');el.innerHTML=html;el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script></body></html>
