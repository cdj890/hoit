function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){

}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';

function seed(str){var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}return function(){h=h*16807%2147483647;return(h-1)/2147483646}}
function getTodayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function seededShuffle(arr){
  const r=seed(getTodayStr()+'hwatu');
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
let picked=[];

  const shuffled=seededShuffle([...Array(12).keys()]);

function pick(i,el){
  if(picked.includes(i)||picked.length>=3)return;
  picked.push(i);
  el.classList.add('picked');
  const countEl=document.querySelector('p[style*="B8860B"]');
  if(countEl)countEl.textContent=picked.length+'/3 선택';
  if(picked.length===3)setTimeout(showResult,750);
}

function mkHwaBar(label,val,parentEl){
  const row=document.createElement('div');row.style.cssText='margin:6px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px';

  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:5px;height:8px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='5px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);parentEl.appendChild(row);setTimeout(()=>{fill.style.width=val+'%'},80);
}

    card.appendChild(tagsDiv);app.appendChild(card);
  });
  const btn=document.createElement('button');btn.className='btn';btn.textContent='다시 뽑기';btn.onclick=show;app.appendChild(btn);
}
