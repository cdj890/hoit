function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);

<script>
const MAJOR=[
  {name:'바보',emoji:'🃏',num:0,up:'새로운 시작, 모험, 순수함, 자유로운 영혼',down:'무모함, 방향 상실, 경솔한 판단'},
  {name:'마법사',emoji:'🧙',num:1,up:'능력, 창의력, 집중, 의지력으로 목표 달성',down:'재능 낭비, 속임수, 미숙함'},
  {name:'여사제',emoji:'🌙',num:2,up:'직관, 내면의 지혜, 비밀이 밝혀짐',down:'감정 억압, 직관 무시, 비밀'},
  {name:'여황제',emoji:'👑',num:3,up:'풍요, 모성, 창조, 자연과의 조화',down:'의존, 과잉보호, 창의력 고갈'},
  {name:'황제',emoji:'🏛️',num:4,up:'리더십, 안정, 구조, 권위와 통제력',down:'독재, 경직, 과도한 통제'},
  {name:'교황',emoji:'📿',num:5,up:'전통, 가르침, 영적 지도, 신뢰할 수 있는 조언',down:'교조적, 비관습적 도전 필요'},
  {name:'연인',emoji:'💕',num:6,up:'사랑, 조화, 선택, 가치관의 일치',down:'불균형, 갈등, 잘못된 선택'},
  {name:'전차',emoji:'⚔️',num:7,up:'승리, 의지, 결단력, 장애물 극복',down:'공격성, 방향 상실, 자기 의심'},
  {name:'힘',emoji:'🦁',num:8,up:'용기, 인내, 내면의 강인함, 부드러운 힘',down:'자기 의심, 원시적 감정, 통제력 상실'},
  {name:'은둔자',emoji:'🏔️',num:9,up:'내면 탐색, 지혜, 고독 속 깨달음',down:'고립, 외로움, 지나친 은둔'},
  {name:'운명의 수레바퀴',emoji:'🎡',num:10,up:'행운, 전환점, 운명의 변화',down:'불운, 저항, 통제 불가'},
  {name:'정의',emoji:'⚖️',num:11,up:'공정, 진실, 균형, 인과응보',down:'불공정, 책임 회피, 편견'},
  {name:'매달린 사람',emoji:'🙃',num:12,up:'새로운 관점, 희생, 기다림의 지혜',down:'지연, 저항, 무의미한 희생'},
  {name:'죽음',emoji:'🦋',num:13,up:'변화, 끝과 시작, 변환, 놓아주기',down:'변화에 대한 두려움, 정체'},
  {name:'절제',emoji:'🌈',num:14,up:'균형, 인내, 조화, 중용의 미덕',down:'과잉, 불균형, 조급함'},
  {name:'악마',emoji:'😈',num:15,up:'유혹에 대한 인식, 집착에서 벗어남',down:'중독, 집착, 물질주의'},
  {name:'탑',emoji:'🌩️',num:16,up:'갑작스러운 변화, 깨달음, 해방',down:'파괴, 혼란, 예상치 못한 재난'},
  {name:'별',emoji:'⭐',num:17,up:'희망, 영감, 평화, 밝은 미래',down:'절망, 믿음 상실, 무감각'},
  {name:'달',emoji:'🌕',num:18,up:'상상력, 직관, 꿈, 무의식의 메시지',down:'혼란, 불안, 환상과 현실의 괴리'},
  {name:'태양',emoji:'☀️',num:19,up:'성공, 기쁨, 활력, 긍정적 에너지',down:'과시, 번아웃, 비현실적 낙관'},
  {name:'심판',emoji:'📯',num:20,up:'부활, 깨달음, 자기 평가, 새로운 기회',down:'자기 의심, 후회, 판단 거부'},
  {name:'세계',emoji:'🌍',num:21,up:'완성, 성취, 통합, 여행',down:'미완성, 목표 부재, 지연'},
];

function seed(str){var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return function(){h=h*16807%2147483647;return(h-1)/2147483646;};}
function getTodayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
let picked=[], state='pick';

function shuffle(a){
  const r=seed(getTodayStr()+'tarot');
  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

function show(){
  state='pick';picked=[];
  const shuffled=shuffle([...Array(22).keys()]);
  const pool=shuffled.slice(0,9);
  document.getElementById('app').innerHTML=`
    <h1>🔮 타로 카드 운세</h1>
    <p class="sub">마음을 집중하고 카드 3장을 뽑아주세요</p>
    <p style="color:#FFD700;font-size:14px;margin-bottom:5px">뽑은 카드: ${picked.length}/3</p>
    <p style="color:#666;font-size:12px;margin-bottom:20px">과거 · 현재 · 미래를 알려드립니다</p>
    <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">
      ${pool.map((ci,i)=>`<div class="card glowing" onclick="pickCard(${ci},this)" style="width:85px;height:125px"><span style="font-size:28px">🂠</span><br><span style="font-size:10px;color:#888">카드</span></div>`).join('')}
    </div>`;
}

function pickCard(ci,el){
  if(picked.length>=3)return;
  const r=seed(getTodayStr()+'tarot_rev'+ci+picked.length);
  const isReversed=r()>0.5;
  picked.push({idx:ci,rev:isReversed});
  el.style.borderColor='#FFD700';
  el.style.background='linear-gradient(135deg,#3a2a6a,#2a2a5e)';
  el.innerHTML=`<span style="font-size:24px">${MAJOR[ci].emoji}</span><br><span style="font-size:9px;color:#FFD700">${MAJOR[ci].name}</span>`;
  el.style.pointerEvents='none';
  el.classList.remove('glowing');
  if(picked.length===3)setTimeout(showResult,800);
}

function showResult(){
  const labels=['🕰️ 과거','📍 현재','🔮 미래'];
  const positive=picked.filter(p=>!p.rev).length;
  let overall;
  if(positive===3)overall='매우 긍정적인 흐름! 앞으로 좋은 일이 가득할 거예요. ✨';
  else if(positive===2)overall='전반적으로 좋은 흐름이에요. 한 가지 주의할 점만 챙기면 완벽!';
  else if(positive===1)overall='도전이 있지만 극복할 수 있어요. 인내심을 가지세요.';
  else overall='시련의 시기이지만, 이것은 성장의 기회입니다. 내면의 힘을 믿으세요.';

  const app=document.getElementById('app');
  while(app.firstChild)app.removeChild(app.firstChild);
  const h1=document.createElement('h1');h1.textContent='🔮 당신의 타로 리딩';app.appendChild(h1);
  const sub=document.createElement('p');sub.className='sub';sub.style.marginBottom='20px';sub.textContent='3장의 카드가 말하는 이야기';app.appendChild(sub);
  picked.forEach((p,i)=>{
    const c=MAJOR[p.idx];const msg=p.rev?c.down:c.up;const dir=p.rev?'역방향 🔄':'정방향 ✨';
    const rd=document.createElement('div');rd.className='result';rd.style.marginBottom='12px';
    const topRow=document.createElement('div');topRow.style.cssText='display:flex;gap:15px;align-items:center';
    const emoDiv=document.createElement('div');emoDiv.style.fontSize='40px';if(p.rev)emoDiv.style.transform='rotate(180deg)';emoDiv.textContent=c.emoji;topRow.appendChild(emoDiv);
    const infoDiv=document.createElement('div');
    const labelDiv=document.createElement('div');labelDiv.style.cssText='color:#888;font-size:12px';labelDiv.textContent=labels[i];infoDiv.appendChild(labelDiv);
    const nameDiv=document.createElement('div');nameDiv.style.cssText='font-size:18px;font-weight:bold';
    const nameText=document.createTextNode(c.name+' ');nameDiv.appendChild(nameText);
    const dirSpan=document.createElement('span');dirSpan.style.cssText='font-size:12px;color:'+(p.rev?'#FF6B6B':'#4CAF50');dirSpan.textContent='('+dir+')';nameDiv.appendChild(dirSpan);infoDiv.appendChild(nameDiv);
    topRow.appendChild(infoDiv);rd.appendChild(topRow);
    const msgP=document.createElement('p');msgP.style.cssText='color:#ccc;font-size:14px;line-height:1.7;margin-top:12px';msgP.textContent=msg;rd.appendChild(msgP);
    app.appendChild(rd);
  });
  const summaryDiv=document.createElement('div');summaryDiv.style.cssText='background:#252545;border-radius:12px;padding:15px;margin-top:15px;text-align:center';
  const summaryH=document.createElement('h3');summaryH.style.cssText='color:#FFD700;font-size:15px;margin-bottom:8px';summaryH.textContent='📜 종합 해석';summaryDiv.appendChild(summaryH);
  const summaryP=document.createElement('p');summaryP.style.cssText='color:#ccc;font-size:14px;line-height:1.6';summaryP.textContent=overall;summaryDiv.appendChild(summaryP);
  const barsH=document.createElement('h3');barsH.style.cssText='color:#FFD700;font-size:14px;margin:14px 0 8px;text-align:left';barsH.textContent='📊 오늘의 에너지';summaryDiv.appendChild(barsH);
  const scoreBase=Math.round(positive/3*100);
  const scores=[
    {label:'💕 연애 에너지',val:Math.max(20,Math.min(100,scoreBase+(picked[0].rev?-15:15)))},
    {label:'💰 재물 에너지',val:Math.max(20,Math.min(100,scoreBase+(picked[1].rev?-15:15)))},
    {label:'💼 직장 에너지',val:Math.max(20,Math.min(100,scoreBase+(picked[2].rev?-15:15)))},
    {label:'✨ 종합 운세',val:Math.round(positive/3*80)+10}
  ];
  scores.forEach(item=>{
    const row=document.createElement('div');row.style.cssText='margin:7px 0;text-align:left';
    const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px';
    const lt=document.createElement('span');lt.textContent=item.label;const lv=document.createElement('span');lv.textContent=item.val+'%';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
    const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:5px;height:8px;overflow:hidden';
    const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='5px';fill.style.transition='width 1s ease';fill.style.width='0';
    fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#7B68EE)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-item.val)+'% 0';
    track.appendChild(fill);row.appendChild(track);summaryDiv.appendChild(row);setTimeout(()=>{fill.style.width=item.val+'%';},80);
  });
  app.appendChild(summaryDiv);
  const btn=document.createElement('button');btn.className='btn';btn.onclick=show;btn.textContent='다시 뽑기';app.appendChild(btn);
}
show();
