function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<h1>☯️ 오행 운세</h1><p class="sub">당신의 오행을 선택하세요</p>
<div class="elements" id="elems"></div>
<div class="result" id="result"></div>
<script>
const elems=[
{id:'wood',n:'🌳 목(木)',bg:'rgba(34,139,34,.15)',bc:'#228b22',traits:['성장','인자','유연','창조'],desc:'나무처럼 끊임없이 성장하는 당신. 인자하고 유연한 성품으로 주변을 감화합니다.',gen:'화(火)',over:'토(土)',fear:'금(金)',help:'수(水)'},
{id:'fire',n:'🔥 화(火)',bg:'rgba(220,50,50,.15)',bc:'#dc3232',traits:['열정','예의','명석','활발'],desc:'불처럼 뜨거운 열정의 소유자. 밝고 명석한 지혜로 어둠을 밝힙니다.',gen:'토(土)',over:'금(金)',fear:'수(水)',help:'목(木)'},
{id:'earth',n:'🌍 토(土)',bg:'rgba(180,140,60,.15)',bc:'#b48c3c',traits:['안정','신뢰','중재','포용'],desc:'대지처럼 든든한 존재. 안정감과 신뢰감으로 모든 것을 품어냅니다.',gen:'금(金)',over:'수(水)',fear:'목(木)',help:'화(火)'},
{id:'metal',n:'⚔️ 금(金)',bg:'rgba(192,192,192,.15)',bc:'#c0c0c0',traits:['결단','의리','강인','정확'],desc:'금속처럼 단단한 의지의 소유자. 결단력과 의리로 신뢰를 얻습니다.',gen:'수(水)',over:'목(木)',fear:'화(火)',help:'토(土)'},
{id:'water',n:'💧 수(水)',bg:'rgba(65,105,225,.15)',bc:'#4169e1',traits:['지혜','유연','깊음','적응'],desc:'물처럼 깊고 유연한 지혜의 소유자. 어떤 상황에도 적응하는 능력이 탁월합니다.',gen:'목(木)',over:'화(火)',fear:'토(土)',help:'금(金)'}
];
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const container=document.getElementById('elems');
elems.forEach(e=>{const el=document.createElement('div');el.className='elem';el.style.background=e.bg;el.style.borderColor=e.bc;el.innerHTML=`<span class="icon">${e.n.split(' ')[0]}</span><b>${e.n.split(' ')[1]}</b>`;el.onclick=()=>show(e);container.appendChild(el)});
function show(e){
const d=new Date(),ds=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(),r=sr(e.id+ds);
const love=Math.floor(r()*41)+55,money=Math.floor(r()*41)+55,health=Math.floor(r()*41)+55,work=Math.floor(r()*41)+55;
const msgs=['오늘은 당신의 기운이 강하게 빛나는 날입니다. 자신감을 가지세요!','내면의 에너지를 모아 집중하면 좋은 결과가 있을 것입니다.','주변과 조화를 이루며 함께 나아가는 것이 중요한 날입니다.','변화의 기운이 감돌고 있습니다. 유연하게 대처하세요.','잠시 멈추고 내면의 소리에 귀를 기울여보세요.','새로운 시작을 위한 에너지가 충만합니다.'];
const msg=msgs[Math.floor(r()*msgs.length)];
const el=document.getElementById('result');
el.innerHTML=`<div class="rbox" style="border:1px solid ${e.bc}30"><h2 style="color:${e.bc}">${e.n} 오늘의 운세</h2><br><p>${e.desc}</p><br><div class="compat">${e.traits.map(t=>`<span class="compat-item">${t}</span>`).join('')}</div><br><p style="font-size:1.05em">🌟 ${msg}</p><br><h3>📊 오늘의 운세 점수</h3><p>💕 연애운: ${love}점 | 💰 금전운: ${money}점</p><p>💪 건강운: ${health}점 | 💼 직장운: ${work}점</p><br><h3>☯️ 오행 상성</h3><p>✅ <b>상생 (생해주는 관계):</b> ${e.gen}</p><p>⚔️ <b>상극 (이기는 관계):</b> ${e.over}</p><p>⚠️ <b>주의 (조심할 관계):</b> ${e.fear}</p><p>🤝 <b>도움 (도움받는 관계):</b> ${e.help}</p><br><p>💡 <b>오늘의 조언:</b> ${e.help}의 기운을 가진 사람과 함께하면 좋은 하루가 될 것입니다.</p></div><br><button onclick="document.getElementById('result').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">다시 하기</button>`;
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div></body></html>
