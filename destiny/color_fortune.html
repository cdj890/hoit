function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
function generate(){

const r=sr(ds+'color'),idx=Math.floor(r()*colors.length),c=colors[idx];

while(el.firstChild)el.removeChild(el.firstChild);

const circle=document.createElement('div');circle.className='color-circle';circle.style.background=c.hex;rbox.appendChild(circle);
const h2=document.createElement('h2');h2.style.cssText='font-size:1.8em;color:'+c.hex;h2.textContent=c.n;rbox.appendChild(h2);

const meaningP=document.createElement('p');const meaningStrong=document.createElement('strong');meaningStrong.textContent='🎨 의미: ';meaningP.appendChild(meaningStrong);meaningP.appendChild(document.createTextNode(c.meaning));rbox.appendChild(meaningP);

const wearLabel=document.createElement('p');const wearStrong=document.createElement('strong');wearStrong.textContent='👗 오늘 뭘 입을까?';wearLabel.appendChild(wearStrong);rbox.appendChild(wearLabel);
const wearP=document.createElement('p');wearP.textContent=c.wear;rbox.appendChild(wearP);
rbox.appendChild(document.createElement('br'));
const compatH=document.createElement('h3');compatH.textContent='🤝 어울리는 색';rbox.appendChild(compatH);
const compatDiv=document.createElement('div');compatDiv.className='compat-colors';
c.compat.forEach(cn=>{const cc=colors.find(x=>x.n===cn);const dot=document.createElement('div');dot.className='compat-dot';dot.style.background=cc?cc.hex:'#888';dot.textContent=cn;compatDiv.appendChild(dot);});rbox.appendChild(compatDiv);
const hr=document.createElement('hr');hr.style.cssText='border-color:rgba(255,150,200,.1);margin:15px 0';rbox.appendChild(hr);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px';barsH.textContent='📊 오늘의 운세';rbox.appendChild(barsH);
function mkColorBar(label,val){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);rbox.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
[{label:'💕 연애운',val:c.love},{label:'💰 금전운',val:c.money},{label:'💪 건강운',val:c.health},{label:'💼 직장운',val:c.work}].forEach(item=>{mkColorBar(item.label,item.val);});

el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{el.style.display='none';window.scrollTo({top:0,behavior:'smooth'});};el.appendChild(btn);
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
generate();
