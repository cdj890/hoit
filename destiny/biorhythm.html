function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<h1>📈 바이오리듬</h1><p class="sub">생년월일로 계산하는 신체/감성/지성 리듬</p>
<div class="input-area"><input type="date" id="bday"><br><button onclick="calc()">바이오리듬 계산</button></div>
<div class="result" id="result"></div>
<script>
function calc(){
const bday=document.getElementById('bday').value;if(!bday){alert('생년월일을 선택해주세요!');return}
const birth=new Date(bday),today=new Date();
today.setHours(0,0,0,0);birth.setHours(0,0,0,0);
const days=Math.floor((today-birth)/(1000*60*60*24));
const phys=Math.sin(2*Math.PI*days/23)*100;
const emot=Math.sin(2*Math.PI*days/28)*100;
const intel=Math.sin(2*Math.PI*days/33)*100;
const el=document.getElementById('result');
while(el.firstChild)el.removeChild(el.firstChild);
const rbox=document.createElement('div');rbox.className='rbox';
const chartH=document.createElement('h2');chartH.style.cssText='text-align:center;margin-bottom:5px';chartH.textContent='📊 바이오리듬 그래프';rbox.appendChild(chartH);
const daysP=document.createElement('p');daysP.style.cssText='text-align:center;color:#88aabb;font-size:.9em';daysP.textContent='오늘은 탄생 후 '+days.toLocaleString()+'일째입니다';rbox.appendChild(daysP);
const canvas=document.createElement('canvas');canvas.id='chart';canvas.width=560;canvas.height=280;rbox.appendChild(canvas);
const legend=document.createElement('div');legend.className='legend';
[{color:'#ff6b6b',label:'신체 (23일)'},{color:'#4ecdc4',label:'감성 (28일)'},{color:'#ffe66d',label:'지성 (33일)'}].forEach(item=>{
  const sp=document.createElement('span');const dot=document.createElement('span');dot.className='dot';dot.style.background=item.color;sp.appendChild(dot);sp.appendChild(document.createTextNode(' '+item.label));legend.appendChild(sp);
});rbox.appendChild(legend);
const scoresDiv=document.createElement('div');scoresDiv.className='scores';
[{color:'#ff6b6b',icon:'💪',label:'신체',val:Math.round(phys)},{color:'#4ecdc4',icon:'💕',label:'감성',val:Math.round(emot)},{color:'#ffe66d',icon:'🧠',label:'지성',val:Math.round(intel)}].forEach(item=>{
  const card=document.createElement('div');card.className='score-card';card.style.border='1px solid '+item.color+'4d';
  const lbl=document.createElement('div');lbl.style.cssText='color:'+item.color+';font-size:.85em';lbl.textContent=item.icon+' '+item.label;card.appendChild(lbl);
  const val=document.createElement('div');val.className='score-val';val.style.color=item.color;val.textContent=item.val+'%';card.appendChild(val);
  const pct=Math.round((item.val+100)/2);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:5px;height:6px;margin-top:6px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='5px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background=item.color;track.appendChild(fill);card.appendChild(track);scoresDiv.appendChild(card);
  setTimeout(()=>{fill.style.width=pct+'%';},80);
});rbox.appendChild(scoresDiv);
const hr=document.createElement('hr');hr.style.cssText='border-color:rgba(100,200,255,.1);margin:15px 0';rbox.appendChild(hr);
const interpH=document.createElement('h3');interpH.style.textAlign='center';interpH.textContent='🔮 오늘의 해석';rbox.appendChild(interpH);
const barsH=document.createElement('h3');barsH.style.cssText='margin:12px 0 8px;font-size:.95em';barsH.textContent='📊 리듬 바';rbox.appendChild(barsH);
[{label:'💪 신체 리듬',val:Math.round((phys+100)/2),color:'#ff6b6b'},{label:'💕 감성 리듬',val:Math.round((emot+100)/2),color:'#4ecdc4'},{label:'🧠 지성 리듬',val:Math.round((intel+100)/2),color:'#ffe66d'}].forEach(item=>{
  const row=document.createElement('div');row.style.cssText='margin:7px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=item.label;const lv=document.createElement('span');lv.textContent=item.val+'%';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';fill.style.background=item.color;
  track.appendChild(fill);row.appendChild(track);rbox.appendChild(row);setTimeout(()=>{fill.style.width=item.val+'%';},80);
});
const interpP=document.createElement('p');interpP.textContent=getInterp(phys,'신체')+' '+getInterp(emot,'감성')+' '+getInterp(intel,'지성');rbox.appendChild(interpP);
rbox.appendChild(document.createElement('br'));
const advP=document.createElement('p');advP.style.textAlign='center';const advStrong=document.createElement('strong');advStrong.textContent='💡 종합 조언: ';advP.appendChild(advStrong);advP.appendChild(document.createTextNode(getAdvice(phys,emot,intel)));rbox.appendChild(advP);
el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{el.style.display='none';};el.appendChild(btn);
el.style.display='block';
drawChart(days);
el.scrollIntoView({behavior:'smooth'})}
function getInterp(v,name){
if(v>60)return`${name} 리듬이 최고조! 에너지가 넘칩니다.`;
if(v>20)return`${name} 리듬이 상승 중입니다. 좋은 컨디션이에요.`;
if(v>-20)return`${name} 리듬이 전환기입니다. 변화에 주의하세요.`;
if(v>-60)return`${name} 리듬이 하강 중입니다. 무리하지 마세요.`;
return`${name} 리듬이 저조합니다. 충분히 쉬세요.`}
function getAdvice(p,e,i){
const avg=(p+e+i)/3;
if(avg>40)return'모든 리듬이 좋습니다! 중요한 일을 추진하기 최적의 타이밍입니다.';
if(avg>0)return'전반적으로 양호합니다. 균형 잡힌 하루를 보내세요.';
if(avg>-40)return'일부 리듬이 저조합니다. 무리하지 말고 여유를 가지세요.';
return'리듬이 전반적으로 낮습니다. 오늘은 휴식을 취하고 에너지를 축적하세요.'}
function drawChart(days){
const c=document.getElementById('chart'),ctx=c.getContext('2d');
const W=c.width,H=c.height,mid=H/2,range=30;
ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(0,mid);ctx.lineTo(W,mid);ctx.stroke();
for(let x=0;x<W;x+=W/range){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
const colors=['#ff6b6b','#4ecdc4','#ffe66d'],periods=[23,28,33];
const todayX=Math.floor(W/2);
ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(todayX,0);ctx.lineTo(todayX,H);ctx.stroke();
ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='11px sans-serif';ctx.fillText('오늘',todayX+4,15);
colors.forEach((col,ci)=>{
ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
for(let x=0;x<W;x++){const d=days-range/2+x*range/W;const v=Math.sin(2*Math.PI*d/periods[ci]);const y=mid-v*(mid-20);if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
ctx.stroke();
const tv=Math.sin(2*Math.PI*days/periods[ci]);const ty=mid-tv*(mid-20);
ctx.fillStyle=col;ctx.beginPath();ctx.arc(todayX,ty,5,0,Math.PI*2);ctx.fill()})}
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
