const trigrams=[

{k:'☷',n:'곤(坤)',c:'TTT',t:'🌍 안정 - 대지의 기운',m:'순수하고 유연한 에너지가 감돕니다. 겸손하게 행동하고 남을 도우면 큰 복이 옵니다.',love:78,money:75,health:90,work:72,adv:'겸손과 인내가 성공의 열쇠입니다.'},
{k:'☳',n:'진(震)',c:'HTT',t:'⚡ 변동 - 우레의 기운',m:'갑작스러운 변화가 찾아옵니다. 놀라운 소식이 있을 수 있으나, 결과적으로 좋은 방향입니다.',love:65,money:70,health:60,work:75,adv:'변화를 두려워하지 말고 받아들이세요.'},
{k:'☵',n:'감(坎)',c:'THT',t:'🌊 시련 - 물의 기운',m:'어려움이 있지만 그 안에 기회가 숨어있습니다. 물처럼 유연하게 흘러가세요.',love:55,money:50,health:65,work:55,adv:'무리하지 말고 때를 기다리세요.'},
{k:'☶',n:'간(艮)',c:'TTH',t:'⛰️ 멈춤 - 산의 기운',m:'잠시 멈추고 생각할 때입니다. 성급한 행동보다 깊은 사색이 필요합니다.',love:60,money:55,health:80,work:50,adv:'서두르지 말고 차분히 준비하세요.'},
{k:'☴',n:'손(巽)',c:'HHT',t:'🌬️ 순풍 - 바람의 기운',m:'순한 바람처럼 부드럽게 일이 풀립니다. 유연한 소통이 행운을 가져옵니다.',love:82,money:78,health:75,work:80,adv:'소통과 협력이 중요한 날입니다.'},

];
function seed(str){var h=0;for(var i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return function(){h=h*16807%2147483647;return(h-1)/2147483646;};}

function mkCoinBar(label,val,parentEl){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);parentEl.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
let flipping=false;
function flipCoins(){
if(flipping)return;flipping=true;
document.getElementById('flipBtn').disabled=true;
document.getElementById('result').style.display='none';
const results=[];
for(let i=0;i<3;i++){
const el=document.getElementById('c'+i);
const isH=Math.random()>.5;results.push(isH?'H':'T');
el.className='coin unknown flipping';el.textContent='?';
const delay=i*200;
setTimeout(()=>{
el.addEventListener('animationend',function handler(){
el.removeEventListener('animationend',handler);
el.classList.remove('flipping','unknown');
el.classList.add(isH?'heads':'tails');
el.textContent=isH?'앞':'뒤';
if(document.querySelectorAll('.coin.flipping').length===0&&results.length===3)setTimeout(()=>showResult(results.join('')),300);
});
},delay);}
}
function showResult(combo){
const tri=trigrams.find(t=>t.c===combo)||trigrams[0];
const el=document.getElementById('result');
while(el.firstChild)el.removeChild(el.firstChild);
const rbox=document.createElement('div');rbox.className='rbox';
const comboDiv=document.createElement('div');comboDiv.className='combo';comboDiv.textContent=combo.split('').map(c=>c==='H'?'🟡':'⚫').join('');rbox.appendChild(comboDiv);
const h2=document.createElement('h2');h2.textContent=tri.k+' '+tri.n;rbox.appendChild(h2);
const h3=document.createElement('h3');h3.style.cssText='color:#d4a832;margin:10px 0';h3.textContent=tri.t;rbox.appendChild(h3);
const mp=document.createElement('p');mp.style.cssText='margin:15px 0;font-size:1.05em';mp.textContent=tri.m;rbox.appendChild(mp);
const hr1=document.createElement('hr');hr1.style.cssText='border-color:rgba(212,168,50,.2);margin:15px 0';rbox.appendChild(hr1);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px;font-size:.95em';barsH.textContent='📊 오늘의 운세';rbox.appendChild(barsH);
[{label:'💕 연애운',val:tri.love},{label:'💰 금전운',val:tri.money},{label:'💪 건강운',val:tri.health},{label:'💼 직장운',val:tri.work}].forEach(item=>{mkCoinBar(item.label,item.val,rbox);});
const hr2=document.createElement('hr');hr2.style.cssText='border-color:rgba(212,168,50,.2);margin:15px 0';rbox.appendChild(hr2);
const advp=document.createElement('p');const advs=document.createElement('strong');advs.textContent='💡 조언: ';advp.appendChild(advs);advp.appendChild(document.createTextNode(tri.adv));rbox.appendChild(advp);
el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn2=document.createElement('button');btn2.textContent='다시 하기';btn2.onclick=()=>{el.style.display='none';for(let i=0;i<3;i++){let e=document.getElementById('c'+i);e.className='coin unknown';e.textContent='?'}};el.appendChild(btn2);
el.style.display='block';el.scrollIntoView({behavior:'smooth'});flipping=false;document.getElementById('flipBtn').disabled=false;}
