<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>동전 점</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0a1a2e);color:#e0d0ff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}h1{margin:30px 0 10px;font-size:2em;text-shadow:0 0 20px rgba(200,180,80,.5)}.sub{color:#9988bb;margin-bottom:30px;font-size:.95em}.coins{display:flex;gap:25px;margin:25px 0}.coin{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5em;font-weight:bold;cursor:default;transition:transform .3s;perspective:200px}.coin.heads{background:linear-gradient(145deg,#d4a832,#b8922a);color:#3a2a00;box-shadow:0 4px 15px rgba(212,168,50,.4)}.coin.tails{background:linear-gradient(145deg,#8a8a8a,#6a6a6a);color:#2a2a2a;box-shadow:0 4px 15px rgba(100,100,100,.3)}.coin.unknown{background:linear-gradient(145deg,#4a3a6a,#3a2a5a);color:#9988bb;box-shadow:0 4px 15px rgba(80,60,120,.3)}.coin.flipping{animation:flip .6s ease-in-out}@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(900deg) scale(.8)}100%{transform:rotateX(1800deg) scale(1)}}button{background:linear-gradient(135deg,#d4a832,#a08020);color:#1a0a00;border:none;padding:14px 35px;border-radius:12px;font-size:1.1em;cursor:pointer;margin:15px 0;font-weight:bold;transition:all .3s}button:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(212,168,50,.4)}button:disabled{opacity:.5}.result{display:none;text-align:center;max-width:500px;animation:fadeIn .6s;margin-top:20px}.rbox{background:rgba(255,255,255,.05);border:1px solid rgba(212,168,50,.2);border-radius:16px;padding:25px;line-height:1.8}.combo{font-size:2em;margin:10px 0;letter-spacing:8px}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:8px;left:8px;z-index:9999;background:rgba(0,0,0,0.75);color:#fff;text-decoration:none;padding:10px 18px;border-radius:10px;font-size:15px;font-family:sans-serif;font-weight:bold;min-width:44px;min-height:44px;display:flex;align-items:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<h1>🪙 동전 점</h1><p class="sub">세 개의 동전을 던져 주역의 지혜를 구하세요</p>
<div class="coins"><div class="coin unknown" id="c0">?</div><div class="coin unknown" id="c1">?</div><div class="coin unknown" id="c2">?</div></div>
<button id="flipBtn" onclick="flipCoins()">🪙 동전 던지기</button>
<div class="result" id="result"></div>
<script>
const trigrams=[
{k:'☰',n:'건(乾)',c:'HHH',t:'🌟 대길 - 하늘의 기운',m:'강건한 창조의 힘이 가득합니다. 리더십을 발휘할 때입니다. 큰 뜻을 품고 행동하면 반드시 이루어집니다.',love:92,money:88,health:85,work:95,adv:'자신감을 가지고 큰 일에 도전하세요.'},
{k:'☷',n:'곤(坤)',c:'TTT',t:'🌍 안정 - 대지의 기운',m:'순수하고 유연한 에너지가 감돕니다. 겸손하게 행동하고 남을 도우면 큰 복이 옵니다.',love:78,money:75,health:90,work:72,adv:'겸손과 인내가 성공의 열쇠입니다.'},
{k:'☳',n:'진(震)',c:'HTT',t:'⚡ 변동 - 우레의 기운',m:'갑작스러운 변화가 찾아옵니다. 놀라운 소식이 있을 수 있으나, 결과적으로 좋은 방향입니다.',love:65,money:70,health:60,work:75,adv:'변화를 두려워하지 말고 받아들이세요.'},
{k:'☵',n:'감(坎)',c:'THT',t:'🌊 시련 - 물의 기운',m:'어려움이 있지만 그 안에 기회가 숨어있습니다. 물처럼 유연하게 흘러가세요.',love:55,money:50,health:65,work:55,adv:'무리하지 말고 때를 기다리세요.'},
{k:'☶',n:'간(艮)',c:'TTH',t:'⛰️ 멈춤 - 산의 기운',m:'잠시 멈추고 생각할 때입니다. 성급한 행동보다 깊은 사색이 필요합니다.',love:60,money:55,health:80,work:50,adv:'서두르지 말고 차분히 준비하세요.'},
{k:'☴',n:'손(巽)',c:'HHT',t:'🌬️ 순풍 - 바람의 기운',m:'순한 바람처럼 부드럽게 일이 풀립니다. 유연한 소통이 행운을 가져옵니다.',love:82,money:78,health:75,work:80,adv:'소통과 협력이 중요한 날입니다.'},
{k:'☲',n:'이(離)',c:'HTH',t:'🔥 밝음 - 불의 기운',m:'밝은 지혜가 빛나는 때입니다. 명석한 판단으로 좋은 결과를 얻을 수 있습니다.',love:75,money:82,health:70,work:85,adv:'직감을 믿고 밝은 마음을 유지하세요.'},
{k:'☱',n:'태(兌)',c:'THH',t:'😊 기쁨 - 연못의 기운',m:'기쁨과 즐거움이 가득한 날입니다. 사교 활동에서 좋은 인연을 만날 수 있습니다.',love:90,money:72,health:78,work:70,adv:'웃음을 잃지 마세요. 즐거운 일이 생깁니다.'}
];
let flipping=false;
function flipCoins(){
if(flipping)return;flipping=true;
document.getElementById('flipBtn').disabled=true;
document.getElementById('result').style.display='none';
const results=[];
for(let i=0;i<3;i++){
const el=document.getElementById('c'+i);
el.className='coin unknown flipping';el.textContent='?';
setTimeout(()=>{
const isH=Math.random()>.5;results.push(isH?'H':'T');
el.classList.remove('flipping','unknown');
el.classList.add(isH?'heads':'tails');
el.textContent=isH?'앞':'뒤';
if(results.length===3)setTimeout(()=>showResult(results.join('')),400);
},(i+1)*500)}
}
function showResult(combo){
const tri=trigrams.find(t=>t.c===combo)||trigrams[0];
const el=document.getElementById('result');
el.innerHTML=`<div class="rbox"><div class="combo">${combo.split('').map(c=>c==='H'?'🟡':'⚫').join('')}</div><h2>${tri.k} ${tri.n}</h2><h3 style="color:#d4a832;margin:10px 0">${tri.t}</h3><p style="margin:15px 0;font-size:1.05em">${tri.m}</p><hr style="border-color:rgba(212,168,50,.2);margin:15px 0"><p>💕 연애운: ${tri.love}점 ${'★'.repeat(Math.round(tri.love/20))}${'☆'.repeat(5-Math.round(tri.love/20))}</p><p>💰 금전운: ${tri.money}점 ${'★'.repeat(Math.round(tri.money/20))}${'☆'.repeat(5-Math.round(tri.money/20))}</p><p>💪 건강운: ${tri.health}점 ${'★'.repeat(Math.round(tri.health/20))}${'☆'.repeat(5-Math.round(tri.health/20))}</p><p>💼 직장운: ${tri.work}점 ${'★'.repeat(Math.round(tri.work/20))}${'☆'.repeat(5-Math.round(tri.work/20))}</p><hr style="border-color:rgba(212,168,50,.2);margin:15px 0"><p>💡 <b>조언:</b> ${tri.adv}</p></div><br><button onclick="document.getElementById('result').style.display='none';for(let i=0;i<3;i++){let e=document.getElementById('c'+i);e.className='coin unknown';e.textContent='?'}">다시 하기</button>`;
el.style.display='block';el.scrollIntoView({behavior:'smooth'});flipping=false;document.getElementById('flipBtn').disabled=false}
</script></body></html>
