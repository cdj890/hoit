.answer-inner::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 0%,rgba(179,136,255,.1),transparent 60%);pointer-events:none}

<h1>🐚 마법의 소라고동</h1>
<p class="sub">오 위대한 소라고동이여, 질문에 답하소서!</p>

<div class="question-area">
<input type="text" id="questionInput" placeholder="예/아니오 질문을 입력하세요..." maxlength="100" autocomplete="off">
<p class="hint">질문을 적고 소라고동을 터치하세요</p>
</div>

<div class="shell" id="shell">🐚</div>
</div>
<p class="shell-label">소라고동을 터치하세요</p>

<div class="answer-box" id="answerBox">

<p class="answer-label">소라고동의 답변</p>
<p class="answer-text" id="answerText"></p>
</div>

<script>
const answers=["그래","아니","안 돼","다시 한번 물어봐","그것도 안 돼","좋아","어쩌면...","당연하지!","글쎄...","절대 안 돼","한번 해봐","포기해","네 마음대로 해","소라고동은 모른다","그럴 수도 있지"];
let busy=false;

function askConch(){
if(busy)return;
const q=document.getElementById('questionInput').value.trim();
if(!q){document.getElementById('questionInput').focus();document.getElementById('questionInput').style.borderColor='rgba(255,80,80,.6)';setTimeout(()=>document.getElementById('questionInput').style.borderColor='',800);return;}
busy=true;
const shell=document.getElementById('shell');
const box=document.getElementById('answerBox');
box.style.display='none';
shell.className='shell shaking';
setTimeout(()=>{
shell.className='shell revealing';
setTimeout(()=>{
shell.className='shell';
const answer=answers[Math.floor(Math.random()*answers.length)];
document.getElementById('answerText').textContent=answer;
box.style.display='block';
box.style.animation='none';
box.offsetHeight;
box.style.animation='fadeUp .6s ease';
box.scrollIntoView({behavior:'smooth',block:'nearest'});
busy=false;
},600);
},700);
}

function resetConch(){
document.getElementById('answerBox').style.display='none';
document.getElementById('questionInput').value='';
document.getElementById('questionInput').focus();
}

document.getElementById('questionInput').addEventListener('keydown',function(e){
if(e.key==='Enter')askConch();
});

// Ambient bubbles
(function(){
const cont=document.getElementById('bubbles');
for(let i=0;i<12;i++){
const b=document.createElement('div');
b.className='bubble';
const size=20+Math.random()*50;
b.style.width=size+'px';
b.style.height=size+'px';
b.style.left=Math.random()*100+'%';
b.style.animationDuration=(8+Math.random()*12)+'s';
b.style.animationDelay=(Math.random()*10)+'s';
cont.appendChild(b);
}
})();
</script>
