function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<script>
const data=[
{n:'아메리카노',e:'☕',pers:'깔끔하고 본질을 추구하는 당신! 군더더기 없는 성격으로 효율적입니다. 직선적이고 솔직한 매력이 있습니다.',fortune:'오늘은 본질에 집중하면 좋은 결과가 있을 것입니다. 복잡한 것을 단순하게 정리해보세요.',love:72,money:80,health:75,work:88,adv:'심플한 것이 최고입니다. 불필요한 것을 정리하세요.',lucky:'검정색 펜'},
{n:'카페라떼',e:'🥛',pers:'부드럽고 따뜻한 성격의 소유자! 사람들에게 편안함을 주며, 균형 잡힌 시각을 가지고 있습니다.',fortune:'인간관계에서 좋은 일이 생길 수 있습니다. 따뜻한 한마디가 큰 변화를 만듭니다.',love:90,money:72,health:80,work:75,adv:'주변 사람들에게 따뜻하게 대하세요.',lucky:'베이지색 스카프'},
{n:'카푸치노',e:'🫧',pers:'감성적이고 예술적인 당신! 아름다움을 추구하고, 작은 것에서 행복을 찾는 능력이 있습니다.',fortune:'예상치 못한 즐거움이 찾아올 수 있습니다. 일상의 작은 행복에 주목하세요.',love:85,money:68,health:78,work:72,adv:'감성을 표현하면 좋은 일이 생깁니다.',lucky:'꽃무늬 아이템'},
{n:'에스프레소',e:'🫗',pers:'강인하고 집중력 있는 당신! 작지만 강한 에너지의 소유자입니다. 효율적이고 프로페셔널합니다.',fortune:'집중력이 빛나는 날입니다. 중요한 결정을 내리기에 좋은 타이밍이에요.',love:60,money:85,health:65,work:95,adv:'하나에 집중하면 최고의 결과를 얻습니다.',lucky:'고급 볼펜'},
{n:'카페모카',e:'🍫',pers:'달콤하고 낙천적인 당신! 삶의 즐거움을 아는 사람이며, 주변을 밝게 만드는 에너지가 있습니다.',fortune:'달콤한 소식이 찾아올 수 있어요! 긍정적인 마인드가 행운을 끌어당깁니다.',love:88,money:75,health:72,work:70,adv:'즐거운 마음이 최고의 행운입니다.',lucky:'초콜릿'},

function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const container=document.getElementById('coffees');
data.forEach((c,i)=>{const el=document.createElement('div');el.className='coffee-opt';el.innerHTML=`<span class="icon">${c.e}</span><b>${c.n}</b>`;el.onclick=()=>show(i);container.appendChild(el)});
function mkCoffeeBar(label,val,parentEl){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);parentEl.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
function show(i){
const c=data[i],r=sr(c.n+new Date().toDateString()),el=document.getElementById('result');
const todayScore=Math.floor(r()*31)+65;
while(el.firstChild)el.removeChild(el.firstChild);
const rbox=document.createElement('div');rbox.className='rbox';
const eP=document.createElement('p');eP.style.fontSize='3.5em';eP.textContent=c.e;rbox.appendChild(eP);
const h2=document.createElement('h2');h2.textContent=c.n;rbox.appendChild(h2);
rbox.appendChild(document.createElement('br'));
const persLabel=document.createElement('p');const persStrong=document.createElement('strong');persStrong.textContent='☕ 성격 분석';persLabel.appendChild(persStrong);rbox.appendChild(persLabel);
const persP=document.createElement('p');persP.style.margin='8px 0';persP.textContent=c.pers;rbox.appendChild(persP);
rbox.appendChild(document.createElement('br'));
const fortLabel=document.createElement('p');const fortStrong=document.createElement('strong');fortStrong.textContent='🔮 오늘의 운세';fortLabel.appendChild(fortStrong);rbox.appendChild(fortLabel);
const fortP=document.createElement('p');fortP.style.margin='8px 0';fortP.textContent=c.fortune;rbox.appendChild(fortP);
rbox.appendChild(document.createElement('br'));
const totalP=document.createElement('p');const totalStrong=document.createElement('strong');totalStrong.textContent='오늘의 총운: '+todayScore+'점';totalP.appendChild(totalStrong);rbox.appendChild(totalP);
const hr=document.createElement('hr');hr.style.cssText='border-color:rgba(180,120,60,.15);margin:15px 0';rbox.appendChild(hr);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px;font-size:.95em';barsH.textContent='📊 오늘의 운세';rbox.appendChild(barsH);
[{label:'💕 연애운',val:c.love},{label:'💰 금전운',val:c.money},{label:'💪 건강운',val:c.health},{label:'💼 직장운',val:c.work}].forEach(item=>{mkCoffeeBar(item.label,item.val,rbox);});
rbox.appendChild(document.createElement('br'));
const advP=document.createElement('p');const advStrong=document.createElement('strong');advStrong.textContent='💡 조언: ';advP.appendChild(advStrong);advP.appendChild(document.createTextNode(c.adv));rbox.appendChild(advP);
const luckyP=document.createElement('p');const luckyStrong=document.createElement('strong');luckyStrong.textContent='🍀 행운의 아이템: ';luckyP.appendChild(luckyStrong);luckyP.appendChild(document.createTextNode(c.lucky));rbox.appendChild(luckyP);
el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{el.style.display='none';window.scrollTo({top:0,behavior:'smooth'});};el.appendChild(btn);
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
