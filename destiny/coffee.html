<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>커피 운세</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a0f0a,#1a0a1a);color:#e0d0ff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}h1{margin:30px 0 10px;font-size:2em;text-shadow:0 0 20px rgba(180,120,60,.5)}.sub{color:#bb9977;margin-bottom:25px}.coffees{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;max-width:500px;width:100%;margin:20px 0}.coffee-opt{background:rgba(255,255,255,.05);border:1px solid rgba(180,120,60,.2);border-radius:16px;padding:20px 12px;text-align:center;cursor:pointer;transition:all .3s}.coffee-opt:hover{background:rgba(180,120,60,.15);transform:translateY(-4px);box-shadow:0 5px 15px rgba(180,120,60,.2)}.coffee-opt .icon{font-size:2.5em;display:block;margin-bottom:8px}.result{display:none;max-width:500px;width:100%;animation:fadeIn .8s;margin-top:20px}.rbox{background:linear-gradient(135deg,rgba(180,120,60,.08),rgba(100,60,30,.05));border:1px solid rgba(180,120,60,.2);border-radius:16px;padding:25px;line-height:1.8;text-align:center}.rbox h2{color:#dda860}button{background:linear-gradient(135deg,#a06830,#805020);color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:1em;cursor:pointer;margin-top:15px;transition:all .3s}button:hover{transform:scale(1.05)}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<h1>☕ 커피 운세</h1><p class="sub">오늘 끌리는 커피를 선택하세요</p>
<div class="coffees" id="coffees"></div>
<div class="result" id="result"></div>
<script>
const data=[
{n:'아메리카노',e:'☕',pers:'깔끔하고 본질을 추구하는 당신! 군더더기 없는 성격으로 효율적입니다. 직선적이고 솔직한 매력이 있습니다.',fortune:'오늘은 본질에 집중하면 좋은 결과가 있을 것입니다. 복잡한 것을 단순하게 정리해보세요.',love:72,money:80,health:75,work:88,adv:'심플한 것이 최고입니다. 불필요한 것을 정리하세요.',lucky:'검정색 펜'},
{n:'카페라떼',e:'🥛',pers:'부드럽고 따뜻한 성격의 소유자! 사람들에게 편안함을 주며, 균형 잡힌 시각을 가지고 있습니다.',fortune:'인간관계에서 좋은 일이 생길 수 있습니다. 따뜻한 한마디가 큰 변화를 만듭니다.',love:90,money:72,health:80,work:75,adv:'주변 사람들에게 따뜻하게 대하세요.',lucky:'베이지색 스카프'},
{n:'카푸치노',e:'🫧',pers:'감성적이고 예술적인 당신! 아름다움을 추구하고, 작은 것에서 행복을 찾는 능력이 있습니다.',fortune:'예상치 못한 즐거움이 찾아올 수 있습니다. 일상의 작은 행복에 주목하세요.',love:85,money:68,health:78,work:72,adv:'감성을 표현하면 좋은 일이 생깁니다.',lucky:'꽃무늬 아이템'},
{n:'에스프레소',e:'🫗',pers:'강인하고 집중력 있는 당신! 작지만 강한 에너지의 소유자입니다. 효율적이고 프로페셔널합니다.',fortune:'집중력이 빛나는 날입니다. 중요한 결정을 내리기에 좋은 타이밍이에요.',love:60,money:85,health:65,work:95,adv:'하나에 집중하면 최고의 결과를 얻습니다.',lucky:'고급 볼펜'},
{n:'카페모카',e:'🍫',pers:'달콤하고 낙천적인 당신! 삶의 즐거움을 아는 사람이며, 주변을 밝게 만드는 에너지가 있습니다.',fortune:'달콤한 소식이 찾아올 수 있어요! 긍정적인 마인드가 행운을 끌어당깁니다.',love:88,money:75,health:72,work:70,adv:'즐거운 마음이 최고의 행운입니다.',lucky:'초콜릿'},
{n:'콜드브루',e:'🧊',pers:'차분하고 이성적인 당신! 트렌디하면서도 깊이 있는 성격입니다. 인내심이 강하고 장기적 시야를 가집니다.',fortune:'오래 준비한 일이 결실을 맺을 수 있습니다. 차분하게 기다린 보람이 있을 거예요.',love:70,money:82,health:78,work:85,adv:'인내가 최고의 전략입니다.',lucky:'시계'}
];
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const container=document.getElementById('coffees');
data.forEach((c,i)=>{const el=document.createElement('div');el.className='coffee-opt';el.innerHTML=`<span class="icon">${c.e}</span><b>${c.n}</b>`;el.onclick=()=>show(i);container.appendChild(el)});
function show(i){
const c=data[i],r=sr(c.n+new Date().toDateString()),el=document.getElementById('result');
const todayScore=Math.floor(r()*31)+65;
el.innerHTML=`<div class="rbox"><p style="font-size:3.5em">${c.e}</p><h2>${c.n}</h2><br><p><b>☕ 성격 분석</b></p><p style="margin:8px 0">${c.pers}</p><br><p><b>🔮 오늘의 운세</b></p><p style="margin:8px 0">${c.fortune}</p><br><p><b>오늘의 총운: ${todayScore}점</b></p><hr style="border-color:rgba(180,120,60,.15);margin:15px 0"><p>💕 연애운: ${c.love}점 | 💰 금전운: ${c.money}점</p><p>💪 건강운: ${c.health}점 | 💼 직장운: ${c.work}점</p><br><p>💡 <b>조언:</b> ${c.adv}</p><p>🍀 <b>행운의 아이템:</b> ${c.lucky}</p></div><br><button onclick="document.getElementById('result').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">다시 하기</button>`;
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script></body></html>
