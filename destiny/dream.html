<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>꿈 해몽</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0d1a2e);color:#e0d0ff;font-family:'Segoe UI',sans-serif;padding:20px;display:flex;flex-direction:column;align-items:center}h1{margin:30px 0 10px;font-size:2em;text-shadow:0 0 20px rgba(100,80,200,.5)}.sub{color:#9988bb;margin-bottom:25px;font-size:.95em}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-width:600px;width:100%}.sym{background:rgba(255,255,255,.06);border:1px solid rgba(150,100,255,.15);border-radius:12px;padding:15px 8px;text-align:center;cursor:pointer;transition:all .3s;font-size:.9em}.sym:hover{background:rgba(150,100,255,.15);transform:translateY(-3px);box-shadow:0 5px 15px rgba(100,50,200,.2)}.sym .emoji{font-size:2em;display:block;margin-bottom:6px}.result{display:none;margin-top:30px;max-width:500px;width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(150,100,255,.15);border-radius:16px;padding:25px;animation:fadeIn .6s;line-height:1.8}.result h2{margin-bottom:15px;font-size:1.3em}button{background:linear-gradient(135deg,#6a3de8,#4a2db8);color:#fff;border:none;padding:10px 25px;border-radius:10px;font-size:1em;cursor:pointer;margin-top:15px;transition:all .3s}button:hover{transform:scale(1.05)}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2968188107783039" crossorigin="anonymous"></script>
</head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<h1>🌙 꿈 해몽</h1><p class="sub">어젯밤 꿈에서 본 것을 선택하세요</p>
<div class="grid" id="grid"></div>
<div class="result" id="result"></div>
<script>
const dreams=[
{e:'✈️',n:'비행',i:'자유와 해방을 갈망하는 마음입니다. 현재 상황에서 벗어나 새로운 세계로 나아갈 준비가 되었습니다.',cat:'성장운 UP',adv:'새로운 도전을 시작하기 좋은 시기입니다.'},
{e:'🌊',n:'물/바다',i:'감정의 흐름을 상징합니다. 맑은 물은 행운, 탁한 물은 내면의 갈등을 의미합니다.',cat:'금전운 UP',adv:'재물이 들어올 조짐이 있습니다.'},
{e:'🔥',n:'불',i:'열정과 변화의 상징입니다. 내면의 에너지가 폭발하려 합니다.',cat:'직장운 UP',adv:'승진이나 성과를 기대할 수 있습니다.'},
{e:'🐍',n:'뱀',i:'지혜와 재물의 상징입니다. 큰 뱀일수록 큰 행운을 의미합니다.',cat:'금전운 대길',adv:'로또를 사보는 것도 좋겠어요!'},
{e:'🐕',n:'개',i:'충성스러운 친구나 동반자를 의미합니다. 관계의 변화가 있을 수 있습니다.',cat:'연애운 UP',adv:'주변 사람을 소중히 여기세요.'},
{e:'📝',n:'시험',i:'자기 자신에 대한 평가 불안을 반영합니다. 준비가 필요한 일이 있습니다.',cat:'직장운 주의',adv:'꼼꼼한 준비가 성공의 열쇠입니다.'},
{e:'🦷',n:'이빨',i:'자신감이나 외모에 대한 걱정을 나타냅니다. 변화의 시기가 오고 있습니다.',cat:'건강운 주의',adv:'건강 검진을 받아보세요.'},
{e:'⬇️',n:'추락',i:'통제력 상실에 대한 두려움입니다. 현재 불안한 상황을 직시하세요.',cat:'주의 필요',adv:'무리한 결정은 피하고 안정을 취하세요.'},
{e:'🏃',n:'도망',i:'현실의 문제에서 도피하고 싶은 마음입니다. 용기를 내어 맞서보세요.',cat:'성장운',adv:'두려움을 극복하면 큰 보상이 옵니다.'},
{e:'🌸',n:'꽃',i:'아름다운 새 시작을 예고합니다. 사랑과 행복이 다가옵니다.',cat:'연애운 대길',adv:'마음을 열고 새로운 만남을 가져보세요.'},
{e:'💀',n:'죽음',i:'끝이 아닌 새로운 시작의 상징입니다. 큰 변환점에 서 있습니다.',cat:'대변화',adv:'과거를 정리하고 새 출발하세요.'},
{e:'👶',n:'아기',i:'새로운 프로젝트나 가능성을 의미합니다. 창조적 에너지가 충만합니다.',cat:'성장운 UP',adv:'새로운 일을 시작하기 좋습니다.'},
{e:'🏠',n:'집',i:'자기 자신의 내면 세계를 상징합니다. 마음의 안정이 필요합니다.',cat:'건강운',adv:'휴식과 명상을 통해 재충전하세요.'},
{e:'🚗',n:'차/운전',i:'인생의 방향과 통제력을 의미합니다. 주도적으로 살고 있는지 돌아보세요.',cat:'직장운',adv:'주도적인 태도가 좋은 결과를 만듭니다.'},
{e:'💰',n:'돈',i:'가치와 자존감을 상징합니다. 재물운이 상승하고 있습니다.',cat:'금전운 대길',adv:'투자나 저축을 시작하기 좋습니다.'},
{e:'🐈',n:'고양이',i:'직감과 독립심을 상징합니다. 자신만의 길을 걸을 때입니다.',cat:'직감운 UP',adv:'느낌이 오는 대로 행동해보세요.'},
{e:'🌈',n:'무지개',i:'희망과 행운의 상징입니다. 어려움 뒤에 좋은 일이 찾아옵니다.',cat:'종합운 대길',adv:'긍정적인 마음을 유지하세요!'},
{e:'👻',n:'귀신',i:'과거의 미련이나 해결되지 않은 감정을 의미합니다.',cat:'정신운',adv:'과거를 정리하고 현재에 집중하세요.'},
{e:'🌲',n:'나무/숲',i:'성장과 생명력의 상징입니다. 건강과 발전을 예고합니다.',cat:'건강운 UP',adv:'자연 속에서 에너지를 충전하세요.'},
{e:'⭐',n:'별/하늘',i:'꿈과 이상을 상징합니다. 높은 목표를 향해 나아갈 때입니다.',cat:'성장운 대길',adv:'큰 꿈을 품고 도전하세요!'},
{e:'🎵',n:'음악/노래',i:'감정의 표현과 조화를 의미합니다. 마음이 평화로워질 것입니다.',cat:'연애운 UP',adv:'감정을 솔직하게 표현해보세요.'},
{e:'✈️',n:'여행',i:'새로운 경험과 모험을 원하는 마음입니다. 변화가 필요합니다.',cat:'종합운 UP',adv:'여행이나 새 취미를 시작해보세요.'}
];
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const g=document.getElementById('grid');
dreams.forEach((d,i)=>{const el=document.createElement('div');el.className='sym';el.innerHTML=`<span class="emoji">${d.e}</span>${d.n}`;el.onclick=()=>showResult(i);g.appendChild(el)});
function showResult(i){
const d=dreams[i],dt=new Date(),ds=dt.getFullYear()+'-'+(dt.getMonth()+1)+'-'+dt.getDate(),r=sr(d.n+ds);
const lucky=Math.floor(r()*45)+1,lucky2=Math.floor(r()*45)+1;
const el=document.getElementById('result');
el.innerHTML=`<h2>${d.e} ${d.n} 꿈 해몽</h2><p>${d.i}</p><br><p>📊 <b>관련 운세:</b> ${d.cat}</p><p>💡 <b>조언:</b> ${d.adv}</p><br><p>🔢 <b>행운의 숫자:</b> ${lucky}, ${lucky2}</p><p>🎯 <b>행운 지수:</b> ${Math.floor(r()*40)+60}%</p><br><button onclick="document.getElementById('result').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">다시 하기</button>`;
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script></body></html>
