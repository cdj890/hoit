function _copy(text,btn){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    _copy(text,this).catch(()=>_copyFallback(text,btn));
  } else { _copyFallback(text,btn); }
}
function _copyFallback(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');if(btn)btn.textContent='복사 완료!';}catch(e){alert('복사 실패. 수동으로 복사해주세요.');}
  document.body.removeChild(ta);
}

<h1>👤 관상 테스트</h1><p class="sub">얼굴 특징으로 알아보는 성격과 운세</p>
<div class="progress" id="prog"></div>
<div id="steps"></div>
<div class="result" id="result"></div>
<script>
const questions=[
{q:'얼굴형을 선택하세요',opts:[{e:'🥚',t:'계란형',v:0},{e:'🔵',t:'둥근형',v:1},{e:'🔷',t:'각진형',v:2},{e:'🔻',t:'역삼각형',v:3}]},
{q:'눈 모양을 선택하세요',opts:[{e:'👁️',t:'큰 눈',v:0},{e:'🌙',t:'가는 눈',v:1},{e:'🔘',t:'동그란 눈',v:2},{e:'🐱',t:'고양이 눈',v:3}]},
{q:'코 모양을 선택하세요',opts:[{e:'📐',t:'높은 코',v:0},{e:'🔵',t:'둥근 코',v:1},{e:'📏',t:'곧은 코',v:2},{e:'🔽',t:'작은 코',v:3}]},
{q:'입 모양을 선택하세요',opts:[{e:'👄',t:'도톰한 입술',v:0},{e:'➖',t:'얇은 입술',v:1},{e:'😊',t:'올라간 입꼬리',v:2},{e:'😐',t:'일자 입',v:3}]},
{q:'이마를 선택하세요',opts:[{e:'📐',t:'넓은 이마',v:0},{e:'📏',t:'좁은 이마',v:1},{e:'🔵',t:'둥근 이마',v:2},{e:'📦',t:'평평한 이마',v:3}]}
];
const readings=[
{type:'리더형',emoji:'👑',desc:'타고난 리더의 관상입니다. 결단력과 카리스마가 얼굴에 드러나 있습니다. 높은 자리에 오를 운명이며, 주변 사람들이 자연스럽게 따릅니다.',love:72,money:85,health:75,work:95},
{type:'예술가형',emoji:'🎨',desc:'예술적 감수성이 뛰어난 관상입니다. 창의적이고 독특한 시각을 가지고 있으며, 아름다움을 추구합니다. 예술 분야에서 큰 성공을 거둘 수 있습니다.',love:85,money:65,health:70,work:80},
{type:'학자형',emoji:'📚',desc:'지적이고 분석적인 관상입니다. 깊은 통찰력과 학문적 재능이 있습니다. 연구나 전문직에서 두각을 나타냅니다.',love:60,money:75,health:80,work:88},
{type:'복덕형',emoji:'🍀',desc:'복과 덕이 가득한 관상입니다! 재물운이 특히 좋으며, 주변 사람들에게도 행운을 가져다줍니다. 넉넉하고 여유로운 인생을 살 것입니다.',love:80,money:95,health:85,work:75},
{type:'매력형',emoji:'💫',desc:'인간관계의 달인! 매력적인 관상으로 사람들을 끌어당깁니다. 연애운이 특히 강하며, 사교 활동에서 빛을 발합니다.',love:95,money:70,health:72,work:78},
{type:'강인형',emoji:'💪',desc:'강인하고 의지가 굳은 관상입니다. 어떤 역경에도 굴하지 않는 힘이 있으며, 끈기와 인내로 목표를 달성합니다.',love:65,money:80,health:90,work:85}
];
let cur=0,ans=[];
const stepsEl=document.getElementById('steps'),progEl=document.getElementById('prog');
function render(){
progEl.innerHTML='';
for(let i=0;i<questions.length;i++){const d=document.createElement('div');d.className='dot'+(i<cur?' done':'')+(i===cur?' cur':'');progEl.appendChild(d)}
stepsEl.innerHTML='';
if(cur>=questions.length){showResult();return}
const q=questions[cur],step=document.createElement('div');step.className='step active';
step.innerHTML=`<h2>${q.q}</h2><div class="opts">${q.opts.map(o=>`<div class="opt" onclick="pick(${o.v})"><span class="emo">${o.e}</span>${o.t}</div>`).join('')}</div>`;
stepsEl.appendChild(step)}
function pick(v){ans.push(v);cur++;render()}
function mkFaceBar(label,val,parentEl){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);parentEl.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
function showResult(){
const sum=ans.reduce((a,b)=>a+b,0);const idx=sum%readings.length;const rd=readings[idx];
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const r=sr(ans.join('')+new Date().toDateString());
const luckyNum=Math.floor(r()*99)+1;const luckyColor=['빨강','파랑','초록','노랑','보라','분홍'][Math.floor(r()*6)];
const el=document.getElementById('result');
while(el.firstChild)el.removeChild(el.firstChild);
const rbox=document.createElement('div');rbox.className='rbox';
const emoP=document.createElement('p');emoP.style.fontSize='3em';emoP.textContent=rd.emoji;rbox.appendChild(emoP);
const h2=document.createElement('h2');h2.style.cssText='margin:10px 0;font-size:1.5em';h2.textContent=rd.type;rbox.appendChild(h2);
const descP=document.createElement('p');descP.style.margin='15px 0';descP.textContent=rd.desc;rbox.appendChild(descP);
const hr=document.createElement('hr');hr.style.cssText='border-color:rgba(150,100,255,.15);margin:15px 0';rbox.appendChild(hr);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px';barsH.textContent='📊 운세 점수';rbox.appendChild(barsH);
[{label:'💕 연애운',val:rd.love},{label:'💰 금전운',val:rd.money},{label:'💪 건강운',val:rd.health},{label:'💼 직장운',val:rd.work}].forEach(item=>{mkFaceBar(item.label,item.val,rbox);});
rbox.appendChild(document.createElement('br'));
const luckyP=document.createElement('p');luckyP.textContent='🔢 행운의 숫자: '+luckyNum;rbox.appendChild(luckyP);
const colorP=document.createElement('p');colorP.textContent='🎨 행운의 색: '+luckyColor;rbox.appendChild(colorP);
el.appendChild(rbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{cur=0;ans=[];el.style.display='none';render();};el.appendChild(btn);
el.style.display='block';while(stepsEl.firstChild)stepsEl.removeChild(stepsEl.firstChild);}
render();
</script><div style="position:fixed;bottom:0;left:0;right:0;z-index:9998;background:#0f0f1e;padding:4px 0;text-align:center"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2968188107783039" data-ad-slot="4435401854" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
