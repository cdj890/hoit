<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>수비학</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0a0a1a,#1a0a2e,#0a1a2e);color:#e0d0ff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}h1{margin:30px 0 10px;font-size:2em;text-shadow:0 0 20px rgba(150,100,255,.5)}.sub{color:#9988bb;margin-bottom:25px}.input-area{text-align:center;margin:20px 0}input[type=date]{background:rgba(255,255,255,.08);border:1px solid rgba(150,100,255,.3);color:#fff;padding:12px 20px;border-radius:12px;font-size:1.1em;outline:none}input[type=date]:focus{border-color:rgba(150,100,255,.7)}button{background:linear-gradient(135deg,#6a3de8,#4a2db8);color:#fff;border:none;padding:12px 30px;border-radius:12px;font-size:1em;cursor:pointer;margin-top:15px;transition:all .3s}button:hover{transform:scale(1.05)}.result{display:none;max-width:500px;width:100%;animation:fadeIn .8s;margin-top:25px}.numbox{background:rgba(255,255,255,.05);border:1px solid rgba(150,100,255,.15);border-radius:16px;padding:25px;line-height:1.8;text-align:center}.bignum{font-size:4em;font-weight:bold;background:linear-gradient(135deg,#e84de8,#6a3de8,#3de8c7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:15px 0}.trait{display:inline-block;background:rgba(150,100,255,.15);border-radius:20px;padding:5px 14px;margin:3px;font-size:.9em}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}</style></head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;font-size:13px;font-family:sans-serif" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">← 뒤로</a>
<h1>🔢 수비학 운세</h1><p class="sub">생년월일로 알아보는 인생 번호와 운명</p>
<div class="input-area"><input type="date" id="bday"><br><button onclick="calc()">인생 번호 계산</button></div>
<div class="result" id="result"></div>
<script>
const data={
1:{t:'리더',e:'👑',traits:['독립적','창의적','개척자','자신감'],p:'타고난 리더입니다. 독립적이고 창의적인 성격으로 새로운 길을 개척합니다. 강한 의지와 결단력이 있으며, 자신만의 방식으로 목표를 달성합니다.',love:75,money:80,health:70,work:90,adv:'너무 독단적이지 않도록 주의하세요. 협력의 힘을 믿으세요.'},
2:{t:'조화가',e:'🤝',traits:['협력적','민감함','외교관','직감적'],p:'평화와 조화를 추구합니다. 뛰어난 감수성과 직감으로 사람들 사이의 관계를 이어주는 역할을 합니다. 파트너십에서 빛을 발합니다.',love:90,money:65,health:75,work:72,adv:'자신의 목소리도 내세요. 남을 위해서만 사는 것은 아닙니다.'},
3:{t:'표현가',e:'🎨',traits:['창작','낙천적','사교적','영감적'],p:'창조적 에너지가 넘칩니다. 말과 글, 예술로 세상에 영감을 주는 사람입니다. 유머와 낙관주의로 주변을 밝게 합니다.',love:82,money:70,health:68,work:78,adv:'집중력을 키우세요. 에너지를 분산하지 마세요.'},
4:{t:'건축가',e:'🏗️',traits:['실용적','근면','체계적','신뢰감'],p:'안정과 질서를 중시합니다. 꾸준한 노력으로 단단한 기반을 쌓는 사람입니다. 신뢰할 수 있고 책임감이 강합니다.',love:65,money:85,health:80,work:88,adv:'유연성을 가지세요. 변화도 때로는 필요합니다.'},
5:{t:'자유인',e:'🌍',traits:['모험','자유','적응력','다재다능'],p:'자유와 모험을 사랑합니다. 변화를 두려워하지 않고 다양한 경험을 추구합니다. 어디서든 적응하는 능력이 뛰어납니다.',love:72,money:60,health:65,work:70,adv:'안정도 중요합니다. 한 곳에 뿌리를 내려보세요.'},
6:{t:'양육자',e:'💝',traits:['책임감','사랑','봉사','가정적'],p:'사랑과 책임감의 화신입니다. 가족과 공동체를 위해 헌신하며, 아름다움과 조화를 중시합니다.',love:95,money:72,health:78,work:75,adv:'자기 자신도 돌보세요. 과도한 희생은 피하세요.'},
7:{t:'탐구자',e:'🔬',traits:['분석적','직관적','지적','영적'],p:'깊은 사색과 탐구를 즐깁니다. 표면 아래의 진실을 찾는 능력이 있으며, 영적 세계에 관심이 많습니다.',love:55,money:68,health:72,work:82,adv:'사람들과 더 많이 소통하세요. 혼자만의 시간도 중요하지만요.'},
8:{t:'성취자',e:'💎',traits:['야망','권위','현실적','성공지향'],p:'물질적 성공과 권력을 추구합니다. 뛰어난 비즈니스 감각과 리더십으로 큰 일을 이룹니다.',love:60,money:95,health:65,work:92,adv:'물질 외에 정신적 가치도 소중히 하세요.'},
9:{t:'인도자',e:'🌟',traits:['이타적','지혜','관대','이상주의'],p:'인류를 위한 넓은 시야를 가진 사람입니다. 관대하고 이타적이며, 큰 그림을 보는 능력이 있습니다.',love:78,money:65,health:70,work:76,adv:'현실과 이상의 균형을 찾으세요.'},
11:{t:'직감의 달인',e:'✨',traits:['영감','직관','카리스마','예언적'],p:'마스터 넘버 11! 특별한 직감과 영감을 가진 사람입니다. 카리스마가 있으며 다른 사람에게 깊은 영향을 미칩니다.',love:85,money:72,health:60,work:88,adv:'당신의 직감을 믿으세요. 특별한 능력입니다.'},
22:{t:'마스터 건축가',e:'🏛️',traits:['비전','대규모','실현력','영향력'],p:'마스터 넘버 22! 원대한 비전을 현실로 만드는 능력의 소유자입니다. 세상을 바꿀 잠재력이 있습니다.',love:70,money:90,health:68,work:95,adv:'큰 꿈을 실현하세요. 당신에게는 그 능력이 있습니다.'}
};
function calcLP(d){const s=d.replace(/-/g,'');let n=s.split('').reduce((a,c)=>a+parseInt(c),0);if(n===11||n===22)return n;while(n>9){n=String(n).split('').reduce((a,c)=>a+parseInt(c),0);if(n===11||n===22)return n}return n}
function calc(){
const v=document.getElementById('bday').value;if(!v){alert('생년월일을 선택해주세요!');return}
const lp=calcLP(v),d=data[lp],today=new Date().toDateString();
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const r=sr(v+today);
const todayLove=Math.max(30,Math.min(100,d.love+Math.floor(r()*30)-15));
const todayMoney=Math.max(30,Math.min(100,d.money+Math.floor(r()*30)-15));
const todayHealth=Math.max(30,Math.min(100,d.health+Math.floor(r()*30)-15));
const todayWork=Math.max(30,Math.min(100,d.work+Math.floor(r()*30)-15));
const el=document.getElementById('result');
el.innerHTML=`<div class="numbox"><p style="font-size:1.1em">당신의 인생 번호는</p><div class="bignum">${lp}</div><p style="font-size:1.4em">${d.e} ${d.t}</p><br><div>${d.traits.map(t=>`<span class="trait">${t}</span>`).join('')}</div><br><p style="text-align:left;margin:15px 0">${d.p}</p><hr style="border-color:rgba(150,100,255,.15);margin:15px 0"><h3 style="margin-bottom:10px">📊 오늘의 운세</h3><p>💕 연애운: ${todayLove}점 ${'★'.repeat(Math.round(todayLove/20))}${'☆'.repeat(5-Math.round(todayLove/20))}</p><p>💰 금전운: ${todayMoney}점 ${'★'.repeat(Math.round(todayMoney/20))}${'☆'.repeat(5-Math.round(todayMoney/20))}</p><p>💪 건강운: ${todayHealth}점 ${'★'.repeat(Math.round(todayHealth/20))}${'☆'.repeat(5-Math.round(todayHealth/20))}</p><p>💼 직장운: ${todayWork}점 ${'★'.repeat(Math.round(todayWork/20))}${'☆'.repeat(5-Math.round(todayWork/20))}</p><hr style="border-color:rgba(150,100,255,.15);margin:15px 0"><p>💡 <b>조언:</b> ${d.adv}</p></div><br><button onclick="document.getElementById('result').style.display='none'">다시 하기</button>`;
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
</script></body></html>
