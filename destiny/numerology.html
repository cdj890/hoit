2:{t:'조화가',e:'🤝',traits:['협력적','민감함','외교관','직감적'],p:'평화와 조화를 추구합니다. 뛰어난 감수성과 직감으로 사람들 사이의 관계를 이어주는 역할을 합니다. 파트너십에서 빛을 발합니다.',love:90,money:65,health:75,work:72,adv:'자신의 목소리도 내세요. 남을 위해서만 사는 것은 아닙니다.'},
3:{t:'표현가',e:'🎨',traits:['창작','낙천적','사교적','영감적'],p:'창조적 에너지가 넘칩니다. 말과 글, 예술로 세상에 영감을 주는 사람입니다. 유머와 낙관주의로 주변을 밝게 합니다.',love:82,money:70,health:68,work:78,adv:'집중력을 키우세요. 에너지를 분산하지 마세요.'},

5:{t:'자유인',e:'🌍',traits:['모험','자유','적응력','다재다능'],p:'자유와 모험을 사랑합니다. 변화를 두려워하지 않고 다양한 경험을 추구합니다. 어디서든 적응하는 능력이 뛰어납니다.',love:72,money:60,health:65,work:70,adv:'안정도 중요합니다. 한 곳에 뿌리를 내려보세요.'},
6:{t:'양육자',e:'💝',traits:['책임감','사랑','봉사','가정적'],p:'사랑과 책임감의 화신입니다. 가족과 공동체를 위해 헌신하며, 아름다움과 조화를 중시합니다.',love:95,money:72,health:78,work:75,adv:'자기 자신도 돌보세요. 과도한 희생은 피하세요.'},
7:{t:'탐구자',e:'🔬',traits:['분석적','직관적','지적','영적'],p:'깊은 사색과 탐구를 즐깁니다. 표면 아래의 진실을 찾는 능력이 있으며, 영적 세계에 관심이 많습니다.',love:55,money:68,health:72,work:82,adv:'사람들과 더 많이 소통하세요. 혼자만의 시간도 중요하지만요.'},
8:{t:'성취자',e:'💎',traits:['야망','권위','현실적','성공지향'],p:'물질적 성공과 권력을 추구합니다. 뛰어난 비즈니스 감각과 리더십으로 큰 일을 이룹니다.',love:60,money:95,health:65,work:92,adv:'물질 외에 정신적 가치도 소중히 하세요.'},

function calcLP(d){const s=d.replace(/-/g,'');let n=s.split('').reduce((a,c)=>a+parseInt(c),0);if(n===11||n===22)return n;while(n>9){n=String(n).split('').reduce((a,c)=>a+parseInt(c),0);if(n===11||n===22)return n}return n}
function calc(){
const v=document.getElementById('bday').value;if(!v){alert('생년월일을 선택해주세요!');return}
const lp=calcLP(v),d=data[lp],today=new Date().toDateString();
function sr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i),h|=0;return function(){h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/4294967296}}
const r=sr(v+today);
const todayLove=Math.max(30,Math.min(100,d.love+Math.floor(r()*30)-15));
const todayMoney=Math.max(30,Math.min(100,d.money+Math.floor(r()*30)-15));
const todayHealth=Math.max(30,Math.min(100,d.health+Math.floor(r()*30)-15));
const todayWork=Math.max(30,Math.min(100,d.work+Math.floor(r()*30)-15));
const el=document.getElementById('result');
while(el.firstChild)el.removeChild(el.firstChild);
const numbox=document.createElement('div');numbox.className='numbox';
const introP=document.createElement('p');introP.style.fontSize='1.1em';introP.textContent='당신의 인생 번호는';numbox.appendChild(introP);
const bigNum=document.createElement('div');bigNum.className='bignum';bigNum.textContent=String(lp);numbox.appendChild(bigNum);
const typeP=document.createElement('p');typeP.style.fontSize='1.4em';typeP.textContent=d.e+' '+d.t;numbox.appendChild(typeP);
numbox.appendChild(document.createElement('br'));
const traitsDiv=document.createElement('div');d.traits.forEach(t=>{const sp=document.createElement('span');sp.className='trait';sp.textContent=t;traitsDiv.appendChild(sp);});numbox.appendChild(traitsDiv);
numbox.appendChild(document.createElement('br'));
const descP=document.createElement('p');descP.style.cssText='text-align:left;margin:15px 0';descP.textContent=d.p;numbox.appendChild(descP);
const hr1=document.createElement('hr');hr1.style.cssText='border-color:rgba(150,100,255,.15);margin:15px 0';numbox.appendChild(hr1);
const barsH=document.createElement('h3');barsH.style.cssText='margin-bottom:10px';barsH.textContent='📊 오늘의 운세';numbox.appendChild(barsH);
function mkNumBar(label,val){
  const row=document.createElement('div');row.style.cssText='margin:8px 0';
  const lbl=document.createElement('div');lbl.style.cssText='display:flex;justify-content:space-between;font-size:.85em;margin-bottom:3px';
  const lt=document.createElement('span');lt.textContent=label;const lv=document.createElement('span');lv.textContent=val+'점';lbl.appendChild(lt);lbl.appendChild(lv);row.appendChild(lbl);
  const track=document.createElement('div');track.style.cssText='background:rgba(255,255,255,.1);border-radius:6px;height:10px;overflow:hidden';
  const fill=document.createElement('div');fill.style.height='100%';fill.style.borderRadius='6px';fill.style.transition='width 1s ease';fill.style.width='0';
  fill.style.background='linear-gradient(90deg,#e84040,#e8d030 50%,#30c830)';fill.style.backgroundSize='200% 100%';fill.style.backgroundPosition=(100-val)+'% 0';
  track.appendChild(fill);row.appendChild(track);numbox.appendChild(row);setTimeout(()=>{fill.style.width=val+'%';},80);
}
[{label:'💕 연애운',val:todayLove},{label:'💰 금전운',val:todayMoney},{label:'💪 건강운',val:todayHealth},{label:'💼 직장운',val:todayWork}].forEach(item=>{mkNumBar(item.label,item.val);});
const hr2=document.createElement('hr');hr2.style.cssText='border-color:rgba(150,100,255,.15);margin:15px 0';numbox.appendChild(hr2);
const advP=document.createElement('p');const advStrong=document.createElement('strong');advStrong.textContent='💡 조언: ';advP.appendChild(advStrong);advP.appendChild(document.createTextNode(d.adv));numbox.appendChild(advP);
el.appendChild(numbox);el.appendChild(document.createElement('br'));
const btn=document.createElement('button');btn.textContent='다시 하기';btn.onclick=()=>{el.style.display='none';};el.appendChild(btn);
el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
